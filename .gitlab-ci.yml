stages:
  - lint
  - security
  - test

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo

# ------------------------------------------------------------------------------
# Job Templates
# ------------------------------------------------------------------------------

.job-template:
  tags:
    - saas-linux-medium-amd64
  image: rust:1.89.0
  before_script:
    - apt-get update && apt-get install -y libclang-dev
    - rustup set auto-self-update disable

.mr-only-rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'

.mr-and-main-rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ------------------------------------------------------------------------------
# Lint Stage
# ------------------------------------------------------------------------------

mr-title-check:
  stage: lint
  image: node:lts-alpine
  tags:
    - saas-linux-small-amd64
  extends:
    - .mr-only-rules
  before_script:
    - npm install -g @commitlint/cli @commitlint/config-conventional
  script:
    - ./scripts/check-mr-title.sh

fmt-check:
  stage: lint
  extends:
    - .job-template
    - .mr-only-rules
  before_script:
    - rustup component add rustfmt
  script:
    - cargo fmt --all -- --check

lint-check:
  stage: lint
  extends:
    - .job-template
    - .mr-only-rules
  before_script:
    - apt-get update && apt-get install -y libclang-dev
    - rustup component add clippy
  script:
    - cargo clippy --all-targets --all-features -- -D warnings

# ------------------------------------------------------------------------------
# Security Stage
# ------------------------------------------------------------------------------

cargo-audit:
  stage: security
  extends:
    - .job-template
    - .mr-and-main-rules
  script:
    - cargo install cargo-audit --locked
    - cargo audit

cargo-deny:
  stage: security
  extends:
    - .job-template
    - .mr-and-main-rules
  script:
    - cargo install cargo-deny --locked
    - cargo deny check

cargo-geiger:
  stage: security
  extends:
    - .job-template
    - .mr-and-main-rules
  script:
    - cargo install cargo-geiger --locked
    - for pkg in $(cargo metadata --no-deps --format-version 1 | jq -r '.packages[].name'); do cargo geiger -p "$pkg" --all-features || true; done
  allow_failure: true

generate-sbom:
  stage: security
  extends:
    - .job-template
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - cargo install cargo-cyclonedx --locked
    - cargo cyclonedx --format json > sbom.cdx.json
  artifacts:
    paths:
      - sbom.cdx.json
    reports:
      cyclonedx: sbom.cdx.json

# ------------------------------------------------------------------------------
# Test Stage
# ------------------------------------------------------------------------------

unit-test:
  stage: test
  extends:
    - .job-template
    - .mr-and-main-rules
  variables:
    RUST_BACKTRACE: "1"
  before_script:
    - apt-get update && apt-get install -y libclang-dev
    - cargo install cargo-nextest --locked
  script:
    - cargo nextest run --profile ci
  artifacts:
    when: always
    reports:
      junit:
        - target/nextest/ci/junit.xml
