include:
  - template: Jobs/SAST.gitlab-ci.yml

stages:
  - lint
  - security
  - test

# ------------------------------------------------------------------------------
# Job Templates
# ------------------------------------------------------------------------------

.job-template:
  tags:
    - saas-linux-medium-amd64
  image: registry.gitlab.com/gitlab-org/orbit/build-images/rust-builder:latest
  before_script:
    - mise install

.mr-only-rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'

.mr-and-main-rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ------------------------------------------------------------------------------
# Lint Stage
# ------------------------------------------------------------------------------

mr-title-check:
  stage: lint
  image: node:lts-alpine
  tags:
    - saas-linux-small-amd64
  extends:
    - .mr-only-rules
  before_script:
    - npm install -g @commitlint/cli @commitlint/config-conventional
  script:
    - ./scripts/check-mr-title.sh

fmt-check:
  stage: lint
  extends:
    - .job-template
    - .mr-only-rules
  script:
    - cargo fmt --all -- --check

lint-check:
  stage: lint
  extends:
    - .job-template
    - .mr-only-rules
  script:
    - cargo clippy --all-targets --all-features -- -D warnings

# ------------------------------------------------------------------------------
# Security Stage
# ------------------------------------------------------------------------------

cargo-audit:
  stage: security
  extends:
    - .job-template
    - .mr-and-main-rules
  needs: []
  script:
    - cargo audit

cargo-deny:
  stage: security
  extends:
    - .job-template
    - .mr-and-main-rules
  needs: []
  script:
    - cargo deny check

cargo-geiger:
  stage: security
  extends:
    - .job-template
    - .mr-and-main-rules
  needs: []
  script:
    - for pkg in $(cargo metadata --no-deps --format-version 1 | jq -r '.packages[].name'); do cargo geiger -p "$pkg" --all-features || true; done
  allow_failure: true

generate-sbom:
  stage: security
  extends:
    - .job-template
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - cargo cyclonedx --format json > sbom.cdx.json
  artifacts:
    paths:
      - sbom.cdx.json
    reports:
      cyclonedx: sbom.cdx.json

semgrep-sast:
  stage: security
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      exists:
        - '**/*.rs'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      exists:
        - '**/*.rs'

# ------------------------------------------------------------------------------
# Test Stage
# ------------------------------------------------------------------------------

unit-test:
  stage: test
  extends:
    - .job-template
    - .mr-and-main-rules
  needs: []
  variables:
    RUST_BACKTRACE: "1"
  script:
    - cargo nextest run --profile ci
  artifacts:
    when: always
    reports:
      junit:
        - target/nextest/ci/junit.xml
