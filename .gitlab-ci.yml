include:
  - template: Jobs/SAST.gitlab-ci.yml

stages:
  - lint
  - security
  - test
  - build
  - deploy
  - release

# Job Templates

.job-template:
  tags:
    - saas-linux-medium-amd64
  image: registry.gitlab.com/gitlab-org/orbit/build-images/rust-builder:latest
  before_script:
    - mise install

.sccache-template:
  variables:
    CARGO_INCREMENTAL: "0"
    SCCACHE_GCS_BUCKET: "gl-knowledgegraph-sccache"
    SCCACHE_GCS_KEY_PATH: "${SCCACHE_GCS_KEY}"
    SCCACHE_GCS_RW_MODE: "READ_WRITE"
  before_script:
    - mise install
    - |
      if [ -n "${SCCACHE_GCS_KEY}" ]; then
        export RUSTC_WRAPPER="sccache"
        sccache --start-server || true
      fi

.test-template:
  extends:
    - .job-template
    - .sccache-template
  variables:
    RUST_BACKTRACE: "1"
  artifacts:
    when: always
    reports:
      junit:
        - target/nextest/ci/junit.xml

.mr-only-rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'

.mr-and-main-rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Lint Stage

agent-file-sync-check:
  stage: lint
  image: alpine:latest
  tags:
    - saas-linux-small-amd64
  extends:
    - .mr-and-main-rules
  needs: []
  script:
    - diff AGENTS.md CLAUDE.md || (echo "AGENTS.md and CLAUDE.md are out of sync. Please ensure they have identical content." && exit 1)

mr-title-check:
  stage: lint
  image: node:lts-alpine
  tags:
    - saas-linux-small-amd64
  extends:
    - .mr-only-rules
  before_script:
    - npm install -g @commitlint/cli @commitlint/config-conventional
  script:
    - ./scripts/check-mr-title.sh

ontology-schema-validate:
  stage: lint
  image: ghcr.io/astral-sh/uv:python3.12-alpine
  tags:
    - saas-linux-small-amd64
  extends:
    - .mr-and-main-rules
  needs: []
  script:
    - find fixtures/ontology -name '*.yaml' ! -name 'reference.yaml' | xargs uvx check-jsonschema --verbose --schemafile fixtures/ontology/ontology.schema.json

check-docs:
  stage: lint
  image: registry.gitlab.com/gitlab-org/technical-writing/docs-gitlab-com/lint-markdown:alpine-3.22-vale-3.13.0-markdownlint2-0.19.0-lychee-0.21.0
  tags:
    - saas-linux-small-amd64
  extends:
    - .mr-and-main-rules
  needs: []
  script:
    - markdownlint-cli2 '**/*.md'
    - vale --minAlertLevel error .
    - lychee --offline --include-fragments '**/*.md'

fmt-check:
  stage: lint
  extends:
    - .job-template
    - .mr-only-rules
  script:
    - cargo fmt --all -- --check

lint-check:
  stage: lint
  extends:
    - .job-template
    - .sccache-template
    - .mr-only-rules
  script:
    - cargo clippy --all-targets --all-features -- -D warnings
    - sccache --show-stats || true

# Security Stage

cargo-audit:
  stage: security
  extends:
    - .job-template
    - .mr-and-main-rules
  needs: []
  script:
    - cargo audit

cargo-deny:
  stage: security
  extends:
    - .job-template
    - .mr-and-main-rules
  needs: []
  script:
    - cargo deny check

cargo-geiger:
  stage: security
  extends:
    - .job-template
    - .mr-and-main-rules
  needs: []
  script:
    - for pkg in $(cargo metadata --no-deps --format-version 1 | jq -r '.packages[].name'); do cargo geiger -p "$pkg" --all-features || true; done
  allow_failure: true

generate-sbom:
  stage: security
  extends:
    - .job-template
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - cargo cyclonedx --format json > sbom.cdx.json
  artifacts:
    paths:
      - sbom.cdx.json
    reports:
      cyclonedx: sbom.cdx.json

semgrep-sast:
  stage: security
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      exists:
        - "**/*.rs"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      exists:
        - "**/*.rs"

# Test Stage

unit-test:
  stage: test
  extends:
    - .test-template
    - .mr-and-main-rules
  needs: []
  script:
    - cargo nextest run --profile ci --lib --bins
    - sccache --show-stats || true

integration-test:
  stage: test
  extends:
    - .test-template
    - .mr-and-main-rules
  tags:
    - saas-linux-large-amd64
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    TESTCONTAINERS_HOST_OVERRIDE: docker
  needs: []
  before_script:
    - !reference [.sccache-template, before_script]
  script:
    - cargo nextest run --profile ci --all-features --test '*' -j 12 --ignore-default-filter -E 'not package(gitaly-client)'
    - sccache --show-stats || true

gitaly-integration-test:
  stage: test
  extends:
    - .test-template
    - .mr-and-main-rules
  needs: []
  services:
    - name: registry.gitlab.com/gitlab-org/build/cng/gitaly:17-7-stable
      alias: gitaly
      command:
        - bash
        - -c
        - |
          mkdir -p /home/git/repositories
          rm -rf /srv/gitlab-shell/hooks/*
          echo -e '\n[auth]\ntoken = "secret_token"\n' >> /etc/gitaly/config.toml
          exec /usr/bin/env GITALY_TESTING_NO_GIT_HOOKS=1 /scripts/process-wrapper
  variables:
    RUST_BACKTRACE: "1"
    GITALY_CONNECTION_INFO: '{"address":"tcp://gitaly:8075","storage":"default","token":"secret_token"}'
  script:
    - cargo nextest run --profile ci -p gitaly-client --features integration
    - sccache --show-stats || true

tilt-ci:
  stage: test
  extends:
    - .mr-only-rules
  image: docker:29
  tags:
    - saas-linux-large-amd64
  services:
    - docker:29-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    KIND_VERSION: "v0.25.0"
    TILT_VERSION: "0.36.0"
    KUBECTL_VERSION: "v1.32.0"
    SCCACHE_GCS_BUCKET: "gl-knowledgegraph-sccache"
  needs: []
  before_script:
    - apk add --no-cache curl bash sed
    - curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    - curl -Lo ./kind https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64
    - chmod +x ./kind && mv ./kind /usr/local/bin/kind
    - curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    - curl -fsSL "https://github.com/tilt-dev/tilt/releases/download/v${TILT_VERSION}/tilt.${TILT_VERSION}.linux-alpine.x86_64.tar.gz" | tar -xz -C /usr/local/bin tilt
  script:
    - |
      cat <<EOF | kind create cluster --wait 5m --config=-
      kind: Cluster
      apiVersion: kind.x-k8s.io/v1alpha4
      networking:
        apiServerAddress: "0.0.0.0"
      kubeadmConfigPatches:
        - |
          kind: ClusterConfiguration
          apiServer:
            certSANs:
              - "docker"
      EOF
    - sed -i -E 's#https://0\.0\.0\.0:#https://docker:#' ~/.kube/config
    - helm repo add gitlab https://charts.gitlab.io
    - helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
    - helm repo add grafana https://grafana.github.io/helm-charts
    - helm repo add nats https://nats-io.github.io/k8s/helm/charts/
    - helm dependency build helm-dev/gkg
    - helm dependency build helm-dev/observability
    # Create dummy secrets for CI (not real credentials)
    - |
      cat <<EOF > .tilt-secrets
      POSTGRES_PASSWORD=ci_test_password
      CLICKHOUSE_PASSWORD=ci_test_password
      GKG_JWT_SECRET=ci_test_jwt_secret_at_least_32_bytes_long
      EOF
    - tilt ci

# Build Stage

.docker-build:
  stage: build
  image: docker:29
  needs: []
  services:
    - docker:29-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    IMAGE_NAME: gkg
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - ./scripts/docker-build.sh "${CI_REGISTRY_IMAGE}/${IMAGE_NAME}:develop-${ARCH}"

docker-build-amd64:
  extends: .docker-build
  tags:
    - saas-linux-large-amd64
  variables:
    ARCH: amd64

docker-build-arm64:
  extends: .docker-build
  tags:
    - saas-linux-large-arm64
  variables:
    ARCH: arm64

docker-manifest:
  stage: build
  image: docker:29
  tags:
    - saas-linux-small-amd64
  needs:
    - docker-build-amd64
    - docker-build-arm64
  variables:
    IMAGE_NAME: gkg
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker buildx imagetools create
        -t "${CI_REGISTRY_IMAGE}/${IMAGE_NAME}:develop"
        "${CI_REGISTRY_IMAGE}/${IMAGE_NAME}:develop-amd64"
        "${CI_REGISTRY_IMAGE}/${IMAGE_NAME}:develop-arm64"

# Deploy Stage - Helm Charts

# GKE cluster configuration
variables:
  GKE_PROJECT: gl-knowledgegraph-prj-f2eec59d
  GKE_CLUSTER: knowledge-graph-test
  GKE_ZONE: us-central1
  HELM_NAMESPACE: gkg

.helm-base:
  image: google/cloud-sdk:slim
  tags:
    - saas-linux-small-amd64
  before_script:
    - apt-get update && apt-get install -y curl
    - curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    - helm version
    - helm repo add gitlab https://charts.gitlab.io
    - helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
    - helm repo add grafana https://grafana.github.io/helm-charts
    - helm repo add nats https://nats-io.github.io/k8s/helm/charts/
    - helm dependency update helm-dev/gkg
    - helm dependency update helm-dev/observability

.helm-with-gke-auth:
  extends: .helm-base
  before_script:
    - !reference [.helm-base, before_script]
    - apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin kubectl
    - gcloud auth activate-service-account --key-file="${GKE_SA_KEY}"
    - gcloud container clusters get-credentials ${GKE_CLUSTER} --zone ${GKE_ZONE} --project ${GKE_PROJECT}

helm-lint:
  extends:
    - .helm-base
    - .mr-and-main-rules
  stage: lint
  needs: []
  script:
    - helm lint helm-dev/gkg -f helm-dev/gkg/values-sandbox.yaml
    - helm lint helm-dev/observability -f helm-dev/observability/values-sandbox.yaml
    - helm template gkg helm-dev/gkg -f helm-dev/gkg/values-sandbox.yaml
    - helm template gkg-obs helm-dev/observability -f helm-dev/observability/values-sandbox.yaml

helm-dry-run:
  extends: .helm-with-gke-auth
  stage: lint
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - |
      helm upgrade gkg-obs helm-dev/observability \
        -f helm-dev/observability/values-sandbox.yaml \
        --namespace ${HELM_NAMESPACE} \
        --install \
        --history-max 1 \
        --dry-run
    - |
      helm upgrade gkg helm-dev/gkg \
        -f helm-dev/gkg/values-sandbox.yaml \
        --namespace ${HELM_NAMESPACE} \
        --install \
        --history-max 1 \
        --dry-run
  environment:
    name: sandbox
    action: prepare

deploy-sandbox:
  extends: .helm-with-gke-auth
  stage: deploy
  needs:
    - helm-lint
    - helm-dry-run
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  script:
    - |
      helm upgrade gkg-obs helm-dev/observability \
        -f helm-dev/observability/values-sandbox.yaml \
        --namespace ${HELM_NAMESPACE} \
        --create-namespace \
        --install \
        --history-max 1 \
        --wait \
        --timeout 10m
    - |
      helm upgrade gkg helm-dev/gkg \
        -f helm-dev/gkg/values-sandbox.yaml \
        --namespace ${HELM_NAMESPACE} \
        --install \
        --history-max 1 \
        --wait \
        --timeout 5m
    - kubectl get pods -n ${HELM_NAMESPACE}
  environment:
    name: sandbox
    url: https://console.cloud.google.com/kubernetes/workload?project=${GKE_PROJECT}

# Release Stage

semantic-release:
  stage: release
  image: node:lts
  tags:
    - saas-linux-small-amd64
  variables:
    GIT_STRATEGY: clone
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  before_script:
    - npm install -g semantic-release @semantic-release/gitlab @semantic-release/git @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/changelog conventional-changelog-conventionalcommits semantic-release-slack-bot
  script:
    - npx semantic-release

.docker-release:
  stage: build
  image: docker:29
  services:
    - docker:29-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    IMAGE_NAME: gkg
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  script:
    - export GKG_VERSION="${CI_COMMIT_TAG#v}"
    - ./scripts/docker-build.sh "${CI_REGISTRY_IMAGE}/${IMAGE_NAME}:${GKG_VERSION}-${ARCH}"

release-build-amd64:
  extends: .docker-release
  tags:
    - saas-linux-large-amd64
  variables:
    ARCH: amd64

release-build-arm64:
  extends: .docker-release
  tags:
    - saas-linux-large-arm64
  variables:
    ARCH: arm64

release-manifest:
  stage: build
  image: docker:29
  tags:
    - saas-linux-small-amd64
  needs:
    - release-build-amd64
    - release-build-arm64
  variables:
    IMAGE_NAME: gkg
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - VERSION="${CI_COMMIT_TAG#v}"
    - docker buildx imagetools create
        -t "${CI_REGISTRY_IMAGE}/${IMAGE_NAME}:${VERSION}"
        -t "${CI_REGISTRY_IMAGE}/${IMAGE_NAME}:latest"
        "${CI_REGISTRY_IMAGE}/${IMAGE_NAME}:${VERSION}-amd64"
        "${CI_REGISTRY_IMAGE}/${IMAGE_NAME}:${VERSION}-arm64"
