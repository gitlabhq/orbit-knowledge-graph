include:
  - template: Jobs/SAST.gitlab-ci.yml

stages:
  - lint
  - security
  - test
  - deploy

# ------------------------------------------------------------------------------
# Job Templates
# ------------------------------------------------------------------------------

.job-template:
  tags:
    - saas-linux-medium-amd64
  image: registry.gitlab.com/gitlab-org/orbit/build-images/rust-builder:latest
  before_script:
    - mise install

.test-template:
  extends:
    - .job-template
  variables:
    RUST_BACKTRACE: "1"
  before_script:
    - apt-get update && apt-get install -y libclang-dev
    - cargo install cargo-nextest --locked
  artifacts:
    when: always
    reports:
      junit:
        - target/nextest/ci/junit.xml

.mr-only-rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'

.mr-and-main-rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ------------------------------------------------------------------------------
# Lint Stage
# ------------------------------------------------------------------------------

mr-title-check:
  stage: lint
  image: node:lts-alpine
  tags:
    - saas-linux-small-amd64
  extends:
    - .mr-only-rules
  before_script:
    - npm install -g @commitlint/cli @commitlint/config-conventional
  script:
    - ./scripts/check-mr-title.sh

fmt-check:
  stage: lint
  extends:
    - .job-template
    - .mr-only-rules
  script:
    - cargo fmt --all -- --check

lint-check:
  stage: lint
  extends:
    - .job-template
    - .mr-only-rules
  script:
    - cargo clippy --all-targets --all-features -- -D warnings

# ------------------------------------------------------------------------------
# Security Stage
# ------------------------------------------------------------------------------

cargo-audit:
  stage: security
  extends:
    - .job-template
    - .mr-and-main-rules
  needs: []
  script:
    - cargo audit

cargo-deny:
  stage: security
  extends:
    - .job-template
    - .mr-and-main-rules
  needs: []
  script:
    - cargo deny check

cargo-geiger:
  stage: security
  extends:
    - .job-template
    - .mr-and-main-rules
  needs: []
  script:
    - for pkg in $(cargo metadata --no-deps --format-version 1 | jq -r '.packages[].name'); do cargo geiger -p "$pkg" --all-features || true; done
  allow_failure: true

generate-sbom:
  stage: security
  extends:
    - .job-template
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - cargo cyclonedx --format json > sbom.cdx.json
  artifacts:
    paths:
      - sbom.cdx.json
    reports:
      cyclonedx: sbom.cdx.json

semgrep-sast:
  stage: security
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      exists:
        - "**/*.rs"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      exists:
        - "**/*.rs"

# ------------------------------------------------------------------------------
# Test Stage
# ------------------------------------------------------------------------------

unit-test:
  stage: test
  extends:
    - .test-template
    - .mr-and-main-rules
  needs: []
  script:
    - cargo nextest run --profile ci --lib --bins

integration-test:
  stage: test
  extends:
    - .test-template
    - .mr-and-main-rules
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    TESTCONTAINERS_HOST_OVERRIDE: docker
  needs: []
  before_script:
    - !reference [.test-template, before_script]
    - apt-get install -y docker.io
  script:
    - cargo nextest run --profile ci --all-features --test '*' -j 1 --ignore-default-filter -E 'not package(gitaly-client)'

gitaly-integration-test:
  stage: test
  extends:
    - .test-template
    - .mr-and-main-rules
  needs: []
  services:
    - name: registry.gitlab.com/gitlab-org/build/cng/gitaly:17-7-stable
      alias: gitaly
      command:
        - bash
        - -c
        - |
          mkdir -p /home/git/repositories
          rm -rf /srv/gitlab-shell/hooks/*
          echo -e '\n[auth]\ntoken = "secret_token"\n' >> /etc/gitaly/config.toml
          exec /usr/bin/env GITALY_TESTING_NO_GIT_HOOKS=1 /scripts/process-wrapper
  variables:
    RUST_BACKTRACE: "1"
    GITALY_CONNECTION_INFO: '{"address":"tcp://gitaly:8075","storage":"default","token":"secret_token"}'
  script:
    - cargo nextest run --profile ci -p gitaly-client --features integration

# ------------------------------------------------------------------------------
# Deploy Stage - Helm Charts
# ------------------------------------------------------------------------------

# GKE cluster configuration
variables:
  GKE_PROJECT: gl-knowledgegraph-prj-f2eec59d
  GKE_CLUSTER: knowledge-graph-test
  GKE_ZONE: us-central1
  HELM_CHART_PATH: helm-dev
  HELM_RELEASE_NAME: gkg-sandbox
  HELM_NAMESPACE: gkg-sandbox

.helm-base:
  image: google/cloud-sdk:slim
  tags:
    - saas-linux-small-amd64
  before_script:
    - apt-get update && apt-get install -y curl
    - curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    - helm version
    - helm dependency update ${HELM_CHART_PATH}

.helm-with-gke-auth:
  extends: .helm-base
  before_script:
    - apt-get update && apt-get install -y curl
    - curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    - helm version
    - helm dependency update ${HELM_CHART_PATH}
    # Authenticate to GKE using service account (GKE_SA_KEY is a File-type CI variable)
    - gcloud auth activate-service-account --key-file="${GKE_SA_KEY}"
    - gcloud container clusters get-credentials ${GKE_CLUSTER} --zone ${GKE_ZONE} --project ${GKE_PROJECT}

helm-lint:
  extends:
    - .helm-base
    - .mr-and-main-rules
  stage: lint
  needs: []
  script:
    - helm lint ${HELM_CHART_PATH} -f ${HELM_CHART_PATH}/values-sandbox.yaml
    - helm template ${HELM_RELEASE_NAME} ${HELM_CHART_PATH} -f ${HELM_CHART_PATH}/values-sandbox.yaml --validate

helm-dry-run:
  extends:
    - .helm-with-gke-auth
    - .mr-and-main-rules
  stage: lint
  needs: []
  script:
    - |
      helm upgrade ${HELM_RELEASE_NAME} ${HELM_CHART_PATH} \
        -f ${HELM_CHART_PATH}/values-sandbox.yaml \
        --namespace ${HELM_NAMESPACE} \
        --install \
        --dry-run
  environment:
    name: sandbox
    action: prepare

deploy-sandbox:
  extends: .helm-with-gke-auth
  stage: deploy
  needs:
    - helm-lint
    - helm-dry-run
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  script:
    - |
      helm upgrade ${HELM_RELEASE_NAME} ${HELM_CHART_PATH} \
        -f ${HELM_CHART_PATH}/values-sandbox.yaml \
        --namespace ${HELM_NAMESPACE} \
        --create-namespace \
        --install \
        --wait \
        --timeout 5m
    - kubectl get pods -n ${HELM_NAMESPACE}
  environment:
    name: sandbox
    url: https://console.cloud.google.com/kubernetes/workload?project=${GKE_PROJECT}
