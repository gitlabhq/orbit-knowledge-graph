# =============================================================================
# E2E harness configuration
#
# All values for `cargo xtask e2e setup/teardown`.
# The only env var is GITLAB_SRC (required, user-specific, no default here).
# =============================================================================

# -- Colima / k8s --------------------------------------------------------------
colima:
  profile: cng
  memory: "16"              # GB
  cpus: "4"
  disk: "100"               # GB
  vm_type: vz                 # vz (macOS Virtualization.framework) or qemu
  k8s_version: v1.31.5+k3s1

# -- Kubernetes namespaces -----------------------------------------------------
namespaces:
  gitlab: gitlab
  default: default
  kube_system: kube-system

# -- CNG image settings -------------------------------------------------------
cng:
  base_tag: v18.9.0
  registry: registry.gitlab.com/gitlab-org/build/cng
  local_prefix: gkg-e2e
  local_tag: local
  workhorse_component: gitlab-workhorse-ee
  components:
    - gitlab-webservice-ee
    - gitlab-sidekiq-ee
    - gitlab-toolbox-ee
  staging_dirs:
    - app
    - config
    - db
    - ee
    - lib
    - locale
    - gems

# -- Helm releases & repos ----------------------------------------------------
helm:
  gitlab:
    release: gitlab
    chart: gitlab/gitlab
    chart_version: "9.9.0"    # must match cng.base_tag (v18.9.0 → chart 9.9.0)
    repo_name: gitlab
    repo_url: https://charts.gitlab.io
    timeout: 15m
  traefik:
    release: traefik
    chart: traefik/traefik
    chart_version: ""          # empty = latest
    repo_name: traefik
    repo_url: https://traefik.github.io/charts
    timeout: 5m
  gkg:
    release: gkg-e2e
  uninstall_timeout: 5m

# -- PostgreSQL ----------------------------------------------------------------
postgres:
  secret_name: gitlab-postgresql-password
  password_key: postgresql-password
  superpass_key: postgresql-postgres-password
  pod: postgresql-0
  database: gitlabhq_production
  user: gitlab
  superuser: postgres
  port: "5432"
  service_name: postgresql
  bridge_secret_name: postgres-credentials
  bridge_password_key: password
  kg_enabled_table: knowledge_graph_enabled_namespaces

# -- Paths inside pods ---------------------------------------------------------
pod_paths:
  rails_root: /srv/gitlab
  jwt_secret_path: /etc/gitlab/shell/.gitlab_shell_secret
  e2e_pod_dir: /tmp/e2e

# -- ClickHouse ----------------------------------------------------------------
clickhouse:
  image: "clickhouse/clickhouse-server:25.1-alpine"
  service_name: gkg-e2e-clickhouse
  http_port: "8123"
  native_port: "9000"
  datalake_db: gitlab_clickhouse_development
  graph_db: gkg-development
  default_user: default
  init_configmap: gkg-e2e-clickhouse-init
  credentials_secret: clickhouse-credentials
  credentials_key: password

# -- Siphon --------------------------------------------------------------------
siphon:
  publication: siphon_publication_main_db
  slot: siphon_slot_main_db
  poll_timeout: 600         # seconds
  poll_interval: 15         # seconds

# -- GKG server ----------------------------------------------------------------
gkg:
  server_image: gkg-server
  dev_tag: dev
  dispatch_job: gkg-dispatch-indexing
  indexer_configmap: gkg-indexer-config
  grpc_endpoint: gkg-webserver.default.svc.cluster.local:50054
  server_credentials_secret: gkg-server-credentials
  server_credentials_jwt_key: jwt-secret
  indexer_label: app.kubernetes.io/component=gkg-indexer

# -- Port-forwards (cargo xtask e2e serve) -------------------------------------
gitlab_ui:
  service: gitlab-webservice-default
  service_port: "8181"              # workhorse port (serves static assets)
  local_port: "8929"
  gkg_service: gkg-webserver
  gkg_service_port: "8080"
  gkg_local_port: "8930"
  root_password: "G1tL4b_e2e_t3st!"    # must pass GitLab password complexity rules

# -- Label selectors -----------------------------------------------------------
labels:
  toolbox: app=toolbox

# -- Pod readiness checks (GitLab) ---------------------------------------------
pod_readiness:
  - label: app.kubernetes.io/name=postgresql
    timeout: 600s
  - label: app=webservice
    timeout: 600s
  - label: app=sidekiq
    timeout: 600s
  - label: app=toolbox
    timeout: 300s
  - label: app=gitaly
    timeout: 300s

# -- Pod readiness checks (GKG) ------------------------------------------------
gkg_pod_readiness:
  - label: app.kubernetes.io/name=nats
    timeout: 120s
  - label: app.kubernetes.io/component=siphon-producer
    timeout: 120s
  - label: app.kubernetes.io/component=siphon-consumer
    timeout: 120s
  - label: app.kubernetes.io/component=gkg-indexer
    timeout: 120s
  - label: app.kubernetes.io/component=gkg-webserver
    timeout: 120s

# -- Timeouts ------------------------------------------------------------------
timeouts:
  ch_pod: 300s
  gkg_chart: 10m
  dispatch_job: 120s
  indexer_poll: 300          # seconds
  indexer_poll_interval: 10  # seconds
  indexer_settle: 30         # seconds
