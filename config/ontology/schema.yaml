# yaml-language-server: $schema=ontology.schema.json
type: main
schema_version: 0.1
description: >
  User and AI facing GitLab Knowledge Graph schema (nouns = nodes, verbs = edges).
  Notes:
  - This schema is a property graph representation of the GitLab and Code Graph entities.
  - This schema is not intended to be a 1:1 mapping of GitLab database tables.
  - This schema is intended to exposed to the LLM for understanding the Knowledge Graph
  data model (ontology) and to help generate queries via the Knowledge Graph DSL (LLM Cypher JSON).

settings:
  table_prefix: "gl_"
  default_edge_table: gl_edge
  default_entity_sort_key: [traversal_path, id]
  edge_tables:
    gl_edge:
      sort_key: [traversal_path, relationship_kind, source_id, target_id, source_kind, target_kind]
      columns:
        - {name: traversal_path, type: string}
        - {name: relationship_kind, type: string}
        - {name: source_id, type: int64}
        - {name: source_kind, type: string}
        - {name: target_id, type: int64}
        - {name: target_kind, type: string}
      storage:
        index_granularity: 1024
        primary_key: [traversal_path, relationship_kind, source_id]
        settings:
          auto_statistics_types: "'minmax, uniq, countmin'"
        columns:
          - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
          - {name: source_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
          - {name: source_kind, type: "LowCardinality(String)", codec: ["LZ4"]}
          - {name: relationship_kind, type: "LowCardinality(String)", codec: ["LZ4"]}
          - {name: target_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
          - {name: target_kind, type: "LowCardinality(String)", codec: ["LZ4"]}
        indexes:
          - {name: idx_source_id, column: source_id, type: "bloom_filter(0.0001)", granularity: 1}
          - {name: idx_target_id, column: target_id, type: "bloom_filter(0.0001)", granularity: 1}
    gl_code_edge:
      sort_key: [traversal_path, relationship_kind, project_id, branch, source_id, target_id, source_kind, target_kind]
      columns:
        - {name: traversal_path, type: string}
        - {name: relationship_kind, type: string}
        - {name: project_id, type: int64}
        - {name: branch, type: string}
        - {name: source_id, type: int64}
        - {name: source_kind, type: string}
        - {name: target_id, type: int64}
        - {name: target_kind, type: string}
      storage:
        index_granularity: 1024
        primary_key: [traversal_path, relationship_kind, project_id, branch]
        settings:
          auto_statistics_types: "'minmax, uniq, countmin'"
        columns:
          - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
          - {name: project_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
          - {name: branch, type: "String", codec: ["ZSTD(1)"]}
          - {name: source_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
          - {name: source_kind, type: "LowCardinality(String)", codec: ["LZ4"]}
          - {name: relationship_kind, type: "LowCardinality(String)", codec: ["LZ4"]}
          - {name: target_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
          - {name: target_kind, type: "LowCardinality(String)", codec: ["LZ4"]}
        indexes:
          - {name: idx_source_id, column: source_id, type: "bloom_filter(0.0001)", granularity: 1}
          - {name: idx_target_id, column: target_id, type: "bloom_filter(0.0001)", granularity: 1}
          - {name: idx_project_id, column: project_id, type: "bloom_filter(0.0001)", granularity: 1}
          - {name: idx_branch, column: branch, type: "bloom_filter(0.0001)", granularity: 1}
    gl_ci_edge:
      sort_key: [traversal_path, relationship_kind, source_id, target_id, source_kind, target_kind]
      columns:
        - {name: traversal_path, type: string}
        - {name: relationship_kind, type: string}
        - {name: source_id, type: int64}
        - {name: source_kind, type: string}
        - {name: target_id, type: int64}
        - {name: target_kind, type: string}
      storage:
        index_granularity: 1024
        primary_key: [traversal_path, relationship_kind, source_id]
        settings:
          auto_statistics_types: "'minmax, uniq, countmin'"
        columns:
          - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
          - {name: source_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
          - {name: source_kind, type: "LowCardinality(String)", codec: ["LZ4"]}
          - {name: relationship_kind, type: "LowCardinality(String)", codec: ["LZ4"]}
          - {name: target_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
          - {name: target_kind, type: "LowCardinality(String)", codec: ["LZ4"]}
        indexes:
          - {name: idx_source_id, column: source_id, type: "bloom_filter(0.0001)", granularity: 1}
          - {name: idx_target_id, column: target_id, type: "bloom_filter(0.0001)", granularity: 1}
  denormalization:
    # --- Branch ---
    - {node: Branch, property: is_default}
    # --- Definition ---
    - {node: Definition, property: definition_type}
    # --- Deployment ---
    - {node: Deployment, property: status}
    - {node: Deployment, property: tag}
    - {node: Deployment, property: archived}
    # --- Environment ---
    - {node: Environment, property: state}
    - {node: Environment, property: tier}
    - {node: Environment, property: auto_stop_setting}
    # --- File ---
    - {node: File, property: extension}
    - {node: File, property: language}
    # --- Finding ---
    - {node: Finding, property: severity}
    - {node: Finding, property: deduplicated}
    # --- Group ---
    - {node: Group, property: visibility_level}
    # --- ImportedSymbol ---
    - {node: ImportedSymbol, property: import_type}
    # --- Job ---
    - {node: Job, property: status}
    - {node: Job, property: tag}
    - {node: Job, property: allow_failure}
    - {node: Job, property: when}
    - {node: Job, property: retried}
    - {node: Job, property: failure_reason}
    - {node: Job, property: type}
    - {node: Job, property: timeout_source}
    - {node: Job, property: scheduling_type}
    # --- MergeRequest ---
    - {node: MergeRequest, property: state}
    - {node: MergeRequest, property: merge_status}
    - {node: MergeRequest, property: draft}
    - {node: MergeRequest, property: squash}
    - {node: MergeRequest, property: discussion_locked}
    - {node: MergeRequest, property: first_contribution}
    # --- MergeRequestDiff ---
    - {node: MergeRequestDiff, property: diff_type}
    - {node: MergeRequestDiff, property: stored_externally}
    - {node: MergeRequestDiff, property: state}
    # --- MergeRequestDiffFile ---
    - {node: MergeRequestDiffFile, property: too_large}
    - {node: MergeRequestDiffFile, property: new_file}
    - {node: MergeRequestDiffFile, property: renamed_file}
    - {node: MergeRequestDiffFile, property: deleted_file}
    - {node: MergeRequestDiffFile, property: binary}
    - {node: MergeRequestDiffFile, property: generated}
    # --- Milestone ---
    - {node: Milestone, property: state}
    # --- Note ---
    - {node: Note, property: noteable_type}
    - {node: Note, property: internal}
    - {node: Note, property: confidential}
    # --- Pipeline ---
    - {node: Pipeline, property: status}
    - {node: Pipeline, property: source}
    - {node: Pipeline, property: tag}
    - {node: Pipeline, property: failure_reason}
    - {node: Pipeline, property: protected}
    # --- Project ---
    - {node: Project, property: visibility_level}
    - {node: Project, property: archived}
    # --- Runner ---
    - {node: Runner, property: runner_type}
    - {node: Runner, property: active}
    - {node: Runner, property: locked}
    - {node: Runner, property: run_untagged}
    - {node: Runner, property: access_level}
    # --- SecurityScan ---
    - {node: SecurityScan, property: scan_type}
    - {node: SecurityScan, property: status}
    - {node: SecurityScan, property: latest}
    # --- Stage ---
    - {node: Stage, property: status}
    # --- User ---
    - {node: User, property: state}
    - {node: User, property: private_profile}
    - {node: User, property: is_admin}
    - {node: User, property: is_auditor}
    - {node: User, property: is_external}
    - {node: User, property: user_type}
    # --- Vulnerability ---
    - {node: Vulnerability, property: state}
    - {node: Vulnerability, property: severity}
    - {node: Vulnerability, property: report_type}
    - {node: Vulnerability, property: resolved_on_default_branch}
    - {node: Vulnerability, property: present_on_default_branch}
    # --- VulnerabilityOccurrence ---
    - {node: VulnerabilityOccurrence, property: severity}
    - {node: VulnerabilityOccurrence, property: report_type}
    - {node: VulnerabilityOccurrence, property: detection_method}
    # --- VulnerabilityScanner ---
    - {node: VulnerabilityScanner, property: vendor}
    # --- WorkItem ---
    - {node: WorkItem, property: state}
    - {node: WorkItem, property: work_item_type, as: wi_type}
    - {node: WorkItem, property: confidential}
  statistics:
    stats_table: gkg_column_stats
    histogram_table: gkg_histogram_stats
    token_table: gkg_token_stats
    dictionary: gkg_column_stats_dict
    lifetime: {min: 120, max: 300}
    histogram_buckets: 16
    top_k_tokens: 100
    # Stats are partitioned by this column for namespace-level granularity.
    # Entities without this column (User, Runner) use an empty partition
    # key for global stats. Total row count per entity comes from the
    # histogram table's id column.
    partition_key: traversal_path
    # All filterable properties on all entities are auto-tracked.
    # Categorization is derived from property types:
    #   boolean / enum / selectivity:low  →  stats_table  (value frequencies)
    #   string                            →  token_table  (token frequencies)
    #   int64 / timestamp / date / float  →  histogram_table (equi-depth buckets)
    #   uuid                              →  skipped (selectivity = 1/row_count)
    #   filterable: false / virtual        →  skipped
    # Use exclude to skip noisy or irrelevant columns.
    exclude:
      - {node: Note, columns: [st_diff]}
  internal_column_prefix: "_gkg_"
  skip_security_filter_for_entities: [User, Runner]
  local_db:
    entities:
      - name: Directory
        exclude_properties: []
      - name: File
        exclude_properties: []
      - name: Definition
        exclude_properties: []
      - name: ImportedSymbol
        exclude_properties: []
    edge_table:
      name: gl_edge
      columns:
        - {name: source_id, type: int64}
        - {name: source_kind, type: string}
        - {name: relationship_kind, type: string}
        - {name: target_id, type: int64}
        - {name: target_kind, type: string}
        - {name: traversal_path, type: string}
  auxiliary_tables:
    - name: checkpoint
      columns:
        - {name: key, type: string, codec: ["zstd(1)"]}
        - {name: watermark, type: timestamp, codec: ["delta(8)", "zstd(1)"]}
        - {name: cursor_values, type: string, default: "''", codec: ["zstd(1)"]}
      order_by: [key]
    - name: namespace_deletion_schedule
      columns:
        - {name: namespace_id, type: int64, codec: ["zstd(1)"]}
        - {name: traversal_path, type: string, codec: ["zstd(1)"]}
        - {name: scheduled_deletion_date, type: timestamp, codec: ["delta(8)", "zstd(1)"]}
      order_by: [namespace_id, traversal_path]
    - name: code_indexing_checkpoint
      columns:
        - {name: traversal_path, type: string, codec: ["zstd(1)"]}
        - {name: project_id, type: int64, codec: ["zstd(1)"]}
        - {name: branch, type: string, codec: ["zstd(1)"]}
        - {name: last_task_id, type: int64, codec: ["zstd(1)"]}
        - {name: last_commit, type: string, default: "''", codec: ["zstd(1)"]}
        - {name: indexed_at, type: timestamp, codec: ["delta(8)", "zstd(1)"]}
      order_by: [traversal_path, project_id, branch]
      version_type: uint64
  auxiliary_dictionaries:
    - name: gl_project_traversal_paths_dict
      source_table: gl_project
      key: id
      key_type: int64
      attributes:
        - {name: traversal_path, type: string}
      layout: {kind: hashed}
      lifetime: {min: 60, max: 300}
    - name: gl_group_traversal_paths_dict
      source_table: gl_group
      key: id
      key_type: int64
      attributes:
        - {name: traversal_path, type: string}
      layout: {kind: hashed}
      lifetime: {min: 60, max: 300}
  gc_preserve_patterns: []
  etl:
    default_watermark: _siphon_watermark
    default_deleted: _siphon_deleted
    default_etl_order_by: [traversal_path, id]

domains:
  core:
    description: "Entities which represent the structure of a GitLab instance."
    nodes:
      User: nodes/core/user.yaml
      Group: nodes/core/group.yaml
      Project: nodes/core/project.yaml
      Note: nodes/core/note.yaml
    derived:
      SystemNote: derived/core/system_note.yaml
  code_review:
    description: "Entities related to code review and merge requests."
    nodes:
      MergeRequest: nodes/code_review/merge_request.yaml
      MergeRequestDiff: nodes/code_review/merge_request_diff.yaml
      MergeRequestDiffFile: nodes/code_review/merge_request_diff_file.yaml
  ci:
    description: "Entities related to CI/CD pipelines, stages, jobs, deployments, environments, and runners."
    nodes:
      Pipeline: nodes/ci/pipeline.yaml
      Stage: nodes/ci/stage.yaml
      Job: nodes/ci/job.yaml
      Deployment: nodes/ci/deployment.yaml
      Environment: nodes/ci/environment.yaml
      Runner: nodes/ci/runner.yaml
  security:
    description: "Entities related to security vulnerabilities and findings."
    nodes:
      Vulnerability: nodes/security/vulnerability.yaml
      VulnerabilityOccurrence: nodes/security/occurrence.yaml
      Finding: nodes/security/finding.yaml
      VulnerabilityScanner: nodes/security/scanner.yaml
      VulnerabilityIdentifier: nodes/security/identifier.yaml
      SecurityScan: nodes/security/security_scan.yaml
  plan:
    description: "Entities related to planning, tracking, and organizing work."
    nodes:
      WorkItem: nodes/plan/work_item.yaml
      Milestone: nodes/plan/milestone.yaml
      Label: nodes/plan/label.yaml
  source_code:
    description: "Entities related to source code structure, definitions, and imports."
    nodes:
      Branch: nodes/source_code/branch.yaml
      Directory: nodes/source_code/directory.yaml
      File: nodes/source_code/file.yaml
      Definition: nodes/source_code/definition.yaml
      ImportedSymbol: nodes/source_code/imported_symbol.yaml
  packages:
    description: "Entities related to packages published to the package registry."
    nodes:
      Package: nodes/packages/package.yaml
  container_registry:
    description: "Entities related to container image repositories in the container registry."
    nodes:
      ContainerRepository: nodes/container_registry/container_repository.yaml
