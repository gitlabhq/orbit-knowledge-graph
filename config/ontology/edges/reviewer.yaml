# config/ontology/edges/reviewer.yaml

description: Review assignment relationship between users and merge requests

variants:
  - from_node: { type: User, id: id }
    to_node: { type: MergeRequest, id: id }
    scope: prune_to_target
    description: "User is a reviewer of merge request."

indexer:
  reindex: use_source_tables
pipelines:
  - name: REVIEWER_siphon_merge_request_reviewers_MergeRequest
    extract:
      type: clickhouse
      tables: [siphon_merge_request_reviewers, siphon_users, merge_requests]
      order_by: [traversal_path, merge_request_id, id]
      query: generated
    transform:
      type: datafusion
      edges:
        - from:
            field: user_id
            kind: User
            enrich: [state, private_profile, admin, auditor, external, user_type]
          to:
            field: merge_request_id
            kind: MergeRequest
            enrich: [state_id, merge_status, draft, squash, discussion_locked]
          label: REVIEWER
