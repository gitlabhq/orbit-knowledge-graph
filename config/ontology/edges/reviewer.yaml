# config/ontology/edges/reviewer.yaml

description: Review assignment relationship between users and merge requests

variants:
  - from_node: { type: User, id: id }
    to_node: { type: MergeRequest, id: id }
    scope: prune_to_target
    description: "User is a reviewer of merge request."

indexer:
  reindex: [siphon_merge_request_reviewers]
pipelines:
  - name: REVIEWER_siphon_merge_request_reviewers_MergeRequest
    extract:
      type: clickhouse
      tables: [siphon_merge_request_reviewers]
      fields: [user_id, merge_request_id]
      order_by: [traversal_path, merge_request_id, id]
      query: generated
      lookups:
        - { node: User, id: user_id }
        - { node: MergeRequest, id: merge_request_id }
    transform:
      type: datafusion
      edges:
        - from: { field: user_id, kind: User, enrich: true }
          to: { field: merge_request_id, kind: MergeRequest, enrich: true }
          label: REVIEWER
