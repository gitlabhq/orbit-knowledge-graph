# config/ontology/edges/auto_canceled_by.yaml

description: Entity was auto-canceled by a newer pipeline
table: gl_ci_edge

variants:
  - from_node: { type: Pipeline, id: id }
    to_node: { type: Pipeline, id: id }
    fk_column: auto_canceled_by_id
    scope: same_namespace
    description: "Pipeline was auto-canceled by a newer pipeline."

  - from_node: { type: Job, id: id }
    to_node: { type: Pipeline, id: id }
    fk_column: auto_canceled_by_id
    scope: same_namespace
    description: "Job was auto-canceled by the pipeline that superseded its own."
