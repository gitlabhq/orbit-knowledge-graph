# The `fk_column: closed_by_id` ETL below materializes the *last* closer.
# The system-notes handler (ADR 013,
# crates/indexer/src/modules/sdlc/handler/system_notes/) is an additional
# emitter of this edge kind from `system_note_metadata.action = 'closed'`,
# which captures *every* historical closer as a distinct edge. The two
# sources stamp `_version` differently (entity update time vs note
# created_at); the duplicated last-closer edge collapses under
# ReplacingMergeTree and the mixed provenance is expected — see ADR 013.
description: User who closed a work item

variants:
  - from_node: { type: User, id: id }
    to_node: { type: WorkItem, id: id }
    fk_column: closed_by_id
    description: "User closed a work item."

  - from_node: { type: User, id: id }
    to_node: { type: MergeRequest, id: id }
    fk_column: closed_by_id
    description: "User closed a merge request."
