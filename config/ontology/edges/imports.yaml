# config/ontology/edges/imports.yaml

description: Import relationships in source code
table: gl_code_edge

variants:
  - from_node: { type: File, id: id }
    to_node: { type: ImportedSymbol, id: id }
    description: "File contains an import statement."

  - from_node: { type: ImportedSymbol, id: id }
    to_node: { type: Definition, id: id }
    description: "Imported symbol resolves to a concrete definition (e.g. JS/TS module-system resolution to the imported export)."
