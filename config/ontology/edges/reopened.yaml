# config/ontology/edges/reopened.yaml

description: User who reopened a work item or merge request

variants:
  - from_node: { type: User, id: id }
    to_node: { type: WorkItem, id: id }
    description: "User reopened a work item."

  - from_node: { type: User, id: id }
    to_node: { type: MergeRequest, id: id }
    description: "User reopened a merge request."

etl:
  - scope: namespaced
    source: siphon_system_note_reopened
    order_by: [traversal_path, noteable_id, id]
    from:
      id: author_id
      type: User
    to:
      id: noteable_id
      type_column: noteable_type
      type_mapping:
        Issue: WorkItem
        Epic: WorkItem
        MergeRequest: MergeRequest
