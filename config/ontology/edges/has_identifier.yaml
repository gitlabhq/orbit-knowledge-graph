# config/ontology/edges/has_identifier.yaml

description: Entity has associated vulnerability identifier (CVE, CWE, etc.)
table: gl_sec_edge

variants:
  - from_node: { type: Finding, id: id }
    to_node: { type: VulnerabilityIdentifier, id: id }
    description: "Finding has identifier."

  - from_node: { type: VulnerabilityOccurrence, id: id }
    to_node: { type: VulnerabilityIdentifier, id: id }
    fk_column: primary_identifier_id
    description: "Vulnerability occurrence has primary identifier."

indexer:
  reindex: [siphon_vulnerability_occurrence_identifiers]
pipelines:
  - name: HAS_IDENTIFIER_siphon_vulnerability_occurrence_identifiers_VulnerabilityIdentifier
    extract:
      type: clickhouse
      tables: [siphon_vulnerability_occurrence_identifiers]
      fields: [occurrence_id, identifier_id]
      order_by: [traversal_path, id]
      query: generated
      lookups:
        - { node: VulnerabilityOccurrence, id: occurrence_id }
    transform:
      type: datafusion
      edges:
        - from: { field: occurrence_id, kind: VulnerabilityOccurrence, enrich: true }
          to: { field: identifier_id, kind: VulnerabilityIdentifier }
          label: HAS_IDENTIFIER
