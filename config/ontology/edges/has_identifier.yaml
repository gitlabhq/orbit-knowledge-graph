# config/ontology/edges/has_identifier.yaml

description: Entity has associated vulnerability identifier (CVE, CWE, etc.)

variants:
  - from_node: { type: Finding, id: id }
    to_node: { type: VulnerabilityIdentifier, id: id }
    description: "Finding has identifier."

  - from_node: { type: VulnerabilityOccurrence, id: id }
    to_node: { type: VulnerabilityIdentifier, id: id }
    description: "Vulnerability occurrence has identifier."

etl:
  - scope: namespaced
    source: siphon_vulnerability_occurrence_identifiers
    order_by: [traversal_path, id]
    from:
      id: occurrence_id
      type: VulnerabilityOccurrence
    to:
      id: identifier_id
      type: VulnerabilityIdentifier
