# config/ontology/edges/has_label.yaml

description: Entity has a label applied

variants:
  - from_node: { type: WorkItem, id: id }
    to_node: { type: Label, id: id }
    scope: prune_to_source
    description: "Work item has label."

  - from_node: { type: MergeRequest, id: id }
    to_node: { type: Label, id: id }
    scope: prune_to_source
    description: "Merge request has label."

indexer:
  reindex: use_source_tables
pipelines:
  - name: HAS_LABEL_siphon_label_links_Label
    extract:
      type: clickhouse
      tables: [siphon_label_links]
      order_by: [traversal_path, target_id, id]
      query: generated
    transform:
      type: datafusion
      edges:
        - from:
            field: target_id
            kind:
              derive: target_type
              mapping:
                Issue: WorkItem
          to:
            field: label_id
            kind: Label
          label: HAS_LABEL
