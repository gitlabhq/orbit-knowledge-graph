# config/ontology/edges/blocks.yaml

description: Blocking relationship between work items (directional)

variants:
  - from_node: { type: WorkItem, id: id }
    to_node: { type: WorkItem, id: id }
    description: "Work item blocks another work item."

etl:
  scope: namespaced
  source: siphon_issue_links
  order_by: [traversal_path, source_id, id]
  filter: "link_type = 1"
  from:
    id: source_id
    type: WorkItem
  to:
    id: target_id
    type: WorkItem
