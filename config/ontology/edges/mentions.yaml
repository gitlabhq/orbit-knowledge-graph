description: >-
  One merge request or work item references another in its description or a
  comment, recorded from the cross-reference system note GitLab writes on mention.

variants:
  - from_node: { type: MergeRequest, id: id }
    to_node: { type: MergeRequest, id: id }
    description: "MergeRequest mentions another MergeRequest."

  - from_node: { type: MergeRequest, id: id }
    to_node: { type: WorkItem, id: id }
    description: "MergeRequest mentions a work item."

  - from_node: { type: WorkItem, id: id }
    to_node: { type: MergeRequest, id: id }
    description: "Work item mentions a MergeRequest."

  - from_node: { type: WorkItem, id: id }
    to_node: { type: WorkItem, id: id }
    description: "Work item mentions another work item."
