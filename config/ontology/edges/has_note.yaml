# config/ontology/edges/has_note.yaml

description: Entity has a note/comment attached

variants:
  - from_node: { type: MergeRequest, id: id }
    to_node: { type: Note, id: id }
    description: "Merge request has note."

  - from_node: { type: WorkItem, id: id }
    to_node: { type: Note, id: id }
    description: "Work item has note."

  - from_node: { type: Vulnerability, id: id }
    to_node: { type: Note, id: id }
    description: "Vulnerability has note."

sources:
  # Rails stores the polymorphic base class in `noteable_type` via
  # `Note#noteable_type=` -> `klass.base_class.to_s`. WorkItem subclasses of
  # Issue (Task, Incident, Ticket, Objective, KeyResult, TestCase, Requirement)
  # all collapse to `Issue`. Legacy Epic notes created via
  # `Groups::Epics::NotesController` still arrive as `Epic` until the unified
  # work-item model fully replaces the legacy record.
  - node: Note
    from:
      type_column: noteable_type
      type_mapping:
        Issue: WorkItem
        Epic: WorkItem
      id: noteable_id
    to: {type: Note, id: id}
