# config/ontology/edges/member_of.yaml

description: A user is a member of a group or project

properties:
  access_level:
    type: enum
    source: access_level
    nullable: false
    description: "User's access level in the group or project."
    values:
      0: no_access
      5: minimal_access
      10: guest
      15: planner
      20: reporter
      25: security_manager
      30: developer
      40: maintainer
      50: owner

  expires_at:
    type: date
    source: expires_at
    nullable: true
    description: "Membership expiration date, if any."

  state:
    type: enum
    source: state
    nullable: true
    description: "Membership state."
    values:
      0: active
      1: awaiting

variants:
  - from_node: { type: User, id: id }
    to_node: { type: Group, id: id }
    scope: prune_to_target
    description: "User is a member of group."

  - from_node: { type: User, id: id }
    to_node: { type: Project, id: id }
    scope: prune_to_target
    description: "User has access to project (via direct membership or group inheritance)."

indexer:
  reindex: [siphon_members]
pipelines:
  - name: MEMBER_OF_siphon_members
    extract:
      type: clickhouse
      tables: [siphon_members]
      fields: [user_id, source_id, source_type]
      order_by: [traversal_path, id]
      query: generated
      lookups:
        - { node: User, id: user_id }
    transform:
      type: datafusion
      edges:
        - from: { field: user_id, kind: User, enrich: true }
          to:
            field: source_id
            kind:
              derive: source_type
              mapping:
                Namespace: Group
                Project: Project
          label: MEMBER_OF
