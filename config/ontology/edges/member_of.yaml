# config/ontology/edges/member_of.yaml

description: A user is a member of a group or project

properties:
  access_level:
    type: enum
    source: access_level
    nullable: false
    description: "User's access level in the group or project."
    values:
      0: no_access
      5: minimal_access
      10: guest
      15: planner
      20: reporter
      25: security_manager
      30: developer
      40: maintainer
      50: owner

  expires_at:
    type: date
    source: expires_at
    nullable: true
    description: "Membership expiration date, if any."

  state:
    type: enum
    source: state
    nullable: true
    description: "Membership state."
    values:
      0: active
      1: awaiting

variants:
  - from_node: { type: User, id: id }
    to_node: { type: Group, id: id }
    description: "User is a member of group."

  - from_node: { type: User, id: id }
    to_node: { type: Project, id: id }
    description: "User has access to project (via direct membership or group inheritance)."

etl:
  - scope: namespaced
    source: siphon_members
    order_by: [traversal_path, id]
    from:
      id: user_id
      type: User
      enrich: [state, private_profile, admin, auditor, external, user_type]
    to:
      id: source_id
      type_column: source_type
      type_mapping:
        Namespace: Group
        Project: Project
      enrich: [visibility_level, archived]
