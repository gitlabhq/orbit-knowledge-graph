# config/ontology/edges/declares_dependency.yaml

description: Package declares a dependency

variants:
  - from_node: { type: Package, id: id }
    to_node: { type: Dependency, id: id }
    scope: same_namespace
    description: "Package declares a dependency."

indexer:
  reindex: [siphon_packages_dependency_links]
pipelines:
  - name: DECLARES_DEPENDENCY_siphon_packages_dependency_links_Dependency
    extract:
      type: clickhouse
      tables: [siphon_packages_dependency_links]
      order_by: [traversal_path, id]
      query: generated
    transform:
      type: datafusion
      edges:
        - from:
            field: package_id
            kind: Package
          to:
            field: dependency_id
            kind: Dependency
          label: DECLARES_DEPENDENCY
