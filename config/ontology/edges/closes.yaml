# config/ontology/edges/closes.yaml

description: Merge request closes a work item when merged

variants:
  - from_node: { type: MergeRequest, id: id }
    to_node: { type: WorkItem, id: id }
    description: "Merge request closes work item."

indexer:
  reindex: [siphon_merge_requests_closing_issues]
pipelines:
  - name: CLOSES_siphon_merge_requests_closing_issues_WorkItem
    extract:
      type: clickhouse
      tables: [siphon_merge_requests_closing_issues]
      order_by: [traversal_path, issue_id, id]
      query: generated
      lookups:
        - { node: MergeRequest, id: merge_request_id }
        - { node: WorkItem, id: issue_id }
    transform:
      type: datafusion
      edges:
        - from: { field: merge_request_id, kind: MergeRequest, enrich: true }
          to: { field: issue_id, kind: WorkItem, enrich: true }
          label: CLOSES
