# config/ontology/edges/assigned.yaml

description: Assignment relationship between users and entities

variants:
  - from_node: { type: User, id: id }
    to_node: { type: MergeRequest, id: id }
    scope: prune_to_target
    description: "User is assigned to merge request."

  - from_node: { type: User, id: id }
    to_node: { type: WorkItem, id: id }
    scope: prune_to_target
    description: "User is assigned to work item."

sources:
  - table: siphon_merge_request_assignees
    scope: namespaced
    order_by: [traversal_path, merge_request_id, id]
    from:
      id: user_id
      type: User
      enrich: [state, private_profile, admin, auditor, external, user_type]
    to:
      id: merge_request_id
      type: MergeRequest
      enrich: [state_id, merge_status, draft, squash, discussion_locked]
  - table: siphon_issue_assignees
    scope: namespaced
    order_by: [traversal_path, issue_id, user_id]
    from:
      id: user_id
      type: User
      enrich: [state, private_profile, admin, auditor, external, user_type]
    to:
      id: issue_id
      type: WorkItem
      enrich: [state_id, work_item_type_id, confidential]
