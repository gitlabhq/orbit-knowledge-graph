# config/ontology/edges/assigned.yaml

description: Assignment relationship between users and entities

variants:
  - from_node: { type: User, id: id }
    to_node: { type: MergeRequest, id: id }
    scope: prune_to_target
    description: "User is assigned to merge request."

  - from_node: { type: User, id: id }
    to_node: { type: WorkItem, id: id }
    scope: prune_to_target
    description: "User is assigned to work item."

indexer:
  reindex: [siphon_merge_request_assignees, siphon_issue_assignees]
pipelines:
  - name: ASSIGNED_siphon_merge_request_assignees_MergeRequest
    extract:
      type: clickhouse
      tables: [siphon_merge_request_assignees, siphon_users, merge_requests]
      order_by: [traversal_path, merge_request_id, id]
      query: generated
    transform:
      type: datafusion
      edges:
        - from:
            field: user_id
            kind: User
            enrich: [state, private_profile, admin, auditor, external, user_type]
          to:
            field: merge_request_id
            kind: MergeRequest
            enrich: [state_id, merge_status, draft, squash, discussion_locked]
          label: ASSIGNED
  - name: ASSIGNED_siphon_issue_assignees_WorkItem
    extract:
      type: clickhouse
      tables: [siphon_issue_assignees, siphon_users, work_items]
      order_by: [traversal_path, issue_id, user_id]
      query: generated
    transform:
      type: datafusion
      edges:
        - from:
            field: user_id
            kind: User
            enrich: [state, private_profile, admin, auditor, external, user_type]
          to:
            field: issue_id
            kind: WorkItem
            enrich: [state_id, work_item_type_id, confidential]
          label: ASSIGNED
