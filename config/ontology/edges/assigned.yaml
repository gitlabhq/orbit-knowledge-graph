# config/ontology/edges/assigned.yaml

description: Assignment relationship between users and entities

variants:
  - from_node: { type: User, id: id }
    to_node: { type: MergeRequest, id: id }
    scope: prune_to_target
    description: "User is assigned to merge request."

  - from_node: { type: User, id: id }
    to_node: { type: WorkItem, id: id }
    scope: prune_to_target
    description: "User is assigned to work item."

indexer:
  reindex: [siphon_merge_request_assignees, siphon_issue_assignees]
pipelines:
  - name: ASSIGNED_siphon_merge_request_assignees_MergeRequest
    extract:
      type: clickhouse
      tables: [siphon_merge_request_assignees]
      order_by: [traversal_path, merge_request_id, id]
      query: generated
      lookups:
        - { node: User, id: user_id }
        - { node: MergeRequest, id: merge_request_id }
    transform:
      type: datafusion
      edges:
        - from: { field: user_id, kind: User, enrich: true }
          to: { field: merge_request_id, kind: MergeRequest, enrich: true }
          label: ASSIGNED
  - name: ASSIGNED_siphon_issue_assignees_WorkItem
    extract:
      type: clickhouse
      tables: [siphon_issue_assignees]
      order_by: [traversal_path, issue_id, user_id]
      query: generated
      lookups:
        - { node: User, id: user_id }
        - { node: WorkItem, id: issue_id }
    transform:
      type: datafusion
      edges:
        - from: { field: user_id, kind: User, enrich: true }
          to: { field: issue_id, kind: WorkItem, enrich: true }
          label: ASSIGNED
