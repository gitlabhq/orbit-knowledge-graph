# config/ontology/edges/in_group.yaml

description: Entity belongs to a group

variants:
  - from_node: { type: Milestone, id: id }
    to_node: { type: Group, id: id }
    fk_column: group_id
    scope: namespace_anchor
    description: "Milestone belongs to group."

  - from_node: { type: Label, id: id }
    to_node: { type: Group, id: id }
    fk_column: group_id
    scope: namespace_anchor
    description: "Label belongs to group."

  - from_node: { type: WorkItem, id: id }
    to_node: { type: Group, id: id }
    fk_column: namespace_id
    scope: namespace_anchor
    description: "Work item belongs to group."

sources:
  - node: Label
    from: {type: Label, id: id}
    to: {type: Group, id: group_id}
  - node: Milestone
    from: {type: Milestone, id: id}
    to: {type: Group, id: group_id}
  - node: WorkItem
    from: {type: WorkItem, id: id}
    to: {type: Group, id: namespace_id}
