description: User who approved a merge request

variants:
  - from_node: { type: User, id: id }
    to_node: { type: MergeRequest, id: id }
    scope: prune_to_target
    description: "User approved a merge request."

indexer:
  reindex: [siphon_approvals]
pipelines:
  - name: APPROVED_siphon_approvals_MergeRequest
    extract:
      type: clickhouse
      tables: [siphon_approvals, siphon_users, merge_requests]
      order_by: [traversal_path, merge_request_id, id]
      query: generated
    transform:
      type: datafusion
      edges:
        - from:
            field: user_id
            kind: User
            enrich: [state, private_profile, admin, auditor, external, user_type]
          to:
            field: merge_request_id
            kind: MergeRequest
            enrich: [state_id, merge_status, draft, squash, discussion_locked]
          label: APPROVED
