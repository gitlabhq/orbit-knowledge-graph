# config/ontology/edges/built_by.yaml

description: Package or package file was built by a CI/CD pipeline

variants:
  - from_node: { type: Package, id: id }
    to_node: { type: Pipeline, id: id }
    scope: same_namespace
    description: "Package was built by pipeline."

  - from_node: { type: PackageFile, id: id }
    to_node: { type: Pipeline, id: id }
    scope: same_namespace
    description: "Package file was built by pipeline (per-artifact provenance)."

indexer:
  reindex: [siphon_packages_build_infos, siphon_packages_package_file_build_infos]
pipelines:
  - name: BUILT_BY_siphon_packages_build_infos_Pipeline
    extract:
      type: clickhouse
      tables: [siphon_packages_build_infos]
      fields: [package_id, pipeline_id]
      order_by: [traversal_path, id]
      query: generated
    transform:
      type: datafusion
      edges:
        - from:
            field: package_id
            kind: Package
          to:
            field: pipeline_id
            kind: Pipeline
          label: BUILT_BY
  - name: BUILT_BY_siphon_packages_package_file_build_infos_Pipeline
    extract:
      type: clickhouse
      tables: [siphon_packages_package_file_build_infos]
      fields: [package_file_id, pipeline_id]
      order_by: [traversal_path, id]
      query: generated
    transform:
      type: datafusion
      edges:
        - from:
            field: package_file_id
            kind: PackageFile
          to:
            field: pipeline_id
            kind: Pipeline
          label: BUILT_BY
