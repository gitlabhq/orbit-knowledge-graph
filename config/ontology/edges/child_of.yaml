# config/ontology/edges/child_of.yaml

description: Pipeline was triggered as a child of another pipeline (downstream pipeline relationship)

variants:
  - from_node: { type: Pipeline, id: id }
    to_node: { type: Pipeline, id: id }
    description: "Pipeline is a downstream child of the source pipeline."

etl:
  - scope: namespaced
    source: siphon_ci_sources_pipelines
    order_by: [traversal_path, id, partition_id]
    from:
      id: pipeline_id
      type: Pipeline
      columns: [status]  # denorm: pipeline status
    to:
      id: source_pipeline_id
      type: Pipeline
      columns: [status]  # denorm: pipeline status
