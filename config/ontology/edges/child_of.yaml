# config/ontology/edges/child_of.yaml

description: Pipeline was triggered as a child of another pipeline (downstream pipeline relationship)

variants:
  - from_node: { type: Pipeline, id: id }
    to_node: { type: Pipeline, id: id }
    description: "Pipeline is a downstream child of the source pipeline."

indexer:
  reindex: [siphon_ci_sources_pipelines]
pipelines:
  - name: CHILD_OF_siphon_ci_sources_pipelines_Pipeline
    extract:
      type: clickhouse
      tables: [siphon_ci_sources_pipelines]
      order_by: [traversal_path, id, partition_id]
      query: generated
      lookups:
        - { node: Pipeline, id: pipeline_id }
        - { node: Pipeline, id: source_pipeline_id, prefix: source_pipeline_ }
    transform:
      type: datafusion
      edges:
        - from: { field: pipeline_id, kind: Pipeline, enrich: true }
          to: { field: source_pipeline_id, kind: Pipeline, enrich: true, prefix: source_pipeline_ }
          label: CHILD_OF
