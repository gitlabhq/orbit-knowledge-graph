# config/ontology/edges/defines.yaml

description: Definition relationships in source code
table: gl_code_edge

variants:
  - from_node: { type: File, id: id }
    to_node: { type: Definition, id: id }
    description: "File defines a code definition (class, function, etc.)."

  - from_node: { type: Definition, id: id }
    to_node: { type: Definition, id: id }
    description: "Outer definition lexically contains a nested definition (e.g. a class contains its methods, a module contains its classes). Inheritance is modeled as EXTENDS and call sites as CALLS."
