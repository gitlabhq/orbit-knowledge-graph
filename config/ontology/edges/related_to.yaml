# config/ontology/edges/related_to.yaml

description: Related or blocking relationship between work items

properties:
  link_type:
    type: enum
    source: link_type
    nullable: false
    description: "Type of relationship between work items."
    values:
      0: relates_to
      1: blocks

variants:
  - from_node: { type: WorkItem, id: id }
    to_node: { type: WorkItem, id: id }
    description: "Work item is related to another work item."

indexer:
  reindex: [siphon_issue_links]
pipelines:
  - name: RELATED_TO_siphon_issue_links_WorkItem
    extract:
      type: clickhouse
      tables: [siphon_issue_links]
      order_by: [traversal_path, source_id, id]
      query: generated
      lookups:
        - { node: WorkItem, id: source_id, prefix: source_ }
        - { node: WorkItem, id: target_id, prefix: target_ }
    transform:
      type: datafusion
      edges:
        - from: { field: source_id, kind: WorkItem, enrich: true, prefix: source_ }
          to: { field: target_id, kind: WorkItem, enrich: true, prefix: target_ }
          label: RELATED_TO
