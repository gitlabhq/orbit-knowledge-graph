# config/ontology/edges/related_to.yaml

description: Related or blocking relationship between work items

properties:
  link_type:
    type: enum
    source: link_type
    nullable: false
    description: "Type of relationship between work items."
    values:
      0: relates_to
      1: blocks

variants:
  - from_node: { type: WorkItem, id: id }
    to_node: { type: WorkItem, id: id }
    description: "Work item is related to another work item."

etl:
  - scope: namespaced
    source: siphon_issue_links
    order_by: [traversal_path, source_id, id]
    from:
      id: source_id
      type: WorkItem
      enrich: [state_id, work_item_type_id]  # denorm: WorkItem state + type
    to:
      id: target_id
      type: WorkItem
      enrich: [state_id, work_item_type_id]  # denorm: WorkItem state + type
