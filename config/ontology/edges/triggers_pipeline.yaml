# config/ontology/edges/triggers_pipeline.yaml

description: Bridge job triggered a downstream pipeline
table: gl_ci_edge

variants:
  - from_node: { type: Job, id: id }
    to_node: { type: Pipeline, id: id }
    description: "Bridge job (type='Ci::Bridge') triggered the downstream pipeline."

indexer:
  reindex: [siphon_ci_sources_pipelines]
pipelines:
  - name: TRIGGERS_PIPELINE_siphon_ci_sources_pipelines_Pipeline
    extract:
      type: clickhouse
      tables: [siphon_ci_sources_pipelines]
      fields: [source_job_id, pipeline_id]
      order_by: [traversal_path, id, partition_id]
      query: generated
      lookups:
        - { node: Job, id: source_job_id }
        - { node: Pipeline, id: pipeline_id }
    transform:
      type: datafusion
      edges:
        - from: { field: source_job_id, kind: Job, enrich: true }
          to: { field: pipeline_id, kind: Pipeline, enrich: true }
          label: TRIGGERS_PIPELINE
