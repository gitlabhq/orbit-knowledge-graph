# config/ontology/edges/runs_for_project.yaml

description: Runner is registered against a project
table: gl_ci_edge

variants:
  - from_node: { type: Runner, id: id }
    to_node: { type: Project, id: id }
    description: "Runner serves jobs for this project."

etl:
  - scope: namespaced
    source: siphon_ci_runner_projects
    order_by: [traversal_path, id]
    from:
      id: runner_id
      type: Runner
      enrich: [runner_type, active, locked, run_untagged, access_level]
    to:
      id: project_id
      type: Project
