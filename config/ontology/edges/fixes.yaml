# config/ontology/edges/fixes.yaml

description: Merge request fixes a vulnerability

variants:
  - from_node: { type: MergeRequest, id: id }
    to_node: { type: Vulnerability, id: id }
    description: "Merge request fixes vulnerability."

indexer:
  reindex: [siphon_vulnerability_merge_request_links]
pipelines:
  - name: FIXES_siphon_vulnerability_merge_request_links_Vulnerability
    extract:
      type: clickhouse
      tables: [siphon_vulnerability_merge_request_links]
      fields: [merge_request_id, vulnerability_id]
      order_by: [traversal_path, id]
      query: generated
      lookups:
        - { node: MergeRequest, id: merge_request_id }
        - { node: Vulnerability, id: vulnerability_id }
    transform:
      type: datafusion
      edges:
        - from: { field: merge_request_id, kind: MergeRequest, enrich: true }
          to: { field: vulnerability_id, kind: Vulnerability, enrich: true }
          label: FIXES
