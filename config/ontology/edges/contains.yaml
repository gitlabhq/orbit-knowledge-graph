# config/ontology/edges/contains.yaml

description: Container relationship for core entities (hierarchy/ownership)

variants:
  - from_node: { type: Group, id: id }
    to_node: { type: Group, id: id }
    scope: same_namespace
    description: "Group contains subgroup."

  - from_node: { type: Group, id: id }
    to_node: { type: Project, id: id }
    scope: same_namespace
    description: "Group contains project."

  - from_node: { type: User, id: id }
    to_node: { type: Project, id: id }
    description: "User namespace contains project."

  - from_node: { type: Project, id: id }
    to_node: { type: Branch, id: id }
    scope: same_namespace
    description: "Project contains branch."

  - from_node: { type: WorkItem, id: id }
    to_node: { type: WorkItem, id: id }
    description: "Work item contains child work item (e.g., epic contains issue, epic contains epic, etc.)."

  - from_node: { type: Branch, id: id }
    to_node: { type: Directory, id: id }
    scope: same_namespace
    description: "Branch contains root directory."

  - from_node: { type: Directory, id: id }
    to_node: { type: Directory, id: id }
    scope: same_namespace
    description: "Directory contains subdirectory."

  - from_node: { type: Directory, id: id }
    to_node: { type: File, id: id }
    scope: same_namespace
    description: "Directory contains file."

  - from_node: { type: ExternalBranch, id: id }
    to_node: { type: ExternalDirectory, id: id }
    scope: same_namespace
    description: "External branch contains root directory."

  - from_node: { type: ExternalDirectory, id: id }
    to_node: { type: ExternalDirectory, id: id }
    scope: same_namespace
    description: "External directory contains subdirectory."

  - from_node: { type: ExternalDirectory, id: id }
    to_node: { type: ExternalFile, id: id }
    scope: same_namespace
    description: "External directory contains file."

indexer:
  reindex: [siphon_work_item_parent_links]
pipelines:
  - name: CONTAINS_siphon_work_item_parent_links_WorkItem
    extract:
      type: clickhouse
      tables: [siphon_work_item_parent_links]
      fields: [work_item_parent_id, work_item_id]
      order_by: [traversal_path, work_item_parent_id, id]
      query: generated
      lookups:
        - { node: WorkItem, id: work_item_parent_id }
        - { node: WorkItem, id: work_item_id }
    transform:
      type: datafusion
      edges:
        - from: { field: work_item_parent_id, kind: WorkItem, enrich: true }
          to: { field: work_item_id, kind: WorkItem, enrich: true }
          label: CONTAINS
