# config/ontology/edges/on_branch.yaml

description: Code entities belong to a specific branch
table: gl_code_edge

variants:
  - from_node: { type: Directory, id: id }
    to_node: { type: Branch, id: id }
    description: "Directory exists on branch."

  - from_node: { type: File, id: id }
    to_node: { type: Branch, id: id }
    description: "File exists on branch."
