# config/ontology/edges/occurrence.yaml

description: Vulnerability occurrence is an occurrence of a vulnerability
table: gl_sec_edge

variants:
  - from_node: { type: VulnerabilityOccurrence, id: id }
    to_node: { type: Vulnerability, id: id }
    fk_column: vulnerability_id
    scope: same_namespace
    description: "Occurrence is linked to a vulnerability."
