# config/ontology/edges/extends.yaml

description: Supertype relationships in source code (inheritance, interface implementation, struct embedding, mixin composition)
table: gl_code_edge

variants:
  - from_node: { type: Definition, id: id }
    to_node: { type: Definition, id: id }
    description: "Definition declares a supertype relationship to another definition. Covers class extension, interface implementation, struct embedding, and Ruby mixin composition via include/extend/prepend (including GitLab's prepend_mod_with macro family, which resolves to EE::<Name>)."
