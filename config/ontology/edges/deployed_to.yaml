# config/ontology/edges/deployed_to.yaml

description: Merge request was deployed as part of a deployment
table: gl_ci_edge

variants:
  - from_node: { type: MergeRequest, id: id }
    to_node: { type: Deployment, id: id }
    description: "Merge request was included in deployment."

indexer:
  reindex: use_source_tables
pipelines:
  - name: DEPLOYED_TO_siphon_deployment_merge_requests_Deployment
    extract:
      type: clickhouse
      tables: [siphon_deployment_merge_requests, merge_requests, siphon_deployments]
      order_by: [traversal_path, deployment_id, merge_request_id]
      query: generated
    transform:
      type: datafusion
      edges:
        - from:
            field: merge_request_id
            kind: MergeRequest
            enrich: [state_id, merge_status, draft, squash, discussion_locked]
          to:
            field: deployment_id
            kind: Deployment
            enrich: [status, tag, archived]
          label: DEPLOYED_TO
