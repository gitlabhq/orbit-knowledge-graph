# config/ontology/edges/deployed_to.yaml

description: Merge request was deployed as part of a deployment
table: gl_ci_edge

variants:
  - from_node: { type: MergeRequest, id: id }
    to_node: { type: Deployment, id: id }
    description: "Merge request was included in deployment."

indexer:
  reindex: [siphon_deployment_merge_requests]
pipelines:
  - name: DEPLOYED_TO_siphon_deployment_merge_requests_Deployment
    extract:
      type: clickhouse
      tables: [siphon_deployment_merge_requests]
      order_by: [traversal_path, deployment_id, merge_request_id]
      query: generated
      lookups:
        - { node: MergeRequest, id: merge_request_id }
        - { node: Deployment, id: deployment_id }
    transform:
      type: datafusion
      edges:
        - from: { field: merge_request_id, kind: MergeRequest, enrich: true }
          to: { field: deployment_id, kind: Deployment, enrich: true }
          label: DEPLOYED_TO
