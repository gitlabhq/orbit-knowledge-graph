# config/ontology/edges/authored.yaml

description: Authorship relationship between users and entities

variants:
  - from_node: { type: User, id: id }
    to_node: { type: Note, id: id }
    fk_column: author_id
    scope: prune_to_target
    description: "User authored note."

  - from_node: { type: User, id: id }
    to_node: { type: MergeRequest, id: id }
    fk_column: author_id
    scope: prune_to_target
    description: "User authored merge request."

  - from_node: { type: User, id: id }
    to_node: { type: Vulnerability, id: id }
    fk_column: author_id
    scope: prune_to_target
    description: "User reported vulnerability."

  - from_node: { type: User, id: id }
    to_node: { type: WorkItem, id: id }
    fk_column: author_id
    scope: prune_to_target
    description: "User authored work item."

sources:
  - node: MergeRequest
    from: {type: User, id: author_id}
    to: {type: MergeRequest, id: id}
  - node: Note
    from: {type: User, id: author_id}
    to: {type: Note, id: id}
  - node: Vulnerability
    from: {type: User, id: author_id}
    to: {type: Vulnerability, id: id}
  - node: WorkItem
    from: {type: User, id: author_id}
    to: {type: WorkItem, id: id}
