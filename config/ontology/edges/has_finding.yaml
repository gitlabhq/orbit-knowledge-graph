# config/ontology/edges/has_finding.yaml

description: Entity has associated finding or vulnerability occurrence

variants:
  - from_node: { type: Vulnerability, id: id }
    to_node: { type: VulnerabilityOccurrence, id: id }
    fk_column: finding_id
    scope: same_namespace
    description: "Vulnerability has canonical vulnerability occurrence."

  - from_node: { type: SecurityScan, id: id }
    to_node: { type: Finding, id: id }
    fk_column: scan_id
    scope: same_namespace
    description: "Security scan has finding."

sources:
  - node: Finding
    from: {type: SecurityScan, id: scan_id}
    to: {type: Finding, id: id}
  - node: Vulnerability
    from: {type: Vulnerability, id: id}
    to: {type: VulnerabilityOccurrence, id: finding_id}
