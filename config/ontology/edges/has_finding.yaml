# config/ontology/edges/has_finding.yaml

description: Entity has associated scan finding

variants:
  - from_node: { type: Vulnerability, id: id }
    to_node: { type: Finding, id: id }
    fk_column: finding_id
    description: "Vulnerability has finding."

  - from_node: { type: SecurityScan, id: id }
    to_node: { type: Finding, id: id }
    fk_column: scan_id
    description: "Security scan has finding."
