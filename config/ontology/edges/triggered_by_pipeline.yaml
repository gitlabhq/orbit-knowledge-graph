# config/ontology/edges/triggered_by_pipeline.yaml

description: Job was triggered by an upstream pipeline (child pipeline relationship from the job side)
table: gl_ci_edge

variants:
  - from_node: { type: Job, id: id }
    to_node: { type: Pipeline, id: id }
    fk_column: upstream_pipeline_id
    description: "Job runs in a child pipeline whose parent is the upstream pipeline."

sources:
  - node: Job
    from: {type: Job, id: id}
    to: {type: Pipeline, id: upstream_pipeline_id}
