# config/ontology/nodes/plan/label.yaml

node_type: Label
domain: plan
description: A label for categorizing and filtering work items
label: title
destination_table: gl_label
default_columns: [id, title, color]

style:
  size: 22
  color: "#A855F7"

redaction:
  resource_type: label
  id_column: id
  ability: read_label

properties:
  id:
    type: int64
    source: id
    nullable: false
    mutable: false
    description: "Unique ID."

  title:
    type: string
    source: title
    nullable: false
    description: "Label title."

  description:
    type: string
    source: description
    nullable: false
    description: "Description text."

  color:
    type: string
    source: color
    nullable: false
    description: "Hex color code."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    mutable: false
    description: "Creation timestamp."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Last update timestamp."

  project_id:
    type: int64
    source: project_id
    nullable: true
    mutable: false
    description: "Owning project ID. Null for group-scoped."

  group_id:
    type: int64
    source: group_id
    nullable: true
    mutable: false
    description: "Owning group ID. Null for project-scoped."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

etl:
  type: table
  source: siphon_labels
  edges:
    project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing
    group_id:
      to: Group
      as: IN_GROUP
      direction: outgoing

storage:
  primary_key: [traversal_path, id]
  settings:
    add_minmax_index_for_temporal_columns: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["T64", "ZSTD(1)"]}
    - {name: title, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: description, type: "String", default: "''", codec: ["ZSTD(3)"]}
    - {name: color, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: project_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: group_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_title, column: title, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_title_ngram, column: title, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_description, column: description, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_description_ngram, column: description, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_project_id, column: project_id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_group_id, column: group_id, type: "bloom_filter(0.0001)", granularity: 1}
