# config/ontology/nodes/plan/label.yaml

node_type: Label
domain: plan
description: A label for categorizing and filtering work items
label: title
destination_table: gl_label
default_columns: [id, title, color]

style:
  size: 22
  color: "#A855F7"

redaction:
  resource_type: label
  id_column: id
  ability: read_label

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the label."

  title:
    type: string
    source: title
    nullable: true
    description: "Title/name of the label."

  description:
    type: string
    source: description
    nullable: true
    description: "Description of the label."

  color:
    type: string
    source: color
    nullable: true
    description: "Hex color code for the label."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Timestamp when the label was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Timestamp when the label was last updated."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

etl:
  type: table
  scope: namespaced
  source: siphon_labels
  edges:
    project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing
    group_id:
      to: Group
      as: IN_GROUP
      direction: outgoing

storage:
  primary_key: [traversal_path, id]
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: title, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: description, type: "Nullable(String)", codec: ["ZSTD(3)"]}
    - {name: color, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_title, column: title, type: "bloom_filter(0.01)", granularity: 1}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
