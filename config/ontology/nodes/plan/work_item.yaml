# config/ontology/nodes/plan/work_item.yaml

node_type: WorkItem
domain: plan
description: A work item representing an issue, epic, task, incident, or other trackable unit of work
label: title
destination_table: gl_work_item
default_columns: [id, iid, title, state, work_item_type]

style:
  size: 32
  color: "#EC4899"

redaction:
  resource_type: work_item
  id_column: id
  ability: read_work_item

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the work item."

  iid:
    type: int64
    source: iid
    nullable: false
    description: "Project or group-scoped work item number."

  title:
    type: string
    source: title
    nullable: true
    description: "Title of the work item."

  description:
    type: string
    source: description
    nullable: true
    description: "Description body (markdown)."

  state:
    type: enum
    source: state_id
    nullable: false
    description: "Current state of the work item."
    values:
      1: opened
      2: closed
      3: merged
      4: locked

  work_item_type:
    type: enum
    source: work_item_type_id
    nullable: false
    description: "Type of work item."
    values:
      1: issue
      2: incident
      3: test_case
      4: requirement
      5: task
      6: objective
      7: key_result
      8: epic
      9: ticket

  confidential:
    type: boolean
    source: confidential
    nullable: false
    description: "Whether the work item is confidential."

  due_date:
    type: date
    source: due_date
    nullable: true
    description: "Due date for the work item."

  start_date:
    type: date
    source: start_date
    nullable: true
    description: "Start date for the work item."

  weight:
    type: int64
    source: weight
    nullable: true
    description: "Weight/points assigned to the work item."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Timestamp when the work item was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Timestamp when the work item was last updated."

  closed_at:
    type: timestamp
    source: closed_at
    nullable: true
    description: "Timestamp when the work item was closed."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

etl:
  type: table
  scope: namespaced
  source: work_items
  edges:
    author_id:
      to: User
      as: AUTHORED
      direction: incoming
    milestone_id:
      to: Milestone
      as: IN_MILESTONE
      direction: outgoing
    namespace_id:
      to: Group
      as: IN_GROUP
      direction: outgoing
    project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing
    closed_by_id:
      to: User
      as: CLOSED
      direction: incoming

storage:
  primary_key: [traversal_path, id]
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: iid, type: "Nullable(Int64)", codec: ["ZSTD(1)"]}
    - {name: title, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: description, type: "Nullable(String)", codec: ["ZSTD(3)"]}
    - {name: state, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: work_item_type, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: confidential, type: "Bool", default: "false"}
    - {name: due_date, type: "Nullable(Date32)", codec: ["Delta(4)", "ZSTD(1)"]}
    - {name: start_date, type: "Nullable(Date32)", codec: ["Delta(4)", "ZSTD(1)"]}
    - {name: weight, type: "Nullable(Int64)", codec: ["ZSTD(1)"]}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: closed_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_state, column: state, type: "set(10)", granularity: 2}
    - {name: idx_work_item_type, column: work_item_type, type: "set(10)", granularity: 2}
    - {name: idx_confidential, column: confidential, type: "minmax", granularity: 1}
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
