# config/ontology/nodes/plan/work_item.yaml

node_type: WorkItem
domain: plan
description: A work item representing an issue, epic, task, incident, or other trackable unit of work
label: title
destination_table: gl_work_item
default_columns: [id, iid, title, state, work_item_type]

style:
  size: 32
  color: "#EC4899"

redaction:
  resource_type: work_item
  id_column: id
  ability: read_work_item

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the work item."

  iid:
    type: int64
    source: iid
    nullable: false
    description: "Project or group-scoped work item number."

  title:
    type: string
    source: title
    nullable: true
    description: "Title of the work item."

  description:
    type: string
    source: description
    nullable: true
    description: "Description body (markdown)."

  state:
    type: enum
    source: state_id
    nullable: false
    description: "Current state of the work item."
    values:
      1: opened
      2: closed
      3: merged
      4: locked

  work_item_type:
    type: enum
    source: work_item_type_id
    nullable: false
    description: "Type of work item."
    values:
      1: issue
      2: incident
      3: test_case
      4: requirement
      5: task
      6: objective
      7: key_result
      8: epic
      9: ticket

  confidential:
    type: boolean
    source: confidential
    nullable: false
    description: "Whether the work item is confidential."

  due_date:
    type: date
    source: due_date
    nullable: true
    description: "Due date for the work item."

  start_date:
    type: date
    source: start_date
    nullable: true
    description: "Start date for the work item."

  weight:
    type: int64
    source: weight
    nullable: true
    description: "Weight/points assigned to the work item."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Timestamp when the work item was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Timestamp when the work item was last updated."

  closed_at:
    type: timestamp
    source: closed_at
    nullable: true
    description: "Timestamp when the work item was closed."

  traversal_path:
    type: string
    source: traversal_path
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

etl:
  type: table
  scope: namespaced
  source: work_items
  edges:
    author_id:
      to: User
      as: AUTHORED
      direction: incoming
    milestone_id:
      to: Milestone
      as: IN_MILESTONE
      direction: outgoing
    namespace_id:
      to: Group
      as: IN_GROUP
      direction: outgoing
    assignees:
      to: User
      as: ASSIGNED
      direction: incoming
      array: true
    label_ids:
      to: Label
      as: HAS_LABEL
      direction: outgoing
      array_field: label_id
