# config/ontology/nodes/plan/work_item.yaml

node_type: WorkItem
domain: plan
description: A work item representing an issue, epic, task, incident, or other trackable unit of work
label: title
destination_table: gl_work_item
default_columns: [id, iid, title, state, work_item_type]

style:
  size: 32
  color: "#EC4899"

redaction:
  resource_type: work_item
  id_column: id
  ability: read_work_item

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Unique ID."

  iid:
    type: int64
    source: iid
    nullable: false
    description: "Scoped work item number."

  title:
    type: string
    source: title
    nullable: false
    description: "Title."

  description:
    type: string
    source: description
    nullable: false
    description: "Description body (markdown)."

  state:
    type: enum
    source: state_id
    nullable: false
    description: "Current state. Only opened (1) and closed (2) apply to work items."
    values:
      1: opened
      2: closed
      3: merged
      4: locked

  work_item_type:
    type: enum
    source: work_item_type_id
    nullable: false
    description: "Work item type."
    values:
      1: issue
      2: incident
      3: test_case
      4: requirement
      5: task
      6: objective
      7: key_result
      8: epic
      9: ticket

  confidential:
    type: boolean
    source: confidential
    nullable: false
    description: "Confidential flag."

  due_date:
    type: date
    source: due_date
    nullable: true
    description: "Due date."

  start_date:
    type: date
    source: start_date
    nullable: true
    description: "Start date."

  weight:
    type: int64
    source: weight
    nullable: true
    description: "Weight/points assigned."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Creation timestamp."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Last update timestamp."

  closed_at:
    type: timestamp
    source: closed_at
    nullable: true
    description: "Closed timestamp."

  project_id:
    type: int64
    source: project_id
    nullable: true
    description: "Owning project ID. Null for group-scoped."

  author_id:
    type: int64
    source: author_id
    nullable: true
    description: "Author user ID."

  milestone_id:
    type: int64
    source: milestone_id
    nullable: true
    description: "Associated milestone ID."

  namespace_id:
    type: int64
    source: namespace_id
    nullable: false
    description: "Owning namespace (group) ID."

  closed_by_id:
    type: int64
    source: closed_by_id
    nullable: true
    description: "User ID who closed this."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

etl:
  type: table
  scope: namespaced
  source: work_items
  edges:
    author_id:
      to: User
      as: AUTHORED
      direction: incoming
    milestone_id:
      to: Milestone
      as: IN_MILESTONE
      direction: outgoing
      mutable: true
    namespace_id:
      to: Group
      as: IN_GROUP
      direction: outgoing
    project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing
    closed_by_id:
      to: User
      as: CLOSED
      direction: incoming

storage:
  primary_key: [traversal_path, id]
  settings:
    allow_part_offset_column_in_projections: "1"
    add_minmax_index_for_temporal_columns: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: iid, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: title, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: description, type: "String", default: "''", codec: ["ZSTD(3)"]}
    - {name: state, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: work_item_type, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: confidential, type: "Bool", default: "false"}
    - {name: due_date, type: "Nullable(Date32)", codec: ["Delta(4)", "ZSTD(1)"]}
    - {name: start_date, type: "Nullable(Date32)", codec: ["Delta(4)", "ZSTD(1)"]}
    - {name: weight, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: closed_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: project_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: author_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: milestone_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: namespace_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: closed_by_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_state, column: state, type: "set(10)", granularity: 2}
    - {name: idx_work_item_type, column: work_item_type, type: "set(10)", granularity: 2}
    - {name: idx_confidential, column: confidential, type: "minmax", granularity: 1}
    - {name: idx_created_at, column: created_at, type: "minmax", granularity: 1}
    - {name: idx_due_date, column: due_date, type: "minmax", granularity: 1}
    - {name: idx_id, column: id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_title, column: title, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_title_ngram, column: title, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_description, column: description, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_description_ngram, column: description, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_project_id, column: project_id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_author_id, column: author_id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_milestone_id, column: milestone_id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_namespace_id, column: namespace_id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_closed_by_id, column: closed_by_id, type: "bloom_filter(0.001)", granularity: 1}
  projections:
    - {type: lightweight, name: by_id, versioned_sort_key: [id]}
    - {type: lightweight, name: by_project_id, versioned_sort_key: [project_id]}
    - {type: lightweight, name: by_author_id, versioned_sort_key: [author_id]}
    - {type: lightweight, name: by_milestone_id, versioned_sort_key: [milestone_id]}
    - {type: lightweight, name: by_namespace_id, versioned_sort_key: [namespace_id]}
    - {type: lightweight, name: by_closed_by_id, versioned_sort_key: [closed_by_id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
