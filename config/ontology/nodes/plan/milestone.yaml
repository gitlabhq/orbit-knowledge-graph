# config/ontology/nodes/plan/milestone.yaml

node_type: Milestone
domain: plan
description: A milestone for tracking progress toward a goal within a project or group
label: title
destination_table: gl_milestone
default_columns: [id, iid, title, state, due_date, start_date]

style:
  size: 30
  color: "#D946EF"

redaction:
  resource_type: milestone
  id_column: id
  ability: read_milestone

properties:
  id:
    type: int64
    source: id
    nullable: false
    mutable: false
    description: "Unique ID."

  iid:
    type: int64
    source: iid
    nullable: true
    mutable: false
    description: "Scoped milestone number."

  title:
    type: string
    source: title
    nullable: false
    description: "Title."

  description:
    type: string
    source: description
    nullable: false
    description: "Description text."

  state:
    type: string
    source: state
    nullable: false
    description: "State (active, closed)."
    selectivity: low

  due_date:
    type: date
    source: due_date
    nullable: true
    description: "Due date."

  start_date:
    type: date
    source: start_date
    nullable: true
    description: "Start date."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    mutable: false
    description: "Creation timestamp."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Last update timestamp."

  project_id:
    type: int64
    source: project_id
    nullable: true
    mutable: false
    description: "Owning project ID. Null for group-scoped."

  group_id:
    type: int64
    source: group_id
    nullable: true
    mutable: false
    description: "Owning group ID. Null for project-scoped."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

indexer:
  reindex: [siphon_milestones]
pipelines:
  - name: Milestone
    extract:
      type: clickhouse
      tables: [siphon_milestones]
      order_by: [traversal_path, id]
      query: generated
    transform:
      type: datafusion
      edges:
        - from:
            field: id
            kind: Milestone
          to:
            field: project_id
            kind: Project
          label: IN_PROJECT
        - from:
            field: id
            kind: Milestone
          to:
            field: group_id
            kind: Group
          label: IN_GROUP
storage:
  primary_key: [traversal_path, id]
  settings:
    add_minmax_index_for_temporal_columns: "1"
    auto_statistics_types: "'basic, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["T64", "ZSTD(1)"]}
    - {name: iid, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: title, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: description, type: "String", default: "''", codec: ["ZSTD(3)"]}
    - {name: state, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: due_date, type: "Nullable(Date32)", codec: ["Delta(4)", "ZSTD(1)"]}
    - {name: start_date, type: "Nullable(Date32)", codec: ["Delta(4)", "ZSTD(1)"]}
    - {name: created_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: project_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: group_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_title, column: title, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_title_ngram, column: title, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_state, column: state, type: "set(4)", granularity: 2}
    - {name: idx_description, column: description, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_description_ngram, column: description, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_project_id, column: project_id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_group_id, column: group_id, type: "bloom_filter(0.0001)", granularity: 1}
