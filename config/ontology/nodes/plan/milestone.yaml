# config/ontology/nodes/plan/milestone.yaml

node_type: Milestone
domain: plan
description: A milestone for tracking progress toward a goal within a project or group
label: title
destination_table: gl_milestone
default_columns: [id, iid, title, state, due_date, start_date]

style:
  size: 30
  color: "#D946EF"

redaction:
  resource_type: milestone
  id_column: id
  ability: read_milestone

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the milestone."

  iid:
    type: int64
    source: iid
    nullable: true
    description: "Project or group-scoped milestone number."

  title:
    type: string
    source: title
    nullable: false
    description: "Title of the milestone."

  description:
    type: string
    source: description
    nullable: true
    description: "Description of the milestone."

  state:
    type: string
    source: state
    nullable: true
    description: "Current state of the milestone (active, closed)."

  due_date:
    type: date
    source: due_date
    nullable: true
    description: "Due date for the milestone."

  start_date:
    type: date
    source: start_date
    nullable: true
    description: "Start date for the milestone."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Timestamp when the milestone was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Timestamp when the milestone was last updated."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

etl:
  type: table
  scope: namespaced
  source: siphon_milestones
  edges:
    project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing
    group_id:
      to: Group
      as: IN_GROUP
      direction: outgoing

storage:
  columns:
    title:
      default: "''"
    description:
      codec: ["zstd(3)"]
    traversal_path:
      default: "'0/'"
