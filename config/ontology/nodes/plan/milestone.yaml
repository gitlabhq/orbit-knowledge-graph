# config/ontology/nodes/plan/milestone.yaml

node_type: Milestone
domain: plan
description: A milestone for tracking progress toward a goal within a project or group
label: title
destination_table: gl_milestone
default_columns: [id, iid, title, state, due_date, start_date]

style:
  size: 30
  color: "#D946EF"

redaction:
  resource_type: milestone
  id_column: id
  ability: read_milestone

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the milestone."

  iid:
    type: int64
    source: iid
    nullable: true
    description: "Project or group-scoped milestone number."

  title:
    type: string
    source: title
    nullable: false
    description: "Title of the milestone."

  description:
    type: string
    source: description
    nullable: true
    description: "Description of the milestone."

  state:
    type: string
    source: state
    nullable: true
    description: "Current state of the milestone (active, closed)."

  due_date:
    type: date
    source: due_date
    nullable: true
    description: "Due date for the milestone."

  start_date:
    type: date
    source: start_date
    nullable: true
    description: "Start date for the milestone."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Timestamp when the milestone was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Timestamp when the milestone was last updated."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

etl:
  type: table
  scope: namespaced
  source: siphon_milestones
  edges:
    project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing
    group_id:
      to: Group
      as: IN_GROUP
      direction: outgoing

storage:
  primary_key: [traversal_path, id]
  settings:
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: iid, type: "Nullable(Int64)", codec: ["ZSTD(1)"]}
    - {name: title, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: description, type: "Nullable(String)", codec: ["ZSTD(3)"]}
    - {name: state, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: due_date, type: "Nullable(Date32)", codec: ["Delta(4)", "ZSTD(1)"]}
    - {name: start_date, type: "Nullable(Date32)", codec: ["Delta(4)", "ZSTD(1)"]}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_title, column: title, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_title_ngram, column: title, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_state, column: state, type: "set(4)", granularity: 2}
    - {name: idx_description, column: description, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_description_ngram, column: description, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
