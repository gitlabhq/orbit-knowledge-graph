# config/ontology/nodes/source_code/file.yaml

node_type: File
domain: source_code
description: A source code file within a repository
label: path
destination_table: gl_file
default_columns: [id, path, name, language]
sort_key: [traversal_path, project_id, branch, id]

style:
  size: 24
  color: "#22D3EE"

redaction:
  resource_type: project
  id_column: project_id
  ability: read_code

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Unique identifier for the file node."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

  project_id:
    type: int64
    source: project_id
    nullable: false
    description: "ID of the project this file belongs to."

  branch:
    type: string
    source: branch
    nullable: false
    description: "Git branch where this file exists."

  commit_sha:
    type: string
    source: commit_sha
    nullable: false
    description: "Commit SHA at which this file was indexed."

  path:
    type: string
    source: path
    nullable: false
    description: "Relative path of the file within the repository."

  name:
    type: string
    source: name
    nullable: false
    description: "Name of the file including extension."

  extension:
    type: string
    source: extension
    nullable: false
    description: "File extension (e.g., rb, py, java)."

  language:
    type: string
    source: language
    nullable: false
    description: "Programming language of the file (e.g., ruby, python, java)."

  content:
    type: string
    virtual:
      service: gitaly
      lookup: blob_content
      depends_on: [project_id, commit_sha, branch, path]
    nullable: true
    description: "Raw source text of the file. Resolved from Gitaly at query time."

storage:
  settings:
    index_granularity: "1024"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: traversal_path, type: "String", codec: ["ZSTD(1)"]}
    - {name: project_id, type: "Int64", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: branch, type: "String", codec: ["ZSTD(1)"]}
    - {name: commit_sha, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: path, type: "String", codec: ["ZSTD(3)"]}
    - {name: name, type: "String", codec: ["ZSTD(1)"]}
    - {name: extension, type: "LowCardinality(String)", codec: ["LZ4"]}
    - {name: language, type: "LowCardinality(String)", codec: ["LZ4"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 256, 2, 0)", granularity: 1}
    - {name: idx_path, column: path, type: "text(tokenizer = splitByString(['/']))", granularity: 1}
    - {name: idx_path_ngram, column: path, type: "ngrambf_v1(3, 256, 2, 0)", granularity: 1}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
