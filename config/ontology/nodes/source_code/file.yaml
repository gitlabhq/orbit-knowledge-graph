# config/ontology/nodes/source_code/file.yaml

node_type: File
domain: source_code
description: A source code file within a repository
label: path
destination_table: gl_file
default_columns: [id, path, name, language, commit_sha]
sort_key: [traversal_path, project_id, branch, id]

style:
  size: 24
  color: "#22D3EE"

redaction:
  resource_type: project
  id_column: project_id
  ability: read_code

properties:
  id:
    type: int64
    source: id
    nullable: false
    immutable: true
    description: "Unique ID."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

  project_id:
    type: int64
    source: project_id
    nullable: false
    immutable: true
    description: "Owning project ID."

  branch:
    type: string
    source: branch
    nullable: false
    immutable: true
    description: "Git branch."

  commit_sha:
    type: string
    source: commit_sha
    nullable: false
    immutable: true
    description: "Indexed commit SHA."

  path:
    type: string
    source: path
    nullable: false
    immutable: true
    description: "Relative path within the repository."

  name:
    type: string
    source: name
    nullable: false
    immutable: true
    description: "File name including extension."

  extension:
    type: string
    source: extension
    nullable: false
    immutable: true
    description: "Extension (e.g., rb, py, java)."
    selectivity: low

  language:
    type: string
    source: language
    nullable: false
    immutable: true
    description: "Programming language (e.g., ruby, python, java)."
    selectivity: low

  content:
    type: string
    virtual:
      service: gitaly
      lookup: blob_content
      depends_on: [project_id, commit_sha, branch, path]
    nullable: true
    description: "Raw source text, resolved from Gitaly at query time."

storage:
  settings:
    allow_part_offset_column_in_projections: "1"
    index_granularity: "1024"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: traversal_path, type: "String", codec: ["ZSTD(1)"]}
    - {name: project_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: branch, type: "String", codec: ["ZSTD(1)"]}
    - {name: commit_sha, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: path, type: "String", codec: ["ZSTD(3)"]}
    - {name: name, type: "String", codec: ["ZSTD(1)"]}
    - {name: extension, type: "LowCardinality(String)", codec: ["LZ4"]}
    - {name: language, type: "LowCardinality(String)", codec: ["LZ4"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_project_id, column: project_id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_path, column: path, type: "text(tokenizer = splitByString(['/']))", granularity: 1}
    - {name: idx_path_ngram, column: path, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
  projections:
    - {type: lightweight, name: by_id, versioned_sort_key: [id]}
    - {type: lightweight, name: by_project_id, versioned_sort_key: [project_id]}
    - {type: lightweight, name: by_branch, versioned_sort_key: [branch]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
