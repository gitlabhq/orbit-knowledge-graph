# config/ontology/nodes/source_code/imported_symbol.yaml

node_type: ImportedSymbol
domain: source_code
description: An imported symbol or module reference within a source file
label: identifier_name
destination_table: gl_imported_symbol
default_columns: [id, identifier_name, import_path, import_type, file_path, commit_sha, start_line, end_line]
sort_key: [traversal_path, project_id, branch, id]

style:
  size: 22
  color: "#5EEAD4"

redaction:
  resource_type: project
  id_column: project_id
  ability: read_code

properties:
  id:
    type: int64
    source: id
    nullable: false
    immutable: true
    description: "Unique ID."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

  project_id:
    type: int64
    source: project_id
    nullable: false
    immutable: true
    description: "Owning project ID."

  branch:
    type: string
    source: branch
    nullable: false
    immutable: true
    description: "Git branch."

  commit_sha:
    type: string
    source: commit_sha
    nullable: false
    immutable: true
    description: "Indexed commit SHA."

  file_path:
    type: string
    source: file_path
    nullable: false
    immutable: true
    description: "Containing file path."

  import_type:
    type: string
    source: import_type
    nullable: false
    immutable: true
    description: "Import kind (e.g., module, symbol, wildcard)."
    selectivity: low

  import_path:
    type: string
    source: import_path
    nullable: false
    immutable: true
    description: "Source module or path of the import."

  identifier_name:
    type: string
    source: identifier_name
    nullable: false
    immutable: true
    description: "Imported symbol name."

  identifier_alias:
    type: string
    source: identifier_alias
    nullable: false
    immutable: true
    description: "Import alias (e.g., 'import numpy as np')."

  start_line:
    type: int64
    source: start_line
    nullable: false
    immutable: true
    description: "Start line."

  end_line:
    type: int64
    source: end_line
    nullable: false
    immutable: true
    description: "End line."

  start_byte:
    type: int64
    source: start_byte
    nullable: false
    immutable: true
    description: "Start byte offset."

  end_byte:
    type: int64
    source: end_byte
    nullable: false
    immutable: true
    description: "End byte offset."

  start_char:
    type: int64
    source: start_char
    nullable: false
    immutable: true
    description: "Start column."

  end_char:
    type: int64
    source: end_char
    nullable: false
    immutable: true
    description: "End column."

storage:
  settings:
    allow_part_offset_column_in_projections: "1"
    index_granularity: "1024"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: traversal_path, type: "String", codec: ["ZSTD(1)"]}
    - {name: project_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: branch, type: "String", codec: ["ZSTD(1)"]}
    - {name: commit_sha, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: file_path, type: "String", codec: ["ZSTD(3)"]}
    - {name: import_type, type: "LowCardinality(String)", codec: ["LZ4"]}
    - {name: import_path, type: "String", codec: ["ZSTD(3)"]}
    - {name: identifier_name, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: identifier_alias, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: start_line, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: end_line, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: start_byte, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: end_byte, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: start_char, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: end_char, type: "Int64", codec: ["Delta(8)", "LZ4"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_project_id, column: project_id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_identifier_name, column: identifier_name, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_file_path, column: file_path, type: "text(tokenizer = splitByString(['/']))", granularity: 1}
    - {name: idx_file_path_ngram, column: file_path, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_import_path, column: import_path, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_import_path_ngram, column: import_path, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_import_type, column: import_type, type: "set(10)", granularity: 2}
  projections:
    - {type: lightweight, name: by_id, versioned_sort_key: [id]}
    - {type: lightweight, name: by_project_id, versioned_sort_key: [project_id]}
    - {type: lightweight, name: by_branch, versioned_sort_key: [branch]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
