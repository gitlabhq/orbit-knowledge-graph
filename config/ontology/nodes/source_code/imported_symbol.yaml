# config/ontology/nodes/source_code/imported_symbol.yaml

node_type: ImportedSymbol
domain: source_code
description: An imported symbol or module reference within a source file
label: identifier_name
destination_table: gl_imported_symbol
default_columns: [id, identifier_name, import_path, import_type, file_path]
sort_key: [traversal_path, project_id, branch, id]

style:
  size: 22
  color: "#5EEAD4"

redaction:
  resource_type: project
  id_column: project_id
  ability: read_code

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Unique identifier for the imported symbol node."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

  project_id:
    type: int64
    source: project_id
    nullable: false
    description: "ID of the project this import belongs to."

  branch:
    type: string
    source: branch
    nullable: false
    description: "Git branch where this import exists."

  commit_sha:
    type: string
    source: commit_sha
    nullable: false
    description: "Commit SHA at which this import was indexed."

  file_path:
    type: string
    source: file_path
    nullable: false
    description: "Path of the file containing this import."

  import_type:
    type: string
    source: import_type
    nullable: false
    description: "Type of import statement (e.g., module, symbol, wildcard)."

  import_path:
    type: string
    source: import_path
    nullable: false
    description: "Path or module from which the symbol is imported."

  identifier_name:
    type: string
    source: identifier_name
    nullable: true
    description: "Name of the imported symbol."

  identifier_alias:
    type: string
    source: identifier_alias
    nullable: true
    description: "Alias used for the import (e.g., 'import numpy as np')."

  start_line:
    type: int64
    source: start_line
    nullable: false
    description: "Starting line number of the import."

  end_line:
    type: int64
    source: end_line
    nullable: false
    description: "Ending line number of the import."

  start_byte:
    type: int64
    source: start_byte
    nullable: false
    description: "Starting byte offset of the import in the file."

  end_byte:
    type: int64
    source: end_byte
    nullable: false
    description: "Ending byte offset of the import in the file."

storage:
  settings:
    index_granularity: "1024"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: traversal_path, type: "String", codec: ["ZSTD(1)"]}
    - {name: project_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: branch, type: "String", codec: ["ZSTD(1)"]}
    - {name: commit_sha, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: file_path, type: "String", codec: ["ZSTD(3)"]}
    - {name: import_type, type: "LowCardinality(String)", codec: ["LZ4"]}
    - {name: import_path, type: "String", codec: ["ZSTD(3)"]}
    - {name: identifier_name, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: identifier_alias, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: start_line, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: end_line, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: start_byte, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: end_byte, type: "Int64", codec: ["Delta(8)", "LZ4"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_identifier_name, column: identifier_name, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_file_path, column: file_path, type: "text(tokenizer = splitByString(['/']))", granularity: 1}
    - {name: idx_file_path_ngram, column: file_path, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_import_path, column: import_path, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_import_path_ngram, column: import_path, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_import_type, column: import_type, type: "set(10)", granularity: 2}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: lightweight, name: by_project_id, order_by: [project_id]}
    - {type: lightweight, name: by_branch, order_by: [branch]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
