# config/ontology/nodes/source_code/branch.yaml

node_type: Branch
domain: source_code
description: A Git branch in a repository
label: name
destination_table: gl_branch
sort_key: [traversal_path, project_id, id]
default_columns: [id, name, is_default]

style:
  size: 28
  color: "#14B8A6"

redaction:
  resource_type: project
  id_column: project_id
  ability: read_code

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Derived identifier for the branch (hash of project_id + branch name)."

  project_id:
    type: int64
    source: project_id
    nullable: false
    description: "ID of the project this branch belongs to."

  name:
    type: string
    source: name
    nullable: false
    description: "Name of the branch (e.g., main, feature/new-login)."

  is_default:
    type: boolean
    source: is_default
    nullable: false
    description: "Whether this is the default branch of the project."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

storage:
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: traversal_path, type: "String", codec: ["ZSTD(1)"]}
    - {name: project_id, type: "Int64", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: name, type: "String", codec: ["ZSTD(1)"]}
    - {name: is_default, type: "Bool", default: "true"}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
