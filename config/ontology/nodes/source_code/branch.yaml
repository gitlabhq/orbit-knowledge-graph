# config/ontology/nodes/source_code/branch.yaml

node_type: Branch
domain: source_code
description: A Git branch in a repository
label: name
destination_table: gl_branch
sort_key: [traversal_path, project_id, id]
default_columns: [id, name, is_default]

style:
  size: 28
  color: "#14B8A6"

redaction:
  resource_type: project
  id_column: project_id
  ability: read_code

properties:
  id:
    type: int64
    source: id
    nullable: false
    mutable: false
    description: "Derived ID (hash of project_id + branch name)."

  project_id:
    type: int64
    source: project_id
    nullable: false
    mutable: false
    description: "Owning project ID. Zero for external repositories."

  external_repository_id:
    type: int64
    source: external_repository_id
    nullable: false
    mutable: false
    description: "External repository ID. Zero for native GitLab projects."

  name:
    type: string
    source: name
    nullable: false
    mutable: false
    description: "Branch name (e.g., main, feature/new-login)."

  is_default:
    type: boolean
    source: is_default
    nullable: false
    description: "Whether this is the project's default branch."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

storage:
  settings:
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["T64", "ZSTD(1)"]}
    - {name: traversal_path, type: "String", codec: ["ZSTD(1)"]}
    - {name: project_id, type: "Int64", codec: ["T64", "ZSTD(1)"]}
    - {name: external_repository_id, type: "Int64", default: "0", codec: ["T64", "ZSTD(1)"]}
    - {name: name, type: "String", codec: ["ZSTD(1)"]}
    - {name: is_default, type: "Bool", default: "true"}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_project_id, column: project_id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
