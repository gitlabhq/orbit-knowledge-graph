# config/ontology/nodes/source_code/external_directory.yaml

node_type: ExternalDirectory
domain: source_code
description: A directory within an external repository's file structure
label: path
destination_table: gl_external_directory
default_columns: [id, path, name, commit_sha]
sort_key: [traversal_path, external_repository_id, branch, id]

style:
  size: 26
  color: "#06B6D4"

redaction:
  resource_type: external_repository
  id_column: external_repository_id
  ability: read_external_repository_code

properties:
  id:
    type: int64
    source: id
    nullable: false
    mutable: false
    description: "Unique ID."
    traversal_path_lookup:
      kind: id
      source_table: gl_external_directory
      key_column: id

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

  project_id:
    type: int64
    source: project_id
    nullable: false
    mutable: false
    description: "Always zero for external repositories."

  external_repository_id:
    type: int64
    source: external_repository_id
    nullable: false
    mutable: false
    description: "Owning external repository ID."

  branch:
    type: string
    source: branch
    nullable: false
    mutable: false
    description: "Git branch."

  commit_sha:
    type: string
    source: commit_sha
    nullable: false
    mutable: false
    description: "Indexed commit SHA."

  path:
    type: string
    source: path
    nullable: false
    mutable: false
    description: "Relative path within the repository."

  name:
    type: string
    source: name
    nullable: false
    mutable: false
    description: "Directory name."

storage:
  settings:
    index_granularity: "1024"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["T64", "ZSTD(1)"]}
    - {name: traversal_path, type: "String", codec: ["ZSTD(1)"]}
    - {name: project_id, type: "Int64", codec: ["T64", "ZSTD(1)"]}
    - {name: external_repository_id, type: "Int64", default: "0", codec: ["T64", "ZSTD(1)"]}
    - {name: branch, type: "String", codec: ["ZSTD(1)"]}
    - {name: commit_sha, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: path, type: "String", codec: ["ZSTD(3)"]}
    - {name: name, type: "String", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_external_repository_id, column: external_repository_id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_path, column: path, type: "text(tokenizer = splitByString(['/']))", granularity: 1}
    - {name: idx_path_ngram, column: path, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
