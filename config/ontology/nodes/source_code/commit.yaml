# config/ontology/nodes/source_code/commit.yaml

node_type: Commit
domain: source_code
description: A Git commit a merge request was merged at
label: sha
destination_table: gl_commit
default_columns: [id, sha, project_id]
sort_key: [traversal_path, project_id, id]

style:
  size: 24
  color: "#8B5CF6"

redaction:
  resource_type: project
  id_column: project_id
  ability: read_code

properties:
  id:
    type: int64
    source: id
    nullable: false
    mutable: false
    description: "Synthetic identifier: sipHash64(target_project_id, sha). Matches MergeRequest.merged_commit_id so MERGED_AT_COMMIT joins."

  sha:
    type: string
    source: sha
    nullable: false
    mutable: false
    description: "Clean 40-char commit SHA the merge request landed on, from the bytea-decoded COALESCE(merged_commit_sha, merge_commit_sha, squash_commit_sha) (merged_commit_sha and squash_commit_sha are unhex-decoded from Siphon's \\x-hex bytea form)."

  project_id:
    type: int64
    source: project_id
    nullable: false
    mutable: false
    description: "Owning project ID."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

# Dual-written from the merge_requests row (not a Siphon table of its own): the
# Commit's id and sha are computed with the SAME state_id=3 gate and bytea-decoded
# COALESCE the MergeRequest node uses for merged_commit_id, so the
# MERGED_AT_COMMIT FK edge resolves to a node that exists. Only merged MRs with a
# resolvable SHA produce a commit; the WHERE prunes the rest. Two MRs that land on
# the same commit emit the same (project_id, sha) -> same id; the gl_commit
# ReplacingMergeTree identity collapses the duplicate rows.
#
# merged_commit_sha and squash_commit_sha are Postgres `bytea` (Siphon stores them
# as `\x` + hex-of-ASCII, length 82); they are unhex-decoded here, malformed-length
# rows -> NULL. merge_commit_sha is clean `varchar`. COALESCE stops at
# squash_commit_sha and omits Rails' 4th leg diff_head_sha (not a merge_requests
# column, and it is the pre-merge source-branch head -- the wrong-SHA source #924
# exists to avoid).
#
# The id masks the sign bit (bitAnd ... 0x7FFFFFFFFFFFFFFF) so the Int64 id is
# always positive: it is the keyset cursor column (order_by below), and a negative
# id breaks the monotonic page advance into an infinite paging loop. Mirrors
# compute_branch_id / compute_commit_id in arrow_converter.rs.
#
# DRIFT WARNING: the decoded-COALESCE in `select` (id + sha) and `where` below must
# stay BYTE-IDENTICAL with each other AND with merge_request.yaml's merged_commit_id
# derivation, and the masked-sipHash64 id must match merge_request.yaml's
# merged_commit_id, or the edge target stops joining its node.
#
# Shared-commit transient: `deleted: m.{{deleted_column}}` propagates an MR
# soft-delete to this shared Commit node. Because one (project_id, sha) can map to
# many MRs (production: up to 127), soft-deleting MR A tombstones the Commit node
# that MR B's edge still points at, until MR B is re-indexed on the next
# merge_requests watermark batch (`reindex_on: [merge_requests]`), which re-inserts
# the node. Known one-batch transient inconsistency, accepted.
etl:
  type: query
  source: merge_requests
  select: >-
    toInt64(bitAnd(sipHash64(m.target_project_id, coalesce(multiIf(m.merged_commit_sha = '', NULL, startsWith(m.merged_commit_sha, '\\x') AND length(m.merged_commit_sha) = 82, unhex(substring(m.merged_commit_sha, 3)), startsWith(m.merged_commit_sha, '\\x'), NULL, m.merged_commit_sha), nullIf(m.merge_commit_sha, ''), multiIf(m.squash_commit_sha = '', NULL, startsWith(m.squash_commit_sha, '\\x') AND length(m.squash_commit_sha) = 82, unhex(substring(m.squash_commit_sha, 3)), startsWith(m.squash_commit_sha, '\\x'), NULL, m.squash_commit_sha))), toUInt64(9223372036854775807))) AS id,
    coalesce(multiIf(m.merged_commit_sha = '', NULL, startsWith(m.merged_commit_sha, '\\x') AND length(m.merged_commit_sha) = 82, unhex(substring(m.merged_commit_sha, 3)), startsWith(m.merged_commit_sha, '\\x'), NULL, m.merged_commit_sha), nullIf(m.merge_commit_sha, ''), multiIf(m.squash_commit_sha = '', NULL, startsWith(m.squash_commit_sha, '\\x') AND length(m.squash_commit_sha) = 82, unhex(substring(m.squash_commit_sha, 3)), startsWith(m.squash_commit_sha, '\\x'), NULL, m.squash_commit_sha)) AS sha,
    m.target_project_id AS project_id,
    m.traversal_path AS traversal_path
  from: merge_requests AS m
  where: >-
    m.state_id = 3
    AND coalesce(multiIf(m.merged_commit_sha = '', NULL, startsWith(m.merged_commit_sha, '\\x') AND length(m.merged_commit_sha) = 82, unhex(substring(m.merged_commit_sha, 3)), startsWith(m.merged_commit_sha, '\\x'), NULL, m.merged_commit_sha), nullIf(m.merge_commit_sha, ''), multiIf(m.squash_commit_sha = '', NULL, startsWith(m.squash_commit_sha, '\\x') AND length(m.squash_commit_sha) = 82, unhex(substring(m.squash_commit_sha, 3)), startsWith(m.squash_commit_sha, '\\x'), NULL, m.squash_commit_sha)) IS NOT NULL
  traversal_path_filter: "startsWith(m.traversal_path, {traversal_path:String})"
  watermark: m.{{watermark_column}}
  table_alias: m
  deleted: m.{{deleted_column}}
  order_by: [traversal_path, project_id, id]
  reindex_on: [merge_requests]

storage:
  settings:
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: traversal_path, type: "String", codec: ["ZSTD(1)"]}
    - {name: project_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: sha, type: "String", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_project_id, column: project_id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_sha, column: sha, type: "bloom_filter(0.0001)", granularity: 1}
