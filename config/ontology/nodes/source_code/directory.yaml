# config/ontology/nodes/source_code/directory.yaml

node_type: Directory
domain: source_code
description: A directory within a repository's file structure
label: path
destination_table: gl_directory
default_columns: [id, path, name]
sort_key: [traversal_path, project_id, branch, id]

style:
  size: 26
  color: "#06B6D4"

redaction:
  resource_type: project
  id_column: project_id
  ability: read_code

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Unique identifier for the directory node."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

  project_id:
    type: int64
    source: project_id
    nullable: false
    description: "ID of the project this directory belongs to."

  branch:
    type: string
    source: branch
    nullable: false
    description: "Git branch where this directory exists."

  commit_sha:
    type: string
    source: commit_sha
    nullable: false
    description: "Commit SHA at which this directory was indexed."

  path:
    type: string
    source: path
    nullable: false
    description: "Relative path of the directory within the repository."

  name:
    type: string
    source: name
    nullable: false
    description: "Name of the directory."

storage:
  settings:
    index_granularity: "1024"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: traversal_path, type: "String", codec: ["ZSTD(1)"]}
    - {name: project_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: branch, type: "String", codec: ["ZSTD(1)"]}
    - {name: commit_sha, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: path, type: "String", codec: ["ZSTD(3)"]}
    - {name: name, type: "String", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_path, column: path, type: "text(tokenizer = splitByString(['/']))", granularity: 1}
    - {name: idx_path_ngram, column: path, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: lightweight, name: by_project_id, order_by: [project_id]}
    - {type: lightweight, name: by_branch, order_by: [branch]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
