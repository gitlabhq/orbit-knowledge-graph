# config/ontology/nodes/source_code/definition.yaml

node_type: Definition
domain: source_code
description: A code definition such as a class, function, method, or module
label: name
destination_table: gl_definition
default_columns: [id, name, fqn, definition_type, file_path]
sort_key: [traversal_path, project_id, branch, id]

style:
  size: 26
  color: "#2DD4BF"

redaction:
  resource_type: project
  id_column: project_id
  ability: read_code

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Unique identifier for the definition node."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

  project_id:
    type: int64
    source: project_id
    nullable: false
    description: "ID of the project this definition belongs to."

  branch:
    type: string
    source: branch
    nullable: false
    description: "Git branch where this definition exists."

  commit_sha:
    type: string
    source: commit_sha
    nullable: false
    description: "Commit SHA at which this definition was indexed."

  file_path:
    type: string
    source: file_path
    nullable: false
    description: "Path of the file containing this definition."

  fqn:
    type: string
    source: fqn
    nullable: false
    description: "Fully qualified name of the definition (e.g., MyModule::MyClass#my_method)."

  name:
    type: string
    source: name
    nullable: false
    description: "Short name of the definition."

  definition_type:
    type: string
    source: definition_type
    nullable: false
    description: "Type of code definition. Language-specific values include: Class, Module, Method, Function, Struct, Enum, Trait, Lambda, etc."

  start_line:
    type: int64
    source: start_line
    nullable: false
    description: "Starting line number of the definition."

  end_line:
    type: int64
    source: end_line
    nullable: false
    description: "Ending line number of the definition."

  start_byte:
    type: int64
    source: start_byte
    nullable: false
    description: "Starting byte offset of the definition in the file."

  end_byte:
    type: int64
    source: end_byte
    nullable: false
    description: "Ending byte offset of the definition in the file."

  content:
    type: string
    virtual:
      service: gitaly
      lookup: blob_content
      depends_on: [project_id, commit_sha, branch, file_path, start_byte, end_byte]
    nullable: true
    description: "Source text of the definition. Resolved from Gitaly at query time using start_byte/end_byte."

storage:
  settings:
    index_granularity: "1024"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: traversal_path, type: "String", codec: ["ZSTD(1)"]}
    - {name: project_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: branch, type: "String", codec: ["ZSTD(1)"]}
    - {name: commit_sha, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: file_path, type: "String", codec: ["ZSTD(3)"]}
    - {name: fqn, type: "String", codec: ["ZSTD(3)"]}
    - {name: name, type: "String", codec: ["ZSTD(1)"]}
    - {name: definition_type, type: "LowCardinality(String)", codec: ["LZ4"]}
    - {name: start_line, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: end_line, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: start_byte, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: end_byte, type: "Int64", codec: ["Delta(8)", "LZ4"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_fqn, column: fqn, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_fqn_ngram, column: fqn, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_file_path, column: file_path, type: "text(tokenizer = splitByString(['/']))", granularity: 1}
    - {name: idx_file_path_ngram, column: file_path, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_definition_type, column: definition_type, type: "set(20)", granularity: 2}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
