# config/ontology/nodes/source_code/definition.yaml

node_type: Definition
domain: source_code
description: A code definition such as a class, function, method, or module
label: name
destination_table: gl_definition
default_columns: [id, name, fqn, definition_type, file_path, commit_sha, start_line, end_line]
sort_key: [traversal_path, project_id, branch, id]

style:
  size: 26
  color: "#2DD4BF"

redaction:
  resource_type: project
  id_column: project_id
  ability: read_code

properties:
  id:
    type: int64
    source: id
    nullable: false
    immutable: true
    description: "Unique ID."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

  project_id:
    type: int64
    source: project_id
    nullable: false
    immutable: true
    description: "Owning project ID."

  branch:
    type: string
    source: branch
    nullable: false
    immutable: true
    description: "Git branch."

  commit_sha:
    type: string
    source: commit_sha
    nullable: false
    immutable: true
    description: "Indexed commit SHA."

  file_path:
    type: string
    source: file_path
    nullable: false
    immutable: true
    description: "Containing file path."

  fqn:
    type: string
    source: fqn
    nullable: false
    immutable: true
    description: "Fully qualified name (e.g., MyModule::MyClass#my_method)."

  name:
    type: string
    source: name
    nullable: false
    immutable: true
    description: "Short name."

  definition_type:
    type: string
    source: definition_type
    nullable: false
    immutable: true
    description: "Definition kind (e.g., Class, Module, Method, Function, Struct, Enum, Trait, Lambda)."
    selectivity: low

  start_line:
    type: int64
    source: start_line
    nullable: false
    immutable: true
    description: "Start line."

  end_line:
    type: int64
    source: end_line
    nullable: false
    immutable: true
    description: "End line."

  start_byte:
    type: int64
    source: start_byte
    nullable: false
    immutable: true
    description: "Start byte offset."

  end_byte:
    type: int64
    source: end_byte
    nullable: false
    immutable: true
    description: "End byte offset."

  start_char:
    type: int64
    source: start_char
    nullable: false
    immutable: true
    description: "Start column."

  end_char:
    type: int64
    source: end_char
    nullable: false
    immutable: true
    description: "End column."

  content:
    type: string
    virtual:
      service: gitaly
      lookup: blob_content
      depends_on: [project_id, commit_sha, branch, file_path, start_byte, end_byte]
    nullable: true
    description: "Source text, resolved from Gitaly via start_byte/end_byte."

storage:
  settings:
    allow_part_offset_column_in_projections: "1"
    index_granularity: "1024"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: traversal_path, type: "String", codec: ["ZSTD(1)"]}
    - {name: project_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: branch, type: "String", codec: ["ZSTD(1)"]}
    - {name: commit_sha, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: file_path, type: "String", codec: ["ZSTD(3)"]}
    - {name: fqn, type: "String", codec: ["ZSTD(3)"]}
    - {name: name, type: "String", codec: ["ZSTD(1)"]}
    - {name: definition_type, type: "LowCardinality(String)", codec: ["LZ4"]}
    - {name: start_line, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: end_line, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: start_byte, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: end_byte, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: start_char, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: end_char, type: "Int64", codec: ["Delta(8)", "LZ4"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_project_id, column: project_id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_fqn, column: fqn, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_fqn_ngram, column: fqn, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_file_path, column: file_path, type: "text(tokenizer = splitByString(['/']))", granularity: 1}
    - {name: idx_file_path_ngram, column: file_path, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_definition_type, column: definition_type, type: "set(20)", granularity: 2}
  projections:
    - {type: lightweight, name: by_id, versioned_sort_key: [id]}
    - {type: lightweight, name: by_project_id, versioned_sort_key: [project_id]}
    - {type: lightweight, name: by_branch, versioned_sort_key: [branch]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
