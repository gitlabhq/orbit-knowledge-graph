# config/ontology/nodes/container_registry/container_repository.yaml

node_type: ContainerRepository
domain: container_registry
description: A container image repository in a project's container registry
label: name
destination_table: gl_container_repository
default_columns: [id, name, status]

style:
  size: 30
  color: "#22D3EE"

redaction:
  resource_type: container_repository
  id_column: id
  ability: read_container_image

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Unique ID."

  name:
    type: string
    source: name
    nullable: false
    description: "Repository name (path within the project)."

  # Source siphon_container_repositories.status is Nullable(Int16); NULL is the
  # active/ready state and coerces to the '' storage default, so the materialized
  # column is never NULL. Declared non-nullable to mirror Pipeline.failure_reason
  # (also a nullable source enum stored non-nullable), keeping enum columns
  # consistent across the ontology.
  status:
    type: enum
    source: status
    nullable: false
    description: "Deletion lifecycle status. Empty string when the repository is active (no deletion scheduled)."
    values:
      0: delete_scheduled
      1: delete_failed
      2: delete_ongoing

  created_at:
    type: timestamp
    source: created_at
    nullable: false
    description: "Creation timestamp."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: false
    description: "Last update timestamp."

  project_id:
    type: int64
    source: project_id
    nullable: false
    description: "Owning project ID."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

indexer:
  reindex: [siphon_container_repositories]
pipelines:
  - name: ContainerRepository
    extract:
      type: clickhouse
      tables: [siphon_container_repositories]
      order_by: [traversal_path, id]
      query: generated
    transform:
      type: datafusion
      edges:
        - from:
            field: id
            kind: ContainerRepository
          to:
            field: project_id
            kind: Project
          label: IN_PROJECT
storage:
  primary_key: [traversal_path, id]
  settings:
    add_minmax_index_for_temporal_columns: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["T64", "ZSTD(1)"]}
    - {name: name, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: status, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: created_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: project_id, type: "Int64", codec: ["T64", "ZSTD(1)"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_name, column: name, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_status, column: status, type: "set(4)", granularity: 2}
    - {name: idx_created_at, column: created_at, type: "minmax", granularity: 1}
    - {name: idx_updated_at, column: updated_at, type: "minmax", granularity: 1}
    - {name: idx_project_id, column: project_id, type: "bloom_filter(0.0001)", granularity: 1}
