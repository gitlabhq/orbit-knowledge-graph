# config/ontology/nodes/code_review/merge_request_diff.yaml

node_type: MergeRequestDiff
domain: code_review
description: A snapshot of changes (commits and file diffs) associated with a merge request at a point in time
label: id
destination_table: gl_merge_request_diff
default_columns: [id, merge_request_id, state]

style:
  size: 22
  color: "#D97706"

redaction:
  resource_type: merge_request
  id_column: merge_request_id
  ability: read_merge_request

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Unique ID."

  merge_request_id:
    type: int64
    source: merge_request_id
    nullable: false
    description: "Parent merge request ID."

  state:
    type: string
    source: state
    nullable: false
    description: "Diff state: empty, without_files, collected, overflow. Deprecated values may still appear: timeout, overflow_commits_safe_size, overflow_diff_files_limit, overflow_diff_lines_limit."

  base_commit_sha:
    type: string
    source: base_commit_sha
    nullable: false
    description: "Base commit SHA (common ancestor)."

  head_commit_sha:
    type: string
    source: head_commit_sha
    nullable: false
    description: "Head commit SHA (latest on source branch)."

  start_commit_sha:
    type: string
    source: start_commit_sha
    nullable: false
    description: "Start commit SHA (target branch tip at diff creation)."

  commits_count:
    type: int64
    source: commits_count
    nullable: true
    description: "Number of commits."

  files_count:
    type: int64
    source: files_count
    nullable: true
    description: "Number of files changed."

  project_id:
    type: int64
    source: project_id
    nullable: false
    description: "Owning project ID."

  diff_type:
    type: enum
    source: diff_type
    nullable: false
    description: "Source branch (regular) or merge-head state."
    values:
      1: regular
      2: merge_head

  real_size:
    type: string
    source: real_size
    nullable: false
    description: "Non-truncated diff size from Gitaly, as a stringified integer."

  stored_externally:
    type: boolean
    source: stored_externally
    nullable: false
    description: "Whether diff content is in external object storage."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Creation timestamp."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Last update timestamp."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path used for authorization scoping. Filter with `starts_with` to scope a query to all entities under a namespace (for example, all projects in a group, including all subgroups)."

  patch:
    type: string
    nullable: true
    virtual:
      service: gitaly
      lookup: raw_patch
      depends_on: [project_id, id]
    description: "Full unified patch. Resolved from GitLab at query time."

etl:
  type: table
  scope: namespaced
  source: siphon_merge_request_diffs
  order_by: [traversal_path, merge_request_id, id]
  edges:
    merge_request_id:
      to: MergeRequest
      as: HAS_DIFF
      direction: incoming
    project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing

storage:
  primary_key: [traversal_path, id]
  settings:
    add_minmax_index_for_temporal_columns: "1"
    allow_part_offset_column_in_projections: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: merge_request_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: state, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: base_commit_sha, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: head_commit_sha, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: start_commit_sha, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: commits_count, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: files_count, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: project_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: diff_type, type: "LowCardinality(String)", default: "'regular'", codec: ["LZ4"]}
    - {name: real_size, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: stored_externally, type: "Bool", default: "false"}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: lightweight, name: by_merge_request_id, order_by: [merge_request_id]}
    - {type: lightweight, name: by_project_id, order_by: [project_id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
