# config/ontology/nodes/code_review/merge_request_diff_file.yaml

node_type: MergeRequestDiffFile
domain: code_review
description: A file changed in a merge request diff
label: new_path
destination_table: gl_merge_request_diff_file
default_columns: [id, new_path, old_path, new_file, deleted_file]

style:
  size: 20
  color: "#B45309"

redaction:
  resource_type: merge_request
  id_column: merge_request_id
  ability: read_merge_request

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Synthetic identifier: sipHash64(merge_request_diff_id, relative_order)."

  merge_request_id:
    type: int64
    source: merge_request_id
    nullable: false
    description: "ID of the parent merge request."

  merge_request_diff_id:
    type: int64
    source: merge_request_diff_id
    nullable: false
    description: "ID of the merge request diff this file belongs to."

  project_id:
    type: int64
    source: project_id
    nullable: false
    description: "ID of the project the parent merge request belongs to."

  too_large:
    type: boolean
    source: too_large
    nullable: false
    description: "Whether the diff is too large to display."

  new_path:
    type: string
    source: new_path
    nullable: true
    description: "Path to the file after the change."

  old_path:
    type: string
    source: old_path
    nullable: false
    description: "Path to the file before the change."

  new_file:
    type: boolean
    source: new_file
    nullable: false
    description: "Whether this is a newly added file."

  renamed_file:
    type: boolean
    source: renamed_file
    nullable: false
    description: "Whether this file was renamed."

  deleted_file:
    type: boolean
    source: deleted_file
    nullable: false
    description: "Whether this file was deleted."

  binary:
    type: boolean
    source: binary
    nullable: true
    description: "Whether this is a binary file."

  generated:
    type: boolean
    source: generated
    nullable: true
    description: "Whether this file is considered auto-generated (e.g. lockfiles, minified bundles)."

  a_mode:
    type: string
    source: a_mode
    nullable: false
    description: "File mode before the change (Git mode bits, e.g. 100644)."

  b_mode:
    type: string
    source: b_mode
    nullable: false
    description: "File mode after the change (Git mode bits, e.g. 100755)."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

  diff:
    type: string
    nullable: true
    virtual:
      service: mr_diff
      lookup: patch
      disabled: true
      depends_on:
        - project_id
        - merge_request_diff_id
        - old_path
        - new_path
        - too_large
    description: "Per-file unified diff text. Resolved from GitLab at query time. Null when too_large is true."

etl:
  type: query
  scope: namespaced
  select: >-
    sipHash64(file.merge_request_diff_id, file.relative_order) AS id,
    diff.merge_request_id AS merge_request_id,
    file.merge_request_diff_id AS merge_request_diff_id,
    diff.project_id AS project_id,
    file.too_large AS too_large, file.new_path AS new_path,
    file.old_path AS old_path, file.new_file AS new_file,
    file.renamed_file AS renamed_file, file.deleted_file AS deleted_file,
    file.binary AS binary,
    file.generated AS generated,
    file.a_mode AS a_mode, file.b_mode AS b_mode,
    file.traversal_path AS traversal_path,
    file.relative_order AS relative_order
  from: >-
    siphon_merge_request_diff_files file
    INNER JOIN (
      SELECT id, merge_request_id, project_id
      FROM siphon_merge_request_diffs
      WHERE startsWith(traversal_path, {traversal_path:String})
    ) diff ON file.merge_request_diff_id = diff.id
  traversal_path_filter: "startsWith(file.traversal_path, {traversal_path:String})"
  watermark: file._siphon_replicated_at
  deleted: file._siphon_deleted
  order_by: [traversal_path, merge_request_diff_id, relative_order]
  edges:
    merge_request_diff_id:
      to: MergeRequestDiff
      as: HAS_FILE
      direction: incoming

storage:
  primary_key: [traversal_path, id]
  settings:
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: merge_request_id, type: "Int64", codec: ["ZSTD(1)"]}
    - {name: merge_request_diff_id, type: "Int64", codec: ["ZSTD(1)"]}
    - {name: project_id, type: "Int64", codec: ["ZSTD(1)"]}
    - {name: too_large, type: "Bool", default: "false"}
    - {name: new_path, type: "Nullable(String)", codec: ["ZSTD(3)"]}
    - {name: old_path, type: "String", default: "''", codec: ["ZSTD(3)"]}
    - {name: new_file, type: "Bool", default: "false"}
    - {name: renamed_file, type: "Bool", default: "false"}
    - {name: deleted_file, type: "Bool", default: "false"}
    - {name: binary, type: "Nullable(Bool)"}
    - {name: generated, type: "Nullable(Bool)"}
    - {name: a_mode, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: b_mode, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_too_large, column: too_large, type: "minmax", granularity: 1}
    - {name: idx_new_file, column: new_file, type: "minmax", granularity: 1}
    - {name: idx_renamed_file, column: renamed_file, type: "minmax", granularity: 1}
    - {name: idx_deleted_file, column: deleted_file, type: "minmax", granularity: 1}
    - {name: idx_binary, column: binary, type: "minmax", granularity: 1}
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_new_path, column: new_path, type: "text(tokenizer = splitByString(['/']))", granularity: 1}
    - {name: idx_new_path_ngram, column: new_path, type: "ngrambf_v1(3, 256, 2, 0)", granularity: 1}
    - {name: idx_old_path, column: old_path, type: "text(tokenizer = splitByString(['/']))", granularity: 1}
    - {name: idx_old_path_ngram, column: old_path, type: "ngrambf_v1(3, 256, 2, 0)", granularity: 1}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
