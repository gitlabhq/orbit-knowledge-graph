# config/ontology/nodes/code_review/merge_request.yaml

node_type: MergeRequest
domain: code_review
description: A merge request for code review and merging changes into a target branch
label: title
destination_table: gl_merge_request
default_columns: [id, iid, title, state, source_branch, target_branch]

style:
  size: 28
  color: "#F59E0B"

redaction:
  resource_type: merge_request
  id_column: id
  ability: read_merge_request

properties:
  id:
    type: int64
    source: id
    nullable: false
    mutable: false
    description: "Unique ID."
    traversal_path_lookup:
      kind: id
      source_table: gl_merge_request
      key_column: id

  iid:
    type: int64
    source: iid
    nullable: true
    mutable: false
    description: "Project-scoped merge request number."

  title:
    type: string
    source: title
    nullable: false
    description: "Title."

  description:
    type: string
    source: description
    nullable: false
    description: "Description body (markdown)."

  source_branch:
    type: string
    source: source_branch
    nullable: false
    description: "Source branch name."

  target_branch:
    type: string
    source: target_branch
    nullable: false
    description: "Target branch name."

  state:
    type: enum
    source: state_id
    nullable: false
    description: "Current state."
    values:
      1: opened
      2: closed
      3: merged
      4: locked
    terminal_values: [merged]

  merge_status:
    type: string
    source: merge_status
    nullable: false
    description: "Mergeability status: unchecked, preparing, checking, can_be_merged, cannot_be_merged, cannot_be_merged_recheck, cannot_be_merged_rechecking."
    selectivity: low

  draft:
    type: boolean
    source: draft
    nullable: false
    description: "Whether this is a draft/WIP merge request."

  squash:
    type: boolean
    source: squash
    nullable: false
    description: "Whether to squash commits on merge."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    mutable: false
    description: "Creation timestamp."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Last update timestamp."

  merge_commit_sha:
    type: string
    source: merge_commit_sha
    nullable: false
    description: "Merge commit SHA."

  discussion_locked:
    type: boolean
    source: discussion_locked
    nullable: true
    description: "Whether discussions are locked."

  prepared_at:
    type: timestamp
    source: prepared_at
    nullable: true
    description: "Preparation timestamp."

  project_id:
    type: int64
    source: target_project_id
    nullable: false
    mutable: false
    description: "Owning project ID. Stored on the node for redaction without an edge lookup."

  merged_commit_sha:
    type: string
    source: merged_commit_sha
    nullable: false
    description: "Commit SHA landed on target branch (may differ from merge_commit_sha for fast-forward merges)."

  squash_commit_sha:
    type: string
    source: squash_commit_sha
    nullable: false
    description: "Squash commit SHA, if squashed."

  merged_commit_id:
    type: int64
    source: merged_commit_id
    nullable: true
    mutable: false
    description: "Synthetic Commit id the MR was merged at. The approach mirrors Rails' MergeRequest#merged_commit_sha fallback but stops at squash_commit_sha. Write-once: NULL until merged, set once at merge, never rewritten by user action -> immutable, so the stale-edge sweep skips it."

  latest_build_started_at:
    type: timestamp
    source: metric_latest_build_started_at
    nullable: true
    description: "Latest CI build start timestamp."

  latest_build_finished_at:
    type: timestamp
    source: metric_latest_build_finished_at
    nullable: true
    description: "Latest CI build finish timestamp."

  first_deployed_to_production_at:
    type: timestamp
    source: metric_first_deployed_to_production_at
    nullable: true
    description: "First production deployment timestamp."

  merged_at:
    type: timestamp
    source: metric_merged_at
    nullable: true
    description: "Merge timestamp."

  latest_closed_at:
    type: timestamp
    source: metric_latest_closed_at
    nullable: true
    description: "Most recent close timestamp."

  first_comment_at:
    type: timestamp
    source: metric_first_comment_at
    nullable: true
    description: "First comment timestamp."

  first_commit_at:
    type: timestamp
    source: metric_first_commit_at
    nullable: true
    description: "First commit authored timestamp."

  last_commit_at:
    type: timestamp
    source: metric_last_commit_at
    nullable: true
    description: "Last commit authored timestamp."

  diff_size:
    type: int64
    source: metric_diff_size
    nullable: true
    description: "Total diff size in bytes."

  modified_paths_size:
    type: int64
    source: metric_modified_paths_size
    nullable: true
    description: "Number of modified file paths."

  commits_count:
    type: int64
    source: metric_commits_count
    nullable: true
    description: "Number of commits."

  first_approved_at:
    type: timestamp
    source: metric_first_approved_at
    nullable: true
    description: "First approval timestamp."

  first_reassigned_at:
    type: timestamp
    source: metric_first_reassigned_at
    nullable: true
    description: "First reassignment timestamp."

  added_lines:
    type: int64
    source: metric_added_lines
    nullable: true
    description: "Lines added across all files."

  removed_lines:
    type: int64
    source: metric_removed_lines
    nullable: true
    description: "Lines removed across all files."

  first_contribution:
    type: boolean
    source: metric_first_contribution
    nullable: false
    description: "Whether this is the author's first contribution to the project."

  reviewer_first_assigned_at:
    type: timestamp
    source: metric_reviewer_first_assigned_at
    nullable: true
    description: "First reviewer assignment timestamp."

  author_id:
    type: int64
    source: author_id
    nullable: true
    mutable: false
    description: "Author user ID."

  merge_user_id:
    type: int64
    source: merge_user_id
    nullable: true
    description: "User ID who merged."

  updated_by_id:
    type: int64
    source: updated_by_id
    nullable: true
    description: "User ID who last updated."

  last_edited_by_id:
    type: int64
    source: last_edited_by_id
    nullable: true
    description: "User ID who last edited the description."

  closed_by_id:
    type: int64
    source: metric_latest_closed_by_id
    nullable: true
    description: "User ID who most recently closed."

  milestone_id:
    type: int64
    source: milestone_id
    nullable: true
    description: "Associated milestone ID."

  source_project_id:
    type: int64
    source: source_project_id
    nullable: true
    mutable: false
    description: "Source project ID (may differ from target for cross-project MRs)."

  head_pipeline_id:
    type: int64
    source: head_pipeline_id
    nullable: true
    description: "Pipeline ID on the head commit."

  latest_merge_request_diff_id:
    type: int64
    source: latest_merge_request_diff_id
    nullable: true
    description: "Most recent diff snapshot ID."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

  diff:
    type: string
    nullable: true
    virtual:
      service: gitaly
      lookup: mr_raw_patch
      depends_on: [project_id, iid]
    description: "Full unified diff. Resolved from GitLab at query time."

etl:
  # Resolves metric_*, reviewers and approvals from siphon sources at extract
  # time because the upstream `merge_requests_mv` only re-fires on parent
  # inserts and routinely leaves those columns NULL on the destination.
  #
  # MERGED_AT_COMMIT uses a synthetic FK because Siphon does not expose a commit
  # table. The FK is sipHash64(target_project_id, decoded_sha), masked positive so
  # it can share Commit.id's Int64 keyset cursor safely. Only merged MRs emit it.
  # decoded_sha is COALESCE(merged_commit_sha, merge_commit_sha, squash_commit_sha);
  # merged_commit_sha is hex-of-ASCII bytea (pre-siphon!475: unhex; post-fix:
  # clean ASCII pass-through). squash_commit_sha is raw-binary bytea, format-robust
  # across siphon!475: `\x`-prefixed -> strip `\x`; raw binary -> lower(hex()).
  # merge_commit_sha is clean varchar. See siphon#248.
  #
  # Keep decoded_sha and the masked hash expression in sync with commit.yaml, or
  # MERGED_AT_COMMIT points at a Commit node that was never emitted. See #924.
  type: query
  source: merge_requests
  select: >-
    m.id AS id,
    m.iid AS iid,
    m.title AS title,
    m.description AS description,
    m.source_branch AS source_branch,
    m.target_branch AS target_branch,
    m.state_id AS state_id,
    m.merge_status AS merge_status,
    m.draft AS draft,
    m.squash AS squash,
    m.created_at AS created_at,
    m.updated_at AS updated_at,
    m.merge_commit_sha AS merge_commit_sha,
    m.discussion_locked AS discussion_locked,
    m.prepared_at AS prepared_at,
    m.target_project_id AS target_project_id,
    m.source_project_id AS source_project_id,
    m.head_pipeline_id AS head_pipeline_id,
    m.latest_merge_request_diff_id AS latest_merge_request_diff_id,
    m.author_id AS author_id,
    m.merge_user_id AS merge_user_id,
    m.updated_by_id AS updated_by_id,
    m.last_edited_by_id AS last_edited_by_id,
    m.milestone_id AS milestone_id,
    m.merged_commit_sha AS merged_commit_sha,
    m.squash_commit_sha AS squash_commit_sha,
    if(
      m.state_id = 3 AND m.decoded_sha IS NOT NULL,
      toInt64(bitAnd(sipHash64(m.target_project_id, m.decoded_sha), toUInt64(9223372036854775807))),
      NULL
    ) AS merged_commit_id,
    m.traversal_path AS traversal_path,
    metrics.metric_latest_build_started_at AS metric_latest_build_started_at,
    metrics.metric_latest_build_finished_at AS metric_latest_build_finished_at,
    metrics.metric_first_deployed_to_production_at AS metric_first_deployed_to_production_at,
    metrics.metric_merged_at AS metric_merged_at,
    metrics.metric_latest_closed_at AS metric_latest_closed_at,
    metrics.metric_latest_closed_by_id AS metric_latest_closed_by_id,
    metrics.metric_first_comment_at AS metric_first_comment_at,
    metrics.metric_first_commit_at AS metric_first_commit_at,
    metrics.metric_last_commit_at AS metric_last_commit_at,
    metrics.metric_diff_size AS metric_diff_size,
    metrics.metric_modified_paths_size AS metric_modified_paths_size,
    metrics.metric_commits_count AS metric_commits_count,
    metrics.metric_first_approved_at AS metric_first_approved_at,
    metrics.metric_first_reassigned_at AS metric_first_reassigned_at,
    metrics.metric_added_lines AS metric_added_lines,
    metrics.metric_removed_lines AS metric_removed_lines,
    ifNull(metrics.metric_first_contribution, false) AS metric_first_contribution,
    metrics.metric_reviewer_first_assigned_at AS metric_reviewer_first_assigned_at,
    ifNull(reviewers.reviewers, CAST([], 'Array(Tuple(user_id UInt64, state Int16, created_at DateTime64(6, ''UTC'')))')) AS reviewers,
    ifNull(approvals.approvals, CAST([], 'Array(Tuple(user_id UInt64, created_at DateTime64(6, ''UTC'')))')) AS approvals
  # The siphon JOIN subqueries narrow themselves to merge_request_ids in the
  # current watermark window via the inner `IN (SELECT id FROM merge_requests
  # WHERE {{watermark_column}} > ...)` filter, so per-batch memory stays
  # bounded by batch size rather than namespace size. Without this, ClickHouse
  # aggregates over every metrics/reviewers/approvals row in the namespace on
  # every batch (~2 GB peak on 1/9970/ for what should be a 30-row batch).
  from: >-
    (
      SELECT
        *,
        coalesce(
          if(
            startsWith(merged_commit_sha, '\\x'),
            unhex(substring(merged_commit_sha, 3)),
            nullIf(merged_commit_sha, '')
          ),
          nullIf(merge_commit_sha, ''),
          if(
            startsWith(squash_commit_sha, '\\x'),
            substring(squash_commit_sha, 3),
            lower(hex(nullIf(squash_commit_sha, '')))
          )
        ) AS decoded_sha
      FROM merge_requests
    ) AS m LEFT JOIN (
      SELECT
        traversal_path AS _mt_tp,
        merge_request_id AS _mt_mr,
        argMax(latest_build_started_at, {{watermark_column}}) AS metric_latest_build_started_at,
        argMax(latest_build_finished_at, {{watermark_column}}) AS metric_latest_build_finished_at,
        argMax(first_deployed_to_production_at, {{watermark_column}}) AS metric_first_deployed_to_production_at,
        argMax(merged_at, {{watermark_column}}) AS metric_merged_at,
        argMax(latest_closed_at, {{watermark_column}}) AS metric_latest_closed_at,
        argMax(latest_closed_by_id, {{watermark_column}}) AS metric_latest_closed_by_id,
        argMax(first_comment_at, {{watermark_column}}) AS metric_first_comment_at,
        argMax(first_commit_at, {{watermark_column}}) AS metric_first_commit_at,
        argMax(last_commit_at, {{watermark_column}}) AS metric_last_commit_at,
        argMax(diff_size, {{watermark_column}}) AS metric_diff_size,
        argMax(modified_paths_size, {{watermark_column}}) AS metric_modified_paths_size,
        argMax(commits_count, {{watermark_column}}) AS metric_commits_count,
        argMax(first_approved_at, {{watermark_column}}) AS metric_first_approved_at,
        argMax(first_reassigned_at, {{watermark_column}}) AS metric_first_reassigned_at,
        argMax(added_lines, {{watermark_column}}) AS metric_added_lines,
        argMax(removed_lines, {{watermark_column}}) AS metric_removed_lines,
        argMax(first_contribution, {{watermark_column}}) AS metric_first_contribution,
        argMax(reviewer_first_assigned_at, {{watermark_column}}) AS metric_reviewer_first_assigned_at,
        argMax({{deleted_column}}, {{watermark_column}}) AS deleted
      FROM siphon_merge_request_metrics
      WHERE startsWith(traversal_path, {traversal_path:String})
        AND merge_request_id IN (
          SELECT id FROM merge_requests
          WHERE startsWith(traversal_path, {traversal_path:String})
            AND {{watermark_column}} > {last_watermark:String}
            AND {{watermark_column}} <= {watermark:String}
        )
      GROUP BY traversal_path, merge_request_id
      HAVING deleted = false
    ) AS metrics ON m.traversal_path = metrics._mt_tp AND m.id = metrics._mt_mr
    LEFT JOIN (
      SELECT
        traversal_path AS _rv_tp,
        merge_request_id AS _rv_mr,
        CAST(
          groupArrayIf((toUInt64(user_id), state, created_at), deleted = false),
          'Array(Tuple(user_id UInt64, state Int16, created_at DateTime64(6, ''UTC'')))'
        ) AS reviewers
      FROM (
        SELECT
          traversal_path,
          merge_request_id,
          id,
          argMax(user_id, {{watermark_column}}) AS user_id,
          argMax(state, {{watermark_column}}) AS state,
          argMax(created_at, {{watermark_column}}) AS created_at,
          argMax({{deleted_column}}, {{watermark_column}}) AS deleted
        FROM siphon_merge_request_reviewers
        WHERE startsWith(traversal_path, {traversal_path:String})
          AND merge_request_id IN (
            SELECT id FROM merge_requests
            WHERE startsWith(traversal_path, {traversal_path:String})
              AND {{watermark_column}} > {last_watermark:String}
              AND {{watermark_column}} <= {watermark:String}
          )
        GROUP BY traversal_path, merge_request_id, id
      )
      GROUP BY traversal_path, merge_request_id
    ) AS reviewers ON m.traversal_path = reviewers._rv_tp AND m.id = reviewers._rv_mr
    LEFT JOIN (
      SELECT
        traversal_path AS _ap_tp,
        merge_request_id AS _ap_mr,
        CAST(
          groupArrayIf((toUInt64(user_id), created_at), deleted = false),
          'Array(Tuple(user_id UInt64, created_at DateTime64(6, ''UTC'')))'
        ) AS approvals
      FROM (
        SELECT
          traversal_path,
          merge_request_id,
          id,
          argMax(user_id, {{watermark_column}}) AS user_id,
          argMax(created_at, {{watermark_column}}) AS created_at,
          argMax({{deleted_column}}, {{watermark_column}}) AS deleted
        FROM siphon_approvals
        WHERE startsWith(traversal_path, {traversal_path:String})
          AND merge_request_id IN (
            SELECT id FROM merge_requests
            WHERE startsWith(traversal_path, {traversal_path:String})
              AND {{watermark_column}} > {last_watermark:String}
              AND {{watermark_column}} <= {watermark:String}
          )
        GROUP BY traversal_path, merge_request_id, id
      )
      GROUP BY traversal_path, merge_request_id
    ) AS approvals ON m.traversal_path = approvals._ap_tp AND m.id = approvals._ap_mr
  watermark: m.{{watermark_column}}
  table_alias: m
  deleted: m.{{deleted_column}}
  traversal_path_filter: "startsWith(m.traversal_path, {traversal_path:String})"
  order_by: [traversal_path, id]
  reindex_on: [merge_requests, siphon_merge_request_metrics, siphon_merge_request_reviewers, siphon_approvals]
  edges:
    target_project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing
    source_project_id:
      to: Project
      as: SOURCE_PROJECT
      direction: outgoing
    head_pipeline_id:
      to: Pipeline
      as: HAS_HEAD_PIPELINE
      direction: outgoing
      mutable: true
    # Not marked mutable: Rails treats merged MRs as terminal and does not rewrite
    # the merge commit SHA after merge. If an upstream datalake correction changes
    # that SHA later, the old MERGED_AT_COMMIT edge can remain until re-indexed.
    merged_commit_id:
      to: Commit
      as: MERGED_AT_COMMIT
      direction: outgoing
    latest_merge_request_diff_id:
      to: MergeRequestDiff
      as: HAS_LATEST_DIFF
      direction: outgoing
      mutable: true
    author_id:
      to: User
      as: AUTHORED
      direction: incoming
    merge_user_id:
      to: User
      as: MERGED
      direction: incoming
    updated_by_id:
      to: User
      as: UPDATED_BY
      direction: incoming
      mutable: true
    last_edited_by_id:
      to: User
      as: LAST_EDITED_BY
      direction: incoming
      mutable: true
    metric_latest_closed_by_id:
      to: User
      as: CLOSED
      direction: incoming
    milestone_id:
      to: Milestone
      as: IN_MILESTONE
      direction: outgoing
      mutable: true
    reviewers:
      to: User
      as: REVIEWER
      direction: incoming
      array_field: user_id
    approvals:
      to: User
      as: APPROVED
      direction: incoming
      array_field: user_id

storage:
  primary_key: [traversal_path, id]
  settings:
    add_minmax_index_for_temporal_columns: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["T64", "ZSTD(1)"]}
    - {name: iid, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: title, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: description, type: "String", default: "''", codec: ["ZSTD(3)"]}
    - {name: source_branch, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: target_branch, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: state, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: merge_status, type: "LowCardinality(String)", default: "'unchecked'", codec: ["LZ4"]}
    - {name: draft, type: "Bool", default: "false"}
    - {name: squash, type: "Bool", default: "false"}
    - {name: created_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: merge_commit_sha, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: discussion_locked, type: "Nullable(Bool)"}
    - {name: prepared_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: project_id, type: "Int64", codec: ["T64", "ZSTD(1)"]}
    - {name: merged_commit_sha, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: squash_commit_sha, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: latest_build_started_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: latest_build_finished_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: first_deployed_to_production_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: merged_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: latest_closed_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: first_comment_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: first_commit_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: last_commit_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: diff_size, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: modified_paths_size, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: commits_count, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: first_approved_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: first_reassigned_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: added_lines, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: removed_lines, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: first_contribution, type: "Bool", default: "false"}
    - {name: reviewer_first_assigned_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: author_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: merge_user_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: updated_by_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: last_edited_by_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: closed_by_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: milestone_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: source_project_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: head_pipeline_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: latest_merge_request_diff_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: merged_commit_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_state, column: state, type: "set(6)", granularity: 2}
    - {name: idx_draft, column: draft, type: "minmax", granularity: 1}
    - {name: idx_squash, column: squash, type: "minmax", granularity: 1}
    - {name: idx_discussion_locked, column: discussion_locked, type: "minmax", granularity: 1}
    - {name: idx_first_contribution, column: first_contribution, type: "minmax", granularity: 1}
    - {name: idx_created_at, column: created_at, type: "minmax", granularity: 1}
    - {name: idx_updated_at, column: updated_at, type: "minmax", granularity: 1}
    - {name: idx_merged_at, column: merged_at, type: "minmax", granularity: 1}
