# config/ontology/nodes/code_review/merge_request.yaml

node_type: MergeRequest
domain: code_review
description: A merge request for code review and merging changes into a target branch
label: title
destination_table: gl_merge_request
default_columns: [id, iid, title, state, source_branch, target_branch]

style:
  size: 28
  color: "#F59E0B"

redaction:
  resource_type: merge_request
  id_column: id
  ability: read_merge_request

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the merge request."

  iid:
    type: int64
    source: iid
    nullable: true
    description: "Project-scoped merge request number."

  title:
    type: string
    source: title
    nullable: true
    description: "Title of the merge request."

  description:
    type: string
    source: description
    nullable: true
    description: "Description body (markdown)."

  source_branch:
    type: string
    source: source_branch
    nullable: false
    description: "Name of the source branch."

  target_branch:
    type: string
    source: target_branch
    nullable: false
    description: "Name of the target branch."

  state:
    type: enum
    source: state_id
    nullable: false
    description: "Current state of the merge request."
    values:
      1: opened
      2: closed
      3: merged
      4: locked

  merge_status:
    type: string
    source: merge_status
    nullable: false
    description: "Mergeability check status (unchecked, preparing, checking, can_be_merged, cannot_be_merged, etc.)."

  draft:
    type: boolean
    source: draft
    nullable: false
    description: "Whether this is a draft/WIP merge request."

  squash:
    type: boolean
    source: squash
    nullable: false
    description: "Whether to squash commits on merge."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Timestamp when the merge request was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Timestamp when the merge request was last updated."

  merge_commit_sha:
    type: string
    source: merge_commit_sha
    nullable: true
    description: "SHA of the merge commit."

  discussion_locked:
    type: boolean
    source: discussion_locked
    nullable: true
    description: "Whether discussions are locked."

  prepared_at:
    type: timestamp
    source: prepared_at
    nullable: true
    description: "Timestamp when the merge request was prepared."

  project_id:
    type: int64
    source: target_project_id
    nullable: false
    description: "Project that owns this merge request. Retained on the node row so redaction can resolve project-level permissions without an edge lookup."

  merged_commit_sha:
    type: string
    source: merged_commit_sha
    nullable: true
    description: "SHA of the commit that landed on the target branch (may differ from merge_commit_sha for fast-forward merges)."

  squash_commit_sha:
    type: string
    source: squash_commit_sha
    nullable: true
    description: "SHA of the squash commit, if the merge request was squashed."

  latest_build_started_at:
    type: timestamp
    source: metric_latest_build_started_at
    nullable: true
    description: "Timestamp when the latest CI build for this MR started."

  latest_build_finished_at:
    type: timestamp
    source: metric_latest_build_finished_at
    nullable: true
    description: "Timestamp when the latest CI build for this MR finished."

  first_deployed_to_production_at:
    type: timestamp
    source: metric_first_deployed_to_production_at
    nullable: true
    description: "Timestamp when the MR was first deployed to the production environment."

  merged_at:
    type: timestamp
    source: metric_merged_at
    nullable: true
    description: "Timestamp when the MR was merged."

  latest_closed_at:
    type: timestamp
    source: metric_latest_closed_at
    nullable: true
    description: "Timestamp when the MR was most recently closed."

  first_comment_at:
    type: timestamp
    source: metric_first_comment_at
    nullable: true
    description: "Timestamp of the first comment on the MR."

  first_commit_at:
    type: timestamp
    source: metric_first_commit_at
    nullable: true
    description: "Authored timestamp of the first commit in the MR."

  last_commit_at:
    type: timestamp
    source: metric_last_commit_at
    nullable: true
    description: "Authored timestamp of the last commit in the MR."

  diff_size:
    type: int64
    source: metric_diff_size
    nullable: true
    description: "Total size of the MR diff, in bytes."

  modified_paths_size:
    type: int64
    source: metric_modified_paths_size
    nullable: true
    description: "Number of modified file paths in the MR."

  commits_count:
    type: int64
    source: metric_commits_count
    nullable: true
    description: "Number of commits in the MR."

  first_approved_at:
    type: timestamp
    source: metric_first_approved_at
    nullable: true
    description: "Timestamp of the first approval on the MR."

  first_reassigned_at:
    type: timestamp
    source: metric_first_reassigned_at
    nullable: true
    description: "Timestamp of the first reassignment of the MR."

  added_lines:
    type: int64
    source: metric_added_lines
    nullable: true
    description: "Lines added across all files in the MR diff."

  removed_lines:
    type: int64
    source: metric_removed_lines
    nullable: true
    description: "Lines removed across all files in the MR diff."

  first_contribution:
    type: boolean
    source: metric_first_contribution
    nullable: false
    description: "Whether this MR represents the author's first contribution to the project."

  reviewer_first_assigned_at:
    type: timestamp
    source: metric_reviewer_first_assigned_at
    nullable: true
    description: "Timestamp when the first reviewer was assigned."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

  diff:
    type: string
    nullable: true
    virtual:
      service: gitaly
      lookup: mr_raw_patch
      depends_on: [project_id, iid]
    description: "Full unified diff for the merge request. Resolved from GitLab at query time."

etl:
  # Resolves metric_*, reviewers and approvals from siphon sources at extract
  # time because the upstream `merge_requests_mv` only re-fires on parent
  # inserts and routinely leaves those columns NULL on the destination.
  type: query
  scope: namespaced
  select: >-
    m.id AS id,
    m.iid AS iid,
    m.title AS title,
    m.description AS description,
    m.source_branch AS source_branch,
    m.target_branch AS target_branch,
    m.state_id AS state_id,
    m.merge_status AS merge_status,
    m.draft AS draft,
    m.squash AS squash,
    m.created_at AS created_at,
    m.updated_at AS updated_at,
    m.merge_commit_sha AS merge_commit_sha,
    m.discussion_locked AS discussion_locked,
    m.prepared_at AS prepared_at,
    m.target_project_id AS target_project_id,
    m.source_project_id AS source_project_id,
    m.head_pipeline_id AS head_pipeline_id,
    m.latest_merge_request_diff_id AS latest_merge_request_diff_id,
    m.author_id AS author_id,
    m.merge_user_id AS merge_user_id,
    m.updated_by_id AS updated_by_id,
    m.last_edited_by_id AS last_edited_by_id,
    m.milestone_id AS milestone_id,
    m.merged_commit_sha AS merged_commit_sha,
    m.squash_commit_sha AS squash_commit_sha,
    m.traversal_path AS traversal_path,
    metrics.metric_latest_build_started_at AS metric_latest_build_started_at,
    metrics.metric_latest_build_finished_at AS metric_latest_build_finished_at,
    metrics.metric_first_deployed_to_production_at AS metric_first_deployed_to_production_at,
    metrics.metric_merged_at AS metric_merged_at,
    metrics.metric_latest_closed_at AS metric_latest_closed_at,
    metrics.metric_latest_closed_by_id AS metric_latest_closed_by_id,
    metrics.metric_first_comment_at AS metric_first_comment_at,
    metrics.metric_first_commit_at AS metric_first_commit_at,
    metrics.metric_last_commit_at AS metric_last_commit_at,
    metrics.metric_diff_size AS metric_diff_size,
    metrics.metric_modified_paths_size AS metric_modified_paths_size,
    metrics.metric_commits_count AS metric_commits_count,
    metrics.metric_first_approved_at AS metric_first_approved_at,
    metrics.metric_first_reassigned_at AS metric_first_reassigned_at,
    metrics.metric_added_lines AS metric_added_lines,
    metrics.metric_removed_lines AS metric_removed_lines,
    ifNull(metrics.metric_first_contribution, false) AS metric_first_contribution,
    metrics.metric_reviewer_first_assigned_at AS metric_reviewer_first_assigned_at,
    ifNull(reviewers.reviewers, CAST([], 'Array(Tuple(user_id UInt64, state Int16, created_at DateTime64(6, ''UTC'')))')) AS reviewers,
    ifNull(approvals.approvals, CAST([], 'Array(Tuple(user_id UInt64, created_at DateTime64(6, ''UTC'')))')) AS approvals
  # The siphon JOIN subqueries narrow themselves to merge_request_ids in the
  # current watermark window via the inner `IN (SELECT id FROM merge_requests
  # WHERE _siphon_replicated_at > ...)` filter, so per-batch memory stays
  # bounded by batch size rather than namespace size. Without this, ClickHouse
  # aggregates over every metrics/reviewers/approvals row in the namespace on
  # every batch (~2 GB peak on 1/9970/ for what should be a 30-row batch).
  from: >-
    merge_requests AS m LEFT JOIN (
      SELECT
        traversal_path AS _mt_tp,
        merge_request_id AS _mt_mr,
        argMax(latest_build_started_at, _siphon_replicated_at) AS metric_latest_build_started_at,
        argMax(latest_build_finished_at, _siphon_replicated_at) AS metric_latest_build_finished_at,
        argMax(first_deployed_to_production_at, _siphon_replicated_at) AS metric_first_deployed_to_production_at,
        argMax(merged_at, _siphon_replicated_at) AS metric_merged_at,
        argMax(latest_closed_at, _siphon_replicated_at) AS metric_latest_closed_at,
        argMax(latest_closed_by_id, _siphon_replicated_at) AS metric_latest_closed_by_id,
        argMax(first_comment_at, _siphon_replicated_at) AS metric_first_comment_at,
        argMax(first_commit_at, _siphon_replicated_at) AS metric_first_commit_at,
        argMax(last_commit_at, _siphon_replicated_at) AS metric_last_commit_at,
        argMax(diff_size, _siphon_replicated_at) AS metric_diff_size,
        argMax(modified_paths_size, _siphon_replicated_at) AS metric_modified_paths_size,
        argMax(commits_count, _siphon_replicated_at) AS metric_commits_count,
        argMax(first_approved_at, _siphon_replicated_at) AS metric_first_approved_at,
        argMax(first_reassigned_at, _siphon_replicated_at) AS metric_first_reassigned_at,
        argMax(added_lines, _siphon_replicated_at) AS metric_added_lines,
        argMax(removed_lines, _siphon_replicated_at) AS metric_removed_lines,
        argMax(first_contribution, _siphon_replicated_at) AS metric_first_contribution,
        argMax(reviewer_first_assigned_at, _siphon_replicated_at) AS metric_reviewer_first_assigned_at,
        argMax(_siphon_deleted, _siphon_replicated_at) AS deleted
      FROM siphon_merge_request_metrics
      WHERE startsWith(traversal_path, {traversal_path:String})
        AND merge_request_id IN (
          SELECT id FROM merge_requests
          WHERE startsWith(traversal_path, {traversal_path:String})
            AND _siphon_replicated_at > {last_watermark:String}
            AND _siphon_replicated_at <= {watermark:String}
        )
      GROUP BY traversal_path, merge_request_id
      HAVING deleted = false
    ) AS metrics ON m.traversal_path = metrics._mt_tp AND m.id = metrics._mt_mr
    LEFT JOIN (
      SELECT
        traversal_path AS _rv_tp,
        merge_request_id AS _rv_mr,
        CAST(
          groupArrayIf((toUInt64(user_id), state, created_at), deleted = false),
          'Array(Tuple(user_id UInt64, state Int16, created_at DateTime64(6, ''UTC'')))'
        ) AS reviewers
      FROM (
        SELECT
          traversal_path,
          merge_request_id,
          id,
          argMax(user_id, _siphon_replicated_at) AS user_id,
          argMax(state, _siphon_replicated_at) AS state,
          argMax(created_at, _siphon_replicated_at) AS created_at,
          argMax(_siphon_deleted, _siphon_replicated_at) AS deleted
        FROM siphon_merge_request_reviewers
        WHERE startsWith(traversal_path, {traversal_path:String})
          AND merge_request_id IN (
            SELECT id FROM merge_requests
            WHERE startsWith(traversal_path, {traversal_path:String})
              AND _siphon_replicated_at > {last_watermark:String}
              AND _siphon_replicated_at <= {watermark:String}
          )
        GROUP BY traversal_path, merge_request_id, id
      )
      GROUP BY traversal_path, merge_request_id
    ) AS reviewers ON m.traversal_path = reviewers._rv_tp AND m.id = reviewers._rv_mr
    LEFT JOIN (
      SELECT
        traversal_path AS _ap_tp,
        merge_request_id AS _ap_mr,
        CAST(
          groupArrayIf((toUInt64(user_id), created_at), deleted = false),
          'Array(Tuple(user_id UInt64, created_at DateTime64(6, ''UTC'')))'
        ) AS approvals
      FROM (
        SELECT
          traversal_path,
          merge_request_id,
          id,
          argMax(user_id, _siphon_replicated_at) AS user_id,
          argMax(created_at, _siphon_replicated_at) AS created_at,
          argMax(_siphon_deleted, _siphon_replicated_at) AS deleted
        FROM siphon_approvals
        WHERE startsWith(traversal_path, {traversal_path:String})
          AND merge_request_id IN (
            SELECT id FROM merge_requests
            WHERE startsWith(traversal_path, {traversal_path:String})
              AND _siphon_replicated_at > {last_watermark:String}
              AND _siphon_replicated_at <= {watermark:String}
          )
        GROUP BY traversal_path, merge_request_id, id
      )
      GROUP BY traversal_path, merge_request_id
    ) AS approvals ON m.traversal_path = approvals._ap_tp AND m.id = approvals._ap_mr
  watermark: m._siphon_replicated_at
  deleted: m._siphon_deleted
  traversal_path_filter: "startsWith(m.traversal_path, {traversal_path:String})"
  order_by: [traversal_path, id]
  edges:
    target_project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing
    source_project_id:
      to: Project
      as: SOURCE_PROJECT
      direction: outgoing
    head_pipeline_id:
      to: Pipeline
      as: HAS_HEAD_PIPELINE
      direction: outgoing
    latest_merge_request_diff_id:
      to: MergeRequestDiff
      as: HAS_LATEST_DIFF
      direction: outgoing
    author_id:
      to: User
      as: AUTHORED
      direction: incoming
    merge_user_id:
      to: User
      as: MERGED
      direction: incoming
    updated_by_id:
      to: User
      as: UPDATED_BY
      direction: incoming
    last_edited_by_id:
      to: User
      as: LAST_EDITED_BY
      direction: incoming
    metric_latest_closed_by_id:
      to: User
      as: CLOSED
      direction: incoming
    milestone_id:
      to: Milestone
      as: IN_MILESTONE
      direction: outgoing
    reviewers:
      to: User
      as: REVIEWER
      direction: incoming
      array_field: user_id
    approvals:
      to: User
      as: APPROVED
      direction: incoming
      array_field: user_id

storage:
  primary_key: [traversal_path, id]
  settings:
    add_minmax_index_for_temporal_columns: "1"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: iid, type: "Nullable(Int64)", codec: ["ZSTD(1)"]}
    - {name: title, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: description, type: "String", default: "''", codec: ["ZSTD(3)"]}
    - {name: source_branch, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: target_branch, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: state, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: merge_status, type: "LowCardinality(String)", default: "'unchecked'", codec: ["LZ4"]}
    - {name: draft, type: "Bool", default: "false"}
    - {name: squash, type: "Bool", default: "false"}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: merge_commit_sha, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: discussion_locked, type: "Nullable(Bool)"}
    - {name: prepared_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: project_id, type: "Int64", codec: ["ZSTD(1)"]}
    - {name: merged_commit_sha, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: squash_commit_sha, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: latest_build_started_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: latest_build_finished_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: first_deployed_to_production_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: merged_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: latest_closed_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: first_comment_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: first_commit_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: last_commit_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: diff_size, type: "Nullable(Int64)", codec: ["ZSTD(1)"]}
    - {name: modified_paths_size, type: "Nullable(Int64)", codec: ["ZSTD(1)"]}
    - {name: commits_count, type: "Nullable(Int64)", codec: ["ZSTD(1)"]}
    - {name: first_approved_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: first_reassigned_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: added_lines, type: "Nullable(Int64)", codec: ["ZSTD(1)"]}
    - {name: removed_lines, type: "Nullable(Int64)", codec: ["ZSTD(1)"]}
    - {name: first_contribution, type: "Bool", default: "false"}
    - {name: reviewer_first_assigned_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_state, column: state, type: "set(6)", granularity: 2}
    - {name: idx_draft, column: draft, type: "minmax", granularity: 1}
    - {name: idx_squash, column: squash, type: "minmax", granularity: 1}
    - {name: idx_discussion_locked, column: discussion_locked, type: "minmax", granularity: 1}
    - {name: idx_first_contribution, column: first_contribution, type: "minmax", granularity: 1}
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_title, column: title, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_description, column: description, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_source_branch, column: source_branch, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_target_branch, column: target_branch, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_merge_status, column: merge_status, type: "set(8)", granularity: 2}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: reorder, name: by_state_id, order_by: [state, id]}
    - {type: reorder, name: by_project_state, order_by: [traversal_path, project_id, state, id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
