# config/ontology/nodes/code_review/merge_request.yaml

node_type: MergeRequest
domain: code_review
description: A merge request for code review and merging changes into a target branch
label: title
destination_table: gl_merge_request
default_columns: [id, iid, title, state, source_branch, target_branch]

style:
  size: 28
  color: "#F59E0B"

redaction:
  resource_type: merge_request
  id_column: id
  ability: read_merge_request

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the merge request."

  iid:
    type: int64
    source: iid
    nullable: true
    description: "Project-scoped merge request number."

  title:
    type: string
    source: title
    nullable: true
    description: "Title of the merge request."

  description:
    type: string
    source: description
    nullable: true
    description: "Description body (markdown)."

  source_branch:
    type: string
    source: source_branch
    nullable: false
    description: "Name of the source branch."

  target_branch:
    type: string
    source: target_branch
    nullable: false
    description: "Name of the target branch."

  state:
    type: enum
    source: state_id
    nullable: false
    description: "Current state of the merge request."
    values:
      1: opened
      2: closed
      3: merged
      4: locked

  merge_status:
    type: string
    source: merge_status
    nullable: false
    description: "Mergeability check status (unchecked, preparing, checking, can_be_merged, cannot_be_merged, etc.)."

  draft:
    type: boolean
    source: draft
    nullable: false
    description: "Whether this is a draft/WIP merge request."

  squash:
    type: boolean
    source: squash
    nullable: false
    description: "Whether to squash commits on merge."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Timestamp when the merge request was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Timestamp when the merge request was last updated."

  merge_commit_sha:
    type: string
    source: merge_commit_sha
    nullable: true
    description: "SHA of the merge commit."

  discussion_locked:
    type: boolean
    source: discussion_locked
    nullable: true
    description: "Whether discussions are locked."

  prepared_at:
    type: timestamp
    source: prepared_at
    nullable: true
    description: "Timestamp when the merge request was prepared."

  project_id:
    type: int64
    source: target_project_id
    nullable: false
    description: "Project that owns this merge request. Retained on the node row so redaction can resolve project-level permissions without an edge lookup."

  merged_commit_sha:
    type: string
    source: merged_commit_sha
    nullable: true
    description: "SHA of the commit that landed on the target branch (may differ from merge_commit_sha for fast-forward merges)."

  squash_commit_sha:
    type: string
    source: squash_commit_sha
    nullable: true
    description: "SHA of the squash commit, if the merge request was squashed."

  latest_build_started_at:
    type: timestamp
    source: metric_latest_build_started_at
    nullable: true
    description: "Timestamp when the latest CI build for this MR started."

  latest_build_finished_at:
    type: timestamp
    source: metric_latest_build_finished_at
    nullable: true
    description: "Timestamp when the latest CI build for this MR finished."

  first_deployed_to_production_at:
    type: timestamp
    source: metric_first_deployed_to_production_at
    nullable: true
    description: "Timestamp when the MR was first deployed to the production environment."

  merged_at:
    type: timestamp
    source: metric_merged_at
    nullable: true
    description: "Timestamp when the MR was merged."

  latest_closed_at:
    type: timestamp
    source: metric_latest_closed_at
    nullable: true
    description: "Timestamp when the MR was most recently closed."

  first_comment_at:
    type: timestamp
    source: metric_first_comment_at
    nullable: true
    description: "Timestamp of the first comment on the MR."

  first_commit_at:
    type: timestamp
    source: metric_first_commit_at
    nullable: true
    description: "Authored timestamp of the first commit in the MR."

  last_commit_at:
    type: timestamp
    source: metric_last_commit_at
    nullable: true
    description: "Authored timestamp of the last commit in the MR."

  diff_size:
    type: int64
    source: metric_diff_size
    nullable: true
    description: "Total size of the MR diff, in bytes."

  modified_paths_size:
    type: int64
    source: metric_modified_paths_size
    nullable: true
    description: "Number of modified file paths in the MR."

  commits_count:
    type: int64
    source: metric_commits_count
    nullable: true
    description: "Number of commits in the MR."

  first_approved_at:
    type: timestamp
    source: metric_first_approved_at
    nullable: true
    description: "Timestamp of the first approval on the MR."

  first_reassigned_at:
    type: timestamp
    source: metric_first_reassigned_at
    nullable: true
    description: "Timestamp of the first reassignment of the MR."

  added_lines:
    type: int64
    source: metric_added_lines
    nullable: true
    description: "Lines added across all files in the MR diff."

  removed_lines:
    type: int64
    source: metric_removed_lines
    nullable: true
    description: "Lines removed across all files in the MR diff."

  first_contribution:
    type: boolean
    source: metric_first_contribution
    nullable: false
    description: "Whether this MR represents the author's first contribution to the project."

  reviewer_first_assigned_at:
    type: timestamp
    source: metric_reviewer_first_assigned_at
    nullable: true
    description: "Timestamp when the first reviewer was assigned."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

etl:
  type: table
  scope: namespaced
  source: merge_requests
  edges:
    target_project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing
    source_project_id:
      to: Project
      as: SOURCE_PROJECT
      direction: outgoing
    head_pipeline_id:
      to: Pipeline
      as: HAS_HEAD_PIPELINE
      direction: outgoing
    latest_merge_request_diff_id:
      to: MergeRequestDiff
      as: HAS_LATEST_DIFF
      direction: outgoing
    author_id:
      to: User
      as: AUTHORED
      direction: incoming
    merge_user_id:
      to: User
      as: MERGED
      direction: incoming
    updated_by_id:
      to: User
      as: UPDATED_BY
      direction: incoming
    last_edited_by_id:
      to: User
      as: LAST_EDITED_BY
      direction: incoming
    metric_latest_closed_by_id:
      to: User
      as: CLOSED
      direction: incoming
    milestone_id:
      to: Milestone
      as: IN_MILESTONE
      direction: outgoing
    reviewers:
      to: User
      as: REVIEWER
      direction: incoming
      array_field: user_id
    approvals:
      to: User
      as: APPROVED
      direction: incoming
      array_field: user_id

storage:
  primary_key: [traversal_path, id]
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: iid, type: "Nullable(Int64)", codec: ["ZSTD(1)"]}
    - {name: title, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: description, type: "String", default: "''", codec: ["ZSTD(3)"]}
    - {name: source_branch, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: target_branch, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: state, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: merge_status, type: "LowCardinality(String)", default: "'unchecked'", codec: ["LZ4"]}
    - {name: draft, type: "Bool", default: "false"}
    - {name: squash, type: "Bool", default: "false"}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: merge_commit_sha, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: discussion_locked, type: "Nullable(Bool)"}
    - {name: prepared_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: project_id, type: "Int64", codec: ["ZSTD(1)"]}
    - {name: merged_commit_sha, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: squash_commit_sha, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: latest_build_started_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: latest_build_finished_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: first_deployed_to_production_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: merged_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: latest_closed_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: first_comment_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: first_commit_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: last_commit_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: diff_size, type: "Nullable(Int64)", codec: ["ZSTD(1)"]}
    - {name: modified_paths_size, type: "Nullable(Int64)", codec: ["ZSTD(1)"]}
    - {name: commits_count, type: "Nullable(Int64)", codec: ["ZSTD(1)"]}
    - {name: first_approved_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: first_reassigned_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: added_lines, type: "Nullable(Int64)", codec: ["ZSTD(1)"]}
    - {name: removed_lines, type: "Nullable(Int64)", codec: ["ZSTD(1)"]}
    - {name: first_contribution, type: "Bool", default: "false"}
    - {name: reviewer_first_assigned_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_state, column: state, type: "set(6)", granularity: 2}
    - {name: idx_draft, column: draft, type: "minmax", granularity: 1}
    - {name: idx_squash, column: squash, type: "minmax", granularity: 1}
    - {name: idx_discussion_locked, column: discussion_locked, type: "minmax", granularity: 1}
    - {name: idx_first_contribution, column: first_contribution, type: "minmax", granularity: 1}
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_title, column: title, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_source_branch, column: source_branch, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_target_branch, column: target_branch, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_merge_status, column: merge_status, type: "set(8)", granularity: 2}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: reorder, name: by_state_id, order_by: [state, id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
