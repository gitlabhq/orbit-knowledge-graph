# config/ontology/nodes/package_metadata/pm_package_version.yaml

node_type: PmPackageVersion
domain: package_metadata
global: true
description: A specific version of a package known to package-metadata.
label: version
destination_table: gl_pm_package_version
default_columns: [id, pm_package_id, version]
sort_key: [id]

properties:
  id:
    type: int64
    source: id
    nullable: false
    mutable: false
    description: "Unique ID."
  pm_package_id:
    type: int64
    source: pm_package_id
    nullable: false
    mutable: false
    description: "Owning package."
  version:
    type: string
    source: version
    nullable: false
    description: "Version string."
  created_at:
    type: timestamp
    source: created_at
    nullable: false
    mutable: false
    description: "Creation timestamp."
  updated_at:
    type: timestamp
    source: updated_at
    nullable: false
    description: "Last update timestamp."

pipelines:
  - name: PmPackageVersion
    extract:
      type: clickhouse
      tables: [siphon_pm_package_versions]
      order_by: [id]
      query: generated
    transform:
      type: datafusion

storage:
  primary_key: [id]
  columns:
    - {name: id, type: "Int64", codec: ["T64", "ZSTD(1)"]}
    - {name: pm_package_id, type: "Int64", codec: ["T64", "ZSTD(1)"]}
    - {name: version, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: created_at, type: "DateTime64(0, 'UTC')", default: "now()", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "DateTime64(0, 'UTC')", default: "now()", codec: ["Delta(8)", "ZSTD(1)"]}
  indexes:
    - {name: idx_version, column: version, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_pm_package_id, column: pm_package_id, type: "bloom_filter(0.0001)", granularity: 1}
