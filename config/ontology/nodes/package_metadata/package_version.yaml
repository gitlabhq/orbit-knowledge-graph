# config/ontology/nodes/package_metadata/package_version.yaml

node_type: PmPackageVersion
domain: package_metadata
description: A specific version of a Package Metadata package. Global reference data, not scoped to a project.
label: version
destination_table: gl_pm_package_version
default_columns: [id, pm_package_id, version]
sort_key: [id]

style:
  size: 22
  color: "#A78BFA"

# resource_type pm_package_version must be registered in EE::Authz::RedactionService
# for this node to return data; coordinate the monolith registration.
redaction:
  resource_type: pm_package_version
  id_column: id
  ability: read_security_resource

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Unique ID."

  pm_package_id:
    type: int64
    source: pm_package_id
    nullable: false
    description: "ID of the package this version belongs to."

  version:
    type: string
    source: version
    nullable: false
    description: "Version string."

  created_at:
    type: timestamp
    source: created_at
    nullable: false
    description: "Creation timestamp."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: false
    description: "Last update timestamp."

etl:
  type: table
  scope: global
  source: siphon_pm_package_versions
  order_by: [id]
  edges:
    pm_package_id:
      to: PmPackage
      as: VERSION_OF
      direction: outgoing

storage:
  primary_key: [id]
  settings:
    add_minmax_index_for_temporal_columns: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: pm_package_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: version, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_pm_package_id, column: pm_package_id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_version, column: version, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_created_at, column: created_at, type: "minmax", granularity: 1}
    - {name: idx_updated_at, column: updated_at, type: "minmax", granularity: 1}
