# config/ontology/nodes/package_metadata/cve_enrichment.yaml

node_type: PmCveEnrichment
domain: package_metadata
description: CVE enrichment data (EPSS exploit-prediction score and known-exploit flag) for a CVE, from the Package Metadata database. Global, not scoped to a project.
label: cve
destination_table: gl_pm_cve_enrichment
default_columns: [id, cve, epss_score, is_known_exploit]
sort_key: [id]

style:
  size: 24
  color: "#F87171"

# resource_type pm_cve_enrichment must be registered in EE::Authz::RedactionService
# for this node to return data; coordinate the monolith registration.
redaction:
  resource_type: pm_cve_enrichment
  id_column: id
  ability: read_security_resource

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Unique ID."

  cve:
    type: string
    source: cve
    nullable: false
    description: "CVE identifier this enrichment applies to (e.g. CVE-2024-1234)."

  epss_score:
    type: float
    source: epss_score
    nullable: false
    description: "EPSS (Exploit Prediction Scoring System) probability, 0.0-1.0."

  is_known_exploit:
    type: boolean
    source: is_known_exploit
    nullable: false
    description: "Whether the CVE has a known exploit in the wild (CISA KEV)."

  created_at:
    type: timestamp
    source: created_at
    nullable: false
    description: "Creation timestamp."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: false
    description: "Last update timestamp."

etl:
  type: table
  scope: global
  source: siphon_pm_cve_enrichment
  order_by: [id]

storage:
  primary_key: [id]
  settings:
    add_minmax_index_for_temporal_columns: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: cve, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: epss_score, type: "Float64", codec: ["ZSTD(1)"]}
    - {name: is_known_exploit, type: "Bool", default: "false"}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_cve, column: cve, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_is_known_exploit, column: is_known_exploit, type: "minmax", granularity: 1}
    - {name: idx_created_at, column: created_at, type: "minmax", granularity: 1}
    - {name: idx_updated_at, column: updated_at, type: "minmax", granularity: 1}
