# config/ontology/nodes/package_metadata/license.yaml

node_type: PmLicense
domain: package_metadata
description: A software license (by SPDX identifier) referenced by the Package Metadata database. Global reference data, not scoped to a project.
label: spdx_identifier
destination_table: gl_pm_license
default_columns: [id, spdx_identifier]
sort_key: [id]

style:
  size: 22
  color: "#34D399"

# resource_type pm_license must be registered in EE::Authz::RedactionService
# for this node to return data; coordinate the monolith registration.
redaction:
  resource_type: pm_license
  id_column: id
  ability: read_security_resource

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Unique ID."

  spdx_identifier:
    type: string
    source: spdx_identifier
    nullable: false
    description: "SPDX license identifier (e.g. MIT, Apache-2.0)."

  created_at:
    type: timestamp
    source: created_at
    nullable: false
    description: "Creation timestamp."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: false
    description: "Last update timestamp."

etl:
  type: table
  scope: global
  source: siphon_pm_licenses
  order_by: [id]

storage:
  primary_key: [id]
  settings:
    add_minmax_index_for_temporal_columns: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: spdx_identifier, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_spdx_identifier, column: spdx_identifier, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_created_at, column: created_at, type: "minmax", granularity: 1}
    - {name: idx_updated_at, column: updated_at, type: "minmax", granularity: 1}
