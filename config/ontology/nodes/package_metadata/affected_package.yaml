# config/ontology/nodes/package_metadata/affected_package.yaml

node_type: AffectedPackage
domain: package_metadata
global: true
description: An advisory's declaration that a specific package in an ecosystem is affected.
label: package_name
destination_table: gl_affected_package
default_columns: [id, purl_type, package_name, distro_version, advisory_id]
sort_key: [id]

properties:
  id:
    type: int64
    source: id
    nullable: false
    mutable: false
    description: "Unique ID."
  advisory_id:
    type: int64
    source: advisory_id
    nullable: false
    mutable: false
    description: "Owning advisory."
  purl_type:
    type: int64
    source: purl_type
    nullable: false
    description: "Package URL type enum (npm=1, pypi=2, ...)."
    selectivity: low
  package_name:
    type: string
    source: package_name
    nullable: false
    description: "Package name in its ecosystem."
  distro_version:
    type: string
    source: distro_version
    nullable: true
    description: "Distro version for OS packages; empty for library packages."
  solution:
    type: string
    source: solution
    nullable: true
    description: "Remediation guidance."
  affected_range:
    type: string
    source: affected_range
    nullable: true
    description: "Version range affected."
  fixed_versions:
    type: string
    source: fixed_versions
    nullable: false
    description: "Versions containing the fix (JSON-encoded array)."
  overridden_advisory_fields:
    type: string
    source: overridden_advisory_fields
    nullable: true
    description: "Fields overridden per-package (JSON)."
  versions:
    type: string
    source: versions
    nullable: true
    description: "Per-version affected details (JSON blob)."
  created_at:
    type: timestamp
    source: created_at
    nullable: false
    mutable: false
    description: "Creation timestamp."
  updated_at:
    type: timestamp
    source: updated_at
    nullable: false
    description: "Last update timestamp."

pipelines:
  - name: AffectedPackage
    extract:
      type: clickhouse
      tables: [siphon_pm_affected_packages]
      order_by: [id]
      query: generated
    transform:
      type: datafusion

storage:
  primary_key: [id]
  columns:
    - {name: id, type: "Int64", codec: ["T64", "ZSTD(1)"]}
    - {name: advisory_id, type: "Int64", codec: ["T64", "ZSTD(1)"]}
    - {name: purl_type, type: "Int64", codec: ["T64", "ZSTD(1)"]}
    - {name: package_name, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: distro_version, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: solution, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: affected_range, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: fixed_versions, type: "Array(String)", default: "[]", codec: ["ZSTD(1)"]}
    - {name: overridden_advisory_fields, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: versions, type: "String", default: "''", codec: ["ZSTD(3)"]}
    - {name: created_at, type: "DateTime64(0, 'UTC')", default: "now()", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "DateTime64(0, 'UTC')", default: "now()", codec: ["Delta(8)", "ZSTD(1)"]}
  indexes:
    - {name: idx_package_name, column: package_name, type: "bloom_filter(0.0001)", granularity: 1}
