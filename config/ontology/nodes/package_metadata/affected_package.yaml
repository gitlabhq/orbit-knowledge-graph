# config/ontology/nodes/package_metadata/affected_package.yaml

node_type: PmAffectedPackage
domain: package_metadata
description: A package (by purl type, name and version range) affected by a Package Metadata security advisory. Global, not scoped to a project.
label: package_name
destination_table: gl_pm_affected_package
default_columns: [id, purl_type, package_name, affected_range]
sort_key: [id]

style:
  size: 26
  color: "#FB923C"

# Affected packages are global advisory metadata. resource_type pm_affected_package
# must be registered in EE::Authz::RedactionService for this node to return data;
# coordinate the monolith registration (mirrors the pm_advisory handshake).
redaction:
  resource_type: pm_affected_package
  id_column: id
  ability: read_security_resource

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Unique ID."

  pm_advisory_id:
    type: int64
    source: pm_advisory_id
    nullable: false
    description: "ID of the advisory this affected-package entry belongs to."

  purl_type:
    type: enum
    source: purl_type
    nullable: false
    description: "Package URL (purl) type / ecosystem."
    values:
      0: not_provided
      1: composer
      2: conan
      3: gem
      4: golang
      5: maven
      6: npm
      7: nuget
      8: pypi
      9: apk
      10: rpm
      11: deb
      12: "cbl-mariner"
      13: wolfi
      14: cargo
      15: swift
      16: conda
      17: pub
      999: unknown

  package_name:
    type: string
    source: package_name
    nullable: false
    description: "Name of the affected package."

  distro_version:
    type: string
    source: distro_version
    nullable: false
    description: "Distribution version the advisory applies to (empty for ecosystem packages)."

  affected_range:
    type: string
    source: affected_range
    nullable: false
    description: "Version range affected by the advisory."

  solution:
    type: string
    source: solution
    nullable: true
    description: "Remediation guidance, if provided."

  overridden_advisory_fields:
    type: string
    source: overridden_advisory_fields
    nullable: false
    description: "JSON-serialized advisory fields overridden for this package."

  versions:
    type: string
    source: versions
    nullable: false
    description: "JSON-serialized list of affected/fixed version details."

  created_at:
    type: timestamp
    source: created_at
    nullable: false
    description: "Creation timestamp."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: false
    description: "Last update timestamp."

etl:
  type: table
  scope: global
  source: siphon_pm_affected_packages
  order_by: [id]
  edges:
    pm_advisory_id:
      to: PmAdvisory
      as: AFFECTED_BY
      direction: outgoing

storage:
  primary_key: [id]
  settings:
    add_minmax_index_for_temporal_columns: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: pm_advisory_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: purl_type, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: package_name, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: distro_version, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: affected_range, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: solution, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: overridden_advisory_fields, type: "String", default: "'{}'", codec: ["ZSTD(1)"]}
    - {name: versions, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_pm_advisory_id, column: pm_advisory_id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_purl_type, column: purl_type, type: "set(32)", granularity: 2}
    - {name: idx_package_name, column: package_name, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_created_at, column: created_at, type: "minmax", granularity: 1}
    - {name: idx_updated_at, column: updated_at, type: "minmax", granularity: 1}
