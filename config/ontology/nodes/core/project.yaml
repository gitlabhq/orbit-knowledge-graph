# config/ontology/nodes/core/project.yaml

node_type: Project
domain: core
description: A GitLab project/repository
label: name
destination_table: gl_project
default_columns: [id, name, full_path, visibility_level]

style:
  size: 40
  color: "#3B82F6"

redaction:
  resource_type: project
  id_column: id
  # Temporary: aligned with source-code entities so Project + code traversals
  # don't emit two (resource_type=project, ability=...) redaction entries that
  # Rails then 400s on as duplicate. Revert to read_project after the
  # response-side discriminator fix lands. See #570.
  ability: read_code

properties:
  id:
    type: int64
    source: id
    nullable: false
    mutable: false
    description: "Unique ID."
    traversal_path_lookup:
      kind: id
      dictionary: gl_project_traversal_paths_dict
      source_table: gl_project
      key_column: id

  full_path:
    type: string
    source: full_path
    nullable: false
    description: "Full path (e.g. gitlab-org/gitlab)."
    traversal_path_lookup:
      kind: full_path
      source_table: gl_project
      key_column: full_path

  name:
    type: string
    source: name
    nullable: false
    description: "Display name."

  description:
    type: string
    source: description
    nullable: false
    description: "Description text."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    mutable: false
    description: "Creation timestamp."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Last update timestamp."

  visibility_level:
    type: enum
    source: visibility_level
    nullable: false
    description: "Visibility level."
    values:
      0: private
      10: internal
      20: public

  archived:
    type: boolean
    source: archived
    nullable: false
    description: "Archived flag."

  star_count:
    type: int64
    source: star_count
    nullable: false
    description: "Number of stars."

  last_activity_at:
    type: timestamp
    source: last_activity_at
    nullable: true
    description: "Last activity timestamp."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

etl:
  type: query
  source: project_namespace_traversal_paths
  select: >-
    project.id AS id, project.name AS name, project.description AS description,
    project.visibility_level AS visibility_level,
    if(isNotNull(route.source_id), route.path, project.path) AS full_path,
    project.namespace_id AS namespace_id, project.creator_id AS creator_id,
    project.created_at AS created_at, project.updated_at AS updated_at,
    project.archived AS archived, project.star_count AS star_count,
    project.last_activity_at AS last_activity_at,
    traversal_paths.traversal_path AS traversal_path
  from: >-
    siphon_projects project
    INNER JOIN (
      SELECT id, traversal_path
      FROM project_namespace_traversal_paths
      WHERE startsWith(traversal_path, {traversal_path:String})
    ) traversal_paths
    ON project.id = traversal_paths.id
    LEFT JOIN (
      SELECT toNullable(source_id) AS source_id, argMax(path, {{watermark_column}}) AS path
      FROM siphon_routes
      WHERE startsWith(traversal_path, {traversal_path:String})
        AND source_type = 'Project' AND NOT {{deleted_column}}
      GROUP BY source_id
    ) route ON project.id = route.source_id
  where: "project.id IN (SELECT id FROM project_namespace_traversal_paths WHERE startsWith(traversal_path, {traversal_path:String}))"
  traversal_path_filter: "startsWith(traversal_paths.traversal_path, {traversal_path:String})"
  watermark: project.{{watermark_column}}
  table_alias: project
  deleted: project.{{deleted_column}}
  triggers:
    - table: siphon_projects
      traversal_path:
        dictionary: project_traversal_paths_dict
        key_column: id
    - table: siphon_routes
      traversal_path:
        dictionary: project_traversal_paths_dict
        key_column: source_id
  edges:
    creator_id:
      to: User
      as: CREATOR
      direction: incoming
    namespace_id:
      to: Group
      as: CONTAINS
      direction: incoming

storage:
  primary_key: [traversal_path, id]
  settings:
    add_minmax_index_for_temporal_columns: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["T64", "ZSTD(1)"]}
    - {name: name, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: description, type: "String", default: "''", codec: ["ZSTD(3)"]}
    - {name: visibility_level, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: full_path, type: "String", default: "''", codec: ["ZSTD(3)"]}
    - {name: created_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: archived, type: "Nullable(Bool)"}
    - {name: star_count, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: last_activity_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_archived, column: archived, type: "minmax", granularity: 1}
    - {name: idx_created_at, column: created_at, type: "minmax", granularity: 1}
    - {name: idx_updated_at, column: updated_at, type: "minmax", granularity: 1}
    - {name: idx_last_activity_at, column: last_activity_at, type: "minmax", granularity: 1}
    - {name: idx_id, column: id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_full_path, column: full_path, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_description, column: description, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_description_ngram, column: description, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
