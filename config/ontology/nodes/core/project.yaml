# config/ontology/nodes/core/project.yaml

node_type: Project
domain: core
description: A GitLab project/repository
label: name
destination_table: gl_project
default_columns: [id, name, full_path, visibility_level]

style:
  size: 40
  color: "#3B82F6"

redaction:
  resource_type: project
  id_column: id
  ability: read_project

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the project."

  full_path:
    type: string
    source: full_path
    nullable: true
    description: "Full path for the project (e.g. gitlab-org/gitlab)."

  name:
    type: string
    source: name
    nullable: true
    description: "Display name."

  description:
    type: string
    source: description
    nullable: true
    description: "Project description."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Timestamp when the project was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Timestamp when the project was last updated."

  visibility_level:
    type: enum
    source: visibility_level
    nullable: false
    description: "Visibility of the project."
    values:
      0: private
      10: internal
      20: public

  archived:
    type: boolean
    source: archived
    nullable: false
    description: "Whether the project is archived."

  star_count:
    type: int64
    source: star_count
    nullable: false
    description: "Star count for the project."

  last_activity_at:
    type: timestamp
    source: last_activity_at
    nullable: true
    description: "Timestamp of last activity in the project."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

etl:
  # Mirrors the group ETL shape: pre-aggregate each siphon source in its own
  # CTE, narrow by `id IN subtree` (PK lookup) or `startsWith(traversal_path, …)`
  # (siphon_routes PK starts with traversal_path), then drive the final SELECT
  # from the small `subtree`. See the comment in core/group.yaml for the
  # full motivation.
  type: query
  scope: namespaced
  select: >-
    project_extract.id AS id,
    project_extract.name AS name,
    project_extract.description AS description,
    project_extract.visibility_level AS visibility_level,
    if(isNotNull(project_extract.route_source_id), project_extract.route_path, project_extract.path) AS full_path,
    project_extract.namespace_id AS namespace_id,
    project_extract.creator_id AS creator_id,
    project_extract.created_at AS created_at,
    project_extract.updated_at AS updated_at,
    project_extract.archived AS archived,
    project_extract.star_count AS star_count,
    project_extract.last_activity_at AS last_activity_at,
    project_extract.traversal_path AS traversal_path
  from: >-
    (
      WITH subtree AS (
        SELECT id, traversal_path
        FROM project_namespace_traversal_paths
        WHERE startsWith(traversal_path, {traversal_path:String})
      ),
      project AS (
        SELECT id, name, description, path, namespace_id, creator_id,
               created_at, updated_at, archived, star_count, last_activity_at,
               visibility_level, _siphon_replicated_at, _siphon_deleted
        FROM siphon_projects
        WHERE id IN (SELECT id FROM subtree)
      ),
      routes AS (
        SELECT toNullable(source_id) AS source_id,
               argMax(path, _siphon_replicated_at) AS path
        FROM siphon_routes
        WHERE startsWith(traversal_path, {traversal_path:String})
          AND source_type = 'Project'
          AND NOT _siphon_deleted
        GROUP BY source_id
      )
      SELECT
        project.id AS id,
        project.name AS name,
        project.description AS description,
        project.path AS path,
        project.namespace_id AS namespace_id,
        project.creator_id AS creator_id,
        project.created_at AS created_at,
        project.updated_at AS updated_at,
        project.archived AS archived,
        project.star_count AS star_count,
        project.last_activity_at AS last_activity_at,
        project.visibility_level AS visibility_level,
        route.source_id AS route_source_id,
        route.path AS route_path,
        subtree.traversal_path AS traversal_path,
        project._siphon_replicated_at AS _siphon_replicated_at,
        project._siphon_deleted AS _siphon_deleted
      FROM subtree
      INNER JOIN project ON project.id = subtree.id
      LEFT JOIN routes route ON route.source_id = subtree.id
    ) project_extract
  traversal_path_filter: "startsWith(project_extract.traversal_path, {traversal_path:String})"
  watermark: project_extract._siphon_replicated_at
  deleted: project_extract._siphon_deleted
  edges:
    creator_id:
      to: User
      as: CREATOR
      direction: incoming
    namespace_id:
      to: Group
      as: CONTAINS
      direction: incoming

storage:
  primary_key: [traversal_path, id]
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: name, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: description, type: "Nullable(String)", codec: ["ZSTD(3)"]}
    - {name: visibility_level, type: "LowCardinality(Nullable(String))", codec: ["LZ4"]}
    - {name: full_path, type: "Nullable(String)", codec: ["ZSTD(3)"]}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: archived, type: "Nullable(Bool)"}
    - {name: star_count, type: "Nullable(Int64)", codec: ["ZSTD(1)"]}
    - {name: last_activity_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_archived, column: archived, type: "minmax", granularity: 1}
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
