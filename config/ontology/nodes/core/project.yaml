# config/ontology/nodes/core/project.yaml

node_type: Project
domain: core
description: A GitLab project/repository
label: name
destination_table: gl_project
default_columns: [id, name, full_path, visibility_level]

style:
  size: 40
  color: "#3B82F6"

redaction:
  resource_type: project
  id_column: id
  ability: read_project

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the project."

  full_path:
    type: string
    source: full_path
    nullable: true
    description: "Full path for the project (e.g. gitlab-org/gitlab)."

  name:
    type: string
    source: name
    nullable: true
    description: "Display name."

  description:
    type: string
    source: description
    nullable: true
    description: "Project description."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Timestamp when the project was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Timestamp when the project was last updated."

  visibility_level:
    type: enum
    source: visibility_level
    nullable: false
    description: "Visibility of the project."
    values:
      0: private
      10: internal
      20: public

  archived:
    type: boolean
    source: archived
    nullable: false
    description: "Whether the project is archived."

  star_count:
    type: int64
    source: star_count
    nullable: false
    description: "Star count for the project."

  last_activity_at:
    type: timestamp
    source: last_activity_at
    nullable: true
    description: "Timestamp of last activity in the project."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

etl:
  type: query
  scope: namespaced
  select: >-
    project.id AS id, project.name AS name, project.description AS description,
    project.visibility_level AS visibility_level,
    if(isNotNull(route.source_id), route.path, project.path) AS full_path,
    project.namespace_id AS namespace_id, project.creator_id AS creator_id,
    project.created_at AS created_at, project.updated_at AS updated_at,
    project.archived AS archived, project.star_count AS star_count,
    project.last_activity_at AS last_activity_at,
    traversal_paths.traversal_path AS traversal_path
  from: >-
    siphon_projects project
    INNER JOIN (
      SELECT id, traversal_path
      FROM project_namespace_traversal_paths
      WHERE startsWith(traversal_path, {traversal_path:String})
    ) traversal_paths
    ON project.id = traversal_paths.id
    LEFT JOIN (
      SELECT toNullable(source_id) AS source_id, argMax(path, _siphon_replicated_at) AS path
      FROM siphon_routes
      WHERE startsWith(traversal_path, {traversal_path:String})
        AND source_type = 'Project' AND NOT _siphon_deleted
      GROUP BY source_id
    ) route ON project.id = route.source_id
  traversal_path_filter: "startsWith(traversal_paths.traversal_path, {traversal_path:String})"
  watermark: project._siphon_replicated_at
  deleted: project._siphon_deleted
  edges:
    creator_id:
      to: User
      as: CREATOR
      direction: incoming
    namespace_id:
      to: Group
      as: CONTAINS
      direction: incoming

storage:
  primary_key: [traversal_path, id]
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: name, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: description, type: "Nullable(String)", codec: ["ZSTD(3)"]}
    - {name: visibility_level, type: "LowCardinality(Nullable(String))", codec: ["LZ4"]}
    - {name: full_path, type: "Nullable(String)", codec: ["ZSTD(3)"]}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: archived, type: "Nullable(Bool)"}
    - {name: star_count, type: "Nullable(Int64)", codec: ["ZSTD(1)"]}
    - {name: last_activity_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_archived, column: archived, type: "minmax", granularity: 1}
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 256, 2, 0)", granularity: 1}
    - {name: idx_full_path, column: full_path, type: "text(tokenizer = splitByString(['/']))", granularity: 1}
    - {name: idx_full_path_ngram, column: full_path, type: "ngrambf_v1(3, 256, 2, 0)", granularity: 1}
    - {name: idx_description, column: description, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_description_ngram, column: description, type: "ngrambf_v1(3, 256, 2, 0)", granularity: 1}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
