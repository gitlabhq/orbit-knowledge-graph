# config/ontology/nodes/core/group.yaml

node_type: Group
domain: core
description: A GitLab group (top-level group or subgroup)
label: name
destination_table: gl_group
default_columns: [id, name, full_path, visibility_level]

style:
  size: 45
  color: "#8B5CF6"

redaction:
  resource_type: group
  id_column: id
  ability: read_group

properties:
  id:
    type: int64
    source: id
    nullable: false
    mutable: false
    description: "Unique ID."
    traversal_path_lookup:
      kind: id
      dictionary: gl_group_traversal_paths_dict
      source_table: gl_group
      key_column: id

  full_path:
    type: string
    source: full_path
    nullable: false
    description: "Full path (e.g. gitlab-org/quality)."
    traversal_path_lookup:
      kind: full_path
      source_table: gl_group
      key_column: full_path

  name:
    type: string
    source: name
    nullable: false
    description: "Display name."

  description:
    type: string
    source: description
    nullable: false
    description: "Description text."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    mutable: false
    description: "Creation timestamp."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Last update timestamp."

  visibility_level:
    type: enum
    source: visibility_level
    nullable: false
    description: "Visibility level."
    values:
      0: private
      10: internal
      20: public

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

etl:
  type: sql
  source: namespace_traversal_paths
  query: group.sql
  edges:
    owner_id:
      to: User
      as: OWNER
      direction: incoming
    parent_id:
      to: Group
      as: CONTAINS
      direction: incoming

storage:
  primary_key: [traversal_path, id]
  settings:
    add_minmax_index_for_temporal_columns: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: name, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: description, type: "String", default: "''", codec: ["ZSTD(3)"]}
    - {name: visibility_level, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: full_path, type: "String", default: "''", codec: ["ZSTD(3)"]}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_full_path, column: full_path, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_description, column: description, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_description_ngram, column: description, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
