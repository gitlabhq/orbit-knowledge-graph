# config/ontology/nodes/core/group.yaml

node_type: Group
domain: core
description: A GitLab group (top-level group or subgroup)
label: name
destination_table: gl_group
default_columns: [id, name, full_path, visibility_level]

style:
  size: 45
  color: "#8B5CF6"

redaction:
  resource_type: group
  id_column: id
  ability: read_group

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the group."

  full_path:
    type: string
    source: full_path
    nullable: true
    description: "Full path for the group (e.g. gitlab-org/quality)."

  name:
    type: string
    source: name
    nullable: false
    description: "Display name."

  description:
    type: string
    source: description
    nullable: true
    description: "Group description."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Timestamp when the group was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Timestamp when the group was last updated."

  visibility_level:
    type: enum
    source: visibility_level
    nullable: false
    description: "Visibility of the group."
    values:
      0: private
      10: internal
      20: public

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

etl:
  type: query
  scope: namespaced
  select: >-
    namespace.id AS id, namespace.name AS name,
    details.description AS description,
    namespace.visibility_level AS visibility_level,
    if(isNotNull(routes.source_id), routes.path, namespace.path) AS full_path,
    namespace.parent_id AS parent_id, namespace.owner_id AS owner_id,
    namespace.created_at AS created_at, namespace.updated_at AS updated_at,
    traversal_paths.traversal_path AS traversal_path
  from: >-
    siphon_namespaces namespace
    INNER JOIN (
      SELECT id, traversal_path
      FROM namespace_traversal_paths
      WHERE startsWith(traversal_path, {traversal_path:String})
    ) traversal_paths
    ON namespace.id = traversal_paths.id
    INNER JOIN (
      SELECT namespace_id, argMax(description, _siphon_replicated_at) AS description
      FROM siphon_namespace_details
      WHERE namespace_id IN (
        SELECT id FROM namespace_traversal_paths
        WHERE startsWith(traversal_path, {traversal_path:String})
      )
      GROUP BY namespace_id
    ) details ON namespace.id = details.namespace_id
    LEFT JOIN (
      SELECT toNullable(source_id) AS source_id, argMax(path, _siphon_replicated_at) AS path
      FROM siphon_routes
      WHERE startsWith(traversal_path, {traversal_path:String})
        AND source_type = 'Namespace' AND NOT _siphon_deleted
      GROUP BY source_id
    ) routes ON namespace.id = routes.source_id
  where: "namespace.id IN (SELECT id FROM namespace_traversal_paths WHERE startsWith(traversal_path, {traversal_path:String}))"
  traversal_path_filter: "startsWith(traversal_paths.traversal_path, {traversal_path:String})"
  watermark: namespace._siphon_replicated_at
  deleted: namespace._siphon_deleted
  edges:
    owner_id:
      to: User
      as: OWNER
      direction: incoming
    parent_id:
      to: Group
      as: CONTAINS
      direction: incoming

storage:
  primary_key: [traversal_path, id]
  settings:
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: name, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: description, type: "Nullable(String)", codec: ["ZSTD(3)"]}
    - {name: visibility_level, type: "LowCardinality(Nullable(String))", codec: ["LZ4"]}
    - {name: full_path, type: "Nullable(String)", codec: ["ZSTD(3)"]}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_full_path, column: full_path, type: "text(tokenizer = splitByString(['/']))", granularity: 1}
    - {name: idx_full_path_ngram, column: full_path, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_description, column: description, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_description_ngram, column: description, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
