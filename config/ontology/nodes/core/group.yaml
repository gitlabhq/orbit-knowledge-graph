# config/ontology/nodes/core/group.yaml

node_type: Group
domain: core
description: A GitLab group (top-level group or subgroup)
label: name
destination_table: gl_group
default_columns: [id, name, full_path, visibility_level]

style:
  size: 45
  color: "#8B5CF6"

redaction:
  resource_type: group
  id_column: id
  ability: read_group

properties:
  id:
    type: int64
    source: id
    nullable: false
    mutable: false
    description: "Unique ID."
    traversal_path_lookup:
      kind: id
      dictionary: gl_group_traversal_paths_dict
      source_table: gl_group
      key_column: id

  full_path:
    type: string
    source: full_path
    nullable: false
    description: "Full path (e.g. gitlab-org/quality)."
    traversal_path_lookup:
      kind: full_path
      source_table: gl_group
      key_column: full_path

  name:
    type: string
    source: name
    nullable: false
    description: "Display name."

  description:
    type: string
    source: description
    nullable: false
    description: "Description text."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    mutable: false
    description: "Creation timestamp."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Last update timestamp."

  visibility_level:
    type: enum
    source: visibility_level
    nullable: false
    description: "Visibility level."
    values:
      0: private
      10: internal
      20: public

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

etl:
  type: query
  source: namespace_traversal_paths
  select: >-
    namespace.id AS id, namespace.name AS name,
    ifNull(details.description, '') AS description,
    namespace.visibility_level AS visibility_level,
    if(isNotNull(routes.source_id), routes.path, namespace.path) AS full_path,
    namespace.parent_id AS parent_id, namespace.owner_id AS owner_id,
    namespace.created_at AS created_at, namespace.updated_at AS updated_at,
    traversal_paths.traversal_path AS traversal_path
  from: >-
    siphon_namespaces namespace
    INNER JOIN (
      SELECT id, traversal_path
      FROM namespace_traversal_paths
      WHERE startsWith(traversal_path, {traversal_path:String})
    ) traversal_paths
    ON namespace.id = traversal_paths.id
    LEFT JOIN (
      SELECT namespace_id, argMax(description, {{watermark_column}}) AS description
      FROM siphon_namespace_details
      WHERE startsWith(traversal_path, {traversal_path:String})
      GROUP BY namespace_id
    ) details ON namespace.id = details.namespace_id
    LEFT JOIN (
      SELECT toNullable(source_id) AS source_id, argMax(path, {{watermark_column}}) AS path
      FROM siphon_routes
      WHERE startsWith(traversal_path, {traversal_path:String})
        AND source_type = 'Namespace' AND NOT {{deleted_column}}
      GROUP BY source_id
    ) routes ON namespace.id = routes.source_id
  where: "namespace.id IN (SELECT id FROM namespace_traversal_paths WHERE startsWith(traversal_path, {traversal_path:String}))"
  traversal_path_filter: "startsWith(traversal_paths.traversal_path, {traversal_path:String})"
  watermark: namespace.{{watermark_column}}
  table_alias: namespace
  deleted: "(namespace.{{deleted_column}} OR namespace.type != 'Group')"
  source_tables:
    - table: siphon_namespaces
      traversal_path:
        dictionary: namespace_traversal_paths_dict
        key_column: id
    - table: siphon_namespace_details
      traversal_path:
        dictionary: namespace_traversal_paths_dict
        key_column: namespace_id
    - table: siphon_routes
      traversal_path:
        dictionary: namespace_traversal_paths_dict
        key_column: source_id
  edges:
    owner_id:
      to: User
      as: OWNER
      direction: incoming
    parent_id:
      to: Group
      as: CONTAINS
      direction: incoming

storage:
  primary_key: [traversal_path, id]
  settings:
    add_minmax_index_for_temporal_columns: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["T64", "ZSTD(1)"]}
    - {name: name, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: description, type: "String", default: "''", codec: ["ZSTD(3)"]}
    - {name: visibility_level, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: full_path, type: "String", default: "''", codec: ["ZSTD(3)"]}
    - {name: created_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_full_path, column: full_path, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_description, column: description, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_description_ngram, column: description, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
