# config/ontology/nodes/core/group.yaml

node_type: Group
domain: core
description: A GitLab group (top-level group or subgroup)
label: name
destination_table: gl_group
default_columns: [id, name, full_path, visibility_level]

style:
  size: 45
  color: "#8B5CF6"

redaction:
  resource_type: group
  id_column: id
  ability: read_group

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the group."

  full_path:
    type: string
    source: full_path
    nullable: true
    description: "Full path for the group (e.g. gitlab-org/quality)."

  name:
    type: string
    source: name
    nullable: false
    description: "Display name."

  description:
    type: string
    source: description
    nullable: true
    description: "Group description."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Timestamp when the group was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Timestamp when the group was last updated."

  visibility_level:
    type: enum
    source: visibility_level
    nullable: false
    description: "Visibility of the group."
    values:
      0: private
      10: internal
      20: public

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

etl:
  # Pre-aggregate every siphon source in its own CTE before joining.
  # `subtree` is bounded to ≤100k rows; namespace, details, and routes are then
  # narrowed by an `id IN subtree` predicate (PK lookup) or by a
  # `startsWith(traversal_path, ...)` prefix scan (siphon_routes PK starts with
  # traversal_path). The driving relation in the final SELECT is the small
  # `subtree`, which keeps every hash-join build side small.
  # Per Adam Hegyi's 2026-04-25 review of the prior namespace extractor (~128M
  # rows / 6.4 GiB on prd analytics ClickHouse).
  type: query
  scope: namespaced
  select: >-
    namespace_extract.id AS id,
    namespace_extract.name AS name,
    namespace_extract.description AS description,
    namespace_extract.visibility_level AS visibility_level,
    if(isNotNull(namespace_extract.route_source_id), namespace_extract.route_path, namespace_extract.path) AS full_path,
    namespace_extract.parent_id AS parent_id,
    namespace_extract.owner_id AS owner_id,
    namespace_extract.created_at AS created_at,
    namespace_extract.updated_at AS updated_at,
    namespace_extract.traversal_path AS traversal_path
  from: >-
    (
      WITH subtree AS (
        SELECT id, traversal_path
        FROM namespace_traversal_paths
        WHERE startsWith(traversal_path, {traversal_path:String})
      ),
      namespace AS (
        SELECT id, name, path, parent_id, owner_id, created_at, updated_at,
               visibility_level, _siphon_replicated_at, _siphon_deleted
        FROM siphon_namespaces
        WHERE id IN (SELECT id FROM subtree)
      ),
      details AS (
        SELECT namespace_id,
               argMax(description, _siphon_replicated_at) AS description
        FROM siphon_namespace_details
        WHERE namespace_id IN (SELECT id FROM subtree)
        GROUP BY namespace_id
      ),
      routes AS (
        SELECT toNullable(source_id) AS source_id,
               argMax(path, _siphon_replicated_at) AS path
        FROM siphon_routes
        WHERE startsWith(traversal_path, {traversal_path:String})
          AND source_type = 'Namespace'
          AND NOT _siphon_deleted
        GROUP BY source_id
      )
      SELECT
        namespace.id AS id,
        namespace.name AS name,
        namespace.path AS path,
        namespace.parent_id AS parent_id,
        namespace.owner_id AS owner_id,
        namespace.created_at AS created_at,
        namespace.updated_at AS updated_at,
        namespace.visibility_level AS visibility_level,
        details.description AS description,
        route.source_id AS route_source_id,
        route.path AS route_path,
        subtree.traversal_path AS traversal_path,
        namespace._siphon_replicated_at AS _siphon_replicated_at,
        namespace._siphon_deleted AS _siphon_deleted
      FROM subtree
      INNER JOIN namespace ON namespace.id = subtree.id
      LEFT JOIN details ON details.namespace_id = subtree.id
      LEFT JOIN routes route ON route.source_id = subtree.id
    ) namespace_extract
  traversal_path_filter: "startsWith(namespace_extract.traversal_path, {traversal_path:String})"
  watermark: namespace_extract._siphon_replicated_at
  deleted: namespace_extract._siphon_deleted
  edges:
    owner_id:
      to: User
      as: OWNER
      direction: incoming
    parent_id:
      to: Group
      as: CONTAINS
      direction: incoming

storage:
  primary_key: [traversal_path, id]
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: name, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: description, type: "Nullable(String)", codec: ["ZSTD(3)"]}
    - {name: visibility_level, type: "LowCardinality(Nullable(String))", codec: ["LZ4"]}
    - {name: full_path, type: "Nullable(String)", codec: ["ZSTD(3)"]}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
