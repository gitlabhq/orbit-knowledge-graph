# config/ontology/nodes/core/user.yaml

node_type: User
domain: core
description: A GitLab user account
label: username
destination_table: gl_user
default_columns: [id, username, name, state]
sort_key: [id]

style:
  size: 32
  color: "#10B981"

redaction:
  resource_type: user
  id_column: id
  ability: read_user

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the user."

  username:
    type: string
    source: username
    nullable: true
    description: "The user's handle (unique in GitLab)."

  email:
    type: string
    source: email
    nullable: false
    like_allowed: false
    admin_only: true
    description: "Primary email address. Gated by `read_user_email_address` in GitLab; surfaced here only to admins until per-cell authorization lands."

  name:
    type: string
    source: name
    nullable: true
    description: "Display name."

  first_name:
    type: string
    source: first_name
    nullable: true
    admin_only: true
    description: "First name, if provided. Not exposed on any public GitLab user surface; admins only."

  last_name:
    type: string
    source: last_name
    nullable: true
    admin_only: true
    description: "Last name, if provided. Not exposed on any public GitLab user surface; admins only."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Timestamp when the user was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    admin_only: true
    description: "Timestamp when the user record was last updated. Not exposed on any public GitLab user surface; admins only."

  state:
    type: enum
    source: state
    nullable: true
    description: "Account state."
    enum_type: string
    values:
      0: active
      1: blocked
      2: ldap_blocked
      3: blocked_pending_approval
      4: banned
      5: deactivated

  avatar_url:
    type: string
    source: avatar
    nullable: true
    description: "URL to the user's avatar image."

  public_email:
    type: string
    source: public_email
    nullable: true
    like_allowed: false
    description: "Publicly visible email, if set."

  preferred_language:
    type: string
    source: preferred_language
    nullable: true
    admin_only: true
    description: "User's preferred UI language. Self-only on GitLab REST; admins only here until per-cell authorization lands."

  last_activity_on:
    type: date
    source: last_activity_on
    nullable: true
    description: "Most recent recorded activity date."

  private_profile:
    type: boolean
    source: private_profile
    nullable: false
    admin_only: true
    description: "Whether the user profile is private. Self-only on GitLab REST; admins only here."

  is_admin:
    type: boolean
    source: admin
    nullable: false
    admin_only: true
    description: "Whether the user is an instance administrator."

  is_auditor:
    type: boolean
    source: auditor
    nullable: false
    admin_only: true
    description: "Whether the user has auditor role."

  is_external:
    type: boolean
    source: external
    nullable: false
    admin_only: true
    description: "Whether the user is marked as external. Self-only on GitLab REST and admin-only via UserWithAdmin; admins only here."

  user_type:
    type: enum
    source: user_type
    nullable: false
    description: "Type of user account."
    values:
      0: human
      1: support_bot
      2: alert_bot
      3: visual_review_bot
      4: service_user
      5: ghost
      6: project_bot
      7: security_bot
      8: automation_bot
      9: security_policy_bot
      10: admin_bot
      11: service_account
      12: placeholder
      13: duo_code_review_bot
      14: import_user

etl:
  type: table
  scope: global
  source: siphon_users

storage:
  primary_key: [id]
  settings:
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: username, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: email, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: name, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: first_name, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: last_name, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: state, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: avatar_url, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: public_email, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: preferred_language, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: last_activity_on, type: "Nullable(Date32)", codec: ["Delta(4)", "ZSTD(1)"]}
    - {name: private_profile, type: "Bool", default: "false"}
    - {name: is_admin, type: "Bool", default: "false"}
    - {name: is_auditor, type: "Bool", default: "false"}
    - {name: is_external, type: "Bool", default: "false"}
    - {name: user_type, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
  indexes:
    - {name: idx_state, column: state, type: "set(10)", granularity: 2}
    - {name: idx_user_type, column: user_type, type: "set(26)", granularity: 2}
    - {name: idx_private_profile, column: private_profile, type: "minmax", granularity: 1}
    - {name: idx_is_admin, column: is_admin, type: "minmax", granularity: 1}
    - {name: idx_is_auditor, column: is_auditor, type: "minmax", granularity: 1}
    - {name: idx_is_external, column: is_external, type: "minmax", granularity: 1}
    - {name: idx_username, column: username, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_username_ngram, column: username, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
