# config/ontology/nodes/core/note.yaml

node_type: Note
domain: core
description: A comment or annotation on a GitLab object (issue, merge request, commit, etc.)
label: id
destination_table: gl_note
default_columns: [id, noteable_type, noteable_id, created_at]

style:
  size: 24
  color: "#64748B"

redaction:
  resource_type: note
  id_column: id
  ability: read_note

properties:
  id:
    type: int64
    source: id
    nullable: false
    mutable: false
    description: "Unique ID."

  note:
    type: string
    source: note
    nullable: false
    description: "Text content (markdown)."

  noteable_type:
    type: enum
    source: noteable_type
    nullable: false
    mutable: false
    description: "Type of object the note is attached to."
    enum_type: string
    values:
      0: Issue
      1: MergeRequest
      2: Commit
      3: Snippet
      4: "WikiPage::Meta"
      5: "DesignManagement::Design"
      6: "AlertManagement::Alert"
      7: Vulnerability
      8: AbuseReport
      9: "ComplianceManagement::Projects::ComplianceViolation"

  noteable_id:
    type: int64
    source: noteable_id
    nullable: true
    mutable: false
    description: "ID of the attached object. Null for commits."

  line_code:
    type: string
    source: line_code
    nullable: false
    description: "Line position identifier for diff notes."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    mutable: false
    description: "Creation timestamp."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Last update timestamp."

  discussion_id:
    type: string
    source: discussion_id
    nullable: true
    mutable: false
    description: "Discussion thread ID."

  resolved_at:
    type: timestamp
    source: resolved_at
    nullable: true
    description: "Resolution timestamp."

  internal:
    type: boolean
    source: internal
    nullable: false
    description: "Only visible to users with Reporter+ access on the parent resource."

  confidential:
    type: boolean
    source: confidential
    nullable: true
    description: "Legacy alias for internal; synced on create. Being renamed per gitlab#367923."

  commit_id:
    type: string
    source: commit_id
    nullable: false
    mutable: false
    description: "Commit SHA for commit notes."

  st_diff:
    type: string
    source: st_diff
    nullable: false
    description: "Serialized diff snippet for diff notes."

  project_id:
    type: int64
    source: project_id
    nullable: true
    mutable: false
    description: "Owning project ID."

  author_id:
    type: int64
    source: author_id
    nullable: true
    mutable: false
    description: "Author user ID."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

indexer:
  reindex: use_source_tables
pipelines:
  - name: Note
    extract:
      type: clickhouse
      tables: [siphon_notes]
      order_by: [traversal_path, noteable_type, noteable_id, id]
      query:
        select: "id, note, noteable_type, noteable_id, line_code, created_at, updated_at, discussion_id, resolved_at, internal, confidential, commit_id, st_diff, author_id, project_id, traversal_path"
        from: siphon_notes
        where: "system = false"
        traversal_path_filter: "startsWith(traversal_path, {traversal_path:String})"
    transform:
      type: datafusion
      edges:
        - from:
            field: author_id
            kind: User
          to:
            field: id
            kind: Note
          label: AUTHORED
        - from:
            field: id
            kind: Note
          to:
            field: project_id
            kind: Project
          label: IN_PROJECT
        - from:
            field: noteable_id
            # Rails stores the polymorphic base class in `noteable_type` via
            # `Note#noteable_type=` → `klass.base_class.to_s`. WorkItem subclasses of
            # Issue (Task, Incident, Ticket, Objective, KeyResult, TestCase,
            # Requirement) all collapse to `Issue`. Legacy Epic notes created via
            # `Groups::Epics::NotesController` still arrive as `Epic` until the
            # unified work-item model fully replaces the legacy record.
            kind:
              derive: noteable_type
              mapping:
                Issue: WorkItem
                Epic: WorkItem
          to:
            field: id
            kind: Note
          label: HAS_NOTE

storage:
  primary_key: [traversal_path, id]
  settings:
    add_minmax_index_for_temporal_columns: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["T64", "ZSTD(1)"]}
    - {name: note, type: "String", default: "''", codec: ["ZSTD(3)"]}
    - {name: noteable_type, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: noteable_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: line_code, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: commit_id, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: st_diff, type: "String", default: "''", codec: ["ZSTD(3)"]}
    - {name: discussion_id, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: resolved_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: internal, type: "Bool", default: "false"}
    - {name: confidential, type: "Nullable(Bool)"}
    - {name: created_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: project_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: author_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_noteable_type, column: noteable_type, type: "set(14)", granularity: 2}
    - {name: idx_internal, column: internal, type: "minmax", granularity: 1}
    - {name: idx_confidential, column: confidential, type: "minmax", granularity: 1}
    - {name: idx_id, column: id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_note, column: note, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_note_ngram, column: note, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_discussion_id, column: discussion_id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_noteable_id, column: noteable_id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_project_id, column: project_id, type: "bloom_filter(0.0001)", granularity: 1}
    - {name: idx_author_id, column: author_id, type: "bloom_filter(0.0001)", granularity: 1}
