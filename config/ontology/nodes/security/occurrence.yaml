# config/ontology/nodes/security/occurrence.yaml

node_type: VulnerabilityOccurrence
domain: security
description: A specific occurrence of a vulnerability detected in a project
label: uuid
destination_table: gl_vulnerability_occurrence
default_columns: [id, uuid, name, severity, report_type]

style:
  size: 28
  color: "#EF4444"

redaction:
  resource_type: vulnerability_occurrence
  id_column: id
  ability: read_vulnerability
  required_role: security_manager

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the occurrence."

  uuid:
    type: uuid
    source: uuid
    nullable: false
    description: "UUID uniquely identifying the occurrence."

  name:
    type: string
    source: name
    nullable: false
    description: "Name of the vulnerability occurrence."

  description:
    type: string
    source: description
    nullable: true
    description: "Detailed description of the occurrence."

  solution:
    type: string
    source: solution
    nullable: true
    description: "Recommended solution or remediation."

  cve:
    type: string
    source: cve
    nullable: true
    description: "CVE identifier if applicable."

  location:
    type: string
    source: location
    nullable: true
    description: "Location where the vulnerability was found."

  location_fingerprint:
    type: string
    source: location_fingerprint
    nullable: false
    description: "Fingerprint identifying the location."

  severity:
    type: enum
    source: severity
    nullable: false
    description: "Severity level of the occurrence."
    values:
      1: info
      2: unknown
      4: low
      5: medium
      6: high
      7: critical

  report_type:
    type: enum
    source: report_type
    nullable: false
    description: "Type of security report."
    values:
      0: sast
      1: dependency_scanning
      2: container_scanning
      3: dast
      4: secret_detection
      5: coverage_fuzzing
      6: api_fuzzing
      7: cluster_image_scanning
      8: container_scanning_for_registry
      99: generic

  detection_method:
    type: enum
    source: detection_method
    nullable: false
    description: "Method used to detect the vulnerability."
    values:
      0: gitlab_security_report
      1: external_security_report
      2: bug_bounty
      3: code_review
      4: security_audit

  created_at:
    type: timestamp
    source: created_at
    nullable: false
    description: "Timestamp when the occurrence was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: false
    description: "Timestamp when the occurrence was last updated."

  detected_at:
    type: timestamp
    source: detected_at
    nullable: true
    description: "Timestamp when the vulnerability was detected."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

etl:
  type: table
  scope: namespaced
  source: siphon_vulnerability_occurrences
  edges:
    project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing
    scanner_id:
      to: VulnerabilityScanner
      as: DETECTED_BY
      direction: outgoing
    primary_identifier_id:
      to: VulnerabilityIdentifier
      as: HAS_IDENTIFIER
      direction: outgoing
    vulnerability_id:
      to: Vulnerability
      as: OCCURRENCE_OF
      direction: outgoing

storage:
  primary_key: [traversal_path, id]
  settings:
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: uuid, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: name, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: description, type: "Nullable(String)", codec: ["ZSTD(3)"]}
    - {name: solution, type: "Nullable(String)", codec: ["ZSTD(3)"]}
    - {name: cve, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: location, type: "Nullable(String)", codec: ["ZSTD(3)"]}
    - {name: location_fingerprint, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: severity, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: report_type, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: detection_method, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: created_at, type: "DateTime64(6, 'UTC')", default: "now()", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "DateTime64(6, 'UTC')", default: "now()", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: detected_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 256, 2, 0)", granularity: 1}
    - {name: idx_description, column: description, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_description_ngram, column: description, type: "ngrambf_v1(3, 256, 2, 0)", granularity: 1}
    - {name: idx_cve, column: cve, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_cve_ngram, column: cve, type: "ngrambf_v1(3, 256, 2, 0)", granularity: 1}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
