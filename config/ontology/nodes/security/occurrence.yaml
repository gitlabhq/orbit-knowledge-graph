# config/ontology/nodes/security/occurrence.yaml

node_type: VulnerabilityOccurrence
domain: security
description: A specific occurrence of a vulnerability detected in a project
label: uuid
destination_table: gl_vulnerability_occurrence
default_columns: [id, uuid, name, severity, report_type]

style:
  size: 28
  color: "#EF4444"

redaction:
  resource_type: vulnerability_occurrence
  id_column: id
  ability: read_vulnerability
  required_role: security_manager

properties:
  id:
    type: int64
    source: id
    nullable: false
    mutable: false
    description: "Unique ID."

  uuid:
    type: uuid
    source: uuid
    nullable: false
    mutable: false
    description: "Unique UUID."

  name:
    type: string
    source: name
    nullable: false
    description: "Occurrence name."

  description:
    type: string
    source: description
    nullable: false
    description: "Detailed description."

  solution:
    type: string
    source: solution
    nullable: false
    description: "Recommended remediation."

  cve:
    type: string
    source: cve
    nullable: false
    description: "Legacy fingerprint for deduplication. Not necessarily a CVE ID despite the column name."

  location:
    type: string
    source: location
    nullable: false
    description: "Vulnerability location (serialized JSON: file, dependency, image, or kubernetes_resource)."

  location_fingerprint:
    type: string
    source: location_fingerprint
    nullable: false
    description: "Location fingerprint."

  severity:
    type: enum
    source: severity
    nullable: false
    description: "Severity level."
    values:
      1: info
      2: unknown
      4: low
      5: medium
      6: high
      7: critical

  report_type:
    type: enum
    source: report_type
    nullable: false
    mutable: false
    description: "Security report type."
    values:
      0: sast
      1: dependency_scanning
      2: container_scanning
      3: dast
      4: secret_detection
      5: coverage_fuzzing
      6: api_fuzzing
      7: cluster_image_scanning
      8: container_scanning_for_registry
      9: sarif
      99: generic

  detection_method:
    type: enum
    source: detection_method
    nullable: false
    mutable: false
    description: "Detection method."
    values:
      0: gitlab_security_report
      1: external_security_report
      2: bug_bounty
      3: code_review
      4: security_audit

  created_at:
    type: timestamp
    source: created_at
    nullable: false
    mutable: false
    description: "Creation timestamp."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: false
    description: "Last update timestamp."

  detected_at:
    type: timestamp
    source: detected_at
    nullable: true
    description: "Detection timestamp."

  project_id:
    type: int64
    source: project_id
    nullable: false
    mutable: false
    description: "Owning project ID."

  scanner_id:
    type: int64
    source: scanner_id
    nullable: false
    mutable: false
    description: "Detecting scanner ID."

  vulnerability_id:
    type: int64
    source: vulnerability_id
    nullable: true
    description: "Linked vulnerability ID."

  primary_identifier_id:
    type: int64
    source: primary_identifier_id
    nullable: false
    mutable: false
    description: "Primary identifier (CVE/CWE) ID."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

etl:
  type: table
  scope: namespaced
  source: siphon_vulnerability_occurrences
  edges:
    project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing
    scanner_id:
      to: VulnerabilityScanner
      as: DETECTED_BY
      direction: outgoing
    primary_identifier_id:
      to: VulnerabilityIdentifier
      as: HAS_IDENTIFIER
      direction: outgoing
    vulnerability_id:
      to: Vulnerability
      as: OCCURRENCE_OF
      direction: outgoing

storage:
  primary_key: [traversal_path, id]
  settings:
    add_minmax_index_for_temporal_columns: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: uuid, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: name, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: description, type: "String", default: "''", codec: ["ZSTD(3)"]}
    - {name: solution, type: "String", default: "''", codec: ["ZSTD(3)"]}
    - {name: cve, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: location, type: "String", default: "'{}'", codec: ["ZSTD(3)"]}
    - {name: location_fingerprint, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: severity, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: report_type, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: detection_method, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: created_at, type: "DateTime64(6, 'UTC')", default: "now()", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "DateTime64(6, 'UTC')", default: "now()", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: detected_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: project_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: scanner_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: vulnerability_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: primary_identifier_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_description, column: description, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_cve, column: cve, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_project_id, column: project_id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_scanner_id, column: scanner_id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_vulnerability_id, column: vulnerability_id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_primary_identifier_id, column: primary_identifier_id, type: "bloom_filter(0.001)", granularity: 1}
