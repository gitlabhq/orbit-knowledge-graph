# config/ontology/nodes/security/security_scan.yaml

node_type: SecurityScan
domain: security
description: A security scan execution that produces findings within a CI/CD pipeline
label: id
destination_table: gl_security_scan
default_columns: [id, scan_type, status]

style:
  size: 26
  color: "#B91C1C"

redaction:
  resource_type: security_scan
  id_column: id
  ability: read_scan
  required_role: security_manager

properties:
  id:
    type: int64
    source: id
    nullable: false
    mutable: false
    description: "Unique ID."

  scan_type:
    type: enum
    source: scan_type
    nullable: false
    mutable: false
    description: "Scan type."
    values:
      1: sast
      2: dependency_scanning
      3: container_scanning
      4: dast
      5: secret_detection
      6: coverage_fuzzing
      7: api_fuzzing
      8: cluster_image_scanning
      9: sarif

  status:
    type: enum
    source: status
    nullable: false
    description: "Current status."
    values:
      0: created
      1: succeeded
      2: job_failed
      3: report_error
      4: preparing
      5: preparation_failed
      6: purged
    terminal_values: [succeeded, job_failed, report_error, preparation_failed, purged]

  latest:
    type: boolean
    source: latest
    nullable: false
    description: "Whether this is the latest scan of its type for the project."

  created_at:
    type: timestamp
    source: created_at
    nullable: false
    mutable: false
    description: "Creation timestamp."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: false
    description: "Last update timestamp."

  project_id:
    type: int64
    source: project_id
    nullable: false
    mutable: false
    description: "Owning project ID."

  pipeline_id:
    type: int64
    source: pipeline_id
    nullable: true
    mutable: false
    description: "Pipeline ID that ran this scan."

  build_id:
    type: int64
    source: build_id
    nullable: false
    mutable: false
    description: "Job (build) ID that executed this scan."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

etl:
  type: table
  scope: namespaced
  source: siphon_security_scans
  edges:
    project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing
    pipeline_id:
      to: Pipeline
      as: IN_PIPELINE
      direction: outgoing
    build_id:
      to: Job
      as: RAN_BY
      direction: outgoing

storage:
  primary_key: [traversal_path, id]
  settings:
    add_minmax_index_for_temporal_columns: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: scan_type, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: status, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: latest, type: "Bool", default: "true"}
    - {name: created_at, type: "DateTime64(6, 'UTC')", default: "now()", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "DateTime64(6, 'UTC')", default: "now()", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: project_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: pipeline_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: build_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_latest, column: latest, type: "minmax", granularity: 1}
    - {name: idx_id, column: id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_project_id, column: project_id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_pipeline_id, column: pipeline_id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_build_id, column: build_id, type: "bloom_filter(0.001)", granularity: 1}
