# config/ontology/nodes/security/security_scan.yaml

node_type: SecurityScan
domain: security
description: A security scan execution that produces findings within a CI/CD pipeline
label: id
destination_table: gl_security_scan
default_columns: [id, scan_type, status]

style:
  size: 26
  color: "#B91C1C"

redaction:
  resource_type: security_scan
  id_column: id
  ability: read_scan
  required_role: security_manager

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the security scan."

  scan_type:
    type: enum
    source: scan_type
    nullable: false
    description: "Type of security scan performed."
    values:
      1: sast
      2: dependency_scanning
      3: container_scanning
      4: dast
      5: secret_detection
      6: coverage_fuzzing
      7: api_fuzzing
      8: cluster_image_scanning
      9: sarif

  status:
    type: enum
    source: status
    nullable: false
    description: "Current status of the security scan."
    values:
      0: created
      1: succeeded
      2: job_failed
      3: report_error
      4: preparing
      5: preparation_failed
      6: purged

  latest:
    type: boolean
    source: latest
    nullable: false
    description: "Whether this is the latest scan for the project."

  created_at:
    type: timestamp
    source: created_at
    nullable: false
    description: "Timestamp when the security scan was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: false
    description: "Timestamp when the security scan was last updated."

  project_id:
    type: int64
    source: project_id
    nullable: false
    description: "Project this security scan belongs to. Stored on the node row so the compiler can filter by project without scanning the edge table."

  pipeline_id:
    type: int64
    source: pipeline_id
    nullable: true
    description: "Pipeline that ran this security scan."

  build_id:
    type: int64
    source: build_id
    nullable: false
    description: "Job (build) that executed this security scan."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

etl:
  type: table
  scope: namespaced
  source: siphon_security_scans
  edges:
    project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing
    pipeline_id:
      to: Pipeline
      as: IN_PIPELINE
      direction: outgoing
    build_id:
      to: Job
      as: RAN_BY
      direction: outgoing

storage:
  primary_key: [traversal_path, id]
  settings:
    allow_part_offset_column_in_projections: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: scan_type, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: status, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: latest, type: "Bool", default: "true"}
    - {name: created_at, type: "DateTime64(6, 'UTC')", default: "now()", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "DateTime64(6, 'UTC')", default: "now()", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: project_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: pipeline_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: build_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_latest, column: latest, type: "minmax", granularity: 1}
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: lightweight, name: by_project_id, order_by: [project_id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
