# config/ontology/nodes/security/finding.yaml

node_type: Finding
domain: security
description: A security scan finding (occurrence) that may be linked to a vulnerability
label: uuid
destination_table: gl_finding
default_columns: [id, uuid, name, severity]

style:
  size: 26
  color: "#F87171"

redaction:
  resource_type: security_finding
  id_column: id
  ability: read_security_resource
  required_role: security_manager

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Unique ID."

  uuid:
    type: uuid
    source: uuid
    nullable: false
    description: "Unique UUID."

  name:
    type: string
    source: name
    nullable: false
    description: "Finding name."

  description:
    type: string
    source: description
    nullable: true
    description: "Detailed description."

  solution:
    type: string
    source: solution
    nullable: true
    description: "Recommended remediation."

  severity:
    type: enum
    source: severity
    nullable: false
    description: "Severity level."
    values:
      1: info
      2: unknown
      4: low
      5: medium
      6: high
      7: critical

  deduplicated:
    type: boolean
    source: deduplicated
    nullable: false
    description: "Deduplicated flag."

  overridden_uuid:
    type: uuid
    source: overridden_uuid
    nullable: true
    description: "UUID of the overridden finding."

  project_id:
    type: int64
    source: project_id
    nullable: false
    description: "Owning project ID."

  scan_id:
    type: int64
    source: scan_id
    nullable: false
    description: "Producing security scan ID."

  scanner_id:
    type: int64
    source: scanner_id
    nullable: false
    description: "Detecting scanner ID."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

etl:
  type: query
  scope: namespaced
  source: siphon_security_findings
  select: >-
    traversal_path, id, toString(uuid) AS uuid,
    nullIf(JSONExtractString(finding_data, 'name'), '') AS name,
    nullIf(JSONExtractString(finding_data, 'description'), '') AS description,
    nullIf(JSONExtractString(finding_data, 'solution'), '') AS solution,
    severity, deduplicated, toString(overridden_uuid) AS overridden_uuid,
    project_id, scanner_id, scan_id, partition_number
  from: siphon_security_findings
  traversal_path_filter: "startsWith(traversal_path, {traversal_path:String})"
  order_by: [traversal_path, id, partition_number]
  edges:
    project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing
    scanner_id:
      to: VulnerabilityScanner
      as: DETECTED_BY
      direction: outgoing
    scan_id:
      to: SecurityScan
      as: HAS_FINDING
      direction: incoming

storage:
  primary_key: [traversal_path, id]
  settings:
    allow_part_offset_column_in_projections: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: uuid, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: name, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: description, type: "Nullable(String)", codec: ["ZSTD(3)"]}
    - {name: solution, type: "Nullable(String)", codec: ["ZSTD(3)"]}
    - {name: severity, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: deduplicated, type: "Bool", default: "false"}
    - {name: overridden_uuid, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: project_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: scan_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: scanner_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_deduplicated, column: deduplicated, type: "minmax", granularity: 1}
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_description, column: description, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_project_id, column: project_id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_scan_id, column: scan_id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_scanner_id, column: scanner_id, type: "bloom_filter(0.01)", granularity: 1}
  projections:
    - {type: lightweight, name: by_id, versioned_sort_key: [id]}
    - {type: lightweight, name: by_project_id, versioned_sort_key: [project_id]}
    - {type: lightweight, name: by_scan_id, versioned_sort_key: [scan_id]}
    - {type: lightweight, name: by_scanner_id, versioned_sort_key: [scanner_id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
