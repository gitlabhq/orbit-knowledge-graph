# config/ontology/nodes/security/finding.yaml

node_type: Finding
domain: security
description: A security scan finding (occurrence) that may be linked to a vulnerability
label: uuid
destination_table: gl_finding
default_columns: [id, uuid, name, severity]

style:
  size: 26
  color: "#F87171"

redaction:
  resource_type: security_finding
  id_column: id
  ability: read_security_resource
  required_role: security_manager

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the finding."

  uuid:
    type: uuid
    source: uuid
    nullable: false
    description: "UUID uniquely identifying the finding."

  name:
    type: string
    source: name
    nullable: false
    description: "Name of the finding."

  description:
    type: string
    source: description
    nullable: true
    description: "Detailed description of the finding."

  solution:
    type: string
    source: solution
    nullable: true
    description: "Recommended solution or remediation for the finding."

  severity:
    type: enum
    source: severity
    nullable: false
    description: "Severity level of the finding."
    values:
      0: info
      1: unknown
      2: low
      3: medium
      4: high
      5: critical

  deduplicated:
    type: boolean
    source: deduplicated
    nullable: false
    description: "Whether this finding has been deduplicated."

  overridden_uuid:
    type: uuid
    source: overridden_uuid
    nullable: true
    description: "UUID of the finding this one overrides."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

etl:
  type: query
  scope: namespaced
  select: >-
    traversal_path, id, toString(uuid) AS uuid,
    nullIf(JSONExtractString(finding_data, 'name'), '') AS name,
    nullIf(JSONExtractString(finding_data, 'description'), '') AS description,
    nullIf(JSONExtractString(finding_data, 'solution'), '') AS solution,
    severity, deduplicated, toString(overridden_uuid) AS overridden_uuid,
    project_id, scanner_id, scan_id, partition_number
  from: siphon_security_findings
  traversal_path_filter: "startsWith(traversal_path, {traversal_path:String})"
  order_by: [traversal_path, id, partition_number]
  edges:
    project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing
    scanner_id:
      to: VulnerabilityScanner
      as: DETECTED_BY
      direction: outgoing
    scan_id:
      to: SecurityScan
      as: HAS_FINDING
      direction: incoming

storage:
  primary_key: [traversal_path, id]
  settings:
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: uuid, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: name, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: description, type: "Nullable(String)", codec: ["ZSTD(3)"]}
    - {name: solution, type: "Nullable(String)", codec: ["ZSTD(3)"]}
    - {name: severity, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: deduplicated, type: "Bool", default: "false"}
    - {name: overridden_uuid, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_deduplicated, column: deduplicated, type: "minmax", granularity: 1}
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_description, column: description, type: "bloom_filter(0.01)", granularity: 1}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
