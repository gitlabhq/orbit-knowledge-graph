# config/ontology/nodes/security/identifier.yaml

node_type: VulnerabilityIdentifier
domain: security
description: A vulnerability identifier such as a CVE, CWE, or other external reference
label: name
destination_table: gl_vulnerability_identifier
default_columns: [id, name, external_type, external_id]

style:
  size: 22
  color: "#7F1D1D"

redaction:
  resource_type: vulnerability_identifier
  id_column: id
  ability: read_vulnerability
  required_role: security_manager

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the vulnerability identifier."

  external_type:
    type: string
    source: external_type
    nullable: false
    description: "Type of external identifier (e.g., cve, cwe, gemnasium)."

  external_id:
    type: string
    source: external_id
    nullable: false
    description: "External identifier value (e.g., CVE-2021-44228)."

  name:
    type: string
    source: name
    nullable: false
    description: "Human-readable name of the identifier."

  url:
    type: string
    source: url
    nullable: true
    description: "URL with more information about the identifier."

  created_at:
    type: timestamp
    source: created_at
    nullable: false
    description: "Timestamp when the identifier was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: false
    description: "Timestamp when the identifier was last updated."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

etl:
  type: table
  scope: namespaced
  source: siphon_vulnerability_identifiers
  edges:
    project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing

storage:
  primary_key: [traversal_path, id]
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: external_type, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: external_id, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: name, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: url, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_external_type, column: external_type, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_external_type_ngram, column: external_type, type: "ngrambf_v1(3, 256, 2, 0)", granularity: 1}
    - {name: idx_external_id, column: external_id, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_external_id_ngram, column: external_id, type: "ngrambf_v1(3, 256, 2, 0)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 256, 2, 0)", granularity: 1}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
