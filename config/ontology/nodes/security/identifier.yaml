# config/ontology/nodes/security/identifier.yaml

node_type: VulnerabilityIdentifier
domain: security
description: A vulnerability identifier such as a CVE, CWE, or other external reference
label: name
destination_table: gl_vulnerability_identifier
default_columns: [id, name, external_type, external_id]

style:
  size: 22
  color: "#7F1D1D"

redaction:
  resource_type: vulnerability_identifier
  id_column: id
  ability: read_vulnerability
  required_role: security_manager

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Unique ID."

  external_type:
    type: string
    source: external_type
    nullable: false
    description: "Identifier type (e.g. cve, cwe, gemnasium)."

  external_id:
    type: string
    source: external_id
    nullable: false
    description: "Identifier value (e.g. CVE-2021-44228)."

  name:
    type: string
    source: name
    nullable: false
    description: "Human-readable name."

  url:
    type: string
    source: url
    nullable: false
    description: "Reference URL."

  created_at:
    type: timestamp
    source: created_at
    nullable: false
    description: "Creation timestamp."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: false
    description: "Last update timestamp."

  project_id:
    type: int64
    source: project_id
    nullable: false
    description: "Owning project ID."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

etl:
  type: table
  scope: namespaced
  source: siphon_vulnerability_identifiers
  edges:
    project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing

storage:
  primary_key: [traversal_path, id]
  settings:
    add_minmax_index_for_temporal_columns: "1"
    allow_part_offset_column_in_projections: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: external_type, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: external_id, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: name, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: url, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: project_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_external_type, column: external_type, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_external_type_ngram, column: external_type, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_external_id, column: external_id, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_external_id_ngram, column: external_id, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: lightweight, name: by_project_id, order_by: [project_id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
