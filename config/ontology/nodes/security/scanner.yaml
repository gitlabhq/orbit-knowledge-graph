# config/ontology/nodes/security/scanner.yaml

node_type: VulnerabilityScanner
domain: security
description: A security scanner that detects vulnerabilities in projects
label: name
destination_table: gl_vulnerability_scanner
default_columns: [id, name, vendor]

style:
  size: 24
  color: "#FCA5A5"

redaction:
  resource_type: vulnerability_scanner
  id_column: id
  ability: read_vulnerability_scanner
  required_role: security_manager

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the scanner."

  external_id:
    type: string
    source: external_id
    nullable: false
    description: "External identifier for the scanner (e.g., gemnasium, bandit)."

  name:
    type: string
    source: name
    nullable: false
    description: "Human-readable name of the scanner."

  vendor:
    type: string
    source: vendor
    nullable: false
    description: "Vendor that provides the scanner (default: GitLab)."

  created_at:
    type: timestamp
    source: created_at
    nullable: false
    description: "Timestamp when the scanner was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: false
    description: "Timestamp when the scanner was last updated."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

etl:
  type: table
  scope: namespaced
  source: siphon_vulnerability_scanners
  edges:
    project_id:
      to: Project
      as: SCANS
      direction: outgoing

storage:
  primary_key: [traversal_path, id]
  settings:
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: external_id, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: name, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: vendor, type: "LowCardinality(String)", default: "'GitLab'", codec: ["LZ4"]}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_external_id, column: external_id, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_external_id_ngram, column: external_id, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
