# config/ontology/nodes/security/scanner.yaml

node_type: VulnerabilityScanner
domain: security
description: A security scanner that detects vulnerabilities in projects
label: name
destination_table: gl_vulnerability_scanner
default_columns: [id, name, vendor]

style:
  size: 24
  color: "#FCA5A5"

redaction:
  resource_type: vulnerability_scanner
  id_column: id
  ability: read_vulnerability_scanner

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the scanner."

  external_id:
    type: string
    source: external_id
    nullable: false
    description: "External identifier for the scanner (e.g., gemnasium, bandit)."

  name:
    type: string
    source: name
    nullable: false
    description: "Human-readable name of the scanner."

  vendor:
    type: string
    source: vendor
    nullable: false
    description: "Vendor that provides the scanner (default: GitLab)."

  created_at:
    type: timestamp
    source: created_at
    nullable: false
    description: "Timestamp when the scanner was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: false
    description: "Timestamp when the scanner was last updated."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

etl:
  type: table
  scope: namespaced
  source: siphon_vulnerability_scanners
  edges:
    project_id:
      to: Project
      as: SCANS
      direction: outgoing
