# config/ontology/nodes/ci/pipeline.yaml

node_type: Pipeline
domain: ci
description: A CI/CD pipeline that runs a series of stages and jobs to build, test, and deploy code
label: id
destination_table: gl_pipeline
default_columns: [id, iid, status, ref, source]

style:
  size: 30
  color: "#6366F1"

redaction:
  resource_type: ci_pipeline
  id_column: id
  ability: read_pipeline

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Unique ID."

  iid:
    type: int64
    source: iid
    nullable: true
    description: "Project-scoped pipeline number."

  sha:
    type: string
    source: sha
    nullable: false
    description: "Commit SHA the pipeline runs against."

  ref:
    type: string
    source: ref
    nullable: false
    description: "Branch or tag name."

  status:
    type: enum
    source: status
    nullable: false
    description: "Execution status."
    enum_type: string
    values:
      0: created
      1: pending
      2: running
      3: success
      4: failed
      5: canceled
      6: skipped
      7: manual
      8: scheduled
      9: preparing
      10: waiting_for_resource
      11: waiting_for_callback
      12: canceling

  source:
    type: enum
    source: source
    nullable: false
    description: "Trigger source."
    values:
      0: unknown
      1: push
      2: web
      3: trigger
      4: schedule
      5: api
      6: external
      7: pipeline
      8: chat
      9: webide
      10: merge_request_event
      11: external_pull_request_event
      12: parent_pipeline
      13: ondemand_dast_scan
      14: ondemand_dast_validation
      15: security_orchestration_policy
      16: container_registry_push
      17: duo_workflow
      18: pipeline_execution_policy_schedule
      19: dependency_management_security_update

  tag:
    type: boolean
    source: tag
    nullable: false
    description: "Whether running on a git tag."

  duration:
    type: int64
    source: duration
    nullable: true
    description: "Wall-clock duration in seconds (first job start to last job finish, excluding queued time)."

  failure_reason:
    type: enum
    source: failure_reason
    nullable: true
    description: "Failure reason."
    values:
      0: unknown_failure
      1: config_error
      2: external_validation_failure
      3: user_not_verified
      21: size_limit_exceeded
      22: job_activity_limit_exceeded
      23: deployments_limit_exceeded
      25: project_deleted
      26: filtered_by_rules
      27: filtered_by_workflow_rules
      28: composite_identity_forbidden
      29: pipeline_ref_creation_failure
      30: filtered_by_no_pipeline

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Creation timestamp."

  started_at:
    type: timestamp
    source: started_at
    nullable: true
    description: "Execution start timestamp."

  finished_at:
    type: timestamp
    source: finished_at
    nullable: true
    description: "Execution finish timestamp."

  committed_at:
    type: timestamp
    source: committed_at
    nullable: true
    description: "Commit timestamp."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Last update timestamp."

  before_sha:
    type: string
    source: before_sha
    nullable: false
    description: "Previous commit SHA before the triggering push."

  yaml_errors:
    type: string
    source: yaml_errors
    nullable: false
    description: "CI config parsing errors."

  protected:
    type: boolean
    source: protected
    nullable: true
    description: "Whether the ref is protected."

  project_id:
    type: int64
    source: project_id
    nullable: false
    description: "Owning project ID."

  user_id:
    type: int64
    source: user_id
    nullable: true
    description: "Triggering user ID."

  merge_request_id:
    type: int64
    source: merge_request_id
    nullable: true
    description: "Triggering MR ID."

  auto_canceled_by_id:
    type: int64
    source: auto_canceled_by_id
    nullable: true
    description: "Pipeline ID that auto-canceled this one."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

etl:
  type: table
  scope: namespaced
  source: siphon_p_ci_pipelines
  order_by: [traversal_path, id, partition_id]
  edges:
    project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing
    user_id:
      to: User
      as: TRIGGERED
      direction: incoming
    merge_request_id:
      to: MergeRequest
      as: TRIGGERED
      direction: incoming
    auto_canceled_by_id:
      to: Pipeline
      as: AUTO_CANCELED_BY
      direction: outgoing

storage:
  primary_key: [traversal_path, id]
  settings:
    allow_part_offset_column_in_projections: "1"
    add_minmax_index_for_temporal_columns: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: iid, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: sha, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: ref, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: status, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: source, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: tag, type: "Bool", default: "false"}
    - {name: duration, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: failure_reason, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: started_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: finished_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: committed_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: before_sha, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: yaml_errors, type: "String", default: "''", codec: ["ZSTD(3)"]}
    - {name: protected, type: "Nullable(Bool)"}
    - {name: project_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: user_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: merge_request_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: auto_canceled_by_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_status, column: status, type: "set(16)", granularity: 2}
    - {name: idx_tag, column: tag, type: "minmax", granularity: 1}
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_source, column: source, type: "set(20)", granularity: 2}
    - {name: idx_ref, column: ref, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_ref_ngram, column: ref, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_project_id, column: project_id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_user_id, column: user_id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_merge_request_id, column: merge_request_id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_auto_canceled_by_id, column: auto_canceled_by_id, type: "bloom_filter(0.01)", granularity: 1}
  projections:
    - {type: lightweight, name: by_id, versioned_sort_key: [id]}
    - {type: lightweight, name: by_project_id, versioned_sort_key: [project_id]}
    - {type: lightweight, name: by_user_id, versioned_sort_key: [user_id]}
    - {type: lightweight, name: by_merge_request_id, versioned_sort_key: [merge_request_id]}
    - {type: lightweight, name: by_auto_canceled_by_id, versioned_sort_key: [auto_canceled_by_id]}
    - {type: lightweight, name: by_status_id, versioned_sort_key: [status, id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
