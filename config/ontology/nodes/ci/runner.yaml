# config/ontology/nodes/ci/runner.yaml

node_type: Runner
domain: ci
description: A CI/CD runner that executes jobs
label: name
destination_table: gl_runner
default_columns: [id, runner_type, name, active]
sort_key: [id]

style:
  size: 22
  color: "#A78BFA"

redaction:
  resource_type: ci_runner
  id_column: id
  ability: read_runner

properties:
  id:
    type: int64
    source: id
    nullable: false
    immutable: true
    description: "Unique ID."

  runner_type:
    type: enum
    source: runner_type
    nullable: false
    immutable: true
    description: "Scope: instance, group, or project."
    values:
      1: instance_type
      2: group_type
      3: project_type

  name:
    type: string
    source: name
    nullable: false
    description: "Human-readable runner name."

  description:
    type: string
    source: description
    nullable: false
    description: "Maintainer-provided description."

  active:
    type: boolean
    source: active
    nullable: false
    description: "Whether currently accepting jobs."

  locked:
    type: boolean
    source: locked
    nullable: false
    description: "Whether locked to its assignment."

  run_untagged:
    type: boolean
    source: run_untagged
    nullable: false
    description: "Whether it picks up untagged jobs."

  access_level:
    type: enum
    source: access_level
    nullable: false
    description: "Whether restricted to protected refs."
    values:
      0: not_protected
      1: ref_protected

  maximum_timeout:
    type: int64
    source: maximum_timeout
    nullable: true
    description: "Max job timeout in seconds."

  organization_id:
    type: int64
    source: organization_id
    nullable: true
    description: "Cell organization ID."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    immutable: true
    description: "Registration timestamp."

  contacted_at:
    type: timestamp
    source: contacted_at
    nullable: true
    description: "Last contact timestamp."

etl:
  type: table
  scope: global
  source: siphon_ci_runners
  order_by: [id, runner_type]

storage:
  primary_key: [id]
  settings:
    add_minmax_index_for_temporal_columns: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
    allow_part_offset_column_in_projections: "1"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: runner_type, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: name, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: description, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: active, type: "Bool", default: "true"}
    - {name: locked, type: "Bool", default: "false"}
    - {name: run_untagged, type: "Bool", default: "true"}
    - {name: access_level, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: maximum_timeout, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: organization_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: contacted_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
  indexes:
    - {name: idx_runner_type, column: runner_type, type: "set(4)", granularity: 2}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
  projections:
    - {type: lightweight, name: by_runner_type, versioned_sort_key: [runner_type, id]}
