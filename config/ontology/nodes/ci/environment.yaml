# config/ontology/nodes/ci/environment.yaml

node_type: Environment
domain: ci
description: A CI/CD deployment target (production, staging, review app, etc.)
label: name
destination_table: gl_environment
default_columns: [id, name, state, tier]

style:
  size: 22
  color: "#0EA5E9"

redaction:
  resource_type: environment
  id_column: id
  ability: read_environment

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Unique ID."

  project_id:
    type: int64
    source: project_id
    nullable: false
    description: "Owning project ID."

  name:
    type: string
    source: name
    nullable: false
    description: "Name (e.g. 'production', 'staging', 'review/feature-x')."

  slug:
    type: string
    source: slug
    nullable: false
    description: "URL-safe slug derived from name."

  external_url:
    type: string
    source: external_url
    nullable: false
    description: "External URL of the environment."

  environment_type:
    type: string
    source: environment_type
    nullable: false
    description: "Category from name prefix before first '/' (e.g. 'review'); empty when no '/'."

  state:
    type: enum
    source: state
    nullable: false
    description: "Lifecycle state."
    enum_type: string
    values:
      0: available
      1: stopping
      2: stopped

  tier:
    type: enum
    source: tier
    nullable: false
    description: "Deployment tier."
    values:
      0: production
      1: staging
      2: testing
      3: development
      4: other

  auto_stop_at:
    type: timestamp
    source: auto_stop_at
    nullable: true
    description: "Scheduled auto-stop timestamp."

  auto_delete_at:
    type: timestamp
    source: auto_delete_at
    nullable: true
    description: "Scheduled auto-delete timestamp."

  auto_stop_setting:
    type: enum
    source: auto_stop_setting
    nullable: false
    description: "Auto-stop behavior."
    values:
      0: always
      1: with_action

  cluster_agent_id:
    type: int64
    source: cluster_agent_id
    nullable: true
    description: "Associated Kubernetes cluster agent ID."

  kubernetes_namespace:
    type: string
    source: kubernetes_namespace
    nullable: false
    description: "Target Kubernetes namespace."

  flux_resource_path:
    type: string
    source: flux_resource_path
    nullable: false
    description: "Flux resource path for GitOps."

  description:
    type: string
    source: description
    nullable: false
    description: "Free-form description."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Creation timestamp."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Last update timestamp."

  merge_request_id:
    type: int64
    source: merge_request_id
    nullable: true
    description: "MR that created this review environment."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

etl:
  type: table
  scope: namespaced
  source: siphon_environments
  edges:
    project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing
    merge_request_id:
      to: MergeRequest
      as: CREATED_FOR_MR
      direction: outgoing

storage:
  primary_key: [traversal_path, id]
  settings:
    add_minmax_index_for_temporal_columns: "1"
    allow_part_offset_column_in_projections: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: project_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: name, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: slug, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: external_url, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: environment_type, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: state, type: "LowCardinality(String)", default: "'available'", codec: ["LZ4"]}
    - {name: tier, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: auto_stop_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: auto_delete_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: auto_stop_setting, type: "LowCardinality(String)", default: "'always'", codec: ["LZ4"]}
    - {name: cluster_agent_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: kubernetes_namespace, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: flux_resource_path, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: description, type: "String", default: "''", codec: ["ZSTD(3)"]}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: merge_request_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_state, column: state, type: "set(4)", granularity: 2}
    - {name: idx_tier, column: tier, type: "set(8)", granularity: 2}
    - {name: idx_environment_type, column: environment_type, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_environment_type_ngram, column: environment_type, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_project_id, column: project_id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_merge_request_id, column: merge_request_id, type: "bloom_filter(0.01)", granularity: 1}
  projections:
    - {type: lightweight, name: by_id, order_by: [id]}
    - {type: lightweight, name: by_project_id, order_by: [project_id]}
    - {type: lightweight, name: by_merge_request_id, order_by: [merge_request_id]}
    - {type: lightweight, name: by_tier_state, order_by: [tier, state, id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
