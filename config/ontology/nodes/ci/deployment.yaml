# config/ontology/nodes/ci/deployment.yaml

node_type: Deployment
domain: ci
description: A deployment of a specific commit to a CI/CD environment
label: id
destination_table: gl_deployment
default_columns: [id, iid, status, ref, sha]

style:
  size: 26
  color: "#14B8A6"

redaction:
  resource_type: deployment
  id_column: id
  ability: read_deployment

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Unique ID."

  iid:
    type: int64
    source: iid
    nullable: false
    description: "Project-scoped deployment number."

  project_id:
    type: int64
    source: project_id
    nullable: false
    description: "Owning project ID."

  ref:
    type: string
    source: ref
    nullable: false
    description: "Git ref (branch or tag) deployed."

  tag:
    type: boolean
    source: tag
    nullable: false
    description: "Whether the ref is a tag."

  sha:
    type: string
    source: sha
    nullable: false
    description: "Deployed commit SHA."

  status:
    type: enum
    source: status
    nullable: false
    description: "Execution status."
    values:
      0: created
      1: running
      2: success
      3: failed
      4: canceled
      5: skipped
      6: blocked

  deployable_type:
    type: string
    source: deployable_type
    nullable: false
    description: "Polymorphic type (typically CommitStatus, the STI base class for Ci::Build)."

  deployable_id:
    type: int64
    source: deployable_id
    nullable: true
    description: "Deployable ID."

  on_stop:
    type: string
    source: on_stop
    nullable: false
    description: "Job name that stops this deployment."

  archived:
    type: boolean
    source: archived
    nullable: false
    description: "Whether archived."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Creation timestamp."

  finished_at:
    type: timestamp
    source: finished_at
    nullable: true
    description: "Execution finish timestamp."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Last update timestamp."

  environment_id:
    type: int64
    source: environment_id
    nullable: false
    description: "Target environment ID."

  user_id:
    type: int64
    source: user_id
    nullable: true
    description: "Deploying user ID."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

etl:
  type: table
  scope: namespaced
  source: siphon_deployments
  edges:
    project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing
    environment_id:
      to: Environment
      as: IN_ENVIRONMENT
      direction: outgoing
    user_id:
      to: User
      as: DEPLOYED_BY
      direction: incoming

storage:
  primary_key: [traversal_path, id]
  settings:
    allow_part_offset_column_in_projections: "1"
    add_minmax_index_for_temporal_columns: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: iid, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: project_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: ref, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: tag, type: "Bool", default: "false"}
    - {name: sha, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: status, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: deployable_type, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: deployable_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: on_stop, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: archived, type: "Bool", default: "false"}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: finished_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: environment_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: user_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_status, column: status, type: "set(8)", granularity: 2}
    - {name: idx_archived, column: archived, type: "minmax", granularity: 1}
    - {name: idx_id, column: id, type: "bloom_filter(0.01)", granularity: 1}
    - {name: idx_ref, column: ref, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_ref_ngram, column: ref, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
  projections:
    - {type: reorder, name: by_id, order_by: [id]}
    - {type: lightweight, name: by_project_id, order_by: [project_id]}
    - {type: lightweight, name: by_environment_id, order_by: [environment_id]}
    - {type: lightweight, name: by_user_id, order_by: [user_id]}
    - {type: reorder, name: by_status_id, order_by: [status, id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
