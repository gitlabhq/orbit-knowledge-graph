# config/ontology/nodes/ci/job.yaml

node_type: Job
domain: ci
description: A CI/CD job that executes scripts within a pipeline stage
label: name
destination_table: gl_job
default_columns: [id, name, status, ref]

style:
  size: 24
  color: "#8B5CF6"

redaction:
  resource_type: ci_build
  id_column: id
  ability: read_build

properties:
  id:
    type: int64
    source: id
    nullable: false
    immutable: true
    description: "Unique ID."

  name:
    type: string
    source: name
    nullable: false
    immutable: true
    description: "Job name from .gitlab-ci.yml."

  status:
    type: enum
    source: status
    nullable: false
    description: "Execution status."
    enum_type: string
    values:
      0: created
      1: pending
      2: running
      3: success
      4: failed
      5: canceled
      6: skipped
      7: manual
      8: scheduled
      9: preparing
      10: waiting_for_resource
      11: waiting_for_callback
      12: canceling
    terminal_values: [success, failed, canceled, skipped]

  ref:
    type: string
    source: ref
    nullable: false
    immutable: true
    description: "Branch or tag name."

  tag:
    type: boolean
    source: tag
    nullable: true
    immutable: true
    description: "Whether running on a git tag."

  allow_failure:
    type: boolean
    source: allow_failure
    nullable: false
    description: "Whether failure is allowed without failing the pipeline."

  coverage:
    type: string
    source: coverage
    nullable: false
    description: "Reported code coverage percentage."

  environment:
    type: string
    source: environment
    nullable: false
    description: "Target environment name (e.g. production, staging)."

  when:
    type: enum
    source: when
    nullable: false
    description: "Run condition."
    enum_type: string
    values:
      0: on_success
      1: on_failure
      2: always
      3: manual
      4: delayed

  retried:
    type: boolean
    source: retried
    nullable: true
    description: "Whether superseded by a retry."

  failure_reason:
    type: enum
    source: failure_reason
    nullable: false
    description: "Failure reason."
    values:
      1: script_failure
      2: api_failure
      3: stuck_or_timeout_failure
      4: runner_system_failure
      5: missing_dependency_failure
      6: runner_unsupported
      7: stale_schedule
      8: job_execution_timeout
      9: archived_failure
      10: unmet_prerequisites
      11: scheduler_failure
      12: data_integrity_failure
      13: forward_deployment_failure
      14: user_blocked
      15: project_deleted
      16: ci_quota_exceeded
      17: pipeline_loop_detected
      18: no_matching_runner
      19: trace_size_exceeded
      20: builds_disabled
      21: environment_creation_failure
      22: deployment_rejected
      23: failed_outdated_deployment_job
      24: job_execution_server_timeout
      25: stuck_pending_with_matching_runners
      26: stuck_pending_no_matching_runners
      27: no_updates_running
      28: no_updates_canceling
      29: server_timeout_running
      30: server_timeout_canceling
      1000: protected_environment_failure
      1001: insufficient_bridge_permissions
      1002: downstream_bridge_project_not_found
      1003: invalid_bridge_trigger
      1004: upstream_bridge_project_not_found
      1005: insufficient_upstream_permissions
      1006: bridge_pipeline_is_child_pipeline
      1007: downstream_pipeline_creation_failed
      1008: secrets_provider_not_found
      1009: reached_max_descendant_pipelines_depth
      1010: ip_restriction_failure
      1011: reached_max_pipeline_hierarchy_size
      1012: reached_downstream_pipeline_trigger_rate_limit
      1013: duo_workflow_not_allowed
      1014: job_router_failure
      1015: job_token_expired

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    immutable: true
    description: "Creation timestamp."

  started_at:
    type: timestamp
    source: started_at
    nullable: true
    description: "Execution start timestamp."

  finished_at:
    type: timestamp
    source: finished_at
    nullable: true
    description: "Execution finish timestamp."

  queued_at:
    type: timestamp
    source: queued_at
    nullable: true
    description: "Queue timestamp."

  type:
    type: string
    source: type
    nullable: false
    immutable: true
    description: "STI class: Ci::Build, Ci::Bridge, or GenericCommitStatus."
    selectivity: low

  runner_id:
    type: int64
    source: runner_id
    nullable: true
    description: "Executing runner ID."

  timeout:
    type: int64
    source: timeout
    nullable: true
    description: "Effective timeout in seconds."

  timeout_source:
    type: enum
    source: timeout_source
    nullable: false
    description: "Timeout origin: project, runner, or job."
    values:
      1: unknown_timeout_source
      2: project_timeout_source
      3: runner_timeout_source
      4: job_timeout_source

  exit_code:
    type: int64
    source: exit_code
    nullable: true
    description: "Process exit code from the runner."

  scheduling_type:
    type: enum
    source: scheduling_type
    nullable: false
    immutable: true
    description: "Scheduling mode: stage or DAG."
    values:
      0: stage
      1: dag

  project_id:
    type: int64
    source: project_id
    nullable: false
    immutable: true
    description: "Owning project ID."

  user_id:
    type: int64
    source: user_id
    nullable: true
    immutable: true
    description: "Triggering user ID."

  upstream_pipeline_id:
    type: int64
    source: upstream_pipeline_id
    nullable: true
    immutable: true
    description: "Upstream pipeline ID for bridge jobs."

  stage_id:
    type: int64
    source: stage_id
    nullable: true
    immutable: true
    description: "Containing stage ID."

  pipeline_id:
    type: int64
    source: commit_id
    nullable: true
    immutable: true
    description: "Containing pipeline ID. Source column is commit_id (legacy Rails naming)."

  auto_canceled_by_id:
    type: int64
    source: auto_canceled_by_id
    nullable: true
    description: "Pipeline ID that auto-canceled this job."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

etl:
  type: table
  scope: namespaced
  source: siphon_p_ci_builds
  order_by: [traversal_path, id, partition_id]
  edges:
    project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing
    stage_id:
      to: Stage
      as: HAS_JOB
      direction: incoming
    user_id:
      to: User
      as: TRIGGERED
      direction: incoming
    commit_id:
      - { to: Pipeline, as: IN_PIPELINE, direction: outgoing }
      - { to: Pipeline, as: HAS_JOB, direction: incoming }
    runner_id:
      to: Runner
      as: RUNS_ON
      direction: outgoing
    upstream_pipeline_id:
      to: Pipeline
      as: TRIGGERED_BY_PIPELINE
      direction: outgoing
    auto_canceled_by_id:
      to: Pipeline
      as: AUTO_CANCELED_BY
      direction: outgoing

storage:
  primary_key: [traversal_path, id]
  settings:
    allow_part_offset_column_in_projections: "1"
    add_minmax_index_for_temporal_columns: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: name, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: status, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: ref, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: tag, type: "Nullable(Bool)"}
    - {name: allow_failure, type: "Bool", default: "false"}
    - {name: coverage, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: environment, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: "`when`", type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: retried, type: "Nullable(Bool)"}
    - {name: failure_reason, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: created_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: started_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: finished_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: queued_at, type: "Nullable(DateTime64(6, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: type, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: runner_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: timeout, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: timeout_source, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: exit_code, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: scheduling_type, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: project_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: user_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: upstream_pipeline_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: stage_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: pipeline_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: auto_canceled_by_id, type: "Nullable(Int64)", codec: ["Delta(8)", "LZ4"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_status, column: status, type: "set(16)", granularity: 2}
    - {name: idx_allow_failure, column: allow_failure, type: "minmax", granularity: 1}
    - {name: idx_retried, column: retried, type: "minmax", granularity: 1}
    - {name: idx_created_at, column: created_at, type: "minmax", granularity: 1}
    - {name: idx_started_at, column: started_at, type: "minmax", granularity: 1}
    - {name: idx_finished_at, column: finished_at, type: "minmax", granularity: 1}
    - {name: idx_queued_at, column: queued_at, type: "minmax", granularity: 1}
    - {name: idx_id, column: id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_name, column: name, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_name_ngram, column: name, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_ref, column: ref, type: "text(tokenizer = splitByNonAlpha)", granularity: 1}
    - {name: idx_ref_ngram, column: ref, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_project_id, column: project_id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_user_id, column: user_id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_upstream_pipeline_id, column: upstream_pipeline_id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_stage_id, column: stage_id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_pipeline_id, column: pipeline_id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_runner_id, column: runner_id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_auto_canceled_by_id, column: auto_canceled_by_id, type: "bloom_filter(0.001)", granularity: 1}
  projections:
    - {type: lightweight, name: by_id, versioned_sort_key: [id]}
    - {type: lightweight, name: by_project_id, versioned_sort_key: [project_id]}
    - {type: lightweight, name: by_user_id, versioned_sort_key: [user_id]}
    - {type: lightweight, name: by_upstream_pipeline_id, versioned_sort_key: [upstream_pipeline_id]}
    - {type: lightweight, name: by_stage_id, versioned_sort_key: [stage_id]}
    - {type: lightweight, name: by_pipeline_id, versioned_sort_key: [pipeline_id]}
    - {type: lightweight, name: by_runner_id, versioned_sort_key: [runner_id]}
    - {type: lightweight, name: by_auto_canceled_by_id, versioned_sort_key: [auto_canceled_by_id]}
    - {type: lightweight, name: by_status_id, versioned_sort_key: [status, id]}
    - {type: lightweight, name: by_pipeline_status, versioned_sort_key: [traversal_path, pipeline_id, status, id]}
    - {type: aggregate, name: tp_count, select: [traversal_path, "uniq(id)"], group_by: [traversal_path]}
