# config/ontology/nodes/packages/package_file.yaml

node_type: PackageFile
domain: packages
description: A file belonging to a package in the GitLab package registry (the stored artifact, for example a .whl, .jar, or .tgz)
label: file_name
destination_table: gl_package_file
default_columns: [id, file_name, size, file_sha256, status]

style:
  size: 20
  color: "#FDBA74"

redaction:
  resource_type: package_file
  id_column: id
  ability: read_package

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Unique ID."

  file_name:
    type: string
    source: file_name
    nullable: false
    description: "File name."

  size:
    type: int64
    source: size
    nullable: true
    description: "File size in bytes."

  file_sha256:
    type: string
    source: file_sha256
    nullable: true
    description: "SHA-256 checksum of the file."

  status:
    type: enum
    source: status
    nullable: false
    description: "File lifecycle status."
    values:
      0: default
      1: pending_destruction
      2: processing
      3: error

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Creation timestamp."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Last update timestamp."

  project_id:
    type: int64
    source: project_id
    nullable: false
    description: "Owning project ID."

  traversal_path:
    type: string
    source: traversal_path
    filterable: false
    nullable: false
    description: "Namespace path for authz."

etl:
  type: query
  source: siphon_packages_package_files
  select: >-
    id, package_id, file_name, size,
    if(match(file_sha256, '^\\\\x[0-9a-fA-F]{128}$'),
    unhex(substring(file_sha256, 3)), NULL) AS file_sha256,
    status, created_at, updated_at, project_id, traversal_path
  from: siphon_packages_package_files
  traversal_path_filter: "startsWith(traversal_path, {traversal_path:String})"
  order_by: [traversal_path, id]
  edges:
    project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing
    package_id:
      to: Package
      as: HAS_PACKAGE_FILE
      direction: incoming

storage:
  primary_key: [traversal_path, id]
  settings:
    add_minmax_index_for_temporal_columns: "1"
    auto_statistics_types: "'minmax, uniq, countmin'"
  columns:
    - {name: id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: file_name, type: "String", default: "''", codec: ["ZSTD(1)"]}
    - {name: size, type: "Nullable(Int64)", codec: ["ZSTD(1)"]}
    - {name: file_sha256, type: "Nullable(String)", codec: ["ZSTD(1)"]}
    - {name: status, type: "LowCardinality(String)", default: "''", codec: ["LZ4"]}
    - {name: created_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: updated_at, type: "Nullable(DateTime64(0, 'UTC'))", codec: ["Delta(8)", "ZSTD(1)"]}
    - {name: project_id, type: "Int64", codec: ["Delta(8)", "LZ4"]}
    - {name: traversal_path, type: "String", default: "'0/'", codec: ["ZSTD(1)"]}
  indexes:
    - {name: idx_id, column: id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_file_name, column: file_name, type: "ngrambf_v1(3, 512, 2, 0)", granularity: 1}
    - {name: idx_status, column: status, type: "set(8)", granularity: 2}
    - {name: idx_project_id, column: project_id, type: "bloom_filter(0.001)", granularity: 1}
    - {name: idx_created_at, column: created_at, type: "minmax", granularity: 1}
    - {name: idx_updated_at, column: updated_at, type: "minmax", granularity: 1}
