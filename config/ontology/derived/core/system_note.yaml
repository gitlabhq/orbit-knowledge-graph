name: SystemNote
description: >-
  Rails-authored system notes, parsed for cross-entity edges. A Rust transform
  parses each note body and resolves GFM references into edges.

emits: [MENTIONS]

indexer:
  reindex: use_specified_tables
  tables: [siphon_notes, siphon_system_note_metadata]
pipelines:
  - name: SystemNote
    extract:
      type: clickhouse
      tables: [siphon_notes, siphon_system_note_metadata]
      order_by: [traversal_path, id]
      query: system_note.sql.j2
    transform:
      type: system_notes
