name: SystemNote
description: >-
  Rails-authored system notes, parsed for cross-entity edges. A Rust transform
  parses each note body and resolves GFM references into edges.

emits: [MENTIONS, REOPENED]

etl:
  type: query
  transform: system_notes
  scope: namespaced
  source: siphon_notes
  from: siphon_notes AS sn
  select: >-
    sn.id AS id, sn.note AS note, sn.noteable_id AS noteable_id,
    sn.noteable_type AS noteable_type, sn.author_id AS author_id,
    sn.project_id AS project_id, sn.created_at AS created_at,
    sn.traversal_path AS traversal_path
  where: "sn.system = true AND sn._siphon_deleted = false"
  traversal_path_filter: "startsWith(sn.traversal_path, {traversal_path:String})"
  watermark: sn._siphon_replicated_at
  deleted: sn._siphon_deleted
  table_alias: sn
  order_by: [traversal_path, id]
  page_join:
    table: siphon_system_note_metadata
    alias: snm
    fk_column: note_id
    select: [action]
    where: "snm._siphon_deleted = false"
    # siphon_system_note_metadata is sorted by (traversal_path, id), so this
    # prunes the enrichment scan by its leading PK column (2.36B -> 40M rows on
    # gitlab-org). The note_id IN (_batch) bound still guarantees correctness.
    traversal_path_column: traversal_path
