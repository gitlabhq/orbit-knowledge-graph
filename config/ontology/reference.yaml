# Annotated reference for ontology authoring. This file is NOT loaded; it
# documents the node/edge YAML surface. See config/schemas/ontology.schema.json
# for the machine-checked schema.

node_type: User
domain: core
description: A GitLab user account
destination_table: users

properties:
  id:
    type: int64
    source: id
    nullable: false

  username:
    type: string
    source: username
    nullable: false

  is_admin:
    type: boolean
    source: admin  # rename: admin → is_admin
    nullable: false

# ETL has two tiers. Tier 1 is fully declarative:
#
#   etl:
#     source: siphon_users          # datalake table
#     scope: global                 # or: namespaced (traversal_path scoping)
#     order_by: [id]                # optional; defaults to settings.etl.default_etl_order_by
#     filter: "system = false"      # optional plain WHERE on the base table —
#                                   # the only SQL string allowed in YAML
#
# Tier 2 is a complete SELECT statement in a .sql file next to the YAML:
#
#   etl:
#     source: project_namespace_traversal_paths
#     scope: namespaced
#     query: project.sql
#
# The query file is the COMPLETE extract, run verbatim — it owns its own
# paging rather than being wrapped. It must:
#   - SELECT every declared property's source column, plus
#     {{watermark_column}} / {{deleted_column}} aliased to the _version /
#     _deleted output columns
#   - drive paging itself: the {{filters}} and {{batch_size}} markers, an
#     ORDER BY matching order_by, and (for namespaced entities) a
#     startsWith(traversal_path, {traversal_path:String}) filter
#   - use the {{watermark_column}} / {{deleted_column}} placeholders;
#     hardcoding the configured column names is rejected at load time so a
#     rename stays a one-line schema.yaml change
#
# Derived entities (config/ontology/derived/) additionally set:
#   transform: <rust transform name>
#   emits: [KINDS]                  # relationship kinds the transform writes
#
# Edges are NOT declared on nodes. Every producer of a relationship lives in
# its file under config/ontology/edges/ as a `sources:` entry:
#
#   sources:
#     - table: siphon_members       # join-table source: one edge per row
#       scope: namespaced
#       order_by: [traversal_path, id]
#       from: {type: User, id: user_id, enrich: [state]}
#       to:
#         id: source_id
#         type_column: source_type  # polymorphic target resolved per row
#         type_mapping:
#           Namespace: Group
#
#     - node: Pipeline              # node-row source: FK column on the node
#       from: {type: Pipeline, id: id}
#       to: {type: Project, id: project_id}
#
#     - node: MergeRequest          # array source: one edge per element of
#       from: {type: User, id: user_id}     # the node query's output column
#       to: {type: MergeRequest, id: id}
#       unnest: reviewers
#
#     - transform: system_notes     # emitted by a derived entity's transform
#
# Exactly one endpoint of a node source is the node's own row, written
# {type: <Node>, id: id}; the other endpoint names the FK column. `mutable:
# true` marks bindings whose FK column is expected to change in place.
etl:
  source: siphon_users
  scope: global
