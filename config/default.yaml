#     signing_key: ""
#     verifying_key: ""

# tls:
#   cert_path: "/path/to/cert.pem"
#   key_path: "/path/to/key.pem"

engine:
  max_concurrent_workers: 16
  concurrency_groups:
    sdlc: 12
    code: 4
  handlers:
    global-handler:
      concurrency_group: sdlc
      max_attempts: 1  # re-dispatched every minute, no need to retry
      retry_interval_secs: 60
    namespace-handler:
      concurrency_group: sdlc
      max_attempts: 1  # re-dispatched every minute, no need to retry
      retry_interval_secs: 60
      batch_size_overrides:
        WorkItem: 50000
    code-indexing-task:
      concurrency_group: code
      max_attempts: 5  # event-driven, must retry to avoid data loss
      retry_interval_secs: 60
      pipeline:
        max_file_size_bytes: 5000000
        max_files: 1000000
        respect_gitignore: true
        worker_threads: 0
        max_concurrent_languages: 0
        per_file_timeout_ms: 5000
    namespace-deletion:
      concurrency_group: code
      max_attempts: 1  # re-dispatched daily, no need to retry

schedule:
  tasks:
    global:
      cron: "0 */1 * * * *"           # every minute
    namespace:
      cron: "0 */1 * * * *"           # every minute
    code-indexing-task:
      cron: "0 */1 * * * *"           # every minute
    namespace-code-backfill:
      cron: "0 */1 * * * *"           # every minute
    table-cleanup:
      cron: "0 0 3 * * *"             # daily at 03:00 UTC
    namespace-deletion:
      cron: "0 0 3 * * *"             # daily at 03:00 UTC
    migration-completion:
      cron: "0 */1 * * * *"           # every minute

health_check:
  bind_address: "0.0.0.0:4201"
  targets: []

grpc:
  keepalive_interval_secs: 20
  keepalive_timeout_secs: 20
  tcp_keepalive_secs: 60
  connection_window_size: 2097152   # 2MB
  stream_window_size: 1048576       # 1MB
  concurrency_limit: 256
  max_connection_age_secs: 300      # 5 min, for L4 ILB rebalancing
  max_connection_age_grace_secs: 30 # graceful drain window; paired with max_connection_age_secs to avoid tonic 0.14.5 panic (hyperium/tonic#2522)
  stream_timeout_secs: 60

query:
  default:
    max_execution_time: 30
    use_query_cache: false
    query_cache_ttl: 60
    graph_query_cache_enabled: false
    graph_query_cache_ttl: 60

metrics:
  otel:
    enabled: false
    endpoint: "http://localhost:4317"
  prometheus:
    enabled: false
    port: 9394

schema:
  max_retained_versions: 2
  version_poll_interval_secs: 5

analytics:
  enabled: false                         # opt-in. Helm flips on for .com / Dedicated.
  collector_url: ""                      # e.g. "https://snowplowprd.trx.gitlab.net" (no path; tracker appends /com.snowplowanalytics.snowplow/tp2)
  deployment:
    type: self_managed        # com | dedicated | self_managed
    environment: development  # development | staging | production

billing:
  enabled: false
  collector_url: "http://localhost:9090"
