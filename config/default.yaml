bind_address: "127.0.0.1:4200"
grpc_bind_address: "127.0.0.1:50054"
jwt_clock_skew_secs: 60

nats:
  url: "localhost:4222"
  # username: ""
  # password: ""

datalake:
  url: "http://127.0.0.1:8123"
  database: default
  username: default
  # password: ""

graph:
  url: "http://127.0.0.1:8123"
  database: default
  username: default
  # password: ""

# gitlab:
#   base_url: "http://localhost:3000"
#   jwt:
#     signing_key: ""
#     verifying_key: ""

engine:
  max_concurrent_workers: 16
  concurrency_groups:
    sdlc: 12
    code: 4
  handlers:
    global-handler:
      concurrency_group: sdlc
      max_attempts: 1  # re-dispatched every minute, no need to retry
      retry_interval_secs: 60
    namespace-handler:
      concurrency_group: sdlc
      max_attempts: 1  # re-dispatched every minute, no need to retry
      retry_interval_secs: 60
    code-push-event:
      concurrency_group: code
      max_attempts: 5  # event-driven, must retry to avoid data loss
      retry_interval_secs: 60
      events_stream_name: siphon_stream_main_db
    code-project-reconciliation:
      concurrency_group: code
      max_attempts: 1  # re-dispatched every 30 minutes, no need to retry

schedule:
  tasks: {}

health_check:
  bind_address: "0.0.0.0:4201"
  namespace: default
  services:
    - siphon-consumer
    - siphon-producer
    - gkg-indexer
    - nats

metrics:
  otlp_endpoint: "http://localhost:4317"
