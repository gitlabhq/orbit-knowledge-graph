# Local-development defaults, loaded automatically at startup (required: false).
# Production values come from Helm chart values, GKG_* env vars, and /etc/secrets/ mounts.
#
# Do not rename this file. The filename "default" is a deploy contract: the Helm chart
# (gkg-helm-charts) renders the runtime config into a ConfigMap keyed `default.yaml` mounted
# at /app/config, and the loader reads it via `config::File::with_name("config/default")`
# (crates/gkg-server-config/src/app.rs). Renaming breaks config loading in every deployed pod.

bind_address: "127.0.0.1:4200"
grpc_bind_address: "127.0.0.1:50054"
jwt_clock_skew_secs: 60

nats:
  url: "localhost:4222"
  # username: ""
  # password: ""
  # tls_ca_cert_path: "/etc/nats/ca.pem"
  # tls_cert_path: "/etc/nats/client.pem"
  # tls_key_path: "/etc/nats/client-key.pem"
  # connection_timeout_secs: 10
  # request_timeout_secs: 5
  # ack_wait_secs: 300
  # max_deliver: 5
  # subscription_buffer_size: 100
  # consumer_name: null
  # batch_size: 10
  # auto_create_streams: true
  # stream_replicas: 1
  stream_max_age_secs: 14400
  # stream_max_bytes: null
  # stream_max_messages: null
  # consumer_inactive_threshold_secs: 3600

datalake:
  url: "http://127.0.0.1:8123"
  database: default
  username: default
  # password: ""
  session_settings:
    max_execution_time: "900"
    max_query_size: "10485760"

graph:
  url: "http://127.0.0.1:8123"
  database: default
  username: default
  # password: ""
  session_settings:
    optimize_on_insert: "0"
    max_query_size: "10485760"
  insert_settings:
    async_insert: "1"
    wait_for_async_insert: "1"
    async_insert_deduplicate: "0"

# gitlab:
#   base_url: "http://localhost:3000"
#   jwt:
#     signing_key: ""
#     verifying_key: ""

# tls:
#   cert_path: "/path/to/cert.pem"
#   key_path: "/path/to/key.pem"

engine:
  # Universal-pool defaults; production splits into per-module pools that override these (gkg-helm-charts `indexer.pools`).
  max_concurrent_workers: 16
  concurrency_groups:
    sdlc: 12
    code: 4
  topics:
    global-handler:
      concurrency_group: sdlc
      max_attempts: 1  # re-dispatched every minute, no need to retry
      retry_interval_secs: 60
    namespace-handler:
      concurrency_group: sdlc
      max_attempts: 1  # re-dispatched every minute, no need to retry
      retry_interval_secs: 60
    code-indexing-task:
      concurrency_group: code
      max_attempts: 3  # event-driven, must retry to avoid data loss
      retry_interval_secs: 60
      dead_letter_on_exhaustion: true
    namespace-deletion:
      concurrency_group: code
      max_attempts: 1  # re-dispatched daily, no need to retry
  handlers:
    entity-handler:
      system_notes_resolve_lookup_batch_size: 1000
      batch_size_overrides:
        WorkItem: 50000
      partition_overrides:
        Job: 5
    code-indexing-task:
      pipeline:
        max_file_size_bytes: 5000000
        max_files: 1000000
        max_total_bytes: 2000000000
        worker_threads: 0
        max_concurrent_languages: 0
        per_file_timeout_ms: 2000
        per_file_parse_timeout_ms: 100
        per_file_walk_timeout_ms: 100
        per_file_ssa_timeout_ms: 100
        cross_file_resolve_timeout_ms: 180000
        job_timeout_secs: 250
        fetch_concurrency: 10
        write_channel_capacity: 8
        write_slice_rows: 1000000
        write_buffer_age_secs: 60
        write_min_flush_rows: 10000
        write_max_flush_age_secs: 120
        write_max_concurrent: 4
        small_repo_max_files: 650
        small_indexing_slots: 6
        big_indexing_slots: 2

schedule:
  tasks:
    global:
      cron: "0 */1 * * * *"           # every minute
    namespace:
      cron: "*/30 * * * * *"          # every 30 seconds
      sweep_interval_secs: 3600        # hourly full re-dispatch safety net
    code-backfill:
      cron: "0 */1 * * * *"           # every minute
    table-cleanup:
      cron: "0 0 3 * * *"             # daily at 03:00 UTC
    namespace-deletion:
      cron: "0 0 3 * * *"             # daily at 03:00 UTC
    migration-completion:
      cron: "0 */1 * * * *"           # every minute
    stale-edge-reconciliation:
      cron: "0 */30 * * * *"          # every 30 minutes

health_check:
  bind_address: "0.0.0.0:4201"
  targets: []

grpc:
  keepalive_interval_secs: 20
  keepalive_timeout_secs: 20
  tcp_keepalive_secs: 60
  connection_window_size: 2097152   # 2MB
  stream_window_size: 1048576       # 1MB
  concurrency_limit: 256
  max_connection_age_secs: 300      # 5 min, for L4 ILB rebalancing
  max_connection_age_grace_secs: 30 # graceful drain window; paired with max_connection_age_secs to avoid tonic 0.14.5 panic (hyperium/tonic#2522)
  stream_timeout_secs: 60
  max_header_list_size_bytes: 65536 # 64 KiB; tonic/hyper default of 16 KiB is too small for GitLab JWTs carrying many traversal IDs

query:
  default:
    max_execution_time: 30
    use_query_cache: false
    query_cache_ttl: 60
    graph_query_cache_enabled: false
    graph_query_cache_ttl: 60
  path_finding:
    max_execution_time: 15
    max_memory_usage: 16106127360

path_resolver:
  cache_ttl_secs: 60
  cache_capacity: 10000

metrics:
  otel:
    enabled: false
    endpoint: "http://localhost:4317"
  prometheus:
    enabled: false
    port: 9394

schema:
  max_retained_versions: 2
  version_poll_interval_secs: 5
  indexer_schema_wait_timeout_secs: 300

analytics:
  enabled: false                         # opt-in. Helm flips on for .com / Dedicated.
  collector_url: ""                      # e.g. "https://snowplowprd.trx.gitlab.net" (no path; tracker appends /com.snowplowanalytics.snowplow/tp2)
  deployment:
    type: self_managed        # com | dedicated | self_managed
    environment: development  # development | staging | production

billing:
  enabled: false
  collector_url: "http://localhost:9090"
  quota:
    enabled: false
    customers_dot_url: "http://localhost:5000"
    request_timeout_ms: 1000
    fallback_cache_ttl_secs: 3600
    # api_user: ""
    # api_token: ""

features:
  system_notes:
    enabled: false
    # Root namespace ids the flag applies to. Empty = every namespace.
    namespaces: []
