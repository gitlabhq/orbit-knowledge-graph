# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = true

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
    "LicenseRef-EE",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true
registries = []

[[licenses.clarify]]
name = "etl-engine"
expression = "LicenseRef-EE"
license-files = []

[[licenses.clarify]]
name = "indexer"
expression = "LicenseRef-EE"
license-files = []

[[licenses.clarify]]
name = "gkg"
expression = "LicenseRef-EE"
license-files = []

[[licenses.clarify]]
name = "labkit-rs"
expression = "MIT"
license-files = []

[[licenses.exceptions]]
name = "ruby-prism"
allow = ["MIT"]

[[licenses.exceptions]]
name = "ruby-prism-sys"
allow = ["MIT"]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
