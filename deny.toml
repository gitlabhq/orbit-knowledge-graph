# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = true

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = [
    # Transitive dev dependencies from testcontainers - no safe upgrade available
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained
    "RUSTSEC-2025-0111", # tokio-tar vulnerability (dev-only)
    "RUSTSEC-2024-0436", # paste unmaintained - used by clickhouse-arrow, no alternative
    # jsonwebtoken pulls in rsa crate, but we ONLY use HS256 (HMAC). The Marvin Attack
    # timing vulnerability affects RSA operations which we do not use. DO NOT use RSA
    # algorithms (RS256, RS384, RS512, PS256, PS384, PS512) until jsonwebtoken updates
    # to rsa 0.10+ with the fix. See: https://github.com/RustCrypto/RSA/pull/394
    "RUSTSEC-2023-0071",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "LicenseRef-EE",
    "OpenSSL", # aws-lc-sys via testcontainers (dev dependency)
]
confidence-threshold = 0.8

[licenses.private]
ignore = true
registries = []

[[licenses.clarify]]
name = "ontology"
expression = "LicenseRef-EE"
license-files = []

[[licenses.clarify]]
name = "etl-engine"
expression = "LicenseRef-EE"
license-files = []

[[licenses.clarify]]
name = "indexer"
expression = "LicenseRef-EE"
license-files = []

[[licenses.clarify]]
name = "gkg"
expression = "LicenseRef-EE"
license-files = []

[[licenses.clarify]]
name = "query-engine"
expression = "LicenseRef-EE"
license-files = []

[[licenses.clarify]]
name = "labkit-rs"
expression = "MIT"
license-files = []

[[licenses.clarify]]
name = "gitaly-client"
expression = "MIT"
license-files = []

[[licenses.exceptions]]
name = "ruby-prism"
allow = ["MIT"]

[[licenses.exceptions]]
name = "ruby-prism-sys"
allow = ["MIT"]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://gitlab.com/gitlab-org/rust/gitalisk.git"]
