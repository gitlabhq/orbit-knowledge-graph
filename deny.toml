# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = true

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = [
    # rustls-pemfile unmaintained - transitive dep from object_store -> datafusion
    # Remove when object_store drops rustls-pemfile (check: cargo tree -i rustls-pemfile)
    "RUSTSEC-2025-0134",
    # atomic-polyfill is pulled in transitively by rust-analyzer's postcard/proc-macro stack.
    # We disable the proc-macro server in the Rust v2 indexing path, and there is no safe
    # upgrade available until upstream refreshes that dependency chain.
    "RUSTSEC-2023-0089",
    # jsonwebtoken pulls in rsa crate, but we ONLY use HS256 (HMAC). The Marvin Attack
    # timing vulnerability affects RSA operations which we do not use. DO NOT use RSA
    # algorithms (RS256, RS384, RS512, PS256, PS384, PS512) until jsonwebtoken updates
    # to rsa 0.10+ with the fix. See: https://github.com/RustCrypto/RSA/pull/394
    "RUSTSEC-2023-0071",
    # paste unmaintained - transitive dep from clickhouse crate
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "LicenseRef-EE",
    "OpenSSL", # aws-lc-sys via testcontainers (dev dependency)
    "bzip2-1.0.6", # libbz2-rs-sys via datafusion -> async-compression
    "0BSD", # mock_instant via lance-graph
    "BSL-1.0", # xxhash-rust via lance-graph
]
confidence-threshold = 0.8

[licenses.private]
ignore = true
registries = []

