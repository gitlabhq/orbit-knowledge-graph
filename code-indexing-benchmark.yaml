project:
  name: gkg

repos_dir: temp

repos:
  - name: gitlab
    source: gitlab
    project: gitlab-org/gitlab
    version: v18.9.1-ee
    groups: [ruby, typescript]

  - name: gitlab-shell
    source: gitlab
    project: gitlab-org/gitlab-shell
    version: v14.47.0
    groups: [ruby]

  - name: okhttp
    source: github
    project: square/okhttp
    version: parent-5.0.0-alpha.14
    commit_sha: 374def39eb276bf0ad724dc71c589241851f5b16
    groups: [java]

  - name: elasticsearch
    source: github
    project: elastic/elasticsearch
    version: v9.0.0
    commit_sha: 112859b85d50de2a7e63f73c8fc70b99eea24291
    groups: [java]

  - name: vscode
    source: github
    project: microsoft/vscode
    version: "1.99.3"
    commit_sha: 17baf841131aa23349f217ca7c570c76ee87b957
    groups: [typescript]

  - name: spring-petclinic-angular
    source: github
    project: spring-petclinic/spring-petclinic-angular
    version: master
    commit_sha: 608496a672949e6ab4ea5c4d55870fe79efbbc8d
    groups: [typescript]

scenarios:
  hyperfine:
    - id: gkg_index_4_threads
      command: ./target/release/orbit index ${REPOS_DIR} --threads 4 --stats
      description: Index repos with 4 threads
      warmup: 1
      min_runs: 3
      max_runs: 3
