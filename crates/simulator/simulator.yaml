# Simulator configuration - 100M edge scale test
#
# Workflow:
#   1. Generate data:  cargo run --bin generate -- -c simulator.yaml
#   2. Load to CH:     cargo run --bin load -- -c simulator.yaml
#   3. Evaluate:       cargo run --bin evaluate -- -c simulator.yaml

clickhouse:
  url: http://localhost:8123
  database: default

  client:
    send_timeout: 3600
    receive_timeout: 3600
    max_insert_block_size: 100000

  schema:
    engine: MergeTree
    index_granularity: 8192

    node_primary_key: [traversal_path, id]
    node_order_by: [traversal_path, id]

    edge_primary_key: [source_id]
    edge_order_by: [source_id, source_kind, relationship_kind]

    indexes:
      - name: idx_relationship
        table: edges
        expression: relationship_kind
        type: bloom_filter
        granularity: 4

    projections:
      - name: by_target
        table: edges
        columns: [source_kind, source_id, relationship_kind, target_kind, target_id]
        order_by: [target_id, target_kind, relationship_kind]

generation:
  ontology_path: fixtures/ontology
  output_dir: gl_synthetic_data
  skip_if_present: false
  parallel: false
  batch_size: 100000

  seed: 42

  # Single org, scaled for ~100M edges
  organizations: 1

  roots:
    User: 30000                       # 50k users
    Group: 50                        # 100 top-level groups

  subgroups:
    max_depth: 3                      # 3 levels deep
    per_group: 3                      # 3 subgroups per parent
    # Total groups: 100 × (1 + 3 + 9 + 27) = 4,000

  # Estimated: ~100M edges
  # - 4k groups × 20 projects = 80k projects
  # - 80k × 50 MRs = 4M MRs → 4M + 8M diffs + 24M files = 36M edges
  # - 80k × 50 pipelines = 4M → 4M + 12M stages + 36M jobs = 52M edges
  # - 80k × 50 work items = 4M → 4M + 4M notes = 8M edges
  # Plus associations ~10M

  relationships:
    CONTAINS:
      "Group -> Project": 20          # 20 projects per group = 80k projects

    IN_PROJECT:
      "MergeRequest -> Project": 50   # 50 MRs per project = 4M MRs
      "WorkItem -> Project": 50       # 50 work items = 4M
      "Pipeline -> Project": 50       # 50 pipelines = 4M
      "Vulnerability -> Project": 5
      "Finding -> Project": 10
      "Milestone -> Project": 3
      "Label -> Project": 5

    HAS_STAGE:
      "Pipeline -> Stage": 3          # 12M stages

    HAS_JOB:
      "Stage -> Job": 3               # 36M jobs

    HAS_DIFF:
      "MergeRequest -> MergeRequestDiff": 2  # 8M diffs

    HAS_FILE:
      "MergeRequestDiff -> MergeRequestDiffFile": 3  # 24M files

    HAS_NOTE:
      "MergeRequest -> Note": 2       # 8M notes
      "WorkItem -> Note": 1           # 4M notes

    HAS_FINDING:
      "Vulnerability -> Finding": 2

    HAS_IDENTIFIER:
      "Finding -> VulnerabilityIdentifier": 1

  associations:
    AUTHORED:
      "User -> MergeRequest": 1
      "User -> WorkItem": 1
      "User -> Note": 1

    MEMBER_OF:
      "User -> Group": 5

    ASSIGNED:
      "User -> MergeRequest": 0.5
      "User -> WorkItem": 0.6

    REVIEWER:
      "MergeRequest -> User":
        ratio: 0.3
        per: source

    TRIGGERED:
      "User -> Pipeline": 1
      "MergeRequest -> Pipeline": 0.5

    CREATOR:
      "User -> Project": 1
    OWNER:
      "User -> Group": 1

    MERGED_BY:
      "MergeRequest -> User":
        ratio: 0.2
        per: source

    CLOSES:
      "MergeRequest -> WorkItem": 0.1

    FIXES:
      "MergeRequest -> Vulnerability": 0.05

    IN_MILESTONE:
      "WorkItem -> Milestone": 0.3

    HAS_LABEL:
      "WorkItem -> Label": 0.2

    IN_GROUP:
      "Project -> Group": 1

evaluation:
  queries_path: fixtures/queries/sdlc_queries.json
  sample_size: 100
  iterations: 1
  skip_cache_warm: false
  output:
    format: text
