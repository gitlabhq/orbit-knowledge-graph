# Simulator configuration
#
# Workflow:
#   1. Generate data:  cargo run --bin generate -- -c simulator.yaml
#   2. Load to CH:     cargo run --bin load -- -c simulator.yaml
#   3. Evaluate:       cargo run --bin evaluate -- -c simulator.yaml

clickhouse:
  url: http://localhost:8123
  database: default

  client:
    send_timeout: 3600
    receive_timeout: 3600
    max_insert_block_size: 100000

  schema:
    engine: MergeTree
    index_granularity: 8192

    # Node tables: traversal_path first for trie-based ordering
    # PRIMARY KEY = sparse index, ORDER BY = disk sort order
    node_primary_key: [traversal_path, id]
    node_order_by: [traversal_path, id]

    # Edge table: ordered for forward traversal by source_id
    # source_id FIRST so WHERE source_id = X uses primary key
    edge_primary_key: [source_id]
    edge_order_by: [source_id, source_kind, relationship_kind]

    # Data skipping indexes for filtering
    indexes:
      # Bloom filter for relationship filtering
      - name: idx_relationship
        table: edges
        expression: relationship_kind
        type: bloom_filter
        granularity: 4

    # Projections for reverse traversal
    projections:
      # Find edges by target_id (reverse lookup)
      # target_id FIRST so WHERE target_id = Y uses this projection
      - name: by_target
        table: edges
        columns: [source_kind, source_id, relationship_kind, target_kind, target_id]
        order_by: [target_id, target_kind, relationship_kind]

generation:
  ontology_path: fixtures/ontology
  output_dir: gl_synthetic_data
  skip_if_present: true
  parallel: true
  batch_size: 50000

  # Random seed for reproducible data generation.
  # Remove or set to null for non-deterministic generation.
  seed: 42

  # Scale: 10 organizations (tenants)
  organizations: 3

  # Root entities (absolute counts per organization)
  # These have no parent and are generated first.
  roots:
    User: 1000                        # Many users per org
    Group: 5                         # Few top-level groups (subgroups expand this)

  # Subgroup hierarchy (Group -> Group)
  # Generates nested groups under each root group
  subgroups:
    max_depth: 3      # 3 levels of nesting
    per_group: 2      # 2 subgroups per parent group

  # Relationship-based generation
  # Entities are generated from their parents based on ontology edge types.
  # Format: EDGE_TYPE: { "Source -> Target": ratio }
  #
  # Traversal IDs:
  # - Groups extend parent's path: "1/2" -> "1/2/3"
  # - All other entities inherit from their container
  relationships:
    # Group -> Project containment
    # Note: Group -> Group (subgroups) is handled specially via max_subgroup_depth
    CONTAINS:
      "Group -> Project": 5      # 5 projects per group

    # SDLC entities belong to projects
    IN_PROJECT:
      "MergeRequest -> Project": 30   # 30 MRs per project
      "WorkItem -> Project": 50       # 50 work items per project
      "Pipeline -> Project": 60       # 60 pipelines per project
      "Vulnerability -> Project": 4   # 4 vulnerabilities per project
      "Finding -> Project": 12        # 12 findings per project
      # "Scanner -> Project": 1         # 1 scanner config per project
      "Milestone -> Project": 2       # 2 milestones per project
      "Label -> Project": 5           # 5 labels per project

    # CI/CD pipeline structure
    HAS_STAGE:
      "Pipeline -> Stage": 3          # 3 stages per pipeline

    HAS_JOB:
      "Stage -> Job": 5               # 5 jobs per stage

    # MR diffs and files
    HAS_DIFF:
      "MergeRequest -> MergeRequestDiff": 2  # 2 diffs per MR (initial + updates)

    HAS_FILE:
      "MergeRequestDiff -> MergeRequestDiffFile": 4  # 4 files per diff

    # Notes (comments) on entities
    HAS_NOTE:
      "MergeRequest -> Note": 2       # 2 notes per MR
      "WorkItem -> Note": 1           # 1 note per work item

    # Security relationships
    HAS_FINDING:
      "Vulnerability -> Finding": 3   # 3 findings per vulnerability

    HAS_IDENTIFIER:
      "Finding -> VulnerabilityIdentifier": 2  # 2 identifiers per finding

  # Association edges
  # Connect existing entities together (no new entities generated).
  # Format: "Source -> Target": ratio
  # Semantics: For each TARGET entity, sample RATIO source entities.
  associations:
    # Authorship - who created what
    AUTHORED:
      "User -> MergeRequest": 1       # Each MR has 1 author
      "User -> WorkItem": 1           # Each work item has 1 author
      "User -> Note": 1               # Each note has 1 author

    # Membership - who belongs where
    MEMBER_OF:
      "User -> Group": 3              # Each group has 3 members

    # Assignment - who is working on what
    ASSIGNED:
      "User -> MergeRequest": 0.7     # 70% of MRs have an assignee
      "User -> WorkItem": 0.8         # 80% of work items have an assignee

    # Review - who reviews what
    REVIEWER:
      "MergeRequest -> User":
        ratio: 0.5                    # 50% of MRs have a reviewer
        per: source                   # Iterate over MRs, not Users

    # Pipeline triggers
    TRIGGERED:
      "User -> Pipeline": 1           # Each pipeline was triggered by someone
      "MergeRequest -> Pipeline": 0.8 # 80% of MRs trigger a pipeline

    # Project/Group ownership
    CREATOR:
      "User -> Project": 1            # Each project has a creator
    OWNER:
      "User -> Group": 1              # Each group has an owner

    # MR merge action
    MERGED_BY:
      "MergeRequest -> User":
        ratio: 0.3                    # 30% of MRs are merged (have a merger)
        per: source                   # Iterate over MRs, not Users

    # MR closes work items
    CLOSES:
      "MergeRequest -> WorkItem": 0.2 # 20% of MRs close a work item

    # MR fixes vulnerabilities
    FIXES:
      "MergeRequest -> Vulnerability": 0.1  # 10% of MRs fix a vulnerability

    # Work items in milestones
    IN_MILESTONE:
      "WorkItem -> Milestone": 0.4    # 40% of work items are in a milestone

    # Labels on entities
    HAS_LABEL:
      "WorkItem -> Label": 0.3        # 30% of work items have a label

    # Projects belong to groups
    IN_GROUP:
      "Project -> Group": 1           # Each project is in a group

evaluation:
  queries_path: fixtures/queries/sdlc_queries.json
  sample_size: 100
  iterations: 1
  skip_cache_warm: false
  output:
    format: text
