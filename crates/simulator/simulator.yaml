# Simulator configuration - 100M edge scale test
#
# Workflow:
#   1. Generate data:  cargo run --bin generate -- -c simulator.yaml
#   2. Load to CH:     cargo run --bin load -- -c simulator.yaml
#   3. Evaluate:       cargo run --bin evaluate -- -c simulator.yaml

clickhouse:
  url: http://localhost:8123
  database: default

  client:
    send_timeout: 3600
    receive_timeout: 3600
    max_insert_block_size: 100000

  schema:
    engine: MergeTree
    index_granularity: 8192

    node_primary_key: [traversal_path, id]
    node_order_by: [traversal_path, id]

    edge_primary_key: [source_id]
    edge_order_by: [source_id, source_kind, relationship_kind]

    indexes:
      - name: idx_relationship
        table: edges
        expression: relationship_kind
        type: bloom_filter
        granularity: 4

    projections:
      - name: by_target
        table: edges
        columns: [source_kind, source_id, relationship_kind, target_kind, target_id]
        order_by: [target_id, target_kind, relationship_kind]

generation:
  ontology_path: fixtures/ontology
  output_dir: gl_synthetic_data
  skip_if_present: false
  parallel: false
  batch_size: 100000

  seed: 42

  # Single org, scaled for ~100M edges
  organizations: 1

  roots:
    User: 10000                       # 10k users
    Group: 20                         # 20 top-level groups

  subgroups:
    max_depth: 3                      # 3 levels deep
    per_group: 2                      # 2 subgroups per parent
    # Total groups: 20 × (1 + 2 + 4 + 8) = 300

  # Estimated: ~10M edges
  # - 300 groups × 10 projects = 3k projects
  # - 3k × 100 MRs = 300k MRs
  # - 300k × 2 diffs = 600k diffs
  # - 600k × 4 files = 2.4M files
  # - 3k × 100 pipelines = 300k pipelines  
  # - 300k × 3 stages = 900k stages
  # - 900k × 4 jobs = 3.6M jobs

  relationships:
    CONTAINS:
      "Group -> Project": 10          # 10 projects per group = 3k projects

    IN_PROJECT:
      "MergeRequest -> Project": 100  # 100 MRs per project = 300k MRs
      "WorkItem -> Project": 100      # 100 work items = 300k
      "Pipeline -> Project": 100      # 100 pipelines = 300k
      "Vulnerability -> Project": 5
      "Finding -> Project": 10
      "Milestone -> Project": 3
      "Label -> Project": 5

    HAS_STAGE:
      "Pipeline -> Stage": 3          # 900k stages

    HAS_JOB:
      "Stage -> Job": 4               # 3.6M jobs

    HAS_DIFF:
      "MergeRequest -> MergeRequestDiff": 2  # 600k diffs

    HAS_FILE:
      "MergeRequestDiff -> MergeRequestDiffFile": 4  # 2.4M files

    HAS_NOTE:
      "MergeRequest -> Note": 2
      "WorkItem -> Note": 1

    HAS_FINDING:
      "Vulnerability -> Finding": 2

    HAS_IDENTIFIER:
      "Finding -> VulnerabilityIdentifier": 1

  associations:
    AUTHORED:
      "User -> MergeRequest": 1
      "User -> WorkItem": 1
      "User -> Note": 1

    MEMBER_OF:
      "User -> Group": 5

    ASSIGNED:
      "User -> MergeRequest": 0.5
      "User -> WorkItem": 0.6

    REVIEWER:
      "MergeRequest -> User":
        ratio: 0.3
        per: source

    TRIGGERED:
      "User -> Pipeline": 1
      "MergeRequest -> Pipeline": 0.5

    CREATOR:
      "User -> Project": 1
    OWNER:
      "User -> Group": 1

    MERGED_BY:
      "MergeRequest -> User":
        ratio: 0.2
        per: source

    CLOSES:
      "MergeRequest -> WorkItem": 0.1

    FIXES:
      "MergeRequest -> Vulnerability": 0.05

    IN_MILESTONE:
      "WorkItem -> Milestone": 0.3

    HAS_LABEL:
      "WorkItem -> Label": 0.2

    IN_GROUP:
      "Project -> Group": 1

evaluation:
  queries_path: fixtures/queries/sdlc_queries.json
  sample_size: 100
  iterations: 1
  skip_cache_warm: false
  output:
    format: text
