# Simulator configuration
#
# Workflow:
#   1. Generate data:  cargo run --bin generate -- -c simulator.yaml
#   2. Load to CH:     cargo run --bin load -- -c simulator.yaml
#   3. Evaluate:       cargo run --bin evaluate -- -c simulator.yaml

clickhouse:
  url: http://localhost:8123
  database: default

  # Client connection settings
  client:
    send_timeout: 3600
    receive_timeout: 3600
    max_insert_block_size: 100000

  # Schema configuration
  schema:
    engine: MergeTree
    index_granularity: 8192

    # Node tables: PRIMARY KEY defines sparse index, ORDER BY defines disk sort order
    # PRIMARY KEY must be a prefix of ORDER BY. If omitted, defaults to ORDER BY.
    node_primary_key: [organization_id, id]
    node_order_by: [organization_id, id]

    # Edge table: source-first for forward traversal
    edge_primary_key: [source_kind, source]
    edge_order_by: [source_kind, source, relationship_kind]

    # Data skipping indexes (applied after data load)
    indexes: []
    # Example indexes:
    # - name: idx_target
    #   table: edges
    #   expression: target
    #   type: bloom_filter
    #   granularity: 4

    # Projections for reverse traversal (applied after data load)
    projections: []
    # Example: reverse lookup on edges (find sources by target)
    # - name: by_target
    #   table: edges
    #   columns: [source_kind, source, relationship_kind, target_kind, target]
    #   order_by: [target_kind, target, relationship_kind]

    # Additional MergeTree SETTINGS clause options
    # These are appended to CREATE TABLE ... SETTINGS index_granularity=8192, <your settings>
    # See: https://clickhouse.com/docs/en/engines/table-engines/mergetree-family/mergetree#settings
    settings: {}
    # Common settings:
    #   min_bytes_for_wide_part: "10485760"      # 10MB - threshold for wide vs compact parts
    #   min_rows_for_wide_part: "0"              # Row threshold for wide parts
    #   merge_with_ttl_timeout: "86400"          # TTL merge interval in seconds
    #   merge_max_block_size: "8192"             # Max block size for merges
    #   max_compress_block_size: "1048576"       # Max compression block size
    #   storage_policy: "default"                # Storage policy name
    #   ttl_only_drop_parts: "1"                 # Only drop whole parts on TTL expiry
    #   allow_nullable_key: "1"                  # Allow nullable columns in primary key

generation:
  ontology_path: fixtures/ontology
  output_dir: gl_synthetic_data
  skip_if_present: true
  organizations: 2
  parallel: false
  batch_size: 10000
  traversal:
    ids_per_org: 1000
    max_depth: 5
  nodes:
    default_per_type: 100
    counts: {}
  edges:
    per_source: 3

evaluation:
  queries_path: fixtures/queries/sdlc_queries.json
  sample_size: 100
  iterations: 1
  skip_cache_warm: false
  output:
    format: text
