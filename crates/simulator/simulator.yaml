# Simulator configuration
#
# Workflow:
#   1. Generate data:  cargo run --bin generate -- -c simulator.yaml
#   2. Load to CH:     cargo run --bin load -- -c simulator.yaml
#   3. Evaluate:       cargo run --bin evaluate -- -c simulator.yaml

clickhouse:
  url: http://localhost:8123
  database: default

  client:
    send_timeout: 3600
    receive_timeout: 3600
    max_insert_block_size: 100000

  schema:
    engine: MergeTree
    index_granularity: 8192

    # Node tables: PRIMARY KEY defines sparse index, ORDER BY defines disk sort order
    # PRIMARY KEY must be a prefix of ORDER BY. If omitted, defaults to ORDER BY.
    node_primary_key: [organization_id, id]
    node_order_by: [organization_id, id]

    # Edge table: source-first for forward traversal
    edge_primary_key: [source_kind, source]
    edge_order_by: [source_kind, source, relationship_kind]

    # Data skipping indexes (applied after data load)
    indexes: []

    # Projections for reverse traversal (applied after data load)
    projections: []

    # Additional MergeTree SETTINGS options
    settings: {}

generation:
  ontology_path: fixtures/ontology
  output_dir: gl_synthetic_data
  skip_if_present: true
  parallel: true
  batch_size: 50000

  # Scale: 10 organizations (tenants)
  # Based on graphhouse spike "default" config
  organizations: 10

  traversal:
    ids_per_org: 5000
    max_depth: 8

  nodes:
    # Default for unlisted types
    default_per_type: 100

    # Realistic GitLab-like distribution per organization
    # Based on graphhouse spike ratios:
    #   - 100 users per tenant
    #   - 50 groups (with subgroup hierarchy)
    #   - 250 projects (5 per group)
    #   - 7,500 MRs (30 per project)
    #   - 12,500 issues/work items (50 per project)
    counts:
      # Core entities
      User: 100
      Group: 50
      Project: 250

      # SDLC entities (high volume)
      MergeRequest: 7500
      WorkItem: 12500
      Note: 20000          # ~1 per MR + ~1 per WorkItem

      # CI/CD entities
      Pipeline: 15000      # ~2 per MR
      Stage: 45000         # ~3 per pipeline
      Job: 75000           # ~5 per pipeline

      # MR-related
      MergeRequestFile: 30000  # ~4 files per MR
      Branch: 500              # ~2 per project
      Milestone: 100           # ~2 per group
      Label: 250               # ~5 per group

      # Code intelligence (smaller for now)
      File: 5000
      Directory: 1000
      Definition: 10000
      ImportedSymbol: 5000

      # Security (moderate)
      Vulnerability: 1000
      Finding: 3000
      Scanner: 10
      VulnerabilityIdentifier: 500

  edges:
    per_source: 3

evaluation:
  queries_path: fixtures/queries/sdlc_queries.json
  sample_size: 100
  iterations: 1
  skip_cache_warm: false
  output:
    format: text
