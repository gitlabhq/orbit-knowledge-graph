// GitLab Knowledge Graph gRPC service definition.
//
// Serves the Orbit dashboard, MCP agents, and glab CLI.
// All data RPCs accept a ResponseFormat to switch between structured JSON (RAW)
// and token-efficient text (LLM) for AI consumers.

syntax = "proto3";

package gkg.v1;

// Controls output serialization across all data RPCs.
// RAW returns structured JSON for programmatic consumers (dashboard, CLI).
// LLM returns compact text (GOON for queries, TOON for schema/health) optimized for token budgets.
enum ResponseFormat {
  RESPONSE_FORMAT_RAW = 0;
  RESPONSE_FORMAT_LLM = 1;
}

// Concrete encoding produced by the server. QueryMetadata carries this
// alongside format_version so consumers can route/parse without inspecting
// the payload body. Mirrors ResponseFormat but in response context.
enum FormatName {
  FORMAT_NAME_RAW = 0;
  FORMAT_NAME_GOON = 1;
}

// Core service exposing 4 RPCs. Gated behind the :knowledge_graph feature flag
// in Rails. JWT auth carries user identity and traversal IDs for authorization.
service KnowledgeGraphService {
  // Returns available tool definitions with parameter schemas.
  // Used by MCP tools/list and GET /api/v4/orbit/tools.
  rpc ListTools(ListToolsRequest) returns (ListToolsResponse);

  // Executes a graph query against ClickHouse with bidirectional streaming
  // for the redaction exchange (server requests authorization checks from Rails,
  // Rails responds with per-resource decisions).
  // Used by MCP tools/call("query_graph") and POST /api/v4/orbit/query.
  rpc ExecuteQuery(stream ExecuteQueryMessage) returns (stream ExecuteQueryMessage);

  // Returns the graph ontology (nodes, edges, domains) from in-memory cache.
  // No ClickHouse, no redaction. Supports selective node expansion.
  // Used by MCP tools/call("get_graph_schema") and GET /api/v4/orbit/schema.
  rpc GetGraphSchema(GetGraphSchemaRequest) returns (GetGraphSchemaResponse);

  // Returns cluster health and component status.
  // Used by GET /api/v4/orbit/status.
  rpc GetClusterHealth(GetClusterHealthRequest) returns (GetClusterHealthResponse);

  // Returns entity counts per domain, scoped by traversal_path prefix.
  // Used by admin dashboards to inspect graph coverage.
  rpc GetGraphStatus(GetGraphStatusRequest) returns (GetGraphStatusResponse);
}

// ---------------------------------------------------------------------------
// ExecuteQuery — bidirectional streaming with redaction
// ---------------------------------------------------------------------------

// Envelope for the execute_query stream. Each message carries exactly one of:
// request (client initial), redaction exchange (server/client), result, or error.
message ExecuteQueryMessage {
  oneof content {
    ExecuteQueryRequest request = 1;
    RedactionExchange redaction = 2;
    ExecuteQueryResult result = 3;
    ExecuteQueryError error = 4;
  }
}

// Query language selector. Only JSON DSL is supported today.
enum QueryType {
  QUERY_TYPE_JSON = 0;
}

// Client-sent initial message to start a query.
message ExecuteQueryRequest {
  string query = 1;            // JSON DSL query string
  ResponseFormat format = 2;   // RAW: tabular JSON rows; LLM: GOON text
  QueryType query_type = 3;    // defaults to JSON DSL
}

// Server-sent final message with query results.
message ExecuteQueryResult {
  oneof content {
    string result_json = 1;     // format = RAW: structured JSON
    string formatted_text = 2;  // format = LLM: compact text
  }
  QueryMetadata metadata = 3;
}

message QueryMetadata {
  string query_type = 1;              // e.g. "traversal", "aggregation", "search"
  repeated string raw_query_strings = 2; // compiled ClickHouse SQL(s) for debugging
  int32 row_count = 3;                // rows returned after redaction (and cursor slicing if applicable)
  string format_version = 4;          // semver string, e.g. "1.0.0"; empty for stub formatters
  FormatName format_name = 5;
}

// Server-sent error when query compilation or execution fails.
message ExecuteQueryError {
  string message = 1;
  string code = 2;  // e.g. "compile_error", "execution_error"
}

// ---------------------------------------------------------------------------
// GetGraphSchema — unary, reads from in-memory ontology
// ---------------------------------------------------------------------------

// Request to retrieve the graph schema with optional node expansion.
message GetGraphSchemaRequest {
  repeated string expand_nodes = 1;  // node names to include full properties/relationships; pass "*" to expand all
  ResponseFormat format = 2;         // RAW: StructuredSchema; LLM: TOON text
}

// Schema response — exactly one of structured or text depending on format.
message GetGraphSchemaResponse {
  oneof content {
    StructuredSchema structured = 1;  // format = RAW
    string formatted_text = 2;       // format = LLM (TOON notation)
  }
}

// Full structured schema with domains, nodes, and edges.
message StructuredSchema {
  string schema_version = 1;
  repeated SchemaDomain domains = 2;
  repeated SchemaNode nodes = 3;
  repeated SchemaEdge edges = 4;
}

// Logical grouping of related node types (e.g. "ci", "core", "plan").
message SchemaDomain {
  string name = 1;
  string description = 2;
  repeated string node_names = 3;
}

// A node type in the ontology. Properties, style, and edges are only
// populated when the node name appears in expand_nodes.
message SchemaNode {
  string name = 1;
  string domain = 2;
  string description = 3;
  string primary_key = 4;
  string label_field = 5;
  repeated SchemaProperty properties = 6;   // populated when expanded
  SchemaNodeStyle style = 7;                // populated when expanded
  repeated string outgoing_edges = 8;       // populated when expanded
  repeated string incoming_edges = 9;       // populated when expanded
}

// A single property on a node type.
message SchemaProperty {
  string name = 1;
  string data_type = 2;           // e.g. "int64", "string", "datetime"
  bool nullable = 3;
  repeated string enum_values = 4; // allowed values for enum-typed properties
}

// A named relationship type with its valid source/target combinations.
message SchemaEdge {
  string name = 1;               // e.g. "AUTHORED", "CONTAINS", "MEMBER_OF"
  string description = 2;
  repeated SchemaEdgeVariant variants = 3;
}

// One valid source->target pair for an edge type.
message SchemaEdgeVariant {
  string source_type = 1;
  string target_type = 2;
}

// Visual styling hints for graph rendering (Three.js dashboard).
message SchemaNodeStyle {
  int32 size = 1;    // relative node size in the graph visualization
  string color = 2;  // hex color, e.g. "#6366f1"
}

// ---------------------------------------------------------------------------
// Redaction — bidirectional authorization exchange within ExecuteQuery
// ---------------------------------------------------------------------------

// Wrapper for the redaction handshake within a streaming query.
// Server sends `required` with resources to check, client responds with decisions.
message RedactionExchange {
  oneof content {
    RedactionRequired required = 1;  // server -> client
    RedactionResponse response = 2;  // client -> server
  }
}

// Server asks Rails to authorize a set of resources before returning results.
message RedactionRequired {
  string result_id = 1;                       // correlates request with response
  repeated ResourceToAuthorize resources = 2;
}

// A batch of resource IDs that need authorization checks.
message ResourceToAuthorize {
  string resource_type = 1;      // e.g. "project", "merge_request"
  repeated int64 resource_ids = 2;
  repeated string abilities = 3; // e.g. ["read_project"]
}

// Rails responds with per-resource authorization decisions.
message RedactionResponse {
  string result_id = 1;
  repeated ResourceAuthorization authorizations = 2;
}

// Authorization decisions for one resource type. Keys are resource IDs,
// values are true (authorized) or false (redact).
message ResourceAuthorization {
  string resource_type = 1;
  map<int64, bool> authorized = 2;
}

// ---------------------------------------------------------------------------
// ListTools — unary, returns available MCP tool definitions
// ---------------------------------------------------------------------------

message ListToolsRequest {}

message ListToolsResponse {
  repeated ToolDefinition tools = 1;
}

// An MCP-compatible tool definition. The Rust service is the single source of
// truth for tool metadata — Rails passes these through to MCP and REST consumers.
message ToolDefinition {
  string name = 1;                    // e.g. "query_graph", "get_graph_schema"
  string description = 2;            // includes TOON schema context for query_graph
  string parameters_json_schema = 3; // JSON Schema for the tool's input parameters
}

// ---------------------------------------------------------------------------
// ClusterHealth — unary, returns service and component status
// ---------------------------------------------------------------------------

// Request for cluster health, with optional LLM formatting.
message GetClusterHealthRequest {
  ResponseFormat format = 1;  // RAW: structured JSON; LLM: TOON text
}

// Health response — structured or TOON text depending on format.
message GetClusterHealthResponse {
  oneof content {
    StructuredClusterHealth structured = 1;  // format = RAW
    string formatted_text = 2;              // format = LLM
  }
}

// Structured cluster health with per-component breakdown.
message StructuredClusterHealth {
  ClusterStatus status = 1;
  string timestamp = 2;
  string version = 3;
  repeated ComponentHealth components = 4;
}

enum ClusterStatus {
  CLUSTER_STATUS_UNSPECIFIED = 0;
  CLUSTER_STATUS_HEALTHY = 1;
  CLUSTER_STATUS_DEGRADED = 2;
  CLUSTER_STATUS_UNHEALTHY = 3;
}

// Health of a single service component (clickhouse, indexer, webserver).
message ComponentHealth {
  string name = 1;
  ClusterStatus status = 2;
  ReplicaStatus replicas = 3;
  map<string, string> metrics = 4;  // component-specific metrics (e.g. query_latency_p99_ms)
}

message ReplicaStatus {
  int32 ready = 1;
  int32 desired = 2;
}

// ---------------------------------------------------------------------------
// GetGraphStatus — unary, returns entity counts grouped by domain
// ---------------------------------------------------------------------------

enum SourceType {
  SOURCE_TYPE_GROUP = 0;
  SOURCE_TYPE_PROJECT = 1;
}

// Request for graph entity counts scoped by traversal_path prefix.
message GetGraphStatusRequest {
  string traversal_path = 1;  // traversal_path prefix to scope counts (e.g. "1/2/")
  SourceType source_type = 2;
  ResponseFormat format = 3;  // RAW: structured JSON; LLM: TOON text
}

// Derived indexing lifecycle state.
enum IndexingState {
  INDEXING_STATE_NOT_INDEXED = 0;
  INDEXING_STATE_BACKFILLING = 1;
  INDEXING_STATE_INDEXED = 2;
  INDEXING_STATE_ERROR = 3;
  INDEXING_STATE_UNKNOWN = 4;
  INDEXING_STATE_INDEXING = 5;
}

// Indexing progress metadata from the most recent indexing run.
message IndexingStatus {
  IndexingState state = 1;
  optional string last_started_at = 2;
  optional string last_completed_at = 3;
  optional uint64 last_duration_ms = 4;
  optional string last_error = 5;
}

// Response containing project coverage and entity counts grouped by domain.
message GetGraphStatusResponse {
  oneof content {
    StructuredGraphStatus structured = 1;  // format = RAW
    string formatted_text = 2;            // format = LLM (TOON notation)
  }
}

// Structured graph status with project coverage, entity counts, and indexing state.
message StructuredGraphStatus {
  ProjectsStatus projects = 1;
  repeated GraphStatusDomain domains = 2;
  IndexingStatus indexing = 3;
}

// How many projects under this scope have been code-indexed.
message ProjectsStatus {
  int64 indexed = 1;
  int64 total_known = 2;
}

// Entity counts for a single domain (e.g. "ci", "core", "plan").
message GraphStatusDomain {
  string name = 1;
  repeated GraphStatusItem items = 2;
}

// Count for a single entity type (e.g. "Project": 42).
message GraphStatusItem {
  string name = 1;
  int64 count = 2;
}
