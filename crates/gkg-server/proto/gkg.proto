// Knowledge Graph gRPC service definition
// Supports bidirectional streaming for tool execution with redaction flow

syntax = "proto3";

package gkg.v1;

// Knowledge Graph service for tool execution and raw queries
service KnowledgeGraphService {
  // List all available tools with their schemas
  rpc ListTools(ListToolsRequest) returns (ListToolsResponse);

  // Execute a tool with bidirectional streaming for redaction:
  // 1. Client sends ExecuteToolRequest
  // 2. Server sends RedactionExchange.required with resources to check
  // 3. Client sends RedactionExchange.response with authorized resources
  // 4. Server sends ToolResult with redacted, context-engineered response
  rpc ExecuteTool(stream ExecuteToolMessage) returns (stream ExecuteToolMessage);

  // Execute a raw query with bidirectional streaming for redaction:
  // Same redaction flow as ExecuteTool but returns raw filtered result
  // (no context-engine processing) for the query playground
  rpc ExecuteQuery(stream ExecuteQueryMessage) returns (stream ExecuteQueryMessage);

  // Returns the complete ontology schema (nodes, edges, domains)
  rpc GetOntology(GetOntologyRequest) returns (GetOntologyResponse);

  // Returns ontology merged with plugin-defined nodes/edges for a namespace
  rpc GetNamespaceOntology(GetNamespaceOntologyRequest) returns (GetOntologyResponse);

  // Returns cluster health status for the Orbit dashboard
  rpc GetClusterHealth(GetClusterHealthRequest) returns (GetClusterHealthResponse);
}

// --- List Tools ---

message ListToolsRequest {
  // Empty - user context comes from JWT
}

message ListToolsResponse {
  repeated ToolDefinition tools = 1;
}

message ToolDefinition {
  string name = 1;
  string description = 2;
  string parameters_json_schema = 3;
}

// --- Shared Types ---

// Shared error type for all RPCs
message Error {
  string code = 1;
  string message = 2;
}

// Shared redaction exchange - encapsulates the authorization back-and-forth
message RedactionExchange {
  oneof exchange {
    RedactionRequired required = 1;
    RedactionResponse response = 2;
  }
}

// Server -> Client: Resources needing authorization checks
message RedactionRequired {
  string result_id = 1;
  repeated ResourceCheck resources = 2;
}

message ResourceCheck {
  string resource_type = 1;
  repeated int64 ids = 2;
  string ability = 3;
}

// Client -> Server: Authorization results from Rails
message RedactionResponse {
  string result_id = 1;
  repeated ResourceAuthorization authorizations = 2;
}

message ResourceAuthorization {
  string resource_type = 1;
  map<int64, bool> authorized = 2;
}

// --- Execute Tool ---

message ExecuteToolMessage {
  oneof message {
    ExecuteToolRequest request = 1;
    RedactionExchange redaction = 2;
    ToolResult result = 3;
    Error error = 4;
  }
}

message ExecuteToolRequest {
  string tool_name = 1;
  string arguments_json = 2;
}

message ToolResult {
  string result_json = 1;
}

// --- Execute Query ---

message ExecuteQueryMessage {
  oneof message {
    ExecuteQueryRequest request = 1;
    RedactionExchange redaction = 2;
    QueryResult result = 3;
    Error error = 4;
  }
}

message ExecuteQueryRequest {
  string query_json = 1;
}

message QueryResult {
  string result_json = 1;
  string generated_sql = 2;
}

// --- Get Ontology ---

message GetOntologyRequest {
  // Empty for now, could add filters in the future
}

message GetNamespaceOntologyRequest {
  int64 namespace_id = 1;
}

message GetOntologyResponse {
  string schema_version = 1;
  repeated NodeDefinition nodes = 2;
  repeated EdgeDefinition edges = 3;
  repeated DomainDefinition domains = 4;
}

message DomainDefinition {
  string name = 1;
  string description = 2;
  repeated string node_names = 3;
}

message NodeDefinition {
  string name = 1;
  string domain = 2;
  string description = 3;
  string primary_key = 4;
  string label_field = 5;
  repeated PropertyDefinition properties = 6;
  NodeStyle style = 7;
  // Set for plugin-defined nodes, empty for base ontology nodes
  optional string plugin_id = 8;
}

message PropertyDefinition {
  string name = 1;
  string data_type = 2;
  bool nullable = 3;
  repeated string enum_values = 4;
}

message NodeStyle {
  int32 size = 1;
  string color = 2;
}

message EdgeDefinition {
  string name = 1;
  string description = 2;
  repeated EdgeVariant variants = 3;
}

message EdgeVariant {
  string source_type = 1;
  string target_type = 2;
}

// --- Cluster Health ---

message GetClusterHealthRequest {
  // Empty for now
}

message GetClusterHealthResponse {
  ClusterStatus status = 1;
  string timestamp = 2;
  string version = 3;
  repeated ComponentHealth components = 4;
}

enum ClusterStatus {
  CLUSTER_STATUS_UNSPECIFIED = 0;
  CLUSTER_STATUS_HEALTHY = 1;
  CLUSTER_STATUS_DEGRADED = 2;
  CLUSTER_STATUS_UNHEALTHY = 3;
}

message ComponentHealth {
  string name = 1;
  ClusterStatus status = 2;
  ReplicaStatus replicas = 3;
  map<string, string> metrics = 4;
}

message ReplicaStatus {
  int32 ready = 1;
  int32 desired = 2;
}
