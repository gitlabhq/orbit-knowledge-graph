[package]
name = "gkg-server"
version = "0.1.0"
edition = "2024"
license = "MIT"

[[bin]]
name = "gkg-server"
path = "src/main.rs"

[features]
default = []
regenerate-protos = []

[dependencies]
anyhow = { workspace = true }
arrow = { workspace = true }
bytes = { workspace = true }
async-trait = { workspace = true }
axum = { workspace = true }
base64 = { workspace = true }
clap = { workspace = true }
clickhouse-client = { path = "../clickhouse-client" }
indexer = { path = "../code-indexer" }
etl-engine = { path = "../etl-engine" }
gitaly-client = { path = "../gitaly-client" }
health-check = { path = "../health-check" }
siphon-proto = { path = "../siphon-proto" }
ontology = { path = "../ontology" }
reqwest = { workspace = true }
parking_lot = { workspace = true }
query-engine = { path = "../query-engine" }
jsonwebtoken = { workspace = true }
# Shared GitLab observability library
# See: https://gitlab.com/gitlab-org/rust/labkit-rs
labkit = { git = "https://gitlab.com/gitlab-org/rust/labkit-rs", tag = "v0.2.0", features = ["full"] }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
tempfile = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-util.workspace = true
tokio-stream = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
chrono = { workspace = true }
arrow-ipc = { workspace = true }
clickhouse = { workspace = true }
datafusion = { workspace = true }
futures = { workspace = true }
prost = { workspace = true }
prost-types = { workspace = true }
tonic = { workspace = true }
tonic-prost = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
toon-format = { version = "0.4.1", default-features = false }
zstd = "0.13.3"

[build-dependencies]
tonic-prost-build = { workspace = true }
prost-build = { workspace = true }

[dev-dependencies]
async-nats = { workspace = true }
tokio = { workspace = true }
testcontainers = { workspace = true }
testcontainers-modules = { workspace = true }
serial_test = { workspace = true }
etl-engine = { path = "../etl-engine", features = ["testkit"] }
query-engine = { path = "../query-engine" }
regex = { workspace = true }

[lints]
workspace = true
