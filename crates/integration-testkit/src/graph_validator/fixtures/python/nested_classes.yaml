name: "Python: nested class hierarchy"
fixtures:
  - path: main.py
    content: |
      class Outer:
          class Inner:
              def method(self):
                  pass
          def outer_method(self):
              pass

tests:
  - name: Inner class is contained in Outer
    query: |
      MATCH (outer:Definition)-[:DefinitionToDefinition]->(inner:Definition)
      WHERE outer.name = 'Outer' AND inner.name = 'Inner'
      RETURN outer.fqn AS parent, inner.fqn AS child
    assert:
      - { non_empty: true }

  - name: method is contained in Inner
    query: |
      MATCH (cls:Definition)-[:DefinitionToDefinition]->(m:Definition)
      WHERE cls.name = 'Inner' AND m.name = 'method'
      RETURN m.fqn AS fqn
    assert:
      - { non_empty: true }
      - { all_match: { field: fqn, pattern: "Outer.Inner.*" } }

  - name: outer_method is contained in Outer
    query: |
      MATCH (cls:Definition)-[:DefinitionToDefinition]->(m:Definition)
      WHERE cls.name = 'Outer' AND m.name = 'outer_method'
      RETURN m.fqn AS fqn
    assert:
      - { non_empty: true }
      - { all_match: { field: fqn, pattern: "Outer.*" } }
