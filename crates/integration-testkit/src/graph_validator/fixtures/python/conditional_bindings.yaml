name: "Python: conditional and try/except bindings (phi nodes)"
fixtures:
  - path: main.py
    content: |
      def option_a():
          pass

      def option_b():
          pass

      def conditional_caller():
          if True:
              chosen = option_a
          else:
              chosen = option_b
          chosen()

      def foo():
          pass

      def bar():
          pass

      def try_caller():
          try:
              x = foo
          except:
              x = bar
          x()

      def same_both_branches():
          if True:
              y = foo
          else:
              y = foo
          y()

tests:
  - name: "if/else: chosen() resolves to BOTH option_a and option_b via phi"
    queries:
      - query: |
          MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
          WHERE caller.name = 'conditional_caller'
          RETURN callee.name AS callee
          ORDER BY callee
        assert:
          - { row_count: 2 }
          - { contains_row: { callee: "option_a" } }
          - { contains_row: { callee: "option_b" } }

  - name: "try/except: x() resolves to BOTH foo and bar via phi"
    queries:
      - query: |
          MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
          WHERE caller.name = 'try_caller'
          RETURN callee.name AS callee
          ORDER BY callee
        assert:
          - { row_count: 2 }
          - { contains_row: { callee: "bar" } }
          - { contains_row: { callee: "foo" } }

  - name: "trivial phi: same value in both branches collapses to single edge"
    queries:
      - query: |
          MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
          WHERE caller.name = 'same_both_branches'
          RETURN callee.name AS callee
        assert:
          - { row_count: 1 }
          - { contains_row: { callee: "foo" } }
