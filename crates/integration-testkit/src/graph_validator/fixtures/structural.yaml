name: Structural invariants
fixtures:
  - path: service.py
    content: |
      class UserService:
          def get_user(self, id):
              return id
          def create_user(self, name):
              user = self.get_user(name)
              return user
  - path: main.py
    content: |
      from service import UserService
      svc = UserService()
      svc.create_user("alice")

tests:
  - name: Every file has a parent directory
    query: |
      MATCH (f:File)
      WHERE NOT EXISTS { MATCH (d:Directory)-[:DirectoryToFile]->(f) }
      RETURN f.path AS orphan_file
    assert:
      - empty: true

  - name: Every definition belongs to a file
    query: |
      MATCH (d:Definition)
      WHERE NOT EXISTS { MATCH (f:File)-[:FileToDefinition]->(d) }
      RETURN d.fqn AS orphan_def
    assert:
      - empty: true

  - name: No self-referencing call edges
    query: |
      MATCH (d:Definition)-[:DefinitionToDefinition]->(d)
      RETURN d.fqn AS self_caller
    assert:
      - empty: true

  - name: Graph has expected file count
    query: |
      MATCH (f:File)
      RETURN count(f) AS n
    assert:
      - count_equals: { field: n, value: 2 }
      - non_empty: true

  - name: Graph has definitions
    query: |
      MATCH (d:Definition)
      RETURN count(d) AS n
    assert:
      - non_empty: true

  - name: All definitions have non-empty names
    query: |
      MATCH (d:Definition) WHERE d.name = ''
      RETURN d.fqn AS bad
    assert:
      - empty: true
