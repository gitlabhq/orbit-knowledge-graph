description: Project memberships produce MEMBER_OF edges
scope: { namespace: 100 }

seed:
  namespaces:
    - { id: 100, traversal_path: "1/100/" }
  projects:
    - { id: 1000, namespace_id: 100, traversal_path: "1/100/1000/" }
  siphon_users:
    - { id: 1, email: user1@example.com, username: user1, name: User 1, state: active, organization_id: 1 }
  siphon_members:
    - { id: 11000, access_level: 40, source_id: 1000, source_type: Project, user_id: 1, state: 0, traversal_path: "1/100/" }

expect:
  edges:
    - { kind: MEMBER_OF, from: User, to: Project, traversal_path: "1/100/", count: 1 }
