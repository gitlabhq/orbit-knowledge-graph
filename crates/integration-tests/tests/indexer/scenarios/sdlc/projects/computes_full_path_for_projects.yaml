    - { id: 100, traversal_path: "1/100/", slug: gitlab-org }
    - { id: 200, parent_id: 100, traversal_path: "1/100/200/", slug: orbit }
  projects:
    - { id: 1000, namespace_id: 100, traversal_path: "1/100/1000/", slug: gitlab }
    - { id: 1001, namespace_id: 200, traversal_path: "1/100/200/1001/", slug: knowledge-graph }
  siphon_routes:
    - { id: 1000, source_id: 1000, source_type: Project, path: gitlab-org/gitlab, namespace_id: 100, traversal_path: "1/100/1000/" }
    - { id: 1001, source_id: 1001, source_type: Project, path: gitlab-org/orbit/knowledge-graph, namespace_id: 200, traversal_path: "1/100/200/1001/" }

expect:
  nodes:
    gl_project:
      rows:
        - { id: 1000, full_path: gitlab-org/gitlab }
        - { id: 1001, full_path: gitlab-org/orbit/knowledge-graph }
