# Metric columns (commits_count, added_lines) come from
# siphon_merge_request_metrics, not the denormalized merge_requests columns.
description: Merge requests index with metrics join and the full FK edge set
scope: { namespace: 100 }

seed:
  siphon_milestones:
    - { id: 10, title: v1.0, project_id: 1000, state: active, traversal_path: "1/100/" }
  merge_requests:
    - { id: 1, iid: 101, title: Add feature X, description: Implements feature X, source_branch: feature-x, target_branch: main, state_id: 1, merge_status: can_be_merged, draft: false, squash: true, target_project_id: 1000, source_project_id: 1001, head_pipeline_id: 5001, latest_merge_request_diff_id: 7001, merged_commit_sha: null, squash_commit_sha: null, updated_by_id: 2, last_edited_by_id: 3, author_id: 1, merge_user_id: null, milestone_id: 10, traversal_path: "1/100/" }
    - { id: 2, iid: 102, title: Fix bug Y, description: Fixes critical bug, source_branch: fix-y, target_branch: main, state_id: 3, merge_status: merged, draft: false, squash: false, target_project_id: 1000, source_project_id: 1000, head_pipeline_id: 5002, latest_merge_request_diff_id: 7002, merged_commit_sha: abc123def456, squash_commit_sha: squash789, updated_by_id: null, last_edited_by_id: null, author_id: 2, merge_user_id: 1, milestone_id: null, traversal_path: "1/100/" }
  siphon_merge_request_metrics:
    - { id: 1, merge_request_id: 1, merged_at: null, commits_count: 3, added_lines: 120, removed_lines: 40, target_project_id: 1000, traversal_path: "1/100/" }
    - { id: 2, merge_request_id: 2, merged_at: "2024-01-18 09:30:00", commits_count: 2, added_lines: 15, removed_lines: 5, target_project_id: 1000, traversal_path: "1/100/" }
  siphon_merge_request_reviewers:
    - { id: 1, user_id: 4, merge_request_id: 1, created_at: "2024-01-20 12:00:00", state: 0, project_id: 1000, traversal_path: "1/100/" }
    - { id: 2, user_id: 5, merge_request_id: 1, created_at: "2024-01-20 12:00:00", state: 0, project_id: 1000, traversal_path: "1/100/" }
    - { id: 3, user_id: 6, merge_request_id: 2, created_at: "2024-01-20 12:00:00", state: 0, project_id: 1000, traversal_path: "1/100/" }
  siphon_approvals:
    - { id: 1, merge_request_id: 1, user_id: 5, created_at: "2024-01-20 12:00:00", updated_at: "2024-01-20 12:00:00", project_id: 1000, traversal_path: "1/100/" }
    - { id: 2, merge_request_id: 2, user_id: 3, created_at: "2024-01-20 12:00:00", updated_at: "2024-01-20 12:00:00", project_id: 1000, traversal_path: "1/100/" }
    - { id: 3, merge_request_id: 2, user_id: 4, created_at: "2024-01-20 12:00:00", updated_at: "2024-01-20 12:00:00", project_id: 1000, traversal_path: "1/100/" }

expect:
  nodes:
    gl_merge_request:
      rows:
        - { id: 1, title: Add feature X, state: opened, project_id: 1000, merged_commit_sha: "", squash_commit_sha: "", commits_count: 3, added_lines: 120 }
        - { id: 2, title: Fix bug Y, state: merged, project_id: 1000, merged_commit_sha: abc123def456, squash_commit_sha: squash789, commits_count: 2, added_lines: 15 }
  edges:
    - { kind: IN_PROJECT, from: MergeRequest, to: Project, traversal_path: "1/100/", count: 2 }
    # source_project_id is 1001 for MR 1 (fork) and 1000 for MR 2 (same project).
    - { kind: SOURCE_PROJECT, from: MergeRequest, to: Project, traversal_path: "1/100/", count: 2 }
    - { kind: HAS_HEAD_PIPELINE, from: MergeRequest, to: Pipeline, traversal_path: "1/100/", count: 2 }
    - { kind: HAS_LATEST_DIFF, from: MergeRequest, to: MergeRequestDiff, traversal_path: "1/100/", count: 2 }
    # Only MR 1 has updated_by_id / last_edited_by_id set.
    - { kind: UPDATED_BY, from: User, to: MergeRequest, traversal_path: "1/100/", count: 1 }
    - { kind: LAST_EDITED_BY, from: User, to: MergeRequest, traversal_path: "1/100/", count: 1 }
    - { kind: AUTHORED, from: User, to: MergeRequest, traversal_path: "1/100/", count: 2 }
    - { kind: MERGED, from: User, to: MergeRequest, traversal_path: "1/100/", count: 1 }
    - { kind: IN_MILESTONE, from: MergeRequest, to: Milestone, traversal_path: "1/100/", count: 1 }
    - { kind: REVIEWER, from: User, to: MergeRequest, traversal_path: "1/100/", count: 3 }
    - { kind: APPROVED, from: User, to: MergeRequest, traversal_path: "1/100/", count: 3 }
