# KG #924: MERGED_AT_COMMIT is sourced from the scalar FK
# COALESCE(merged_commit_sha, merge_commit_sha, squash_commit_sha), gated on a
# merged state. merged_commit_sha and squash_commit_sha are Postgres bytea, so
# Siphon stores them as `\x` + hex-of-ASCII (length 82 for a 40-char SHA); the
# ETL unhex-decodes them. merge_commit_sha is clean varchar. Each MR exercises
# one COALESCE leg and asserts the Commit node carries the DECODED clean 40-char
# SHA. A non-merged MR that still carries a SHA emits neither edge nor node, and
# an MR with no SHA in any leg emits neither.
#
# The two `\x...` literals below decode to:
#   \x3162...3865 -> 1bcbab0dc35d8b5c823f92bc4bcdb9414384008e
#   \x6665...6566 -> feedface0000000000000000000000000000beef
description: MERGED_AT_COMMIT decodes bytea SHAs, walks the COALESCE fallback, and gates on merged state
scope: { namespace: 100 }

seed:
  siphon_routes:
    - { id: 1, source_id: 1000, source_type: Project, path: my-group/my-proj, namespace_id: 100, traversal_path: "1/100/1000/" }
  merge_requests:
    # merged_commit_sha (bytea) present -> first leg, decoded.
    - { id: 1, iid: 101, title: Merge commit MR, source_branch: a, target_branch: main, state_id: 3, merge_status: merged, draft: false, squash: false, target_project_id: 1000, source_project_id: 1000, merge_commit_sha: cleanmergeAAA, merged_commit_sha: "\\x31626362616230646333356438623563383233663932626334626364623934313433383430303865", squash_commit_sha: null, author_id: 1, merge_user_id: 1, traversal_path: "1/100/1000/" }
    # merged_commit_sha empty, merge_commit_sha (clean varchar) present -> second leg, passthrough.
    - { id: 2, iid: 102, title: Legacy merge MR, source_branch: b, target_branch: main, state_id: 3, merge_status: merged, draft: false, squash: false, target_project_id: 1000, source_project_id: 1000, merge_commit_sha: mergeBBB1234567890abcdef1234567890abcdef12, merged_commit_sha: null, squash_commit_sha: null, author_id: 1, merge_user_id: 1, traversal_path: "1/100/1000/" }
    # Only squash_commit_sha (bytea) present -> third leg, decoded. The edge must
    # point at the squash commit (the landed commit), the case the auto-merge note
    # would have gotten wrong (it carries the pre-squash head).
    - { id: 3, iid: 103, title: Squash MR, source_branch: c, target_branch: main, state_id: 3, merge_status: merged, draft: true, squash: true, target_project_id: 1000, source_project_id: 1000, merge_commit_sha: null, merged_commit_sha: null, squash_commit_sha: "\\x66656564666163653030303030303030303030303030303030303030303030303030303062656566", author_id: 1, merge_user_id: 1, traversal_path: "1/100/1000/" }
    # No SHA in any leg, merged -> no edge, no commit node (~9.4% of merged MRs in production).
    - { id: 4, iid: 104, title: FF merge MR, source_branch: d, target_branch: main, state_id: 3, merge_status: merged, draft: false, squash: false, target_project_id: 1000, source_project_id: 1000, merge_commit_sha: null, merged_commit_sha: null, squash_commit_sha: null, author_id: 1, merge_user_id: 1, traversal_path: "1/100/1000/" }
    # state-gate: carries a SHA but is closed (terminal, never merged) -> no edge,
    # no node. "Has a SHA" != "is merged"; the stale-edge sweep would not catch
    # this (a closed MR keeps its SHA, so the edge is stable, not stale).
    - { id: 5, iid: 105, title: Closed-with-SHA MR, source_branch: e, target_branch: main, state_id: 2, merge_status: can_be_merged, draft: false, squash: false, target_project_id: 1000, source_project_id: 1000, merge_commit_sha: closedEEE1234567890abcdef1234567890abcdef, merged_commit_sha: null, squash_commit_sha: null, author_id: 1, merge_user_id: null, traversal_path: "1/100/1000/" }

expect:
  nodes:
    gl_commit:
      count: 3
      rows:
        - { sha: 1bcbab0dc35d8b5c823f92bc4bcdb9414384008e, project_id: 1000, traversal_path: "1/100/1000/" }
        - { sha: mergeBBB1234567890abcdef1234567890abcdef12, project_id: 1000, traversal_path: "1/100/1000/" }
        - { sha: feedface0000000000000000000000000000beef, project_id: 1000, traversal_path: "1/100/1000/" }
  edges:
    - kind: MERGED_AT_COMMIT
      from: MergeRequest
      to: Commit
      traversal_path: "1/100/1000/"
      count: 3
      rows:
        - { source_id: 1, source_kind: MergeRequest, target_kind: Commit }
        - { source_id: 2, source_kind: MergeRequest, target_kind: Commit }
        - { source_id: 3, source_kind: MergeRequest, target_kind: Commit }
