description: Milestones produce nodes plus IN_PROJECT / IN_GROUP edges
scope: { namespace: 100 }

seed:
  namespaces:
    - { id: 100, traversal_path: "1/100/" }
  projects:
    - { id: 1000, namespace_id: 100, traversal_path: "1/100/1000/" }
  siphon_milestones:
    - { id: 1, iid: 1, title: v1.0, description: First release, state: active, due_date: "2024-03-01", start_date: "2024-01-01", project_id: 1000, traversal_path: "1/100/" }
    - { id: 2, iid: 2, title: v2.0, description: Second release, state: closed, due_date: "2024-06-01", start_date: "2024-03-01", project_id: 1000, traversal_path: "1/100/" }
    - { id: 3, iid: 1, title: Q1 Goals, description: Group milestone, state: active, due_date: "2024-03-31", start_date: "2024-01-01", group_id: 100, traversal_path: "1/100/" }

expect:
  nodes:
    gl_milestone:
      rows:
        - { id: 1, title: v1.0, state: active }
        - { id: 2, title: v2.0, state: closed }
        - { id: 3, title: Q1 Goals, state: active }
  edges:
    - { kind: IN_PROJECT, from: Milestone, to: Project, traversal_path: "1/100/", count: 2 }
    - { kind: IN_GROUP, from: Milestone, to: Group, traversal_path: "1/100/", count: 1 }
