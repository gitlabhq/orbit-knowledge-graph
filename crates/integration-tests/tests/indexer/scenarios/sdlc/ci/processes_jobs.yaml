  siphon_p_ci_stages:
    - { id: 6001, partition_id: 1, pipeline_id: 5001, project_id: 1000, name: build, status: 3, position: 0, traversal_path: "1/100/1000/" }
  siphon_p_ci_builds:
    - { id: 7001, partition_id: 1, stage_id: 6001, project_id: 1000, user_id: 1, name: compile, status: success, ref: main, tag: false, allow_failure: false, when: on_success, retried: false, created_at: "2024-01-15 10:00:00", started_at: "2024-01-15 10:00:30", finished_at: "2024-01-15 10:01:00", queued_at: "2024-01-15 10:00:00", failure_reason: null, traversal_path: "1/100/1000/" }
    - { id: 7002, partition_id: 1, stage_id: 6001, project_id: 1000, user_id: 1, name: lint, status: success, ref: main, tag: false, allow_failure: true, when: on_success, retried: false, created_at: "2024-01-15 10:00:00", started_at: "2024-01-15 10:00:30", finished_at: "2024-01-15 10:01:00", queued_at: "2024-01-15 10:00:00", failure_reason: 1, traversal_path: "1/100/1000/" }
