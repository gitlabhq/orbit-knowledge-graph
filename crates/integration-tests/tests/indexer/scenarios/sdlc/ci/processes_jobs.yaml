expect:
  nodes:
    gl_job:
      rows:
        - { id: 7001, name: compile, failure_reason: "" }
        - { id: 7002, name: lint, failure_reason: script_failure }
        - { id: 7003, name: deploy, failure_reason: protected_environment_failure }
  edges:
    - { kind: IN_PROJECT, from: Job, to: Project, traversal_path: "1/100/1000/", count: 3 }
    - { kind: HAS_JOB, from: Stage, to: Job, traversal_path: "1/100/1000/", count: 3 }
    - { kind: TRIGGERED, from: User, to: Job, traversal_path: "1/100/1000/", count: 3 }
