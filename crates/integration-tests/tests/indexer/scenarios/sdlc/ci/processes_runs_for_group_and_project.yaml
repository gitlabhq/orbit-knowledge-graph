description: Runner namespace/project joins produce RUNS_FOR_GROUP / RUNS_FOR_PROJECT edges
scope: { namespace: 100 }

seed:
  namespaces:
    - { id: 100, traversal_path: "1/100/" }
  projects:
    - { id: 1000, namespace_id: 100, traversal_path: "1/100/1000/" }
  siphon_ci_runners:
    - { id: 9002, runner_type: 2, name: group-runner, description: test runner, active: true, locked: false, run_untagged: true, access_level: 0, organization_id: 1, created_at: "2024-01-15", updated_at: "2024-01-15", contacted_at: "2024-01-15" }
    - { id: 9003, runner_type: 3, name: project-runner, description: test runner, active: true, locked: false, run_untagged: true, access_level: 0, organization_id: 1, created_at: "2024-01-15", updated_at: "2024-01-15", contacted_at: "2024-01-15" }
  siphon_ci_runner_namespaces:
    - { id: 1, runner_id: 9002, namespace_id: 100, traversal_path: "1/100/" }
  siphon_ci_runner_projects:
    - { id: 1, runner_id: 9003, project_id: 1000, created_at: "2024-01-15", updated_at: "2024-01-15", traversal_path: "1/100/1000/" }

run: [global, namespace]

expect:
  edges:
    - { kind: RUNS_FOR_GROUP, from: Runner, to: Group, traversal_path: "1/100/", count: 1 }
    - { kind: RUNS_FOR_PROJECT, from: Runner, to: Project, traversal_path: "1/100/1000/", count: 1 }
