# v1 limitation guard (ADR 013): the resolver bounds every datalake scan to
# the source note's top-level namespace prefix so it never full-scans the
# shared datalake; cross-top-level references are deliberately deferred.
# The cross-top-level target's route and work item are fully present — the
# only reason the edge must not materialize is the bound.
description: Cross-top-level-namespace references are deliberately not resolved
scope: { namespace: 100 }

seed:
  siphon_routes:
    - { id: 1, source_id: 200, source_type: Project, path: my-group/my-proj, namespace_id: 100, traversal_path: "1/100/200/" }
    - { id: 2, source_id: 400, source_type: Project, path: other-group/other-proj, namespace_id: 300, traversal_path: "1/300/400/" }
  work_items:
    - { id: 30, iid: 7, title: WI 7, description: "", project_id: 400, namespace_id: 300, work_item_type_id: 1, created_at: "2024-01-15", updated_at: "2024-01-15", traversal_path: "1/300/400/" }
    - { id: 40, iid: 9, title: WI 9, description: "", project_id: 200, namespace_id: 100, work_item_type_id: 1, created_at: "2024-01-15", updated_at: "2024-01-15", traversal_path: "1/100/200/" }
  siphon_notes:
    - { id: 1, note: "mentioned in other-group/other-proj#7", noteable_type: MergeRequest, noteable_id: 1000, author_id: 1, project_id: 200, system: true, internal: false, traversal_path: "1/100/200/", created_at: "2024-01-15 09:00:00", updated_at: "2024-01-15 09:00:00", _siphon_replicated_at: "2024-01-15 09:00:00" }
    - { id: 2, note: "mentioned in #9", noteable_type: MergeRequest, noteable_id: 1000, author_id: 1, project_id: 200, system: true, internal: false, traversal_path: "1/100/200/", created_at: "2024-01-15 10:00:00", updated_at: "2024-01-15 10:00:00", _siphon_replicated_at: "2024-01-15 10:00:00" }
  siphon_system_note_metadata:
    - { id: 1, note_id: 1, action: cross_reference, namespace_id: 100, traversal_path: "1/100/200/", created_at: "2024-01-15 09:00:00", updated_at: "2024-01-15 09:00:00", _siphon_replicated_at: "2024-01-15 09:00:00" }
    - { id: 2, note_id: 2, action: cross_reference, namespace_id: 100, traversal_path: "1/100/200/", created_at: "2024-01-15 10:00:00", updated_at: "2024-01-15 10:00:00", _siphon_replicated_at: "2024-01-15 10:00:00" }

run: namespace
targets: [SystemNote]

expect:
  edges:
    - kind: MENTIONS
      count: 1
      rows:
        - { source_id: 40, target_id: 1000 }
