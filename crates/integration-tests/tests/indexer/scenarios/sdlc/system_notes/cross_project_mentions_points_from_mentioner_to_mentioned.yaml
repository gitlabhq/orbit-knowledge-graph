# Cross-project MENTIONS direction + partition guard. Project A (id=200,
# traversal_path=1/100/200/) mentions project B (id=400,
# traversal_path=1/100/400/) via a note "mentioned in my-group/proj-a!42"
# living on MR 1000 in project B. Rails writes the note on the *mentioned*
# entity, so noteable_id=1000 (in project B) is the mentioned side and
# the body ref MR !42 (id=30, in project A) is the mentioner.
#
# The MENTIONS edge must point mentioner → mentioned (source=30, target=1000)
# and land in the mentioned entity's (noteable's) namespace partition
# (1/100/400/), NOT the mentioner's (1/100/200/).
description: Cross-project MENTIONS points from mentioner to mentioned in the mentioned entity's partition
scope: { namespace: 100 }

seed:
  siphon_routes:
    - { id: 1, source_id: 200, source_type: Project, path: my-group/proj-a, namespace_id: 100, traversal_path: "1/100/200/" }
    - { id: 2, source_id: 400, source_type: Project, path: my-group/proj-b, namespace_id: 100, traversal_path: "1/100/400/" }
  merge_requests:
    - { id: 30, iid: 42, title: MR 42, target_project_id: 200, source_project_id: 200, author_id: 1, traversal_path: "1/100/200/" }
  siphon_notes:
    - { id: 1, note: "mentioned in my-group/proj-a!42", noteable_type: MergeRequest, noteable_id: 1000, author_id: 1, project_id: 400, system: true, internal: false, traversal_path: "1/100/400/", created_at: "2024-01-15 09:00:00", updated_at: "2024-01-15 09:00:00", _siphon_replicated_at: "2024-01-15 09:00:00" }
  siphon_system_note_metadata:
    - { id: 1, note_id: 1, action: cross_reference, namespace_id: 100, traversal_path: "1/100/400/", created_at: "2024-01-15 09:00:00", updated_at: "2024-01-15 09:00:00", _siphon_replicated_at: "2024-01-15 09:00:00" }

run: system_notes

expect:
  edges:
    - kind: MENTIONS
      count: 1
      rows:
        - { source_id: 30, source_kind: MergeRequest, target_id: 1000, target_kind: MergeRequest, traversal_path: "1/100/400/" }
  totals:
    gl_edge: 1
