# "#9" carries no project prefix; the note's project_id must supply the
# default project so the work item resolves.
description: Same-project shorthand references resolve via the note's owning project
scope: { namespace: 100 }

seed:
  siphon_routes:
    - { id: 1, source_id: 200, source_type: Project, path: my-group/my-proj, namespace_id: 100, traversal_path: "1/100/200/" }
  work_items:
    - { id: 20, iid: 9, title: WI 9, description: "", project_id: 200, namespace_id: 100, work_item_type_id: 1, created_at: "2024-01-15", updated_at: "2024-01-15", traversal_path: "1/100/200/" }
  siphon_notes:
    - { id: 1, note: "mentioned in #9", noteable_type: MergeRequest, noteable_id: 1000, author_id: 1, project_id: 200, system: true, internal: false, traversal_path: "1/100/200/", created_at: "2024-01-15 09:00:00", updated_at: "2024-01-15 09:00:00", _siphon_replicated_at: "2024-01-15 09:00:00" }
  siphon_system_note_metadata:
    - { id: 1, note_id: 1, action: cross_reference, namespace_id: 100, traversal_path: "1/100/200/", created_at: "2024-01-15 09:00:00", updated_at: "2024-01-15 09:00:00", _siphon_replicated_at: "2024-01-15 09:00:00" }

run: namespace
targets: [SystemNote]

expect:
  edges:
    - kind: MENTIONS
      count: 1
      rows:
        - { source_id: 20, source_kind: WorkItem, target_id: 1000, target_kind: MergeRequest }
