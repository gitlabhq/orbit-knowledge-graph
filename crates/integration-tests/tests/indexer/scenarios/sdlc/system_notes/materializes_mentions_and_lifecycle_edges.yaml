# ADR 013 happy path. The cross-project target (1/100/400/) is a sibling
# under the SAME top-level namespace as the source (1/100/200/); v1 bounds
# resolution to the source top-level namespace, so it still resolves and
# the edge lands in the target's namespace partition. Note rows carry
# _siphon_replicated_at == created_at so the watermark window selects them.
description: System notes materialize MENTIONS and lifecycle edges, and nothing else
scope: { namespace: 100 }

seed:
  siphon_routes:
    - { id: 1, source_id: 200, source_type: Project, path: my-group/my-proj, namespace_id: 100, traversal_path: "1/100/200/" }
    - { id: 2, source_id: 400, source_type: Project, path: my-group/other-proj, namespace_id: 100, traversal_path: "1/100/400/" }
  merge_requests:
    - { id: 10, iid: 5, title: MR 5, target_project_id: 200, source_project_id: 200, author_id: 1, traversal_path: "1/100/200/" }
    - { id: 30, iid: 42, title: MR 42, target_project_id: 400, source_project_id: 400, author_id: 1, traversal_path: "1/100/400/" }
  work_items:
    - { id: 20, iid: 9, title: WI 9, description: "", project_id: 200, namespace_id: 100, work_item_type_id: 1, created_at: "2024-01-15", updated_at: "2024-01-15", traversal_path: "1/100/200/" }
  siphon_notes:
    - { id: 1, note: mentioned in !5, noteable_type: MergeRequest, noteable_id: 1000, author_id: 1, project_id: 200, system: true, internal: false, traversal_path: "1/100/200/", created_at: "2024-01-15 09:00:00", updated_at: "2024-01-15 09:00:00", _siphon_replicated_at: "2024-01-15 09:00:00" }
    - { id: 2, note: "mentioned in #9", noteable_type: MergeRequest, noteable_id: 1000, author_id: 1, project_id: 200, system: true, internal: false, traversal_path: "1/100/200/", created_at: "2024-01-15 10:00:00", updated_at: "2024-01-15 10:00:00", _siphon_replicated_at: "2024-01-15 10:00:00" }
    - { id: 3, note: mentioned in my-group/other-proj!42, noteable_type: MergeRequest, noteable_id: 1000, author_id: 1, project_id: 200, system: true, internal: false, traversal_path: "1/100/200/", created_at: "2024-01-15 11:00:00", updated_at: "2024-01-15 11:00:00", _siphon_replicated_at: "2024-01-15 11:00:00" }
    - { id: 4, note: reopened, noteable_type: Issue, noteable_id: 777, author_id: 2, project_id: 200, system: true, internal: false, traversal_path: "1/100/200/", created_at: "2024-01-15 12:00:00", updated_at: "2024-01-15 12:00:00", _siphon_replicated_at: "2024-01-15 12:00:00" }
  siphon_system_note_metadata:
    - { id: 1, note_id: 1, action: cross_reference, namespace_id: 100, traversal_path: "1/100/200/", created_at: "2024-01-15 09:00:00", updated_at: "2024-01-15 09:00:00", _siphon_replicated_at: "2024-01-15 09:00:00" }
    - { id: 2, note_id: 2, action: cross_reference, namespace_id: 100, traversal_path: "1/100/200/", created_at: "2024-01-15 10:00:00", updated_at: "2024-01-15 10:00:00", _siphon_replicated_at: "2024-01-15 10:00:00" }
    - { id: 3, note_id: 3, action: cross_reference, namespace_id: 100, traversal_path: "1/100/200/", created_at: "2024-01-15 11:00:00", updated_at: "2024-01-15 11:00:00", _siphon_replicated_at: "2024-01-15 11:00:00" }
    - { id: 4, note_id: 4, action: reopened, namespace_id: 100, traversal_path: "1/100/200/", created_at: "2024-01-15 12:00:00", updated_at: "2024-01-15 12:00:00", _siphon_replicated_at: "2024-01-15 12:00:00" }

run: system_notes

expect:
  edges:
    - kind: MENTIONS
      count: 3
      rows:
        - { source_id: 1000, source_kind: MergeRequest, target_id: 10, target_kind: MergeRequest }
        - { source_id: 1000, source_kind: MergeRequest, target_id: 20, target_kind: WorkItem }
        - { source_id: 1000, source_kind: MergeRequest, target_id: 30, target_kind: MergeRequest, traversal_path: "1/100/400/" }
    - kind: REOPENED
      count: 1
      rows:
        - { source_id: 2, source_kind: User, target_id: 777, target_kind: WorkItem }
  totals:
    gl_edge: 4
