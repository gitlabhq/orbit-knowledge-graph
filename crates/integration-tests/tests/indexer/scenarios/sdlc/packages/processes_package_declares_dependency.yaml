description: A dependency-link join row materializes a DECLARES_DEPENDENCY edge from Package to Dependency
scope: { namespace: 100 }

seed:
  namespaces:
    - { id: 100, traversal_path: "1/100/" }
  projects:
    - { id: 1000, namespace_id: 100, traversal_path: "1/100/1000/" }
  siphon_packages_packages:
    - { id: 8001, project_id: 1000, name: left-pad, version: "1.3.0", package_type: 2, status: 0, created_at: "2024-01-15 10:00:00", updated_at: "2024-01-15 10:00:00", traversal_path: "1/100/1000/" }
  siphon_packages_dependencies:
    - { id: 7001, project_id: 1000, name: lodash, version_pattern: "~4.17.0", traversal_path: "1/100/1000/" }
  siphon_packages_dependency_links:
    - { id: 9001, package_id: 8001, dependency_id: 7001, dependency_type: 1, project_id: 1000, traversal_path: "1/100/1000/" }

expect:
  edges:
    - { kind: DECLARES_DEPENDENCY, from: Package, to: Dependency, traversal_path: "1/100/1000/", count: 1 }
