description: A package-file build-info join row materializes a BUILT_BY edge from PackageFile to Pipeline; rows with a null pipeline_id do not
scope: { namespace: 100 }

seed:
  namespaces:
    - { id: 100, traversal_path: "1/100/" }
  projects:
    - { id: 1000, namespace_id: 100, traversal_path: "1/100/1000/" }
  siphon_packages_package_files:
    - { id: 6001, package_id: 8001, file_name: "left-pad-1.3.0.tgz", size: 2048, file_sha256: "abc123", status: 0, created_at: "2024-01-15 10:00:00", updated_at: "2024-01-15 10:00:00", project_id: 1000, traversal_path: "1/100/1000/" }
  siphon_p_ci_pipelines:
    - { id: 5001, partition_id: 1, project_id: 1000, iid: 1, sha: abc123def456, ref: main, status: success, source: 19, tag: false, duration: 120, created_at: "2024-01-15 10:00:00", traversal_path: "1/100/1000/" }
  siphon_packages_package_file_build_infos:
    - { id: 9001, package_file_id: 6001, pipeline_id: 5001, project_id: 1000, traversal_path: "1/100/1000/" }
    - { id: 9002, package_file_id: 6001, pipeline_id: null, project_id: 1000, traversal_path: "1/100/1000/" }

expect:
  edges:
    - { kind: BUILT_BY, from: PackageFile, to: Pipeline, traversal_path: "1/100/1000/", count: 1 }
