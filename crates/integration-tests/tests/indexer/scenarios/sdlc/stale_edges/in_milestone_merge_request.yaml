description: A stale IN_MILESTONE edge on a merge request is tombstoned and the current one kept

seed:
  gl_merge_request:
    - { id: 10, traversal_path: "1/9970/", milestone_id: 900, _version: "2099-01-01 00:00:00.000000", _deleted: false }
  gl_edge:
    - { traversal_path: "1/9970/", source_id: 10, source_kind: MergeRequest, relationship_kind: IN_MILESTONE, target_id: 800, target_kind: Milestone, _version: "2024-01-01 00:00:00.000000", _deleted: false }
    - { traversal_path: "1/9970/", source_id: 10, source_kind: MergeRequest, relationship_kind: IN_MILESTONE, target_id: 900, target_kind: Milestone, _version: "2024-01-01 00:00:00.000000", _deleted: false }

run: stale_edge_reconciliation

expect:
  edges:
    - kind: IN_MILESTONE
      from: MergeRequest
      to: Milestone
      count: 1
      rows:
        - { source_id: 10, target_id: 900 }
