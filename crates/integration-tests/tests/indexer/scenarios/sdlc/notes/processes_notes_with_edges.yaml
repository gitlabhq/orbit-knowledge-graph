# Raw Rails noteable_type values as Siphon replicates them (post
# Note#noteable_type= normalization): Issue and Epic collapse to WorkItem;
# Commit has no ontology node, so its HAS_NOTE edge drops while the note
# row itself still indexes.
description: Notes index with AUTHORED and HAS_NOTE edges across noteable types
scope: { namespace: 100 }

seed:
  siphon_notes:
    - { id: 1, note: MR diff note, noteable_type: MergeRequest, noteable_id: 100, author_id: 1, system: false, internal: false, st_diff: "@@ -1 +1 @@\n-old\n+new", traversal_path: "1/100/", created_at: "2024-01-15", updated_at: "2024-01-15" }
    - { id: 2, note: Issue note, noteable_type: Issue, noteable_id: 200, author_id: 2, system: false, internal: false, traversal_path: "1/100/", created_at: "2024-01-16", updated_at: "2024-01-16" }
    - { id: 3, note: Vuln comment, noteable_type: Vulnerability, noteable_id: 300, author_id: 1, system: false, internal: true, traversal_path: "1/100/", created_at: "2024-01-17", updated_at: "2024-01-17" }
    - { id: 4, note: Legacy epic note, noteable_type: Epic, noteable_id: 400, author_id: 1, system: false, internal: false, traversal_path: "1/100/", created_at: "2024-01-18", updated_at: "2024-01-18" }
    - { id: 5, note: Commit comment, noteable_type: Commit, noteable_id: 500, author_id: 1, system: false, internal: false, traversal_path: "1/100/", created_at: "2024-01-19", updated_at: "2024-01-19" }

expect:
  nodes:
    gl_note:
      rows:
        - { id: 1, st_diff: { contains: "@@" } }
        - { id: 2, st_diff: "" }
        - { id: 3, st_diff: "" }
        - { id: 4, st_diff: "" }
        - { id: 5, st_diff: "" }
  edges:
    - { kind: AUTHORED, from: User, to: Note, traversal_path: "1/100/", count: 5 }
    - kind: HAS_NOTE
      count: 4
      rows:
        - { source_kind: MergeRequest, target_id: 1 }
        - { source_kind: WorkItem, target_id: 2 }
        - { source_kind: Vulnerability, target_id: 3 }
        - { source_kind: WorkItem, target_id: 4 }
