description: Work item FK columns produce AUTHORED / IN_MILESTONE / IN_GROUP / IN_PROJECT / CLOSED edges
scope: { namespace: 100 }

seed:
  siphon_milestones:
    - { id: 10, title: v1.0, project_id: 1000, state: active, traversal_path: "1/100/" }
  namespace_traversal_paths:
    - { id: 100, traversal_path: "1/100/", version: "2024-01-20 12:00:00" }
  work_items:
    - { id: 1, iid: 1, title: Test issue, description: Test description, author_id: 1, state_id: 2, work_item_type_id: 1, confidential: false, milestone_id: 10, namespace_id: 100, project_id: 1000, closed_by_id: 2, traversal_path: "1/100/" }

expect:
  edges:
    - { kind: AUTHORED, from: User, to: WorkItem, traversal_path: "1/100/", count: 1 }
    - { kind: IN_MILESTONE, from: WorkItem, to: Milestone, traversal_path: "1/100/", count: 1 }
    - { kind: IN_GROUP, from: WorkItem, to: Group, traversal_path: "1/100/", count: 1 }
    - { kind: IN_PROJECT, from: WorkItem, to: Project, traversal_path: "1/100/", count: 1 }
    - { kind: CLOSED, from: User, to: WorkItem, traversal_path: "1/100/", count: 1 }
