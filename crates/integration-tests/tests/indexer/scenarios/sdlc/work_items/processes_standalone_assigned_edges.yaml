description: Issue assignee rows produce ASSIGNED edges with work-item target tags
scope: { namespace: 100 }

seed:
  namespaces:
    - { id: 100, traversal_path: "1/100/" }
  work_items:
    - { id: 1, iid: 1, title: Fix login bug, author_id: 1, state_id: 1, work_item_type_id: 1, confidential: false, namespace_id: 100, traversal_path: "1/100/" }
    - { id: 2, iid: 2, title: Add feature Y, author_id: 2, state_id: 1, work_item_type_id: 5, confidential: false, namespace_id: 100, traversal_path: "1/100/" }
  siphon_issue_assignees:
    - { user_id: 10, issue_id: 1, namespace_id: 100, traversal_path: "1/100/" }
    - { user_id: 20, issue_id: 1, namespace_id: 100, traversal_path: "1/100/" }
    - { user_id: 10, issue_id: 2, namespace_id: 100, traversal_path: "1/100/" }

expect:
  edges:
    - kind: ASSIGNED
      from: User
      to: WorkItem
      traversal_path: "1/100/"
      count: 3
      target_tags:
        1: ["confidential:false", "state:opened", "wi_type:issue"]
        2: ["confidential:false", "state:opened", "wi_type:task"]
