name: python

auto:
  - [class_definition, Class]

auto_imports:
  - import_statement

scopes:
  - kind: class_definition
    label: DecoratedClass
    when: { parent_is: decorated_definition }

  - kind: function_definition
    label: "udf:classify_function"

  - kind: assignment
    label: Lambda
    no_scope: true
    name: { field: left }
    when:
      field_descends:
        field: right
        wrappers: [parenthesized_expression]
        targets: [lambda]
        reject: [call]

refs:
  - kind: call_expression
    name: { field: function }

imports:
  - kind: import_from_statement
    path: { field: module_name }
    symbol: { field: name }
