[package]
name = "parser-core"
version.workspace = true
edition = "2024"
license = "MIT"

[lib]
path = "src/lib.rs"

[dependencies]
code-graph-config = { path = "../config" }
code-graph-types = { path = "../types" }
treesitter-visit = { path = "../treesitter-visit", features = ["builtin-parser"] }

# Common dependencies
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
once_cell = { workspace = true }
tracing = { workspace = true }
toml = { workspace = true }
pastey = { workspace = true }
rustc-hash = { workspace = true }
smallvec = { workspace = true }
stacker = { workspace = true }
rust-lapper = { workspace = true }
mimalloc = { workspace = true }
internment = { workspace = true, features = ["arc"] }

# Ruby parser
ruby-prism = "1.7.0"

# SWC (TypeScript/JavaScript)
swc_common = "18.0.1"
swc_ecma_parser = "32.0.0"
swc_ecma_ast = "19.0.0"
swc_ecma_visit = "19.0.0"
swc_ecma_transforms_base = "35.0.0"
swc_atoms = "9.0.0"

[dev-dependencies]
tempfile = { workspace = true }
