[package]
name = "treesitter-visit"
version.workspace = true
edition = "2024"
description = "Minimal tree-sitter wrapper for AST parsing and traversal"
license = "MIT"
authors = ["GitLab Inc."]

[dependencies]
tracing = { workspace = true }
serde = { workspace = true }
smallvec = { workspace = true }
smol_str = "0.3"
thiserror = { workspace = true }
cpu-time = { workspace = true }

# Tree-sitter
tree-sitter = "0.26.3"
tree-sitter-bash = { version = "0.25.1", optional = true }
tree-sitter-c = { version = "0.24.2", optional = true }
tree-sitter-c-sharp = { version = "0.23.0", optional = true }
tree-sitter-go = { version = "0.25.0", optional = true }
tree-sitter-java = { version = "0.23.0", optional = true }
tree-sitter-kotlin = { version = "0.4.0", package = "tree-sitter-kotlin-sg", optional = true }
tree-sitter-python = { version = "0.25.0", optional = true }
tree-sitter-ruby = { version = "0.23.0", optional = true }
tree-sitter-rust = { version = "0.24.0", optional = true }
tree-sitter-scala = { version = "0.24.0", optional = true }
tree-sitter-typescript = { version = "0.23.2", optional = true }
tree-sitter-cpp = { version = "0.23.4", optional = true }
tree-sitter-elixir = { version = "0.3.5", optional = true }
tree-sitter-php = { version = "0.24.2", optional = true }
tree-sitter-hcl = { version = "1.1.0", optional = true }
tree-sitter-swift = { version = "0.7.2", optional = true }
tree-sitter-lua = { version = "0.5.0", optional = true }

[[bin]]
name = "ast"
required-features = ["cli"]

[features]
default = []
cli = ["builtin-parser"]
builtin-parser = [
  "tree-sitter-bash",
  "tree-sitter-c",
  "tree-sitter-c-sharp",
  "tree-sitter-cpp",
  "tree-sitter-elixir",
  "tree-sitter-go",
  "tree-sitter-java",
  "tree-sitter-kotlin",
  "tree-sitter-python",
  "tree-sitter-ruby",
  "tree-sitter-rust",
  "tree-sitter-scala",
  "tree-sitter-typescript",
  "tree-sitter-php",
  "tree-sitter-hcl",
  "tree-sitter-swift",
  "tree-sitter-lua",
]
tree-sitter-hcl = ["dep:tree-sitter-hcl"]
tree-sitter-lua = ["dep:tree-sitter-lua"]
tree-sitter-scala = ["dep:tree-sitter-scala"]

[dev-dependencies]
