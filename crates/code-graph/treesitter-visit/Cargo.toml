[package]
name = "treesitter-visit"
version.workspace = true
edition = "2024"
description = "Minimal tree-sitter wrapper for AST parsing and traversal"
license = "MIT"
authors = ["GitLab Inc."]

[dependencies]
tracing = { workspace = true }
serde = { workspace = true }
smallvec = { workspace = true }
thiserror = { workspace = true }

# Tree-sitter
tree-sitter = "0.26.3"
tree-sitter-c = { version = "0.24.2", optional = true }
tree-sitter-c-sharp = { version = "0.23.0", optional = true }
tree-sitter-go = { version = "0.25.0", optional = true }
tree-sitter-java = { version = "0.23.0", optional = true }
tree-sitter-kotlin = { version = "0.4.0", package = "tree-sitter-kotlin-sg", optional = true }
tree-sitter-python = { version = "0.25.0", optional = true }
tree-sitter-ruby = { version = "0.23.0", optional = true }
tree-sitter-rust = { version = "0.24.0", optional = true }
tree-sitter-typescript = { version = "0.23.2", optional = true }

[features]
default = []
builtin-parser = [
  "tree-sitter-c",
  "tree-sitter-c-sharp",
  "tree-sitter-go",
  "tree-sitter-java",
  "tree-sitter-kotlin",
  "tree-sitter-python",
  "tree-sitter-ruby",
  "tree-sitter-rust",
  "tree-sitter-typescript",
]

[dev-dependencies]
