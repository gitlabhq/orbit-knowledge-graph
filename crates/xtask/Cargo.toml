[package]
name = "xtask"
version.workspace = true
edition = "2024"

[[bin]]
name = "xtask"
path = "src/main.rs"

[lints.rust]
# Downgraded from workspace `forbid` to `deny` so the generator's
# hot-path hex formatting can use #[allow(unsafe_code)] locally.
unsafe_code = "deny"

[lints.clippy]
all = { level = "warn", priority = -1 }

[dependencies]
clap = { workspace = true }
anyhow = { workspace = true }
arrow = { workspace = true }
chrono = { workspace = true }
const_format = { workspace = true }
serde = { workspace = true }
serde_yaml = { workspace = true }
tempfile = { workspace = true }
xshell = { workspace = true }
cliclack = { workspace = true }
bollard = { workspace = true }
futures = { workspace = true }
kube = { workspace = true }
k8s-openapi = { workspace = true }
tar = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
serde_json = { workspace = true }
base64 = { workspace = true }
rand = { workspace = true }
parquet = { workspace = true }
sqlformat = { workspace = true }
tabled = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
indicatif = { workspace = true }
rayon = { workspace = true }
gkg-server-config = { path = "../gkg-server-config" }
ontology = { path = "../ontology" }
schemars = { workspace = true }
clickhouse = { workspace = true }
clickhouse-client = { path = "../clickhouse-client" }
gkg-utils = { path = "../utils" }
query-engine = { path = "../query-engine" }
