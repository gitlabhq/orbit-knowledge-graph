[package]
name = "xtask"
version.workspace = true
edition = "2024"

[[bin]]
name = "xtask"
path = "src/main.rs"

[lints.rust]
# Downgraded from workspace `forbid` to `deny` so the generator's
# hot-path hex formatting can use #[allow(unsafe_code)] locally.
unsafe_code = "deny"

[lints.clippy]
all = { level = "warn", priority = -1 }

[build-dependencies]
serde = { workspace = true }
toml = { workspace = true }

# `toml` (build + dev dep) and the build-time `serde` are used only from
# `build_support/crate_map_drift.rs`, which is pulled in via `include!` from
# `build.rs` and `tests/`; cargo-shear does not follow `include!`, so it
# reports them as unused.
[package.metadata.cargo-shear]
ignored = ["toml", "serde"]

[dependencies]
clap = { workspace = true }
anyhow = { workspace = true }
arrow = { workspace = true }
chrono = { workspace = true }
serde = { workspace = true }
serde_yaml = { workspace = true }
futures = { workspace = true }
tokio = { workspace = true }
serde_json = { workspace = true }
rand = { workspace = true }
parquet = { workspace = true }
sqlformat = { workspace = true }
tabled = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
gkg-observability = { workspace = true }
gkg-server-config = { path = "../gkg-server-config" }
ontology = { path = "../ontology" }
schemars = { workspace = true }
clickhouse = { workspace = true }
clickhouse-client = { path = "../clickhouse-client" }
gkg-utils = { path = "../utils" }
query-engine = { path = "../query-engine" }

[dev-dependencies]
toml = { workspace = true }
