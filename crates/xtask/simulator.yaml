# Simulator configuration - 100M edge scale test
#
# Workflow:
#   1. Generate data:  cargo xtask synth generate
#   2. Load to CH:     cargo xtask synth load
#   3. Evaluate:       cargo xtask synth evaluate

clickhouse:
  url: http://localhost:8123
  database: default
  password: password

  client:
    send_timeout: 3600
    receive_timeout: 3600
    max_insert_block_size: 100000

  schema:
    engine: MergeTree
    index_granularity: 8192

    node_primary_key: [traversal_path, id]
    node_order_by: [traversal_path, id]

    edge_primary_key: [traversal_path, source_id, source_kind, target_id, target_kind]
    edge_order_by: [traversal_path, source_id, source_kind, target_id, target_kind]

    indexes:
      - name: idx_id
        table: "*"
        expression: id
        type: bloom_filter(0.01)
        granularity: 1
      - name: idx_relationship
        table: edges
        expression: relationship_kind
        type: bloom_filter
        granularity: 4

    projections:
      - name: by_target
        table: edges
        columns: [source_kind, source_id, relationship_kind, target_kind, target_id]
        order_by: [target_id, target_kind, relationship_kind]

generation:
  ontology_path: config/ontology
  output_dir: gl_synthetic_data
  skip_if_present: false
  parallel: false
  batch_size: 100000

  seed: 42
  fake_data_path: crates/xtask/fake_data.yaml

  # Single org, scaled for ~100M edges with ~10M nodes
  organizations: 1
  namespace_entity: Group

  roots:
    User: 10000                       # 10k users
    Group: 20                         # 20 top-level groups

  # Node estimates (~10M nodes):
  # - 300 groups × 10 projects = 3k projects
  # - 3k × 100 MRs = 300k MRs
  # - 300k × 2 diffs = 600k diffs
  # - 600k × 4 files = 2.4M files
  # - 3k × 100 pipelines = 300k pipelines  
  # - 300k × 3 stages = 900k stages
  # - 900k × 4 jobs = 3.6M jobs
  #
  # Edge estimates (~100M edges):
  # - Relationship edges: ~10M (from hierarchy)
  # - Association edges:  ~90M (high fanout associations)

  relationships:
    CONTAINS:
      "Group -> Group":               # Self-referential: 3 levels x 2 per parent = 300 total groups
        count: 2
        max_depth: 3
      "Group -> Project": 10          # 10 projects per group = 3k projects

    IN_PROJECT:
      "MergeRequest -> Project": 100  # 100 MRs per project = 300k MRs
      "WorkItem -> Project": 100      # 100 work items = 300k
      "Pipeline -> Project": 100      # 100 pipelines = 300k
      "Vulnerability -> Project": 5
      "Finding -> Project": 10
      "Milestone -> Project": 3
      "Label -> Project": 5

    HAS_STAGE:
      "Pipeline -> Stage": 3          # 900k stages

    HAS_JOB:
      "Stage -> Job": 4               # 3.6M jobs

    HAS_DIFF:
      "MergeRequest -> MergeRequestDiff": 2  # 600k diffs

    HAS_FILE:
      "MergeRequestDiff -> MergeRequestDiffFile": 4  # 2.4M files

    HAS_NOTE:
      "MergeRequest -> Note": 2
      "WorkItem -> Note": 1

    HAS_FINDING:
      "Vulnerability -> Finding": 2

    HAS_IDENTIFIER:
      "Finding -> VulnerabilityIdentifier": 1

  # High-volume associations to reach ~90M edges
  # Using high counts per target to create dense connectivity
  associations:
    AUTHORED:
      # 300k MRs × 100 = 30M edges
      "User -> MergeRequest": 100
      # 300k WorkItems × 100 = 30M edges
      "User -> WorkItem": 100
      # ~1.5M Notes × 10 = 15M edges
      "User -> Note": 10

    MEMBER_OF:
      # 300 groups × 100 = 30k edges (small)
      "User -> Group": 100

    ASSIGNED:
      # 300k MRs × 50 = 15M edges
      "User -> MergeRequest": 50
      # 300k WorkItems × 10 = 3M edges
      "User -> WorkItem": 10

    REVIEWER:
      "MergeRequest -> User":
        ratio: 3
        per: source

    TRIGGERED:
      "User -> Pipeline": 1
      "MergeRequest -> Pipeline": 0.5

    CREATOR:
      "User -> Project": 1
    OWNER:
      "User -> Group": 1

    MERGED_BY:
      "MergeRequest -> User":
        ratio: 1
        per: source

    CLOSES:
      "MergeRequest -> WorkItem": 0.5

    FIXES:
      "MergeRequest -> Vulnerability": 0.1

    IN_MILESTONE:
      "WorkItem -> Milestone": 0.5

    HAS_LABEL:
      "WorkItem -> Label": 0.5

evaluation:
  queries_path: fixtures/queries/sdlc_queries.yaml
  metadata_dir: ./evaluation_results
  sample_size: 100
  iterations: 1
  skip_cache_warm: false
  output:
    format: text
