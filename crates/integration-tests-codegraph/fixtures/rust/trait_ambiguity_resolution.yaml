name: "Rust: trait ambiguity resolution"
fixtures:
  - path: Cargo.toml
    content: |
      [package]
      name = "rust_trait_ambiguity_fixture"
      version = "0.1.0"
      edition = "2021"

  - path: src/lib.rs
    content: |
      pub mod cross_api;
      pub mod cross_service;
      pub mod cross_traits;

      pub trait Primary {
          fn run(&self);
      }

      pub trait Secondary {
          fn run(&self);
      }

      pub trait Base {
          fn ping(&self) {}
      }

      pub trait Derived: Base {}

      pub struct Service;

      impl Primary for Service {
          fn run(&self) {}
      }

      impl Base for Service {}
      impl Derived for Service {}

      pub fn call_run(service: Service) {
          service.run();
      }

      pub fn call_ping(service: Service) {
          service.ping();
      }

  - path: src/cross_traits.rs
    content: |
      pub trait CrossPrimary {
          fn run(&self);
      }

      pub trait CrossSecondary {
          fn run(&self);
      }

      pub trait CrossBase {
          fn ping(&self) {}
      }

      pub trait CrossDerived: CrossBase {}

  - path: src/cross_service.rs
    content: |
      use crate::cross_traits::{CrossBase, CrossDerived, CrossPrimary};

      pub struct CrossService;

      impl CrossPrimary for CrossService {
          fn run(&self) {}
      }

      impl CrossBase for CrossService {}
      impl CrossDerived for CrossService {}

  - path: src/cross_api.rs
    content: |
      use crate::cross_service::CrossService;
      use crate::cross_traits::{CrossBase, CrossPrimary, CrossSecondary};

      pub fn cross_call_run(service: CrossService) {
          service.run();
      }

      pub fn cross_call_ping(service: CrossService) {
          service.ping();
      }

tests:
  - name: "method fallback does not jump to an unrelated visible trait item"
    query: |
      MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.name = 'call_run' AND callee.name = 'run'
      RETURN callee.fqn AS fqn
    assert:
      - { row_count: 1 }
      - { row: { fqn: 'Service::run' } }

  - name: "supertrait default methods resolve to the defining trait item"
    query: |
      MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.name = 'call_ping' AND callee.name = 'ping'
      RETURN callee.fqn AS fqn, callee.definition_type AS type
    assert:
      - { row_count: 1 }
      - { row: { fqn: 'Base::ping', type: 'Method' } }

  - name: "cross-file method fallback keeps the concrete impl target"
    query: |
      MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.name = 'cross_call_run' AND callee.name = 'run'
      RETURN caller.file_path AS src, callee.file_path AS tgt, callee.definition_type AS type
    assert:
      - { row_count: 1 }
      - { row: { src: "src/cross_api.rs", tgt: "src/cross_service.rs", type: "Method" } }

  - name: "cross-file supertrait default methods still resolve to the defining trait item"
    query: |
      MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.name = 'cross_call_ping' AND callee.name = 'ping'
      RETURN caller.file_path AS src, callee.file_path AS tgt, callee.definition_type AS type
    assert:
      - { row_count: 1 }
      - { row: { src: "src/cross_api.rs", tgt: "src/cross_traits.rs", type: "Method" } }
