name: "Ruby Prism: custom pipeline e2e"
pipeline: ruby_prism
fixtures:
  - path: app/models/user.rb
    content: |
      class User
        def initialize(name)
          @name = name
        end

        def greet
          "Hello, #{@name}"
        end
      end

  - path: lib/services/auth_service.rb
    content: |
      module Services
        class AuthService
          def authenticate(token)
            true
          end
        end
      end

tests:
  - name: User class exists
    query: |
      MATCH (d:Definition)
      WHERE d.name = 'User'
      RETURN d.fqn AS fqn, d.definition_type AS type
    assert:
      - { row_count: 1 }
      - { row: { fqn: "User", type: "Class" } }

  - name: User methods extracted
    query: |
      MATCH (d:Definition)
      WHERE d.fqn STARTS WITH 'User::'
      RETURN d.name AS name, d.definition_type AS type
    assert:
      - { row_count: 2 }
      - { row: { name: "initialize", type: "Method" } }
      - { row: { name: "greet", type: "Method" } }

  - name: Nested module FQN
    query: |
      MATCH (d:Definition)
      WHERE d.name = 'AuthService'
      RETURN d.fqn AS fqn
    assert:
      - { row: { fqn: "Services::AuthService" } }

  - name: Deeply nested method FQN
    query: |
      MATCH (d:Definition)
      WHERE d.name = 'authenticate'
      RETURN d.fqn AS fqn
    assert:
      - { row: { fqn: "Services::AuthService::authenticate" } }

  - name: All definitions count
    query: |
      MATCH (d:Definition)
      RETURN count(d) AS total
    assert:
      - { count_equals: { field: "total", value: 6 } }

  - name: Files extracted
    query: |
      MATCH (f:File)
      RETURN f.path AS path
    assert:
      - { row_count: 2 }
