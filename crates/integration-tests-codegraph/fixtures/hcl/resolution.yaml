name: "HCL resolution — resources, data sources, variables, modules, locals, refs"

fixtures:
  - path: variables.tf
    content: |
      variable "region" {
        type    = string
        default = "us-east-1"
      }

      variable "instance_type" {
        type    = string
        default = "t3.micro"
      }

      variable "environment" {
        type    = string
        default = "staging"
      }

  - path: locals.tf
    content: |
      locals {
        common_tags = {
          Environment = var.environment
          ManagedBy   = "terraform"
        }
        instance_name = "app-${var.environment}"
      }

  - path: network.tf
    content: |
      resource "aws_vpc" "main" {
        cidr_block = "10.0.0.0/16"
        tags       = local.common_tags
      }

      resource "aws_subnet" "public" {
        vpc_id     = aws_vpc.main.id
        cidr_block = "10.0.1.0/24"
      }

  - path: main.tf
    content: |
      data "aws_ami" "ubuntu" {
        most_recent = true
        owners      = ["099720109477"]
      }

      resource "aws_instance" "web" {
        ami           = data.aws_ami.ubuntu.id
        instance_type = var.instance_type
        subnet_id     = aws_subnet.public.id
        tags          = local.common_tags
      }

      output "instance_id" {
        value = aws_instance.web.id
      }

  - path: modules.tf
    content: |
      module "security_group" {
        source = "terraform-aws-modules/security-group/aws"
        vpc_id = aws_vpc.main.id
      }

tests:
  # ══════════════════════════════════════════════════════════════
  # DEFINITIONS
  # ══════════════════════════════════════════════════════════════

  - name: "Variable definitions are extracted"
    query: |
      MATCH (d:Definition)
      WHERE d.definition_type = 'Variable'
      RETURN d.name AS name, d.fqn AS fqn
    assert:
      - { row_count: 3 }
      - { row: { name: "region" } }
      - { row: { name: "instance_type" } }
      - { row: { name: "environment" } }

  - name: "Resource type scopes produce definitions"
    query: |
      MATCH (d:Definition)
      WHERE d.definition_type = 'Resource'
        AND d.kind = 'Class'
      RETURN d.name AS name, d.fqn AS fqn
    assert:
      - { row: { name: "aws_vpc" } }
      - { row: { name: "aws_subnet" } }
      - { row: { name: "aws_instance" } }
      - { row: { name: "aws_ami" } }

  - name: "Resource named defs have correct FQNs"
    query: |
      MATCH (d:Definition)
      WHERE d.definition_type = 'Resource'
        AND d.kind <> 'Class'
      RETURN d.name AS name, d.fqn AS fqn
    assert:
      - { row: { name: "main", fqn: "aws_vpc.main" } }
      - { row: { name: "public", fqn: "aws_subnet.public" } }
      - { row: { name: "web", fqn: "aws_instance.web" } }
      - { row: { name: "ubuntu", fqn: "aws_ami.ubuntu" } }

  - name: "Output definition is extracted"
    query: |
      MATCH (d:Definition)
      WHERE d.definition_type = 'Output'
      RETURN d.name AS name
    assert:
      - { row_count: 1 }
      - { row: { name: "instance_id" } }

  - name: "Module definition is extracted"
    query: |
      MATCH (d:Definition)
      WHERE d.definition_type = 'Module'
      RETURN d.name AS name
    assert:
      - { row_count: 1 }
      - { row: { name: "security_group" } }

  - name: "Local attribute definitions are extracted"
    query: |
      MATCH (d:Definition)
      WHERE d.definition_type = 'Local'
      RETURN d.name AS name
    assert:
      - { row_count: 2 }
      - { row: { name: "common_tags" } }
      - { row: { name: "instance_name" } }

  # ══════════════════════════════════════════════════════════════
  # CROSS-FILE REFERENCES
  # ══════════════════════════════════════════════════════════════

  - name: "Resource ref resolves cross-file: aws_instance.web -> aws_subnet.public"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'aws_instance.web'
        AND callee.fqn = 'aws_subnet.public'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

  - name: "Variable ref resolves cross-file: aws_instance.web -> instance_type"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'aws_instance.web'
        AND callee.name = 'instance_type'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller, callee.name AS callee
    assert:
      - { row_count: 1 }

  - name: "Data source ref resolves: aws_instance.web -> aws_ami.ubuntu"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'aws_instance.web'
        AND callee.fqn = 'aws_ami.ubuntu'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

  - name: "Local ref resolves cross-file: aws_vpc.main -> locals.common_tags"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'aws_vpc.main'
        AND callee.name = 'common_tags'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller, callee.name AS callee
    assert:
      - { row_count: 1 }

  - name: "Module ref resolves: security_group -> aws_vpc.main"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.name = 'security_group'
        AND callee.fqn = 'aws_vpc.main'
        AND e.edge_kind = 'Calls'
      RETURN caller.name AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

  # ══════════════════════════════════════════════════════════════
  # FILES
  # ══════════════════════════════════════════════════════════════

  - name: "All .tf files discovered"
    query: |
      MATCH (f:File)
      RETURN f.path AS path
    assert:
      - { row_count: 5 }
      - { unique: path }
      - { row: { path: variables.tf } }
      - { row: { path: locals.tf } }
      - { row: { path: network.tf } }
      - { row: { path: main.tf } }
      - { row: { path: modules.tf } }
