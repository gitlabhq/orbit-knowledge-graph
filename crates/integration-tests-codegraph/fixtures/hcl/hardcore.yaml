name: "HCL hardcore — realistic AWS module patterns (VPC, EKS, IAM, RDS)"

# Simulates patterns from the most-downloaded Terraform modules:
# terraform-aws-modules/vpc, /eks, /iam, /rds, /lambda

fixtures:
  - path: main.tf
    content: |
      terraform {
        required_version = ">= 1.5"
        required_providers {
          aws = {
            source  = "hashicorp/aws"
            version = "~> 5.0"
          }
        }
        backend "s3" {
          bucket = "my-tf-state"
          key    = "prod/terraform.tfstate"
          region = "us-east-1"
        }
      }

      provider "aws" {
        region = var.region
        default_tags {
          tags = local.common_tags
        }
      }

      variable "region" {
        type    = string
        default = "us-east-1"
      }

      variable "environment" {
        type = string
        validation {
          condition     = contains(["dev", "staging", "prod"], var.environment)
          error_message = "Must be dev, staging, or prod."
        }
      }

      variable "cluster_name" {
        type    = string
        default = "main"
      }

      variable "vpc_cidr" {
        type    = string
        default = "10.0.0.0/16"
      }

      variable "private_subnet_cidrs" {
        type    = list(string)
        default = ["10.0.1.0/24", "10.0.2.0/24", "10.0.3.0/24"]
      }

      variable "public_subnet_cidrs" {
        type    = list(string)
        default = ["10.0.101.0/24", "10.0.102.0/24", "10.0.103.0/24"]
      }

      variable "azs" {
        type    = list(string)
        default = ["us-east-1a", "us-east-1b", "us-east-1c"]
      }

      variable "node_instance_types" {
        type    = list(string)
        default = ["m5.large", "m5.xlarge"]
      }

      variable "node_min_size" {
        type    = number
        default = 1
      }

      variable "node_max_size" {
        type    = number
        default = 10
      }

      variable "node_desired_size" {
        type    = number
        default = 3
      }

      variable "db_password" {
        type      = string
        sensitive = true
      }

      variable "db_engine_version" {
        type    = string
        default = "15.4"
      }

      variable "enable_nat_gateway" {
        type    = bool
        default = true
      }

      variable "single_nat_gateway" {
        type    = bool
        default = false
      }

      variable "tags" {
        type    = map(string)
        default = {}
      }

      locals {
        common_tags = merge(var.tags, {
          Environment = var.environment
          ManagedBy   = "terraform"
          Cluster     = var.cluster_name
        })
        cluster_name    = "${var.cluster_name}-${var.environment}"
        private_subnets = [for i, cidr in var.private_subnet_cidrs : cidr]
        az_count        = length(var.azs)
        is_prod         = var.environment == "prod"
      }

      # ─── VPC (terraform-aws-modules/vpc pattern) ───

      resource "aws_vpc" "main" {
        cidr_block           = var.vpc_cidr
        enable_dns_hostnames = true
        enable_dns_support   = true
        tags = merge(local.common_tags, {
          Name = "${local.cluster_name}-vpc"
        })
      }

      resource "aws_subnet" "private" {
        count             = local.az_count
        vpc_id            = aws_vpc.main.id
        cidr_block        = var.private_subnet_cidrs[count.index]
        availability_zone = var.azs[count.index]
        tags = merge(local.common_tags, {
          Name                              = "${local.cluster_name}-private-${var.azs[count.index]}"
          "kubernetes.io/role/internal-elb"  = "1"
        })
      }

      resource "aws_subnet" "public" {
        count                   = local.az_count
        vpc_id                  = aws_vpc.main.id
        cidr_block              = var.public_subnet_cidrs[count.index]
        availability_zone       = var.azs[count.index]
        map_public_ip_on_launch = true
        tags = merge(local.common_tags, {
          Name                     = "${local.cluster_name}-public-${var.azs[count.index]}"
          "kubernetes.io/role/elb" = "1"
        })
      }

      resource "aws_internet_gateway" "main" {
        vpc_id = aws_vpc.main.id
        tags   = local.common_tags
      }

      resource "aws_eip" "nat" {
        count  = var.single_nat_gateway ? 1 : local.az_count
        domain = "vpc"
        tags = merge(local.common_tags, {
          Name = "${local.cluster_name}-nat-${count.index}"
        })
      }

      resource "aws_nat_gateway" "main" {
        count         = var.enable_nat_gateway ? (var.single_nat_gateway ? 1 : local.az_count) : 0
        allocation_id = aws_eip.nat[count.index].id
        subnet_id     = aws_subnet.public[count.index].id
        tags = merge(local.common_tags, {
          Name = "${local.cluster_name}-nat-${count.index}"
        })
      }

      resource "aws_route_table" "private" {
        count  = local.az_count
        vpc_id = aws_vpc.main.id
        tags = merge(local.common_tags, {
          Name = "${local.cluster_name}-private-${count.index}"
        })
      }

      resource "aws_route" "private_nat" {
        count                  = var.enable_nat_gateway ? local.az_count : 0
        route_table_id         = aws_route_table.private[count.index].id
        destination_cidr_block = "0.0.0.0/0"
        nat_gateway_id         = aws_nat_gateway.main[var.single_nat_gateway ? 0 : count.index].id
      }

      # ─── IAM (terraform-aws-modules/iam pattern) ───

      data "aws_iam_policy_document" "eks_assume_role" {
        statement {
          actions = ["sts:AssumeRole"]
          principals {
            type        = "Service"
            identifiers = ["eks.amazonaws.com"]
          }
        }
      }

      resource "aws_iam_role" "eks_cluster" {
        name               = "${local.cluster_name}-eks-role"
        assume_role_policy = data.aws_iam_policy_document.eks_assume_role.json
        tags               = local.common_tags
      }

      resource "aws_iam_role_policy_attachment" "eks_cluster_policy" {
        role       = aws_iam_role.eks_cluster.name
        policy_arn = "arn:aws:iam::aws:policy/AmazonEKSClusterPolicy"
      }

      data "aws_iam_policy_document" "node_assume_role" {
        statement {
          actions = ["sts:AssumeRole"]
          principals {
            type        = "Service"
            identifiers = ["ec2.amazonaws.com"]
          }
        }
      }

      resource "aws_iam_role" "node_group" {
        name               = "${local.cluster_name}-node-role"
        assume_role_policy = data.aws_iam_policy_document.node_assume_role.json
        tags               = local.common_tags
      }

      # ─── EKS (terraform-aws-modules/eks pattern) ───

      resource "aws_eks_cluster" "main" {
        name     = local.cluster_name
        role_arn = aws_iam_role.eks_cluster.arn
        version  = "1.29"

        vpc_config {
          subnet_ids              = concat(aws_subnet.private[*].id, aws_subnet.public[*].id)
          endpoint_private_access = true
          endpoint_public_access  = local.is_prod ? false : true
          security_group_ids      = [aws_security_group.eks_cluster.id]
        }

        tags = local.common_tags
      }

      resource "aws_eks_node_group" "main" {
        cluster_name    = aws_eks_cluster.main.name
        node_group_name = "${local.cluster_name}-nodes"
        node_role_arn   = aws_iam_role.node_group.arn
        subnet_ids      = aws_subnet.private[*].id
        instance_types  = var.node_instance_types

        scaling_config {
          min_size     = var.node_min_size
          max_size     = var.node_max_size
          desired_size = var.node_desired_size
        }

        tags = local.common_tags
      }

      resource "aws_security_group" "eks_cluster" {
        name   = "${local.cluster_name}-eks-sg"
        vpc_id = aws_vpc.main.id
        tags   = local.common_tags

        dynamic "ingress" {
          for_each = [443, 10250]
          content {
            from_port   = ingress.value
            to_port     = ingress.value
            protocol    = "tcp"
            cidr_blocks = [var.vpc_cidr]
          }
        }

        egress {
          from_port   = 0
          to_port     = 0
          protocol    = "-1"
          cidr_blocks = ["0.0.0.0/0"]
        }
      }

      # ─── RDS (terraform-aws-modules/rds pattern) ───

      resource "aws_db_subnet_group" "main" {
        name       = "${local.cluster_name}-db-subnets"
        subnet_ids = aws_subnet.private[*].id
        tags       = local.common_tags
      }

      resource "aws_security_group" "rds" {
        name   = "${local.cluster_name}-rds-sg"
        vpc_id = aws_vpc.main.id
        tags   = local.common_tags

        ingress {
          from_port       = 5432
          to_port         = 5432
          protocol        = "tcp"
          security_groups = [aws_security_group.eks_cluster.id]
        }
      }

      resource "aws_db_instance" "postgres" {
        identifier             = "${local.cluster_name}-postgres"
        engine                 = "postgres"
        engine_version         = var.db_engine_version
        instance_class         = local.is_prod ? "db.r6g.xlarge" : "db.t3.micro"
        allocated_storage      = local.is_prod ? 100 : 20
        db_subnet_group_name   = aws_db_subnet_group.main.name
        vpc_security_group_ids = [aws_security_group.rds.id]
        password               = var.db_password
        skip_final_snapshot    = !local.is_prod
        multi_az               = local.is_prod
        tags                   = local.common_tags
      }

      # ─── Outputs ───

      output "vpc_id" {
        value = aws_vpc.main.id
      }

      output "cluster_endpoint" {
        value = aws_eks_cluster.main.endpoint
      }

      output "cluster_name" {
        value = aws_eks_cluster.main.name
      }

      output "db_endpoint" {
        value = aws_db_instance.postgres.endpoint
      }

      output "private_subnet_ids" {
        value = aws_subnet.private[*].id
      }

      output "nat_gateway_ips" {
        value = aws_eip.nat[*].public_ip
      }

tests:
  # ══════════════════════════════════════════════════════════════
  # DEFINITION EXTRACTION — verify all block types parsed
  # ══════════════════════════════════════════════════════════════

  - name: "All variable definitions extracted (16 total)"
    query: |
      MATCH (d:Definition)
      WHERE d.definition_type = 'Variable'
      RETURN d.name AS name
    assert:
      - { row_count: 16 }
      - { unique: name }
      - { row: { name: "region" } }
      - { row: { name: "environment" } }
      - { row: { name: "cluster_name" } }
      - { row: { name: "vpc_cidr" } }
      - { row: { name: "private_subnet_cidrs" } }
      - { row: { name: "public_subnet_cidrs" } }
      - { row: { name: "azs" } }
      - { row: { name: "node_instance_types" } }
      - { row: { name: "node_min_size" } }
      - { row: { name: "node_max_size" } }
      - { row: { name: "node_desired_size" } }
      - { row: { name: "db_password" } }
      - { row: { name: "db_engine_version" } }
      - { row: { name: "enable_nat_gateway" } }
      - { row: { name: "single_nat_gateway" } }
      - { row: { name: "tags" } }

  - name: "Resource type scopes extracted"
    query: |
      MATCH (d:Definition)
      WHERE d.definition_type = 'Resource'
        AND d.fqn = d.name
      RETURN d.name AS name
    assert:
      - { row: { name: "aws_vpc" } }
      - { row: { name: "aws_subnet" } }
      - { row: { name: "aws_internet_gateway" } }
      - { row: { name: "aws_eip" } }
      - { row: { name: "aws_nat_gateway" } }
      - { row: { name: "aws_route_table" } }
      - { row: { name: "aws_route" } }
      - { row: { name: "aws_iam_role" } }
      - { row: { name: "aws_iam_role_policy_attachment" } }
      - { row: { name: "aws_eks_cluster" } }
      - { row: { name: "aws_eks_node_group" } }
      - { row: { name: "aws_security_group" } }
      - { row: { name: "aws_db_subnet_group" } }
      - { row: { name: "aws_db_instance" } }

  - name: "Named resource defs have type.name FQNs"
    query: |
      MATCH (d:Definition)
      WHERE d.definition_type = 'Resource'
        AND d.fqn <> d.name
      RETURN d.fqn AS fqn
    assert:
      - { row: { fqn: "aws_vpc.main" } }
      - { row: { fqn: "aws_subnet.private" } }
      - { row: { fqn: "aws_subnet.public" } }
      - { row: { fqn: "aws_eks_cluster.main" } }
      - { row: { fqn: "aws_eks_node_group.main" } }
      - { row: { fqn: "aws_security_group.eks_cluster" } }
      - { row: { fqn: "aws_security_group.rds" } }
      - { row: { fqn: "aws_db_instance.postgres" } }
      - { row: { fqn: "aws_iam_role.eks_cluster" } }
      - { row: { fqn: "aws_iam_role.node_group" } }
      - { no_nulls: fqn }

  - name: "Data source definitions with correct type"
    query: |
      MATCH (d:Definition)
      WHERE d.definition_type = 'DataSource'
      RETURN d.name AS name, d.fqn AS fqn
    assert:
      - { row: { name: "aws_iam_policy_document" } }
      - { row: { name: "eks_assume_role", fqn: "aws_iam_policy_document.eks_assume_role" } }
      - { row: { name: "node_assume_role", fqn: "aws_iam_policy_document.node_assume_role" } }

  - name: "Local definitions extracted"
    query: |
      MATCH (d:Definition)
      WHERE d.definition_type = 'Local'
      RETURN d.name AS name
    assert:
      - { row: { name: "common_tags" } }
      - { row: { name: "cluster_name" } }
      - { row: { name: "private_subnets" } }
      - { row: { name: "az_count" } }
      - { row: { name: "is_prod" } }

  - name: "Output definitions extracted"
    query: |
      MATCH (d:Definition)
      WHERE d.definition_type = 'Output'
      RETURN d.name AS name
    assert:
      - { row_count: 6 }
      - { row: { name: "vpc_id" } }
      - { row: { name: "cluster_endpoint" } }
      - { row: { name: "cluster_name" } }
      - { row: { name: "db_endpoint" } }
      - { row: { name: "private_subnet_ids" } }
      - { row: { name: "nat_gateway_ips" } }

  - name: "Dynamic block iterator def"
    query: |
      MATCH (d:Definition)
      WHERE d.definition_type = 'Dynamic'
      RETURN d.name AS name
    assert:
      - { row_count: 1 }
      - { row: { name: "ingress" } }

  - name: "Terraform block extracted"
    query: |
      MATCH (d:Definition)
      WHERE d.definition_type = 'Terraform'
      RETURN d.name AS name
    assert:
      - { row_count: 1 }

  # ══════════════════════════════════════════════════════════════
  # CALL RESOLUTION — verify ref edges
  # ══════════════════════════════════════════════════════════════

  - name: "VPC refs resolve: subnet type scope -> aws_vpc.main"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'aws_subnet'
        AND callee.fqn = 'aws_vpc.main'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { empty: false }

  - name: "EKS cluster refs resolve to IAM role"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'aws_eks_cluster'
        AND callee.fqn = 'aws_iam_role.eks_cluster'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

  - name: "EKS node group refs resolve to cluster and IAM role"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'aws_eks_node_group'
        AND e.edge_kind = 'Calls'
      RETURN callee.fqn AS callee
    assert:
      - { row: { callee: "aws_eks_cluster.main" } }
      - { row: { callee: "aws_iam_role.node_group" } }

  - name: "IAM role refs resolve to data source"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'aws_iam_role'
        AND callee.definition_type = 'DataSource'
        AND e.edge_kind = 'Calls'
      RETURN callee.fqn AS callee
    assert:
      - { row: { callee: "aws_iam_policy_document.eks_assume_role" } }
      - { row: { callee: "aws_iam_policy_document.node_assume_role" } }

  - name: "RDS refs resolve: db_instance -> subnet_group, security_group, password"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'aws_db_instance'
        AND e.edge_kind = 'Calls'
      RETURN callee.fqn AS callee
    assert:
      - { row: { callee: "aws_db_subnet_group.main" } }
      - { row: { callee: "aws_security_group.rds" } }
      - { row: { callee: "var.db_password" } }

  - name: "RDS security group refs EKS security group"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'aws_security_group'
        AND callee.fqn = 'aws_security_group.eks_cluster'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

  - name: "Locals resolve variable refs"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'locals'
        AND callee.definition_type = 'Variable'
        AND e.edge_kind = 'Calls'
      RETURN callee.name AS callee
    assert:
      - { row: { callee: "tags" } }
      - { row: { callee: "environment" } }

  - name: "NAT gateway refs resolve to EIP and public subnet"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'aws_nat_gateway'
        AND e.edge_kind = 'Calls'
      RETURN callee.fqn AS callee
    assert:
      - { row: { callee: "aws_eip.nat" } }
      - { row: { callee: "aws_subnet.public" } }

  - name: "Total Calls edges exist (no resolution lost)"
    query: |
      MATCH (s:Definition)-[e:DefinitionToDefinition]->(t:Definition)
      WHERE e.edge_kind = 'Calls'
      RETURN count(*) AS total
    assert:
      - { count_gte: { field: total, value: 20 } }
