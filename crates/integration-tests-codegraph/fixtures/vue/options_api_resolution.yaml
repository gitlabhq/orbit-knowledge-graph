name: "Vue Options API resolution"
pipeline: js
fixtures:
  - path: config/webpack.config.js
    content: |
      const path = require('path');

      module.exports = {
        resolve: {
          alias: {
            '~': path.join(__dirname, '../app/assets/javascripts'),
          },
        },
      };

  - path: app/assets/javascripts/lib/logger.js
    content: |
      export function logError(message) {
        return message;
      }

  - path: app/assets/javascripts/tracking/index.js
    content: |
      export function trackEvent(name) {
        return name;
      }

  - path: app/assets/javascripts/graphql/get_items.query.graphql
    content: |
      query getItems {
        project(fullPath: "gitlab-org/gitlab") {
          id
        }
      }

  - path: app/assets/javascripts/components/child_badge.vue
    content: |
      <script>
      export class Helper {
        open() {
          return 'helper';
        }
      }

      export default {
        name: 'ChildBadge',
        methods: {
          open() {
            return 'opened';
          },
        },
      };
      </script>

  - path: app/assets/javascripts/components/component_host.ts
    content: |
      import ChildBadge from './child_badge.vue';

      export function mountBadge() {
        return new ChildBadge();
      }

  - path: app/assets/javascripts/components/parent_panel.vue
    content: |
      <script>
      import { logError } from '~/lib/logger';
      import * as Tracking from '~/tracking';
      import * as ExternalTracking from '@external/tracking';
      import getItemsQuery from '../graphql/get_items.query.graphql';
      import ChildBadge from './child_badge.vue';

      export default {
        name: 'ParentPanel',
        components: { ChildBadge },
        apollo: {
          items: {
            query: getItemsQuery,
          },
        },
        mounted() {
          return this.load();
        },
        methods: {
          load() {
            return this.normalize();
          },
          relayNormalize() {
            const self = this;
            return self.normalize();
          },
          normalize() {
            return logError('normalize');
          },
          emitTrack() {
            return Tracking.trackEvent('panel_loaded');
          },
          emitExternal() {
            return ExternalTracking.emit('panel_loaded');
          },
        },
      };
      </script>

tests:
  - name: Vue child component default import targets primary export proxy
    query: |
      MATCH (i:ImportedSymbol)-[:ImportedSymbolToDefinition]->(d:Definition)
      WHERE i.file_path = 'app/assets/javascripts/components/parent_panel.vue'
        AND i.path = './child_badge.vue'
      RETURN i.import_type AS import_type, d.fqn AS target
    assert:
      - { row_count: 1 }
      - { row: { import_type: "DefaultImport", target: "app/assets/javascripts/components/child_badge.vue::default" } }

  - name: Vue default import resolves to virtual component when SFC also exports classes
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
        AND caller.file_path = 'app/assets/javascripts/components/component_host.ts'
      RETURN caller.fqn AS caller, callee.file_path AS callee_file, callee.fqn AS callee
    assert:
      - { row_count: 1 }
      - { row: { caller: "mountBadge", callee_file: "app/assets/javascripts/components/child_badge.vue", callee: "ChildBadge" } }
      - { not: true, row: { callee: "Helper" } }

  - name: Vue GraphQL default import targets primary export proxy
    query: |
      MATCH (i:ImportedSymbol)-[:ImportedSymbolToDefinition]->(d:Definition)
      WHERE i.file_path = 'app/assets/javascripts/components/parent_panel.vue'
        AND i.path = '../graphql/get_items.query.graphql'
      RETURN i.import_type AS import_type, d.fqn AS target
    assert:
      - { row_count: 1 }
      - { row: { import_type: "DefaultImport", target: "app/assets/javascripts/graphql/get_items.query.graphql::default" } }

  - name: Vue mounted hook resolves this-method call to local method
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
        AND caller.file_path = 'app/assets/javascripts/components/parent_panel.vue'
        AND callee.file_path = 'app/assets/javascripts/components/parent_panel.vue'
        AND caller.name = 'mounted'
      RETURN caller.name AS caller, callee.name AS callee
    assert:
      - { row_count: 1 }
      - { row: { caller: "mounted", callee: "load" } }

  - name: Vue local this-method chain resolves load to normalize
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
        AND caller.file_path = 'app/assets/javascripts/components/parent_panel.vue'
        AND callee.file_path = 'app/assets/javascripts/components/parent_panel.vue'
        AND caller.name = 'load'
      RETURN caller.name AS caller, callee.name AS callee
    assert:
      - { row_count: 1 }
      - { row: { caller: "load", callee: "normalize" } }

  - name: Vue this-alias preserves local method resolution
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
        AND caller.file_path = 'app/assets/javascripts/components/parent_panel.vue'
        AND caller.name = 'relayNormalize'
        AND callee.file_path = 'app/assets/javascripts/components/parent_panel.vue'
      RETURN caller.name AS caller, callee.name AS callee
    assert:
      - { row_count: 1 }
      - { row: { caller: "relayNormalize", callee: "normalize" } }

  - name: Vue imported helper call resolves from method to helper definition
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
        AND caller.file_path = 'app/assets/javascripts/components/parent_panel.vue'
        AND callee.file_path = 'app/assets/javascripts/lib/logger.js'
      RETURN caller.name AS caller, callee.name AS callee
    assert:
      - { row_count: 1 }
      - { row: { caller: "normalize", callee: "logError" } }

  - name: Vue namespace import member call resolves to concrete definition
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
        AND caller.file_path = 'app/assets/javascripts/components/parent_panel.vue'
        AND callee.file_path = 'app/assets/javascripts/tracking/index.js'
      RETURN caller.name AS caller, callee.name AS callee
    assert:
      - { row_count: 1 }
      - { row: { caller: "emitTrack", callee: "trackEvent" } }

  - name: Vue unresolved external namespace calls target imported symbols
    query: |
      MATCH (caller:Definition)-[e:DefinitionToImportedSymbol]->(sym:ImportedSymbol)
      WHERE caller.file_path = 'app/assets/javascripts/components/parent_panel.vue'
        AND e.edge_kind = 'Calls'
        AND sym.path = '@external/tracking'
      RETURN caller.name AS caller, sym.import_type AS import_type, sym.alias AS alias
    assert:
      - { row_count: 1 }
      - { row: { caller: "emitExternal", import_type: "NamespaceImport", alias: "ExternalTracking" } }
