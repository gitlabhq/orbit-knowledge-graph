name: "C++20: concept declarations"
fixtures:
  - path: concepts.cpp
    content: |
      #include <concepts>

      template<typename T>
      concept Numeric = std::is_arithmetic_v<T>;

      template<typename T>
      concept Printable = requires(T t) {
          { std::cout << t };
      };

      template<Numeric T>
      T add(T a, T b) {
          return a + b;
      }

tests:
  - name: "Concept Numeric extracted as definition"
    query: |
      MATCH (d:Definition)
      WHERE d.name = 'Numeric'
      RETURN d.name AS name, d.definition_type AS type
    assert:
      - { row: { name: "Numeric", type: "Concept" } }

  - name: "Concept Printable extracted as definition"
    query: |
      MATCH (d:Definition) WHERE d.name = 'Printable'
      RETURN d.name AS name
    assert:
      - { row: { name: "Printable" } }
