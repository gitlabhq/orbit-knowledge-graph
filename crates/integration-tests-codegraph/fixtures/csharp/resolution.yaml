name: "C# resolution — definitions, containment, calls, imports"

fixtures:
  - path: Controllers/UserController.cs
    content: |
      using MyApp.Services;
      using MyApp.Models;

      namespace MyApp.Controllers
      {
          public class UserController
          {
              private readonly UserService _userService;

              public UserController()
              {
                  _userService = new UserService();
              }

              public User GetUser(int id)
              {
                  return _userService.FindById(id);
              }

              public void CreateUser(string name)
              {
                  var user = new User(name);
                  _userService.Save(user);
              }
          }
      }

  - path: Services/UserService.cs
    content: |
      using MyApp.Models;

      namespace MyApp.Services
      {
          public class UserService
          {
              public User FindById(int id)
              {
                  return new User("test");
              }

              public void Save(User user)
              {
              }
          }
      }

  - path: Models/User.cs
    content: |
      namespace MyApp.Models
      {
          public class User
          {
              public string Name { get; set; }
              public int Age { get; set; }

              public User(string name)
              {
                  Name = name;
              }

              public string GetDisplayName()
              {
                  return Name;
              }
          }
      }

  - path: Models/Role.cs
    content: |
      namespace MyApp.Models
      {
          public enum Role
          {
              Admin,
              Editor,
              Viewer
          }

          public interface IPermission
          {
              bool CanEdit();
          }
      }

tests:
  # ── Definition types ──────────────────────────────────────────
  - name: "Class definitions exist"
    query: |
      MATCH (d:Definition)
      WHERE d.definition_type = 'Class'
        AND d.fqn IN ['MyApp.Controllers.UserController',
                       'MyApp.Services.UserService',
                       'MyApp.Models.User']
      RETURN d.fqn AS fqn
    assert:
      - { row_count: 3 }

  - name: "Enum definition"
    query: |
      MATCH (d:Definition)
      WHERE d.fqn = 'MyApp.Models.Role'
        AND d.definition_type = 'Enum'
      RETURN d.fqn AS fqn
    assert:
      - { row_count: 1 }

  - name: "Interface definition"
    query: |
      MATCH (d:Definition)
      WHERE d.fqn = 'MyApp.Models.IPermission'
        AND d.definition_type = 'Interface'
      RETURN d.fqn AS fqn
    assert:
      - { row_count: 1 }

  - name: "Method definitions"
    query: |
      MATCH (d:Definition)
      WHERE d.definition_type = 'Method'
        AND d.fqn IN ['MyApp.Controllers.UserController.GetUser',
                       'MyApp.Controllers.UserController.CreateUser',
                       'MyApp.Services.UserService.FindById',
                       'MyApp.Services.UserService.Save',
                       'MyApp.Models.User.GetDisplayName',
                       'MyApp.Models.IPermission.CanEdit']
      RETURN d.fqn AS fqn
    assert:
      - { row_count: 6 }

  - name: "Property definitions"
    query: |
      MATCH (d:Definition)
      WHERE d.definition_type = 'Property'
        AND d.fqn IN ['MyApp.Models.User.Name',
                       'MyApp.Models.User.Age']
      RETURN d.fqn AS fqn
    assert:
      - { row_count: 2 }

  - name: "Enum members"
    query: |
      MATCH (d:Definition)
      WHERE d.definition_type = 'EnumMember'
        AND d.fqn IN ['MyApp.Models.Role.Admin',
                       'MyApp.Models.Role.Editor',
                       'MyApp.Models.Role.Viewer']
      RETURN d.fqn AS fqn
    assert:
      - { row_count: 3 }

  # ── Containment (DEFINES edges) ────────────────────────────────
  - name: "Class defines method"
    query: |
      MATCH (parent:Definition)-[e:DefinitionToDefinition]->(child:Definition)
      WHERE parent.fqn = 'MyApp.Controllers.UserController'
        AND child.fqn = 'MyApp.Controllers.UserController.GetUser'
        AND e.edge_kind = 'Defines'
      RETURN parent.fqn AS parent, child.fqn AS child
    assert:
      - { row_count: 1 }

  - name: "Enum defines members"
    query: |
      MATCH (parent:Definition)-[e:DefinitionToDefinition]->(child:Definition)
      WHERE parent.fqn = 'MyApp.Models.Role'
        AND e.edge_kind = 'Defines'
      RETURN child.fqn AS fqn
    assert:
      - { row_count: 3 }

  # ── CALLS edges (cross-file resolution) ────────────────────────
  - name: "Controller calls UserService.FindById"
    skip: true  # chain calls need SSA type flow from field declarations
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'MyApp.Controllers.UserController.GetUser'
        AND callee.fqn = 'MyApp.Services.UserService.FindById'
        AND e.edge_kind = 'CALLS'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

  - name: "Controller calls UserService.Save"
    skip: true  # chain calls need SSA type flow from field declarations
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'MyApp.Controllers.UserController.CreateUser'
        AND callee.fqn = 'MyApp.Services.UserService.Save'
        AND e.edge_kind = 'CALLS'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }
