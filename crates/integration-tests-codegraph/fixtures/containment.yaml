name: Containment hierarchy
fixtures:
  - path: app.py
    content: |
      class Outer:
          class Inner:
              def method(self):
                  pass
          def outer_method(self):
              pass

tests:
  - name: All definitions
    query: |
      MATCH (d:Definition)
      RETURN d.name AS name, d.fqn AS fqn, d.definition_type AS type, d.file_path AS file
    assert:
      - { row_count: 4 }
      - { unique: fqn }
      - { no_nulls: fqn }
      - { no_nulls: type }
      - { all_match: { field: file, pattern: "app.py" } }
      - { column_values: { field: name, values: ["Outer", "Inner", "method", "outer_method"] } }
      - { contains_row: { name: "Outer", fqn: "app.Outer", type: "Class" } }
      - { contains_row: { name: "Inner", fqn: "app.Outer.Inner", type: "Class" } }
      - { contains_row: { name: "method", fqn: "app.Outer.Inner.method", type: "Method" } }
      - { contains_row: { name: "outer_method", fqn: "app.Outer.outer_method", type: "Method" } }

  - name: Containment edges
    query: |
      MATCH (parent:Definition)-[e:DefinitionToDefinition]->(child:Definition)
      RETURN parent.fqn AS parent, child.fqn AS child, e.edge_kind AS kind
    assert:
      - { row_count: 3 }
      - { all_match: { field: kind, pattern: "Defines" } }
      - { contains_row: { parent: "app.Outer", child: "app.Outer.Inner" } }
      - { contains_row: { parent: "app.Outer", child: "app.Outer.outer_method" } }
      - { contains_row: { parent: "app.Outer.Inner", child: "app.Outer.Inner.method" } }
      # Inner must NOT contain outer_method
      - { excludes_row: { parent: "app.Outer.Inner", child: "app.Outer.outer_method" } }

  - name: File structure
    query: |
      MATCH (f:File)
      RETURN f.path AS path, f.extension AS ext, f.language AS lang
    assert:
      - { row_count: 1 }
      - { contains_row: { path: "app.py", ext: "py", lang: "python" } }

  - name: File owns all definitions
    query: |
      MATCH (f:File)-[e:FileToDefinition]->(d:Definition)
      RETURN f.path AS file, d.name AS def, e.edge_kind AS kind
    assert:
      - { all_match: { field: file, pattern: "app.py" } }
      - { all_match: { field: kind, pattern: "Defines" } }
      - { column_values: { field: def, values: ["Outer", "Inner", "method", "outer_method"] } }
