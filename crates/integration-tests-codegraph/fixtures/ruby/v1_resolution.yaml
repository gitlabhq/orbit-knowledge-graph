name: "Ruby v1 parity — full resolution suite"
fixture_dir: "fixtures/code/ruby-references"

tests:
  # ── R1: test_notification_service_call_resolution ──
  - name: "UsersController#destroy -> NotificationService::notify"
    skip: true
    query: |
      MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'UsersController#destroy'
        AND callee.fqn = 'NotificationService::notify'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

