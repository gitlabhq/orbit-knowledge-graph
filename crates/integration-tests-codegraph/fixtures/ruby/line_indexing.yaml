name: "Ruby start_line is 1-indexed"

# Tree-sitter reports rows 0-indexed. `linker::graph::write_range`
# converts to 1-indexed at the projection boundary so a
# `file:start_line` citation lands on the actual declaration in any
# editor/IDE.

fixtures:
  - path: app/models/merge_request.rb
    content: |
      # frozen_string_literal: true

      class MergeRequest < ApplicationRecord
        attr_accessor :title

        def mergeable?
          true
        end

        def self.batch_mark_as_unchecked(ids)
          ids
        end
      end

tests:
  - name: Top-level Ruby class reports the file line its `class` keyword sits on
    # `class MergeRequest` is on file line 3 (after the magic comment + blank).
    query: |
      MATCH (d:Definition)
      WHERE d.file_path = 'app/models/merge_request.rb'
        AND d.name = 'MergeRequest'
        AND d.definition_type = 'Class'
      RETURN d.start_line AS start_line
    assert:
      - { row_count: 1 }
      - { row: { start_line: 3 } }

  - name: Instance method reports the file line its `def` keyword sits on
    # `def mergeable?` is on file line 6.
    query: |
      MATCH (d:Definition)
      WHERE d.file_path = 'app/models/merge_request.rb'
        AND d.name = 'mergeable?'
      RETURN d.start_line AS start_line
    assert:
      - { row_count: 1 }
      - { row: { start_line: 6 } }

  - name: Singleton method reports the file line its `def self.` sits on
    # `def self.batch_mark_as_unchecked` is on file line 10.
    query: |
      MATCH (d:Definition)
      WHERE d.file_path = 'app/models/merge_request.rb'
        AND d.name = 'batch_mark_as_unchecked'
      RETURN d.start_line AS start_line
    assert:
      - { row_count: 1 }
      - { row: { start_line: 10 } }
