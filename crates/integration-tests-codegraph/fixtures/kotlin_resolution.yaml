name: Kotlin call resolution
fixtures:
  - path: com/example/Service.kt
    content: |
      package com.example

      class Service {
          fun process() {}
          fun run() {
              process()
          }
      }

tests:
  - name: Same-class method call resolves
    query: |
      MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.name = 'run' AND callee.name = 'process'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - non_empty: true

  - name: Package scoping produces correct FQNs
    query: |
      MATCH (d:Definition)
      WHERE d.name = 'Service'
      RETURN d.fqn AS fqn
    assert:
      - non_empty: true
      - all_match: { field: fqn, pattern: "com.example.*" }
