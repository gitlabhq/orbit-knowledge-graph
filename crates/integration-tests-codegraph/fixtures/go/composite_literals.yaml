name: "Go: composite literal constructors"
fixtures:
  - path: types.go
    content: |
      package main

      type Config struct {
          Host string
          Port int
      }

      type Server struct {
          Config Config
      }

      func (s *Server) Listen() {}

      func setup() {
          cfg := Config{Host: "localhost", Port: 8080}
          srv := Server{Config: cfg}
          srv.Listen()
      }

tests:
  - name: "Composite literals create type references"
    queries:
      - query: |
          MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
          WHERE caller.fqn = 'main.setup' AND e.edge_kind = 'Calls'
          RETURN callee.name AS callee
          ORDER BY callee
        assert:
          - { row: { callee: "Listen" } }
      # No edges to unrelated definitions
      - query: |
          MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
          WHERE caller.fqn = 'main.setup' AND callee.name = 'Close'
          RETURN callee.name
        assert:
          - { empty: true }

  - name: "Config and Server structs defined"
    query: |
      MATCH (d:Definition)
      WHERE d.name IN ['Config', 'Server'] AND d.definition_type = 'Struct'
      RETURN d.name AS name, d.fqn AS fqn
      ORDER BY name
    assert:
      - { row: { name: "Config", fqn: "main.Config" } }
      - { row: { name: "Server", fqn: "main.Server" } }
