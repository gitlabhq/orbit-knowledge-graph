name: "Go: scope resolution, branching, and shadowing"
fixtures:
  - path: scope.go
    content: |
      package main

      type Handler struct{}
      func (h *Handler) Handle() {}
      func (h *Handler) Close()  {}

      type Fallback struct{}
      func (f *Fallback) Handle() {}
      func (f *Fallback) Retry()  {}

      func outer() {
          h := Handler{}
          h.Handle()

          if true {
              h := Fallback{}
              h.Handle()
              h.Retry()
          }

          h.Close()
      }

      func withSwitch(mode int) {
          switch mode {
          case 1:
              h := Handler{}
              h.Handle()
          case 2:
              f := Fallback{}
              f.Retry()
          }
      }

tests:
  - name: "outer calls Handler.Handle, Fallback.Handle, Fallback.Retry, Handler.Close"
    queries:
      - query: |
          MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
          WHERE caller.fqn = 'main.outer' AND e.edge_kind = 'Calls'
          RETURN callee.fqn AS callee
          ORDER BY callee
        assert:
          - { row: { callee: "main.Close" } }
          - { row: { callee: "main.Handle" } }
          - { row: { callee: "main.Handle" } }
          - { row: { callee: "main.Retry" } }

  - name: "withSwitch calls Handle and Retry from separate branches"
    queries:
      - query: |
          MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
          WHERE caller.fqn = 'main.withSwitch' AND e.edge_kind = 'Calls'
          RETURN callee.fqn AS callee
          ORDER BY callee
        assert:
          - { row: { callee: "main.Handle" } }
          - { row: { callee: "main.Retry" } }
      - query: |
          MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
          WHERE caller.fqn = 'main.withSwitch' AND callee.name = 'Close'
          RETURN callee.name
        assert:
          - { empty: true }
