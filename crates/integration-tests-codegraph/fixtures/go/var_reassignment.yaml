name: "Go: variable reassignment and type narrowing"
fixtures:
  - path: reassign.go
    content: |
      package main

      type Cat struct{}
      func (c *Cat) Meow() {}

      type Dog struct{}
      func (d *Dog) Bark() {}

      func reassigned() {
          var animal Cat
          animal.Meow()
      }

      func multiAssign() {
          a := Cat{}
          a.Meow()
          b := Dog{}
          b.Bark()
      }

tests:
  - name: "reassigned calls Meow"
    queries:
      - query: |
          MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
          WHERE caller.fqn = 'main.reassigned' AND callee.name = 'Meow'
          RETURN callee.fqn AS callee
        assert:
          - { row: { callee: "main.Meow" } }
      - query: |
          MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
          WHERE caller.fqn = 'main.reassigned' AND callee.name = 'Bark'
          RETURN callee.name
        assert:
          - { empty: true }

  - name: "multiAssign calls Meow and Bark without cross-contamination"
    queries:
      - query: |
          MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
          WHERE caller.fqn = 'main.multiAssign' AND e.edge_kind = 'Calls'
          RETURN callee.name AS callee
          ORDER BY callee
        assert:
          - { row: { callee: "Bark" } }
          - { row: { callee: "Meow" } }
