name: "Go: nested and recursive calls"
fixtures:
  - path: nested.go
    content: |
      package main

      type Logger struct{}

      func (l *Logger) Info(msg string)  {}
      func (l *Logger) Error(msg string) {}

      type App struct{}

      func (a *App) Start(logger *Logger) {
          logger.Info("starting")
          a.process(logger)
      }

      func (a *App) process(logger *Logger) {
          logger.Info("processing")
          logger.Error("oops")
      }

      func recursive(n int) int {
          if n <= 0 {
              return 0
          }
          return recursive(n - 1)
      }

tests:
  - name: "Start calls Info and process, not Error"
    queries:
      - query: |
          MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
          WHERE caller.fqn = 'main.Start' AND e.edge_kind = 'Calls'
          RETURN callee.name AS callee
          ORDER BY callee
        assert:
          - { row: { callee: "Info" } }
          - { row: { callee: "process" } }
      - query: |
          MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
          WHERE caller.fqn = 'main.Start' AND callee.name = 'Error'
          RETURN callee.name
        assert:
          - { empty: true }

  - name: "process calls Info and Error"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'main.process' AND e.edge_kind = 'Calls'
      RETURN callee.name AS callee
      ORDER BY callee
    assert:
      - { row: { callee: "Error" } }
      - { row: { callee: "Info" } }

  - name: "recursive calls itself"
    query: |
      MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'main.recursive' AND callee.fqn = 'main.recursive'
      RETURN callee.fqn AS callee
    assert:
      - { row_count: 1 }
