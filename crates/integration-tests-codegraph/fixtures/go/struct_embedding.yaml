name: "Go: struct embedding (promoted methods)"
fixtures:
  - path: main.go
    content: |
      package main

      type Logger struct{}

      func (l *Logger) Log(msg string) {}

      type Service struct {
          Logger
          Name string
      }

      type Decoy struct{}

      func (d *Decoy) Log(msg string) {}

      func main() {
          var svc Service
          svc.Log("hello")
      }

tests:
  # TODO: Go TypeFlow writes bare type names to SSA but graph uses FQNs.
  # The resolver can't bridge "Service" → "main.Service" yet.
  - name: svc.Log() resolves to Logger.Log via embedding
    skip: true
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.name = 'main' AND e.edge_kind = 'Calls' AND callee.name = 'Log'
      RETURN callee.fqn AS callee
    assert:
      - { row: { callee: "main.Logger.Log" } }
      - { not: true, row: { callee: "main.Decoy.Log" } }
