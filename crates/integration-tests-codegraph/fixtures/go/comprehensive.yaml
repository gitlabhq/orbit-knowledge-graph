name: "Go: comprehensive resolution"
fixtures:
  - path: models.go
    content: |
      package main

      type User struct {
          Name string
      }

      func (u *User) Greet() string {
          return "Hello, " + u.Name
      }

      func (u *User) Save() error {
          return nil
      }

      type Admin struct {
          User
          Level int
      }

      func (a *Admin) Promote() {}

  - path: service.go
    content: |
      package main

      type UserService struct{}

      func NewUserService() *UserService {
          return &UserService{}
      }

      func (s *UserService) FindUser(id int) *User {
          return &User{Name: "test"}
      }

      func (s *UserService) DeleteUser(id int) error {
          user := s.FindUser(id)
          user.Save()
          return nil
      }

  - path: db.go
    content: |
      package main

      type Database struct{}

      func (d *Database) Query(sql string) {}
      func (d *Database) Close() {}

      func NewDatabase() Database {
          return Database{}
      }

  - path: main.go
    content: |
      package main

      func main() {
          db := NewDatabase()
          db.Query("SELECT 1")

          svc := NewUserService()
          user := svc.FindUser(1)
          user.Greet()

          admin := Admin{}
          admin.Greet()
          admin.Promote()
      }

tests:
  # ── Definitions ──

  - name: "All structs and interfaces defined with correct FQNs"
    query: |
      MATCH (d:Definition)
      WHERE d.definition_type IN ['Struct', 'Interface']
      RETURN d.name AS name, d.fqn AS fqn
      ORDER BY name
    assert:
      - { row: { name: "Admin", fqn: "main.Admin" } }
      - { row: { name: "Database", fqn: "main.Database" } }
      - { row: { name: "User", fqn: "main.User" } }
      - { row: { name: "UserService", fqn: "main.UserService" } }

  - name: "All methods defined with correct FQNs"
    query: |
      MATCH (d:Definition)
      WHERE d.definition_type = 'Method'
      RETURN d.name AS name, d.fqn AS fqn
      ORDER BY fqn
    assert:
      - { row: { name: "Close", fqn: "main.Close" } }
      - { row: { name: "DeleteUser", fqn: "main.DeleteUser" } }
      - { row: { name: "FindUser", fqn: "main.FindUser" } }
      - { row: { name: "Greet", fqn: "main.Greet" } }
      - { row: { name: "Promote", fqn: "main.Promote" } }
      - { row: { name: "Query", fqn: "main.Query" } }
      - { row: { name: "Save", fqn: "main.Save" } }

  - name: "Constructor functions defined"
    query: |
      MATCH (d:Definition)
      WHERE d.definition_type = 'Function'
        AND d.name IN ['NewDatabase', 'NewUserService', 'main']
      RETURN d.name AS name, d.fqn AS fqn
      ORDER BY name
    assert:
      - { row: { name: "NewDatabase", fqn: "main.NewDatabase" } }
      - { row: { name: "NewUserService", fqn: "main.NewUserService" } }
      - { row: { name: "main", fqn: "main.main" } }

  # ── Struct embedding ──

  - name: "Admin extends User via struct embedding"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'main.Admin' AND e.edge_kind = 'Extends'
      RETURN callee.fqn AS parent
    assert:
      - { row: { parent: "main.User" } }

  # ── Simple function calls from main ──

  - name: "main calls exactly NewDatabase, NewUserService, FindUser, Greet, Promote, Query"
    queries:
      - query: |
          MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
          WHERE caller.fqn = 'main.main' AND e.edge_kind = 'Calls'
          RETURN callee.fqn AS callee
          ORDER BY callee
        assert:
          - { row: { callee: "main.FindUser" } }
          - { row: { callee: "main.Greet" } }
          - { row: { callee: "main.Greet" } }
          - { row: { callee: "main.NewDatabase" } }
          - { row: { callee: "main.NewUserService" } }
          - { row: { callee: "main.Promote" } }
          - { row: { callee: "main.Query" } }
      # No false positives: main does NOT call Close, Save, or DeleteUser
      - query: |
          MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
          WHERE caller.fqn = 'main.main'
            AND callee.name IN ['Close', 'Save', 'DeleteUser']
          RETURN callee.name
        assert:
          - { empty: true }

  # ── Method chaining via return types ──

  - name: "db.Query resolves to Database.Query via NewDatabase return type"
    queries:
      - query: |
          MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
          WHERE caller.fqn = 'main.main' AND callee.fqn = 'main.Query'
          RETURN callee.fqn AS callee
        assert:
          - { row_count: 1 }
      # No false positive to Close
      - query: |
          MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
          WHERE caller.fqn = 'main.main' AND callee.fqn = 'main.Close'
          RETURN callee.fqn
        assert:
          - { empty: true }

  # ── Promoted method via embedding ──

  - name: "admin.Greet resolves via User embedding"
    query: |
      MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'main.main' AND callee.fqn = 'main.Greet'
      RETURN callee.fqn AS callee
    assert:
      - { row_count: 2 }

  # ── Intra-service method calls ──

  - name: "DeleteUser calls exactly FindUser and Save"
    queries:
      - query: |
          MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
          WHERE caller.fqn = 'main.DeleteUser' AND e.edge_kind = 'Calls'
          RETURN callee.fqn AS callee
          ORDER BY callee
        assert:
          - { row: { callee: "main.FindUser" } }
          - { row: { callee: "main.Save" } }
      # No false positive to other UserService methods
      - query: |
          MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
          WHERE caller.fqn = 'main.DeleteUser'
            AND callee.name IN ['Query', 'Close', 'Greet', 'Promote']
          RETURN callee.name
        assert:
          - { empty: true }
