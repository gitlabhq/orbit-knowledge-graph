name: "Python: decorated function call"
fixtures:
  - path: main.py
    content: |
      def my_decorator(func):
          return func

      @my_decorator
      def decorated():
          pass

      def run():
          decorated()

tests:
  - name: decorated() resolves to definition
    query: |
      MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
      WHERE callee.name = 'decorated'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }
      - { row: { caller: "main.run", callee: "main.decorated" } }
