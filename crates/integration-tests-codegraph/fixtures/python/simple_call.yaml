name: "Python: simple function call"
fixtures:
  - path: main.py
    content: |
      def foo():
          pass

      foo()

tests:
  - name: foo definition exists
    query: |
      MATCH (d:Definition)
      WHERE d.name = 'foo'
      RETURN d.fqn AS fqn
    assert:
      - { row_count: 1 }
      - { row: { fqn: "main.foo" } }

  - name: File has edge to foo (structural + call)
    query: |
      MATCH (f:File)-[:FileToDefinition]->(d:Definition)
      WHERE d.name = 'foo'
      RETURN f.path AS file, d.fqn AS target
    assert:
      - { row_count: 2 }
      - { row: { file: "main.py", target: "main.foo" } }
