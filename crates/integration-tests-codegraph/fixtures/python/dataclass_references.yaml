name: "Python: dataclass field references"
fixtures:
  - path: main.py
    content: |
      from dataclasses import dataclass

      @dataclass
      class User:
          email: str

      @dataclass
      class Audit:
          email: str

      def greet(u: User):
          print(u.email)

tests:
  - name: "typed dataclass attribute access resolves to the field definition"
    query: |
      MATCH (caller:Definition)-[r:DefinitionToDefinition]->(field:Definition)
      WHERE caller.fqn = 'main.greet'
        AND field.name = 'email'
        AND r.edge_kind IN ['Calls', 'References']
      RETURN field.fqn AS field, r.edge_kind AS kind
    assert:
      - { row_count: 1 }
      - { row: { field: "main.User.email", kind: "Calls" } }
