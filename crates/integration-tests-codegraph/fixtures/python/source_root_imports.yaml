name: "Python: source-root imports"
fixtures:
  - path: src/scoring.py
    content: |
      def score_review(review):
          return review

  - path: src/pipeline.py
    content: |
      from scoring import score_review

      def run_tier_reviews(review):
          return score_review(review)

  - path: src/module_import_pipeline.py
    content: |
      import scoring

      def run_module_reviews(review):
          return scoring.score_review(review)

  - path: src/poetry/factory.py
    content: |
      class Factory:
          def build(self):
              pass

  - path: src/poetry/__init__.py
    content: |
      pass

  - path: src/poetry/console/application.py
    content: |
      from poetry.factory import Factory

      def build_application():
          return Factory()

  - path: src/prefect/__init__.py
    content: |
      pass

  - path: src/prefect/events/schemas/events.py
    content: |
      class Event:
          def emit(self):
              pass

  - path: src/prefect/task_runners.py
    content: |
      from prefect.events.schemas.events import Event

      def emit_task_event():
          return Event()

  - path: src/package_imports/module.py
    content: |
      def build_module():
          pass

  - path: src/package_imports/caller.py
    content: |
      from package_imports import module

      def build_package_import():
          return module.build_module()

  - path: src/prefect/task_engine.py
    content: |
      from prefect.events.schemas.events import Event as PrefectEvent

      def build_prefect_event():
          return PrefectEvent()

  - path: apps/orion/src/orion/worker.py
    content: |
      class Worker:
          pass

  - path: apps/orion/src/orion/service.py
    content: |
      from orion.worker import Worker

      def boot_worker():
          return Worker()

  - path: vendor/sdk/client.py
    content: |
      class Client:
          pass

  - path: src/external_client.py
    content: |
      from sdk.client import Client

      def build_external_client():
          return Client()

  - path: src/alpha/common/scoring.py
    content: |
      def score_review(review):
          return review

  - path: src/alpha/other/common/scoring.py
    content: |
      def score_review(review):
          return review

  - path: src/alpha/other/reporting.py
    content: |
      from common.scoring import score_review

      def run_ambiguous(review):
          return score_review(review)

  - path: tests/test_scoring.py
    content: |
      from scoring import score_review

      def test_score_review():
          return score_review(None)

  - path: conftest.py
    content: |
      from scoring import score_review

      def scoring_fixture():
          return score_review(None)

  - path: tests/test_vendor_client.py
    content: |
      from sdk.client import Client

      def test_client():
          return Client()

  - path: pkg/__init__.py
    content: |
      pass

  - path: pkg/json.py
    content: |
      def dumps(obj):
          return obj

  - path: tests/test_stdlib_shadow.py
    content: |
      import json

      def test_dumps():
          return json.dumps({})

  - path: pkg/service.py
    content: |
      from json import dumps

      def use_dumps():
          return dumps({})

tests:
  - name: "top-level source-root module import resolves"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'src.pipeline.run_tier_reviews'
        AND callee.fqn = 'src.scoring.score_review'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

  - name: "whole-module source-root import keeps local binding"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'src.module_import_pipeline.run_module_reviews'
        AND callee.fqn = 'src.scoring.score_review'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

  - name: "Poetry-style package import resolves"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'src.poetry.console.application.build_application'
        AND callee.fqn = 'src.poetry.factory.Factory'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

  - name: "Prefect-style nested package import resolves"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'src.prefect.task_runners.emit_task_event'
        AND callee.fqn = 'src.prefect.events.schemas.events.Event'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

  - name: "Prefect-style aliased nested package import resolves"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'src.prefect.task_engine.build_prefect_event'
        AND callee.fqn = 'src.prefect.events.schemas.events.Event'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

  - name: "source-root package module import resolves"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'src.package_imports.caller.build_package_import'
        AND callee.fqn = 'src.package_imports.module.build_module'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

  - name: "nested src source root import resolves"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'apps.orion.src.orion.service.boot_worker'
        AND callee.fqn = 'apps.orion.src.orion.worker.Worker'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

  - name: "test file outside the source root resolves src-layout import"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'tests.test_scoring.test_score_review'
        AND callee.fqn = 'src.scoring.score_review'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

  - name: "repo-root file resolves src-layout import"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'conftest.scoring_fixture'
        AND callee.fqn = 'src.scoring.score_review'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

  - name: "stdlib-shadowing package submodule does not capture external imports"
    queries:
      - query: |
          MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
          WHERE caller.fqn = 'tests.test_stdlib_shadow.test_dumps'
            AND e.edge_kind = 'Calls'
          RETURN caller.fqn AS caller, callee.fqn AS callee
        assert:
          - { empty: true }
      - query: |
          MATCH (caller:Definition)-[e:DefinitionToImportedSymbol]->(sym:ImportedSymbol)
          WHERE caller.fqn = 'tests.test_stdlib_shadow.test_dumps'
            AND e.edge_kind = 'Calls'
          RETURN caller.fqn AS caller
        assert:
          - { row_count: 1 }

  - name: "stdlib import inside a package does not bind a shadowing sibling submodule"
    queries:
      - query: |
          MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
          WHERE caller.fqn = 'pkg.service.use_dumps'
            AND e.edge_kind = 'Calls'
          RETURN caller.fqn AS caller, callee.fqn AS callee
        assert:
          - { empty: true }
      - query: |
          MATCH (caller:Definition)-[e:DefinitionToImportedSymbol]->(sym:ImportedSymbol)
          WHERE caller.fqn = 'pkg.service.use_dumps'
            AND sym.path = 'json'
            AND sym.name = 'dumps'
            AND e.edge_kind = 'Calls'
          RETURN caller.fqn AS caller
        assert:
          - { row_count: 1 }

  - name: "unique cross-root import from a test file binds the vendored definition"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'tests.test_vendor_client.test_client'
        AND callee.fqn = 'vendor.sdk.client.Client'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

  - name: "unique cross-root import between roots binds the vendored definition"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'src.external_client.build_external_client'
        AND callee.fqn = 'vendor.sdk.client.Client'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

  - name: "unmarked ancestor candidates do not bind arbitrary definitions"
    queries:
      - query: |
          MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
          WHERE caller.fqn = 'src.alpha.other.reporting.run_ambiguous'
            AND e.edge_kind = 'Calls'
          RETURN caller.fqn AS caller, callee.fqn AS callee
        assert:
          - { empty: true }
      - query: |
          MATCH (caller:Definition)-[e:DefinitionToImportedSymbol]->(sym:ImportedSymbol)
          WHERE caller.fqn = 'src.alpha.other.reporting.run_ambiguous'
            AND sym.path = 'common.scoring'
            AND sym.name = 'score_review'
            AND e.edge_kind = 'Calls'
          RETURN caller.fqn AS caller, sym.path AS path, sym.name AS name
        assert:
          - { row_count: 1 }
