name: "Python: aliased imports and partial resolution"
fixtures:
  - path: mathlib.py
    content: |
      def sqrt(x):
          return x ** 0.5

      def pow(x, n):
          return x ** n

  - path: main.py
    content: |
      import mathlib as ml
      from mathlib import sqrt

      def direct_import_caller():
          sqrt(16)

      def aliased_caller():
          ml.sqrt(16)

tests:
  - name: "D4: from-import sqrt resolves"
    query: |
      MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.name = 'direct_import_caller' AND callee.name = 'sqrt'
      RETURN caller.file_path AS src, callee.file_path AS tgt
    assert:
      - { row_count: 1 }
      - { row: { src: "main.py", tgt: "mathlib.py" } }

  - name: "D5: aliased import ml.sqrt calls exist"
    description: "import mathlib as ml; ml.sqrt() — partial resolution through alias"
    query: |
      MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.name = 'aliased_caller'
      RETURN callee.name AS callee
    assert:
      - { row_count: 1 }
      - { row: { callee: "sqrt" } }
