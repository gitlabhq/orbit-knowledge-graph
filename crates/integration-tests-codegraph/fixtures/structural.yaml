name: Structural invariants
fixtures:
  - path: service.py
    content: |
      class UserService:
          def get_user(self, id):
              return id
          def create_user(self, name):
              user = self.get_user(name)
              return user
  - path: main.py
    content: |
      from service import UserService
      svc = UserService()
      svc.create_user("alice")

tests:
  - name: No self-referencing edges
    query: |
      MATCH (d:Definition)-[:DefinitionToDefinition]->(d2:Definition)
      WHERE d.id = d2.id
      RETURN d.fqn AS self_caller
    assert:
      - { empty: true }

  - name: Files
    query: |
      MATCH (f:File)
      RETURN f.path AS path, f.extension AS ext, f.language AS lang
    assert:
      - { row_count: 2 }
      - { unique: path }
      - { column_values: { field: path, values: ["service.py", "main.py"] } }
      - { all_match: { field: ext, pattern: "py" } }
      - { all_match: { field: lang, pattern: "python" } }

  - name: Definitions
    query: |
      MATCH (d:Definition)
      RETURN d.name AS name, d.fqn AS fqn, d.definition_type AS type, d.file_path AS file
    assert:
      - { row_count: 3 }
      - { unique: fqn }
      - { no_nulls: fqn }
      - { all_match: { field: file, pattern: "service.py" } }
      - { contains_row: { name: "UserService", fqn: "service.UserService", type: "Class" } }
      - { contains_row: { name: "get_user", fqn: "service.UserService.get_user", type: "Method" } }
      - { contains_row: { name: "create_user", fqn: "service.UserService.create_user", type: "Method" } }
      # main.py has no definitions
      - { excludes_row: { file: "main.py" } }

  - name: Directory to file edges
    query: |
      MATCH (d:Directory)-[:DirectoryToFile]->(f:File)
      RETURN f.path AS file
    assert:
      - { row_count: 2 }
      - { column_values: { field: file, values: ["service.py", "main.py"] } }

  - name: File-to-definition edges split by kind
    query: |
      MATCH (f:File)-[e:FileToDefinition]->(d:Definition)
      RETURN f.path AS file, d.name AS def, e.edge_kind AS kind
    assert:
      # structural Defines: only service.py owns definitions
      - { where: { kind: "Defines" }, row_count: 3 }
      - { where: { kind: "Defines" }, all_match: { field: file, pattern: "service.py" } }
      - { where: { kind: "Defines" }, none_match: { field: file, pattern: "main.py" } }
      - { where: { kind: "Defines" }, column_values: { field: def, values: ["UserService", "get_user", "create_user"] } }
      # file-level Calls: main.py references definitions in service.py
      - { where: { kind: "Calls" }, row_count: 2 }
      - { where: { kind: "Calls" }, all_match: { field: file, pattern: "main.py" } }
      - { where: { kind: "Calls" }, contains_row: { file: "main.py", def: "UserService" } }
      - { where: { kind: "Calls" }, contains_row: { file: "main.py", def: "create_user" } }

  - name: Imports
    query: |
      MATCH (i:ImportedSymbol)
      RETURN i.file_path AS file, i.path AS path, i.name AS name
    assert:
      - { row_count: 1 }
      - { contains_row: { file: "main.py", path: "service", name: "UserService" } }

  - name: Definition containment edges
    query: |
      MATCH (parent:Definition)-[e:DefinitionToDefinition]->(child:Definition)
      RETURN parent.fqn AS parent, child.fqn AS child, e.edge_kind AS kind
    assert:
      # containment: UserService contains get_user and create_user
      - { where: { kind: "Defines" }, row_count: 2 }
      - { where: { kind: "Defines" }, contains_row: { parent: "service.UserService", child: "service.UserService.get_user" } }
      - { where: { kind: "Defines" }, contains_row: { parent: "service.UserService", child: "service.UserService.create_user" } }
      # call: create_user calls get_user via self
      - { where: { kind: "Calls" }, row_count: 1 }
      - { where: { kind: "Calls" }, contains_row: { parent: "service.UserService.create_user", child: "service.UserService.get_user" } }
