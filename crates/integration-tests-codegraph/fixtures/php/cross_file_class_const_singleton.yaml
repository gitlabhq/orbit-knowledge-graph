name: "PHP cross-file — Foo::class, new self() singleton, late static binding, inherited dispatch"

fixtures:
  - path: src/Di/Container.php
    content: |
      <?php
      namespace App\Di;

      class Container {
          private static ?self $shared = null;

          public static function instance(): self {
              if (self::$shared === null) {
                  self::$shared = new self();
              }
              return self::$shared;
          }

          public function get(string $id): mixed {
              return null;
          }
      }

  - path: src/Di/ScopedContainer.php
    content: |
      <?php
      namespace App\Di;

      class ScopedContainer extends Container {
          public static function build(): static {
              return new static();
          }
      }

  - path: src/Registry/ServiceProvider.php
    content: |
      <?php
      namespace App\Registry;

      use App\Di\Container;
      use App\Di\ScopedContainer;

      class ServiceProvider {
          public function register(): void {
              Container::instance()->get('logger');
              ScopedContainer::build()->get('cache');
          }

          public function containerClass(): string {
              return Container::class;
          }
      }

tests:
  - name: "All three files indexed"
    query: |
      MATCH (f:File) RETURN f.path AS path
    assert:
      - { row_count: 3 }
      - { unique: path }

  - name: "Cross-file class extension: ScopedContainer extends Container"
    query: |
      MATCH (child:Definition)-[e:DefinitionToDefinition]->(parent:Definition)
      WHERE child.fqn = 'App\Di\ScopedContainer'
        AND parent.fqn = 'App\Di\Container'
        AND e.edge_kind = 'Extends'
      RETURN child.fqn AS child
    assert:
      - { row_count: 1 }

  - name: "new self() singleton resolves to declaring class: Container.instance -> Container"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'App\Di\Container\instance'
        AND callee.fqn = 'App\Di\Container'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller
    assert:
      - { row_count: 1 }

  - name: "new static() late static binding resolves to declaring class: ScopedContainer.build -> ScopedContainer"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'App\Di\ScopedContainer\build'
        AND callee.fqn = 'App\Di\ScopedContainer'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller
    assert:
      - { row_count: 1 }

  - name: "Foo::class resolves cross-file to the class: ServiceProvider.containerClass -> Container"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'App\Registry\ServiceProvider\containerClass'
        AND callee.fqn = 'App\Di\Container'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller
    assert:
      - { row_count: 1 }

  - name: "Cross-file static call: ServiceProvider.register -> Container.instance"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'App\Registry\ServiceProvider\register'
        AND callee.fqn = 'App\Di\Container\instance'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller
    assert:
      - { row_count: 1 }

  - name: "Cross-file static factory call: ServiceProvider.register -> ScopedContainer.build"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'App\Registry\ServiceProvider\register'
        AND callee.fqn = 'App\Di\ScopedContainer\build'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller
    assert:
      - { row_count: 1 }

  - name: "Inherited method dispatch via both static-factory chains: register -> Container.get (2 call sites)"
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'App\Registry\ServiceProvider\register'
        AND callee.fqn = 'App\Di\Container\get'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller
    assert:
      - { row_count: 2 }

  - name: "Foo::class does not create a spurious edge to a member literally named 'class'"
    query: |
      MATCH (s:Definition)-[e:DefinitionToDefinition]->(t:Definition)
      WHERE t.name = 'class'
      RETURN t.fqn AS fqn
    assert:
      - { empty: true }
