name: Java call resolution
fixtures:
  - path: com/example/Service.java
    content: |
      package com.example;

      public class Service {
          public void process() {}
          public void run() {
              process();
          }
      }
  - path: com/example/App.java
    content: |
      package com.example;

      public class App {
          public void main() {
              new Service();
          }
      }

tests:
  - name: All definitions
    query: |
      MATCH (d:Definition)
      RETURN d.name AS name, d.fqn AS fqn, d.definition_type AS type, d.file_path AS file
    assert:
      - { row_count: 5 }
      - { unique: fqn }
      - { no_nulls: fqn }
      - { no_nulls: type }
      - { column_values: { field: name, values: ["Service", "process", "run", "App", "main"] } }
      - { contains_row: { name: "Service", fqn: "com.example.Service", type: "Class", file: "com/example/Service.java" } }
      - { contains_row: { name: "process", fqn: "com.example.Service.process", type: "Method", file: "com/example/Service.java" } }
      - { contains_row: { name: "run", fqn: "com.example.Service.run", type: "Method", file: "com/example/Service.java" } }
      - { contains_row: { name: "App", fqn: "com.example.App", type: "Class", file: "com/example/App.java" } }
      - { contains_row: { name: "main", fqn: "com.example.App.main", type: "Method", file: "com/example/App.java" } }

  - name: Same-class method call
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { contains_row: { caller: "com.example.Service.run", callee: "com.example.Service.process" } }

  - name: Cross-file constructor call
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.file_path <> callee.file_path AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }
      - { contains_row: { caller: "com.example.App.main", callee: "com.example.Service" } }

  - name: Containment edges
    query: |
      MATCH (parent:Definition)-[e:DefinitionToDefinition]->(child:Definition)
      WHERE e.edge_kind = 'Defines'
      RETURN parent.fqn AS parent, child.fqn AS child
    assert:
      - { row_count: 3 }
      - { contains_row: { parent: "com.example.Service", child: "com.example.Service.process" } }
      - { contains_row: { parent: "com.example.Service", child: "com.example.Service.run" } }
      - { contains_row: { parent: "com.example.App", child: "com.example.App.main" } }

  - name: Files
    query: |
      MATCH (f:File)
      RETURN f.path AS path, f.language AS lang
    assert:
      - { row_count: 2 }
      - { all_match: { field: lang, pattern: "java" } }
      - { column_values: { field: path, values: ["com/example/Service.java", "com/example/App.java"] } }
