tests:
  - name: JSX in .js and generated JS lines both index definitions
    query: |
      MATCH (d:Definition)
      WHERE d.file_path IN ['frontend/src/App.js', 'backend/coverage/prettify.js']
        AND d.fqn IN ['App', 'generated']
      RETURN d.file_path AS file_path, d.fqn AS fqn, d.definition_type AS type
      ORDER BY file_path, fqn
    assert:
      - { row_count: 2 }
      - { row: { file_path: "frontend/src/App.js", fqn: "App", type: "Function" } }
      - { row: { file_path: "backend/coverage/prettify.js", fqn: "generated", type: "Variable" } }
