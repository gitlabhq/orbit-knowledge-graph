name: "Kotlin v1 parity — extension function resolution"
fixture_dir: "fixtures/code/kotlin/main/kotlin"
trace: true

tests:
  # ── K12: test_kotlin_reference_to_extensions ──

  - name: "callToExtensions -> printValue (local extension, direct + property chain)"
    query: |
      MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.name = 'callToExtensions'
        AND callee.name = 'printValue'
      RETURN callee.fqn AS callee
    assert:
      - { row_count: 2 }

  - name: "callToImportedExtensions -> reverse (imported extension)"
    query: |
      MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.name = 'callToImportedExtensions'
        AND callee.name = 'reverse'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

  - name: "callToExtensions -> ExtendMeFromProperty.printValue (extension property method)"
    query: |
      MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.name = 'callToExtensions'
        AND callee.fqn = 'com.example.extensions.entities.ExtendMeFromProperty.printValue'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

  - name: "callToImportedExtensions -> printValue (imported extension on reversed)"
    query: |
      MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.name = 'callToImportedExtensions'
        AND callee.name = 'printValue'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

  - name: "callToImported -> print (imported extension)"
    query: |
      MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.name = 'callToImported'
        AND callee.name = 'print'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }
