name: "Kotlin v1 parity — operator function resolution"
fixture_dir: "fixtures/code/kotlin/main/kotlin"

tests:
  # ── K10: test_kotlin_reference_to_operator_functions ──

  - name: "AnimalList.Companion.of -> AnimalList.plus (operator)"
    query: |
      MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'com.example.operator.AnimalList.Companion.of'
        AND callee.fqn = 'com.example.operator.AnimalList.plus'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

  - name: "AnimalList.Companion.of -> AnimalList.display"
    query: |
      MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'com.example.operator.AnimalList.Companion.of'
        AND callee.fqn = 'com.example.operator.AnimalList.display'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }
