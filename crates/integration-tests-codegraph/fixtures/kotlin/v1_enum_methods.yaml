name: "Kotlin v1 parity — enum method resolution"
fixture_dir: "fixtures/code/kotlin/main/kotlin"

tests:
  # ── K11: test_kotlin_reference_to_enum_constants ──

  - name: "main -> Enum.enumMethod (via ENUM_VALUE_1)"
    skip: false
    query: |
      MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'com.example.main'
        AND callee.fqn = 'com.example.enums.Enum.enumMethod'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }

  - name: "main -> Enum.enumMethod2 (via variable)"
    skip: false
    query: |
      MATCH (caller:Definition)-[:DefinitionToDefinition]->(callee:Definition)
      WHERE caller.fqn = 'com.example.main'
        AND callee.fqn = 'com.example.enums.Enum.enumMethod2'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }
