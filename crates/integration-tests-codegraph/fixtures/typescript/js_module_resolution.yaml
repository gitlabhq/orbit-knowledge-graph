name: "TypeScript JS module resolution"
pipeline: js
fixtures:
  - path: named/util.ts
    content: |
      export function helper() {}
  - path: named/main.ts
    content: |
      import { helper } from './util';

      function run() {
        helper();
      }

  - path: default/util.ts
    content: |
      export default function helper() {}
  - path: default/main.ts
    content: |
      import helper from './util';

      function run() {
        helper();
      }

  - path: namespace/util.ts
    content: |
      export function helper() {}
  - path: namespace/main.ts
    content: |
      import * as util from './util';

      function run() {
        util.helper();
      }

  - path: explicit/util.ts
    content: |
      export function helper() {}
  - path: explicit/index.ts
    content: |
      export { helper } from './util';
  - path: explicit/main.ts
    content: |
      import { helper } from './index';

      function run() {
        helper();
      }

  - path: star/util.ts
    content: |
      export function helper() {}
  - path: star/index.ts
    content: |
      export * from './util';
  - path: star/main.ts
    content: |
      import { helper } from './index';

      function run() {
        helper();
      }

  - path: alias/constants.ts
    content: |
      export function formatPrecision() {
        return 2;
      }
  - path: alias/main.ts
    content: |
      import { formatPrecision as fmt } from './constants';

      function run() {
        return fmt();
      }

  - path: identity/constants.ts
    content: |
      export const dateFormats = {
        iso: "iso",
      };

      export const FLOW_METRICS = ["lead_time"];

      export function formatPrecision() {
        return 2;
      }
  - path: identity/consumer.ts
    content: |
      import {
        dateFormats,
        FLOW_METRICS as metrics,
        formatPrecision,
      } from "./constants";

      export function run() {
        return [dateFormats.iso, metrics.length, formatPrecision()];
      }

  - path: no_false_call/constants.ts
    content: |
      export const HTTP_STATUS_OK = 200;

      export function formatter(value: string): string {
        return value.trim();
      }
  - path: no_false_call/main.ts
    content: |
      import { HTTP_STATUS_OK, formatter } from './constants';

      registerStatus(HTTP_STATUS_OK);

      export function run(value: string): string {
        return formatter(value);
      }

      export function attempt() {
        return HTTP_STATUS_OK();
      }

      function registerStatus(status: number): number {
        return status;
      }

  - path: advanced/consumer.ts
    content: |
      class Parser {
        parse(input: string): string[] {
          return input.split(",");
        }

        static fromConfig(config: string): Parser {
          return new Parser();
        }
      }

      export function process(input: string): string[] {
        const p = new Parser();
        return p.parse(input);
      }

      export function createParser(): Parser {
        return Parser.fromConfig("default");
      }

      export function runWithService(svc: Parser): string[] {
        return svc.parse("a,b,c");
      }

      function transform(input: string): string {
        return input.toUpperCase();
      }

      export function mapItems(items: string[]): string[] {
        return items.map(transform);
      }

  - path: ssa/branch.ts
    content: |
      class JsonParser {
        parse(input: string): string[] {
          return [input];
        }
      }

      class CsvParser {
        parse(input: string): string[] {
          return input.split(",");
        }
      }

      export function pickParser(flag: boolean): string[] {
        let parser;
        if (flag) {
          parser = new JsonParser();
        } else {
          parser = new CsvParser();
        }
        return parser.parse("a,b");
      }

  - path: ssa/alias.ts
    content: |
      class Parser {
        parse(input: string): string[] {
          return [input];
        }
      }

      export function aliasRun(): string[] {
        const parser = new Parser();
        const alias = parser;
        return alias.parse("ok");
      }

  - path: ssa/loop.ts
    content: |
      class Parser {
        parse(input: string): string[] {
          return [input];
        }
      }

      class SpecialParser {
        parse(input: string): string[] {
          return input.split(",");
        }
      }

      export function loopRun(flag: boolean): string[] {
        let parser = new Parser();
        while (flag) {
          parser = new SpecialParser();
          flag = false;
        }
        return parser.parse("a,b");
      }

  - path: namespace_chain/barrel.ts
    content: |
      export { default as Suggestions } from "./suggestions";
  - path: namespace_chain/suggestions.ts
    content: |
      export default class Suggestions {
        static configure() {
          return "configured";
        }
      }
  - path: namespace_chain/consumer.ts
    content: |
      import * as extensions from "./barrel";

      export function run() {
        return extensions.Suggestions.configure();
      }

  - path: combo/barrel.ts
    content: |
      export { default as formatValue } from './direct';
      export * as toolkit from './toolkit';
  - path: combo/direct.ts
    content: |
      export default function defaultFormat(value: string): string {
        return value.trim();
      }
  - path: combo/toolkit.ts
    content: |
      export function normalize(value: string): string {
        return value.toLowerCase();
      }
  - path: combo/consumer.ts
    content: |
      import { formatValue, toolkit } from './barrel';

      const reboundFormat = formatValue;

      export function runFormat(value: string): string {
        return reboundFormat(value);
      }

      export function runToolkit(value: string): string {
        return toolkit.normalize(value);
      }
  - path: unresolved/util.ts
    content: |
      export const ready = 'ready';
  - path: unresolved/main.ts
    content: |
      import missingDefault, { missingNamed } from './util';

      export function inspectImports() {
        return [missingDefault(), missingNamed()];
      }
  - path: unresolved/external_aliases.ts
    content: |
      import { track as firstTrack, track as secondTrack } from '@external/analytics';
      import * as Tracking from '@external/tracking';

      const emit = Tracking.emit;

      export function inspectExternalAliases() {
        firstTrack();
        secondTrack();
        emit();
      }
  - path: namespace_missing/util.ts
    content: |
      export function existing(): string {
        return 'ok';
      }
  - path: namespace_missing/main.ts
    content: |
      import * as util from './util';

      export function inspectMissingMember() {
        return util.missing();
      }
  - path: ambiguous/left.ts
    content: |
      export const shared = 'left';
  - path: ambiguous/right.ts
    content: |
      export const shared = 'right';
  - path: ambiguous/index.ts
    content: |
      export * from './left';
      export * from './right';
  - path: ambiguous/main.ts
    content: |
      import { shared } from './index';

      export function inspectShared() {
        return shared;
      }

tests:
  - name: Synthesizes per-file module definitions
    query: |
      MATCH (d:Definition)
      WHERE d.definition_type = 'Module'
      RETURN d.fqn AS fqn
    assert:
      - { row: { fqn: "named/util.ts" } }
      - { row: { fqn: "default/util.ts" } }
      - { row: { fqn: "namespace/util.ts" } }
      - { row: { fqn: "explicit/index.ts" } }
      - { row: { fqn: "star/index.ts" } }

  - name: Named import targets export proxy
    query: |
      MATCH (i:ImportedSymbol)-[:ImportedSymbolToDefinition]->(d:Definition)
      WHERE i.file_path = 'named/main.ts'
      RETURN i.import_type AS import_type, i.path AS path, i.name AS name, d.fqn AS target
    assert:
      - { row_count: 1 }
      - { row: { import_type: "NamedImport", path: "./util", name: "helper", target: "named/util.ts::helper" } }

  - name: Named import call resolves to concrete definition
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
        AND caller.file_path = 'named/main.ts'
        AND callee.file_path = 'named/util.ts'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }
      - { row: { caller: "run", callee: "helper" } }

  - name: Default import targets primary export proxy
    query: |
      MATCH (i:ImportedSymbol)-[:ImportedSymbolToDefinition]->(d:Definition)
      WHERE i.file_path = 'default/main.ts'
      RETURN i.import_type AS import_type, i.path AS path, i.name AS name, d.fqn AS target
    assert:
      - { row_count: 1 }
      - { row: { import_type: "DefaultImport", path: "./util", name: "default", target: "default/util.ts::default" } }

  - name: Default import call resolves to concrete definition
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
        AND caller.file_path = 'default/main.ts'
        AND callee.file_path = 'default/util.ts'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }
      - { row: { caller: "run", callee: "helper" } }

  - name: Namespace import targets synthesized module
    query: |
      MATCH (i:ImportedSymbol)-[:ImportedSymbolToDefinition]->(d:Definition)
      WHERE i.file_path = 'namespace/main.ts'
      RETURN i.import_type AS import_type, i.path AS path, d.fqn AS target
    assert:
      - { row_count: 1 }
      - { row: { import_type: "NamespaceImport", path: "./util", target: "namespace/util.ts" } }

  - name: Namespace import call resolves to concrete definition
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
        AND caller.file_path = 'namespace/main.ts'
        AND callee.file_path = 'namespace/util.ts'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }
      - { row: { caller: "run", callee: "helper" } }

  - name: Explicit reexport targets barrel proxy
    query: |
      MATCH (i:ImportedSymbol)-[:ImportedSymbolToDefinition]->(d:Definition)
      WHERE i.file_path = 'explicit/main.ts'
      RETURN i.import_type AS import_type, i.path AS path, i.name AS name, d.fqn AS target
    assert:
      - { row_count: 1 }
      - { row: { import_type: "NamedImport", path: "./index", name: "helper", target: "explicit/index.ts::helper" } }

  - name: Explicit reexport call resolves to source definition
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
        AND caller.file_path = 'explicit/main.ts'
        AND callee.file_path = 'explicit/util.ts'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }
      - { row: { caller: "run", callee: "helper" } }

  - name: Star reexport resolves back to source export
    query: |
      MATCH (i:ImportedSymbol)-[:ImportedSymbolToDefinition]->(d:Definition)
      WHERE i.file_path = 'star/main.ts'
      RETURN i.import_type AS import_type, i.path AS path, i.name AS name, d.fqn AS target
    assert:
      - { row_count: 1 }
      - { row: { import_type: "NamedImport", path: "./index", name: "helper", target: "star/util.ts::helper" } }

  - name: Star reexport call resolves to source definition
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
        AND caller.file_path = 'star/main.ts'
        AND callee.file_path = 'star/util.ts'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }
      - { row: { caller: "run", callee: "helper" } }

  - name: Aliased named imports keep source identity
    query: |
      MATCH (i:ImportedSymbol)-[:ImportedSymbolToDefinition]->(d:Definition)
      WHERE i.file_path = 'alias/main.ts'
      RETURN i.import_type AS import_type, i.path AS path, i.name AS name, i.alias AS alias, d.fqn AS target
    assert:
      - { row_count: 1 }
      - { row: { import_type: "NamedImport", path: "./constants", name: "formatPrecision", alias: "fmt", target: "alias/constants.ts::formatPrecision" } }

  - name: Aliased named import call resolves to local definition
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
        AND caller.file_path = 'alias/main.ts'
        AND callee.file_path = 'alias/constants.ts'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }
      - { row: { caller: "run", callee: "formatPrecision" } }

  - name: Multiple imports from one statement keep distinct symbol identities
    query: |
      MATCH (i:ImportedSymbol)-[:ImportedSymbolToDefinition]->(d:Definition)
      WHERE i.file_path = 'identity/consumer.ts'
      RETURN i.name AS name, i.alias AS alias, d.fqn AS target
    assert:
      - { row_count: 3 }
      - { row: { name: "dateFormats", alias: null, target: "identity/constants.ts::dateFormats" } }
      - { row: { name: "FLOW_METRICS", alias: "metrics", target: "identity/constants.ts::FLOW_METRICS" } }
      - { row: { name: "formatPrecision", alias: null, target: "identity/constants.ts::formatPrecision" } }

  - name: Imported function from mixed import statement still calls concrete definition
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
        AND caller.file_path = 'identity/consumer.ts'
        AND callee.file_path = 'identity/constants.ts'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }
      - { row: { caller: "run", callee: "formatPrecision" } }

  - name: Imported constants do not create false call edges
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
        AND caller.file_path = 'no_false_call/main.ts'
        AND callee.file_path = 'no_false_call/constants.ts'
        AND callee.name = 'HTTP_STATUS_OK'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { empty: true }

  - name: Imported functions still call through while constants stay inert
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
        AND caller.file_path = 'no_false_call/main.ts'
        AND callee.file_path = 'no_false_call/constants.ts'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }
      - { row: { caller: "run", callee: "formatter" } }

  - name: Constructor, inferred member, and static method calls resolve
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
        AND caller.file_path = 'advanced/consumer.ts'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 5 }
      - { row: { caller: "process", callee: "Parser" } }
      - { row: { caller: "process", callee: "Parser::parse" } }
      - { row: { caller: "createParser", callee: "Parser::fromConfig" } }
      - { row: { caller: "runWithService", callee: "Parser::parse" } }
      - { row: { caller: "Parser::fromConfig", callee: "Parser" } }

  - name: Callback passing does not fabricate direct execution edges
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
        AND caller.file_path = 'advanced/consumer.ts'
        AND caller.fqn = 'mapItems'
        AND callee.fqn = 'transform'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { empty: true }

  - name: SSA branch merges preserve multiple candidate receiver types
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
        AND caller.file_path = 'ssa/branch.ts'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 4 }
      - { row: { caller: "pickParser", callee: "JsonParser" } }
      - { row: { caller: "pickParser", callee: "CsvParser" } }
      - { row: { caller: "pickParser", callee: "JsonParser::parse" } }
      - { row: { caller: "pickParser", callee: "CsvParser::parse" } }

  - name: SSA alias propagation preserves receiver type through local rebinding
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
        AND caller.file_path = 'ssa/alias.ts'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 2 }
      - { row: { caller: "aliasRun", callee: "Parser" } }
      - { row: { caller: "aliasRun", callee: "Parser::parse" } }

  - name: SSA loop exit preserves initial and loop-carried receiver types
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
        AND caller.file_path = 'ssa/loop.ts'
        AND callee.name = 'parse'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 2 }
      - { row: { caller: "loopRun", callee: "Parser::parse" } }
      - { row: { caller: "loopRun", callee: "SpecialParser::parse" } }

  - name: Namespace reexport member chains resolve to underlying static method
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
        AND caller.file_path = 'namespace_chain/consumer.ts'
        AND callee.file_path = 'namespace_chain/suggestions.ts'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 1 }
      - { row: { caller: "run", callee: "Suggestions::configure" } }

  - name: Default and namespace barrel exports both resolve through the barrel
    query: |
      MATCH (caller:Definition)-[e:DefinitionToDefinition]->(callee:Definition)
      WHERE e.edge_kind = 'Calls'
        AND caller.file_path = 'combo/consumer.ts'
      RETURN caller.fqn AS caller, callee.fqn AS callee
    assert:
      - { row_count: 2 }
      - { row: { caller: "runFormat", callee: "defaultFormat" } }
      - { row: { caller: "runToolkit", callee: "normalize" } }

  - name: Missing default and named exports stay unresolved
    query: |
      MATCH (i:ImportedSymbol)
      WHERE i.file_path = 'unresolved/main.ts'
        AND i.has_target = false
      RETURN i.import_type AS import_type, i.name AS name, i.has_target AS has_target
      ORDER BY import_type, name
    assert:
      - { row_count: 2 }
      - { row: { import_type: "DefaultImport", name: "default", has_target: false } }
      - { row: { import_type: "NamedImport", name: "missingNamed", has_target: false } }

  - name: Missing default and named export calls point at imported symbols
    query: |
      MATCH (caller:Definition)-[e:DefinitionToImportedSymbol]->(sym:ImportedSymbol)
      WHERE caller.file_path = 'unresolved/main.ts'
        AND e.edge_kind = 'Calls'
      RETURN caller.fqn AS caller, sym.import_type AS import_type, sym.name AS name
      ORDER BY import_type, name
    assert:
      - { row_count: 2 }
      - { row: { caller: "inspectImports", import_type: "DefaultImport", name: "default" } }
      - { row: { caller: "inspectImports", import_type: "NamedImport", name: "missingNamed" } }

  - name: External aliases preserve exact imported symbols
    query: |
      MATCH (caller:Definition)-[e:DefinitionToImportedSymbol]->(sym:ImportedSymbol)
      WHERE caller.file_path = 'unresolved/external_aliases.ts'
        AND e.edge_kind = 'Calls'
      RETURN DISTINCT caller.fqn AS caller, sym.path AS path, sym.name AS name, sym.alias AS alias
      ORDER BY path, alias
    assert:
      - { row_count: 3 }
      - { row: { caller: "inspectExternalAliases", path: "@external/analytics", name: "track", alias: "firstTrack" } }
      - { row: { caller: "inspectExternalAliases", path: "@external/analytics", name: "track", alias: "secondTrack" } }
      - { row: { caller: "inspectExternalAliases", path: "@external/tracking", name: null, alias: "Tracking" } }

  - name: Missing members on local namespace imports do not become external calls
    query: |
      MATCH (caller:Definition)-[e:DefinitionToImportedSymbol]->(sym:ImportedSymbol)
      WHERE caller.file_path = 'namespace_missing/main.ts'
        AND e.edge_kind = 'Calls'
      RETURN sym.path AS path, sym.name AS name
    assert:
      - { empty: true }

  - name: Ambiguous star reexports do not pick an arbitrary target
    query: |
      MATCH (i:ImportedSymbol)
      WHERE i.file_path = 'ambiguous/main.ts'
        AND i.name = 'shared'
        AND i.has_target = false
      RETURN i.name AS name, i.has_target AS has_target
    assert:
      - { row_count: 1 }
      - { row: { name: "shared", has_target: false } }
