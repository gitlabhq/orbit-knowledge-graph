name: "TypeScript (OXC pipeline) start_line is 1-indexed"

pipeline: js

fixtures:
  - path: lib/context_error.ts
    content: |
      export interface ContextError {
        ctx: string;
      }

      export const isContextError = (e: unknown): e is ContextError =>
        typeof e === 'object' && e !== null && 'ctx' in e;

      export function tag(e: unknown): string {
        return isContextError(e) ? e.ctx : 'unknown';
      }

      function privateHelper(): number {
        return 1;
      }

tests:
  - name: Exported interface is 1-indexed start and end on line 1
    query: |
      MATCH (d:Definition)
      WHERE d.file_path = 'lib/context_error.ts' AND d.fqn = 'ContextError'
      RETURN d.start_line AS sl, d.end_line AS el, d.start_char AS sc, d.end_char AS ec, d.definition_type AS dt
    assert:
      - { row_count: 1 }
      - { row: { sl: 1, el: 1, sc: 18, ec: 30, dt: "Interface" } }

  - name: Arrow-assigned const reports its declaration line (5), not the body
    query: |
      MATCH (d:Definition)
      WHERE d.file_path = 'lib/context_error.ts' AND d.fqn = 'isContextError'
      RETURN d.start_line AS sl
    assert:
      - { row_count: 1 }
      - { row: { sl: 5 } }

  - name: Exported function reports its declaration line (8)
    query: |
      MATCH (d:Definition)
      WHERE d.file_path = 'lib/context_error.ts' AND d.fqn = 'tag'
      RETURN d.start_line AS sl
    assert:
      - { row_count: 1 }
      - { row: { sl: 8 } }

  - name: Unexported function reports its declaration line (12)
    query: |
      MATCH (d:Definition)
      WHERE d.file_path = 'lib/context_error.ts' AND d.fqn = 'privateHelper'
      RETURN d.start_line AS sl
    assert:
      - { row_count: 1 }
      - { row: { sl: 12 } }
