# Central version pinning for e2e components.
# Chart versions used by helmfile.yaml.gotmpl, image versions by values/*.yaml.gotmpl.
# CI can override GKG image via E2E_GKG_IMAGE / E2E_GKG_TAG env vars.

siphon:
  chart: "1.10.0"
  image:
    # TEMP: pinned to a fork of siphon that bumps reconciler refresh-package
    # _siphon_replicated_at to greatest(now64, max+1us/2us) so reconciler-corrected
    # rows are visible to GKG indexer's incremental watermark scan.
    # Tracked in https://gitlab.com/gitlab-org/orbit/knowledge-graph/-/work_items/483
    repository: registry.gitlab.com/gitlab-org/orbit/knowledge-graph/siphon-test
    tag: "recon-fresh-ts-1"

gitlab:
  chart: "9.10.3-2450691409"
  # Git ref of `gitlab-org/gitlab` used to fetch SSOT siphon table definitions
  # (`db/siphon/tables/*.yml`) when running `scripts/sync-cdc-tables.sh`.
  # Should match the GitLab major.minor version baked into the chart above —
  # otherwise the generated `cdc-*.yaml` files reference tables/columns that
  # don't exist in the deployed PG schema.
  ref: "master"

gkg:
  chart: "0.18.1"
  image:
    repository: registry.gitlab.com/gitlab-org/orbit/knowledge-graph/gkg
    tag: "0.26.1"

nats:
  chart: "2.12.6"
