# Central version pinning for e2e components.
# Chart versions used by helmfile.yaml.gotmpl, image versions by values/*.yaml.gotmpl.
# CI can override GKG image via E2E_GKG_IMAGE / E2E_GKG_TAG env vars.

siphon:
  chart: "1.10.0"
  image:
    repository: registry.gitlab.com/gitlab-org/analytics-section/siphon
    tag: "0.0.100-beta"
gitlab:
  # Devel (nightly) chart from gitlab-devel/gitlab. The chart version,
  # gitlab-org/gitlab ref, and CNG image digests below are all bumped
  # together by scripts/bump-gitlab-pins.sh — run that script to catch up
  # to the current master. Pinning the chart alone is not enough because
  # every CNG image defaults to :master (a moving tag); the `images.*.digest`
  # entries force specific digests so every pod pulls identical rails code.
  chart: "10.0.2-2603915101"
  # Git ref of `gitlab-org/gitlab` used to fetch SSOT siphon table definitions
  # (`db/siphon/tables/*.yml`) when running `scripts/sync-cdc-tables.sh`.
  # Pinned to a master commit so siphon's view of the schema matches the
  # pinned CNG images.
  ref: "35e1865c3988d8bdb82d848a40f234bb6c88130c"
  # Per-component digest pins. Consumed by values/gitlab.yaml.gotmpl which
  # renders them as "master@<digest>" tags. Pinning every Rails-adjacent image
  # avoids version skew between webservice (Rails) and its workhorse sidecar:
  # the orbit-query payload contract changed shape on master, so an unpinned
  # `:master` workhorse can deserialize the pinned webservice's payload into
  # an empty Authorization header and silently 502.
  images:
    webservice:
      digest: "sha256:ecb1feebef71bcdb25db00c97b11a47324a80d237bf189c24fa96dc1d325f56e"
    workhorse:
      digest: "sha256:274a096ee9fa46f234e8f2adb0ac22d3f8375af9c3b19aa098bfe9cb799bd966"
    sidekiq:
      digest: "sha256:ffb96bd81b0ac643fa9819c27c5eb141d143b70fdf9d8e0e9e537bb33acdf791"
    toolbox:
      digest: "sha256:5958727b4cfd33fc84c0c245dfb687b91f7704b0404e8d75423dd8ba141b2d31"
gkg:
  chart: "0.24.0"
  image:
    repository: registry.gitlab.com/gitlab-org/orbit/knowledge-graph/gkg
    tag: "0.54.0"
nats:
  chart: "2.12.6"
postgresql:
  # bitnami/postgresql chart line that ships PG 17 (the version GitLab 19.0
  # will require — releasing 2026-05-21).
  chart: "16.7.27"
  image:
    # Bitnami's main registry switched to paid in Aug 2025; the legacy free
    # mirror still publishes the same tags.
    repository: bitnamilegacy/postgresql
    tag: "17.6.0-debian-12-r4"
redis:
  chart: "25.4.1"
  image:
    repository: bitnamilegacy/redis
    tag: "8.0.3-debian-12-r3"
