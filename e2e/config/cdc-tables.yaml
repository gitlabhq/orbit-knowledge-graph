# Single source of truth for CDC table definitions.
# Drives: PG publication (setup), siphon table_mapping/streams/dedup (helmfile).
tables:
  - name: projects
    dedup_by: [id]

  - name: namespaces
    dedup_by: [id]

  - name: namespace_details

  - name: routes
    dedup_by: [id]

  - name: users
    dedup_by: [id]
    ignore_columns:
      - confirmation_token
      - encrypted_otp_secret
      - encrypted_otp_secret_iv
      - encrypted_otp_secret_salt
      - encrypted_password
      - feed_token
      - incoming_email_token
      - otp_backup_codes
      - otp_secret
      - reset_password_token
      - static_object_token
      - static_object_token_encrypted
      - unlock_token

  - name: issues
    dedup_by: [id]
    dedup_by_table: work_items
    ignore_columns:
      - description_html
      - title_html

  - name: merge_requests
    dedup_by: [id]
    dedup_by_table: merge_requests
    ignore_columns:
      - description_html
      - title_html

  - name: labels
    dedup_by: [id]
    ignore_columns:
      - description_html

  - name: members
    dedup_by: [id]
    ignore_columns:
      - invite_token

  - name: knowledge_graph_enabled_namespaces
    dedup_by: [id]

  - name: issue_assignees
    dedup_by: [issue_id, user_id]

  - name: label_links
    dedup_by: [id]

  - name: merge_request_assignees
    dedup_by: [id]

  - name: merge_request_reviewers
    dedup_by: [id]

  - name: events

  - name: organizations

  - name: project_authorizations

  - name: merge_request_metrics
    dedup_by: [id]

  - name: merge_requests_closing_issues
    dedup_by: [id]

  - name: merge_request_diffs
    dedup_by: [id]
