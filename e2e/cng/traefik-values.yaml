# Traefik ingress controller for local GitLab
#
# Minimal config: listen on ports 80/443, serve as the default IngressClass.

ingressClass:
  enabled: true
  isDefaultClass: true

ports:
  web:
    expose:
      default: true
  websecure:
    expose:
      default: true

# Single replica for local dev
deployment:
  replicas: 1

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Disable dashboard in production, enable for local debug
ingressRoute:
  dashboard:
    enabled: false

logs:
  general:
    level: WARN
