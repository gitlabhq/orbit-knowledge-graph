apiVersion: v1
kind: Secret
metadata:
  name: gitlab-knowledge-graph-jwt
  namespace: {{ .Values.namespaces.gitlab }}
type: Opaque
stringData:
  knowledge_graph_jwt_shared_key: {{ .Values.secrets.jwtKey | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: gkg-grpc-ca
  namespace: {{ .Values.namespaces.gitlab }}
type: Opaque
data:
  gkg-grpc-ca.crt: {{ .Values.secrets.rootCABase64 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-clickhouse-password
  namespace: {{ .Values.namespaces.gitlab }}
type: Opaque
stringData:
  main_password: {{ .Values.secrets.chGitlabPass | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-gitlab-initial-root-password
  namespace: {{ .Values.namespaces.gitlab }}
type: Opaque
stringData:
  password: {{ .Values.secrets.gitlabRootPass | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-root-credentials
type: Opaque
stringData:
  password: {{ .Values.secrets.gitlabRootPass | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: gkg-secrets
type: Opaque
stringData:
  gitlab-jwt-verifying-key: {{ .Values.secrets.jwtKey | quote }}
  gitlab-jwt-signing-key: {{ .Values.secrets.jwtKey | quote }}
  datalake-password: {{ .Values.secrets.chDatalakePass | quote }}
  graph-password: {{ .Values.secrets.chGraphPass | quote }}
  graph-read-password: {{ .Values.secrets.chGraphReadPass | quote }}
---
# Default-user CH credentials. Used by robot tests to issue admin commands
# (SYSTEM RELOAD DICTIONARY) that flush stale negative-cache entries after
# creating new namespaces. Default user has CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1.
apiVersion: v1
kind: Secret
metadata:
  name: clickhouse-default-credentials
type: Opaque
stringData:
  password: {{ .Values.secrets.chDefaultPass | quote }}
