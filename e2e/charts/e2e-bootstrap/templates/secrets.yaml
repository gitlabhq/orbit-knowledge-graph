apiVersion: v1
kind: Secret
metadata:
  name: gitlab-knowledge-graph-jwt
  namespace: {{ .Values.namespaces.gitlab }}
type: Opaque
stringData:
  knowledge_graph_jwt_shared_key: {{ .Values.secrets.jwtKey | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: gkg-grpc-ca
  namespace: {{ .Values.namespaces.gitlab }}
type: Opaque
data:
  gkg-grpc-ca.crt: {{ .Values.secrets.rootCABase64 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-clickhouse-password
  namespace: {{ .Values.namespaces.gitlab }}
type: Opaque
stringData:
  main_password: {{ .Values.secrets.chGitlabPass | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-postgresql-password
  namespace: {{ .Values.namespaces.gitlab }}
type: Opaque
stringData:
  postgresql-password: {{ .Values.secrets.pgGitlabPass | quote }}
  postgresql-postgres-password: {{ .Values.secrets.pgPostgresPass | quote }}
  postgresql-replication-password: {{ .Values.secrets.pgReplicationPass | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-redis-password
  namespace: {{ .Values.namespaces.gitlab }}
type: Opaque
stringData:
  redis-password: {{ .Values.secrets.redisPass | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-gitlab-initial-root-password
  namespace: {{ .Values.namespaces.gitlab }}
type: Opaque
stringData:
  password: {{ .Values.secrets.gitlabRootPass | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: gkg-secrets
type: Opaque
stringData:
  gitlab-jwt-verifying-key: {{ .Values.secrets.jwtKey | quote }}
  gitlab-jwt-signing-key: {{ .Values.secrets.jwtKey | quote }}
  datalake-password: {{ .Values.secrets.chDatalakePass | quote }}
  graph-password: {{ .Values.secrets.chGraphPass | quote }}
  graph-read-password: {{ .Values.secrets.chGraphReadPass | quote }}
