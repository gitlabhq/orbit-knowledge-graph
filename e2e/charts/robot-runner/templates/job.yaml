apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: {{ .Values.ttlSecondsAfterFinished }}
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: robot
        image: {{ .Values.image }}
        command: ["sh", "-c"]
        args:
        - |
          set -e
          apt-get update -qq && apt-get install -qq -y --no-install-recommends \
            git ca-certificates >/dev/null
          mkdir -p /fixtures
          tar xzf /fixtures-archive/fixtures.tar.gz -C /fixtures
          pip install --quiet --disable-pip-version-check --root-user-action=ignore \
            robotframework=={{ .Values.robotframework.version }} \
            robotframework-requests=={{ .Values.robotframework.requestsVersion }}
          set +e
          robot ${ROBOT_OPTIONS} --outputdir /tmp/results --xunit /tmp/results/xunit.xml \
            --consolecolors off --exitonfailure /tests/
          RC=$?
          echo "---XUNIT_REPORT_START---"
          cat /tmp/results/xunit.xml 2>/dev/null
          echo "---XUNIT_REPORT_END---"
          exit $RC
        env:
        - name: GITLAB_URL
          value: "http://gitlab-webservice-default.{{ .Values.namespaces.gitlab }}.svc.cluster.local:8181"
        - name: GITLAB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.rootCredentialsSecret }}
              key: password
        - name: ROBOT_OPTIONS
          value: {{ .Values.robotOptions | quote }}
        - name: ROLE_SCOPED_AUTHZ_E2E
          value: {{ .Values.roleScopedAuthz.enabled | quote }}
        - name: RAILS_RUNNER_CMD
          value: {{ .Values.roleScopedAuthz.railsRunnerCmd | quote }}
        - name: ROLE_SCOPED_AUTHZ_SEED
          value: {{ .Values.roleScopedAuthz.seedPath | quote }}
        - name: ROLE_SCOPED_AUTHZ_TOUCH
          value: {{ .Values.roleScopedAuthz.touchPath | quote }}
        volumeMounts:
        - name: tests
          mountPath: /tests
          readOnly: true
        - name: fixtures
          mountPath: /fixtures-archive
          readOnly: true
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      volumes:
      - name: tests
        configMap:
          name: {{ .Values.configMap }}
      - name: fixtures
        configMap:
          name: {{ .Values.fixturesConfigMap }}
