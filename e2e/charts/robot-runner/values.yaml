image: python:3.12-slim

robotframework:
  version: "7.2.2"
  requestsVersion: "0.9.7"
  pabotVersion: "5.2.2"
  processes: 8

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi

namespaces:
  gitlab: ""
  gkg: ""

configMap: e2e-robot-tests
fixturesConfigMap: e2e-robot-fixtures
rootPatSecret: gitlab-root-pat
rootPatSecretNamespace: ""
rootPatSecretKey: pat
ttlSecondsAfterFinished: 600
