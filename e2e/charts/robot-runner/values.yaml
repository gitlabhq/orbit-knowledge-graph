image: python:3.12-slim

robotframework:
  version: "7.2.2"
  requestsVersion: "0.9.7"

robotOptions: "--exclude requires_rails_kg_authz"

roleScopedAuthz:
  enabled: "false"
  railsRunnerCmd: ""
  seedPath: "/fixtures/rails/role_scoped_authz_seed.rb"
  touchPath: "/fixtures/rails/role_scoped_authz_touch.rb"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

namespaces:
  gitlab: ""
  gkg: ""

configMap: e2e-robot-tests
fixturesConfigMap: e2e-robot-fixtures
rootCredentialsSecret: gitlab-root-credentials
ttlSecondsAfterFinished: 600
