image: python:3.12-slim

robotframework:
  version: "7.2.2"
  requestsVersion: "0.9.7"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

namespaces:
  gitlab: ""
  gkg: ""
  clickhouse: ""

configMap: e2e-robot-tests
rootCredentialsSecret: gitlab-root-credentials
clickhouseCredentialsSecret: clickhouse-default-credentials
ttlSecondsAfterFinished: 600
