run:
  name: orbit-vs-glab-baseline
  version: "0.1.0"
  concurrency: 4

  tasks:
    paths:
      - tasks/*.yaml
    filter:
      ids:
        - mr-count-by-project
      categories: []
      min_difficulty: easy

  scoring:
    fixtures_path: fixtures

  timeouts:
    task: 45
    server_start: 30

arms:
  - name: orbit
    agent: orbit
    skills:
      - orbit-query
    env:
      GITLAB_TOKEN: ${GITLAB_TOKEN}
      GITLAB_HOST: ${GITLAB_HOST}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    model:
      provider: anthropic
      model: claude-haiku-4-5
    port: 4096

  - name: glab
    agent: glab
    skills:
      - glab-data
    env:
      GITLAB_TOKEN: ${GITLAB_TOKEN}
      GITLAB_HOST: ${GITLAB_HOST}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    model:
      provider: anthropic
      model: claude-haiku-4-5
    port: 4097

evaluators:
  - graph
  - efficiency
  - behavior

aggregators:
  - descriptive
  - comparative
  - distributional
