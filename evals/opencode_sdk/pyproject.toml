[project]
name = "opencode-sdk"
version = "0.0.0"
description = "Generated Python client for the OpenCode HTTP API"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.20",
    "attrs>=21.3.0",
    "python-dateutil>=2.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
