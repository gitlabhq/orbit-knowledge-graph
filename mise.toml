[env]
# Path to Gitaly repository for proto compilation (gitaly-client crate)
# Adjust if your GDK is in a different location
GITALY_PROTO_ROOT = "~/gitlab/gdk/gitaly"

[tools]
"rust" = { version = "1.93.0", components = "rustfmt,clippy" }
"cargo:cargo-nextest" = "0.9.123"
"cargo:cargo-edit" = "0.13.8"
"cargo:cargo-audit" = "0.22.0"
"cargo:cargo-deny" = "0.19.0"
"cargo:cargo-geiger" = "0.13.0"
"cargo:cargo-cyclonedx" = "0.5.7"
"sccache" = "0.13.0"
"tilt" = "0.36.1"
clickhouse = "latest"
uv = "latest"

[tasks.build]
run = "cargo build --release"
description = "Build the crates"

[tasks.test]
run = "cargo nextest run --lib --bins"
description = "Run unit tests, requires nextest"

[tasks."test:integration"]
run = "cargo nextest run --all-features --test '*' -j 1"
# For Colima users: env = { DOCKER_HOST = "unix://{{env.HOME}}/.colima/default/docker.sock" }
description = "Run integration tests (requires Docker)"

[tasks.clean]
run = [
    "cargo clean",
    "rm -rf lib/*/"
]
description = "Clean the crates"

[tasks.lint]
run = "cargo clippy --all-targets --all-features -- -D warnings"
description = "Run clippy lint checks"

[tasks."lint:fix"]
run = ["cargo fmt", "cargo clippy --all-targets --all-features --fix --allow-dirty -- -D warnings", "cargo fmt"]
description = "Run clippy lint checks and fix applicable issues"

[tasks."fix:newlines"]
run = "gitlab-xtasks lint verify-newlines --file-extensions rs,md,yml,yaml,toml,astro,js,ts,json,mdx,vue,rb,css,mjs --directory . --fix"
description = "Fix newlines formatting in the codebase"

[tasks."local:index:repo"]
run = 'cargo run --release --bin gkg -- index ${usage_repo_path?} --stats'
description = "Index a local repository"
usage = 'arg "<repo_path>"'

[tasks."perf:gtime"]
run = "./scripts/devtools/gtime.sh"

[tasks."perf:rss"]
run = './scripts/devtools/average_rss.sh ${usage_repo_path?} ${usage_interval:-0.025}'
description = "Measure average RSS memory usage during indexing"
usage = '''
arg "<repo_path>"
arg "[interval]" default="0.025" help="Sampling interval in seconds"
'''

[tasks."ontology:validate"]
run = "find fixtures/ontology -name '*.yaml' ! -name 'reference.yaml' | xargs uvx check-jsonschema --verbose --schemafile fixtures/ontology/ontology.schema.json"
description = "Validate ontology YAML files against JSON schema"

