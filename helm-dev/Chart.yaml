apiVersion: v2
name: gkg-sandbox
description: Knowledge Graph sandbox deployment with NATS, Siphon producer and consumer
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: gitlab-runner
    version: "0.85.0"
    repository: "https://charts.gitlab.io"
    condition: gitlab-runner.enabled
  - name: nats
    version: "1.3.16"
    repository: "https://nats-io.github.io/k8s/helm/charts/"
    condition: nats.enabled
  - name: kube-prometheus-stack
    version: "81.2.2"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: observability.enabled
  - name: loki
    version: "6.51.0"
    repository: "https://grafana.github.io/helm-charts"
    condition: observability.loki.enabled
