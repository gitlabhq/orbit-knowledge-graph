# Local development values for use with Tilt
# PostgreSQL and ClickHouse run on host machine (GDK), siphon services disabled

# Disable GCP integration
gcp:
  project: ""
  region: ""
  cluster: ""

# Use local secrets from values instead of GCP Secrets Manager
secrets:
  enabled: false

# Disable GitLab Runner for local dev
gitlab-runner:
  enabled: false

# PostgreSQL on host machine (GDK)
postgres:
  host: host.docker.internal
  port: 5432
  database: gitlabhq_development
  user: gitlab

# ClickHouse on host machine (GDK)
clickhouse:
  datalake:
    host: host.docker.internal
    port: 9000
    database: gitlab_clickhouse_main_development
    user: default
    ssl: false
  graph:
    host: host.docker.internal
    port: 9000
    database: gkg-development
    user: default
    ssl: false

# NOTE: Secrets are managed by Tilt from .tilt-secrets file.
# See .tilt-secrets.example in the repo root.

# GKG Server components
gkgServer:
  image:
    repository: gkg-server
    tag: dev
    pullPolicy: Never
  indexer:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  webserver:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# NATS JetStream (using official chart)
nats:
  enabled: true
  config:
    jetstream:
      enabled: true
      fileStore:
        enabled: true
        pvc:
          enabled: true
          size: 1Gi
  container:
    image:
      repository: nats
      tag: "2.10-alpine"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  natsBox:
    enabled: false

# Siphon image (not used when producer/consumer disabled)
siphon:
  image:
    repository: registry.gitlab.com/gitlab-org/analytics-section/siphon
    tag: "0.0.25-beta"
    pullPolicy: Always

# No table mappings needed when siphon is disabled
tableMappings: []

# Disable siphon producer (managed by GDK)
producer:
  enabled: false
  applicationIdentifier: ""
  publicationName: ""
  slotName: ""
  advisoryLockId: 144324
  maxColumnSizeBytes: 8000000
  memoryBufferSize: 104857600
  logLevel: info
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

# Disable siphon consumer (managed by GDK)
consumer:
  enabled: false
  applicationIdentifier: ""
  replicas: 1
  logLevel: info
  insertBatchSize: 10000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

# Observability stack for local development
observability:
  enabled: true
  grafana:
    ingress:
      enabled: false
  loki:
    enabled: true
  alloy:
    enabled: true

# Prometheus + Grafana (local config with simple auth)
kube-prometheus-stack:
  enabled: true
  crds:
    enabled: false
  prometheus:
    prometheusSpec:
      retention: 1d
      enableRemoteWriteReceiver: true
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
  alertmanager:
    enabled: false
  grafana:
    adminPassword: admin
    defaultDashboardsEnabled: true
    grafana.ini:
      auth:
        disable_login_form: false
      security:
        disable_initial_admin_password_change: true
      dashboards:
        default_home_dashboard_path: /tmp/dashboards/gkg-overview.json
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://gkg-loki:3100
        access: proxy
        isDefault: false
    service:
      type: NodePort
      nodePort: 30300
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

# Loki for local log aggregation
loki:
  enabled: true
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    memberlist:
      join_members: []
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
  singleBinary:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  gateway:
    enabled: false
  memberlist:
    service:
      enabled: false
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  lokiCanary:
    enabled: false
  test:
    enabled: false

# Alloy for log collection and OTEL metrics
alloy:
  alloy:
    clustering:
      enabled: false
    configMap:
      create: true
      content: |
        // Kubernetes pod discovery
        discovery.kubernetes "pods" {
          role = "pod"
        }

        // Relabel to filter only gkg pods
        discovery.relabel "gkg_pods" {
          targets = discovery.kubernetes.pods.targets

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            regex = "{{ .Release.Namespace }}"
            action = "keep"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            regex = "(gkg-indexer|gkg-webserver)"
            action = "keep"
          }

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label = "namespace"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label = "pod"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            target_label = "component"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label = "container"
          }
        }

        // Process JSON logs
        loki.process "json" {
          forward_to = [loki.write.default.receiver]

          stage.json {
            expressions = {
              level = "level",
              message = "message",
            }
          }

          stage.labels {
            values = {
              level = "",
            }
          }
        }

        // Collect logs from pods
        loki.source.kubernetes "pods" {
          targets    = discovery.relabel.gkg_pods.output
          forward_to = [loki.process.json.receiver]
        }

        // Write logs to Loki
        loki.write "default" {
          endpoint {
            url = "http://gkg-loki:3100/loki/api/v1/push"
          }
        }

        // OTEL receiver for metrics
        otelcol.receiver.otlp "default" {
          grpc {
            endpoint = "0.0.0.0:4317"
          }
          http {
            endpoint = "0.0.0.0:4318"
          }

          output {
            metrics = [otelcol.processor.batch.default.input]
          }
        }

        // Batch processor for efficiency
        otelcol.processor.batch "default" {
          output {
            metrics = [otelcol.exporter.prometheus.default.input]
          }
        }

        // Export metrics to Prometheus
        otelcol.exporter.prometheus "default" {
          forward_to = [prometheus.remote_write.default.receiver]
        }

        // Remote write to Prometheus
        prometheus.remote_write "default" {
          endpoint {
            url = "http://gkg-kube-prometheus-stack-prometheus:9090/api/v1/write"
          }
        }
    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
      - name: otlp-http
        port: 4318
        targetPort: 4318
        protocol: TCP
  controller:
    type: daemonset
  serviceAccount:
    create: true
  rbac:
    create: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
