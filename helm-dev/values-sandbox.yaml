# GCP Configuration
gcp:
  project: gl-knowledgegraph-prj-f2eec59d
  region: us-central1
  cluster: knowledge-graph-test

# Secrets Configuration (External Secrets Operator)
secrets:
  enabled: true
  gcpServiceAccount: gkg-secrets-sa@gl-knowledgegraph-prj-f2eec59d.iam.gserviceaccount.com
  postgresSecretName: postgres-password
  clickhouseSecretName: clickhouse-password
  runnerTokenSecretName: runner_authentication_token

# GitLab Runner Configuration (subchart)
gitlab-runner:
  enabled: true
  gitlabUrl: https://gitlab.gkg.dev
  unregisterRunners: true
  concurrent: 10
  rbac:
    create: true
  runners:
    secret: gitlab-runner-token
    config: |
      [[runners]]
        [runners.kubernetes]
          namespace = "{{.Release.Namespace}}"
          image = "alpine:latest"
          helper_image = "registry.gitlab.com/gitlab-org/gitlab-runner/gitlab-runner-helper:x86_64-v18.8.0"

# PostgreSQL Configuration (GitLab Omnibus VM)
postgres:
  host: 10.128.0.4
  port: 5432
  database: gitlabhq_production
  user: gitlab

# ClickHouse Configuration (ClickHouse VM)
clickhouse:
  datalake:
    host: 10.128.0.13
    port: 9000
    database: gitlab_clickhouse_main_production
    user: default
    ssl: false
  graph:
    host: 10.128.0.13
    port: 9000
    database: gkg-sandbox
    user: default
    ssl: false

# NATS Configuration (using official nats-io helm chart)
nats:
  enabled: true
  streamName: gkg_replication
  config:
    jetstream:
      enabled: true
      fileStore:
        enabled: true
        pvc:
          enabled: true
          size: 10Gi
  container:
    image:
      repository: nats
      tag: "2.10-alpine"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  natsBox:
    enabled: false

# Siphon Image Configuration
siphon:
  image:
    repository: registry.gitlab.com/gitlab-org/analytics-section/siphon
    tag: "0.0.25-beta"
    pullPolicy: Always

# Table Mappings (shared between producer and consumer)
tableMappings:
  - table: projects
    schema: public
    subject: projects
    target: siphon_projects
  - table: namespaces
    schema: public
    subject: namespaces
    target: siphon_namespaces
  - table: users
    schema: public
    subject: users
    target: siphon_users

# Producer Configuration
producer:
  enabled: true
  applicationIdentifier: gkg-producer
  publicationName: gkg_publication
  slotName: gkg_slot
  advisoryLockId: 144324
  maxColumnSizeBytes: 8000000
  memoryBufferSize: 104857600
  logLevel: info
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

# Consumer Configuration
consumer:
  enabled: true
  applicationIdentifier: gkg-consumer
  replicas: 1
  logLevel: info
  insertBatchSize: 10000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

# Observability stack for sandbox
observability:
  enabled: true
  grafana:
    ingress:
      enabled: true
      host: grafana.gkg.dev
  loki:
    enabled: true
  alloy:
    enabled: true

# Prometheus + Grafana with Google OAuth
kube-prometheus-stack:
  enabled: true
  crds:
    enabled: false
  # Disable components incompatible with GKE Autopilot
  nodeExporter:
    enabled: false
  kubeApiServer:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false
  kubeEtcd:
    enabled: false
  kubelet:
    enabled: false
  coreDns:
    enabled: false
  # Reduce chart size for helm secrets limit
  defaultRules:
    create: true
    rules:
      alertmanager: false
      etcd: false
      configReloaders: false
      general: false
      kubeApiserverAvailability: false
      kubeApiserverBurnrate: false
      kubeApiserverHistogram: false
      kubeApiserverSlos: false
      kubeControllerManager: false
      kubeProxy: false
      kubeScheduler: false
      kubeStateMetrics: false
      kubelet: false
      network: false
      node: false
      nodeExporterAlerting: false
      nodeExporterRecording: false
      prometheus: false
      prometheusOperator: false
  prometheus:
    prometheusSpec:
      retention: 15d
      enableRemoteWriteReceiver: true
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: standard-rwo
            resources:
              requests:
                storage: 50Gi
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1
          memory: 2Gi
  alertmanager:
    enabled: true
  grafana:
    defaultDashboardsEnabled: true
    envFromSecret: grafana-oauth-credentials
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://gkg-sandbox-loki:3100
        access: proxy
        isDefault: false
    grafana.ini:
      server:
        root_url: https://grafana.gkg.dev
      auth:
        disable_login_form: true
      dashboards:
        default_home_dashboard_path: /tmp/dashboards/gkg-overview.json
      auth.google:
        enabled: true
        allow_sign_up: true
        skip_org_role_sync: false
        scopes: openid email profile
        auth_url: https://accounts.google.com/o/oauth2/v2/auth
        token_url: https://oauth2.googleapis.com/token
        api_url: https://openidconnect.googleapis.com/v1/userinfo
        allowed_domains: gitlab.com
        role_attribute_path: "contains(['musachenko@gitlab.com','bparkhomchuk@gitlab.com','jgdoyon@gitlab.com','arivera@gitlab.com'], email) && 'Admin' || 'Viewer'"
      auth.gitlab:
        enabled: true
        allow_sign_up: true
        skip_org_role_sync: false
        scopes: openid email profile
        auth_url: https://gitlab.com/oauth/authorize
        token_url: https://gitlab.com/oauth/token
        api_url: https://gitlab.com/api/v4
        allowed_domains: gitlab.com
        allowed_groups: gitlab-com
        role_attribute_path: "contains(groups[*], 'gitlab-com') && 'Admin' || 'Viewer'"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# Alloy for log collection and OTEL metrics
alloy:
  alloy:
    clustering:
      enabled: false
    configMap:
      create: true
      content: |
        // Kubernetes pod discovery
        discovery.kubernetes "pods" {
          role = "pod"
        }

        // Relabel to filter only gkg and siphon pods
        discovery.relabel "gkg_pods" {
          targets = discovery.kubernetes.pods.targets

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            regex = "{{ .Release.Namespace }}"
            action = "keep"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            regex = "(gkg-indexer|gkg-webserver|siphon-producer|siphon-consumer)"
            action = "keep"
          }

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label = "namespace"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label = "pod"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            target_label = "component"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label = "container"
          }
        }

        // Process JSON logs
        loki.process "json" {
          forward_to = [loki.write.default.receiver]

          stage.json {
            expressions = {
              level = "level",
              message = "message",
            }
          }

          stage.labels {
            values = {
              level = "",
            }
          }
        }

        // Collect logs from pods
        loki.source.kubernetes "pods" {
          targets    = discovery.relabel.gkg_pods.output
          forward_to = [loki.process.json.receiver]
        }

        // Write logs to Loki
        loki.write "default" {
          endpoint {
            url = "http://gkg-sandbox-loki:3100/loki/api/v1/push"
          }
        }

        // OTEL receiver for metrics
        otelcol.receiver.otlp "default" {
          grpc {
            endpoint = "0.0.0.0:4317"
          }
          http {
            endpoint = "0.0.0.0:4318"
          }

          output {
            metrics = [otelcol.processor.batch.default.input]
          }
        }

        // Batch processor for efficiency
        otelcol.processor.batch "default" {
          output {
            metrics = [otelcol.exporter.prometheus.default.input]
          }
        }

        // Export metrics to Prometheus
        otelcol.exporter.prometheus "default" {
          forward_to = [prometheus.remote_write.default.receiver]
        }

        // Remote write to Prometheus
        prometheus.remote_write "default" {
          endpoint {
            url = "http://gkg-sandbox-kube-prometheus-prometheus:9090/api/v1/write"
          }
        }
    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
      - name: otlp-http
        port: 4318
        targetPort: 4318
        protocol: TCP
  controller:
    type: daemonset
  serviceAccount:
    create: true
  rbac:
    create: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Loki for log aggregation
loki:
  enabled: true
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 20Gi
      storageClass: standard-rwo
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  gateway:
    enabled: false
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  lokiCanary:
    enabled: false
  test:
    enabled: false
