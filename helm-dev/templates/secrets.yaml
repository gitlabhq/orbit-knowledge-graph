{{- if .Values.secrets.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gcp-secrets-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.labels" . | nindent 4 }}
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.secrets.gcpServiceAccount }}
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-secret-store
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.labels" . | nindent 4 }}
spec:
  provider:
    gcpsm:
      projectID: {{ .Values.gcp.project }}
      auth:
        workloadIdentity:
          clusterLocation: {{ .Values.gcp.region }}
          clusterName: {{ .Values.gcp.cluster }}
          clusterProjectID: {{ .Values.gcp.project }}
          serviceAccountRef:
            name: gcp-secrets-sa
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: postgres-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.secrets.postgresSecretName }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: clickhouse-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: clickhouse-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.secrets.clickhouseSecretName }}
{{- if index .Values "gitlab-runner" "enabled" }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-runner-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: gitlab-runner-token
    creationPolicy: Owner
    template:
      data:
        runner-token: "{{ "{{" }} .runnerToken {{ "}}" }}"
        runner-registration-token: ""
  data:
    - secretKey: runnerToken
      remoteRef:
        key: {{ .Values.secrets.runnerTokenSecretName }}
{{- end }}
{{- if and .Values.observability.enabled .Values.observability.grafana.ingress.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oauth-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: grafana-oauth-credentials
    creationPolicy: Owner
  data:
    - secretKey: GF_AUTH_GOOGLE_CLIENT_ID
      remoteRef:
        key: grafana-oauth-client-id
    - secretKey: GF_AUTH_GOOGLE_CLIENT_SECRET
      remoteRef:
        key: grafana-oauth-client-secret
    - secretKey: GF_AUTH_GITLAB_CLIENT_ID
      remoteRef:
        key: grafana-gitlab-oauth-client-id
    - secretKey: GF_AUTH_GITLAB_CLIENT_SECRET
      remoteRef:
        key: grafana-gitlab-oauth-client-secret
{{- end }}
{{- end }}
