# Default values for gkg chart

gcp:
  project: ""
  region: ""
  cluster: ""

secrets:
  enabled: true
  gcpServiceAccount: ""
  postgresSecretName: postgres-password
  clickhouseSecretName: clickhouse-password
  runnerTokenSecretName: runner_authentication_token
  jwtSecretName: ""

postgres:
  host: ""
  port: 5432
  database: ""
  user: ""

clickhouse:
  datalake:
    host: ""
    port: 9000
    database: ""
    user: default
    ssl: false
  graph:
    host: ""
    port: 9000
    database: ""
    user: default
    ssl: false

gitlab:
  enabled: false
  baseUrl: ""

nats:
  enabled: true
  url: ""  # External NATS URL when enabled=false (e.g., host.docker.internal:4222)
  streamName: ""
  consumerName: "gkg-indexer"  # Durable consumer name so messages survive pod restarts
  config:
    jetstream:
      enabled: true
      fileStore:
        enabled: true
        pvc:
          enabled: true
          size: 10Gi
  container:
    image:
      repository: nats
      tag: "2.11-alpine"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  natsBox:
    enabled: false

siphon:
  image:
    repository: registry.gitlab.com/gitlab-org/analytics-section/siphon
    tag: "latest"
    pullPolicy: Always

tableMappings: []

producer:
  enabled: true
  applicationIdentifier: ""
  publicationName: ""
  slotName: ""
  advisoryLockId: 144324
  maxColumnSizeBytes: 8000000
  memoryBufferSize: 104857600
  initialDataSnapshotThreadsPerTable: 3
  snapshotMemoryBufferSize: 10485760
  logLevel: info
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

consumer:
  enabled: true
  applicationIdentifier: ""
  replicas: 1
  logLevel: info
  insertBatchSize: 10000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

engine:
  max_concurrent_workers: 16
  concurrency_groups:
    sdlc: 12
    code: 4
  handlers:
    global_handler:
      concurrency_group: sdlc
      max_attempts: 1  # re-dispatched every minute, no need to retry
      retry_interval_secs: 60
    namespace_handler:
      concurrency_group: sdlc
      max_attempts: 1  # re-dispatched every minute, no need to retry
      retry_interval_secs: 60
    code_indexing_task:
      concurrency_group: code
      max_attempts: 5  # event-driven, must retry to avoid data loss
      retry_interval_secs: 60
      events_stream_name: siphon_stream_main_db

schedule:
  tasks:
    global: {}
    namespace: {}
    namespace_code_backfill: {}

gkgServer:
  image:
    repository: ""
    tag: ""
    pullPolicy: Always
  dispatcher:
    enabled: false
    schedule: "* * * * *"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  indexer:
    enabled: false
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  webserver:
    enabled: false
    replicas: 1
    internalLoadBalancer: false
    loadBalancerIP: ""
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  healthCheck:
    enabled: false
    replicas: 1
    namespace: ""  # defaults to release namespace
    services:
      - siphon-consumer
      - siphon-producer
      - gkg-indexer
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

# OTEL configuration for telemetry
otel:
  enabled: false
  endpoint: ""

# GitLab Runner subchart defaults
gitlab-runner:
  enabled: false
