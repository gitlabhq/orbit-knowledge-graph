# Default values for gkg chart

gcp:
  project: ""
  region: ""
  cluster: ""

secrets:
  enabled: true
  gcpServiceAccount: ""
  postgresSecretName: postgres-password
  clickhouseSecretName: clickhouse-password
  runnerTokenSecretName: runner_authentication_token
  jwtSecretName: ""

postgres:
  host: ""
  port: 5432
  database: ""
  user: ""

clickhouse:
  datalake:
    host: ""
    port: 9000
    database: ""
    user: default
    ssl: false
  graph:
    host: ""
    port: 9000
    database: ""
    user: default
    ssl: false

nats:
  enabled: true
  url: ""  # External NATS URL when enabled=false (e.g., host.docker.internal:4222)
  streamName: ""
  config:
    jetstream:
      enabled: true
      fileStore:
        enabled: true
        pvc:
          enabled: true
          size: 10Gi
  container:
    image:
      repository: nats
      tag: "2.10-alpine"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  natsBox:
    enabled: false

siphon:
  image:
    repository: registry.gitlab.com/gitlab-org/analytics-section/siphon
    tag: "latest"
    pullPolicy: Always

tableMappings: []

producer:
  enabled: true
  applicationIdentifier: ""
  publicationName: ""
  slotName: ""
  advisoryLockId: 144324
  maxColumnSizeBytes: 8000000
  memoryBufferSize: 104857600
  logLevel: info
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

consumer:
  enabled: true
  applicationIdentifier: ""
  replicas: 1
  logLevel: info
  insertBatchSize: 10000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

gkgServer:
  image:
    repository: ""
    tag: ""
    pullPolicy: Always
  dispatcher:
    enabled: false
    schedule: "* * * * *"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  indexer:
    enabled: false
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  webserver:
    enabled: false
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  healthCheck:
    enabled: false
    replicas: 1
    namespace: ""  # defaults to release namespace
    services:
      - siphon-consumer
      - siphon-producer
      - gkg-indexer
      - nats
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

# OTEL configuration for telemetry
otel:
  enabled: false
  endpoint: ""

# GitLab Runner subchart defaults
gitlab-runner:
  enabled: false
