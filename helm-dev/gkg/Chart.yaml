apiVersion: v2
name: gkg
description: GitLab Knowledge Graph - indexer, webserver, and data pipeline
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: gitlab-runner
    version: "0.85.0"
    repository: "https://charts.gitlab.io"
    condition: gitlab-runner.enabled
  - name: nats
    version: "1.3.16"
    repository: "https://nats-io.github.io/k8s/helm/charts/"
    condition: nats.enabled
