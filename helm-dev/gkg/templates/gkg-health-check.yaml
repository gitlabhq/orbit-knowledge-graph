{{- if and .Values.gkgServer .Values.gkgServer.healthCheck .Values.gkgServer.healthCheck.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gkg-health-check-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "gkg-health-check") | nindent 4 }}
data:
  default.yaml: |
    health_check:
      bind_address: "0.0.0.0:4201"
      namespace: {{ .Values.gkgServer.healthCheck.namespace | default .Release.Namespace | quote }}
      services:
        {{- range (.Values.gkgServer.healthCheck.services | default (list "siphon-consumer" "siphon-producer" "gkg-indexer" "nats")) }}
        - {{ . | quote }}
        {{- end }}
    graph:
      {{- include "gkg.clickhouseConfig" (dict "config" .Values.clickhouse.graph) | nindent 6 }}
    {{- if .Values.otel.enabled }}
    metrics:
      otlp_endpoint: {{ .Values.otel.endpoint | quote }}
      service_name: "gkg-health-check"
    {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gkg-health-check
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "gkg-health-check") | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gkg-health-check
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "gkg-health-check") | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gkg-health-check
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "gkg-health-check") | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: gkg-health-check
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: gkg-health-check
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gkg-health-check
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "gkg-health-check") | nindent 4 }}
spec:
  replicas: {{ .Values.gkgServer.healthCheck.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "gkg.componentSelectorLabels" (dict "root" . "component" "gkg-health-check") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gkg.componentSelectorLabels" (dict "root" . "component" "gkg-health-check") | nindent 8 }}
      annotations:
        checksum/config: {{ toJson .Values.clickhouse.graph | sha256sum }}-{{ toJson .Values.gkgServer.healthCheck | sha256sum }}-{{ toJson .Values.otel | sha256sum }}
    spec:
      enableServiceLinks: false
      serviceAccountName: gkg-health-check
      securityContext:
        {{- include "gkg.podSecurityContext" . | nindent 8 }}
      containers:
        - name: gkg-health-check
          image: "{{ .Values.gkgServer.image.repository }}:{{ .Values.gkgServer.image.tag }}"
          imagePullPolicy: {{ .Values.gkgServer.image.pullPolicy }}
          args:
            - "--mode=health-check"
          ports:
            - name: http
              containerPort: 4201
              protocol: TCP
          env:
            - name: LOG_FORMAT
              value: "json"
            - name: RUST_LOG
              value: {{ .Values.gkgServer.logLevel | default "info" | quote }}
            {{- include "gkg.clickhouseSecretEnv" (dict "prefix" "GRAPH" "secretName" "clickhouse-credentials") | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            {{- include "gkg.securityContext" . | nindent 12 }}
          resources:
            {{- toYaml .Values.gkgServer.healthCheck.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: gkg-health-check-config
---
apiVersion: v1
kind: Service
metadata:
  name: gkg-health-check
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "gkg-health-check") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 4201
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "gkg.componentSelectorLabels" (dict "root" . "component" "gkg-health-check") | nindent 4 }}
{{- end }}
