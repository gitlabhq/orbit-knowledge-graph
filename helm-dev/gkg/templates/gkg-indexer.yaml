{{- if and .Values.gkgServer .Values.gkgServer.indexer .Values.gkgServer.indexer.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: gkg-indexer-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "gkg-indexer") | nindent 4 }}
data:
  default.yaml: |
    nats:
      url: {{ include "gkg.natsUrl" . | quote }}
      consumer_name: {{ .Values.nats.consumerName | default "gkg-indexer" | quote }}
    datalake:
      {{- include "gkg.clickhouseConfig" (dict "config" .Values.clickhouse.datalake) | nindent 6 }}
    graph:
      {{- include "gkg.clickhouseConfig" (dict "config" .Values.clickhouse.graph) | nindent 6 }}
    {{- if .Values.gitlab.enabled }}
    gitlab:
      base_url: {{ .Values.gitlab.baseUrl | quote }}
    {{- end }}
    {{- if .Values.otel.enabled }}
    metrics:
      otlp_endpoint: {{ .Values.otel.endpoint | quote }}
      service_name: "gkg-indexer"
    {{- end }}
    {{- if .Values.engine }}
    engine:
      {{- toYaml .Values.engine | nindent 6 }}
    {{- end }}
    {{- if .Values.modules }}
    modules:
      {{- toYaml .Values.modules | nindent 6 }}
    {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gkg-indexer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "gkg-indexer") | nindent 4 }}
spec:
  replicas: {{ .Values.gkgServer.indexer.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "gkg.componentSelectorLabels" (dict "root" . "component" "gkg-indexer") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gkg.componentSelectorLabels" (dict "root" . "component" "gkg-indexer") | nindent 8 }}
      annotations:
        checksum/config: {{ toJson .Values.clickhouse | sha256sum }}-{{ toJson .Values.nats | sha256sum }}-{{ toJson .Values.gitlab | sha256sum }}-{{ toJson .Values.otel | sha256sum }}-{{ toJson .Values.engine | sha256sum }}-{{ toJson .Values.modules | sha256sum }}
    spec:
      enableServiceLinks: false
      securityContext:
        {{- include "gkg.podSecurityContext" . | nindent 8 }}
      containers:
        - name: gkg-indexer
          image: "{{ .Values.gkgServer.image.repository }}:{{ .Values.gkgServer.image.tag }}"
          imagePullPolicy: {{ .Values.gkgServer.image.pullPolicy }}
          args:
            - "--mode=indexer"
          ports:
            - name: health
              containerPort: 4202
          env:
            - name: LOG_FORMAT
              value: "json"
            - name: RUST_LOG
              value: {{ .Values.gkgServer.logLevel | default "info" | quote }}
            {{- include "gkg.clickhouseSecretEnv" (dict "prefix" "DATALAKE" "secretName" "clickhouse-credentials") | nindent 12 }}
            {{- include "gkg.clickhouseSecretEnv" (dict "prefix" "GRAPH" "secretName" "clickhouse-credentials") | nindent 12 }}
            {{- if .Values.gitlab.enabled }}
            - name: GKG_GITLAB__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gkg-server-credentials
                  key: jwt-secret
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: tmp
              mountPath: /tmp
          securityContext:
            {{- include "gkg.securityContext" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /live
              port: 4202
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 4202
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.gkgServer.indexer.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: gkg-indexer-config
        - name: tmp
          emptyDir: {}
{{- end }}
