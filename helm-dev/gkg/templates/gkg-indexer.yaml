{{- if and .Values.gkgServer .Values.gkgServer.indexer .Values.gkgServer.indexer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gkg-indexer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "gkg-indexer") | nindent 4 }}
spec:
  replicas: {{ .Values.gkgServer.indexer.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "gkg.componentSelectorLabels" (dict "root" . "component" "gkg-indexer") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gkg.componentSelectorLabels" (dict "root" . "component" "gkg-indexer") | nindent 8 }}
    spec:
      enableServiceLinks: false
      securityContext:
        {{- include "gkg.podSecurityContext" . | nindent 8 }}
      containers:
        - name: gkg-indexer
          image: "{{ .Values.gkgServer.image.repository }}:{{ .Values.gkgServer.image.tag }}"
          imagePullPolicy: {{ .Values.gkgServer.image.pullPolicy }}
          args:
            - "--mode=indexer"
          env:
            - name: LOG_FORMAT
              value: "json"
            - name: RUST_LOG
              value: {{ .Values.gkgServer.logLevel | default "info" | quote }}
            - name: GKG__NATS__URL
              value: {{ include "gkg.natsUrl" . | quote }}
            {{- include "gkg.clickhouseEnv" (dict "prefix" "DATALAKE" "config" .Values.clickhouse.datalake "secretName" "clickhouse-credentials") | nindent 12 }}
            {{- include "gkg.clickhouseEnv" (dict "prefix" "GRAPH" "config" .Values.clickhouse.graph "secretName" "clickhouse-credentials") | nindent 12 }}
            {{- if .Values.gitaly.enabled }}
            - name: GKG__GITALY__ADDRESS
              value: {{ .Values.gitaly.address | quote }}
            - name: GKG__GITALY__STORAGE
              value: {{ .Values.gitaly.storage | quote }}
            {{- if .Values.gitaly.tokenSecret.key }}
            - name: GKG__GITALY__TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.gitaly.tokenSecret.name }}
                  key: {{ .Values.gitaly.tokenSecret.key }}
            {{- end }}
            {{- end }}
            {{- if .Values.otel.enabled }}
            - name: GKG__METRICS__OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: GKG__METRICS__SERVICE_NAME
              value: "gkg-indexer"
            {{- end }}
            {{- if .Values.nats.streamName }}
            - name: GKG__CODE_INDEXING__EVENTS_STREAM_NAME
              value: {{ .Values.nats.streamName | quote }}
            {{- end }}
          securityContext:
            {{- include "gkg.securityContext" . | nindent 12 }}
          resources:
            {{- toYaml .Values.gkgServer.indexer.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
