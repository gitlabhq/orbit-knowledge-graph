{{- if and .Values.gkgServer .Values.gkgServer.dispatcher .Values.gkgServer.dispatcher.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gkg-dispatcher
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "gkg-dispatcher") | nindent 4 }}
spec:
  schedule: {{ .Values.gkgServer.dispatcher.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            {{- include "gkg.componentSelectorLabels" (dict "root" . "component" "gkg-dispatcher") | nindent 12 }}
        spec:
          restartPolicy: Never
          securityContext:
            {{- include "gkg.podSecurityContext" . | nindent 12 }}
          containers:
            - name: gkg-dispatcher
              image: "{{ .Values.gkgServer.image.repository }}:{{ .Values.gkgServer.image.tag }}"
              imagePullPolicy: {{ .Values.gkgServer.image.pullPolicy }}
              args:
                - "--mode=dispatch-indexing"
              env:
                - name: LOG_FORMAT
                  value: "json"
                - name: NATS_URL
                  value: {{ include "gkg.natsUrl" . | quote }}
                {{- include "gkg.clickhouseEnv" (dict "prefix" "DATALAKE" "config" .Values.clickhouse.datalake "secretName" "clickhouse-credentials") | nindent 16 }}
                {{- if .Values.otel.enabled }}
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  value: {{ .Values.otel.endpoint | quote }}
                - name: OTEL_SERVICE_NAME
                  value: "gkg-dispatcher"
                {{- end }}
              securityContext:
                {{- include "gkg.securityContext" . | nindent 16 }}
              resources:
                {{- toYaml .Values.gkgServer.dispatcher.resources | nindent 16 }}
{{- end }}
