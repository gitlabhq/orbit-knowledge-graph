{{- if and .Values.gkgServer .Values.gkgServer.dispatcher .Values.gkgServer.dispatcher.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: gkg-dispatcher-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "gkg-dispatcher") | nindent 4 }}
data:
  default.yaml: |
    nats:
      url: {{ include "gkg.natsUrl" . | quote }}
    datalake:
      {{- include "gkg.clickhouseConfig" (dict "config" .Values.clickhouse.datalake) | nindent 6 }}
    {{- if .Values.otel.enabled }}
    metrics:
      otlp_endpoint: {{ .Values.otel.endpoint | quote }}
      service_name: "gkg-dispatcher"
    {{- end }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gkg-dispatcher
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "gkg-dispatcher") | nindent 4 }}
spec:
  schedule: {{ .Values.gkgServer.dispatcher.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            {{- include "gkg.componentSelectorLabels" (dict "root" . "component" "gkg-dispatcher") | nindent 12 }}
          annotations:
            checksum/config: {{ toJson .Values.clickhouse.datalake | sha256sum }}-{{ toJson .Values.nats | sha256sum }}-{{ toJson .Values.otel | sha256sum }}
        spec:
          restartPolicy: Never
          securityContext:
            {{- include "gkg.podSecurityContext" . | nindent 12 }}
          containers:
            - name: gkg-dispatcher
              image: "{{ .Values.gkgServer.image.repository }}:{{ .Values.gkgServer.image.tag }}"
              imagePullPolicy: {{ .Values.gkgServer.image.pullPolicy }}
              args:
                - "--mode=dispatch-indexing"
              env:
                - name: LOG_FORMAT
                  value: "json"
                - name: RUST_LOG
                  value: {{ .Values.gkgServer.logLevel | default "info" | quote }}
                {{- include "gkg.clickhouseSecretEnv" (dict "prefix" "DATALAKE" "secretName" "clickhouse-credentials") | nindent 16 }}
              volumeMounts:
                - name: config
                  mountPath: /app/config
                  readOnly: true
              securityContext:
                {{- include "gkg.securityContext" . | nindent 16 }}
              resources:
                {{- toYaml .Values.gkgServer.dispatcher.resources | nindent 16 }}
          volumes:
            - name: config
              configMap:
                name: gkg-dispatcher-config
{{- end }}
