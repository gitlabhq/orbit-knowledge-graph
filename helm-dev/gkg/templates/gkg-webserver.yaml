{{- if and .Values.gkgServer .Values.gkgServer.webserver .Values.gkgServer.webserver.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: gkg-webserver
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "gkg-webserver") | nindent 4 }}
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    {{- include "gkg.componentSelectorLabels" (dict "root" . "component" "gkg-webserver") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gkg-webserver
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "gkg-webserver") | nindent 4 }}
spec:
  replicas: {{ .Values.gkgServer.webserver.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "gkg.componentSelectorLabels" (dict "root" . "component" "gkg-webserver") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gkg.componentSelectorLabels" (dict "root" . "component" "gkg-webserver") | nindent 8 }}
    spec:
      securityContext:
        {{- include "gkg.podSecurityContext" . | nindent 8 }}
      containers:
        - name: gkg-webserver
          image: "{{ .Values.gkgServer.image.repository }}:{{ .Values.gkgServer.image.tag }}"
          imagePullPolicy: {{ .Values.gkgServer.image.pullPolicy }}
          args:
            - "--mode=webserver"
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LOG_FORMAT
              value: "json"
            {{- include "gkg.clickhouseEnv" (dict "prefix" "DATALAKE" "config" .Values.clickhouse.datalake "secretName" "clickhouse-credentials") | nindent 12 }}
            {{- include "gkg.clickhouseEnv" (dict "prefix" "GRAPH" "config" .Values.clickhouse.graph "secretName" "clickhouse-credentials") | nindent 12 }}
            - name: GKG_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gkg-server-credentials
                  key: jwt-secret
            - name: GKG_BIND_ADDRESS
              value: "0.0.0.0:8080"
            {{- if and .Values.gkgServer.healthCheck .Values.gkgServer.healthCheck.enabled }}
            - name: GKG_HEALTH_CHECK_URL
              value: "http://gkg-health-check:4201"
            {{- end }}
            {{- if .Values.otel.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: "gkg-webserver"
            {{- end }}
          securityContext:
            {{- include "gkg.securityContext" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.gkgServer.webserver.resources | nindent 12 }}
{{- end }}
