{{- if and .Values.gkgServer .Values.gkgServer.webserver .Values.gkgServer.webserver.enabled }}
{{- if and .Values.gkgServer.webserver.internalLoadBalancer (not .Values.gkgServer.webserver.loadBalancerIP) }}
{{- fail "loadBalancerIP is required when internalLoadBalancer is enabled" }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: gkg-webserver-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "gkg-webserver") | nindent 4 }}
data:
  default.yaml: |
    bind_address: "0.0.0.0:8080"
    grpc_bind_address: "0.0.0.0:50051"
    {{- if and .Values.gkgServer.healthCheck .Values.gkgServer.healthCheck.enabled }}
    health_check_url: "http://gkg-health-check:4201"
    {{- end }}
    datalake:
      {{- include "gkg.clickhouseConfig" (dict "config" .Values.clickhouse.datalake) | nindent 6 }}
    graph:
      {{- include "gkg.clickhouseConfig" (dict "config" .Values.clickhouse.graph) | nindent 6 }}
    {{- if .Values.otel.enabled }}
    metrics:
      otlp_endpoint: {{ .Values.otel.endpoint | quote }}
      service_name: "gkg-webserver"
    {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: gkg-webserver
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "gkg-webserver") | nindent 4 }}
  {{- if .Values.gkgServer.webserver.internalLoadBalancer }}
  annotations:
    networking.gke.io/load-balancer-type: "Internal"
  {{- end }}
spec:
  {{- if .Values.gkgServer.webserver.internalLoadBalancer }}
  type: LoadBalancer
  {{- if .Values.gkgServer.webserver.loadBalancerIP }}
  loadBalancerIP: {{ .Values.gkgServer.webserver.loadBalancerIP | quote }}
  {{- end }}
  {{- end }}
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 50051
      targetPort: 50051
  selector:
    {{- include "gkg.componentSelectorLabels" (dict "root" . "component" "gkg-webserver") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gkg-webserver
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "gkg-webserver") | nindent 4 }}
spec:
  replicas: {{ .Values.gkgServer.webserver.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "gkg.componentSelectorLabels" (dict "root" . "component" "gkg-webserver") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gkg.componentSelectorLabels" (dict "root" . "component" "gkg-webserver") | nindent 8 }}
      annotations:
        checksum/config: {{ toJson .Values.clickhouse | sha256sum }}-{{ toJson .Values.otel | sha256sum }}
    spec:
      enableServiceLinks: false
      securityContext:
        {{- include "gkg.podSecurityContext" . | nindent 8 }}
      containers:
        - name: gkg-webserver
          image: "{{ .Values.gkgServer.image.repository }}:{{ .Values.gkgServer.image.tag }}"
          imagePullPolicy: {{ .Values.gkgServer.image.pullPolicy }}
          args:
            - "--mode=webserver"
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 50051
          env:
            - name: LOG_FORMAT
              value: "json"
            - name: RUST_LOG
              value: {{ .Values.gkgServer.logLevel | default "info" | quote }}
            {{- include "gkg.clickhouseSecretEnv" (dict "prefix" "DATALAKE" "secretName" "clickhouse-credentials") | nindent 12 }}
            {{- include "gkg.clickhouseSecretEnv" (dict "prefix" "GRAPH" "secretName" "clickhouse-credentials") | nindent 12 }}
            - name: GKG_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gkg-server-credentials
                  key: jwt-secret
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
          securityContext:
            {{- include "gkg.securityContext" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.gkgServer.webserver.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: gkg-webserver-config
{{- end }}
