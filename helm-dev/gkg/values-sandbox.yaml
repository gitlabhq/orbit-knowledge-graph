producer:
  enabled: true
  applicationIdentifier: gkg-producer
  publicationName: gkg_publication
  slotName: gkg_slot
  advisoryLockId: 144324
  maxColumnSizeBytes: 8000000
  memoryBufferSize: 104857600
  logLevel: info
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

consumer:
  enabled: true
  applicationIdentifier: gkg-consumer
  replicas: 1
  logLevel: info
  insertBatchSize: 10000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

gkgServer:
  image:
    repository: registry.gitlab.com/gitlab-org/orbit/knowledge-graph/gkg
    tag: develop
    pullPolicy: Always
  dispatcher:
    enabled: false
    schedule: "* * * * *"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  indexer:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  webserver:
    enabled: true
    replicas: 1
    internalLoadBalancer: true
    loadBalancerIP: "10.128.0.51"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  healthCheck:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

otel:
  enabled: true
  endpoint: "http://gkg-obs-alloy:4317"
