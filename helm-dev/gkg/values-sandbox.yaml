# Sandbox environment values for gkg chart

gcp:
  project: gl-knowledgegraph-prj-f2eec59d
  region: us-central1
  cluster: knowledge-graph-test

secrets:
  enabled: true
  gcpServiceAccount: gkg-secrets-sa@gl-knowledgegraph-prj-f2eec59d.iam.gserviceaccount.com
  postgresSecretName: postgres-password
  clickhouseSecretName: clickhouse-password
  runnerTokenSecretName: runner_authentication_token
  jwtSecretName: gkg-jwt-secret
  gitalySecretName: gitaly-token

gitlab-runner:
  enabled: true
  gitlabUrl: https://gitlab.gkg.dev
  unregisterRunners: true
  concurrent: 10
  rbac:
    create: true
  runners:
    secret: gitlab-runner-token
    config: |
      [[runners]]
        [runners.kubernetes]
          namespace = "{{.Release.Namespace}}"
          image = "alpine:latest"
          helper_image = "registry.gitlab.com/gitlab-org/gitlab-runner/gitlab-runner-helper:x86_64-v18.8.0"

gitaly:
  enabled: true
  address: "tcp://10.128.0.4:8075"
  storage: "default"
  tokenSecret:
    name: "gitaly-credentials"
    key: "token"

postgres:
  host: 10.128.0.4
  port: 5432
  database: gitlabhq_production
  user: gitlab

clickhouse:
  datalake:
    host: 10.128.0.13
    port: 9000
    database: gitlab_clickhouse_main_production
    user: default
    ssl: false
  graph:
    host: 10.128.0.13
    port: 9000
    database: gkg-sandbox
    user: default
    ssl: false

nats:
  enabled: true
  streamName: gkg_replication
  config:
    jetstream:
      enabled: true
      fileStore:
        enabled: true
        pvc:
          enabled: true
          size: 10Gi
  promExporter:
    enabled: true
    port: 7777
    podMonitor:
      enabled: true
      merge:
        metadata:
          labels:
            release: gkg-obs
  container:
    image:
      repository: nats
      tag: "2.10-alpine"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  natsBox:
    enabled: false

siphon:
  image:
    repository: registry.gitlab.com/gitlab-org/analytics-section/siphon
    tag: "0.0.25-beta"
    pullPolicy: Always

