# Local development values for gkg chart (use with Tilt)
# Uses NATS and Siphon services running on the host via GDK

gcp:
  project: ""
  region: ""
  cluster: ""

secrets:
  enabled: false

gitlab-runner:
  enabled: false

postgres:
  host: host.docker.internal
  port: 5432
  database: gitlabhq_development
  user: gitlab

clickhouse:
  datalake:
    host: host.docker.internal
    port: 8123
    database: gitlab_clickhouse_development
    user: default
    ssl: false
  graph:
    host: host.docker.internal
    port: 8123
    database: gkg-development
    user: default
    ssl: false

gkgServer:
  logLevel: "info,gkg_server=debug"
  image:
    repository: gkg-server
    tag: dev
    pullPolicy: Never
  indexer:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  webserver:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  healthCheck:
    enabled: true
    replicas: 1
    namespace: default
    services:
      - gkg-indexer
      - gkg-webserver
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

# Disable in-cluster NATS, use GDK's NATS on host
nats:
  enabled: false
  url: "host.docker.internal:4222"
  streamName: siphon_stream_main_db

producer:
  enabled: false

consumer:
  enabled: false

gitlab:
  enabled: true
  baseUrl: "http://host.docker.internal:3000"

otel:
  enabled: true
  endpoint: "http://gkg-obs-alloy:4317"
