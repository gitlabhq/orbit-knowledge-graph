# Local development values for observability chart (use with Tilt)

gcp:
  project: ""
  region: ""
  cluster: ""

secrets:
  enabled: false

grafana:
  ingress:
    enabled: false

kube-prometheus-stack:
  enabled: true
  crds:
    enabled: false
  prometheus:
    prometheusSpec:
      retention: 1d
      enableRemoteWriteReceiver: true
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
  alertmanager:
    enabled: false
  grafana:
    adminPassword: admin
    defaultDashboardsEnabled: true
    plugins:
      - grafana-clickhouse-datasource
    grafana.ini:
      auth:
        disable_login_form: false
      security:
        disable_initial_admin_password_change: true
      dashboards:
        default_home_dashboard_path: /tmp/dashboards/gkg-overview.json
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://gkg-obs-loki:3100
        access: proxy
        isDefault: false
      - name: ClickHouse-Datalake
        type: grafana-clickhouse-datasource
        access: proxy
        isDefault: false
        jsonData:
          host: host.docker.internal
          port: 8123
          protocol: http
          username: default
          defaultDatabase: gitlab_clickhouse_main_development
        secureJsonData:
          password: ""
      - name: ClickHouse-Graph
        type: grafana-clickhouse-datasource
        access: proxy
        isDefault: false
        jsonData:
          host: host.docker.internal
          port: 8123
          protocol: http
          username: default
          defaultDatabase: gkg-development
        secureJsonData:
          password: ""
    service:
      type: NodePort
      nodePort: 30300
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

loki:
  enabled: true
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    memberlist:
      join_members: []
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
  singleBinary:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  gateway:
    enabled: false
  memberlist:
    service:
      enabled: false
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  lokiCanary:
    enabled: false
  test:
    enabled: false

alloy:
  enabled: true
  alloy:
    clustering:
      enabled: false
    configMap:
      create: true
      content: |
        discovery.kubernetes "pods" {
          role = "pod"
        }

        discovery.relabel "gkg_pods" {
          targets = discovery.kubernetes.pods.targets

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            regex = "{{ .Release.Namespace }}"
            action = "keep"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            regex = "(gkg-indexer|gkg-webserver)"
            action = "keep"
          }

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label = "namespace"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label = "pod"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            target_label = "component"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label = "container"
          }
        }

        loki.process "json" {
          forward_to = [loki.write.default.receiver]

          stage.json {
            expressions = {
              level = "level",
              message = "message",
            }
          }

          stage.labels {
            values = {
              level = "",
            }
          }
        }

        loki.source.kubernetes "pods" {
          targets    = discovery.relabel.gkg_pods.output
          forward_to = [loki.process.json.receiver]
        }

        loki.write "default" {
          endpoint {
            url = "http://gkg-obs-loki:3100/loki/api/v1/push"
          }
        }

        otelcol.receiver.otlp "default" {
          grpc {
            endpoint = "0.0.0.0:4317"
          }
          http {
            endpoint = "0.0.0.0:4318"
          }

          output {
            metrics = [otelcol.processor.batch.default.input]
          }
        }

        otelcol.processor.batch "default" {
          output {
            metrics = [otelcol.exporter.prometheus.default.input]
          }
        }

        otelcol.exporter.prometheus "default" {
          forward_to = [prometheus.remote_write.default.receiver]
        }

        prometheus.remote_write "default" {
          endpoint {
            url = "http://gkg-obs-kube-prometheus-st-prometheus:9090/api/v1/write"
          }
        }
    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
      - name: otlp-http
        port: 4318
        targetPort: 4318
        protocol: TCP
  controller:
    type: daemonset
  serviceAccount:
    create: true
  rbac:
    create: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
