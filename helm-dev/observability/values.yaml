# Default values for gkg-observability chart

gcp:
  project: ""
  region: ""
  cluster: ""

secrets:
  enabled: false
  gcpServiceAccount: ""

grafana:
  ingress:
    enabled: false
    host: ""

# ── Alert rules for the GKG query engine and pipeline ────────────
# Requires kube-prometheus-stack.enabled = true.
# Each rule has: threshold, for (duration before firing), severity.
# Metric names follow OTel→Prometheus conversion (dots → underscores,
# counters get _total suffix).
alerting:
  enabled: false
  runbookBaseUrl: "https://gitlab.com/gitlab-org/analytics-section/product-analytics/gl-knowledge-graph/gkg/-/blob/main/docs/dev/RUNBOOK"
  rules:
    # ── Critical: security boundary violations ──
    authFilterMissing:
      threshold: 0
      for: 1m
      severity: critical
    pipelineInvariantViolated:
      threshold: 0
      for: 1m
      severity: critical
    securityRejected:
      threshold: 0
      for: 5m
      severity: warning

    # ── Warning: query health ──
    # Overall error rate across all failure modes (0.05 = 5%)
    errorRate:
      threshold: 0.05
      for: 5m
      severity: warning
    # Fraction of queries that time out (0.05 = 5%)
    timeoutRate:
      threshold: 0.05
      for: 5m
      severity: warning
    # Validation failures per minute
    validationFailed:
      threshold: 10
      for: 5m
      severity: warning
    # Allowlist rejections per minute
    allowlistRejected:
      threshold: 5
      for: 5m
      severity: warning
    # ClickHouse execution failures per minute
    executionFailed:
      threshold: 1
      for: 5m
      severity: warning
    # Rails authorization failures per minute
    authorizationFailed:
      threshold: 1
      for: 5m
      severity: warning
    # Pipeline p95 latency in milliseconds
    pipelineLatencyP95:
      threshold: 5000
      for: 10m
      severity: warning

    # ── Warning: capacity ──
    # Rate-limited callers per minute
    rateLimited:
      threshold: 10
      for: 5m
      severity: warning
# Prometheus + Grafana subchart
kube-prometheus-stack:
  enabled: false
  crds:
    enabled: false

# Loki subchart
loki:
  enabled: false

# Alloy subchart
alloy:
  enabled: false
