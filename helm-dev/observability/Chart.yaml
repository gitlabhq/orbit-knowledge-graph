apiVersion: v2
name: gkg-observability
description: Observability stack for GKG - Prometheus, Grafana, Loki, Alloy
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: kube-prometheus-stack
    version: "81.2.2"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: kube-prometheus-stack.enabled
  - name: loki
    version: "6.51.0"
    repository: "https://grafana.github.io/helm-charts"
    condition: loki.enabled
  - name: alloy
    version: "1.0.3"
    repository: "https://grafana.github.io/helm-charts"
    condition: alloy.enabled
