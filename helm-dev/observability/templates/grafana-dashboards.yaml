{{- if index .Values "kube-prometheus-stack" "enabled" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: gkg-overview-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
data:
  gkg-overview.json: |-
{{ .Files.Get "dashboards/gkg-overview.json" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gkg-etl-engine-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
data:
  etl-engine.json: |-
{{ .Files.Get "dashboards/etl-engine.json" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gkg-sdlc-indexing-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
data:
  sdlc-indexing.json: |-
{{ .Files.Get "dashboards/sdlc-indexing.json" | indent 4 }}
{{- end }}
