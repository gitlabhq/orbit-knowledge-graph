{{- if and .Values.grafana.ingress.enabled .Values.grafana.ingress.host }}
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: grafana-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "obs.labels" . | nindent 4 }}
spec:
  domains:
    - {{ .Values.grafana.ingress.host }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "obs.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.allow-http: "true"
    cloud.google.com/neg: '{"ingress": true}'
    networking.gke.io/managed-certificates: "grafana-cert"
spec:
  rules:
    - host: {{ .Values.grafana.ingress.host }}
      http:
        paths:
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Release.Name }}-grafana
                port:
                  number: 80
{{- end }}
