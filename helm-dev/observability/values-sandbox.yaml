# Sandbox environment values for observability chart

alerting:
  enabled: true

gcp:
  project: gl-knowledgegraph-prj-f2eec59d
  region: us-central1
  cluster: knowledge-graph-test

secrets:
  enabled: true
  createSecretStore: false
  gcpServiceAccount: gkg-secrets-sa@gl-knowledgegraph-prj-f2eec59d.iam.gserviceaccount.com

grafana:
  ingress:
    enabled: true
    host: grafana.gkg.dev

kube-prometheus-stack:
  enabled: true
  crds:
    enabled: false
  nodeExporter:
    enabled: false
  kubeApiServer:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false
  kubeEtcd:
    enabled: false
  kubelet:
    enabled: false
  coreDns:
    enabled: false
  defaultRules:
    create: true
    rules:
      alertmanager: false
      etcd: false
      configReloaders: false
      general: false
      kubeApiserverAvailability: false
      kubeApiserverBurnrate: false
      kubeApiserverHistogram: false
      kubeApiserverSlos: false
      kubeControllerManager: false
      kubeProxy: false
      kubeScheduler: false
      kubeStateMetrics: false
      kubelet: false
      network: false
      node: false
      nodeExporterAlerting: false
      nodeExporterRecording: false
      prometheus: false
      prometheusOperator: false
  prometheus:
    prometheusSpec:
      retention: 15d
      enableRemoteWriteReceiver: true
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: standard-rwo
            resources:
              requests:
                storage: 50Gi
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1
          memory: 2Gi
  alertmanager:
    enabled: true
  grafana:
    defaultDashboardsEnabled: true
    envFromSecret: grafana-oauth-credentials
    plugins:
      - grafana-clickhouse-datasource
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: 'grafana-dashboards'
            orgId: 1
            folder: ''
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/grafana-dashboards
    dashboards:
      grafana-dashboards:
        nats-jetstream:
          gnetId: 23983
          revision: 1
          datasource:
            - name: DS__NATS-PROMETHEUS
              value: Prometheus
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://gkg-obs-loki:3100
        access: proxy
        isDefault: false
      - name: ClickHouse-Datalake
        type: grafana-clickhouse-datasource
        access: proxy
        isDefault: false
        jsonData:
          host: 10.128.0.13
          port: 8123
          protocol: http
          username: grafana_reader
          defaultDatabase: gitlab_clickhouse_main_production
        secureJsonData:
          password: ""
      - name: ClickHouse-Graph
        type: grafana-clickhouse-datasource
        access: proxy
        isDefault: false
        jsonData:
          host: 10.128.0.13
          port: 8123
          protocol: http
          username: grafana_reader
          defaultDatabase: gkg-sandbox
        secureJsonData:
          password: ""
    grafana.ini:
      server:
        root_url: https://grafana.gkg.dev
      auth:
        disable_login_form: true
      dashboards:
        default_home_dashboard_path: /tmp/dashboards/gkg-overview.json
      auth.google:
        enabled: true
        allow_sign_up: true
        skip_org_role_sync: false
        scopes: openid email profile
        auth_url: https://accounts.google.com/o/oauth2/v2/auth
        token_url: https://oauth2.googleapis.com/token
        api_url: https://openidconnect.googleapis.com/v1/userinfo
        allowed_domains: gitlab.com
        role_attribute_path: "contains(['musachenko@gitlab.com','bparkhomchuk@gitlab.com','jgdoyon@gitlab.com','arivera@gitlab.com'], email) && 'Admin' || 'Viewer'"
      auth.gitlab:
        enabled: true
        allow_sign_up: true
        skip_org_role_sync: false
        scopes: openid email profile
        auth_url: https://gitlab.com/oauth/authorize
        token_url: https://gitlab.com/oauth/token
        api_url: https://gitlab.com/api/v4
        allowed_domains: gitlab.com
        allowed_groups: gitlab-com
        role_attribute_path: "contains(groups[*], 'gitlab-com') && 'Admin' || 'Viewer'"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

alloy:
  enabled: true
  alloy:
    clustering:
      enabled: false
    configMap:
      create: true
      content: |
        discovery.kubernetes "pods" {
          role = "pod"
        }

        discovery.relabel "gkg_pods" {
          targets = discovery.kubernetes.pods.targets

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            regex = "{{ .Release.Namespace }}"
            action = "keep"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            regex = "(gkg-indexer|gkg-webserver|siphon-producer|siphon-consumer|nats)"
            action = "keep"
          }

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label = "namespace"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label = "pod"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            target_label = "component"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label = "container"
          }
        }

        loki.process "json" {
          forward_to = [loki.write.default.receiver]

          stage.json {
            expressions = {
              level = "level",
              message = "message",
            }
          }

          stage.labels {
            values = {
              level = "",
            }
          }
        }

        loki.source.kubernetes "pods" {
          targets    = discovery.relabel.gkg_pods.output
          forward_to = [loki.process.json.receiver]
        }

        loki.write "default" {
          endpoint {
            url = "http://gkg-obs-loki:3100/loki/api/v1/push"
          }
        }

        otelcol.receiver.otlp "default" {
          grpc {
            endpoint = "0.0.0.0:4317"
          }
          http {
            endpoint = "0.0.0.0:4318"
          }

          output {
            metrics = [otelcol.processor.batch.default.input]
          }
        }

        otelcol.processor.batch "default" {
          output {
            metrics = [otelcol.exporter.prometheus.default.input]
          }
        }

        otelcol.exporter.prometheus "default" {
          forward_to = [prometheus.remote_write.default.receiver]
        }

        prometheus.remote_write "default" {
          endpoint {
            url = "http://gkg-obs-kube-prometheus-st-prometheus:9090/api/v1/write"
          }
        }
    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
      - name: otlp-http
        port: 4318
        targetPort: 4318
        protocol: TCP
  controller:
    type: daemonset
  serviceAccount:
    create: true
  rbac:
    create: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

loki:
  enabled: true
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 20Gi
      storageClass: standard-rwo
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: 2
        memory: 4Gi
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  gateway:
    enabled: false
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  lokiCanary:
    enabled: false
  test:
    enabled: false
