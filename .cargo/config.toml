[alias]
xtask = "run --package xtask --"

# Use mold for faster linking on Linux. Saves ~minutes of wall time on test
# jobs that link 27+ binaries. mold is installed in CI's sccache template;
# devs need it on PATH locally (apt install mold / brew install mold).
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[env]
CONFIG_DIR = { value = "config", relative = true }
FIXTURES_DIR = { value = "fixtures", relative = true }
SCHEMA_DIR = { value = "config/schemas", relative = true }
ONTOLOGY_DIR = { value = "config/ontology", relative = true }
SEEDS_DIR = { value = "config/seeds", relative = true }
E2E_DIR = { value = "e2e", relative = true }
HELM_DIR = { value = "helm", relative = true }
SCRIPTS_DIR = { value = "scripts", relative = true }
XTASK_DIR = { value = "crates/xtask", relative = true }
GKG_SERVER_SCHEMAS_DIR = { value = "crates/gkg-server/schemas", relative = true }
