# Minimal values with no deployments. Used as a clean-slate baseline for tests
# so they are not affected by the default example-postgres-producer in values.yaml.
namespace: siphon
monitoring_namespace: monitoring

image:
  repository: test-registry/app
  pullPolicy: Always
  tag: "1.0"

replicas: 1
reloader: false
labels: {}
podSpec: {}

metrics:
  port: 8080

resources:
  requests:
    cpu: 250m
    memory: 1Gi
  limits:
    cpu: 2
    memory: 2Gi

appConfigDefaults: {}

# Explicitly disable the default deployment from values.yaml so it
# does not interfere with test-specific deployments.
deployments:
  example-postgres-producer:
    enabled: false
