# Minimal fixture for post-render schema validation.
# Contains one producer and one consumer with the minimum config needed
# to pass both Helm values.schema.json and the siphon JSON Schemas.
# Exercises: profiles, envFromSecretsTemplate, table_mapping shorthand,
# streams shorthand.

namespace: siphon-test
monitoring_namespace: monitoring

image:
  repository: registry.example.com/siphon
  pullPolicy: IfNotPresent
  tag: "0.0.1"

replicas: 1
reloader: true
labels:
  env: "test"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1Gi

appConfigDefaults:
  prometheus:
    port: 8080
  database:
    user: siphon_replicator
    password: "${REPLICATION_DATABASE_PASSWORD}"
    database: testdb
    advisory_lock_timeout_ms: 100
    advisory_lock_timeout_fuzziness_ms: 50
    lock_timeout_ms: 500
    lock_timeout_fuzziness_ms: 300
  queueing:
    driver: "nats"
    url: "nats://nats:4222"
    stream_name: "test_stream"

deploymentProfiles:
  producer:
    podmonitor: true
    mode: producer
    command: ["/app/siphon", "producer", "--config=/etc/config/config.yaml"]
    envFromSecretsTemplate:
      - name: REPLICATION_DATABASE_PASSWORD
        secretKey: replication-password
    appConfig:
      max_column_size_in_bytes: 1048576

  consumer:
    podmonitor: true
    mode: consumer
    consumerType: clickhouse
    command: ["/app/siphon", "consumer", "--config=/etc/config/config.yaml"]
    appConfig:
      prometheus: {}
      queueing: {}

deployments:
  test-producer:
    enabled: true
    profile: producer
    envFromSecretsName: db-secret-v1

    appConfig:
      application_identifier: test_producer_1
      database:
        host: postgres.test
        application_name: test_producer_1
        advisory_lock_id: 1
      replication:
        publication_name: test_publication
        slot_name: test_slot
      queueing:
        lsn_store_name: test_lsn_store
      table_mapping:
        - users
        - table: projects
          ignored_columns:
            - secret_token

  test-consumer:
    enabled: true
    profile: consumer

    envFromSecrets:
      - name: CLICKHOUSE_PASSWORD
        secretName: clickhouse-secret
        secretKey: password

    appConfig:
      application_identifier: test_consumer_1
      clickhouse:
        host: clickhouse.test
        port: 9440
        database: test_db
        ssl: true
      streams:
        - users
        - projects
