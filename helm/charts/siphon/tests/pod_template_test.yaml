suite: Pod template (via Deployment)
templates:
  - templates/deployment.yaml
release:
  name: test-release
tests:
  # ── Security context ─────────────────────────────────────────────
  - it: should set pod-level security context
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 65532
      - equal:
          path: spec.template.spec.securityContext.seccompProfile.type
          value: RuntimeDefault

  - it: should set container-level security context
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL

  - it: should disable service account token automount
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
    asserts:
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false

  # ── Image handling ───────────────────────────────────────────────
  - it: should use global image defaults when deployment has no image config
    values:
      - fixtures/clean.yaml
    set:
      image:
        repository: global-registry/app
        pullPolicy: IfNotPresent
        tag: "2.0"
      deployments:
        my-app:
          enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "global-registry/app:2.0"
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: IfNotPresent

  - it: should allow deployment to override only the tag
    values:
      - fixtures/clean.yaml
    set:
      image:
        repository: global-registry/app
        pullPolicy: Always
        tag: "2.0"
      deployments:
        my-app:
          enabled: true
          image:
            tag: "3.0-beta"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "global-registry/app:3.0-beta"
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always

  - it: should allow deployment to override the full image
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          image:
            repository: custom-registry/other
            pullPolicy: Never
            tag: "5.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "custom-registry/other:5.0"
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Never

  # ── Command and args ─────────────────────────────────────────────
  - it: should set command when specified
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          command:
            - /app/run
            - --config=/etc/config/config.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command
          value:
            - /app/run
            - --config=/etc/config/config.yaml

  - it: should not set command when not specified
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].command

  # ── Environment variables ────────────────────────────────────────
  - it: should set plain env vars
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          env:
            - name: FOO
              value: bar
            - name: BAZ
              value: "123"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FOO
            value: "bar"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BAZ
            value: "123"

  - it: should set env vars from secrets
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          envFromSecrets:
            - name: DB_PASS
              secretName: db-secret
              secretKey: password
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_PASS
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: password

  - it: should not have env block when no env vars are set
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].env

  # ── Ports and probes ─────────────────────────────────────────────
  - it: should use default metrics port
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: http-metrics
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080

  - it: should use per-deployment metrics port
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          metrics:
            port: 9090
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 9090

  - it: should configure liveness and readiness probes
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /metrics
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: http-metrics
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /metrics

  # ── Resources ────────────────────────────────────────────────────
  - it: should use global resource defaults
    values:
      - fixtures/clean.yaml
    set:
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 1
          memory: 1Gi
      deployments:
        my-app:
          enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 1Gi

  - it: should allow per-deployment resource override
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 4
              memory: 8Gi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 500m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 4

  # ── Volumes ──────────────────────────────────────────────────────
  - it: should always mount config volume
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config-volume
            mountPath: /etc/config
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config-volume
            configMap:
              name: my-app-config

  - it: should mount NATS cert volume when natsClientCertsSecretName is set
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          natsClientCertsSecretName: nats-certs
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: cert-volume
            mountPath: /etc/ssl/certs/custom
            readOnly: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: cert-volume
            secret:
              secretName: nats-certs

  - it: should not mount NATS cert volume when natsClientCertsSecretName is not set
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: cert-volume
          any: true

  # ── Deployment profiles ─────────────────────────────────────────
  - it: should inherit env from a deployment profile
    values:
      - fixtures/clean.yaml
    set:
      deploymentProfiles:
        consumer:
          env:
            - name: GOMEMLIMIT
              value: "8GiB"
      deployments:
        my-app:
          enabled: true
          profile: consumer
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GOMEMLIMIT
            value: "8GiB"

  - it: should allow deployment env to replace profile env entirely
    values:
      - fixtures/clean.yaml
    set:
      deploymentProfiles:
        consumer:
          env:
            - name: GOMEMLIMIT
              value: "8GiB"
            - name: GOGC
              value: "50"
      deployments:
        my-app:
          enabled: true
          profile: consumer
          env:
            - name: CUSTOM
              value: only-this
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CUSTOM
            value: only-this
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: GOMEMLIMIT
            value: "8GiB"
          any: true

  - it: should inherit command from profile and envFromSecrets from profile
    values:
      - fixtures/clean.yaml
    set:
      deploymentProfiles:
        consumer:
          command:
            - /app/consumer
          envFromSecrets:
            - name: SECRET_VAR
              secretName: my-secret
              secretKey: key
      deployments:
        my-app:
          enabled: true
          profile: consumer
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command
          value:
            - /app/consumer
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SECRET_VAR
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: key

  # ── envFromSecrets template expansion ──────────────────────────────
  - it: should generate envFromSecrets from template and name
    values:
      - fixtures/clean.yaml
    set:
      deploymentProfiles:
        producer:
          envFromSecretsTemplate:
            - name: DB_PASS
              secretKey: db-password
            - name: API_KEY
              secretKey: api-key
      deployments:
        my-app:
          enabled: true
          profile: producer
          envFromSecretsName: my-secret-v1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_PASS
            valueFrom:
              secretKeyRef:
                name: my-secret-v1
                key: db-password
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: API_KEY
            valueFrom:
              secretKeyRef:
                name: my-secret-v1
                key: api-key

  - it: should not generate envFromSecrets when explicit envFromSecrets is set (escape hatch)
    values:
      - fixtures/clean.yaml
    set:
      deploymentProfiles:
        producer:
          envFromSecretsTemplate:
            - name: DB_PASS
              secretKey: db-password
      deployments:
        my-app:
          enabled: true
          profile: producer
          envFromSecretsName: my-secret-v1
          envFromSecrets:
            - name: CUSTOM_VAR
              secretName: custom-secret
              secretKey: custom-key
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CUSTOM_VAR
            valueFrom:
              secretKeyRef:
                name: custom-secret
                key: custom-key
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_PASS
          any: true

  - it: should preserve secretName in template entries that already have one
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          envFromSecretsTemplate:
            - name: DB_PASS
              secretKey: db-password
            - name: SPECIAL
              secretName: special-secret
              secretKey: special-key
          envFromSecretsName: default-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_PASS
            valueFrom:
              secretKeyRef:
                name: default-secret
                key: db-password
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SPECIAL
            valueFrom:
              secretKeyRef:
                name: special-secret
                key: special-key

  # ── podSpec passthrough (tolerations, nodeSelector, etc.) ────────
  - it: should pass through podSpec fields like tolerations
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          podSpec:
            tolerations:
              - effect: NoSchedule
                key: workload
                operator: Equal
                value: siphon
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            effect: NoSchedule
            key: workload
            operator: Equal
            value: siphon
