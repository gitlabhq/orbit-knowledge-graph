suite: PodMonitor
templates:
  - templates/podmonitor.yaml
release:
  name: test-release
tests:
  # ── Conditional rendering ────────────────────────────────────────
  - it: should not create a PodMonitor when podmonitor is not set
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create a PodMonitor when podmonitor is false
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          podmonitor: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create a PodMonitor when deployment is disabled
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: false
          podmonitor: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should create a PodMonitor when podmonitor is true and deployment is enabled
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          podmonitor: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PodMonitor

  # ── Metadata ─────────────────────────────────────────────────────
  - it: should set name with -podmonitor suffix
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          podmonitor: true
    asserts:
      - equal:
          path: metadata.name
          value: my-app-podmonitor

  - it: should use monitoring_namespace for PodMonitor namespace
    values:
      - fixtures/clean.yaml
    set:
      monitoring_namespace: custom-monitoring
      deployments:
        my-app:
          enabled: true
          podmonitor: true
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-monitoring

  - it: should fall back to namespace when monitoring_namespace is empty
    values:
      - fixtures/clean.yaml
    set:
      monitoring_namespace: ""
      deployments:
        my-app:
          enabled: true
          podmonitor: true
    asserts:
      - equal:
          path: metadata.namespace
          value: siphon

  - it: should include standard Helm labels
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          podmonitor: true
    asserts:
      - equal:
          path: metadata.labels.app
          value: my-app
      - equal:
          path: metadata.labels["helm.sh/chart"]
          value: siphon-1.0.0

  # ── Spec ─────────────────────────────────────────────────────────
  - it: should select pods by app label in the correct namespace
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          podmonitor: true
    asserts:
      - equal:
          path: spec.namespaceSelector.matchNames[0]
          value: siphon
      - equal:
          path: spec.selector.matchLabels.app
          value: my-app

  - it: should use default metrics interval and path
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          podmonitor: true
    asserts:
      - equal:
          path: spec.podMetricsEndpoints[0].port
          value: http-metrics
      - equal:
          path: spec.podMetricsEndpoints[0].interval
          value: "30s"
      - equal:
          path: spec.podMetricsEndpoints[0].path
          value: /metrics

  - it: should use custom metrics interval and path
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          podmonitor: true
          metrics:
            interval: "15s"
            path: "/custom-metrics"
    asserts:
      - equal:
          path: spec.podMetricsEndpoints[0].interval
          value: "15s"
      - equal:
          path: spec.podMetricsEndpoints[0].path
          value: /custom-metrics

  # ── podTargetLabels ──────────────────────────────────────────────
  - it: should not include podTargetLabels when not set
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          podmonitor: true
    asserts:
      - notExists:
          path: spec.podTargetLabels

  - it: should include podTargetLabels when set
    values:
      - fixtures/clean.yaml
    set:
      podTargetLabels:
        - env
        - stage
      deployments:
        my-app:
          enabled: true
          podmonitor: true
    asserts:
      - equal:
          path: spec.podTargetLabels
          value:
            - env
            - stage

  # ── Multiple deployments ─────────────────────────────────────────
  - it: should only create PodMonitor for deployments that opt in
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        app-with-monitor:
          enabled: true
          podmonitor: true
        app-without-monitor:
          enabled: true
          podmonitor: false
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: app-with-monitor-podmonitor
