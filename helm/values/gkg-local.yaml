# Local development values for gkg chart (use with Tilt)
# NATS, Siphon, and ClickHouse run on the host via GDK

image:
  repository: gkg-server
  tag: dev
  pullPolicy: Never

secrets:
  existingSecret: gkg-secrets

clickhouse:
  datalake:
    host: host.docker.internal
    httpPort: 8123
    database: gitlab_clickhouse_development
    user: default
    ssl: false
  graph:
    host: host.docker.internal
    httpPort: 8123
    database: gkg-development
    user: default
    ssl: false

nats:
  url: "host.docker.internal:4222"
  consumerName: gkg-indexer

webserver:
  enabled: true
  replicas: 1
  logLevel: "info,gkg_server=debug"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

indexer:
  enabled: true
  replicas: 1
  logLevel: "info,gkg_server=debug"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

dispatcher:
  enabled: true
  logLevel: "info,gkg_server=debug"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

schedule:
  tasks:
    global:
      cron: "0 */1 * * * *"
    namespace:
      cron: "0 */1 * * * *"
    code-indexing-task:
      cron: "0 */1 * * * *"
    namespace-code-backfill:
      cron: "0 */1 * * * *"
    table-cleanup:
      cron: "0 0 3 * * *"
    namespace-deletion:
      cron: "0 0 3 * * *"

healthCheck:
  enabled: true
  replicas: 1
  targets:
    - namespace: ""  # defaults to release namespace
      deployments:
        - gkg-indexer
        - gkg-webserver
        - gkg-dispatcher
    - namespace: nats
      statefulsets:
        - nats
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

gitlab:
  baseUrl: "http://host.docker.internal:3000"

metrics:
  otel:
    enabled: false
  prometheus:
    enabled: true
    port: 9394
