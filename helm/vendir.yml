apiVersion: vendir.k14s.io/v1alpha1
kind: Config
directories:
  - path: gkg
    contents:
      - path: .
        git:
          url: https://gitlab.com/gitlab-org/orbit/gkg-helm-charts.git
          ref: main
        includePaths:
          - chart/**
        newRootPath: chart
  - path: charts
    contents:
      - path: nats
        helmChart:
          name: nats
          version: "1.3.16"
          repository:
            url: https://nats-io.github.io/k8s/helm/charts/
      - path: siphon
        git:
          url: https://gitlab.com/gitlab-org/analytics-section/platform-insights/siphon-helm-charts.git
          ref: main
        includePaths:
          - chart/**
        newRootPath: chart
