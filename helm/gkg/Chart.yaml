apiVersion: v2
name: gkg
description: GitLab Knowledge Graph - indexer, webserver, and data pipeline
# Application charts are a collection of templates that can be packaged into versioned archives
# to be deployed.
type: application
version: 0.1.0 # does nothing, overwritten on the fly via helm package --version="x.y.z"
dependencies:
  # Extra Chart.yaml dependencies added by sync.sh
  - name: nats
    version: "1.3.x"
    repository: "file://charts/nats"
    condition: nats.enabled
  - name: siphon
    version: "1.x.x"
    repository: "file://charts/siphon"
    condition: siphon.enabled
# This is the version number of the application being deployed.
# It is recommended to use it with quotes.
# appVersion: "0.3.1"  # specified on the fly via helm package --app-version="x.y.z"
