{{- if .Values.indexer.enabled }}
{{- $secretKeys := list "datalakePassword" "graphPassword" "gitlabJwtSigningKey" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gkg.fullname" . }}-indexer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "indexer") | nindent 4 }}
spec:
  replicas: {{ .Values.indexer.replicas }}
  selector:
    matchLabels:
      {{- include "gkg.componentSelectorLabels" (dict "root" . "component" "indexer") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gkg.componentSelectorLabels" (dict "root" . "component" "indexer") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/indexer/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "gkg.serviceAccountName" . }}
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        {{- include "gkg.podSecurityContext" . | nindent 8 }}
      containers:
        - name: gkg-indexer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--mode=indexer"
          ports:
            - name: health
              containerPort: 4202
              protocol: TCP
            {{- if .Values.metrics.prometheus.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.prometheus.port }}
              protocol: TCP
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- include "gkg.secretVolumeMount" . | nindent 12 }}
          {{- if .Values.indexer.probes.enabled }}
          startupProbe:
            httpGet:
              path: /ready
              port: 4202
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /live
              port: 4202
            periodSeconds: 10
          {{- end }}
          securityContext:
            {{- include "gkg.securityContext" . | nindent 12 }}
          resources:
            {{- toYaml .Values.indexer.resources | nindent 12 }}
      {{- with .Values.indexer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.indexer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.indexer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "gkg.fullname" . }}-indexer-config
        - name: tmp
          emptyDir: {}
        {{- include "gkg.secretVolume" (dict "root" . "keys" $secretKeys) | nindent 8 }}
{{- end }}
