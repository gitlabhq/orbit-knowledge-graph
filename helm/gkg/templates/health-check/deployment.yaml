{{- if .Values.healthCheck.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gkg.fullname" . }}-health-check
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "health-check") | nindent 4 }}
spec:
  replicas: {{ .Values.healthCheck.replicas }}
  selector:
    matchLabels:
      {{- include "gkg.componentSelectorLabels" (dict "root" . "component" "health-check") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gkg.componentSelectorLabels" (dict "root" . "component" "health-check") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/health-check/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "gkg.fullname" . }}-health-check
      automountServiceAccountToken: true
      enableServiceLinks: false
      securityContext:
        {{- include "gkg.podSecurityContext" . | nindent 8 }}
      containers:
        - name: gkg-health-check
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--mode=health-check"
          ports:
            - name: http
              containerPort: {{ .Values.healthCheck.port }}
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            {{- include "gkg.secretVolumeMount" . | nindent 12 }}
          {{- if .Values.healthCheck.probes.enabled }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- end }}
          securityContext:
            {{- include "gkg.securityContext" . | nindent 12 }}
          resources:
            {{- toYaml .Values.healthCheck.resources | nindent 12 }}
      {{- with .Values.healthCheck.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.healthCheck.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.healthCheck.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "gkg.fullname" . }}-health-check-config
        {{- include "gkg.secretVolume" (dict "root" . "keys" (list "datalakePassword" "graphReadPassword")) | nindent 8 }}
{{- end }}
