{{- if .Values.healthCheck.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "gkg.fullname" . }}-health-check
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "health-check") | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "gkg.fullname" . }}-health-check
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "health-check") | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "gkg.fullname" . }}-health-check
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "health-check") | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "gkg.fullname" . }}-health-check
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "gkg.fullname" . }}-health-check
  apiGroup: rbac.authorization.k8s.io
{{- end }}
