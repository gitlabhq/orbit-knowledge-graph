{{- if .Values.healthCheck.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gkg.fullname" . }}-health-check
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.componentLabels" (dict "root" . "component" "health-check") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.healthCheck.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "gkg.componentSelectorLabels" (dict "root" . "component" "health-check") | nindent 4 }}
{{- end }}
