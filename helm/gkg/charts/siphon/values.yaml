namespace: siphon

monitoring_namespace: monitoring

# Global deployment defaults — per-deployment settings override these.
image:
  repository: registry.gitlab.com/gitlab-org/analytics-section/siphon
  pullPolicy: Always
  tag:

replicas: 1

reloader: false

# Global labels are merged with per-deployment labels.
# Per-deployment labels override global ones when keys collide.
labels: {}

metrics:
  port: 8080

resources:
  requests:
    cpu: 250m
    memory: 1Gi
  limits:
    cpu: 2
    memory: 2Gi

# Global podSpec defaults (tolerations, nodeSelector, affinity, etc.)
# Per-deployment podSpec overrides global when the same key is set.
podSpec: {}

# Deployment profiles — named bundles of defaults that a deployment can
# inherit via `profile: <name>`. Per-deployment values override the profile.
# Maps (labels, appConfig, resources, podSpec) are deep-merged; lists and
# scalars (command, env, envFromSecrets) are replaced entirely.
deploymentProfiles: {}

# Shared defaults for the application config.yaml generated in ConfigMaps.
# Only sections that a deployment also defines in its appConfig are merged;
# a consumer that omits "database" will not inherit these database defaults.
appConfigDefaults:
  prometheus:
    port: 8080
  primary_database:
    user: siphon
    password: "${PRIMARY_DATABASE_PASSWORD}"
    database: gitlabhq_production
    advisory_lock_timeout_ms: 100
    advisory_lock_timeout_fuzziness_ms: 50
    lock_timeout_ms: 500
    lock_timeout_fuzziness_ms: 300
  database:
    user: siphon_replicator
    password: "${REPLICATION_DATABASE_PASSWORD}"
    database: gitlabhq_production
    advisory_lock_timeout_ms: 100
    advisory_lock_timeout_fuzziness_ms: 50
    lock_timeout_ms: 500
    lock_timeout_fuzziness_ms: 300
  snapshot_database:
    user: siphon_snapshot
    password: "${SNAPSHOT_DATABASE_PASSWORD}"
    database: gitlabhq_production
    disallow_hot_standby_feedback_on: false
    advisory_lock_timeout_ms: 100
    advisory_lock_timeout_fuzziness_ms: 50
    lock_timeout_ms: 500
    lock_timeout_fuzziness_ms: 300
  replication:
    initial_data_snapshot_threads_per_table: 3
    memory_buffer_size_in_bytes: 10485760
    use_alter_publication_function: true
  queueing:
    driver: "nats"
    url: "nats://nats.nats.svc.cluster.local:4222"
    stream_name: "stg_siphon_event_stream"
    oversize_bucket_name: "stg_siphon_oversize_bucket"

deployments:
  example-postgres-producer:
    enabled: false
    replicas: 1

    reloader: true
    labels:
      env: "staging"

    mode: producer

    command:
      - "/app/siphon"
      - "producer"
      - "--config=/etc/config/config.yaml"
      - "--log-level=info"

    metrics:
      port: 8080

    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: 4
        memory: 6Gi

    appConfig:
      application_identifier: 'siphon-producer-postgres'
      max_column_size_in_bytes: 5000000
      partitions_monitoring_interval_in_seconds: 30
      database:
        host: postgres_primary
        database: siphon
        user: db1
        password: db1
        application_name: 'siphon-producer-db1'
        advisory_lock_id: 1
      replication:
        publication_name: "siphon_producer_db1"
        slot_name: "siphon_producer_db1_slot"
      queueing:
        lsn_store_name: 'postgresql_lsn_store_db1'
        snapshot_subject_name: 'db1_tables'
      table_mapping:
        - table: users
          schema: public
          subject: users
