suite: ServiceAccount
templates:
  - templates/serviceaccount.yaml
release:
  name: test-release
tests:
  - it: should create a ServiceAccount for each enabled deployment
    values:
      - ../values-full.yaml
    set:
      deployments.example-postgres-producer.enabled: false
    asserts:
      - hasDocuments:
          count: 2

  - it: should not create a ServiceAccount for disabled deployments
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should set correct name with -sa suffix
    values:
      - fixtures/clean.yaml
    set:
      namespace: my-ns
      deployments:
        my-app:
          enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: my-app-sa

  - it: should set correct namespace
    values:
      - fixtures/clean.yaml
    set:
      namespace: custom-ns
      deployments:
        my-app:
          enabled: true
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-ns

  - it: should include standard Helm labels
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
    asserts:
      - equal:
          path: metadata.labels.app
          value: my-app
      - equal:
          path: metadata.labels["helm.sh/chart"]
          value: siphon-1.0.0
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: test-release
