suite: Deployment
templates:
  - templates/deployment.yaml
release:
  name: test-release
tests:
  # ── Basic rendering ──────────────────────────────────────────────
  - it: should create a Deployment for each enabled deployment
    values:
      - ../values-full.yaml
    set:
      deployments.example-postgres-producer.enabled: false
    asserts:
      - hasDocuments:
          count: 2

  - it: should not create a Deployment for disabled deployments
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  # ── Metadata ─────────────────────────────────────────────────────
  - it: should set correct name and namespace
    values:
      - fixtures/clean.yaml
    set:
      namespace: my-ns
      deployments:
        my-app:
          enabled: true
          replicas: 2
    asserts:
      - equal:
          path: metadata.name
          value: my-app
      - equal:
          path: metadata.namespace
          value: my-ns

  - it: should include standard Helm labels
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
    asserts:
      - equal:
          path: metadata.labels.app
          value: my-app
      - equal:
          path: metadata.labels["helm.sh/chart"]
          value: siphon-1.0.0
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  # ── Custom labels on deployment AND pod template ─────────────────
  - it: should propagate custom labels to both deployment metadata and pod template
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          labels:
            env: production
            team: platform
    asserts:
      - equal:
          path: metadata.labels.env
          value: production
      - equal:
          path: metadata.labels.team
          value: platform
      - equal:
          path: spec.template.metadata.labels.env
          value: production
      - equal:
          path: spec.template.metadata.labels.team
          value: platform

  # ── Selector labels ──────────────────────────────────────────────
  - it: should use app label as selector
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
    asserts:
      - equal:
          path: spec.selector.matchLabels.app
          value: my-app
      - equal:
          path: spec.template.metadata.labels.app
          value: my-app

  # ── Replicas ─────────────────────────────────────────────────────
  - it: should default replicas to 1
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should set replicas from config
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          replicas: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  # ── Annotations: reloader ────────────────────────────────────────
  - it: should add configmap reloader annotation when reloader is true
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          reloader: true
    asserts:
      - equal:
          path: metadata.annotations["configmap.reloader.stakater.com/reload"]
          value: my-app-config

  - it: should add secret reloader annotation when envFromSecrets present
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          reloader: true
          envFromSecrets:
            - name: DB_PASS
              secretName: db-secret
              secretKey: password
            - name: API_KEY
              secretName: api-secret
              secretKey: key
    asserts:
      - equal:
          path: metadata.annotations["configmap.reloader.stakater.com/reload"]
          value: my-app-config
      - isNotNull:
          path: metadata.annotations["secret.reloader.stakater.com/reload"]

  - it: should not have annotations block when reloader is false and no custom annotations
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          reloader: false
    asserts:
      - notExists:
          path: metadata.annotations

  # ── Deployment profiles ─────────────────────────────────────────
  - it: should inherit command and labels from a deployment profile
    values:
      - fixtures/clean.yaml
    set:
      deploymentProfiles:
        producer:
          labels:
            type: siphon
          command:
            - /app/siphon
            - --config=/etc/config/config.yaml
      deployments:
        my-app:
          enabled: true
          profile: producer
    asserts:
      - equal:
          path: metadata.labels.type
          value: siphon
      - equal:
          path: spec.template.metadata.labels.type
          value: siphon
      - equal:
          path: spec.template.spec.containers[0].command
          value:
            - /app/siphon
            - --config=/etc/config/config.yaml

  - it: should allow per-deployment values to override profile values
    values:
      - fixtures/clean.yaml
    set:
      deploymentProfiles:
        producer:
          labels:
            type: siphon
            tier: backend
          replicas: 2
      deployments:
        my-app:
          enabled: true
          profile: producer
          labels:
            type: custom-override
          replicas: 5
    asserts:
      - equal:
          path: metadata.labels.type
          value: custom-override
      - equal:
          path: metadata.labels.tier
          value: backend
      - equal:
          path: spec.replicas
          value: 5

  - it: should work without a profile (backward compatible)
    values:
      - fixtures/clean.yaml
    set:
      deploymentProfiles:
        producer:
          labels:
            type: siphon
      deployments:
        my-app:
          enabled: true
          labels:
            team: platform
    asserts:
      - equal:
          path: metadata.labels.team
          value: platform
      - notExists:
          path: metadata.labels.type

  - it: should fail when profile references a non-existent deploymentProfile
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          profile: nonexistent
    asserts:
      - failedTemplate:
          errorMessage: 'deployment "my-app" references profile "nonexistent", but it is not defined in deploymentProfiles'

  - it: should add secret reloader annotation for template-expanded envFromSecrets
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          reloader: true
          envFromSecretsTemplate:
            - name: DB_PASS
              secretKey: db-password
          envFromSecretsName: db-secret-v1
    asserts:
      - equal:
          path: metadata.annotations["configmap.reloader.stakater.com/reload"]
          value: my-app-config
      - isNotNull:
          path: metadata.annotations["secret.reloader.stakater.com/reload"]

  # ── Custom annotations ───────────────────────────────────────────
  - it: should include custom annotations
    values:
      - fixtures/clean.yaml
    set:
      deployments:
        my-app:
          enabled: true
          annotations:
            custom.io/note: "hello"
    asserts:
      - equal:
          path: metadata.annotations["custom.io/note"]
          value: "hello"
