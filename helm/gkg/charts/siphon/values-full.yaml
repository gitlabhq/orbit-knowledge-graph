namespace: siphon

monitoring_namespace: monitoring

# Global image defaults — per-deployment image settings override these.
image:
  repository: registry.gitlab.com/gitlab-org/analytics-section/siphon
  pullPolicy: Always

resources:
  requests:
    cpu: 250m
    memory: 1Gi
  limits:
    cpu: 2
    memory: 2Gi

podTargetLabels:
  - env
  - environment
  - stage
  - type

# Shared defaults for the application config.yaml generated in ConfigMaps.
# Only sections that a deployment also defines in its appConfig are merged;
# a consumer that omits "database" will not inherit these database defaults.
appConfigDefaults:
  database:
    advisory_lock_timeout_ms: 100
    advisory_lock_timeout_fuzziness_ms: 50
    lock_timeout_ms: 100
    lock_timeout_fuzziness_ms: 50
  replication:
    standby_timeout_ms: 3000
    initial_data_snapshot_threads_per_table: 2
    memory_buffer_size_in_bytes: 50000000
  queueing:
    driver: "nats"
    url: "nats:4222"
    stream_name: 'replication_events'

deployments:
  # An instance of Siphon producer
  postgres-producer:
    enabled: true
    podmonitor: true
    mode: producer
    image:
      tag: 0.0.25-beta

    replicas: 1

    reloader: true
    labels:
      env: "staging"

    command:
      - "/app/siphon"
      - "producer"
      - "--config=/etc/config/config.yaml"
      - "--log-level=info"

    metrics:
      port: 8080
      path: "/metrics"
      interval: "30s"

    env:
      - name: GOMEMLIMIT
        value: "2000Mi"

    envFromSecrets:
      - name: CLICKHOUSE_DSN
        secretName: clickhouse-cloud-v2
        secretKey: clickhouse_cloud_dsn

    podSpec:
      tolerations:
        - effect: "NoSchedule"
          key: "workload"
          operator: "Equal"
          value: "siphon"

    appConfig:
      application_identifier: 'siphon-producer-postgres'
      max_column_size_in_bytes: 5000000
      partitions_monitoring_interval_in_seconds: 30
      database:
        host: postgres_primary
        database: siphon
        user: db1
        password: db1
        application_name: 'siphon-producer-db1'
        advisory_lock_id: 1
      replication:
        publication_name: "siphon_producer_db1"
        slot_name: "siphon_producer_db1_slot"
      queueing:
        lsn_store_name: 'postgresql_lsn_store_db1'
        snapshot_subject_name: 'db1_tables'
      table_mapping:
        - table: users
          schema: public
          subject: users

  # An instance of Siphon consumer
  clickhouse-consumer:
    enabled: true
    mode: consumer
    consumerType: clickhouse
    image:
      tag: 0.0.23-beta

    replicas: 1

    command:
      - "/app/siphon"
      - "consumer"
      - "--config=/etc/config/config.yaml"
      - "--log-level=info"

    appConfig:
      application_identifier: 'siphon-consumer-clickhouse'
