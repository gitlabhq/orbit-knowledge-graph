# Extra values merged into the vendored chart by sync.sh.
image:
  repository: registry.gitlab.com/gitlab-org/orbit/knowledge-graph/gkg
  tag: "0.13.0"
  pullPolicy: Always
serviceAccount:
  create: true
  name: ""
  annotations: {}
secrets:
  # Name of a pre-existing Kubernetes Secret.
  # Each value is a plain string, mounted at /etc/secrets/<config_path>.
  existingSecret: ""
  # Expected keys and their mount paths:
  keys:
    # Required for webserver to verify GitLab JWT tokens. Mounted at /etc/secrets/gitlab/jwt/verifying_key
    gitlabJwtVerifyingKey: gitlab-jwt-verifying-key
    # Required for outbound calls to get Gitaly information. Mounted at /etc/secrets/gitlab/jwt/signing_key
    gitlabJwtSigningKey: gitlab-jwt-signing-key
    # Required for ClickHouse datalake access. Mounted at /etc/secrets/datalake/password
    datalakePassword: datalake-password
    # Required for ClickHouse graph access. Mounted at /etc/secrets/graph/password
    graphPassword: graph-password
    # Required for ClickHouse graph read-only access. Mounted at /etc/secrets/graph/password
    graphReadPassword: graph-read-password
webserver:
  enabled: true
  replicas: 3
  logLevel: "info"
  probes:
    enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 8Gi
  service:
    type: ClusterIP
    httpPort: 8080
    grpcPort: 50054
    annotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
indexer:
  enabled: true
  replicas: 3
  logLevel: "info"
  probes:
    enabled: true
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      cpu: "8"
      memory: 16Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}
dispatcher:
  enabled: false
  schedule: "* * * * *"
  logLevel: "info"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
healthCheck:
  enabled: false
  replicas: 1
  logLevel: "info"
  probes:
    enabled: true
  port: 4201
  services:
    - gkg-indexer
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
clickhouse:
  datalake:
    host: ""
    httpPort: 8123
    database: ""
    user: default
    ssl: false
  graph:
    host: ""
    httpPort: 8123
    database: ""
    user: default
    readUser: ""
    ssl: false
# NATS subchart (disabled by default, enable for e2e)
nats:
  url: ""
  consumerName: gkg-indexer
  enabled: false
  streamName: ""
gitlab:
  baseUrl: ""
  # Optional DNS override hostname. When set, the baseUrl host is resolved
  # to this hostname's IP, allowing TLS to verify against baseUrl while
  # routing traffic through a different endpoint (e.g. a PSC gateway).
  resolveHost: ""
schedule:
  tasks: {}
engine:
  max_concurrent_workers: 16
  concurrency_groups:
    sdlc: 12
    code: 4
  handlers:
    global-handler:
      concurrency_group: sdlc
      max_attempts: 1
      retry_interval_secs: 60
    namespace-handler:
      concurrency_group: sdlc
      max_attempts: 1
      retry_interval_secs: 60
    code-indexing-task:
      concurrency_group: code
      max_attempts: 5
      retry_interval_secs: 60
metrics:
  otel:
    enabled: false
    endpoint: ""
  prometheus:
    enabled: false
    port: 9394
nameOverride: ""
fullnameOverride: ""
# Siphon subchart (disabled by default, enable for e2e)
siphon:
  enabled: false
gcp:
  project: ""
  region: ""
  cluster: ""
externalSecrets:
  enabled: false
  gcpServiceAccount: ""
  postgresSecretName: postgres-password
  clickhouseSecretName: clickhouse-password
  jwtSecretName: ""
