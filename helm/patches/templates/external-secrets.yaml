{{- if .Values.externalSecrets.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gcp-secrets-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.labels" . | nindent 4 }}
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.externalSecrets.gcpServiceAccount }}
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-secret-store
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.labels" . | nindent 4 }}
spec:
  provider:
    gcpsm:
      projectID: {{ .Values.gcp.project }}
      auth:
        workloadIdentity:
          clusterLocation: {{ .Values.gcp.region }}
          clusterName: {{ .Values.gcp.cluster }}
          clusterProjectID: {{ .Values.gcp.project }}
          serviceAccountRef:
            name: gcp-secrets-sa
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: postgres-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecrets.postgresSecretName }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: clickhouse-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: clickhouse-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecrets.clickhouseSecretName }}
{{- if .Values.externalSecrets.jwtSecretName }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gkg-server-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gkg.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: gkg-server-credentials
    creationPolicy: Owner
  data:
    - secretKey: jwt-secret
      remoteRef:
        key: {{ .Values.externalSecrets.jwtSecretName }}
{{- end }}
{{- end }}
