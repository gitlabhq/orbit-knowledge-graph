# Build and publish the `orbit` local CLI on tag releases.
#
# "Local CLI" distinguishes this binary (the user-facing `orbit` command for
# code indexing on a developer machine) from the gkg-server image we ship
# elsewhere in this pipeline.
#
# Both build and publish run only on tag pipelines (`vX.Y.Z`) on the canonical
# project.

.local-cli-release-rules:
  rules:
    - if: $CI_PROJECT_ID != $CANONICAL_PROJECT_ID
      when: never
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

.local-cli-build-linux:
  extends:
    - .job-template
    - .sccache-template
    - .local-cli-release-rules
  stage: build
  needs: []
  variables:
    PLATFORM: linux
  script:
    - ./scripts/build-local-cli.sh
    - sccache --show-stats || true
  artifacts:
    paths:
      - orbit-local-linux-*.tar.gz
    expire_in: 7 days

local-cli-build-linux-amd64:
  extends: .local-cli-build-linux
  tags:
    - saas-linux-large-amd64
  variables:
    ARCH: x86_64

local-cli-build-linux-arm64:
  extends: .local-cli-build-linux
  tags:
    - saas-linux-large-arm64
  variables:
    ARCH: aarch64

.local-cli-build-darwin:
  extends:
    - .local-cli-release-rules
  stage: build
  image: macos-15-xcode-16
  tags:
    - saas-macos-large-m2pro
  needs: []
  variables:
    PLATFORM: darwin
    RUST_VERSION: "1.95.0"
  before_script:
    # macos-15-xcode-16 ships with rustup but no toolchain pre-selected; the
    # project mise.toml is bypassed here because the runner's system-wide mise
    # config drags in heavy unrelated tools (ruby/maven/dotnet/...) that fail
    # to install and aren't needed to compile the orbit binary.
    - command -v rustup || (curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none --no-modify-path)
    - export PATH="$HOME/.cargo/bin:$PATH"
    - rustup toolchain install "$RUST_VERSION" --profile minimal
    - rustup default "$RUST_VERSION"
    - rustup target add aarch64-apple-darwin x86_64-apple-darwin
  script:
    - ./scripts/build-local-cli.sh
  artifacts:
    paths:
      - orbit-local-darwin-*.tar.gz
    expire_in: 7 days

local-cli-build-darwin-amd64:
  extends: .local-cli-build-darwin
  variables:
    ARCH: x86_64

local-cli-build-darwin-arm64:
  extends: .local-cli-build-darwin
  variables:
    ARCH: aarch64

local-cli-build-windows-amd64:
  extends:
    - .local-cli-release-rules
  stage: build
  tags:
    - saas-windows-medium-amd64
  needs: []
  variables:
    PLATFORM: windows
    ARCH: x86_64
    RUST_VERSION: "1.95.0"
  before_script:
    - rustup toolchain install %RUST_VERSION% --profile minimal
    - rustup default %RUST_VERSION%
    - rustup target add x86_64-pc-windows-msvc
  script:
    - bash ./scripts/build-local-cli.sh
  artifacts:
    paths:
      - orbit-local-windows-x86_64.tar.gz
    expire_in: 7 days

local-cli-code-sign:
  extends:
    - .local-cli-release-rules
    - .google-oidc:auth
  stage: build
  image: ${CI_REGISTRY}/gitlab-com/gl-infra/common-ci-tasks-images/code-signer:1.1.0
  tags:
    - saas-linux-medium-amd64
  needs:
    - local-cli-build-darwin-amd64
    - local-cli-build-darwin-arm64
    - local-cli-build-windows-amd64
  script:
    - |
      sign() { ./scripts/sign-and-repackage.sh "$1" "$2" "$3"; }
      for tarball in orbit-local-darwin-*.tar.gz;  do sign "$tarball" macos   orbit;     done
      for tarball in orbit-local-windows-*.tar.gz; do sign "$tarball" windows orbit.exe; done
  artifacts:
    paths:
      - orbit-local-darwin-*.tar.gz
      - orbit-local-windows-*.tar.gz
    expire_in: 7 days

local-cli-publish:
  extends:
    - .local-cli-release-rules
  stage: publish
  image: alpine:latest
  tags:
    - saas-linux-medium-amd64
  needs:
    - local-cli-build-linux-amd64
    - local-cli-build-linux-arm64
    - local-cli-code-sign
  before_script:
    - apk add --no-cache bash curl coreutils
  script:
    - bash ./scripts/upload-local-cli-release.sh

# Upload MR builds to a staging package path so the full upload pipeline can
# be exercised without creating a production release or affecting install.sh.
# Artifacts land under 'orbit-local-dev/<mr-iid>-<sha>/' in the package
# registry and are never linked to a GitLab Release object.
local-cli-test-publish:
  stage: publish
  image: alpine:latest
  tags:
    - saas-linux-medium-amd64
  needs: []
  rules:
    - if: $CI_PROJECT_ID != $CANONICAL_PROJECT_ID
      when: never
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      when: manual
      allow_failure: true
  variables:
    PACKAGE_NAME: orbit-local-dev
  before_script:
    - apk add --no-cache bash curl coreutils
  script:
    - |
      export CI_COMMIT_TAG="mr-${CI_MERGE_REQUEST_IID}-${CI_COMMIT_SHORT_SHA}"
      bash ./scripts/upload-local-cli-release.sh --upload-only
