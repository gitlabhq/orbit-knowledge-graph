# Build and publish the `orbit` local CLI on tag releases.
#
# "Local CLI" distinguishes this binary (the user-facing `orbit` command for
# code indexing on a developer machine) from the gkg-server image we ship
# elsewhere in this pipeline.
#
# Both build and publish run only on tag pipelines (`vX.Y.Z`) on the canonical
# project.

.local-cli-release-rules:
  rules:
    - if: $CI_PROJECT_ID != $CANONICAL_PROJECT_ID
      when: never
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

.local-cli-build-linux:
  extends:
    - .job-template
    - .sccache-template
    - .local-cli-release-rules
  stage: build
  needs: []
  variables:
    PLATFORM: linux
  script:
    - ./scripts/build-local-cli.sh
    - sccache --show-stats || true
  artifacts:
    paths:
      - orbit-local-linux-*.tar.gz
    expire_in: 7 days

local-cli-build-linux-amd64:
  extends: .local-cli-build-linux
  tags:
    - saas-linux-large-amd64
  variables:
    ARCH: x86_64

local-cli-build-linux-arm64:
  extends: .local-cli-build-linux
  tags:
    - saas-linux-large-arm64
  variables:
    ARCH: aarch64

.local-cli-build-darwin:
  extends:
    - .local-cli-release-rules
  stage: build
  image: macos-15-xcode-16
  tags:
    - saas-macos-large-m2pro
  needs: []
  variables:
    PLATFORM: darwin
    RUST_VERSION: "1.95.0"
  before_script:
    # macos-15-xcode-16 ships with rustup but no toolchain pre-selected; the
    # project mise.toml is bypassed here because the runner's system-wide mise
    # config drags in heavy unrelated tools (ruby/maven/dotnet/...) that fail
    # to install and aren't needed to compile the orbit binary.
    - command -v rustup || (curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none --no-modify-path)
    - export PATH="$HOME/.cargo/bin:$PATH"
    - rustup toolchain install "$RUST_VERSION" --profile minimal
    - rustup default "$RUST_VERSION"
    - rustup target add aarch64-apple-darwin x86_64-apple-darwin
  script:
    - ./scripts/build-local-cli.sh
  artifacts:
    paths:
      - orbit-local-darwin-*.tar.gz
    expire_in: 7 days

local-cli-build-darwin-amd64:
  extends: .local-cli-build-darwin
  variables:
    ARCH: x86_64

local-cli-build-darwin-arm64:
  extends: .local-cli-build-darwin
  variables:
    ARCH: aarch64

# Cross-compile a Windows x86_64 build from a Linux runner via cargo-xwin
# (clang-cl + lld with the MSVC SDK fetched on demand and cached). No
# Windows runner needed. libduckdb-sys downloads a prebuilt libduckdb for
# the target so we skip a full C++ cross-build of DuckDB. Runs on tag
# pipelines plus MR pipelines that touch the build paths so we can keep
# the toolchain green.
.local-cli-windows-rules:
  rules:
    - if: $CI_PROJECT_ID != $CANONICAL_PROJECT_ID
      when: never
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      changes:
        - scripts/build-local-cli.sh
        - .gitlab/ci/release-local.yml
        - Cargo.lock
        - crates/orbit-local/**/*
        - crates/duckdb-client/**/*

local-cli-build-windows-amd64:
  extends:
    - .local-cli-windows-rules
  stage: build
  image: ${DEP_PROXY}rust:1.95-bookworm
  tags:
    - saas-linux-xlarge-amd64
  needs: []
  variables:
    PLATFORM: windows
    ARCH: x86_64
    DUCKDB_DOWNLOAD_LIB: "1"
    CARGO_INCREMENTAL: "0"
    XWIN_CACHE_DIR: ${CI_PROJECT_DIR}/.cache/xwin
    CARGO_HOME: ${CI_PROJECT_DIR}/.cache/cargo
  cache:
    key: "windows-xwin-x86_64"
    paths:
      - .cache/xwin/
      - .cache/cargo/registry/
      - .cache/cargo/git/
      - .cache/cargo/bin/
    policy: pull-push
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends clang lld llvm cmake zip ca-certificates
    - export PATH="${CARGO_HOME}/bin:$PATH"
    - command -v cargo-xwin || cargo install --locked cargo-xwin --version ^0.22
  script:
    - ./scripts/build-local-cli.sh
  artifacts:
    paths:
      - orbit-local-windows-*.zip
    expire_in: 7 days

local-cli-code-sign:
  extends:
    - .local-cli-release-rules
    - .google-oidc:auth
  stage: build
  image: ${CI_REGISTRY}/gitlab-com/gl-infra/common-ci-tasks-images/code-signer:1.1.0
  tags:
    - saas-linux-medium-amd64
  needs:
    - local-cli-build-darwin-amd64
    - local-cli-build-darwin-arm64
  script:
    - ./scripts/sign-and-repackage.sh ./orbit-local-darwin-x86_64.tar.gz macos orbit
    - ./scripts/sign-and-repackage.sh ./orbit-local-darwin-aarch64.tar.gz macos orbit
  artifacts:
    paths:
      - orbit-local-darwin-*.tar.gz
    expire_in: 7 days

local-cli-publish:
  extends:
    - .local-cli-release-rules
  stage: publish
  image: alpine:latest
  tags:
    - saas-linux-medium-amd64
  needs:
    - local-cli-build-linux-amd64
    - local-cli-build-linux-arm64
    - local-cli-build-windows-amd64
    - local-cli-code-sign
  before_script:
    - apk add --no-cache bash curl coreutils
  script:
    - bash ./scripts/upload-local-cli-release.sh
