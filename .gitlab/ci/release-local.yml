# Build and publish the `orbit` local CLI on tag releases.
#
# "Local CLI" distinguishes this binary (the user-facing `orbit` command for
# code indexing on a developer machine) from the gkg-server image we ship
# elsewhere in this pipeline.
#
# Both build and publish run only on tag pipelines (`vX.Y.Z`) on the canonical
# project.

.local-cli-release-rules:
  rules:
    - if: $CI_PROJECT_ID != $CANONICAL_PROJECT_ID
      when: never
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

.local-cli-build-linux:
  extends:
    - .job-template
    - .sccache-template
    - .local-cli-release-rules
  stage: build
  needs: []
  variables:
    PLATFORM: linux
    # Statically link libstdc++ and libgcc so the released binary doesn't pin
    # consumers to a specific host libstdc++ version (GLIBCXX/CXXABI). The
    # Windows build already does this; symmetry on Linux unblocks shipping
    # the binary into environments built on older distros (UBI 9, etc.)
    # without each consumer pulling in gcc-toolset-12.
    RUSTFLAGS: "-C link-arg=-static-libgcc -C link-arg=-static-libstdc++"
  script:
    - ./scripts/build-local-cli.sh
    - sccache --show-stats || true
  artifacts:
    paths:
      - orbit-local-linux-*.tar.gz
    expire_in: 7 days

local-cli-build-linux-amd64:
  extends: .local-cli-build-linux
  tags:
    - saas-linux-large-amd64
  variables:
    ARCH: x86_64

local-cli-build-linux-arm64:
  extends: .local-cli-build-linux
  tags:
    - saas-linux-large-arm64
  variables:
    ARCH: aarch64

local-cli-build-windows-amd64:
  extends:
    - .job-template
    - .sccache-template
    - .local-cli-release-rules
  stage: build
  needs: []
  tags:
    - saas-linux-xlarge-amd64
  timeout: 90m
  variables:
    PLATFORM: windows
    ARCH: x86_64
    LLVM_MINGW_VERSION: "20260505"
    CC_x86_64_pc_windows_gnullvm: x86_64-w64-mingw32-clang
    CXX_x86_64_pc_windows_gnullvm: x86_64-w64-mingw32-clang++
    AR_x86_64_pc_windows_gnullvm: x86_64-w64-mingw32-ar
    CARGO_TARGET_X86_64_PC_WINDOWS_GNULLVM_LINKER: x86_64-w64-mingw32-clang++
    RUSTFLAGS: "-C link-arg=-static-libgcc -C link-arg=-static-libstdc++"
  artifacts:
    paths:
      - orbit-local-windows-x86_64.zip
    expire_in: 7 days
  before_script:
    - !reference [.sccache-template, before_script]
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends file xz-utils zip
    - ./scripts/ci/install-llvm-mingw.sh
    - export PATH="/opt/llvm-mingw/bin:$PATH"
  script:
    - ./scripts/build-local-cli.sh
    - sccache --show-stats || true

.local-cli-build-darwin:
  extends:
    - .local-cli-release-rules
  stage: build
  image: macos-15-xcode-16
  tags:
    - saas-macos-large-m2pro
  needs: []
  variables:
    PLATFORM: darwin
    RUST_VERSION: "1.95.0"
  before_script:
    # macos-15-xcode-16 ships with rustup but no toolchain pre-selected; the
    # project mise.toml is bypassed here because the runner's system-wide mise
    # config drags in heavy unrelated tools (ruby/maven/dotnet/...) that fail
    # to install and aren't needed to compile the orbit binary.
    - command -v rustup || (curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none --no-modify-path)
    - export PATH="$HOME/.cargo/bin:$PATH"
    - rustup toolchain install "$RUST_VERSION" --profile minimal
    - rustup default "$RUST_VERSION"
    - rustup target add aarch64-apple-darwin x86_64-apple-darwin
  script:
    - ./scripts/build-local-cli.sh
  artifacts:
    paths:
      - orbit-local-darwin-*.tar.gz
    expire_in: 7 days

local-cli-build-darwin-amd64:
  extends: .local-cli-build-darwin
  variables:
    ARCH: x86_64

local-cli-build-darwin-arm64:
  extends: .local-cli-build-darwin
  variables:
    ARCH: aarch64

local-cli-code-sign:
  extends:
    - .local-cli-release-rules
    - .google-oidc:auth
  stage: build
  image: ${CI_REGISTRY}/gitlab-com/gl-infra/common-ci-tasks-images/code-signer:1.1.0
  tags:
    - saas-linux-medium-amd64
  needs:
    - local-cli-build-darwin-amd64
    - local-cli-build-darwin-arm64
    - local-cli-build-windows-amd64
  script:
    - ./scripts/sign-and-repackage.sh ./orbit-local-darwin-x86_64.tar.gz macos orbit
    - ./scripts/sign-and-repackage.sh ./orbit-local-darwin-aarch64.tar.gz macos orbit
    - ./scripts/sign-and-repackage.sh ./orbit-local-windows-x86_64.zip windows orbit.exe
  artifacts:
    paths:
      - orbit-local-darwin-*.tar.gz
      - orbit-local-windows-*.zip
    expire_in: 7 days

local-cli-publish:
  extends:
    - .local-cli-release-rules
  stage: publish
  image: alpine:latest
  tags:
    - saas-linux-medium-amd64
  needs:
    - local-cli-build-linux-amd64
    - local-cli-build-linux-arm64
    - local-cli-code-sign
  before_script:
    - apk add --no-cache bash curl coreutils
  script:
    - bash ./scripts/upload-local-cli-release.sh

# ---------------------------------------------------------------------------
# TEMPORARY VERIFICATION JOB — to be removed before merging the parent MR.
#
# Builds the orbit Linux x86_64 binary with the new static-libstdc++/libgcc
# RUSTFLAGS and verifies the resulting binary:
#   - ldd shows no libstdc++.so.6 / libgcc_s.so.1
#   - objdump -T shows no GLIBCXX_* / GCC_12.0.0 symbol requirements
#   - file reports a valid ELF binary
#   - binary runs (or at least invokes) under UBI 8 and UBI 9 minimal
#
# This job runs only on MR pipelines for the verification branch (or when
# explicitly triggered), so it does not affect normal MR pipelines.
# ---------------------------------------------------------------------------

verify-static-link-linux-amd64:
  extends:
    - .job-template
    - .sccache-template
  stage: build
  needs: []
  tags:
    - saas-linux-large-amd64
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME == 'test/verify-static-link-build'
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      when: manual
      allow_failure: true
  variables:
    PLATFORM: linux
    ARCH: x86_64
    RUSTFLAGS: "-C link-arg=-static-libgcc -C link-arg=-static-libstdc++"
  script:
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends file binutils
    - ./scripts/build-local-cli.sh
    - sccache --show-stats || true
    - BIN="target/x86_64-unknown-linux-gnu/release/orbit"
    - echo "=== file ==="
    - file "$BIN"
    - echo "=== size ==="
    - ls -lh "$BIN"
    - echo "=== ldd ==="
    - ldd "$BIN" || true
    - echo "=== ldd | grep libstdc++ / libgcc (should be empty) ==="
    - |
      if ldd "$BIN" | grep -E 'libstdc\+\+|libgcc_s'; then
        echo "FAIL: binary still dynamically links libstdc++/libgcc"
        exit 1
      else
        echo "PASS: no libstdc++/libgcc dynamic dependency"
      fi
    - echo "=== objdump GLIBCXX (should be empty) ==="
    - |
      if objdump -T "$BIN" | grep -oE 'GLIBCXX_[0-9.]+' | sort -V -u; then
        echo "FAIL: binary still imports GLIBCXX_* symbols"
        exit 1
      else
        echo "PASS: no GLIBCXX_* symbol requirements"
      fi
    - echo "=== objdump GCC_ (should be empty or only old GCC_3.x / GCC_4.x baseline) ==="
    - objdump -T "$BIN" | grep -oE 'GCC_[0-9.]+' | sort -V -u || true
    - echo "=== objdump GLIBC (still expected — dynamic glibc) ==="
    - objdump -T "$BIN" | grep -oE 'GLIBC_[0-9.]+' | sort -V -u | tail -10 || true
  artifacts:
    when: always
    paths:
      - orbit-local-linux-x86_64.tar.gz
      - target/x86_64-unknown-linux-gnu/release/orbit
    expire_in: 7 days

verify-static-link-on-ubi8:
  stage: e2e
  image: registry.access.redhat.com/ubi8/ubi:latest
  tags:
    - saas-linux-medium-amd64
  needs:
    - verify-static-link-linux-amd64
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME == 'test/verify-static-link-build'
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      when: manual
      allow_failure: true
  script:
    - echo "=== /etc/os-release ==="
    - cat /etc/os-release | head -3
    - echo "=== ldd --version ==="
    - ldd --version | head -1
    - chmod +x target/x86_64-unknown-linux-gnu/release/orbit
    - echo "=== orbit --version on UBI 8 ==="
    - |
      # UBI 8 has glibc 2.28 — binary still needs glibc >= 2.34 because glibc
      # is dynamically linked. We expect this to fail with GLIBC_2.34 not
      # found errors (which is the pre-musl follow-up behavior). The point of
      # this job is to capture the exact errors so we can prove the
      # libstdc++/GLIBCXX gap is gone, even if the glibc gap remains.
      target/x86_64-unknown-linux-gnu/release/orbit --version 2>&1 || true
    - echo "=== ldd on UBI 8 ==="
    - ldd target/x86_64-unknown-linux-gnu/release/orbit 2>&1 || true

verify-static-link-on-ubi9:
  stage: e2e
  image: registry.access.redhat.com/ubi9-minimal:latest
  tags:
    - saas-linux-medium-amd64
  needs:
    - verify-static-link-linux-amd64
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME == 'test/verify-static-link-build'
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      when: manual
      allow_failure: true
  script:
    - echo "=== /etc/os-release ==="
    - cat /etc/os-release | head -3
    - echo "=== ldd --version ==="
    - ldd --version | head -1
    - chmod +x target/x86_64-unknown-linux-gnu/release/orbit
    - echo "=== orbit --version on UBI 9 minimal ==="
    - target/x86_64-unknown-linux-gnu/release/orbit --version
    - echo "=== ldd on UBI 9 ==="
    - ldd target/x86_64-unknown-linux-gnu/release/orbit
