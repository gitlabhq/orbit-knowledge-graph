# Build and publish the `orbit` local CLI on tag releases.
#
# "Local CLI" distinguishes this binary (the user-facing `orbit` command for
# code indexing on a developer machine) from the gkg-server image we ship
# elsewhere in this pipeline.
#
# Both build and publish run only on tag pipelines (`vX.Y.Z`) on the canonical
# project.

.local-cli-release-rules:
  rules:
    - if: $CI_PROJECT_ID != $CANONICAL_PROJECT_ID
      when: never
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

.local-cli-build-linux:
  extends:
    - .job-template
    - .sccache-template
    - .local-cli-release-rules
  stage: build
  needs: []
  variables:
    PLATFORM: linux
  script:
    - ./scripts/build-local-cli.sh
    - sccache --show-stats || true
  artifacts:
    paths:
      - orbit-local-linux-*.tar.gz
    expire_in: 7 days

local-cli-build-linux-amd64:
  extends: .local-cli-build-linux
  tags:
    - saas-linux-large-amd64
  variables:
    ARCH: x86_64

local-cli-build-linux-arm64:
  extends: .local-cli-build-linux
  tags:
    - saas-linux-large-arm64
  variables:
    ARCH: aarch64

# Windows cross-compile spike
#
# Runs three independent jobs in parallel on MR pipelines, each using a
# different Linux->Windows cross-compile toolchain. After we pick a winner
# the other two jobs are removed and the survivor inherits
# `.local-cli-release-rules` so it ships on tag pipelines.

.local-cli-build-windows:
  extends:
    - .job-template
    - .sccache-template
  stage: build
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
  tags:
    - saas-linux-large-amd64
  timeout: 90m
  variables:
    PLATFORM: windows
    ARCH: x86_64
  artifacts:
    paths:
      - orbit-local-windows-x86_64-*.zip
    expire_in: 7 days

local-cli-build-windows-xwin:
  extends: .local-cli-build-windows
  variables:
    PLATFORM: windows
    ARCH: x86_64
    WINDOWS_METHOD: xwin
    # Tool version (cargo-xwin release). NOT the MSVC SDK version — that env
    # is `XWIN_VERSION` and is read directly by cargo-xwin, so don't set it.
    CARGO_XWIN_VERSION: "0.22.0"
    XWIN_ARCH: x86_64
    XWIN_ACCEPT_LICENSE: "1"
    XWIN_CACHE_DIR: ${CI_PROJECT_DIR}/.xwin-cache
  cache:
    key: "xwin-sdk-v17"
    paths:
      - .xwin-cache/
  before_script:
    - !reference [.sccache-template, before_script]
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends lld zip
    - curl -fsSL "https://github.com/rust-cross/cargo-xwin/releases/download/v${CARGO_XWIN_VERSION}/cargo-xwin-v${CARGO_XWIN_VERSION}.x86_64-unknown-linux-musl.tar.gz"
        | tar -xz -C /opt/cargo/bin cargo-xwin
    - chmod +x /opt/cargo/bin/cargo-xwin
  script:
    - ./scripts/build-local-cli.sh
    - sccache --show-stats || true

local-cli-build-windows-zigbuild:
  extends: .local-cli-build-windows
  variables:
    PLATFORM: windows
    ARCH: x86_64
    WINDOWS_METHOD: zigbuild
  before_script:
    - !reference [.sccache-template, before_script]
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends zip
  script:
    - ./scripts/build-local-cli.sh
    - sccache --show-stats || true

local-cli-build-windows-mingw:
  extends: .local-cli-build-windows
  variables:
    PLATFORM: windows
    ARCH: x86_64
    WINDOWS_METHOD: mingw
    CC_x86_64_pc_windows_gnu: x86_64-w64-mingw32-gcc
    CXX_x86_64_pc_windows_gnu: x86_64-w64-mingw32-g++
    AR_x86_64_pc_windows_gnu: x86_64-w64-mingw32-ar
    CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
    # Bundle libgcc/libstdc++ so the .exe has no external DLL deps.
    RUSTFLAGS: "-C link-arg=-static-libgcc -C link-arg=-static-libstdc++"
  before_script:
    - !reference [.sccache-template, before_script]
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends
        gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 mingw-w64-tools zip
    # DuckDB's C++17 needs posix threads, not win32.
    - update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix || true
    - update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix || true
  script:
    - ./scripts/build-local-cli.sh
    - sccache --show-stats || true

.local-cli-build-darwin:
  extends:
    - .local-cli-release-rules
  stage: build
  image: macos-15-xcode-16
  tags:
    - saas-macos-large-m2pro
  needs: []
  variables:
    PLATFORM: darwin
    RUST_VERSION: "1.95.0"
  before_script:
    # macos-15-xcode-16 ships with rustup but no toolchain pre-selected; the
    # project mise.toml is bypassed here because the runner's system-wide mise
    # config drags in heavy unrelated tools (ruby/maven/dotnet/...) that fail
    # to install and aren't needed to compile the orbit binary.
    - command -v rustup || (curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none --no-modify-path)
    - export PATH="$HOME/.cargo/bin:$PATH"
    - rustup toolchain install "$RUST_VERSION" --profile minimal
    - rustup default "$RUST_VERSION"
    - rustup target add aarch64-apple-darwin x86_64-apple-darwin
  script:
    - ./scripts/build-local-cli.sh
  artifacts:
    paths:
      - orbit-local-darwin-*.tar.gz
    expire_in: 7 days

local-cli-build-darwin-amd64:
  extends: .local-cli-build-darwin
  variables:
    ARCH: x86_64

local-cli-build-darwin-arm64:
  extends: .local-cli-build-darwin
  variables:
    ARCH: aarch64

local-cli-code-sign:
  extends:
    - .local-cli-release-rules
    - .google-oidc:auth
  stage: build
  image: ${CI_REGISTRY}/gitlab-com/gl-infra/common-ci-tasks-images/code-signer:1.1.0
  tags:
    - saas-linux-medium-amd64
  needs:
    - local-cli-build-darwin-amd64
    - local-cli-build-darwin-arm64
  script:
    - ./scripts/sign-and-repackage.sh ./orbit-local-darwin-x86_64.tar.gz macos orbit
    - ./scripts/sign-and-repackage.sh ./orbit-local-darwin-aarch64.tar.gz macos orbit
  artifacts:
    paths:
      - orbit-local-darwin-*.tar.gz
    expire_in: 7 days

local-cli-publish:
  extends:
    - .local-cli-release-rules
  stage: publish
  image: alpine:latest
  tags:
    - saas-linux-medium-amd64
  needs:
    - local-cli-build-linux-amd64
    - local-cli-build-linux-arm64
    - local-cli-code-sign
  before_script:
    - apk add --no-cache bash curl coreutils
  script:
    - bash ./scripts/upload-local-cli-release.sh
