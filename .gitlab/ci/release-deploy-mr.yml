# Opens the argocd-apps MR bumping orbit-stg + orbit-prd to this tag, then
# pings Slack (#f_orbit). Ordered after release-manifest so the image exists
# before the bump can merge. Bot token (infra-mgmt!3039/!3040) can open MRs on
# argocd/apps, never merge. Rerun the tag pipeline with DRY_RUN=true to rehearse.
release-deploy-mr:
  extends: .automation-bot
  stage: release
  needs:
    - release-manifest
  variables:
    DRY_RUN: "false"
  rules:
    - if: $CI_PROJECT_ID != $CANONICAL_PROJECT_ID
      when: never
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  before_script:
    - test -n "${AUTOMATION_BOT_TOKEN}" || (echo "Missing AUTOMATION_BOT_TOKEN from Vault" && exit 1)
    - apk add --no-cache bash git curl jq coreutils
    - glab auth login --hostname "$CI_SERVER_HOST" --token "$AUTOMATION_BOT_TOKEN"
  script:
    - bash scripts/ci/create-deploy-mr.sh
