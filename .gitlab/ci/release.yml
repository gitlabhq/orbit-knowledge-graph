# Build and publish the `orbit` CLI for tag releases.
#
# Build jobs run on tag pipelines (`vX.Y.Z`) and — temporarily, while we shake
# the new pipeline out — on every MR pipeline so we can verify each toolchain
# from a feature branch.
# The publish job runs only on tag pipelines on the canonical project.

.orbit-release-build-rules:
  rules:
    - if: $CI_PROJECT_ID != $CANONICAL_PROJECT_ID
      when: never
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    # TODO: drop the MR rule once tag pipelines are confirmed to publish correctly.
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'

.orbit-release-publish-rules:
  rules:
    - if: $CI_PROJECT_ID != $CANONICAL_PROJECT_ID
      when: never
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

.orbit-build-linux:
  extends:
    - .job-template
    - .sccache-template
    - .orbit-release-build-rules
  stage: build
  needs: []
  variables:
    PLATFORM: linux
  script:
    - ./scripts/build-orbit.sh
    - sccache --show-stats || true
  artifacts:
    paths:
      - orbit-linux-*.tar.gz
    expire_in: 7 days

orbit-build-linux-amd64:
  extends: .orbit-build-linux
  tags:
    - saas-linux-large-amd64
  variables:
    ARCH: x86_64

orbit-build-linux-arm64:
  extends: .orbit-build-linux
  tags:
    - saas-linux-large-arm64
  variables:
    ARCH: aarch64

.orbit-build-darwin:
  extends:
    - .orbit-release-build-rules
  stage: build
  image: macos-15-xcode-16
  tags:
    - saas-macos-medium-m1
  needs: []
  variables:
    PLATFORM: darwin
    # Pull a prebuilt libduckdb instead of compiling it; matches local dev defaults.
    DUCKDB_DOWNLOAD_LIB: "1"
    RUST_VERSION: "1.95.0"
  before_script:
    # macos-15-xcode-16 ships with rustup but no toolchain pre-selected; the
    # project mise.toml is bypassed here because the runner's system-wide mise
    # config drags in heavy unrelated tools (ruby/maven/dotnet/...) that fail
    # to install and aren't needed to compile the orbit binary.
    - command -v rustup || (curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none --no-modify-path)
    - export PATH="$HOME/.cargo/bin:$PATH"
    - rustup toolchain install "$RUST_VERSION" --profile minimal
    - rustup default "$RUST_VERSION"
    - rustup target add aarch64-apple-darwin x86_64-apple-darwin
  script:
    - ./scripts/build-orbit.sh
  artifacts:
    paths:
      - orbit-darwin-*.tar.gz
    expire_in: 7 days

orbit-build-darwin-amd64:
  extends: .orbit-build-darwin
  variables:
    ARCH: x86_64

orbit-build-darwin-arm64:
  extends: .orbit-build-darwin
  variables:
    ARCH: aarch64

orbit-publish:
  extends:
    - .orbit-release-publish-rules
  stage: publish
  image: ${DEP_PROXY}alpine:latest
  tags:
    - saas-linux-medium-amd64
  needs:
    - orbit-build-linux-amd64
    - orbit-build-linux-arm64
    - orbit-build-darwin-amd64
    - orbit-build-darwin-arm64
  before_script:
    - apk add --no-cache bash curl coreutils
  script:
    - bash ./scripts/upload-orbit-release.sh
