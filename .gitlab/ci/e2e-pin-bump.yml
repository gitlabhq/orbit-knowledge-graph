# Scheduled e2e pin bumper. Token provisioned by infra-mgmt terraform
# (environments/release-platform/knowledge-graph.tf). Setup: create a daily
# pipeline schedule with SCHEDULE_ONLY=e2e-pin-bump; rehearse once with
# DRY_RUN=true on the schedule.
e2e-pin-bump:
  extends: .automation-bot
  stage: review
  needs: []
  variables:
    DRY_RUN: "false"
  rules:
    - if: $CI_PROJECT_ID != $CANONICAL_PROJECT_ID
      when: never
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_ONLY == "e2e-pin-bump"
  before_script:
    - test -n "${AUTOMATION_BOT_TOKEN}" || (echo "Missing AUTOMATION_BOT_TOKEN from Vault" && exit 1)
    - apk add --no-cache bash curl python3 git coreutils yq
    - glab auth login --hostname "$CI_SERVER_HOST" --token "$AUTOMATION_BOT_TOKEN"
  script:
    - bash scripts/ci/open-e2e-bump-mr.sh
