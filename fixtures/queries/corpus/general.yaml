# General GKG query corpus (mixed shapes).
#
# Broad traversal / aggregation / path-finding / neighbors coverage.
# Canonical corpus entry: desc / category / suite / query (inline DSL JSON).
# Placeholders: "$sample" / "$sample:N" bind to real in-scope ids at run time.

q1_defines_traversal_file_ends_with_rb:
  desc: "DEFINES traversal (File ends_with .rb)"
  category: code_graph
  suite: general
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {
          "id": "f",
          "entity": "File",
          "filters": {
            "path": {
              "op": "ends_with",
              "value": ".rb"
            }
          }
        },
        {
          "id": "d",
          "entity": "Definition",
          "filters": {
            "name": {
              "op": "starts_with",
              "value": "process"
            }
          }
        }
      ],
      "relationships": [
        {
          "type": "DEFINES",
          "from": "f",
          "to": "d"
        }
      ],
      "limit": 20
    }

q2_datetime_range_filter_on_mr:
  desc: "DateTime range filter on MR"
  category: traversal
  suite: general
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {
          "id": "mr",
          "entity": "MergeRequest",
          "filters": {
            "merged_at": {
              "op": "gte",
              "value": "2026-03-01T00:00:00Z"
            },
            "state": "merged"
          }
        },
        {
          "id": "p",
          "entity": "Project",
          "node_ids": "$sample"
        }
      ],
      "relationships": [
        {
          "type": "IN_PROJECT",
          "from": "mr",
          "to": "p"
        }
      ],
      "order_by": "-mr.merged_at",
      "limit": 20
    }

q3_bidirectional_neighbors_on_project:
  desc: "Bidirectional neighbors on Project"
  category: neighbors
  suite: general
  query: |
    {
      "query_type": "neighbors",
      "node": {
        "id": "p",
        "entity": "Project",
        "node_ids": "$sample"
      },
      "neighbors": {
        "node": "p",
        "direction": "both",
        "rel_types": [
          "CONTAINS",
          "IN_PROJECT"
        ]
      },
      "limit": 20
    }

q4_3_node_agg_mr_count_per_author:
  desc: "3-node agg MR count per author"
  category: aggregation
  suite: general
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {
          "id": "u",
          "entity": "User"
        },
        {
          "id": "mr",
          "entity": "MergeRequest",
          "filters": {
            "state": "merged"
          }
        },
        {
          "id": "p",
          "entity": "Project",
          "node_ids": "$sample"
        }
      ],
      "relationships": [
        {
          "type": "AUTHORED",
          "from": "u",
          "to": "mr"
        },
        {
          "type": "IN_PROJECT",
          "from": "mr",
          "to": "p"
        }
      ],
      "group_by": [
        {
          "kind": "node",
          "node": "u"
        }
      ],
      "aggregations": [
        {
          "function": "count",
          "target": "mr",
          "alias": "mr_count"
        }
      ],
      "aggregation_sort": {
        "column": "mr_count",
        "direction": "DESC"
      },
      "limit": 20
    }

