# traversal_path PK-pruning corpus.
#
# project/group/namespace scope filters; {{TOKENS}} resolved from a tokens file.
# Canonical corpus entry: desc / category / suite / query (inline DSL JSON).
# Placeholders: "$sample" / "$sample:N" bind to real in-scope ids at run time.

proj_node_lookup_by_id:
  desc: "Project node lookup by numeric id (eq). Rewrite turns id-eq into startsWith(traversal_path,'<prefix>') on the gl_project PK; without the rewrite this is a bloom-filter scan on idx_id."
  category: search
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [{"id": "p", "entity": "Project", "columns": ["id", "name", "full_path", "visibility_level"], "filters": {"id": {"op": "eq", "value": {{PROJECT_ID}}}}}],
      "limit": 1
    }

proj_node_lookup_by_full_path:
  desc: "Project node lookup by full_path (eq). Rewrite resolves full_path -> traversal_path prefix via the graph-DB dictionary and emits startsWith(traversal_path,'<prefix>') on the PK; otherwise an idx_full_path bloom scan."
  category: search
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [{"id": "p", "entity": "Project", "columns": ["id", "name", "full_path", "visibility_level"], "filters": {"full_path": {"op": "eq", "value": "{{PROJECT_FULL_PATH}}"}}}],
      "limit": 1
    }

proj_id_mr_in_project_eq:
  desc: "MergeRequest IN_PROJECT Project, project scoped by id (eq). The project-id filter rewrites to startsWith(traversal_path,'<prefix>') applied to gl_merge_request, gl_project and the IN_PROJECT gl_edge rows."
  category: traversal
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "columns": ["iid", "title", "state", "project_id"]},
        {"id": "p", "entity": "Project", "filters": {"id": {"op": "eq", "value": {{PROJECT_ID}}}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p"}],
      "order_by": "-mr.created_at",
      "limit": 100
    }

proj_full_path_mr_in_project_eq:
  desc: "MergeRequest IN_PROJECT Project, project scoped by full_path (eq). Identical traversal to proj_id_mr_in_project_eq; the dict resolves full_path -> same traversal_path prefix; PK rewrite applies to all three tables."
  category: traversal
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "columns": ["iid", "title", "state", "project_id"]},
        {"id": "p", "entity": "Project", "filters": {"full_path": {"op": "eq", "value": "{{PROJECT_FULL_PATH}}"}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p"}],
      "order_by": "-mr.created_at",
      "limit": 100
    }

proj_id_in_mr_in_project:
  desc: "MergeRequest IN_PROJECT Project, project scoped by id with op 'in' (single id). Exercises the 'in' operator rewrite; single-element IN should compile to the same single-prefix PK predicate as eq."
  category: traversal
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "columns": ["iid", "title", "state", "project_id"]},
        {"id": "p", "entity": "Project", "filters": {"id": {"op": "in", "value": [{{PROJECT_ID}}]}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p"}],
      "limit": 100
    }

proj_id_in2_mr_or_of_prefixes:
  desc: "TWO-element project_id IN across two sibling projects, asserting the OR-of-startsWith multi-prefix PK predicate in the clean project slice (the positive OR-of-prefixes proof)."
  category: traversal
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "columns": ["iid", "title", "state", "project_id"]},
        {"id": "p", "entity": "Project", "filters": {"id": {"op": "in", "value": [{{PROJECT_ID}}, {{PROJECT_ID_2}}]}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p"}],
      "limit": 100
    }

proj_id_workitem_in_project_eq:
  desc: "WorkItem IN_PROJECT Project, project scoped by id (eq). gl_work_item PK is (traversal_path, id); the project-id rewrite prunes the WorkItem scan on the PK."
  category: traversal
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "columns": ["iid", "title", "state", "work_item_type"]},
        {"id": "p", "entity": "Project", "filters": {"id": {"op": "eq", "value": {{PROJECT_ID}}}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "wi", "to": "p"}],
      "limit": 100
    }

proj_id_pipeline_in_project_eq:
  desc: "Pipeline IN_PROJECT Project, project scoped by id (eq). gl_pipeline PK is (traversal_path, id); the project-id rewrite prunes the pipeline scan on the PK."
  category: traversal
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "pipe", "entity": "Pipeline", "columns": ["id", "status", "source", "ref", "created_at"]},
        {"id": "p", "entity": "Project", "filters": {"id": {"op": "eq", "value": {{PROJECT_ID}}}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "pipe", "to": "p"}],
      "order_by": "-pipe.created_at",
      "limit": 100
    }

proj_full_path_pipeline_source_filter:
  desc: "Pipeline IN_PROJECT scoped by project full_path WITH the canonical source='merge_request_event' filter (per recipes.md). Gives Pipeline a full_path-scoped case plus a column-filter-plus-prefix interaction."
  category: traversal
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "pipe", "entity": "Pipeline", "columns": ["id", "status", "source", "ref"], "filters": {"source": {"op": "eq", "value": "merge_request_event"}}},
        {"id": "p", "entity": "Project", "filters": {"full_path": {"op": "eq", "value": "{{PROJECT_FULL_PATH}}"}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "pipe", "to": "p"}],
      "limit": 100
    }

proj_id_vuln_in_project_eq:
  desc: "Vulnerability IN_PROJECT Project, project scoped by id (eq). gl_vulnerability PK is (traversal_path, id); the project-id rewrite prunes the vuln scan on the PK. Also exercises the security pass ANDing the user's auth prefix with the resolved scope prefix."
  category: traversal
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "v", "entity": "Vulnerability", "columns": ["id", "severity", "state", "report_type"]},
        {"id": "p", "entity": "Project", "filters": {"id": {"op": "eq", "value": {{PROJECT_ID}}}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "v", "to": "p"}],
      "limit": 100
    }

note_in_project_id:
  desc: "Note IN_PROJECT Project scoped by id. Proves the rewrite prunes gl_note on its PK; Note is a core scoped entity with no prior coverage."
  category: traversal
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "n", "entity": "Note", "columns": ["id", "note", "author_id"]},
        {"id": "p", "entity": "Project", "filters": {"id": {"op": "eq", "value": {{PROJECT_ID}}}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "n", "to": "p"}],
      "limit": 100
    }

proj_id_mr_count_by_state_agg:
  desc: "Aggregation. Count MergeRequests by state within PROJECT_ID (scoped by id). group_by mr.state, count(mr). The project-id filter rewrites to startsWith(traversal_path,'<prefix>') and prunes the gl_merge_request scan feeding the aggregate."
  category: aggregation
  suite: scoping
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": {"op": "in", "value": ["opened", "closed", "merged"]}}},
        {"id": "p", "entity": "Project", "filters": {"id": {"op": "eq", "value": {{PROJECT_ID}}}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p"}],
      "group_by": [{"kind": "property", "node": "mr", "property": "state", "alias": "mr_state"}],
      "aggregations": [{"function": "count", "target": "mr", "alias": "mr_count"}],
      "aggregation_sort": {"column": "mr_count", "direction": "DESC"},
      "limit": 10
    }

proj_full_path_mr_count_by_state_agg:
  desc: "Aggregation. Count MergeRequests by state within the project, scoped by full_path (eq). Same aggregate as proj_id_mr_count_by_state_agg but addressed by full_path; dict resolves full_path -> same prefix and prunes on the PK."
  category: aggregation
  suite: scoping
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": {"op": "in", "value": ["opened", "closed", "merged"]}}},
        {"id": "p", "entity": "Project", "filters": {"full_path": {"op": "eq", "value": "{{PROJECT_FULL_PATH}}"}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p"}],
      "group_by": [{"kind": "property", "node": "mr", "property": "state", "alias": "mr_state"}],
      "aggregations": [{"function": "count", "target": "mr", "alias": "mr_count"}],
      "aggregation_sort": {"column": "mr_count", "direction": "DESC"},
      "limit": 10
    }

proj_unknown_id_mr_in_project:
  desc: "Negative/guard. MergeRequest IN_PROJECT Project where the project id is nonexistent. Dict misses, resolves to '0/', scope must be treated as unknown (empty), NOT widened. Proves the rewrite fails closed."
  category: traversal
  suite: scoping
  expect: empty  # fail-closed control: must return zero rows (no scope widening)
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "columns": ["iid", "title", "state", "project_id"]},
        {"id": "p", "entity": "Project", "filters": {"id": {"op": "eq", "value": {{UNKNOWN_ID}}}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p"}],
      "limit": 100
    }

grp_id_workitem_in_group:
  desc: "WorkItems IN_GROUP a top-level group, scoped by Group id. Resolver looks up the group's traversal_path via the dictionary and rewrites the Group node_ids filter into startsWith(traversal_path,'<group_prefix>') on the WorkItem PK."
  category: traversal
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "filters": {"state": "opened"}, "columns": ["id", "iid", "title", "state", "namespace_id"]},
        {"id": "g", "entity": "Group", "node_ids": [{{GROUP_ID}}]}
      ],
      "relationships": [{"type": "IN_GROUP", "from": "wi", "to": "g"}],
      "limit": 50,
      "order_by": "-wi.created_at"
    }

grp_fullpath_workitem_in_group:
  desc: "Same WorkItem IN_GROUP query but scoped by Group full_path instead of id. Proves the full_path -> traversal_path resolution yields the identical PK prefix predicate as the id path."
  category: traversal
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "filters": {"state": "opened"}, "columns": ["id", "iid", "title", "state", "namespace_id"]},
        {"id": "g", "entity": "Group", "filters": {"full_path": {"op": "eq", "value": "{{GROUP_FULL_PATH}}"}}}
      ],
      "relationships": [{"type": "IN_GROUP", "from": "wi", "to": "g"}],
      "limit": 50,
      "order_by": "-wi.created_at"
    }

grp_id_label_in_group:
  desc: "Group-level Labels IN_GROUP a top-level group, scoped by Group id. Label is a distinct entity table (gl_label) keyed on (traversal_path, id); confirms the rewrite applies per-entity, not just to WorkItem."
  category: traversal
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "lbl", "entity": "Label", "columns": ["id", "title", "color", "group_id"]},
        {"id": "g", "entity": "Group", "node_ids": [{{GROUP_ID}}]}
      ],
      "relationships": [{"type": "IN_GROUP", "from": "lbl", "to": "g"}],
      "limit": 50
    }

grp_id_milestone_in_group:
  desc: "Group milestones IN_GROUP a top-level group, scoped by Group id. Third distinct IN_GROUP entity (gl_milestone) to show the rewrite is entity-agnostic across the plan domain."
  category: traversal
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "m", "entity": "Milestone", "filters": {"state": "active"}, "columns": ["id", "iid", "title", "state", "group_id"]},
        {"id": "g", "entity": "Group", "node_ids": [{{GROUP_ID}}]}
      ],
      "relationships": [{"type": "IN_GROUP", "from": "m", "to": "g"}],
      "limit": 50
    }

grp_id_milestone_count_by_state_agg:
  desc: "Group-level Milestone aggregation by state scoped by Group id. Adds the aggregation path for Milestone with its correct string state values (active/closed) and confirms IN_GROUP fk=group_id pruning under aggregation."
  category: aggregation
  suite: scoping
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "m", "entity": "Milestone", "filters": {"state": {"op": "in", "value": ["active", "closed"]}}},
        {"id": "g", "entity": "Group", "node_ids": [{{GROUP_ID}}]}
      ],
      "relationships": [{"type": "IN_GROUP", "from": "m", "to": "g"}],
      "group_by": [{"kind": "property", "node": "m", "property": "state", "alias": "ms_state"}],
      "aggregations": [{"function": "count", "target": "m", "alias": "ms_count"}],
      "aggregation_sort": {"column": "ms_count", "direction": "DESC"},
      "limit": 10
    }

grp_id_mr_in_project_contains:
  desc: "MergeRequests in projects under a top-level group. Group CONTAINS Project, MergeRequest IN_PROJECT Project, scoped by Group id. Tests transitive scoping. the group prefix covers every project's subtree."
  category: traversal
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": "opened"}, "columns": ["id", "iid", "title", "state", "project_id"]},
        {"id": "p", "entity": "Project"},
        {"id": "g", "entity": "Group", "node_ids": [{{GROUP_ID}}]}
      ],
      "relationships": [
        {"type": "IN_PROJECT", "from": "mr", "to": "p"},
        {"type": "CONTAINS", "from": "g", "to": "p"}
      ],
      "limit": 50,
      "order_by": "-mr.created_at"
    }

grp_id_count_mrs_aggregation_MOTIVATING:
  desc: "MOTIVATING CASE. COUNT all merge requests across an entire top-level group (aggregation), scoped by Group id. Group CONTAINS Project, MR IN_PROJECT Project, grouped by project. The headline whole-group MR rollup the PK-pruning feature exists to make fast."
  category: aggregation
  suite: scoping
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": {"op": "in", "value": ["opened", "closed", "merged"]}}},
        {"id": "p", "entity": "Project"},
        {"id": "g", "entity": "Group", "node_ids": [{{GROUP_ID}}]}
      ],
      "relationships": [
        {"type": "IN_PROJECT", "from": "mr", "to": "p"},
        {"type": "CONTAINS", "from": "g", "to": "p"}
      ],
      "group_by": [{"kind": "node", "node": "p"}],
      "aggregations": [{"function": "count", "target": "mr", "alias": "mr_count"}],
      "aggregation_sort": {"column": "mr_count", "direction": "DESC"},
      "limit": 50
    }

subgrp_id_count_mrs_aggregation_deeper_prefix:
  desc: "COUNT merge requests across a nested SUBGROUP only, scoped by subgroup id. Same motivating aggregation but the resolved prefix is a strict EXTENSION of the parent group's prefix, so it prunes to a deeper, smaller traversal_path subtree."
  category: aggregation
  suite: scoping
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": {"op": "in", "value": ["opened", "closed", "merged"]}}},
        {"id": "p", "entity": "Project"},
        {"id": "g", "entity": "Group", "node_ids": [{{SUBGROUP_ID}}]}
      ],
      "relationships": [
        {"type": "IN_PROJECT", "from": "mr", "to": "p"},
        {"type": "CONTAINS", "from": "g", "to": "p"}
      ],
      "group_by": [{"kind": "node", "node": "p"}],
      "aggregations": [{"function": "count", "target": "mr", "alias": "mr_count"}],
      "aggregation_sort": {"column": "mr_count", "direction": "DESC"},
      "limit": 50
    }

subgrp_fullpath_workitem_in_group:
  desc: "WorkItems IN_GROUP a nested subgroup, scoped by subgroup full_path. Confirms full_path resolution on a non-root namespace yields the deeper prefix and excludes work items that belong to the parent group but not the subgroup."
  category: traversal
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "filters": {"state": "opened"}, "columns": ["id", "iid", "title", "state", "namespace_id"]},
        {"id": "g", "entity": "Group", "filters": {"full_path": {"op": "eq", "value": "{{SUBGROUP_FULL_PATH}}"}}}
      ],
      "relationships": [{"type": "IN_GROUP", "from": "wi", "to": "g"}],
      "limit": 50
    }

subgrp_id_workitem_transitive_contains:
  desc: "Transitive subgroup descent. Group CONTAINS Group (max_hops 2) down to a nested subgroup, then WorkItem IN_GROUP that subgroup, scoped by the TOP group id. Proves the top-group prefix still prunes across a Group->Group hop."
  category: traversal
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "filters": {"state": "opened"}, "columns": ["id", "iid", "title", "namespace_id"]},
        {"id": "sub", "entity": "Group"},
        {"id": "g", "entity": "Group", "node_ids": [{{GROUP_ID}}]}
      ],
      "relationships": [
        {"type": "IN_GROUP", "from": "wi", "to": "sub"},
        {"type": "CONTAINS", "from": "g", "to": "sub", "min_hops": 1, "max_hops": 2}
      ],
      "limit": 50
    }

grp_id_vuln_count_by_severity_agg:
  desc: "Whole-group Vulnerability aggregation grouped by severity, scoped by Group id via CONTAINS+IN_PROJECT. Covers a security-domain entity under aggregation and exercises the auth-prefix AND scope-prefix interaction in the aggregation path."
  category: aggregation
  suite: scoping
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "v", "entity": "Vulnerability", "filters": {"state": {"op": "in", "value": ["detected", "confirmed"]}}},
        {"id": "p", "entity": "Project"},
        {"id": "g", "entity": "Group", "node_ids": [{{GROUP_ID}}]}
      ],
      "relationships": [
        {"type": "IN_PROJECT", "from": "v", "to": "p"},
        {"type": "CONTAINS", "from": "g", "to": "p"}
      ],
      "group_by": [{"kind": "property", "node": "v", "property": "severity", "alias": "sev"}],
      "aggregations": [{"function": "count", "target": "v", "alias": "vuln_count"}],
      "aggregation_sort": {"column": "vuln_count", "direction": "DESC"},
      "limit": 20
    }

grp_namespace_id_project_leaf_GAP:
  desc: "Project scoped by full_path (the SAFE path). Flags that the residual gap is specifically a raw namespace_id filter whose value is a project_namespace_id fed as a Group/namespace scope, NOT this full_path case which prunes correctly to the project's own leaf prefix."
  category: traversal
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": "opened"}, "columns": ["id", "iid", "title", "state", "project_id"]},
        {"id": "p", "entity": "Project", "filters": {"full_path": {"op": "eq", "value": "{{PROJECT_FULL_PATH}}"}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p"}],
      "limit": 50
    }

grp_unknown_id_no_widen:
  desc: "Scope by a nonexistent Group id. Dictionary miss must resolve to '0/' (unknown), returning ZERO rows. The rewrite must NOT fall back to an unscoped full-table scan that would leak other groups' data."
  category: traversal
  suite: scoping
  expect: empty  # fail-closed control: must return zero rows (no scope widening)
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "filters": {"state": "opened"}},
        {"id": "g", "entity": "Group", "node_ids": [{{UNKNOWN_ID}}]}
      ],
      "relationships": [{"type": "IN_GROUP", "from": "wi", "to": "g"}],
      "limit": 50
    }

grp_id_count_workitems_aggregation:
  desc: "Whole-group WorkItem rollup (aggregation) scoped by Group id. count open work items across the group, grouped by work_item_type. Complements the MR motivating case with a plan-domain aggregation to show pruning generalizes across aggregation targets."
  category: aggregation
  suite: scoping
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "filters": {"state": "opened"}},
        {"id": "g", "entity": "Group", "node_ids": [{{GROUP_ID}}]}
      ],
      "relationships": [{"type": "IN_GROUP", "from": "wi", "to": "g"}],
      "group_by": [{"kind": "property", "node": "wi", "property": "work_item_type", "alias": "wi_type"}],
      "aggregations": [{"function": "count", "target": "wi", "alias": "wi_count"}],
      "aggregation_sort": {"column": "wi_count", "direction": "DESC"},
      "limit": 20
    }

ns_group_id_resolves_traversal:
  desc: "namespace_id filter where the id is a real GROUP namespace. Expressed as Group.id eq {{GROUP_ID}} (a Group's id IS its namespace_id). Single-node traversal the feature rewrites into startsWith(traversal_path,'<group-prefix>/') on the gl_group PK."
  category: search
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [{"id": "g", "entity": "Group", "columns": ["id", "name", "full_path"], "filters": {"id": {"op": "eq", "value": {{GROUP_ID}}}}}],
      "limit": 50
    }

ns_group_full_path_resolves_traversal:
  desc: "Same group scope addressed by full_path. Group.full_path eq {{GROUP_FULL_PATH}}; the feature looks up the namespace by path in the dictionary and rewrites to startsWith(traversal_path,'<prefix>/')."
  category: search
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [{"id": "g", "entity": "Group", "columns": ["id", "name", "full_path"], "filters": {"full_path": {"op": "eq", "value": "{{GROUP_FULL_PATH}}"}}}],
      "limit": 50
    }

ns_subgroup_id_scopes_to_subtree:
  desc: "namespace_id filter where the id is a SUBGROUP (still a Group namespace). Scoping to a subgroup must prune to the subgroup's deeper prefix and must NOT return siblings under the same parent."
  category: search
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [{"id": "g", "entity": "Group", "columns": ["id", "full_path", "traversal_path"], "filters": {"id": {"op": "eq", "value": {{SUBGROUP_ID}}}}}],
      "limit": 50
    }

ns_project_namespace_id_GAP:
  desc: "DOCUMENTED RESIDUAL GAP. namespace_id where the id is a PROJECT_NAMESPACE id (a project's leaf namespace, type='Project'). A project's traversal_path leaf == project_namespace_id, NOT project.id; the dict is keyed for group/namespace prefixes. Passing this id as Group.id must NOT widen scope and must stay correct."
  category: search
  suite: scoping
  expect: empty  # fail-closed control: must return zero rows (no scope widening)
  query: |
    {
      "query_type": "traversal",
      "nodes": [{"id": "g", "entity": "Group", "columns": ["id", "full_path"], "filters": {"id": {"op": "eq", "value": {{PROJECT_NAMESPACE_ID}}}}}],
      "limit": 50
    }

ns_unknown_id_no_widen:
  desc: "Unknown / nonexistent namespace_id. Dictionary miss must resolve to '0/' and be treated as unknown, returning 0 rows. Must NOT fall back to an unscoped (full-table) query."
  category: search
  suite: scoping
  expect: empty  # fail-closed control: must return zero rows (no scope widening)
  query: |
    {
      "query_type": "traversal",
      "nodes": [{"id": "g", "entity": "Group", "columns": ["id", "full_path"], "filters": {"id": {"op": "eq", "value": {{UNKNOWN_ID}}}}}],
      "limit": 50
    }

proj_id_mr_in_project_scoped_traversal:
  desc: "EDGE multi-node. MergeRequest IN_PROJECT Project, scoped to a single project by Project.id. The feature must push the project scope down to the traversal_path PK of BOTH the MergeRequest node and the Project node (same prefix)."
  category: traversal
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "columns": ["iid", "title", "state", "project_id"]},
        {"id": "p", "entity": "Project", "columns": ["id", "full_path"], "filters": {"id": {"op": "eq", "value": {{PROJECT_ID}}}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p"}],
      "order_by": "-mr.created_at",
      "limit": 50
    }

proj_full_path_mr_count_agg_scoped:
  desc: "EDGE aggregation scoped by Project.full_path. count MergeRequests per project, filtered to one project by full_path. Confirms the rewrite works through the aggregation path and that the count is exact."
  category: aggregation
  suite: scoping
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": {"op": "in", "value": ["opened", "closed", "merged"]}}},
        {"id": "p", "entity": "Project", "columns": ["id", "full_path"], "filters": {"full_path": {"op": "eq", "value": "{{PROJECT_FULL_PATH}}"}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p"}],
      "group_by": [{"kind": "node", "node": "p"}],
      "aggregations": [{"function": "count", "target": "mr", "alias": "mr_count"}],
      "aggregation_sort": {"column": "mr_count", "direction": "DESC"},
      "limit": 10
    }

multihop_user_authored_mr_in_project_group_scoped:
  desc: "Intentionally encodes the common mistake (group_id stuffed into Project.id via a bogus id_property filter key). The harness must assert it is REJECTED at runtime ontology validation. The correct group-scoped multi-hop is multihop_group_scope_via_group_node."
  category: traversal
  suite: scoping
  expect: error  # deliberate negative control: id_property is rejected by the ontology allowlist
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "u", "entity": "User", "columns": ["username"]},
        {"id": "mr", "entity": "MergeRequest", "columns": ["iid", "title", "project_id"]},
        {"id": "p", "entity": "Project", "columns": ["id", "full_path"], "filters": {"id": {"op": "eq", "value": {{GROUP_ID}}}, "id_property": "namespace_id"}}
      ],
      "relationships": [
        {"type": "AUTHORED", "from": "u", "to": "mr"},
        {"type": "IN_PROJECT", "from": "mr", "to": "p"}
      ],
      "limit": 100
    }

multihop_group_scope_via_group_node:
  desc: "MULTI-HOP correctly scoped to a GROUP by adding the Group as a node and joining the leaf Project via CONTAINS. User AUTHORED MergeRequest IN_PROJECT Project, Group CONTAINS Project with Group.id eq {{GROUP_ID}}. The group's traversal_path prefix prunes the whole subtree. Positive counterpart to the rejected case above."
  category: traversal
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "u", "entity": "User", "columns": ["username"]},
        {"id": "mr", "entity": "MergeRequest", "columns": ["iid", "title", "project_id"]},
        {"id": "p", "entity": "Project", "columns": ["id", "full_path"]},
        {"id": "g", "entity": "Group", "columns": ["id", "full_path"], "filters": {"id": {"op": "eq", "value": {{GROUP_ID}}}}}
      ],
      "relationships": [
        {"type": "AUTHORED", "from": "u", "to": "mr"},
        {"type": "IN_PROJECT", "from": "mr", "to": "p"},
        {"type": "CONTAINS", "from": "g", "to": "p"}
      ],
      "limit": 100
    }

edge_rel_scoped_prune_reviewer:
  desc: "Edge-table-scoped multi-hop (User REVIEWER MergeRequest IN_PROJECT Project) under a project prefix, asserting the gl_edge scan ITSELF prunes on traversal_path. Edge pruning was previously asserted only indirectly via node pruning."
  category: traversal
  suite: scoping
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "u", "entity": "User", "columns": ["username"]},
        {"id": "mr", "entity": "MergeRequest", "columns": ["iid", "title", "state"]},
        {"id": "p", "entity": "Project", "filters": {"id": {"op": "eq", "value": {{PROJECT_ID}}}}}
      ],
      "relationships": [
        {"type": "REVIEWER", "from": "u", "to": "mr"},
        {"type": "IN_PROJECT", "from": "mr", "to": "p"}
      ],
      "limit": 100
    }

path_finding_two_entities_in_project:
  desc: "PATH_FINDING between two seeded entities within one project. shortest path from a specific MergeRequest to its Project, both pinned by node_ids, scoped within {{PROJECT_ID}}. Confirms the path search frontier is bounded by the project prefix."
  category: path_finding
  suite: scoping
  expect: empty  # bidirectional path-finding frontier OOMs at gitlab-org scope
  query: |
    {
      "query_type": "path_finding",
      "nodes": [
        {"id": "start", "entity": "MergeRequest", "node_ids": [{{MR_NODE_ID}}]},
        {"id": "end", "entity": "Project", "node_ids": [{{PROJECT_ID}}]}
      ],
      "path": {"type": "shortest", "from": "start", "to": "end", "max_depth": 2, "rel_types": ["IN_PROJECT"]}
    }

unknown_id_path_finding_no_widen:
  desc: "PATH_FINDING with an endpoint pinned to a nonexistent id. Proves the path frontier fails closed (dict-miss '0/') and returns no path rather than widening the gl_edge frontier scan."
  category: path_finding
  suite: scoping
  expect: empty  # fail-closed control: must return zero rows (no scope widening)
  query: |
    {
      "query_type": "path_finding",
      "nodes": [
        {"id": "start", "entity": "MergeRequest", "node_ids": [{{MR_NODE_ID}}]},
        {"id": "end", "entity": "Project", "node_ids": [{{UNKNOWN_ID}}]}
      ],
      "path": {"type": "shortest", "from": "start", "to": "end", "max_depth": 3,
               "rel_types": ["IN_PROJECT", "CONTAINS"]}
    }

path_finding_two_projects_in_group_by_full_path:
  desc: "PATH_FINDING between two seeded projects within the same group, endpoints pinned by full_path (engine resolves prefixes from the dictionary). rel_types is REQUIRED because endpoints use filters, not node_ids."
  category: path_finding
  suite: scoping
  expect: empty  # CONTAINS is parent->child only; sibling projects share a Group parent so no directed path exists via [CONTAINS, IN_PROJECT]
  query: |
    {
      "query_type": "path_finding",
      "nodes": [
        {"id": "a", "entity": "Project", "filters": {"full_path": {"op": "eq", "value": "{{PROJECT_FULL_PATH}}"}}},
        {"id": "b", "entity": "Project", "filters": {"full_path": {"op": "eq", "value": "{{PROJECT_FULL_PATH_2}}"}}}
      ],
      "path": {"type": "shortest", "from": "a", "to": "b", "max_depth": 3, "rel_types": ["CONTAINS", "IN_PROJECT"]}
    }

neighbors_project_center_outgoing:
  desc: "NEIGHBORS of a project-scoped center node. immediate neighbors of Project {{PROJECT_ID}}. The center is pinned by node_ids and the project's traversal_path prefix bounds the gl_edge scan. Uses top-level singular node + neighbors config."
  category: neighbors
  suite: scoping
  query: |
    {
      "query_type": "neighbors",
      "nodes": [{"id": "p", "entity": "Project", "node_ids": [{{PROJECT_ID}}], "columns": ["id", "full_path"]}],
      "neighbors": {"direction": "both"},
      "limit": 100
    }

unknown_id_neighbors_no_widen:
  desc: "NEIGHBORS of a nonexistent center id. Proves the neighbors gl_edge scan fails closed ('0/' prefix) and returns zero neighbors rather than scanning the whole edge table."
  category: neighbors
  suite: scoping
  expect: empty  # fail-closed control: must return zero rows (no scope widening)
  query: |
