      "query_type": "traversal",
      "nodes": [{"id": "p", "entity": "Project", "filters": {"full_path": {"op": "eq", "value": "{{PROJECT_FULL_PATH}}/"}}, "columns": ["full_path", "name"]}],
      "limit": 50,
      "options": {"include_debug_sql": true}
    }

full_path_case_variant:
  desc: "Scope a Project by an upper/mixed-case variant of its real full_path. GitLab paths are case-sensitive in storage; the rewrite/dict lookup must treat the case variant as a distinct (missing) key. Expect empty, never a widened scan, never an accidental case-insensitive match."
