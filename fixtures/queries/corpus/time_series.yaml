08_mrs_per_month_by_project:
  desc: "Mrs per month by project"
  category: time_series
  suite: time_series
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {
          "id": "p",
          "entity": "Project",
          "columns": [
            "name"
          ]
        },
        {
          "id": "mr",
          "entity": "MergeRequest",
          "filters": {
            "state": "merged",
            "merged_at": {
              "op": "gte",
              "value": "2026-01-01T00:00:00Z"
            }
          }
        }
      ],
      "relationships": [
        {
          "type": "IN_PROJECT",
          "from": "mr",
          "to": "p"
        }
      ],
      "group_by": [
        {
          "kind": "node",
          "node": "p"
        },
        {
          "kind": "property",
          "node": "mr",
          "property": "merged_at",
          "transform": {
            "kind": "truncate",
            "unit": "month"
          },
          "alias": "month"
        }
      ],
      "aggregations": [
        {
          "function": "count",
          "target": "mr",
          "alias": "merge_count"
        }
      ],
      "aggregation_sort": "-merge_count",
      "limit": 30
    }

