# Time-bucket aggregation corpus.
#
# Aggregations grouped by a truncated temporal column.
# Canonical corpus entry: desc / category / suite / query (inline DSL JSON).
# Placeholders: "$sample" / "$sample:N" bind to real in-scope ids at run time.
#
# Absolute date filters (e.g. "2026-03-01T00:00:00Z") are intentional fixed
# historical windows: the graph is append-only, so these windows keep matching
# rows over time and stay reproducible. Roll them forward only if you want the
# window to track "recent" activity.

01_jobs_failed_per_month:
  desc: "Jobs failed per month"
  category: time_series
  suite: time_series
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {
          "id": "j",
          "entity": "Job",
          "filters": {
            "status": "failed",
            "finished_at": {
              "op": "gte",
              "value": "2026-03-01T00:00:00Z"
            }
          }
        }
      ],
      "group_by": [
        {
          "kind": "property",
          "node": "j",
          "property": "finished_at",
          "transform": {
            "kind": "truncate",
            "unit": "month"
          },
          "alias": "month"
        }
      ],
      "aggregations": [
        {
          "function": "count",
          "target": "j",
          "alias": "failure_count"
        }
      ],
      "aggregation_sort": "month",
      "limit": 12
    }

