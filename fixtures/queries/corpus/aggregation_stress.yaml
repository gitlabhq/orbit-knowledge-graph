# Property-grouping aggregation stress corpus.
#
# Wide entity x property aggregation matrix.
# Canonical corpus entry: desc / category / suite / query (inline DSL JSON).
# Placeholders: "$sample" / "$sample:N" bind to real in-scope ids at run time.

security_vulnerability_001_by_severity:
  desc: "Security vulnerability 001 by severity"
  category: aggregation
  suite: grouping_stress
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {
          "id": "v",
          "entity": "Vulnerability",
          "filters": {
            "state": {
              "op": "in",
              "value": [
                "detected",
                "confirmed",
                "resolved",
                "dismissed"
              ]
            }
          }
        }
      ],
      "group_by": [
        {
          "kind": "property",
          "node": "v",
          "property": "severity"
        }
      ],
      "aggregations": [
        {
          "function": "count",
          "target": "v",
          "alias": "vulnerability_count"
        }
      ],
      "aggregation_sort": {
        "column": "vulnerability_count",
        "direction": "DESC"
      },
      "limit": 20
    }

