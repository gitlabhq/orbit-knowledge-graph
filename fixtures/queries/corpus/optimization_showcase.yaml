05_path_finding_depth3:
  desc: "Path finding depth3"
  category: path_finding
  suite: showcase
  query: |
    {
      "query_type": "path_finding",
      "nodes": [
        {
          "id": "start",
          "entity": "Project",
          "node_ids": "$sample"
        },
        {
          "id": "end",
          "entity": "Project",
          "node_ids": "$sample"
        }
      ],
      "path": {
        "type": "shortest",
        "from": "start",
        "to": "end",
        "max_depth": 2,
        "rel_types": [
          "IN_PROJECT",
          "AUTHORED"
        ]
      }
    }
  expect: empty  # two random Projects don't share a 2-hop directed path; every entity->Project edge goes IN_PROJECT inbound, so Project->Project via [AUTHORED, IN_PROJECT] loops back to self

