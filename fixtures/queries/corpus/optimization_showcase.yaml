29_node_and_property_group_project_pipeline_status:
  desc: "Node and property group project pipeline status"
  category: aggregation
  suite: showcase
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {
          "id": "pipe",
          "entity": "Pipeline",
          "filters": {
            "status": {
              "op": "in",
              "value": [
                "success",
                "failed"
              ]
            }
          }
        },
        {
          "id": "p",
          "entity": "Project",
          "columns": [
            "name",
            "full_path"
          ]
        }
      ],
      "relationships": [
        {
          "type": "IN_PROJECT",
          "from": "pipe",
          "to": "p"
        }
      ],
      "group_by": [
        {
          "kind": "node",
          "node": "p",
          "alias": "project"
        },
        {
          "kind": "property",
          "node": "pipe",
          "property": "status",
          "alias": "pipeline_status"
        }
      ],
      "aggregations": [
        {
          "function": "count",
          "target": "pipe",
          "alias": "pipeline_count"
        },
        {
          "function": "avg",
          "target": "pipe",
          "property": "duration",
          "alias": "avg_duration"
        }
      ],
      "aggregation_sort": {
        "column": "pipeline_count",
        "direction": "DESC"
      },
      "limit": 30
    }

