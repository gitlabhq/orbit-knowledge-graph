# Neighbors coverage: a many-id Group center (the dashboard query shape), per-direction
# variants, namespace centers (Group/Project), and code-graph centers (File/Definition).
# Placeholders resolve to dummy ids under corpus_smoke; the prod A/B harness substitutes
# real ids.

nb_group_both_many_ids:
  desc: "Dashboard query: bidirectional neighbors over ~20 Group centers at once."
  category: neighbors
  suite: neighbors
  query: |
    {
      "query_type": "neighbors",
      "node": {"id": "g", "entity": "Group", "node_ids": "$sample:20", "columns": ["id", "full_path"]},
      "neighbors": {"node": "g", "direction": "both"},
      "limit": 500
    }

nb_group_incoming:
  desc: "Group center, incoming-only (members, work items, labels pointing at the group)."
  category: neighbors
  suite: neighbors
  query: |
    {
      "query_type": "neighbors",
      "node": {"id": "g", "entity": "Group", "node_ids": "$sample:20"},
      "neighbors": {"node": "g", "direction": "incoming"},
      "limit": 500
    }

nb_group_outgoing:
  desc: "Group center, outgoing-only (CONTAINS subgroups and projects)."
  category: neighbors
  suite: neighbors
  query: |
    {
      "query_type": "neighbors",
      "node": {"id": "g", "entity": "Group", "node_ids": "$sample:20"},
      "neighbors": {"node": "g", "direction": "outgoing"},
      "limit": 500
    }

nb_group_single_both:
  desc: "Single Group center, both directions (control for the many-id variant)."
  category: neighbors
  suite: neighbors
  query: |
    {
      "query_type": "neighbors",
      "node": {"id": "g", "entity": "Group", "node_ids": "$sample"},
      "neighbors": {"node": "g", "direction": "both"},
      "limit": 500
    }

nb_project_both:
  desc: "Project center, both directions, no rel filter."
  category: neighbors
  suite: neighbors
  query: |
    {
      "query_type": "neighbors",
      "node": {"id": "p", "entity": "Project", "node_ids": "$sample:5"},
      "neighbors": {"node": "p", "direction": "both"},
      "limit": 500
    }

nb_project_incoming:
