q5:
  desc: "Count MRs per project"
  category: aggregation
  suite: sdlc
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {
          "id": "mr",
          "entity": "MergeRequest",
          "filters": {
            "state": {
              "op": "in",
              "value": [
                "opened",
                "closed",
                "merged"
              ]
            }
          }
        },
        {
          "id": "p",
          "entity": "Project"
        }
      ],
      "relationships": [
        {
          "type": "IN_PROJECT",
          "from": "mr",
          "to": "p"
        }
      ],
      "group_by": [
        {
          "kind": "node",
          "node": "p"
        }
      ],
      "aggregations": [
        {
          "function": "count",
          "target": "mr",
          "alias": "mr_count"
        }
      ],
      "aggregation_sort": {
        "column": "mr_count",
        "direction": "DESC"
      },
      "limit": 10
    }

