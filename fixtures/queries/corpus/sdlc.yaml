  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {
          "id": "mr",
          "entity": "MergeRequest",
          "filters": {
            "state": {
              "op": "in",
              "value": [
                "opened",
                "closed",
                "merged"
              ]
            }
          }
        },
        {
          "id": "p",
          "entity": "Project",
          "node_ids": "$sample"
        }
      ],
      "relationships": [
        {
          "type": "IN_PROJECT",
          "from": "mr",
          "to": "p"
        }
      ],
      "group_by": [
        {
          "kind": "node",
          "node": "p",
          "alias": "project"
        },
        {
          "kind": "property",
          "node": "mr",
          "property": "state",
          "alias": "mr_state"
        }
      ],
      "aggregations": [
        {
          "function": "count",
          "target": "mr",
          "alias": "mr_count"
        }
      ],
      "aggregation_sort": {
        "column": "mr_count",
        "direction": "DESC"
      },
      "limit": 20
    }

