    }
  expect: empty  # random sampled MRs in gitlab-org rarely have a TRIGGERED Pipeline edge; structurally verified against a known MR

q25:
  desc: "Shortest path between two projects"
  category: path_finding
  suite: sdlc
  query: |
    {
      "query_type": "path_finding",
      "nodes": [
        {
          "id": "start",
          "entity": "Project",
          "node_ids": "$sample"
        },
        {
          "id": "end",
          "entity": "Project",
          "node_ids": "$sample"
        }
      ],
      "path": {
        "type": "shortest",
        "from": "start",
        "to": "end",
        "max_depth": 2,
        "rel_types": ["CONTAINS"]
      }
    }
  expect: empty  # CONTAINS is parent->child only; two random gitlab-org projects share a Group parent and have no directed CONTAINS path between them

