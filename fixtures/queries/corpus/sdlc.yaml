# SDLC query corpus.
#
# Core SDLC traversals + aggregations (also drives the xtask simulator).
# Canonical corpus entry: desc / category / suite / query (inline DSL JSON).
# Placeholders: "$sample" / "$sample:N" bind to real in-scope ids at run time.

q1:
  desc: "List active users"
  category: search
  suite: sdlc
  query: |
    {
      "query_type": "traversal",
      "nodes": [{
        "id": "u",
        "entity": "User",
        "filters": {
          "state": "active"
        }
      }],
      "limit": 30,
      "order_by": "-u.created_at"
    }

q2:
  desc: "Open merge requests in a project"
  category: traversal
  suite: sdlc
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {
          "id": "mr",
          "entity": "MergeRequest",
          "filters": {
            "state": "opened"
          }
        },
        {
          "id": "p",
          "entity": "Project",
          "node_ids": "$sample"
        }
      ],
      "relationships": [
        {
          "type": "IN_PROJECT",
          "from": "mr",
          "to": "p"
        }
      ],
      "limit": 25,
      "order_by": "-mr.created_at"
    }

q3:
