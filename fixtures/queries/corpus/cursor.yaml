15_path_finding_depth2_user_to_project:
  desc: "Path finding depth2 user to project"
  category: path_finding
  suite: cursor
  expect: empty  # shortest-path between random sampled User/Project rarely connects in scope
  query: |
    {
      "query_type": "path_finding",
      "nodes": [
        {
          "id": "start",
          "entity": "User",
          "node_ids": "$sample"
        },
        {
          "id": "end",
          "entity": "Project",
          "node_ids": "$sample"
        }
      ],
      "path": {
        "type": "shortest",
        "from": "start",
        "to": "end",
        "max_depth": 2,
        "rel_types": ["AUTHORED", "IN_PROJECT"]
      }
    }

