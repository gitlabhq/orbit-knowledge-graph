05_aggregation_count_merged_mrs_cursor:
  desc: "Aggregation count merged mrs cursor"
  category: cursor
  suite: cursor
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {
          "id": "mr",
          "entity": "MergeRequest",
          "filters": {
            "state": "merged"
          }
        },
        {
          "id": "p",
          "entity": "Project",
          "columns": [
            "name"
          ]
        }
      ],
      "relationships": [
        {
          "type": "IN_PROJECT",
          "from": "mr",
          "to": "p"
        }
      ],
      "group_by": [
        {
          "kind": "node",
          "node": "p"
        }
      ],
      "aggregations": [
        {
          "function": "count",
          "target": "mr",
          "alias": "merged_mr_count"
        }
      ],
      "aggregation_sort": {
        "column": "merged_mr_count",
        "direction": "DESC"
      },
      "limit": 20,
      "cursor": {
        "offset": 0,
        "page_size": 5
      }
    }

