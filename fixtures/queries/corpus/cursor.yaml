# Keyset-pagination (cursor) corpus.
#
# Traversal / aggregation queries carrying a cursor for keyset pagination.
# Canonical corpus entry: desc / category / suite / query (inline DSL JSON).
# Placeholders: "$sample" / "$sample:N" bind to real in-scope ids at run time.

01_cascading_sip_3node_chain_cursor:
  desc: "Cascading sip 3node chain cursor"
  category: cursor
  suite: cursor
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {
          "id": "u",
          "entity": "User",
          "node_ids": "$sample:3"
        },
        {
          "id": "mr",
          "entity": "MergeRequest",
          "filters": {
            "state": "merged"
          }
        },
        {
          "id": "p",
          "entity": "Project"
        }
      ],
      "relationships": [
        {
          "type": "AUTHORED",
          "from": "u",
          "to": "mr"
        },
        {
          "type": "IN_PROJECT",
          "from": "mr",
          "to": "p"
        }
      ],
      "limit": 50,
      "cursor": {
        "offset": 0,
        "page_size": 10
      }
    }

