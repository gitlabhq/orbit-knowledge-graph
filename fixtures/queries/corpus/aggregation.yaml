vulnerabilities_by_severity_and_state:
  desc: "Vulnerabilities by severity and state"
  category: aggregation
  suite: grouping
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {
          "id": "v",
          "entity": "Vulnerability",
          "filters": {
            "report_type": {
              "op": "in",
              "value": [
                "sast",
                "dependency_scanning",
                "container_scanning",
                "secret_detection"
              ]
            }
          }
        }
      ],
      "group_by": [
        {
          "kind": "property",
          "node": "v",
          "property": "severity",
          "alias": "severity_bucket"
        },
        {
          "kind": "property",
          "node": "v",
          "property": "state",
          "alias": "state_bucket"
        }
      ],
      "aggregations": [
        {
          "function": "count",
          "target": "v",
          "alias": "vulnerability_count"
        }
      ],
      "aggregation_sort": "-vulnerability_count",
      "limit": 30
    }

vulnerabilities_by_project_and_severity:
  desc: "Vulnerabilities by project and severity"
  category: aggregation
  suite: grouping
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {
          "id": "v",
          "entity": "Vulnerability",
          "filters": {
            "state": {
              "op": "in",
              "value": [
                "detected",
                "confirmed"
              ]
            }
          }
        },
        {
          "id": "p",
          "entity": "Project",
          "columns": [
            "name",
            "full_path"
          ]
        }
      ],
      "relationships": [
        {
          "type": "IN_PROJECT",
          "from": "v",
          "to": "p"
        }
      ],
      "group_by": [
        {
          "kind": "node",
          "node": "p",
          "alias": "project"
        },
        {
          "kind": "property",
          "node": "v",
          "property": "severity",
          "alias": "severity"
        }
      ],
      "aggregations": [
        {
          "function": "count",
          "target": "v",
          "alias": "vulnerability_count"
        },
        {
          "function": "max",
          "target": "v",
          "property": "updated_at",
          "alias": "latest_vulnerability_update"
        }
      ],
      "aggregation_sort": "-vulnerability_count",
      "limit": 20
    }

