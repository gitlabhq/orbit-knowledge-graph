# Property-grouping aggregation corpus.
#
# count / sum / avg grouped by a node property.
# Canonical corpus entry: desc / category / suite / query (inline DSL JSON).
# Placeholders: "$sample" / "$sample:N" bind to real in-scope ids at run time.

vulnerabilities_by_severity:
  desc: "Vulnerabilities by severity"
  category: aggregation
  suite: grouping
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {
          "id": "v",
          "entity": "Vulnerability",
          "filters": {
            "report_type": "sast"
          }
        }
      ],
      "group_by": [
        {
          "kind": "property",
          "node": "v",
          "property": "severity"
        }
      ],
      "aggregations": [
        {
          "function": "count",
          "target": "v",
          "alias": "vulnerability_count"
        }
      ],
      "aggregation_sort": "-vulnerability_count",
      "limit": 10
    }

