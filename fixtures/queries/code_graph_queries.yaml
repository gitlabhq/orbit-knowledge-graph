# Code-graph query fixtures (CALLS, EXTENDS, DEFINES, IMPORTS).
#
# Each entry has a stable key, a human-readable description, and the raw
# GKG query DSL as inline JSON.

q1:
  desc: Definition-to-definition call edges
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "caller", "entity": "Definition", "filters": {"definition_type": {"op": "in", "value": ["Class", "Module", "Method", "Function"]}}},
        {"id": "callee", "entity": "Definition"}
      ],
      "relationships": [
        {"type": "CALLS", "from": "caller", "to": "callee"}
      ],
      "limit": 30
    }

q2:
  desc: Calls into an imported symbol
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "caller", "entity": "Definition", "filters": {"definition_type": {"op": "in", "value": ["Class", "Module", "Method", "Function"]}}},
        {"id": "sym", "entity": "ImportedSymbol"}
      ],
      "relationships": [
        {"type": "CALLS", "from": "caller", "to": "sym"}
      ],
      "limit": 30
    }

q3:
  desc: Class inheritance chain
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "child", "entity": "Definition", "filters": {"definition_type": "Class"}},
        {"id": "parent", "entity": "Definition"}
      ],
      "relationships": [
        {"type": "EXTENDS", "from": "child", "to": "parent"}
      ],
      "limit": 30
    }

q4:
  desc: Count callers of a definition (aggregation)
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "caller", "entity": "Definition"},
        {"id": "callee", "entity": "Definition", "node_ids": "$sample"}
      ],
      "relationships": [
        {"type": "CALLS", "from": "caller", "to": "callee"}
      ],
      "aggregations": [
        {"function": "count", "target": "caller", "alias": "caller_count"}
      ],
      "limit": 1
    }

q5:
  desc: Definitions by type
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "d", "entity": "Definition", "filters": {"definition_type": {"op": "in", "value": ["Class", "Module", "Method", "Function"]}}}
      ],
      "group_by": [{"kind": "property", "node": "d", "property": "definition_type"}],
      "aggregations": [
        {"function": "count", "target": "d", "alias": "definition_count"}
      ],
      "aggregation_sort": {"column": "definition_count", "direction": "DESC"},
      "limit": 20
    }

q6:
  desc: Files by language
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "f", "entity": "File", "filters": {"language": {"op": "in", "value": ["ruby", "javascript", "typescript", "python"]}}}
      ],
      "group_by": [{"kind": "property", "node": "f", "property": "language"}],
      "aggregations": [
        {"function": "count", "target": "f", "alias": "file_count"}
      ],
      "aggregation_sort": {"column": "file_count", "direction": "DESC"},
      "limit": 20
    }

q7:
  desc: Definitions by file and type
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "f", "entity": "File", "columns": ["path", "language"], "filters": {"language": {"op": "in", "value": ["ruby", "javascript", "typescript", "python"]}}},
        {"id": "d", "entity": "Definition"}
      ],
      "relationships": [
        {"type": "DEFINES", "from": "f", "to": "d"}
      ],
      "group_by": [
        {"kind": "node", "node": "f", "alias": "file"},
        {"kind": "property", "node": "d", "property": "definition_type", "alias": "definition_type"}
      ],
      "aggregations": [
        {"function": "count", "target": "d", "alias": "definition_count"}
      ],
      "aggregation_sort": {"column": "definition_count", "direction": "DESC"},
      "limit": 20
    }

q8:
  desc: Imported symbols by type
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "sym", "entity": "ImportedSymbol", "filters": {"import_type": {"op": "in", "value": ["module", "symbol", "wildcard"]}}}
      ],
      "group_by": [{"kind": "property", "node": "sym", "property": "import_type"}],
      "aggregations": [
        {"function": "count", "target": "sym", "alias": "import_count"}
      ],
      "aggregation_sort": {"column": "import_count", "direction": "DESC"},
      "limit": 20
    }
