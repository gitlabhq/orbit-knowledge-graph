# SDLC query definitions for evaluation benchmarking.
#
# Each entry has a stable key (q1..qN), a human-readable description,
# and the raw GKG query DSL as inline JSON.
#
# Placeholder syntax for sampled parameters:
#   "$sample"   — sample 1 random ID from ClickHouse
#   "$sample:N" — sample N random IDs

q1:
  desc: List active users
  query: |
    {
      "query_type": "traversal",
      "node": {"id": "u", "entity": "User", "filters": {"state": "active"}},
      "limit": 30,
      "order_by": {"node": "u", "property": "created_at", "direction": "DESC"}
    }

q2:
  desc: Open merge requests in a project
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": "opened"}},
        {"id": "p", "entity": "Project", "node_ids": "$sample"}
      ],
      "relationships": [
        {"type": "IN_PROJECT", "from": "mr", "to": "p"}
      ],
      "limit": 25,
      "order_by": {"node": "mr", "property": "created_at", "direction": "DESC"}
    }

q3:
  desc: Draft MRs awaiting review
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": "opened", "draft": true}},
        {"id": "author", "entity": "User"}
      ],
      "relationships": [
        {"type": "AUTHORED", "from": "author", "to": "mr"}
      ],
      "limit": 20
    }

q4:
  desc: MRs merged by a specific user
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": "merged"}},
        {"id": "merger", "entity": "User", "node_ids": "$sample"}
      ],
      "relationships": [
        {"type": "MERGED", "from": "merger", "to": "mr"}
      ],
      "limit": 30,
      "order_by": {"node": "mr", "property": "updated_at", "direction": "DESC"}
    }

q5:
  desc: Count MRs per project
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest"},
        {"id": "p", "entity": "Project"}
      ],
      "relationships": [
        {"type": "IN_PROJECT", "from": "mr", "to": "p"}
      ],
      "aggregations": [
        {"function": "count", "target": "mr", "group_by": "p", "alias": "mr_count"}
      ],
      "aggregation_sort": {"agg_index": 0, "direction": "DESC"},
      "limit": 10
    }

q6:
  desc: Failed pipelines recently
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "pipe", "entity": "Pipeline", "filters": {"status": "failed"}},
        {"id": "p", "entity": "Project"}
      ],
      "relationships": [
        {"type": "IN_PROJECT", "from": "pipe", "to": "p"}
      ],
      "limit": 30,
      "order_by": {"node": "pipe", "property": "created_at", "direction": "DESC"}
    }

q7:
  desc: Pipeline success rate by project
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "pipe", "entity": "Pipeline", "filters": {"status": {"op": "in", "value": ["success", "failed"]}}},
        {"id": "p", "entity": "Project"}
      ],
      "relationships": [
        {"type": "IN_PROJECT", "from": "pipe", "to": "p"}
      ],
      "aggregations": [
        {"function": "count", "target": "pipe", "group_by": "p", "alias": "total_pipelines"}
      ],
      "limit": 20
    }

q8:
  desc: Long-running pipelines
  query: |
    {
      "query_type": "traversal",
      "node": {"id": "pipe", "entity": "Pipeline", "filters": {
        "status": "success",
        "duration": {"op": "gt", "value": 60}
      }},
      "limit": 20,
      "order_by": {"node": "pipe", "property": "duration", "direction": "DESC"}
    }

q9:
  desc: Critical vulnerabilities detected
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "v", "entity": "Vulnerability", "filters": {
          "severity": "critical",
          "state": "detected"
        }},
        {"id": "p", "entity": "Project"}
      ],
      "relationships": [
        {"type": "IN_PROJECT", "from": "v", "to": "p"}
      ],
      "limit": 30,
      "order_by": {"node": "v", "property": "detected_at", "direction": "DESC"}
    }

q10:
  desc: Unresolved high-severity vulns by report type
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "v", "entity": "Vulnerability", "filters": {
          "severity": {"op": "in", "value": ["high", "critical"]},
          "state": {"op": "in", "value": ["detected", "confirmed"]}
        }}
      ],
      "aggregations": [
        {"function": "count", "target": "v", "alias": "vuln_count"}
      ],
      "limit": 10
    }

q11:
  desc: Vulnerabilities fixed by MRs
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "v", "entity": "Vulnerability", "filters": {"state": "resolved"}},
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": "merged"}}
      ],
      "relationships": [
        {"type": "FIXES", "from": "mr", "to": "v"}
      ],
      "limit": 25
    }

q12:
  desc: Open work items (issues) by type
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "filters": {"state": "opened"}}
      ],
      "aggregations": [
        {"function": "count", "target": "wi", "alias": "count"}
      ],
      "limit": 10
    }

q13:
  desc: Overdue work items
  query: |
    {
      "query_type": "traversal",
      "node": {"id": "wi", "entity": "WorkItem", "filters": {"state": "opened"}},
      "limit": 30,
      "order_by": {"node": "wi", "property": "due_date", "direction": "ASC"}
    }

q14:
  desc: High weight work items assigned to user
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "filters": {
          "state": "opened",
          "weight": {"op": "gte", "value": 1}
        }},
        {"id": "assignee", "entity": "User", "node_ids": "$sample"}
      ],
      "relationships": [
        {"type": "ASSIGNED", "from": "assignee", "to": "wi"}
      ],
      "limit": 20
    }

q15:
  desc: Work items closing MRs
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": "merged"}},
        {"id": "wi", "entity": "WorkItem"}
      ],
      "relationships": [
        {"type": "CLOSES", "from": "mr", "to": "wi"}
      ],
      "limit": 30
    }

q16:
  desc: Notes (comments) on MRs by user
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "note", "entity": "Note", "filters": {"noteable_type": "MergeRequest"}},
        {"id": "author", "entity": "User", "node_ids": "$sample"}
      ],
      "relationships": [
        {"type": "AUTHORED", "from": "author", "to": "note"}
      ],
      "limit": 30,
      "order_by": {"node": "note", "property": "created_at", "direction": "DESC"}
    }

q17:
  desc: Comment activity per user
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "note", "entity": "Note"},
        {"id": "author", "entity": "User"}
      ],
      "relationships": [
        {"type": "AUTHORED", "from": "author", "to": "note"}
      ],
      "aggregations": [
        {"function": "count", "target": "note", "group_by": "author", "alias": "note_count"}
      ],
      "aggregation_sort": {"agg_index": 0, "direction": "DESC"},
      "limit": 20
    }

q18:
  desc: Projects in a group
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "p", "entity": "Project", "filters": {"archived": false}},
        {"id": "g", "entity": "Group", "node_ids": "$sample"}
      ],
      "relationships": [
        {"type": "IN_GROUP", "from": "p", "to": "g"}
      ],
      "limit": 30,
      "order_by": {"node": "p", "property": "last_activity_at", "direction": "DESC"}
    }

q19:
  desc: Public projects
  query: |
    {
      "query_type": "traversal",
      "node": {"id": "p", "entity": "Project", "filters": {
        "visibility_level": "public",
        "archived": false
      }},
      "limit": 20,
      "order_by": {"node": "p", "property": "star_count", "direction": "DESC"}
    }

q20:
  desc: "User contributions: authored MRs"
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest"},
        {"id": "author", "entity": "User"}
      ],
      "relationships": [
        {"type": "AUTHORED", "from": "author", "to": "mr"}
      ],
      "aggregations": [
        {"function": "count", "target": "mr", "group_by": "author", "alias": "mr_count"}
      ],
      "aggregation_sort": {"agg_index": 0, "direction": "DESC"},
      "limit": 20
    }

q21:
  desc: MR reviewers per project
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest"},
        {"id": "reviewer", "entity": "User"},
        {"id": "p", "entity": "Project"}
      ],
      "relationships": [
        {"type": "REVIEWER", "from": "reviewer", "to": "mr"},
        {"type": "IN_PROJECT", "from": "mr", "to": "p"}
      ],
      "aggregations": [
        {"function": "count", "target": "reviewer", "group_by": "p", "alias": "reviewer_count"}
      ],
      "limit": 15
    }

q22:
  desc: Work items in milestone
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "filters": {"state": "opened"}},
        {"id": "m", "entity": "Milestone", "node_ids": "$sample"}
      ],
      "relationships": [
        {"type": "IN_MILESTONE", "from": "wi", "to": "m"}
      ],
      "limit": 30
    }

q23:
  desc: Work items with specific label
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "filters": {"state": "opened"}},
        {"id": "lbl", "entity": "Label", "node_ids": "$sample"}
      ],
      "relationships": [
        {"type": "HAS_LABEL", "from": "wi", "to": "lbl"}
      ],
      "limit": 30
    }

q24:
  desc: Pipeline triggered by MR
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "pipe", "entity": "Pipeline", "filters": {"source": "merge_request_event"}},
        {"id": "mr", "entity": "MergeRequest", "node_ids": "$sample"}
      ],
      "relationships": [
        {"type": "TRIGGERED", "from": "mr", "to": "pipe"}
      ],
      "limit": 10,
      "order_by": {"node": "pipe", "property": "created_at", "direction": "DESC"}
    }

q25:
  desc: Shortest path between two projects
  query: |
    {
      "query_type": "path_finding",
      "nodes": [
        {"id": "start", "entity": "Project", "node_ids": "$sample"},
        {"id": "end", "entity": "Project", "node_ids": "$sample"}
      ],
      "path": {"type": "shortest", "from": "start", "to": "end", "max_depth": 3}
    }

q26:
  desc: Users by state
  query: |
    {
      "query_type": "traversal",
      "node": {"id": "u", "entity": "User", "filters": {"state": "active"}},
      "limit": 20
    }

q27:
  desc: Bot accounts
  query: |
    {
      "query_type": "traversal",
      "node": {"id": "u", "entity": "User", "filters": {
        "user_type": {"op": "in", "value": ["project_bot", "service_account", "automation_bot"]}
      }},
      "limit": 30,
      "order_by": {"node": "u", "property": "created_at", "direction": "DESC"}
    }

q28:
  desc: Confidential work items
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "filters": {
          "confidential": true,
          "state": "opened"
        }},
        {"id": "p", "entity": "Project"}
      ],
      "relationships": [
        {"type": "IN_PROJECT", "from": "wi", "to": "p"}
      ],
      "limit": 20
    }

q29:
  desc: SAST vulnerabilities by severity
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "v", "entity": "Vulnerability", "filters": {"report_type": "sast"}}
      ],
      "aggregations": [
        {"function": "count", "target": "v", "alias": "total"}
      ],
      "limit": 10
    }
