    }

# scope_kind: unknown-id
# expect_pk_pruning: true
# correctness_oracle: API row_count MUST be 0. ClickHouse: SELECT count() FROM gl_work_item FINAL WHERE startsWith(traversal_path,'0/') AND state='opened' = 0.
#   Negative-safety assertion: the result must NOT equal the unscoped count SELECT count() FROM gl_work_item FINAL WHERE state='opened' (> 0 because other groups are seeded).
#   EXPLAIN should show the '0/' prefix condition; near-zero granules read. Dict miss => '0/' sentinel; the danger is a resolver that drops the predicate entirely and widens scope.
grp_unknown_id_no_widen:
  desc: Scope by a nonexistent Group id. Dictionary miss must resolve to '0/' (unknown), returning ZERO rows. The rewrite must NOT fall back to an unscoped full-table scan that would leak other groups' data.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "filters": {"state": "opened"}},
        {"id": "g", "entity": "Group", "node_ids": [{{UNKNOWN_ID}}]}
      ],
      "relationships": [{"type": "IN_GROUP", "from": "wi", "to": "g"}],
      "limit": 50
    }

# scope_kind: group-by-id
# expect_pk_pruning: true
# correctness_oracle: ClickHouse: SELECT work_item_type, count() FROM gl_work_item FINAL WHERE startsWith(traversal_path,'<group_prefix>') AND state='opened' GROUP BY work_item_type.
#   Sum across buckets must equal Rails WorkItem.where(namespace_id: <group_namespace_id>, state_id: 1).group(:work_item_type_id).count summed, and must exclude the sibling group.
#   PK proof: read_rows in query_log << unscoped baseline. Single-relationship connected 2-node aggregation; work_item_type is a real WorkItem property.
grp_id_count_workitems_aggregation:
  desc: Whole-group WorkItem rollup (aggregation) scoped by Group id. count open work items across the group, grouped by work_item_type. Complements the MR motivating case with a plan-domain aggregation to show pruning generalizes across aggregation targets.
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "filters": {"state": "opened"}},
        {"id": "g", "entity": "Group", "node_ids": [{{GROUP_ID}}]}
      ],
      "relationships": [{"type": "IN_GROUP", "from": "wi", "to": "g"}],
      "group_by": [{"kind": "property", "node": "wi", "property": "work_item_type", "alias": "wi_type"}],
      "aggregations": [{"function": "count", "target": "wi", "alias": "wi_count"}],
      "aggregation_sort": {"column": "wi_count", "direction": "DESC"},
      "limit": 20
    }

# ===========================================================================
# SLICE 3: namespace-edge (NAMESPACE_ID + EDGE / MULTI-HOP / PATH / NEIGHBORS)
# NOTE: per review, the transport envelope {"query": {...}} has been STRIPPED
# from every dsl in this slice; the queries are bare query objects like all
# other slices. The harness adds the single {"query": ...} wrapper at POST time.
# ===========================================================================

# scope_kind: namespace_id-group
# expect_pk_pruning: true
# correctness_oracle: Rails: Group.find({{GROUP_ID}}) must exist and be a top-level group.
#   ClickHouse: SELECT id, full_path, traversal_path FROM gl_group FINAL WHERE id = {{GROUP_ID}} -> note its traversal_path P. Orbit returns exactly 1 group row (id={{GROUP_ID}}).
#   EXPLAIN shows a PK condition startsWith(traversal_path, P); read_rows/selected_granules << gl_group total (compare to a control query with no id filter). Group.id IS the namespace_id; Group PK is (traversal_path, id).
ns_group_id_resolves_traversal:
  desc: namespace_id filter where the id is a real GROUP namespace. Expressed as Group.id eq {{GROUP_ID}} (a Group's id IS its namespace_id). Single-node traversal the feature rewrites into startsWith(traversal_path,'<group-prefix>/') on the gl_group PK.
  query: |
    {
      "query_type": "traversal",
      "node": {"id": "g", "entity": "Group", "columns": ["id", "name", "full_path"], "filters": {"id": {"op": "eq", "value": {{GROUP_ID}}}}},
      "limit": 50
    }

# scope_kind: group-by-full_path
# expect_pk_pruning: true
# correctness_oracle: Must return the same single row as ns_group_id_resolves_traversal (assert identical id={{GROUP_ID}}).
#   ClickHouse control: SELECT id FROM gl_group FINAL WHERE full_path = '{{GROUP_FULL_PATH}}'. EXPLAIN shows startsWith(traversal_path, P) on the PK (path resolved via dictionary), not a full-scan with a full_path bloom-filter-only predicate. selected_granules << baseline. The two cases must agree on row set and on the resolved prefix P.
ns_group_full_path_resolves_traversal:
  desc: Same group scope addressed by full_path. Group.full_path eq {{GROUP_FULL_PATH}}; the feature looks up the namespace by path in the dictionary and rewrites to startsWith(traversal_path,'<prefix>/').
  query: |
    {
      "query_type": "traversal",
      "node": {"id": "g", "entity": "Group", "columns": ["id", "name", "full_path"], "filters": {"full_path": {"op": "eq", "value": "{{GROUP_FULL_PATH}}"}}},
      "limit": 50
    }

# scope_kind: subgroup
# expect_pk_pruning: true
# correctness_oracle: Rails: Namespace.find({{SUBGROUP_ID}}) is a Group whose parent is {{GROUP_ID}}.
#   ClickHouse: SELECT traversal_path FROM gl_group FINAL WHERE id={{SUBGROUP_ID}} -> prefix P_sub strictly longer than the top group's prefix. Response returns exactly the subgroup row. Sibling B must NOT appear.
#   EXPLAIN shows startsWith(traversal_path, P_sub); read_rows << scanning the whole top-group subtree. traversal_path is filterable:false in the ontology, so request it only as a returned column for the oracle.
ns_subgroup_id_scopes_to_subtree:
  desc: namespace_id filter where the id is a SUBGROUP (still a Group namespace). Scoping to a subgroup must prune to the subgroup's deeper prefix and must NOT return siblings under the same parent.
  query: |
    {
      "query_type": "traversal",
      "node": {"id": "g", "entity": "Group", "columns": ["id", "full_path", "traversal_path"], "filters": {"id": {"op": "eq", "value": {{SUBGROUP_ID}}}}},
      "limit": 50
    }

# scope_kind: namespace_id-project(gap)
# expect_pk_pruning: observational
# correctness_oracle: THE GAP. The Group table excludes type!='Group', so gl_group has NO row for a project_namespace; expected Orbit result is 0 rows.
#   HARD requirement is NOT-WIDENED: the resolved prefix must never collapse to a parent group prefix (e.g. '1/<root>/') that would leak siblings.
#   Verify: (1) SELECT count() FROM gl_group FINAL WHERE id={{PROJECT_NAMESPACE_ID}} = 0; (2) inspect EXPLAIN / debug_sql (options.include_debug_sql) -- the dict lookup for a project_namespace id must yield either the project's exact leaf prefix or a dict-miss '0/', and MUST NOT yield the parent group prefix. Record which acceptable behavior the build exhibits. expect_pk_pruning observational because pruning of the gap is undefined.
ns_project_namespace_id_GAP:
  desc: DOCUMENTED RESIDUAL GAP. namespace_id where the id is a PROJECT_NAMESPACE id (a project's leaf namespace, type='Project'). A project's traversal_path leaf == project_namespace_id, NOT project.id; the dict is keyed for group/namespace prefixes. Passing this id as Group.id must NOT widen scope and must stay correct.
  query: |
    {
      "query_type": "traversal",
      "node": {"id": "g", "entity": "Group", "columns": ["id", "full_path"], "filters": {"id": {"op": "eq", "value": {{PROJECT_NAMESPACE_ID}}}}},
      "limit": 50
    }

# scope_kind: unknown-id
# expect_pk_pruning: true
# correctness_oracle: Rails: Namespace.find_by(id: {{UNKNOWN_ID}}) is nil. Orbit response must be exactly 0 rows.
#   The miss must NOT widen: EXPLAIN / debug_sql must show the rewritten predicate is startsWith(traversal_path, '0/') (the dict-miss sentinel), NOT an absent traversal_path predicate. read_rows ~0 / heavily pruned. Contrast with the no-filter control which returns all groups.
ns_unknown_id_no_widen:
  desc: Unknown / nonexistent namespace_id. Dictionary miss must resolve to '0/' and be treated as unknown, returning 0 rows. Must NOT fall back to an unscoped (full-table) query.
  query: |
    {
      "query_type": "traversal",
      "node": {"id": "g", "entity": "Group", "columns": ["id", "full_path"], "filters": {"id": {"op": "eq", "value": {{UNKNOWN_ID}}}}},
      "limit": 50
    }

# scope_kind: project-by-id
# expect_pk_pruning: true
# correctness_oracle: Rails: MergeRequest.where(target_project_id: {{PROJECT_ID}}).count == expected N.
#   ClickHouse: SELECT count() FROM gl_merge_request FINAL WHERE project_id = {{PROJECT_ID}} should equal the returned row count.
#   EXPLAIN: the gl_merge_request scan must carry startsWith(traversal_path, P) where P is the project's prefix (resolved from the Project.id filter via dictionary), and gl_project likewise. selected_granules on gl_merge_request << a control without the project filter. Sibling project's MRs must be absent. Proves the rewrite propagates the resolved prefix onto the related MergeRequest node.
proj_id_mr_in_project_scoped_traversal:
  desc: EDGE multi-node. MergeRequest IN_PROJECT Project, scoped to a single project by Project.id. The feature must push the project scope down to the traversal_path PK of BOTH the MergeRequest node and the Project node (same prefix).
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "columns": ["iid", "title", "state", "project_id"]},
        {"id": "p", "entity": "Project", "columns": ["id", "full_path"], "filters": {"id": {"op": "eq", "value": {{PROJECT_ID}}}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p"}],
      "order_by": {"node": "mr", "property": "created_at", "direction": "DESC"},
      "limit": 50
    }

# scope_kind: project-by-full_path
# expect_pk_pruning: true
# correctness_oracle: Rails: MergeRequest.where(target_project_id: {{PROJECT_ID}}, state_id: [1,2,3]).count == mr_count in the single returned bucket.
#   ClickHouse: SELECT count() FROM gl_merge_request FINAL WHERE project_id={{PROJECT_ID}} AND state IN ('opened','closed','merged'). Exactly one group bucket (the target project).
#   EXPLAIN shows startsWith(traversal_path, P) on gl_merge_request; read_rows << unscoped control. Sibling project must not produce a bucket. Count must match Rails exactly (no double counting from the prefix join).
proj_full_path_mr_count_agg_scoped:
  desc: EDGE aggregation scoped by Project.full_path. count MergeRequests per project, filtered to one project by full_path. Confirms the rewrite works through the aggregation path and that the count is exact.
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": {"op": "in", "value": ["opened", "closed", "merged"]}}},
        {"id": "p", "entity": "Project", "columns": ["id", "full_path"], "filters": {"full_path": {"op": "eq", "value": "{{PROJECT_FULL_PATH}}"}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p"}],
      "group_by": [{"kind": "node", "node": "p"}],
      "aggregations": [{"function": "count", "target": "mr", "alias": "mr_count"}],
      "aggregation_sort": {"column": "mr_count", "direction": "DESC"},
      "limit": 10
    }

# scope_kind: group-by-id
# expect_pk_pruning: false
# correctness_oracle: NEGATIVE/INVALID CONTROL (oracle CORRECTED per review). id_property is a NodeSelector-level field, NOT a filter key; placing {"id_property":"namespace_id"} inside filters parses as a property filter literally named id_property.
#   Rejection happens at compile time via the ontology-derived JSON-schema allowlist (propertyNames enum), surfaced as code 'compile_error' with message: allowlist rejected: "id_property" is not one of "id"... at /nodes/2/filters (NOT a runtime 'unknown property' error, and NOT 'Project has no namespace_id property'). Verified 2026-06-04.
#   Oracle: POST returns a runtime 4xx (ontology validation error), not an empty 200 and not a widened result. The harness must treat a 4xx (not an empty 200) as PASS. expect_pk_pruning=false (the query never compiles).
multihop_user_authored_mr_in_project_group_scoped:
  desc: Intentionally encodes the common mistake (group_id stuffed into Project.id via a bogus id_property filter key). The harness must assert it is REJECTED at runtime ontology validation. The correct group-scoped multi-hop is multihop_group_scope_via_group_node.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "u", "entity": "User", "columns": ["username"]},
        {"id": "mr", "entity": "MergeRequest", "columns": ["iid", "title", "project_id"]},
        {"id": "p", "entity": "Project", "columns": ["id", "full_path"], "filters": {"id": {"op": "eq", "value": {{GROUP_ID}}}, "id_property": "namespace_id"}}
      ],
      "relationships": [
        {"type": "AUTHORED", "from": "u", "to": "mr"},
        {"type": "IN_PROJECT", "from": "mr", "to": "p"}
      ],
      "limit": 100
    }

# scope_kind: group-by-id
# expect_pk_pruning: true
# correctness_oracle: Rails: for each project P_i directly in {{GROUP_ID}}, sum authored MRs (MergeRequest.of_projects(Group.find({{GROUP_ID}}).all_projects)).
#   ClickHouse: SELECT count() FROM gl_merge_request FINAL WHERE startsWith(traversal_path, P_group) where P_group = (SELECT traversal_path FROM gl_group FINAL WHERE id={{GROUP_ID}}). Returned (u,mr,p) tuples must all have p.full_path under {{GROUP_FULL_PATH}} and none under the sibling group.
#   EXPLAIN: gl_merge_request and gl_project scans carry startsWith(traversal_path, P_group); selected_granules << unscoped 3-hop control. 4 nodes + 3 relationships is within schema caps. CONTAINS Group->Project is a real ontology variant.
multihop_group_scope_via_group_node:
  desc: MULTI-HOP correctly scoped to a GROUP by adding the Group as a node and joining the leaf Project via CONTAINS. User AUTHORED MergeRequest IN_PROJECT Project, Group CONTAINS Project with Group.id eq {{GROUP_ID}}. The group's traversal_path prefix prunes the whole subtree. Positive counterpart to the rejected case above.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "u", "entity": "User", "columns": ["username"]},
        {"id": "mr", "entity": "MergeRequest", "columns": ["iid", "title", "project_id"]},
        {"id": "p", "entity": "Project", "columns": ["id", "full_path"]},
        {"id": "g", "entity": "Group", "columns": ["id", "full_path"], "filters": {"id": {"op": "eq", "value": {{GROUP_ID}}}}}
      ],
      "relationships": [
        {"type": "AUTHORED", "from": "u", "to": "mr"},
        {"type": "IN_PROJECT", "from": "mr", "to": "p"},
        {"type": "CONTAINS", "from": "g", "to": "p"}
      ],
      "limit": 100
    }

# scope_kind: project-by-id
# expect_pk_pruning: true
# correctness_oracle: [ADDED missing_case] Edge-table-scoped multi-hop asserting the gl_edge scan ITSELF prunes on traversal_path.
#   ClickHouse: confirm reviewer edges exist under the project: SELECT count() FROM gl_edge FINAL WHERE startsWith(traversal_path, P_project) AND relationship_kind='REVIEWER'.
#   Rails: MergeRequest.where(target_project_id:{{PROJECT_ID}}).flat_map(&:reviewers) count for the (u,mr) tuples returned.
#   PK proof: EXPLAIN indexes=1 on gl_edge shows the PrimaryKey step with startsWith(traversal_path, P_project); read_rows on gl_edge is bounded by the project prefix, NOT the whole edge table. This is the only case that reads gl_edge read_rows directly and asserts edge pruning.
edge_rel_scoped_prune_reviewer:
  desc: Edge-table-scoped multi-hop (User REVIEWER MergeRequest IN_PROJECT Project) under a project prefix, asserting the gl_edge scan ITSELF prunes on traversal_path. Edge pruning was previously asserted only indirectly via node pruning.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "u", "entity": "User", "columns": ["username"]},
        {"id": "mr", "entity": "MergeRequest", "columns": ["iid", "title", "state"]},
        {"id": "p", "entity": "Project", "filters": {"id": {"op": "eq", "value": {{PROJECT_ID}}}}}
      ],
      "relationships": [
        {"type": "REVIEWER", "from": "u", "to": "mr"},
        {"type": "IN_PROJECT", "from": "mr", "to": "p"}
      ],
      "limit": 100
    }

# scope_kind: project-by-id
# expect_pk_pruning: true
# correctness_oracle: ClickHouse: confirm edge exists: SELECT count() FROM gl_edge FINAL WHERE source_id={{MR_NODE_ID}} AND target_id={{PROJECT_ID}} AND relationship_kind='IN_PROJECT' = 1.
#   Orbit response must contain a path of length 1 (start MR -> IN_PROJECT -> end Project). Both endpoints use node_ids so rel_types is optional.
#   EXPLAIN: gl_edge frontier scans bounded by startsWith(traversal_path, P_project) (both endpoints share the same project prefix); read_rows on gl_edge << an unscoped path search. Path nodes' ids must be exactly {{MR_NODE_ID}} and {{PROJECT_ID}}.
path_finding_two_entities_in_project:
  desc: PATH_FINDING between two seeded entities within one project. shortest path from a specific MergeRequest to its Project, both pinned by node_ids, scoped within {{PROJECT_ID}}. Confirms the path search frontier is bounded by the project prefix.
  query: |
    {
      "query_type": "path_finding",
      "nodes": [
        {"id": "start", "entity": "MergeRequest", "node_ids": [{{MR_NODE_ID}}]},
        {"id": "end", "entity": "Project", "node_ids": [{{PROJECT_ID}}]}
      ],
      "path": {"type": "shortest", "from": "start", "to": "end", "max_depth": 3}
    }

# scope_kind: unknown-id
# expect_pk_pruning: true
# correctness_oracle: [ADDED missing_case] PATH_FINDING with one endpoint pinned to a nonexistent id. Proves the path frontier fails closed (dict-miss '0/') and returns no path rather than widening the gl_edge frontier scan.
#   Orbit response must contain NO path / empty result. ClickHouse: SELECT count() FROM gl_project FINAL WHERE id={{UNKNOWN_ID}} = 0.
#   PK proof: EXPLAIN on the gl_edge frontier shows the '0/' prefix condition; read_rows on gl_edge ~0, NOT the whole edge table. No unknown-id negative existed for path_finding before.
unknown_id_path_finding_no_widen:
  desc: PATH_FINDING with an endpoint pinned to a nonexistent id. Proves the path frontier fails closed (dict-miss '0/') and returns no path rather than widening the gl_edge frontier scan.
  query: |
    {
      "query_type": "path_finding",
      "nodes": [
        {"id": "start", "entity": "MergeRequest", "node_ids": [{{MR_NODE_ID}}]},
        {"id": "end", "entity": "Project", "node_ids": [{{UNKNOWN_ID}}]}
      ],
      "path": {"type": "shortest", "from": "start", "to": "end", "max_depth": 3}
    }

# scope_kind: group-by-full_path
# expect_pk_pruning: true
# correctness_oracle: ClickHouse: both projects exist under {{GROUP_ID}} (SELECT id, traversal_path FROM gl_project FINAL WHERE full_path IN ('{{PROJECT_FULL_PATH}}','{{PROJECT_FULL_PATH_2}}')).
#   Expected shortest path length 2: a <-CONTAINS- Group -CONTAINS-> b (Group is the common parent). Orbit returns a path of depth 2 whose middle node is the group {{GROUP_ID}}.
#   Because endpoints use filters, schema requires rel_types (provided). EXPLAIN: endpoint frontier scans bounded by each project's prefix and the search bounded by the group prefix; read_rows << unscoped. Validates the rel_types-required-with-filters schema rule end to end.
path_finding_two_projects_in_group_by_full_path:
  desc: PATH_FINDING between two seeded projects within the same group, endpoints pinned by full_path (engine resolves prefixes from the dictionary). rel_types is REQUIRED because endpoints use filters, not node_ids.
  query: |
    {
      "query_type": "path_finding",
      "nodes": [
        {"id": "a", "entity": "Project", "filters": {"full_path": {"op": "eq", "value": "{{PROJECT_FULL_PATH}}"}}},
        {"id": "b", "entity": "Project", "filters": {"full_path": {"op": "eq", "value": "{{PROJECT_FULL_PATH_2}}"}}}
      ],
      "path": {"type": "shortest", "from": "a", "to": "b", "max_depth": 3, "rel_types": ["CONTAINS", "IN_PROJECT"]}
    }

# scope_kind: project-by-id
# expect_pk_pruning: true
# correctness_oracle: ClickHouse: expected neighbor count = SELECT count() FROM gl_edge FINAL WHERE (source_id={{PROJECT_ID}} AND source_kind='Project') OR (target_id={{PROJECT_ID}} AND target_kind='Project').
#   Orbit neighbors result node/edge count must match (after redaction). EXPLAIN: gl_edge scan must carry startsWith(traversal_path, P_project) bounding the edge frontier (resolved from the project center's prefix); read_rows on gl_edge << unscoped neighbors of an unfiltered center. None of the returned neighbors may belong to the sibling project's subtree.
neighbors_project_center_outgoing:
  desc: NEIGHBORS of a project-scoped center node. immediate neighbors of Project {{PROJECT_ID}}. The center is pinned by node_ids and the project's traversal_path prefix bounds the gl_edge scan. Uses top-level singular node + neighbors config.
  query: |
    {
      "query_type": "neighbors",
      "node": {"id": "p", "entity": "Project", "node_ids": [{{PROJECT_ID}}], "columns": ["id", "full_path"]},
      "neighbors": {"node": "p", "direction": "both"},
      "limit": 100
    }

# scope_kind: unknown-id
# expect_pk_pruning: true
# correctness_oracle: [ADDED missing_case] NEIGHBORS of a nonexistent center id. Proves the neighbors gl_edge scan fails closed ('0/' prefix) and returns zero neighbors rather than scanning the whole edge table.
#   Orbit neighbors result must be empty (zero nodes/edges). ClickHouse: SELECT count() FROM gl_project FINAL WHERE id={{UNKNOWN_ID}} = 0.
#   PK proof: EXPLAIN on the gl_edge scan shows the '0/' prefix condition; read_rows on gl_edge ~0, NOT the whole edge table. No unknown-id negative existed for neighbors before.
unknown_id_neighbors_no_widen:
  desc: NEIGHBORS of a nonexistent center id. Proves the neighbors gl_edge scan fails closed ('0/' prefix) and returns zero neighbors rather than scanning the whole edge table.
  query: |
    {
      "query_type": "neighbors",
      "node": {"id": "p", "entity": "Project", "node_ids": [{{UNKNOWN_ID}}], "columns": ["id", "full_path"]},
      "neighbors": {"node": "p", "direction": "both"},
      "limit": 100
    }

# scope_kind: group-by-id
# expect_pk_pruning: true
# correctness_oracle: Rails: direct children of {{GROUP_ID}} = Group.where(parent_id: {{GROUP_ID}}) (subgroups) + Project.where(namespace_id: {{GROUP_ID}}) (direct projects).
#   ClickHouse: SELECT count() FROM gl_edge FINAL WHERE source_id={{GROUP_ID}} AND source_kind='Group' AND relationship_kind='CONTAINS'. Orbit neighbors result must equal that set.
#   EXPLAIN: gl_edge scan bounded by startsWith(traversal_path, P_group) AND relationship_kind='CONTAINS'; selected_granules << unscoped. Sibling group's children must not appear; grandchildren (deeper than 1 hop) must not appear (neighbors is single-hop).
neighbors_group_center_contains_rel_filter:
  desc: NEIGHBORS of a GROUP center, restricted to CONTAINS edges. direct children (subgroups + projects) of group {{GROUP_ID}}. Group center pinned by node_ids; rel_types narrows to CONTAINS. Bounded by the group's traversal_path prefix.
  query: |
    {
      "query_type": "neighbors",
      "node": {"id": "g", "entity": "Group", "node_ids": [{{GROUP_ID}}], "columns": ["id", "full_path"]},
      "neighbors": {"node": "g", "direction": "outgoing", "rel_types": ["CONTAINS"]},
      "limit": 100
    }

# ===========================================================================
# SLICE 4: agg-paging
# NOTE: per review, all ClickHouse oracle SQL uses the STRING 'state' column
# (no state_id exists in any gl_ table). state_id is kept ONLY on the Rails side.
# ===========================================================================

# scope_kind: project-by-id
# expect_pk_pruning: true
# correctness_oracle: ClickHouse: SELECT count() FROM gl_merge_request FINAL WHERE project_id = {{PROJECT_ID}} AND state IN ('opened','closed','merged').
#   Rails cross-check: Project.find({{PROJECT_ID}}).merge_requests.count. The single returned mr_count row must equal both.
#   PK proof: enable options.include_debug_sql, run EXPLAIN indexes=1; the mr table read shows granules selected << total AND system.query_log read_rows for this query_id is bounded by the project's row count. The compiled WHERE must contain startsWith(mr.traversal_path, '<resolved_prefix>') where the prefix ends in the project_namespace_id, not PROJECT_ID.
proj_id_mr_count:
  desc: Total MR count scoped to a single project by project id. Anchors scope on the Project node (node_ids = project.id); the MR node's startsWith(traversal_path, '<proj_prefix>') prunes on the PK. The original slow-query class the rewrite targets.
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": {"op": "in", "value": ["opened", "closed", "merged"]}}},
        {"id": "p", "entity": "Project", "node_ids": [{{PROJECT_ID}}]}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p", "direction": "outgoing"}],
      "aggregations": [{"function": "count", "target": "mr", "alias": "mr_count"}],
      "limit": 1,
      "options": {"include_debug_sql": true}
    }

# scope_kind: project-by-full_path
# expect_pk_pruning: true
# correctness_oracle: Must equal proj_id_mr_count's mr_count for the same project. Independent: SELECT count() FROM gl_merge_request FINAL WHERE project_id = {{PROJECT_ID}} AND state IN ('opened','closed','merged').
#   PK proof: compiled SQL must carry startsWith(mr.traversal_path, '<resolved_prefix>') with the SAME prefix the by-id case produced (assert prefix equality). EXPLAIN indexes=1 shows granule pruning; read_rows bounded by project rows.
proj_fullpath_mr_count:
  desc: Same total MR count but scope expressed by Project.full_path (eq). Exercises the full_path -> traversal_path prefix resolution path. Result must be identical to proj_id_mr_count for the same project.
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": {"op": "in", "value": ["opened", "closed", "merged"]}}},
        {"id": "p", "entity": "Project", "filters": {"full_path": {"op": "eq", "value": "{{PROJECT_FULL_PATH}}"}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p", "direction": "outgoing"}],
      "aggregations": [{"function": "count", "target": "mr", "alias": "mr_count"}],
      "limit": 1,
      "options": {"include_debug_sql": true}
    }

# scope_kind: project-by-id
# expect_pk_pruning: true
# correctness_oracle: ClickHouse: SELECT state, count() FROM gl_merge_request FINAL WHERE project_id = {{PROJECT_ID}} AND state IN ('opened','closed','merged') GROUP BY state. Assert each returned bucket equals the per-state count.
#   Rails cross-check (Postgres side may use state_id): MergeRequest.where(target_project_id: {{PROJECT_ID}}).group(:state_id).count, mapping 1->opened,2->closed,3->merged.
#   Sum of all bucket mr_count == proj_id_mr_count total. PK proof: compiled SQL has startsWith(mr.traversal_path, '<proj_prefix>'); EXPLAIN indexes=1 + query_log confirm granule/read_rows reduction.
proj_id_mr_by_state:
  desc: GROUP BY MergeRequest.state within a single project (by id). Verifies grouped aggregation correctness under PK pruning. each state bucket must match per-state truth, and buckets must sum to the proj_id_mr_count total.
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": {"op": "in", "value": ["opened", "closed", "merged"]}}},
        {"id": "p", "entity": "Project", "node_ids": [{{PROJECT_ID}}]}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p", "direction": "outgoing"}],
      "group_by": [{"kind": "property", "node": "mr", "property": "state", "alias": "mr_state"}],
      "aggregations": [{"function": "count", "target": "mr", "alias": "mr_count"}],
      "aggregation_sort": {"column": "mr_count", "direction": "DESC"},
      "limit": 10,
      "options": {"include_debug_sql": true}
    }

# scope_kind: group-by-id
# expect_pk_pruning: observational
# correctness_oracle: ClickHouse: SELECT author_id, count() FROM gl_merge_request FINAL WHERE startsWith(traversal_path,'<group_prefix>') AND state IN ('opened','closed','merged') GROUP BY author_id ORDER BY count() DESC. Assert author buckets/counts match (top author especially).
#   Sum across buckets equals total MRs across all projects in the group. Rails: MergeRequest.where(target_project_id: Group.find({{GROUP_ID}}).all_projects.select(:id)).group(:author_id).count.
#   PK note: the tight group prefix is injected on the SCOPED Group node's scan only, NOT on the mr payload scan (the mr runs under the broad authz prefix) -- so the compiled SQL does NOT carry startsWith(mr.traversal_path,'<group_prefix>'); verified against query_log 2026-06-04. The mr/g linkage here is also degenerate on this data (MRs carry no IN_GROUP edge to a top group; they relate via IN_PROJECT), so the shape returns 0 rows. Payload-scan prefix propagation is not current behavior.
group_id_mr_by_author:
  desc: GROUP BY author (User node) of MRs across ALL projects in a group, scoped by group id. The Group anchors the traversal_path prefix; MRs in any descendant project share it, so the join scan prunes on PK. The cross-project 'who authored the most MRs in this group' slow query.
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": {"op": "in", "value": ["opened", "closed", "merged"]}}},
        {"id": "author", "entity": "User"},
        {"id": "p", "entity": "Project"},
        {"id": "g", "entity": "Group", "node_ids": [{{GROUP_ID}}]}
      ],
      "relationships": [
        {"type": "AUTHORED", "from": "author", "to": "mr", "direction": "outgoing"},
        {"type": "IN_PROJECT", "from": "mr", "to": "p", "direction": "outgoing"},
        {"type": "CONTAINS", "from": "g", "to": "p", "direction": "outgoing"}
      ],
      "group_by": [{"kind": "node", "node": "author", "alias": "author"}],
      "aggregations": [{"function": "count", "target": "mr", "alias": "mr_count"}],
      "aggregation_sort": {"column": "mr_count", "direction": "DESC"},
      "limit": 20,
      "options": {"include_debug_sql": true}
    }

# scope_kind: group-by-full_path
# expect_pk_pruning: true
# correctness_oracle: ClickHouse: SELECT state, count() FROM gl_work_item FINAL WHERE namespace_id = {{GROUP_ID}} AND state IN ('opened','closed') GROUP BY state (IN_GROUP fk_column is namespace_id). Assert each bucket matches.
#   Rails: Group.find({{GROUP_ID}}).work_items.group(:state_id).count for group-level items (map 1->opened,2->closed).
#   PK proof: compiled SQL has startsWith(wi.traversal_path,'<group_prefix>'); EXPLAIN indexes=1 shows granule pruning; read_rows bounded. Covers IN_GROUP edge + full_path group scope. WorkItem.state has only opened/closed.
group_fullpath_wi_by_state:
  desc: GROUP BY WorkItem.state for work items directly in a group, scoped by group full_path via the IN_GROUP edge. Exercises group full_path -> prefix resolution and the IN_GROUP scoping path (distinct from IN_PROJECT).
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "filters": {"state": {"op": "in", "value": ["opened", "closed"]}}},
        {"id": "g", "entity": "Group", "filters": {"full_path": {"op": "eq", "value": "{{GROUP_FULL_PATH}}"}}}
      ],
      "relationships": [{"type": "IN_GROUP", "from": "wi", "to": "g", "direction": "outgoing"}],
      "group_by": [{"kind": "property", "node": "wi", "property": "state", "alias": "wi_state"}],
      "aggregations": [{"function": "count", "target": "wi", "alias": "wi_count"}],
      "aggregation_sort": {"column": "wi_count", "direction": "DESC"},
      "limit": 10,
      "options": {"include_debug_sql": true}
    }

# scope_kind: project-by-id
# expect_pk_pruning: true
# correctness_oracle: ClickHouse: SELECT id FROM gl_merge_request FINAL WHERE project_id={{PROJECT_ID}} AND state IN ('opened','closed','merged') ORDER BY created_at DESC, id DESC LIMIT 20. The 20 returned mr ids (in order) must equal this list.
#   (id is the tiebreaker since created_at can tie; confirm the engine applies a stable secondary sort.) PK proof: compiled SQL has startsWith(mr.traversal_path,'<proj_prefix>'); EXPLAIN indexes=1 + query_log confirm granules/read_rows << namespace total. First page (offset 0).
proj_id_mr_orderby_limit_page:
  desc: Traversal of MRs in a project by id, ordered by created_at DESC with limit and a first-page cursor. Verifies order_by + limit produce a stable, deterministic top-N under PK pruning. Pairs with the next case to prove paging stability.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "columns": ["id", "iid", "title", "state", "created_at"], "filters": {"state": {"op": "in", "value": ["opened", "closed", "merged"]}}},
        {"id": "p", "entity": "Project", "node_ids": [{{PROJECT_ID}}]}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p", "direction": "outgoing"}],
      "order_by": {"node": "mr", "property": "created_at", "direction": "DESC"},
      "limit": 40,
      "cursor": {"offset": 0, "page_size": 20},
      "options": {"include_debug_sql": true}
    }

# scope_kind: project-by-id
# expect_pk_pruning: true
# correctness_oracle: ClickHouse: same ordered query (ORDER BY created_at DESC, id DESC) rows 21-40. Assert: (1) page2 ids equal that slice in order; (2) intersection(page1_ids, page2_ids) empty; (3) page1 ++ page2 equals the full top-40 with no gaps.
#   Re-run page1 + page2 a second time and assert identical results (idempotent/stable paging). PK proof identical to page1. cursor.offset 20 + page_size 20 within limit 40.
proj_id_mr_orderby_limit_page2:
  desc: Second page of the exact same scoped+ordered query (offset 20). Proves pagination is stable. page1 and page2 are disjoint, contiguous, and together equal the global ORDER BY created_at DESC top-40 with no gaps, duplicates, or reordering.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "columns": ["id", "iid", "title", "state", "created_at"], "filters": {"state": {"op": "in", "value": ["opened", "closed", "merged"]}}},
        {"id": "p", "entity": "Project", "node_ids": [{{PROJECT_ID}}]}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p", "direction": "outgoing"}],
      "order_by": {"node": "mr", "property": "created_at", "direction": "DESC"},
      "limit": 40,
      "cursor": {"offset": 20, "page_size": 20},
      "options": {"include_debug_sql": true}
    }

# scope_kind: namespace_id-project(gap)
# expect_pk_pruning: observational
# correctness_oracle: RENAMED from duplicate id 'namespace_id_project_gap' per review (was colliding with the neg-security case). DOCUMENTED RESIDUAL GAP.
#   {{PROJECT_NAMESPACE_ID}} is substituted as the project_namespace_id (NOT project.id). ClickHouse: SELECT count() FROM gl_work_item FINAL WHERE namespace_id = {{PROJECT_NAMESPACE_ID}} AND state IN ('opened','closed'). wi_count must be correct (equality filter on namespace_id is a normal column predicate).
#   expect_pk_pruning observational: the compiled SQL may filter namespace_id={{PROJECT_NAMESPACE_ID}} WITHOUT adding a startsWith(traversal_path,...) derived from it (the gap). EXPLAIN indexes=1 / query_log records whether pruning happened; the test asserts the count is exact unconditionally and records the pruning observation as the gap indicator.
aggpaging_namespace_id_project_gap:
  desc: DOCUMENTED RESIDUAL GAP. Aggregate WorkItem count where the scope is a raw namespace_id filter whose value is a project_namespace_id. Correctness must hold; PK pruning is undefined for the project_namespace_id rewrite. {{PROJECT_NAMESPACE_ID}} placeholder must be substituted with the project_namespace_id, not project.id.
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "filters": {"state": {"op": "in", "value": ["opened", "closed"]}, "namespace_id": {"op": "eq", "value": {{PROJECT_NAMESPACE_ID}}}}}
      ],
      "aggregations": [{"function": "count", "target": "wi", "alias": "wi_count"}],
      "limit": 1,
      "options": {"include_debug_sql": true}
    }

# scope_kind: unknown-id
# expect_pk_pruning: true
# correctness_oracle: Result must be empty / mr_count = 0 (assert whichever the engine returns for an empty scope, and that it is NOT the instance-wide MR count).
#   ClickHouse: SELECT count() FROM gl_project FINAL WHERE id = {{UNKNOWN_ID}} returns 0. PK proof: compiled SQL must contain startsWith(mr.traversal_path,'0/') (dict-miss sentinel); EXPLAIN indexes=1 / query_log show ~0 read_rows from gl_merge_request. Critically assert the prefix is '0/' and not '' or '1/'.
unknown_id_no_widen:
  desc: Negative/safety. Aggregate MR count scoped to a Project id that does not exist. Dict lookup misses, yielding '0/' which must be treated as UNKNOWN scope. result must be empty (count 0), NOT a widening to the whole instance. Proves a dict miss never broadens scope.
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": {"op": "in", "value": ["opened", "closed", "merged"]}}},
        {"id": "p", "entity": "Project", "node_ids": [{{UNKNOWN_ID}}]}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p", "direction": "outgoing"}],
      "aggregations": [{"function": "count", "target": "mr", "alias": "mr_count"}],
      "limit": 1,
      "options": {"include_debug_sql": true}
    }

# ===========================================================================
# SLICE 5: negative-security
# ===========================================================================

# scope_kind: unknown-id
# expect_pk_pruning: true
# correctness_oracle: API row_count == 0. In system.query_log for the query_id, assert read_rows is tiny (a single granule per part, << gl_merge_request total), NOT the table row count.
#   EXPLAIN indexes=1 on the emitted SQL (options.include_debug_sql) must show the PK index selecting ~0 granules because the predicate is startsWith(mr.traversal_path,'0/'). Cross-check the dict miss: SELECT dictGet('project_traversal_paths_dict','traversal_path', toUInt64({{UNKNOWN_ID}})) returns '0/' (or empty). If read_rows ~= table size, the rewrite leaked into a full scan -> fail.
unknown_project_id_mr_empty:
  desc: Scope MRs to a nonexistent project_id. The rewrite resolves project_id -> project_namespace_id via the dict; a miss yields the '0/' sentinel, so startsWith(traversal_path,'0/') matches nothing. MUST return empty and MUST NOT widen to a full scan.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": {"op": "in", "value": ["opened", "closed", "merged"]}, "project_id": {"op": "eq", "value": {{UNKNOWN_ID}}}}, "columns": ["iid", "title", "state", "project_id"]},
        {"id": "p", "entity": "Project"}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p"}],
      "limit": 50,
      "options": {"include_debug_sql": true}
    }

# scope_kind: project-by-full_path
# expect_pk_pruning: true
# correctness_oracle: API row_count == 0. read_rows tiny (<= 1 granule). EXPLAIN must show PK pruning to ~0 granules via startsWith(p.traversal_path,'<miss-prefix>').
#   Independent: Project.find_by_full_path('this-org/does-not-exist-nowhere') is nil; SELECT count() FROM gl_project FINAL WHERE full_path='this-org/does-not-exist-nowhere' == 0. Confirm the emitted SQL did NOT degrade to a bare full_path=... bloom-filter scan with no traversal_path PK predicate.
unknown_full_path_proj_empty:
  desc: Single-node Project scoped by a nonexistent full_path. The rewrite resolves full_path -> the project's own traversal_path prefix; an unresolvable path is a miss => unknown prefix ('0/'). MUST short-circuit to empty, not scan gl_project.
  query: |
    {
      "query_type": "traversal",
      "node": {"id": "p", "entity": "Project", "filters": {"full_path": {"op": "eq", "value": "this-org/does-not-exist-nowhere"}}, "columns": ["full_path", "name", "visibility_level"]},
      "limit": 50,
      "options": {"include_debug_sql": true}
    }

# scope_kind: project-by-full_path
# expect_pk_pruning: true
# correctness_oracle: Two-branch oracle. Run the same query with and without the trailing slash and compare row_count: if the feature normalizes, both return the same N>0 and the same project; if normalization is intentionally NOT done, the trailing-slash variant returns 0 (acceptable as long as it is empty, never a full scan).
#   EXPLAIN/read_rows must be tiny in BOTH branches. Independent N: SELECT count() FROM gl_project FINAL WHERE full_path='{{PROJECT_FULL_PATH}}' (==1) and Project.find_by_full_path('{{PROJECT_FULL_PATH}}').present?. Record which behavior (normalize vs strict) the build exhibits.
full_path_trailing_slash:
  desc: Scope a Project by its real full_path with a trailing slash appended. full_path in gl_project has no trailing slash; the rewrite must normalize (strip trailing '/') before dict lookup, else it misses and returns empty. Asserts the normalizer, not a leak.
  query: |
    {
      "query_type": "traversal",
      "node": {"id": "p", "entity": "Project", "filters": {"full_path": {"op": "eq", "value": "{{PROJECT_FULL_PATH}}/"}}, "columns": ["full_path", "name"]},
      "limit": 50,
      "options": {"include_debug_sql": true}
    }

# scope_kind: project-by-full_path
# expect_pk_pruning: true
# correctness_oracle: API row_count == 0 (case variant does not resolve). read_rows tiny; EXPLAIN prunes to '0/'.
#   Independent: SELECT count() FROM gl_project FINAL WHERE full_path='{{PROJECT_FULL_PATH_UPPER}}' == 0 while the canonical-case count == 1, proving storage is case-sensitive and the rewrite did not normalize case. If row_count>0 the rewrite is doing a case-insensitive match (leak/over-match) -> fail.
full_path_case_variant:
  desc: Scope a Project by an upper/mixed-case variant of its real full_path. GitLab paths are case-sensitive in storage; the rewrite/dict lookup must treat the case variant as a distinct (missing) key. Expect empty, never a widened scan, never an accidental case-insensitive match.
  query: |
    {
      "query_type": "traversal",
      "node": {"id": "p", "entity": "Project", "filters": {"full_path": {"op": "eq", "value": "{{PROJECT_FULL_PATH_UPPER}}"}}, "columns": ["full_path", "name"]},
      "limit": 50,
      "options": {"include_debug_sql": true}
    }

# scope_kind: id-in-multi
# expect_pk_pruning: true
# correctness_oracle: Per-project counts must match a direct ClickHouse query: for each id, SELECT count() FROM gl_merge_request FINAL WHERE project_id=<id> AND state IN ('opened','closed','merged') -> equals that project's mr_count bucket; sum equals total.
#   Rails: Project.find(id).merge_requests.where(state:[...]).count per project. read_rows close to the sum of the three projects' MR partitions, NOT the whole table.
#   EXPLAIN must show the PK index selecting only granules under the three resolved traversal_path prefixes (OR-of-startsWith form), not arrayExists-per-row over the full table.
project_id_in_multi:
  desc: Scope MR-count aggregation to THREE real authorized projects via project_id IN [...]. The rewrite must produce a multi-prefix predicate. OR of startsWith(traversal_path, prefix_i) for each resolved leaf, each PK-prunable. Validates multi-prefix correctness AND that each prefix still prunes.
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": {"op": "in", "value": ["opened", "closed", "merged"]}, "project_id": {"op": "in", "value": [{{PROJECT_ID}}, {{PROJECT_ID_2}}, {{PROJECT_ID_3}}]}}, "columns": ["iid", "project_id"]},
        {"id": "p", "entity": "Project"}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p"}],
      "group_by": [{"kind": "node", "node": "p"}],
      "aggregations": [{"function": "count", "target": "mr", "alias": "mr_count"}],
      "aggregation_sort": {"column": "mr_count", "direction": "DESC"},
      "limit": 20,
      "options": {"include_debug_sql": true}
    }

# scope_kind: org-unscoped
# expect_pk_pruning: false
# correctness_oracle: Emitted SQL (include_debug_sql) must contain NO startsWith(traversal_path,...) rewrite for the User alias (gl_user has no traversal_path; it relies on Rails read_user redaction, not Layer-1 filtering).
#   row_count matches a scan of authorized active users; compare to SELECT count() FROM gl_user FINAL WHERE state='active' bounded by limit 30. The DIFF that matters: this query's read_rows is the un-pruned baseline; the scoped cases must read dramatically fewer rows than this control on a comparably-sized table.
org_unscoped_control:
  desc: Baseline control. an unscoped User listing (gl_user is a global table with NO traversal_path, in skip_security_filter_for_entities). No scope filter, so the prefix-rewrite feature is a no-op. Establishes the un-rewritten baseline read_rows for comparison.
  query: |
    {
      "query_type": "traversal",
      "node": {"id": "u", "entity": "User", "filters": {"state": "active"}, "columns": ["username", "state"]},
      "limit": 30,
      "options": {"include_debug_sql": true}
    }

# scope_kind: unauthorized
# expect_pk_pruning: true
# correctness_oracle: API row_count == 0 even though the project genuinely has MRs. Positive control: the SAME {{UNAUTH_PROJECT_ID}} run as an authorized user returns N>0.
#   Independent: SELECT count() FROM gl_merge_request FINAL WHERE project_id={{UNAUTH_PROJECT_ID}} > 0. Emitted SQL must show BOTH the user-supplied scope prefix AND the auth-prefix OR-chain conjoined (scope_prefix AND (auth_prefix_1 OR ...)); read_rows tiny. The conjunction must compile to a non-satisfiable PK range (or Bool(false)) -> ~0 granules.
out_of_scope_project_id_zero_leak:
  desc: Scope MRs to a REAL project that exists but is OUTSIDE the calling user's authorized traversal paths. The security pass must AND the resolved scope prefix with the user's authorized prefixes; the conjunction is empty => zero rows, no leak.
  query: |
    {
      "query_type": "traversal",
      "node": {"id": "mr", "entity": "MergeRequest", "filters": {"state": {"op": "in", "value": ["opened", "closed", "merged"]}, "project_id": {"op": "eq", "value": {{UNAUTH_PROJECT_ID}}}}, "columns": ["iid", "title", "project_id"]},
      "limit": 50,
      "options": {"include_debug_sql": true}
    }

# scope_kind: unauthorized
# expect_pk_pruning: true
# correctness_oracle: API row_count == 0. Positive control with an authorized user on that group returns N>0. Independent existence: Group.find_by_full_path('{{UNAUTH_GROUP_FULL_PATH}}').work_items count > 0; ClickHouse count on gl_work_item under that group's prefix > 0.
#   Emitted SQL: every gl_* alias (wi, g) AND the edge alias must carry a startsWith(traversal_path,...) filter; the group scope prefix AND auth prefixes is empty -> tiny read_rows on all aliases. Verify the edge-table scan is also pruned, not full.
out_of_scope_full_path_group:
  desc: Two-node WorkItem IN_GROUP Group scoped by a Group full_path the user is NOT authorized for. The rewrite resolves the group's prefix; the security AND with the user's auth prefixes empties it. Exercises the group-prefix path plus an edge join, ensuring the edge table's traversal_path is also ANDed down (no leak via edge join).
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "filters": {"state": "opened"}, "columns": ["iid", "title", "namespace_id"]},
        {"id": "g", "entity": "Group", "filters": {"full_path": {"op": "eq", "value": "{{UNAUTH_GROUP_FULL_PATH}}"}}}
      ],
      "relationships": [{"type": "IN_GROUP", "from": "wi", "to": "g"}],
      "limit": 50,
      "options": {"include_debug_sql": true}
    }

# scope_kind: namespace_id-project(gap)
# expect_pk_pruning: observational
# correctness_oracle: RENAMED from duplicate id 'namespace_id_project_gap' per review (was colliding with the agg-paging case). DOCUMENTED RESIDUAL GAP.
#   row_count equals the project's open work items: Project.find({{PROJECT_ID}}).work_items.opened.count and SELECT count() FROM gl_work_item FINAL WHERE namespace_id={{PROJECT_NAMESPACE_ID}} AND state='opened'.
#   KEY ASSERTION on the emitted SQL: if the rewrite treats namespace_id as a traversal-path leaf, EXPLAIN shows PK pruning to that project's prefix; if it falls back to a plain namespace_id=... column filter without a tightened prefix (the gap), read_rows will be the auth-scoped scan size. Record which path the build takes; assert correctness (count) unconditionally and record the pruning observation. expect_pk_pruning observational (true is the aspirational goal).
negsec_namespace_id_project_gap:
  desc: DOCUMENTED RESIDUAL GAP. WorkItem.namespace_id eq a value that is a PROJECT namespace's id (project_namespace_id), i.e. the leaf, not a group namespace. The leaf IS a project's traversal_path leaf, so the rewrite CAN resolve it, but this is the one case the design calls out as a gap. {{PROJECT_NAMESPACE_ID}} = projects.project_namespace_id, NOT projects.id.
  query: |
    {
      "query_type": "traversal",
      "node": {"id": "wi", "entity": "WorkItem", "filters": {"state": "opened", "namespace_id": {"op": "eq", "value": {{PROJECT_NAMESPACE_ID}}}}, "columns": ["iid", "title", "namespace_id", "project_id"]},
      "limit": 50,
      "options": {"include_debug_sql": true}
    }

# scope_kind: unknown-id
# expect_pk_pruning: true
# correctness_oracle: API returns zero rows/buckets (row_count==0). read_rows tiny (PK pruned to '0/'). EXPLAIN shows the wi alias kept table-backed (property group_by keeps the alias for SecurityPass) with startsWith(wi.traversal_path,'0/') -> ~0 granules.
#   Independent: SELECT count() FROM gl_work_item FINAL WHERE namespace_id={{UNKNOWN_ID}} == 0. Because aggregations skip Rails redaction, this proves the prefix predicate alone (not post-hoc redaction) produced the empty set.
unknown_namespace_id_group_empty:
  desc: Aggregation (WorkItem count by state) scoped by namespace_id eq a fully nonexistent id. namespace_id dict lookup misses => '0/' sentinel. For an aggregation, Layer 3 redaction cannot run, so the empty result must come purely from the prefix/security predicate. MUST return zero buckets, never a full-table grouped scan.
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "filters": {"namespace_id": {"op": "eq", "value": {{UNKNOWN_ID}}}}}
      ],
      "group_by": [{"kind": "property", "node": "wi", "property": "state", "alias": "state"}],
      "aggregations": [{"function": "count", "target": "wi", "alias": "wi_count"}],
      "aggregation_sort": {"column": "wi_count", "direction": "DESC"},
      "limit": 10,
      "options": {"include_debug_sql": true}
    }

# scope_kind: group-by-full_path
# expect_pk_pruning: true
# correctness_oracle: row_count equals the group's direct children (subgroups + projects via CONTAINS): Group.find({{GROUP_ID}}).children.count (and projects); ClickHouse count of CONTAINS edges out of the group.
#   EXPLAIN/query_log: PK pruning to the group's traversal_path prefix (scope_prefix == an auth prefix, so AND is satisfiable and tight) -> read_rows ~ subtree size, NOT the whole authorized org. Confirms the happy-path rewrite both returns correct rows and prunes (positive anchor of the negative slice).
scoped_group_full_path_neighbors_authz_and:
  desc: Neighbors of an AUTHORIZED group selected by full_path, restricted to CONTAINS edges. Positive scoping control. the rewrite resolves the group's prefix and ANDs it with the user's auth prefixes (which include it), returning the group's direct children and pruning to that subtree. Proves the rewrite does the RIGHT thing on an authorized scope.
  query: |
    {
      "query_type": "neighbors",
      "node": {"id": "g", "entity": "Group", "filters": {"full_path": {"op": "eq", "value": "{{GROUP_FULL_PATH}}"}}, "columns": ["name", "full_path"]},
      "neighbors": {"node": "g", "direction": "outgoing", "rel_types": ["CONTAINS"]},
      "limit": 50,
      "options": {"include_debug_sql": true}
    }

# scope_kind: id-in-multi
# expect_pk_pruning: true
# correctness_oracle: API rows are EXACTLY the authorized group's projects; none of the unauthorized group's projects appear. Independent: every returned project full_path is a descendant of {{GROUP_FULL_PATH}} and NONE descends from {{UNAUTH_GROUP_FULL_PATH}}.
#   Compare count to Group.find({{GROUP_ID}}).all_projects.count (direct children via CONTAINS). Positive control: an authorized-for-both user returns projects from BOTH groups.
#   EXPLAIN: only the authorized prefix survives the AND with the auth set; the unauthorized prefix is pruned to '0/'/empty -> read_rows ~ authorized subtree only. The trickiest leak vector. a partially-authorized multi-prefix list must filter element-wise, returning a correct PARTIAL result.
unauth_group_in_authorized_list_no_leak:
  desc: Multi-prefix mix where the scope list contains one AUTHORIZED group full_path and one UNAUTHORIZED group full_path (full_path IN [...]). The rewrite builds two prefixes; the security AND must keep the authorized prefix and empty the unauthorized one. Result includes only the authorized group's projects, no leak.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "p", "entity": "Project", "columns": ["name", "full_path"]},
        {"id": "g", "entity": "Group", "filters": {"full_path": {"op": "in", "value": ["{{GROUP_FULL_PATH}}", "{{UNAUTH_GROUP_FULL_PATH}}"]}}}
      ],
      "relationships": [{"type": "CONTAINS", "from": "g", "to": "p"}],
      "limit": 50,
      "options": {"include_debug_sql": true}
    }
