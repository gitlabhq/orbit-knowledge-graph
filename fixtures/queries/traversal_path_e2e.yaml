# traversal_path PK-pruning end-to-end query corpus.
#
# This corpus models the GKG feature that rewrites a project_id / group_id /
# namespace_id / full_path filter into a startsWith(traversal_path,'<prefix>')
# PRIMARY-KEY predicate (backed by a ClickHouse dictionary lookup in the
# webserver). Each entry runs a REAL Orbit query against the GDK orbit query
# API after seeding a known hierarchy, then proves traversal_path PK usage via
# ClickHouse system.query_log + EXPLAIN indexes=1.
#
# FORMAT (matches fixtures/queries/sdlc_queries.yaml):
#   <key>:
#     desc:  human-readable description
#     query: inline DSL JSON (BARE query object — NO {"query": ...} envelope)
#   plus per-entry metadata comments above each key:
#     # scope_kind:          <project-by-id | project-by-full_path | group-by-id | ...>
#     # expect_pk_pruning:   <true | false | observational>
#     # correctness_oracle:  how the harness proves the result is correct + the
#                            PK-pruning proof (EXPLAIN indexes=1 + query_log)
#
# PLACEHOLDER TOKENS ({{...}}) the harness substitutes at run time:
#   {{PROJECT_ID}}            numeric id of the primary seeded project
#   {{PROJECT_ID_2}}          numeric id of a sibling project (same parent group)
#   {{PROJECT_ID_3}}          numeric id of a third project (ideally another subgroup)
#   {{PROJECT_FULL_PATH}}     exact full_path of PROJECT_ID (no trailing slash)
#   {{PROJECT_FULL_PATH_2}}   exact full_path of PROJECT_ID_2
#   {{PROJECT_FULL_PATH_UPPER}} upper/mixed-case variant of PROJECT_FULL_PATH
#   {{PROJECT_NAMESPACE_ID}}  project_namespace_id of PROJECT_ID (the leaf ns; gap cases)
#   {{GROUP_ID}}              numeric id of the seeded top-level group (== its namespace_id)
#   {{GROUP_FULL_PATH}}       exact full_path of GROUP_ID
#   {{SUBGROUP_ID}}           numeric id of a nested subgroup under GROUP_ID
#   {{SUBGROUP_FULL_PATH}}    exact full_path of SUBGROUP_ID
#   {{USER_ID}}               numeric id of a seeded user who authored an MR in GROUP_ID
#   {{MR_NODE_ID}}            internal graph node id of a seeded MergeRequest
#   {{UNKNOWN_ID}}            an id guaranteed not to exist (e.g. max(id)+10_000_000)
#   {{UNAUTH_PROJECT_ID}}     a real project the calling test user is NOT authorized for
#   {{UNAUTH_GROUP_FULL_PATH}} a real group full_path the calling test user is NOT authorized for
#
# SCOPING FACTS encoded throughout:
#   - A project's traversal_path leaf == its project_namespace_id (NOT project.id).
#   - traversal_path format: '<org>/<root_ns>/.../<leaf_ns>/' (trailing slash).
#   - namespace_id filters where the id is a project_namespace_id are the ONE
#     documented residual gap; their expect_pk_pruning is "observational".
#   - Dict miss => '0/' sentinel => treat as unknown; MUST NOT widen scope.
#   - Authz: the security pass ANDs the user's auth prefix with the resolved scope prefix.
#
# DDL FACTS (config/graph.sql, confirmed):
#   - gl_project/gl_group/gl_work_item/gl_label/gl_milestone/gl_merge_request/
#     gl_pipeline/gl_vulnerability/gl_note all have PRIMARY KEY (traversal_path, id)
#     => startsWith(traversal_path, prefix) is PK-prunable.
#   - gl_edge PRIMARY KEY (traversal_path, relationship_kind, source_id),
#     DEFAULT traversal_path '0/' => edge scans prunable, '0/' sentinel confirmed.
#   - gl_user has NO traversal_path (global, skip-security) => org-unscoped baseline.
#   - state/severity/source are LowCardinality(String); there is NO state_id column
#     in any gl_ table. ClickHouse oracles use the STRING column 'state'
#     ('opened'/'closed'/'merged' for MR; 'opened'/'closed' for WorkItem;
#     'active'/'closed' for Milestone). state_id is used ONLY on the Rails/Postgres side.

# ===========================================================================
# SLICE 1: project
# ===========================================================================

# scope_kind: project-by-id
# expect_pk_pruning: true
# correctness_oracle: Exactly 1 row; returned id == {{PROJECT_ID}} and full_path == {{PROJECT_FULL_PATH}}.
#   ClickHouse: SELECT id, full_path FROM gl_project FINAL WHERE id = {{PROJECT_ID}}.
#   PK proof: EXPLAIN indexes=1 shows the gl_project PrimaryKey step with Keys: traversal_path,
#   granules selected << total; system.query_log read_rows bounded to the project's single granule.
proj_node_lookup_by_id:
  desc: Project node lookup by numeric id (eq). Rewrite turns id-eq into startsWith(traversal_path,'<prefix>') on the gl_project PK; without the rewrite this is a bloom-filter scan on idx_id.
  query: |
    {
      "query_type": "traversal",
      "node": {"id": "p", "entity": "Project", "columns": ["id", "name", "full_path", "visibility_level"], "filters": {"id": {"op": "eq", "value": {{PROJECT_ID}}}}},
      "limit": 1
    }

# scope_kind: project-by-full_path
# expect_pk_pruning: true
# correctness_oracle: Exactly 1 row; id == {{PROJECT_ID}}, full_path == {{PROJECT_FULL_PATH}}; must equal
#   proj_node_lookup_by_id row-for-row. ClickHouse: SELECT id, full_path FROM gl_project FINAL WHERE full_path = '{{PROJECT_FULL_PATH}}'.
#   PK proof: EXPLAIN indexes=1 shows PrimaryKey step Keys: traversal_path with few granules; read_rows bounded.
#   The dict lookup full_path -> prefix is the load-bearing piece; proves full_path resolves to the same PK prefix as id.
proj_node_lookup_by_full_path:
  desc: Project node lookup by full_path (eq). Rewrite resolves full_path -> traversal_path prefix via the graph-DB dictionary and emits startsWith(traversal_path,'<prefix>') on the PK; otherwise an idx_full_path bloom scan.
  query: |
    {
      "query_type": "traversal",
      "node": {"id": "p", "entity": "Project", "columns": ["id", "name", "full_path", "visibility_level"], "filters": {"full_path": {"op": "eq", "value": "{{PROJECT_FULL_PATH}}"}}},
      "limit": 1
    }

# scope_kind: project-by-id
# expect_pk_pruning: true
# correctness_oracle: Row count == MRs seeded in PROJECT_ID (all states). Rails: MergeRequest.where(target_project_id: {{PROJECT_ID}}).count.
#   ClickHouse: SELECT count() FROM gl_merge_request FINAL WHERE project_id = {{PROJECT_ID}}.
#   Must EXCLUDE the sibling project's MRs (proves prefix selectivity).
#   PK proof: EXPLAIN indexes=1 shows gl_merge_request and gl_edge scans pruned on the traversal_path PrimaryKey step; read_rows far below totals.
proj_id_mr_in_project_eq:
  desc: MergeRequest IN_PROJECT Project, project scoped by id (eq). The project-id filter rewrites to startsWith(traversal_path,'<prefix>') applied to gl_merge_request, gl_project and the IN_PROJECT gl_edge rows.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "columns": ["iid", "title", "state", "project_id"]},
        {"id": "p", "entity": "Project", "filters": {"id": {"op": "eq", "value": {{PROJECT_ID}}}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p"}],
      "order_by": {"node": "mr", "property": "created_at", "direction": "DESC"},
      "limit": 100
    }

# scope_kind: project-by-full_path
# expect_pk_pruning: true
# correctness_oracle: Row set byte-identical to proj_id_mr_in_project_eq (same MR iids). Rails: MergeRequest.where(target_project_id: {{PROJECT_ID}}).count.
#   ClickHouse: SELECT count() FROM gl_merge_request FINAL WHERE project_id = {{PROJECT_ID}}.
#   PK proof: EXPLAIN indexes=1 shows traversal_path PrimaryKey pruning; resolved prefix in debug SQL (options.include_debug_sql) matches the id-scoped case's prefix.
proj_full_path_mr_in_project_eq:
  desc: MergeRequest IN_PROJECT Project, project scoped by full_path (eq). Identical traversal to proj_id_mr_in_project_eq; the dict resolves full_path -> same traversal_path prefix; PK rewrite applies to all three tables.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "columns": ["iid", "title", "state", "project_id"]},
        {"id": "p", "entity": "Project", "filters": {"full_path": {"op": "eq", "value": "{{PROJECT_FULL_PATH}}"}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p"}],
      "order_by": {"node": "mr", "property": "created_at", "direction": "DESC"},
      "limit": 100
    }

# scope_kind: id-in-multi
# expect_pk_pruning: true
# correctness_oracle: Same row set as proj_id_mr_in_project_eq (single-element IN equals eq). Rails: MergeRequest.where(target_project_id: [{{PROJECT_ID}}]).count.
#   ClickHouse: SELECT count() FROM gl_merge_request FINAL WHERE project_id IN ({{PROJECT_ID}}).
#   PK proof: EXPLAIN indexes=1 shows the PrimaryKey step prunes via a single startsWith(traversal_path) condition; read_rows bounded.
proj_id_in_mr_in_project:
  desc: MergeRequest IN_PROJECT Project, project scoped by id with op 'in' (single id). Exercises the 'in' operator rewrite; single-element IN should compile to the same single-prefix PK predicate as eq.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "columns": ["iid", "title", "state", "project_id"]},
        {"id": "p", "entity": "Project", "filters": {"id": {"op": "in", "value": [{{PROJECT_ID}}]}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p"}],
      "limit": 100
    }

# scope_kind: id-in-multi
# expect_pk_pruning: false
# correctness_oracle: Per-project row sets must match each project's MRs; together they equal the union of PROJECT_ID and PROJECT_ID_2 MRs and exclude all other projects.
#   ClickHouse: for each id, SELECT count() FROM gl_merge_request FINAL WHERE project_id = <id>; sum equals returned row count.
#   Rails: MergeRequest.where(target_project_id: [{{PROJECT_ID}},{{PROJECT_ID_2}}]).count.
#   PK note: multi-value `id IN [..]` is OUTSIDE the optimization's single-value scope (scope_keys resolves a single id/full_path or a single node_id; eq_value returns None for an `in` op), so NO startsWith(traversal_path) prefix is injected -- scoping is by the id-set under the broad authz prefix only. Verified empty against query_log 2026-06-04. An OR-of-prefixes form for `in` is a possible future enhancement, not current behavior.
proj_id_in2_mr_or_of_prefixes:
  desc: TWO-element project_id IN across two sibling projects, asserting the OR-of-startsWith multi-prefix PK predicate in the clean project slice (the positive OR-of-prefixes proof).
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "columns": ["iid", "title", "state", "project_id"]},
        {"id": "p", "entity": "Project", "filters": {"id": {"op": "in", "value": [{{PROJECT_ID}}, {{PROJECT_ID_2}}]}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p"}],
      "limit": 100
    }

# scope_kind: project-by-id
# expect_pk_pruning: true
# correctness_oracle: Row count == project-level work items (issues) seeded in PROJECT_ID. Rails: WorkItem.where(project_id: {{PROJECT_ID}}).count.
#   ClickHouse: SELECT count() FROM gl_work_item FINAL WHERE project_id = {{PROJECT_ID}}.
#   PK proof: EXPLAIN indexes=1 shows gl_work_item PrimaryKey pruning on traversal_path; read_rows << gl_work_item total.
#   Only project-scoped work items are reachable through IN_PROJECT; group-level WorkItems attach via IN_GROUP.
proj_id_workitem_in_project_eq:
  desc: WorkItem IN_PROJECT Project, project scoped by id (eq). gl_work_item PK is (traversal_path, id); the project-id rewrite prunes the WorkItem scan on the PK.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "columns": ["iid", "title", "state", "work_item_type"]},
        {"id": "p", "entity": "Project", "filters": {"id": {"op": "eq", "value": {{PROJECT_ID}}}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "wi", "to": "p"}],
      "limit": 100
    }

# scope_kind: project-by-id
# expect_pk_pruning: true
# correctness_oracle: Row count == pipelines seeded in PROJECT_ID (IN_PROJECT applies no source filter; parent+child pipelines both count).
#   Rails: Ci::Pipeline.where(project_id: {{PROJECT_ID}}).count. ClickHouse: SELECT count() FROM gl_pipeline FINAL WHERE project_id = {{PROJECT_ID}}.
#   PK proof: EXPLAIN indexes=1 shows gl_pipeline PrimaryKey pruning on traversal_path; read_rows bounded.
#   If pipelines are hard to seed, zero rows is still valid for proving the scan is PK-pruned.
proj_id_pipeline_in_project_eq:
  desc: Pipeline IN_PROJECT Project, project scoped by id (eq). gl_pipeline PK is (traversal_path, id); the project-id rewrite prunes the pipeline scan on the PK.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "pipe", "entity": "Pipeline", "columns": ["id", "status", "source", "ref", "created_at"]},
        {"id": "p", "entity": "Project", "filters": {"id": {"op": "eq", "value": {{PROJECT_ID}}}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "pipe", "to": "p"}],
      "order_by": {"node": "pipe", "property": "created_at", "direction": "DESC"},
      "limit": 100
    }

# scope_kind: project-by-full_path
# expect_pk_pruning: true
# correctness_oracle: [ADDED missing_case] Row count == pipelines in PROJECT_ID whose source == 'merge_request_event'.
#   Rails: Ci::Pipeline.where(project_id: {{PROJECT_ID}}, source: :merge_request_event).count.
#   ClickHouse: SELECT count() FROM gl_pipeline FINAL WHERE project_id = {{PROJECT_ID}} AND source = 'merge_request_event'.
#   PK proof: EXPLAIN indexes=1 shows gl_pipeline PrimaryKey pruning on traversal_path PLUS the idx_source skip-index narrowing source; read_rows bounded. Proves prefix + column-filter interaction. If no MR-event pipelines seeded, zero rows still proves the scan is PK-pruned.
proj_full_path_pipeline_source_filter:
  desc: Pipeline IN_PROJECT scoped by project full_path WITH the canonical source='merge_request_event' filter (per recipes.md). Gives Pipeline a full_path-scoped case plus a column-filter-plus-prefix interaction.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "pipe", "entity": "Pipeline", "columns": ["id", "status", "source", "ref"], "filters": {"source": {"op": "eq", "value": "merge_request_event"}}},
        {"id": "p", "entity": "Project", "filters": {"full_path": {"op": "eq", "value": "{{PROJECT_FULL_PATH}}"}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "pipe", "to": "p"}],
      "limit": 100
    }

# scope_kind: project-by-id
# expect_pk_pruning: true
# correctness_oracle: Row count == vulnerabilities seeded in PROJECT_ID. Rails: Vulnerability.where(project_id: {{PROJECT_ID}}).count.
#   ClickHouse: SELECT count() FROM gl_vulnerability FINAL WHERE project_id = {{PROJECT_ID}}.
#   PK proof: EXPLAIN indexes=1 shows gl_vulnerability PrimaryKey pruning on traversal_path; read_rows bounded.
#   Authz: compiled SQL must AND the scope prefix with the user's auth prefix (debug SQL shows two startsWith conjuncts or the resolved intersection). Zero rows acceptable if vulns are hard to seed.
proj_id_vuln_in_project_eq:
  desc: Vulnerability IN_PROJECT Project, project scoped by id (eq). gl_vulnerability PK is (traversal_path, id); the project-id rewrite prunes the vuln scan on the PK. Also exercises the security pass ANDing the user's auth prefix with the resolved scope prefix.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "v", "entity": "Vulnerability", "columns": ["id", "severity", "state", "report_type"]},
        {"id": "p", "entity": "Project", "filters": {"id": {"op": "eq", "value": {{PROJECT_ID}}}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "v", "to": "p"}],
      "limit": 100
    }

# scope_kind: project-by-id
# expect_pk_pruning: true
# correctness_oracle: [ADDED missing_case] Note is a core scoped entity (gl_note PK (traversal_path,id), IN_PROJECT + AUTHORED edges, named canonical in the agg-scope error) yet had zero coverage.
#   Row count == notes seeded in PROJECT_ID. Rails: Note.where(project_id: {{PROJECT_ID}}).count.
#   ClickHouse: SELECT count() FROM gl_note FINAL WHERE project_id = {{PROJECT_ID}}.
#   PK proof: EXPLAIN indexes=1 shows gl_note PrimaryKey pruning on traversal_path; read_rows << gl_note total.
note_in_project_id:
  desc: Note IN_PROJECT Project scoped by id. Proves the rewrite prunes gl_note on its PK; Note is a core scoped entity with no prior coverage.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "n", "entity": "Note", "columns": ["id", "note", "author_id"]},
        {"id": "p", "entity": "Project", "filters": {"id": {"op": "eq", "value": {{PROJECT_ID}}}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "n", "to": "p"}],
      "limit": 100
    }

# scope_kind: project-by-id
# expect_pk_pruning: true
# correctness_oracle: One bucket per state present in PROJECT_ID; per-state mr_count matches Rails: MergeRequest.where(target_project_id: {{PROJECT_ID}}).group(:state_id).count (map 1->opened,2->closed,3->merged).
#   ClickHouse: SELECT state, count() FROM gl_merge_request FINAL WHERE project_id = {{PROJECT_ID}} GROUP BY state.
#   Sum of buckets == proj_id_mr_in_project_eq row count. PK proof: EXPLAIN indexes=1 shows traversal_path PrimaryKey pruning; read_rows bounded. Sibling MRs must not leak into buckets.
proj_id_mr_count_by_state_agg:
  desc: Aggregation. Count MergeRequests by state within PROJECT_ID (scoped by id). group_by mr.state, count(mr). The project-id filter rewrites to startsWith(traversal_path,'<prefix>') and prunes the gl_merge_request scan feeding the aggregate.
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": {"op": "in", "value": ["opened", "closed", "merged"]}}},
        {"id": "p", "entity": "Project", "filters": {"id": {"op": "eq", "value": {{PROJECT_ID}}}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p"}],
      "group_by": [{"kind": "property", "node": "mr", "property": "state", "alias": "mr_state"}],
      "aggregations": [{"function": "count", "target": "mr", "alias": "mr_count"}],
      "aggregation_sort": {"column": "mr_count", "direction": "DESC"},
      "limit": 10
    }

# scope_kind: project-by-full_path
# expect_pk_pruning: true
# correctness_oracle: Bucket set identical to proj_id_mr_count_by_state_agg (same per-state mr_count).
#   ClickHouse: SELECT state, count() FROM gl_merge_request FINAL WHERE project_id = {{PROJECT_ID}} GROUP BY state.
#   PK proof: EXPLAIN indexes=1 shows traversal_path PrimaryKey pruning; debug SQL prefix matches the id-scoped aggregate's prefix.
proj_full_path_mr_count_by_state_agg:
  desc: Aggregation. Count MergeRequests by state within the project, scoped by full_path (eq). Same aggregate as proj_id_mr_count_by_state_agg but addressed by full_path; dict resolves full_path -> same prefix and prunes on the PK.
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": {"op": "in", "value": ["opened", "closed", "merged"]}}},
        {"id": "p", "entity": "Project", "filters": {"full_path": {"op": "eq", "value": "{{PROJECT_FULL_PATH}}"}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p"}],
      "group_by": [{"kind": "property", "node": "mr", "property": "state", "alias": "mr_state"}],
      "aggregations": [{"function": "count", "target": "mr", "alias": "mr_count"}],
      "aggregation_sort": {"column": "mr_count", "direction": "DESC"},
      "limit": 10
    }

# scope_kind: unknown-id
# expect_pk_pruning: true
# correctness_oracle: Exactly 0 rows; must NOT return MRs from any other project (no widening).
#   ClickHouse: SELECT count() FROM gl_project FINAL WHERE id = {{UNKNOWN_ID}} returns 0.
#   PK proof: EXPLAIN indexes=1 shows the PrimaryKey step prunes to zero granules for the '0/' prefix; read_rows ~ 0 for gl_merge_request.
#   CRITICAL: read_rows must NOT equal the full table count (which would indicate the filter was dropped and scope widened).
proj_unknown_id_mr_in_project:
  desc: Negative/guard. MergeRequest IN_PROJECT Project where the project id is nonexistent. Dict misses, resolves to '0/', scope must be treated as unknown (empty), NOT widened. Proves the rewrite fails closed.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "columns": ["iid", "title", "state", "project_id"]},
        {"id": "p", "entity": "Project", "filters": {"id": {"op": "eq", "value": {{UNKNOWN_ID}}}}}
      ],
      "relationships": [{"type": "IN_PROJECT", "from": "mr", "to": "p"}],
      "limit": 100
    }

# ===========================================================================
# SLICE 2: group-and-subgroup-scoped
# ===========================================================================

# scope_kind: group-by-id
# expect_pk_pruning: true
# correctness_oracle: Rails: WorkItem.where(namespace_id: <group_namespace_id>, state_id: 1).count restricted to the group namespace.
#   ClickHouse: SELECT count() FROM gl_work_item FINAL WHERE startsWith(traversal_path, '<group_prefix>') AND state = 'opened'. Counts must match and EXCLUDE the sibling group's work items.
#   PK proof: read_rows / EXPLAIN indexes=1 shows granules selected << total gl_work_item; the PrimaryKey index condition references startsWith(traversal_path, ...). Group prefix = the group's own traversal_path.
grp_id_workitem_in_group:
  desc: WorkItems IN_GROUP a top-level group, scoped by Group id. Resolver looks up the group's traversal_path via the dictionary and rewrites the Group node_ids filter into startsWith(traversal_path,'<group_prefix>') on the WorkItem PK.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "filters": {"state": "opened"}, "columns": ["id", "iid", "title", "state", "namespace_id"]},
        {"id": "g", "entity": "Group", "node_ids": [{{GROUP_ID}}]}
      ],
      "relationships": [{"type": "IN_GROUP", "from": "wi", "to": "g"}],
      "limit": 50,
      "order_by": {"node": "wi", "property": "created_at", "direction": "DESC"}
    }

# scope_kind: group-by-full_path
# expect_pk_pruning: true
# correctness_oracle: Row set MUST equal grp_id_workitem_in_group byte-for-byte (same group, two resolution paths).
#   ClickHouse: SELECT id FROM gl_group FINAL WHERE full_path='{{GROUP_FULL_PATH}}' returns {{GROUP_ID}}; SELECT count() FROM gl_work_item FINAL WHERE startsWith(traversal_path,'<group_prefix>') AND state='opened' equals the id-scoped count.
#   Both runs must produce the same resolved startsWith prefix in EXPLAIN and the same read_rows in query_log.
grp_fullpath_workitem_in_group:
  desc: Same WorkItem IN_GROUP query but scoped by Group full_path instead of id. Proves the full_path -> traversal_path resolution yields the identical PK prefix predicate as the id path.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "filters": {"state": "opened"}, "columns": ["id", "iid", "title", "state", "namespace_id"]},
        {"id": "g", "entity": "Group", "filters": {"full_path": {"op": "eq", "value": "{{GROUP_FULL_PATH}}"}}}
      ],
      "relationships": [{"type": "IN_GROUP", "from": "wi", "to": "g"}],
      "limit": 50,
      "order_by": {"node": "wi", "property": "created_at", "direction": "DESC"}
    }

# scope_kind: group-by-id
# expect_pk_pruning: true
# correctness_oracle: Rails: Label.where(group_id: {{GROUP_ID}}).count (group labels only).
#   ClickHouse: SELECT count() FROM gl_label FINAL WHERE startsWith(traversal_path,'<group_prefix>') AND group_id={{GROUP_ID}}. Must match and exclude sibling-group labels.
#   IN_GROUP for Label uses fk_column group_id. PK prune on gl_label granules via startsWith(traversal_path, '<group_prefix>').
grp_id_label_in_group:
  desc: Group-level Labels IN_GROUP a top-level group, scoped by Group id. Label is a distinct entity table (gl_label) keyed on (traversal_path, id); confirms the rewrite applies per-entity, not just to WorkItem.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "lbl", "entity": "Label", "columns": ["id", "title", "color", "group_id"]},
        {"id": "g", "entity": "Group", "node_ids": [{{GROUP_ID}}]}
      ],
      "relationships": [{"type": "IN_GROUP", "from": "lbl", "to": "g"}],
      "limit": 50
    }

# scope_kind: group-by-id
# expect_pk_pruning: true
# correctness_oracle: Rails: Milestone.where(group_id: {{GROUP_ID}}, state: 'active').count.
#   ClickHouse: SELECT count() FROM gl_milestone FINAL WHERE startsWith(traversal_path,'<group_prefix>') AND group_id={{GROUP_ID}} AND state='active'. Must match and exclude sibling-group milestones.
#   Milestone state values are 'active'/'closed'. PK prune on gl_milestone granules.
grp_id_milestone_in_group:
  desc: Group milestones IN_GROUP a top-level group, scoped by Group id. Third distinct IN_GROUP entity (gl_milestone) to show the rewrite is entity-agnostic across the plan domain.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "m", "entity": "Milestone", "filters": {"state": "active"}, "columns": ["id", "iid", "title", "state", "group_id"]},
        {"id": "g", "entity": "Group", "node_ids": [{{GROUP_ID}}]}
      ],
      "relationships": [{"type": "IN_GROUP", "from": "m", "to": "g"}],
      "limit": 50
    }

# scope_kind: group-by-id
# expect_pk_pruning: true
# correctness_oracle: [ADDED missing_case] Group-level Milestone aggregation by state. Milestone state values are 'active'/'closed'.
#   ClickHouse: SELECT state, count() FROM gl_milestone FINAL WHERE startsWith(traversal_path,'<group_prefix>') AND group_id={{GROUP_ID}} AND state IN ('active','closed') GROUP BY state.
#   Rails: Milestone.where(group_id: {{GROUP_ID}}).group(:state).count. Buckets match and exclude sibling group.
#   PK proof: EXPLAIN indexes=1 shows gl_milestone PrimaryKey pruning; read_rows bounded. Confirms IN_GROUP fk=group_id pruning under aggregation.
grp_id_milestone_count_by_state_agg:
  desc: Group-level Milestone aggregation by state scoped by Group id. Adds the aggregation path for Milestone with its correct string state values (active/closed) and confirms IN_GROUP fk=group_id pruning under aggregation.
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "m", "entity": "Milestone", "filters": {"state": {"op": "in", "value": ["active", "closed"]}}},
        {"id": "g", "entity": "Group", "node_ids": [{{GROUP_ID}}]}
      ],
      "relationships": [{"type": "IN_GROUP", "from": "m", "to": "g"}],
      "group_by": [{"kind": "property", "node": "m", "property": "state", "alias": "ms_state"}],
      "aggregations": [{"function": "count", "target": "m", "alias": "ms_count"}],
      "aggregation_sort": {"column": "ms_count", "direction": "DESC"},
      "limit": 10
    }

# scope_kind: group-by-id
# expect_pk_pruning: observational
# correctness_oracle: Rails: Project.where('traversal_ids @> ARRAY[?]', <group_namespace>).pluck(:id) -> project ids; MergeRequest.where(project_id: those, state: 'opened').count.
#   ClickHouse: SELECT count() FROM gl_merge_request FINAL WHERE startsWith(traversal_path,'<group_prefix>') AND state='opened'. Must match and exclude sibling-group MRs.
#   PK note: the tight group prefix is injected on the SCOPED Group node's scan only (design: "on the scoped node"); it is NOT propagated to the MR/Project payload scans, which run under the broad authz prefix. Also CONTAINS is single-hop (Group->Project direct edge, distinct from Group->Subgroup), so this query reaches only the group's DIRECT child projects -- on data where MRs live under subgroup projects it returns 0 rows. Payload pruning + transitive CONTAINS are not current behavior.
grp_id_mr_in_project_contains:
  desc: MergeRequests in projects under a top-level group. Group CONTAINS Project, MergeRequest IN_PROJECT Project, scoped by Group id. Tests transitive scoping. the group prefix covers every project's subtree.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": "opened"}, "columns": ["id", "iid", "title", "state", "project_id"]},
        {"id": "p", "entity": "Project"},
        {"id": "g", "entity": "Group", "node_ids": [{{GROUP_ID}}]}
      ],
      "relationships": [
        {"type": "IN_PROJECT", "from": "mr", "to": "p"},
        {"type": "CONTAINS", "from": "g", "to": "p"}
      ],
      "limit": 50,
      "order_by": {"node": "mr", "property": "created_at", "direction": "DESC"}
    }

# scope_kind: group-by-id
# expect_pk_pruning: true
# correctness_oracle: MOTIVATING. Rails: group=Group.find({{GROUP_ID}}); MergeRequest.of_projects(group.all_projects).where(state_id: [1,2,3]).group(:project_id).count.
#   ClickHouse total: SELECT count() FROM gl_merge_request FINAL WHERE startsWith(traversal_path,'<group_prefix>') AND state IN ('opened','closed','merged'). Sum of API per-project mr_count equals that total; excludes sibling-group MRs.
#   PK proof: read_rows for this query << read_rows for the same query with the prefix predicate removed (run the unpruned variant once for baseline). EXPLAIN indexes=1 lists startsWith(traversal_path,'<group_prefix>') under the PrimaryKey index with granules <<.
grp_id_count_mrs_aggregation_MOTIVATING:
  desc: MOTIVATING CASE. COUNT all merge requests across an entire top-level group (aggregation), scoped by Group id. Group CONTAINS Project, MR IN_PROJECT Project, grouped by project. The headline whole-group MR rollup the PK-pruning feature exists to make fast.
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": {"op": "in", "value": ["opened", "closed", "merged"]}}},
        {"id": "p", "entity": "Project"},
        {"id": "g", "entity": "Group", "node_ids": [{{GROUP_ID}}]}
      ],
      "relationships": [
        {"type": "IN_PROJECT", "from": "mr", "to": "p"},
        {"type": "CONTAINS", "from": "g", "to": "p"}
      ],
      "group_by": [{"kind": "node", "node": "p"}],
      "aggregations": [{"function": "count", "target": "mr", "alias": "mr_count"}],
      "aggregation_sort": {"column": "mr_count", "direction": "DESC"},
      "limit": 50
    }

# scope_kind: subgroup
# expect_pk_pruning: true
# correctness_oracle: ClickHouse: resolved subgroup prefix '<group_prefix><subgroup_ns>/' must be a strict prefix-extension of the parent group prefix (assert subgroup_prefix LIKE parent_prefix || '%' AND subgroup_prefix != parent_prefix).
#   SELECT count() FROM gl_merge_request FINAL WHERE startsWith(traversal_path,'<subgroup_prefix>') AND state IN (...) must equal the API total AND be < the parent-group total from grp_id_count_mrs_aggregation_MOTIVATING.
#   Rails: Group.find({{SUBGROUP_ID}}).all_projects then MergeRequest.of_projects(...).where(state_id:[1,2,3]).count. Subtree containment proof: subgroup granules subset of parent granules.
subgrp_id_count_mrs_aggregation_deeper_prefix:
  desc: COUNT merge requests across a nested SUBGROUP only, scoped by subgroup id. Same motivating aggregation but the resolved prefix is a strict EXTENSION of the parent group's prefix, so it prunes to a deeper, smaller traversal_path subtree.
  query: |
    {
      "query_type": "aggregation",
      "nodes": [
        {"id": "mr", "entity": "MergeRequest", "filters": {"state": {"op": "in", "value": ["opened", "closed", "merged"]}}},
        {"id": "p", "entity": "Project"},
        {"id": "g", "entity": "Group", "node_ids": [{{SUBGROUP_ID}}]}
      ],
      "relationships": [
        {"type": "IN_PROJECT", "from": "mr", "to": "p"},
        {"type": "CONTAINS", "from": "g", "to": "p"}
      ],
      "group_by": [{"kind": "node", "node": "p"}],
      "aggregations": [{"function": "count", "target": "mr", "alias": "mr_count"}],
      "aggregation_sort": {"column": "mr_count", "direction": "DESC"},
      "limit": 50
    }

# scope_kind: subgroup
# expect_pk_pruning: true
# correctness_oracle: ClickHouse: subgroup_id = SELECT id FROM gl_group FINAL WHERE full_path='{{SUBGROUP_FULL_PATH}}'; SELECT count() FROM gl_work_item FINAL WHERE startsWith(traversal_path,'<subgroup_prefix>') AND state='opened'.
#   Must equal Rails WorkItem.where(namespace_id: subgroup_id, state_id: 1).count. Assert the parent group's group-level work items (namespace_id = parent) are NOT in the result, proving the deeper prefix is strict.
#   IN_GROUP WorkItem->Group fk_column is namespace_id. Subgroup prefix is parent_prefix + subgroup namespace segment.
subgrp_fullpath_workitem_in_group:
  desc: WorkItems IN_GROUP a nested subgroup, scoped by subgroup full_path. Confirms full_path resolution on a non-root namespace yields the deeper prefix and excludes work items that belong to the parent group but not the subgroup.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "filters": {"state": "opened"}, "columns": ["id", "iid", "title", "state", "namespace_id"]},
        {"id": "g", "entity": "Group", "filters": {"full_path": {"op": "eq", "value": "{{SUBGROUP_FULL_PATH}}"}}}
      ],
      "relationships": [{"type": "IN_GROUP", "from": "wi", "to": "g"}],
      "limit": 50
    }

# scope_kind: group-by-id
# expect_pk_pruning: true
# correctness_oracle: [ADDED missing_case] Transitive subgroup descent via Group CONTAINS Group (max_hops 2) then WorkItem IN_GROUP that subgroup, scoped by the TOP group id.
#   ClickHouse: SELECT count() FROM gl_work_item FINAL WHERE startsWith(traversal_path,'<top_group_prefix>') AND state='opened' AND namespace_id IN (<descendant subgroup ns ids>).
#   Rails: WorkItem.where(namespace_id: Group.find({{GROUP_ID}}).self_and_descendants.where.not(id: {{GROUP_ID}}).pluck(:id), state_id: 1).count.
#   PK proof: the top-group prefix still prunes across a Group->Group hop; EXPLAIN indexes=1 shows startsWith(traversal_path,'<top_group_prefix>') on gl_work_item and gl_edge. Exercises the only multi-hop CONTAINS path (max_hops>1).
subgrp_id_workitem_transitive_contains:
  desc: Transitive subgroup descent. Group CONTAINS Group (max_hops 2) down to a nested subgroup, then WorkItem IN_GROUP that subgroup, scoped by the TOP group id. Proves the top-group prefix still prunes across a Group->Group hop.
  query: |
    {
      "query_type": "traversal",
      "nodes": [
        {"id": "wi", "entity": "WorkItem", "filters": {"state": "opened"}, "columns": ["id", "iid", "title", "namespace_id"]},
        {"id": "sub", "entity": "Group"},
        {"id": "g", "entity": "Group", "node_ids": [{{GROUP_ID}}]}
      ],
      "relationships": [
        {"type": "IN_GROUP", "from": "wi", "to": "sub"},
        {"type": "CONTAINS", "from": "g", "to": "sub", "min_hops": 1, "max_hops": 2}
      ],
      "limit": 50
    }

# scope_kind: group-by-id
# expect_pk_pruning: true
# correctness_oracle: [ADDED missing_case] Whole-group Vulnerability aggregation grouped by severity, scoped by Group id via CONTAINS+IN_PROJECT.
#   ClickHouse: SELECT severity, count() FROM gl_vulnerability FINAL WHERE startsWith(traversal_path,'<group_prefix>') AND state IN ('detected','confirmed') GROUP BY severity.
