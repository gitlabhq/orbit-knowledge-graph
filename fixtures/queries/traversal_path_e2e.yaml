# scope_kind: namespace_id-project(gap)
# expect_pk_pruning: observational
# correctness_oracle: RELABELED per review. this scopes via Project.full_path (the SAFE path), so it is a normal project-by-full_path positive, NOT the documented gap.
#   Correctness: SELECT count() FROM gl_merge_request FINAL WHERE startsWith(traversal_path, (SELECT traversal_path FROM gl_project FINAL WHERE full_path='{{PROJECT_FULL_PATH}}')) AND state='opened' must equal Rails MergeRequest.where(project_id: {{PROJECT_ID}}, state_id: 1).count.
