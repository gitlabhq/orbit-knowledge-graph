# yaml-language-server: $schema=../ontology.schema.json
type: edge
description: Authorship relationship between users and entities.
variants:
  - from_node: { type: User, id: id }
    to_node: { type: Note, id: id }
    meaning: "User authored note."
    status: pending
    internal:
      sources:
        [
          { system: postgres, database: main, table: notes, from_column: author_id, to_column: id },
          { system: clickhouse, table: null },
        ]
  - from_node: { type: User, id: id }
    to_node: { type: MergeRequest, id: id }
    meaning: "User authored merge request."
