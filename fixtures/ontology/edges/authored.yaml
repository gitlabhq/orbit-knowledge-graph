          { system: postgres, database: main, table: merge_requests, from_column: author_id, to_column: id },
          { system: clickhouse, table: null },
        ]
  - from_node: { type: User, id: id }
    to_node: { type: Vulnerability, id: id }
    meaning: "User reported vulnerability."
    status: pending
    internal:
      sources:
        [
          { system: postgres, database: main, table: vulnerabilities, from_column: author_id, to_column: id },
          { system: clickhouse, table: null },
        ]
  - from_node: { type: User, id: id }
    to_node: { type: WorkItem, id: id }
    meaning: "User authored work item."
