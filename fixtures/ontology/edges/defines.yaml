# yaml-language-server: $schema=../ontology.schema.json
type: edge
description: Definition relationships in source code.
variants:
  - from_node: { type: File, id: id }
    to_node: { type: Definition, id: id }
    meaning: "File defines a code definition (class, function, etc.)."
    status: pending
    internal:
      sources:
        [
          { system: code_indexer, relationship: FILE_DEFINES, from_table: FileNode, to_table: DefinitionNode },
        ]
  - from_node: { type: Definition, id: id }
    to_node: { type: Definition, id: id }
    meaning: "Definition contains or calls another definition (inheritance, composition, method calls)."
    status: pending
    internal:
      sources:
        [
          { system: code_indexer, relationship: DEFINES_DEFINITION, from_table: DefinitionNode, to_table: DefinitionNode },
        ]
  - from_node: { type: Definition, id: id }
    to_node: { type: ImportedSymbol, id: id }
    meaning: "Definition exports or is source of an imported symbol."
    status: pending
    internal:
      sources:
        [
          { system: code_indexer, relationship: DEFINES_IMPORTED_SYMBOL, from_table: DefinitionNode, to_table: ImportedSymbolNode },
        ]
