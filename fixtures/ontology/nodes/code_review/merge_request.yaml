# fixtures/ontology/nodes/code_review/merge_request.yaml

node_type: MergeRequest
domain: code_review
description: A merge request for code review and merging changes into a target branch
destination_table: gl_merge_request

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the merge request."

  iid:
    type: int64
    source: iid
    nullable: true
    description: "Project-scoped merge request number."

  full_path:
    type: string
    source: path
    nullable: true
    description: "Full path to the merge request (e.g., gitlab-org/gitlab/-/merge_requests/123)."

  title:
    type: string
    source: title
    nullable: true
    description: "Title of the merge request."

  description:
    type: string
    source: description
    nullable: true
    description: "Description body (markdown)."

  source_branch:
    type: string
    source: source_branch
    nullable: false
    description: "Name of the source branch."

  target_branch:
    type: string
    source: target_branch
    nullable: false
    description: "Name of the target branch."

  state:
    type: enum
    source: state_id
    nullable: false
    description: "Current state of the merge request."
    values:
      1: opened
      2: closed
      3: merged
      4: locked

  merge_status:
    type: enum
    source: merge_status
    nullable: false
    description: "Mergeability check status."
    values:
      0: unchecked
      1: preparing
      2: checking
      3: can_be_merged
      4: cannot_be_merged
      5: cannot_be_merged_recheck
      6: cannot_be_merged_rechecking

  draft:
    type: boolean
    source: draft
    nullable: false
    description: "Whether this is a draft/WIP merge request."

  squash:
    type: boolean
    source: squash
    nullable: false
    description: "Whether to squash commits on merge."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Timestamp when the merge request was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Timestamp when the merge request was last updated."

  merge_commit_sha:
    type: string
    source: merge_commit_sha
    nullable: true
    description: "SHA of the merge commit."

  discussion_locked:
    type: boolean
    source: discussion_locked
    nullable: true
    description: "Whether discussions are locked."

  prepared_at:
    type: timestamp
    source: prepared_at
    nullable: true
    description: "Timestamp when the merge request was prepared."

