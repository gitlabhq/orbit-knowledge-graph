# fixtures/ontology/nodes/ci/job.yaml

node_type: Job
domain: ci
description: A CI/CD job that executes scripts within a pipeline stage
destination_table: gl_job
redaction: null  # TODO: configure redaction

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the job."

  name:
    type: string
    source: name
    nullable: true
    description: "Name of the job as defined in .gitlab-ci.yml."

  status:
    type: string
    source: status
    nullable: false
    description: "Current execution status of the job."
    values:
      0: created
      1: pending
      2: running
      3: success
      4: failed
      5: canceled
      6: skipped
      7: manual
      8: scheduled
      9: preparing
      10: waiting_for_resource
      11: waiting_for_callback
      12: canceling

  ref:
    type: string
    source: ref
    nullable: true
    description: "Branch or tag name the job runs for."

  tag:
    type: boolean
    source: tag
    nullable: true
    description: "Whether this job runs on a git tag."

  allow_failure:
    type: boolean
    source: allow_failure
    nullable: false
    description: "Whether job failure is allowed without failing the pipeline."

  coverage:
    type: string
    source: coverage
    nullable: true
    description: "Code coverage percentage reported by the job."

  environment:
    type: string
    source: environment
    nullable: true
    description: "Deployment environment name (e.g., production, staging)."

  when:
    type: string
    source: when
    nullable: true
    description: "Condition that determines when the job runs."
    values:
      0: on_success
      1: on_failure
      2: always
      3: manual
      4: delayed
      5: never

  retried:
    type: boolean
    source: retried
    nullable: true
    description: "Whether this job was retried (superseded by a newer attempt)."

  failure_reason:
    type: enum
    source: failure_reason
    nullable: true
    description: "Reason the job failed, if applicable."
    values:
      0: unknown_failure
      1: script_failure
      2: api_failure
      3: stuck_or_timeout_failure
      4: runner_system_failure
      5: missing_dependency_failure
      6: runner_unsupported
      7: stale_schedule
      8: job_execution_timeout
      9: archived_failure
      10: unmet_prerequisites
      11: scheduler_failure
      12: data_integrity_failure
      13: forward_deployment_failure
      14: user_blocked
      15: project_deleted
      16: ci_quota_exceeded
      17: pipeline_loop_detected
      18: no_matching_runner
      19: trace_size_exceeded
      20: builds_disabled
      21: environment_creation_failure
      22: deployment_rejected
      23: failed_outdated_deployment_job
      24: protected_environment_failure
      25: insufficient_bridge_permissions
      26: downstream_bridge_project_not_found
      27: invalid_bridge_trigger
      28: upstream_bridge_project_not_found

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Timestamp when the job was created."

  started_at:
    type: timestamp
    source: started_at
    nullable: true
    description: "Timestamp when the job started executing."

  finished_at:
    type: timestamp
    source: finished_at
    nullable: true
    description: "Timestamp when the job finished executing."

  queued_at:
    type: timestamp
    source: queued_at
    nullable: true
    description: "Timestamp when the job was queued for execution."

etl:
  type: table
  scope: namespaced
  source: siphon_p_ci_builds
  watermark: _siphon_replicated_at
  deleted: _siphon_deleted
  edges:
    project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing
    stage_id:
      to: Stage
      as: HAS_JOB
      direction: incoming
    user_id:
      to: User
      as: TRIGGERED
      direction: incoming
