# yaml-language-server: $schema=../../ontology.schema.json
type: node
domain: source_code
description: A code definition such as a class, function, method, or module.
properties:
  id:
    type: int64
    description: "Internal identifier for the definition node."
    status: pending
    internal:
      sources:
        [
          { system: code_indexer, table: DefinitionNode, column: id },
        ]
  fqn:
    type: string
    description: "Fully qualified name of the definition (e.g., MyModule::MyClass#my_method)."
    status: pending
    internal:
      sources:
        [
          { system: code_indexer, table: DefinitionNode, column: fqn },
        ]
  name:
    type: string
    description: "Short name of the definition."
    status: pending
    internal:
      sources:
        [
          { system: code_indexer, table: DefinitionNode, column: name },
        ]
  definition_type:
    type: enum
    values: [class, module, method, function, variable, constant, interface, struct, enum, trait, type_alias]
    description: "Type of code definition."
    status: pending
    internal:
      sources:
        [
          { system: code_indexer, table: DefinitionNode, column: definition_type },
        ]
  file_path:
    type: string
    nullable: true
    description: "Primary file path where the definition is located."
    status: pending
    internal:
      sources:
        [
          { system: code_indexer, table: DefinitionNode, column: primary_file_path },
        ]
additional_properties:
  start_line:
    type: int64
    nullable: true
    description: "Starting line number of the definition."
    status: pending
    internal:
      sources:
        [
          { system: code_indexer, table: DefinitionNode, column: start_line },
        ]
  end_line:
    type: int64
    nullable: true
    description: "Ending line number of the definition."
    status: pending
    internal:
      sources:
        [
          { system: code_indexer, table: DefinitionNode, column: end_line },
        ]
  start_col:
    type: int64
    nullable: true
    description: "Starting column of the definition."
    status: pending
    internal:
      sources:
        [
          { system: code_indexer, table: DefinitionNode, column: start_col },
        ]
  end_col:
    type: int64
    nullable: true
    description: "Ending column of the definition."
    status: pending
    internal:
      sources:
        [
          { system: code_indexer, table: DefinitionNode, column: end_col },
        ]
  total_locations:
    type: int64
    nullable: true
    description: "Number of locations where this definition appears (for partial classes, etc.)."
    status: pending
    internal:
      sources:
        [
          { system: code_indexer, table: DefinitionNode, column: total_locations },
        ]
