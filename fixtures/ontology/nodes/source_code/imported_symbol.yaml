# fixtures/ontology/nodes/source_code/imported_symbol.yaml

node_type: ImportedSymbol
domain: source_code
description: An imported symbol or module reference within a source file
label: name
destination_table: gl_imported_symbol

style:
  size: 22
  color: "#5EEAD4"

redaction:
  resource_type: projects
  id_column: project_id
  ability: read_code

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Internal identifier for the imported symbol node."

  name:
    type: string
    source: name
    nullable: false
    description: "Name of the imported symbol."

  import_path:
    type: string
    source: import_path
    nullable: true
    description: "Path or module from which the symbol is imported."

  import_type:
    type: enum
    source: import_type
    nullable: false
    description: "Type of import statement."
    values:
      0: module
      1: symbol
      2: wildcard
      3: default
      4: namespace
      5: relative
      6: absolute

  alias:
    type: string
    source: alias
    nullable: true
    description: "Alias used for the import (e.g., 'import numpy as np')."

  file_path:
    type: string
    source: file_path
    nullable: true
    description: "Path of the file containing this import."

  start_line:
    type: int64
    source: start_line
    nullable: true
    description: "Starting line number of the import statement."

  end_line:
    type: int64
    source: end_line
    nullable: true
    description: "Ending line number of the import statement."

  traversal_path:
    type: string
    source: traversal_path
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

  project_id:
    type: int64
    source: project_id
    nullable: false
    description: "ID of the project this imported symbol belongs to."

