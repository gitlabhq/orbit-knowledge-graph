# fixtures/ontology/nodes/plan/milestone.yaml

node_type: Milestone
domain: plan
description: A milestone for tracking progress toward a goal within a project or group
destination_table: gl_milestones
redaction: null  # TODO: configure redaction

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the milestone."

  iid:
    type: int64
    source: iid
    nullable: true
    description: "Project or group-scoped milestone number."

  title:
    type: string
    source: title
    nullable: false
    description: "Title of the milestone."

  description:
    type: string
    source: description
    nullable: true
    description: "Description of the milestone."

  state:
    type: string
    source: state
    nullable: true
    description: "Current state of the milestone (active, closed)."

  due_date:
    type: date
    source: due_date
    nullable: true
    description: "Due date for the milestone."

  start_date:
    type: date
    source: start_date
    nullable: true
    description: "Start date for the milestone."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Timestamp when the milestone was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Timestamp when the milestone was last updated."

etl:
  type: table
  scope: namespaced
  source: siphon_milestones
  watermark: _siphon_replicated_at
  deleted: _siphon_deleted
  edges:
    project_id:
      to: Project
      as: in_project
      direction: outgoing
    group_id:
      to: Group
      as: in_group
      direction: outgoing
