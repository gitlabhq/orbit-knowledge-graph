# fixtures/ontology/nodes/plan/label.yaml

node_type: Label
domain: plan
description: A label for categorizing and filtering work items
label: title
destination_table: gl_labels

style:
  size: 22
  color: "#A855F7"

redaction:
  resource_type: labels
  id_column: id
  ability: read_label

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the label."

  title:
    type: string
    source: title
    nullable: true
    description: "Title/name of the label."

  description:
    type: string
    source: description
    nullable: true
    description: "Description of the label."

  color:
    type: string
    source: color
    nullable: true
    description: "Hex color code for the label."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Timestamp when the label was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Timestamp when the label was last updated."

  traversal_path:
    type: string
    source: traversal_path
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

etl:
  type: table
  scope: namespaced
  source: siphon_labels
  watermark: _siphon_replicated_at
  deleted: _siphon_deleted
  edges:
    project_id:
      to: Project
      as: IN_PROJECT
      direction: outgoing
    group_id:
      to: Group
      as: IN_GROUP
      direction: outgoing
