    description: "Global identifier for the work item."
    status: pending
    internal:
      sources:
        [
          { system: postgres, database: main, table: issues, column: id },
          { system: clickhouse, table: null },
        ]
  iid:
    type: int64
    nullable: true
    description: "Project or group-scoped work item number."
    status: pending
