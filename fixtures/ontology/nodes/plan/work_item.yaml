# fixtures/ontology/nodes/plan/work_item.yaml

node_type: WorkItem
domain: plan
description: A work item representing an issue, epic, task, incident, or other trackable unit of work
destination_table: gl_work_item

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the work item."

  iid:
    type: int64
    source: iid
    nullable: true
    description: "Project or group-scoped work item number."

  title:
    type: string
    source: title
    nullable: true
    description: "Title of the work item."

  description:
    type: string
    source: description
    nullable: true
    description: "Description body (markdown)."

  state:
    type: enum
    source: state_id
    nullable: false
    description: "Current state of the work item."
    values:
      1: opened
      2: closed
      3: merged
      4: locked

  work_item_type:
    type: enum
    source: work_item_type_id
    nullable: false
    description: "Type of work item."
    values:
      0: issue
      1: incident
      2: test_case
      3: requirement
      4: task
      5: objective
      6: key_result
      7: epic
      8: ticket

  confidential:
    type: boolean
    source: confidential
    nullable: false
    description: "Whether the work item is confidential."

  due_date:
    type: date
    source: due_date
    nullable: true
    description: "Due date for the work item."

  start_date:
    type: date
    source: start_date
    nullable: true
    description: "Start date for the work item."

  weight:
    type: int64
    source: weight
    nullable: true
    description: "Weight/points assigned to the work item."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Timestamp when the work item was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Timestamp when the work item was last updated."

  closed_at:
    type: timestamp
    source: closed_at
    nullable: true
    description: "Timestamp when the work item was closed."

