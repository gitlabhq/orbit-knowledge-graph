# fixtures/ontology/nodes/core/project.yaml

node_type: Project
domain: core
description: A GitLab project/repository
destination_table: gl_projects

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the project."

  full_path:
    type: string
    source: path
    nullable: true
    description: "Full path for the project (e.g. gitlab-org/gitlab)."

  name:
    type: string
    source: name
    nullable: true
    description: "Display name."

  description:
    type: string
    source: description
    nullable: true
    description: "Project description."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Timestamp when the project was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Timestamp when the project was last updated."

  visibility_level:
    type: enum
    source: visibility_level
    nullable: false
    description: "Visibility of the project."
    values:
      0: private
      10: internal
      20: public

  archived:
    type: boolean
    source: archived
    nullable: false
    description: "Whether the project is archived."

  star_count:
    type: int64
    source: star_count
    nullable: false
    description: "Star count for the project."

  last_activity_at:
    type: timestamp
    source: last_activity_at
    nullable: true
    description: "Timestamp of last activity in the project."

etl:
  type: query
  scope: namespaced
  query: |
    SELECT
        project.id AS id,
        project.name AS name,
        project.description AS description,
        project.visibility_level AS visibility_level,
        project.path AS path,
        project.namespace_id AS namespace_id,
        project.creator_id AS creator_id,
        project.created_at AS created_at,
        project.updated_at AS updated_at,
        project.archived AS archived,
        project.star_count AS star_count,
        project.last_activity_at AS last_activity_at,
        traversal_paths.traversal_path AS traversal_path,
        project._siphon_deleted AS _deleted,
        project._siphon_replicated_at AS _version
    FROM siphon_projects project
    INNER JOIN project_namespace_traversal_paths traversal_paths ON project.id = traversal_paths.id
    WHERE project.id IN (SELECT id FROM project_namespace_traversal_paths WHERE startsWith(traversal_path, {traversal_path:String}))
        AND project._siphon_replicated_at > {last_watermark:String}
        AND project._siphon_replicated_at <= {watermark:String}
  edges:
    creator_id:
      to: User
      as: creator
    namespace_id:
      to: Group
      as: contains
