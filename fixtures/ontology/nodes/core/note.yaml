# fixtures/ontology/nodes/core/note.yaml

node_type: Note
domain: core
description: A comment or annotation on a GitLab object (issue, merge request, commit, etc.)
destination_table: gl_notes
redaction: null  # TODO: configure redaction

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the note."

  note:
    type: string
    source: note
    nullable: true
    description: "The text content of the note (markdown)."

  noteable_type:
    type: enum
    source: noteable_type
    nullable: false
    description: "Type of object this note is attached to."
    values:
      0: Issue
      1: MergeRequest
      2: Commit
      3: Snippet
      4: "WikiPage::Meta"
      5: "DesignManagement::Design"
      6: "AlertManagement::Alert"
      7: Vulnerability
      8: AbuseReport
      9: "ComplianceManagement::Projects::ComplianceViolation"

  noteable_id:
    type: int64
    source: noteable_id
    nullable: true
    description: "ID of the object this note is attached to (null for commits)."

  system:
    type: boolean
    source: system
    nullable: false
    description: "Whether this is a system-generated note."

  line_code:
    type: string
    source: line_code
    nullable: true
    description: "Code identifying the line position for diff notes."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Timestamp when the note was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Timestamp when the note was last updated."

  discussion_id:
    type: string
    source: discussion_id
    nullable: true
    description: "ID grouping notes into a discussion thread."

  resolved_at:
    type: timestamp
    source: resolved_at
    nullable: true
    description: "Timestamp when the note/discussion was resolved."

  internal:
    type: boolean
    source: internal
    nullable: false
    description: "Whether this note is only visible to project members."

  confidential:
    type: boolean
    source: confidential
    nullable: true
    description: "Whether this note is confidential."

  commit_id:
    type: string
    source: commit_id
    nullable: true
    description: "SHA of the commit this note is on (for commit notes)."

etl:
  type: table
  scope: namespaced
  source: siphon_notes
  watermark: _siphon_replicated_at
  deleted: _siphon_deleted
  edges:
    author_id:
      to: User
      as: authored
      direction: incoming
    noteable_id:
      to_column: noteable_type
      as: has_note
      direction: incoming

