# fixtures/ontology/nodes/core/note.yaml

node_type: Note
domain: core
description: A comment or annotation on a GitLab object (issue, merge request, commit, etc.)
label: id
destination_table: gl_notes

style:
  size: 24
  color: "#64748B"

redaction:
  resource_type: notes
  id_column: id
  ability: read_note

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the note."

  note:
    type: string
    source: note
    nullable: true
    description: "The text content of the note (markdown)."

  noteable_type:
    type: enum
    source: noteable_type
    nullable: false
    description: "Type of object this note is attached to."
    enum_type: string
    values:
      0: Issue
      1: MergeRequest
      2: Commit
      3: Snippet
      4: "WikiPage::Meta"
      5: "DesignManagement::Design"
      6: "AlertManagement::Alert"
      7: Vulnerability
      8: AbuseReport
      9: "ComplianceManagement::Projects::ComplianceViolation"

  noteable_id:
    type: int64
    source: noteable_id
    nullable: true
    description: "ID of the object this note is attached to (null for commits)."

  line_code:
    type: string
    source: line_code
    nullable: true
    description: "Code identifying the line position for diff notes."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Timestamp when the note was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Timestamp when the note was last updated."

  discussion_id:
    type: string
    source: discussion_id
    nullable: true
    description: "ID grouping notes into a discussion thread."

  resolved_at:
    type: timestamp
    source: resolved_at
    nullable: true
    description: "Timestamp when the note/discussion was resolved."

  internal:
    type: boolean
    source: internal
    nullable: false
    description: "Whether this note is only visible to project members."

  confidential:
    type: boolean
    source: confidential
    nullable: true
    description: "Whether this note is confidential."

  commit_id:
    type: string
    source: commit_id
    nullable: true
    description: "SHA of the commit this note is on (for commit notes)."

  traversal_path:
    type: string
    source: traversal_path
    nullable: false
    description: "Namespace traversal path for authentication and authorization."

etl:
  type: query
  scope: namespaced
  query: |
    SELECT
        id,
        note,
        noteable_type,
        noteable_id,
        line_code,
        created_at,
        updated_at,
        discussion_id,
        resolved_at,
        internal,
        confidential,
        commit_id,
        author_id,
        traversal_path,
        _siphon_deleted AS _deleted,
        _siphon_replicated_at AS _version
    FROM siphon_notes
    WHERE system = false
        AND startsWith(traversal_path, {traversal_path:String})
        AND _siphon_replicated_at > {last_watermark:String}
        AND _siphon_replicated_at <= {watermark:String}
  edges:
    author_id:
      to: User
      as: AUTHORED
      direction: incoming
    noteable_id:
      to_column: noteable_type
      as: HAS_NOTE
      direction: incoming

