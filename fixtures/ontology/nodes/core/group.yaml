# fixtures/ontology/nodes/core/group.yaml

node_type: Group
domain: core
description: A GitLab group (top-level group or subgroup)
destination_table: gl_groups

etl:
  type: query
  scope: namespaced
  source: siphon_namespaces
  watermark: _siphon_replicated_at
  deleted: _siphon_deleted
  query: |
    SELECT
        namespace.id AS id,
        namespace.name AS name,
        namespace_details.description AS description,
        namespace.visibility_level AS visibility_level,
        namespace.path AS path,
        namespace.parent_id AS parent_id,
        namespace.owner_id AS owner_id,
        namespace.created_at AS created_at,
        namespace.updated_at AS updated_at,
        traversal_paths.traversal_path AS traversal_path,
        namespace._siphon_deleted AS deleted
    FROM siphon_namespaces namespace
    INNER JOIN siphon_namespace_details namespace_details ON namespace.id = namespace_details.namespace_id
    INNER JOIN namespace_traversal_paths traversal_paths ON namespace.id = traversal_paths.id
    WHERE namespace.id IN (SELECT id FROM namespace_traversal_paths WHERE startsWith(traversal_path, {traversal_path:String}))
        AND namespace._siphon_replicated_at > {last_watermark:String}
        AND namespace._siphon_replicated_at <= {watermark:String}

edges:
  - relationship_kind: owner
    source_column: owner_id
    target_kind: User
  - relationship_kind: contains
    source_column: parent_id
    target_kind: Group

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the group."

  full_path:
    type: string
    source: traversal_path
    nullable: true
    description: "Full path for the group (e.g. gitlab-org/quality)."

  name:
    type: string
    source: name
    nullable: false
    description: "Display name."

  description:
    type: string
    source: description
    nullable: true
    description: "Group description."

  created_at:
    type: timestamp
    source: created_at
    nullable: true
    description: "Timestamp when the group was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: true
    description: "Timestamp when the group was last updated."

  visibility_level:
    type: enum
    source: visibility_level
    nullable: false
    description: "Visibility of the group."
    values:
      0: private
      10: internal
      20: public

  path:
    type: string
    source: path
    nullable: false
    description: "URL-safe group path (slug)."
