# fixtures/ontology/nodes/security/scanner.yaml

node_type: VulnerabilityScanner
domain: security
description: A security scanner that detects vulnerabilities in projects
destination_table: gl_vulnerability_scanner
redaction: null  # TODO: configure redaction

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the scanner."

  external_id:
    type: string
    source: external_id
    nullable: false
    description: "External identifier for the scanner (e.g., gemnasium, bandit)."

  name:
    type: string
    source: name
    nullable: false
    description: "Human-readable name of the scanner."

  vendor:
    type: string
    source: vendor
    nullable: false
    description: "Vendor that provides the scanner (default: GitLab)."

  created_at:
    type: timestamp
    source: created_at
    nullable: false
    description: "Timestamp when the scanner was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: false
    description: "Timestamp when the scanner was last updated."

etl:
  type: table
  scope: namespaced
  source: siphon_vulnerability_scanners
  watermark: _siphon_replicated_at
  deleted: _siphon_deleted
  edges:
    project_id:
      to: Project
      as: SCANS
      direction: outgoing
