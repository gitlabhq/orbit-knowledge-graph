# fixtures/ontology/nodes/security/finding.yaml

node_type: Finding
domain: security
description: A security scan finding (occurrence) that may be linked to a vulnerability
destination_table: gl_finding
redaction: null  # TODO: configure redaction

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the finding."

  uuid:
    type: string
    source: uuid
    nullable: false
    description: "UUID uniquely identifying the finding."

  name:
    type: string
    source: name
    nullable: true
    description: "Name of the finding."

  description:
    type: string
    source: description
    nullable: true
    description: "Detailed description of the finding."

  solution:
    type: string
    source: solution
    nullable: true
    description: "Recommended solution or remediation for the finding."

  severity:
    type: enum
    source: severity
    nullable: false
    description: "Severity level of the finding."
    values:
      0: info
      1: unknown
      2: low
      3: medium
      4: high
      5: critical

  deduplicated:
    type: boolean
    source: deduplicated
    nullable: false
    description: "Whether this finding has been deduplicated."

  overridden_uuid:
    type: string
    source: overridden_uuid
    nullable: true
    description: "UUID of the finding this one overrides."

etl:
  type: query
  scope: namespaced
  query: |
    SELECT
        traversal_path,
        id,
        uuid,
        nullIf(JSONExtractString(finding_data, 'name'), '') AS name,
        nullIf(JSONExtractString(finding_data, 'description'), '') AS description,
        nullIf(JSONExtractString(finding_data, 'solution'), '') AS solution,
        severity,
        deduplicated,
        overridden_uuid,
        project_id,
        scanner_id,
        _siphon_replicated_at AS _version,
        _siphon_deleted AS _deleted
    FROM siphon_security_findings
    WHERE startsWith(traversal_path, {traversal_path:String})
        AND _siphon_replicated_at > {last_watermark:String}
        AND _siphon_replicated_at <= {watermark:String}
  edges:
    project_id:
      to: Project
      as: in_project
      direction: outgoing
    scanner_id:
      to: Scanner
      as: detected_by
      direction: outgoing
