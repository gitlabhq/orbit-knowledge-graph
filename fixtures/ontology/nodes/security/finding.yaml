# fixtures/ontology/nodes/security/finding.yaml

node_type: Finding
domain: security
description: A security scan finding (occurrence) that may be linked to a vulnerability
destination_table: gl_finding

properties:
  id:
    type: int64
    source: id
    nullable: false
    description: "Global identifier for the finding."

  uuid:
    type: string
    source: uuid
    nullable: false
    description: "UUID uniquely identifying the finding."

  name:
    type: string
    source: name
    nullable: false
    description: "Name of the finding."

  description:
    type: string
    source: description
    nullable: true
    description: "Detailed description of the finding."

  severity:
    type: enum
    source: severity
    nullable: false
    description: "Severity level of the finding."
    values:
      0: info
      1: unknown
      2: low
      3: medium
      4: high
      5: critical

  report_type:
    type: enum
    source: report_type
    nullable: false
    description: "Type of security scan that detected the finding."
    values:
      0: sast
      1: dependency_scanning
      2: container_scanning
      3: dast
      4: secret_detection
      5: coverage_fuzzing
      6: api_fuzzing
      7: cluster_image_scanning
      8: container_scanning_for_registry
      9: generic

  detection_method:
    type: enum
    source: detection_method
    nullable: false
    description: "Method by which the finding was detected."
    values:
      0: gitlab_security_report
      1: external_security_report
      2: bug_bounty
      3: code_review
      4: security_audit

  solution:
    type: string
    source: solution
    nullable: true
    description: "Suggested solution or remediation for the finding."

  cve:
    type: string
    source: cve
    nullable: true
    description: "CVE identifier if applicable."

  created_at:
    type: timestamp
    source: created_at
    nullable: false
    description: "Timestamp when the finding was created."

  updated_at:
    type: timestamp
    source: updated_at
    nullable: false
    description: "Timestamp when the finding was last updated."

  detected_at:
    type: timestamp
    source: detected_at
    nullable: true
    description: "Timestamp when the finding was first detected."

