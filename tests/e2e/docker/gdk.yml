---
hostname: 0.0.0.0
listen_address: 0.0.0.0
port: 3000
asdf:
  opt_out: true
mise:
  enabled: true
webpack:
  enabled: false
vite:
  enabled: false
clickhouse:
  enabled: true
nats:
  enabled: true
siphon:
  enabled: true
  tables:
    - namespaces
    - projects
    - routes
    - users
    - merge_requests
    - merge_request_metrics
    - issues
    - members
    - project_authorizations
    - labels
    - milestones
    - notes
    - award_emoji
knowledge_graph:
  enabled: true
env:
  GITLAB_SIMULATE_SAAS: "1"
  CLOUD_CONNECTOR_SELF_SIGN_TOKENS: "1"
