[workspace]
resolver = "2"
members = [
  "crates/treesitter-visit",
  "crates/code-parser",
  "crates/labkit-rs",
  "crates/etl-engine",
]

[workspace.dependencies]
arrow = "57.2.0"
async-trait = "0.1.89"
bytes = "1.11"
chrono = "0.4.43"
futures = "0.3.31"
internment = "0.8.6"
mimalloc = "0.1.48"
once_cell = "1.21.3"
parking_lot = "0.12.5"
pastey = "0.2.1"
rust-lapper = "=1.2.0"
rustc-hash = "2.1.1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
smallvec = "1.15.1"
tempfile = "3.24.0"
thiserror = "2.0.17"
tokio = { version = "1.45", features = ["rt", "sync", "macros"] }
tokio-stream = "0.1.18"
tokio-util = "0.7"
toml = "0.9.10"
tracing = "0.1.44"
uuid = { version = "1.19.0", features = ["v4"] }
