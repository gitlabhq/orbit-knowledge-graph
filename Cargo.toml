[workspace]
resolver = "2"
members = [
  "crates/treesitter-visit",
  "crates/code-parser",
]

[workspace.dependencies]
# Common dependencies
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.148"
thiserror = "2.0.17"
once_cell = "1.21.3"
tracing = "0.1.44"
toml = "0.9.10"
pastey = "0.2.1"
rustc-hash = "2.1.1"
smallvec = "1.15.1"
internment = "0.8.6"
rust-lapper = "=1.2.0"
mimalloc = "0.1.48"
tempfile = "3.24.0"
